<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Катинський Орест — Біографія</title>
  <link rel="stylesheet" type="text/css" href="../../../style.css">

</head>
<body>
  <div class="wrap">
    <div class="page-title">
      <h1>Катинський Орест</h1>
      <h2>Біографія</h2>
    </div>
    <div class="prose" id="content">
      <div class="side-layout">
        <div class="side-column"><img class="side-img side-thumb" src="./katynskyy-orest.webp" alt="Катинський Орест" title="Катинський Орест" data-full="./katynskyy-orest.webp" /></div>
        <div class="prose-text">
          <p>Народився у 1957 році на Львівщині.</p>
          <p>Закінчив Харківський політехнічний інститут.</p>
          <p>Вчився і працював в університеті Львівська політехніка, інженером на підприємствах військового комплексу, був консультантом МН-ДПП &quot;Selena&quot; в Польші. На теперішній час мешкає у Франції.</p>
        </div>
      </div>
    </div>
    <div id="imageoverlay" class="imageoverlay" aria-hidden="true">
      <img id="imageoverlaypic" class="imageoverlaypic" src="" alt="" />
    </div>
    <script>
      (function() {
        const overlay = document.getElementById('imageoverlay');
        const overlaypic = document.getElementById('imageoverlaypic');
        if (!overlay || !overlaypic) return;

        function closeimage() {
          overlay.classList.add('fade');
          overlay.addEventListener('transitionend', whentransitionends);
          overlay.setAttribute('aria-hidden', 'true');
          overlaypic.src = '';
        }
        function whentransitionends(e) {
          if (e.target === overlay) {
            overlay.classList.remove('open');
            overlay.classList.remove('fade');
            overlay.removeEventListener('transitionend', whentransitionends);
          }
        }
        function expandimage(fullsrc) {
          if (!fullsrc) return;
          overlaypic.src = fullsrc;
          overlay.classList.add('open');
          overlay.classList.remove('fade');
          overlay.setAttribute('aria-hidden', 'false');
        }
        overlay.addEventListener('click', function() {
          closeimage();
        });
        overlaypic.addEventListener('click', function(e) {
          e.stopPropagation();
          if (overlaypic && overlaypic.src) {
            window.open(overlaypic.src, '_blank', 'noopener');
          }
        });
        document.querySelectorAll('.side-thumb').forEach(function(img) {
          img.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            const full = img.getAttribute('data-full');
            expandimage(full);
          });
        });
      })();
    </script>
    
  </div>
</body>
</html>
