<div class="wrap">
 <div class="page-title">
  <h1>Коли світанок непомітно...</h1>
  <h2>Анатолій Клименко</h2>
 </div>
 <div class="prose" id="content">
 Коли світанок непомітно<br />
Змива росою сажу ночі,<br />
Коли на сході ніжні квіти<br />
Живого серця розквітають,<br />
Мого кохання світлі очі<br />
Блакиттю землю обіймають.<br />
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;12.02.2018
 </div>
