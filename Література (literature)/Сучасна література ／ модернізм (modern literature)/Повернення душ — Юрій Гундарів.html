<body>
<div class="wrap">
 <div class="page-title">
  <h1>Повернення душ</h1>
  <h2>Юрій Гундарів</h2>
 </div>
 <div class="prose" id="content">
 <em>В Україну повернули тіла ще 1212 полеглих захисників.</em><br />
<br />
У сонячний червневий день<br />
одна за одною машини:<br />
колона траурна іде —<br />
німі холодні домовини…<br />
<br />
Нам повернули лиш тіла,<br />
хоча і це важливо дуже,<br />
та в кожнім з них душа жила…<br />
Тож хто віддасть тепер нам душі?
 </div>
