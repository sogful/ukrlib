 <div class="page-title">
  <h1>Живе людина...</h1>
  <h2>Анатолій Клименко</h2>
 </div>
 <div class="prose" id="content">
 Живе людина щоб<br />
із пекла рай творить<br />
і в холоді знаходить<br />
теплу ноту<br />
і сірий день свій<br />
так уже прожить<br />
щоб промінцем зігріть<br />
чиюсь скорботу<br />
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;01.03.2025
 </div>
