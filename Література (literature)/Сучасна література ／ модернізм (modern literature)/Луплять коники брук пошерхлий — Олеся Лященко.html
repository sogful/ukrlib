<body>
<div class="wrap">
 <div class="page-title">
  <h1>Луплять коники брук пошерхлий...</h1>
  <h2>Олеся Лященко</h2>
 </div>
 <div class="prose" id="content">
 Луплять коники брук пошерхлий,<br />
Ніби дощ по спині узвозу.<br />
Заліпило вапном розведеним<br />
Теплих шибок напнуті лози.<br />
&nbsp;<br />
Влиплий день у торби з капустою,<br />
З пересмаженим, з&nbsp;теплим, з тмином.<br />
Небо лапами гуски плюскає<br />
По розляпинах на хустинах.
 </div>
</div>
