 <div class="page-title">
  <h1>Похвала</h1>
  <h2>Володимир Ліпкан</h2>
 </div>
 <div class="prose" id="content">
 Контакти зайві, люди і пусті взаємодії,<br />
Крадуть енергію, наш цінний час і звужують всі дії.<br />
<em>Доступність</em> має власно і зворотний бік:<br />
<strong>Без вибірковості ти не досягнеш цілей своїх вік.</strong><br />
<br><br />
<em>01.02.2026</em>
