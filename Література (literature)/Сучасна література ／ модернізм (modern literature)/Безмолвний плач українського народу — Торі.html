  <h1>Безмолвний плач українського народу</h1>
  <h2>Торі</h2>
 </div>
 <div class="prose" id="content">
 Безмолвний плач українського народу<br />
Переростає в крик по всьому світу<br />
І кожен щирий українець,<br />
Немов втрачає пів себе..<br />
Коли під домом вражі люде<br />
Руйнують мир і все що ми..<br />
Так довго, разом будували<br />
Старанно зводячи мости...<br />
