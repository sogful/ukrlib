<body>
<div class="wrap">
 <div class="page-title">
  <h1>Усмішка твоя</h1>
  <h2>Оксана Михайлічко</h2>
 </div>
 <div class="prose" id="content">
 Липень – чарівна пора!<br />
Я їду додому,<br />
Але не сумна.<br />
Зі мною очі твої волошкові,<br />
Усмішка твоя чарівна,<br />
Яка ти прекрасна, любове моя!<br />
<br>
 </div>
