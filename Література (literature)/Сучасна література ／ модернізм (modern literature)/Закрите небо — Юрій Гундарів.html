<title>Закрите небо</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Закрите небо</h1>
  <h2>Юрій Гундарів</h2>
 </div>
 <div class="prose" id="content">
 Сирена…<br />
Спускайся до сховища!<br />
На кухні – термос із кавою,<br />
візьми для душі Андруховича<br />
чи, може, Акутагаву…<br />
&nbsp;<br />
А я нагорі залишусь,<br />
закрию молитвою небо,<br />
щоб нам повернути тишу…<br />
Щоб бути знов біля тебе.
 </div>
