<div class="wrap">
 <div class="page-title">
  <h1>І навіть коли маленькі янголи...</h1>
  <h2>Олеся Лященко</h2>
 </div>
 <div class="prose" id="content">
 І навіть коли маленькі янголи –<br />
Причепурені і волосся льоном –<br />
Відчинити їм двері<br />
Означало б потискування рук,<br />
Солодкаві посмішки<br />
Гостинності й пильності –<br />
Бодай не забрали б із собою<br />
Твою вбогу кліточку<br />
В церкву на&nbsp;пожертви.
 </div>
