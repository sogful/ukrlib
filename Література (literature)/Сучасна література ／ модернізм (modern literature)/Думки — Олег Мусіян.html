<div class="wrap">
 <div class="page-title">
  <h1>Думки</h1>
  <h2>Олег Мусіян</h2>
 </div>
 <div class="prose" id="content">
 <span style="color: black;">Сьогодні я почав день у вечорі,</span><br />
<span style="color: black;">Бо вся ніч знов у пошуках сну. </span><br />
<span style="color: black;">Мій вечір почався із роздумів:</span><br />
<span style="color: black;">"Тож коли я на справді помру?" </span><br />
<span style="color: black;">І в цій темі нічого поганого,</span><br />
<span style="color: black;">Головне те — що я зрозумів: </span><br />
<span style="color: black;">Моє життя спотворене ранами,</span><br />
<span style="color: black;">Але ранок вже знов наступив. </span>
 </div>
