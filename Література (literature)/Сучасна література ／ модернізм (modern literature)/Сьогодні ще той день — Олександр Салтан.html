<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сьогодні ще той день...</h1>
  <h2>Олександр Салтан</h2>
 </div>
 <div class="prose" id="content">
 Сьогодні ще той день,<br />
Коли вистачає повітря.<br />
Не загнані в кут<br />
І не общипані пір'ям.<br />
<br />
У нас є той час,<br />
Не рахуєм годинами.<br />
Просто у світлі йдемо,<br />
Усі, мов родина ми.
 </div>
</div>
