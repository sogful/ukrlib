<body>
<div class="wrap">
 <div class="page-title">
  <h1>Любов</h1>
  <h2>Віталій Гречка</h2>
 </div>
 <div class="prose" id="content">
 Завтра буде таке ж "сьогодні",<br />
Що і вчора у нас було,<br />
Того часу у нас – безодні,<br />
Бо нам болісно бачить дно.<br />
<br />
І в картинах уяви й далі,<br />
Ми "сьогодні" живемо знов,<br />
У надії на "завтра" вдалі,<br />
Де згадає за нас Любов.
 </div>
</div>
