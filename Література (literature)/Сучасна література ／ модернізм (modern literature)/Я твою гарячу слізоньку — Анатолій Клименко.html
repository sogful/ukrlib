<div class="wrap">
 <div class="page-title">
  <h1>Я твою гарячу слізоньку...</h1>
  <h2>Анатолій Клименко</h2>
 </div>
 <div class="prose" id="content">
 Я твою гарячу слізоньку<br />
і твої шовкові коси —<br />
заховаю в тиху пісеньку<br />
і в холодні срібні роси.<br />
<br />
Я твої холодні устоньки —<br />
поцілунками укрию,<br />
а холодні твої рученьки —<br />
своїм серденьком зігрію..<br />
<br />
<em>11.12.2025</em>
 </div>
</div>
