 <div class="page-title">
  <h1>Прагнення і необхідність</h1>
  <h2>Олександр Чалий</h2>
 </div>
 <div class="prose" id="content">
 Наш розум прагне більше правоти,<br />
а тіло домагається покою,<br />
душа завжди шукає доброти,<br />
а серце все женеться за красою.<br />
<br />
Та розуму потрібен тільки мир,<br />
а тілу варто просто відпочити,<br />
душа це наш моральний монастир,<br />
а серце просто має всім служити.<br />
<br />
2025 р
