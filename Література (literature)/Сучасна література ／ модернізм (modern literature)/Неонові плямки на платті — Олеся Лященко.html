 <div class="page-title">
  <h1>Неонові плямки на платті...</h1>
  <h2>Олеся Лященко</h2>
 </div>
 <div class="prose" id="content">
 Неонові плямки на платті.<br />
Стояти з конвалій і смерку.<br />
Хто прийде до тебе в Ляту,<br />
В три молодості роздертий?<br />
&nbsp;<br />
Хто прийде до тебе – сурми<br />
Стечуть в каблучок і змочать.<br />
Ти будеш летіти (вітер),<br />
Немов папірець по площі.
 </div>
