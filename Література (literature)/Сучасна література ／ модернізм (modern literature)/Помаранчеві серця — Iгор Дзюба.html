  <h2>Iгор Дзюба</h2>

 <div class="prose" id="content">
 Добро всi вулицi заполонило,<br />
Воно перемагае зло.<br />
В мiстах любов замайорла.<br />
Навколо снiг, але в душi тепло.<br />
<br><br />
I нашi очi слiзьми повнi,<br />
Хоча й не стерти&nbsp;&nbsp;радост з лиця.<br />
Бо ми не помаранчевi лиш ззовнi —<br />
В нас помаранчевi серця!
