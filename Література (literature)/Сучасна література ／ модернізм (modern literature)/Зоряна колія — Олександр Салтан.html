<div class="wrap">
 <div class="page-title">
  <h1>Зоряна колія...</h1>
  <h2>Олександр Салтан</h2>
 </div>
 <div class="prose" id="content">
 Зоряна колія –<br />
Інструмент для коліс,<br />
Грає нічні мелодії,<br />
В них заглибоко вліз.<br />
<br />
Нічний потяг.<br />
Зірки – за бетон,<br />
Лиш щоб місяць<br />
У розклад зійшов.<br />
<br />
Зранку гуде сонце,<br />
По потягу лишився стон.<br />
Оббиті колії ховає метро.<br />
Кохаєш картину, люби й полотно.
 </div>
