<div class="wrap">
 <div class="page-title">
  <h1>Жорстокими</h1>
  <h2>Віктор Шевчукевич</h2>
 </div>
 <div class="prose" id="content">
 Стали ми жорсткими,<br />
Не діставши сонця,<br />
Яке могло б укрити<br />
Мої очі від падіння.<br />
<br />
Голоси в голові<br />
Все тихше ходили...<br />
Я замикаюсь на узбережжі —<br />
Тільки б не бачити тебе.<br />
<br />
Де палаю я,<br />
Мовчки,<br />
Без зайвого слова,<br />
Що повернуло б усе<br />
На глухі місця.
 </div>
