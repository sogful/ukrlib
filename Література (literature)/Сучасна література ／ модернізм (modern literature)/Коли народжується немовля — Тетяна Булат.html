<body>
<div class="wrap">
 <div class="page-title">
  <h1>Коли народжується немовля</h1>
  <h2>Тетяна Булат</h2>
 </div>
 <div class="prose" id="content">
 Коли народжується немовля,<br />
Двома дарами Бог благословляє:<br />
Один з них – то отримане життя,<br />
Яке шляхи у вирій відкриває…<br />
&nbsp;<br />
Другий же дар – то рідні, то сім'я,<br />
Моральний захист у любу хвилину.<br />
Славетне ж&nbsp;і почесне це ім'я,<br />
Яким&nbsp;Господь назвав мою родину!
 </div>
