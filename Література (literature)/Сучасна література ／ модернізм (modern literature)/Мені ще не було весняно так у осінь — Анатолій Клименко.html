<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мені ще не було весняно так у осінь...</h1>
  <h2>Анатолій Клименко</h2>
 </div>
 <div class="prose" id="content">
 Мені ще не було весняно так у осінь,<br />
Хоча прожив уже немало літ.<br />
Так, ніби те, що мерзлим було досі<br />
Розтало в серці мов торішній лід.
 </div>
