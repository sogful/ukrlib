<div class="wrap">
 <div class="page-title">
  <h1>Темпоральність життя</h1>
  <h2>Володимир Ліпкан</h2>
 </div>
 <div class="prose" id="content">
 Разом з життям потрібно проживати,<br />
<em>Не поспішати</em> — бо біду ти будеш доганяти.<br />
<em>Не відставати</em> — бо біда можливо й дожене тебе,<br />
Потрібно жити темпорально: ось і все!<br />
<br />
16.09.2025
 </div>
