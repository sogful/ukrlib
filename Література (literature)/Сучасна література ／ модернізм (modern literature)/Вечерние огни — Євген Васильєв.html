<div class="wrap">
 <div class="page-title">
  <h1>Вечерние огни</h1>
  <h2>Євген Васильєв</h2>
 </div>
 <div class="prose" id="content">
 Много было в жизни моей<br />
вечерних огней,<br />
но было два огня,<br />
которых помнить буду,<br />
запомнил их тогда,<br />
и никогда не забуду,<br />
Смотрел на них бы я хоть час,<br />
и любовался долго:<br />
Огни ее горящих глаз<br />
запомню я надолго!<br />
2000
