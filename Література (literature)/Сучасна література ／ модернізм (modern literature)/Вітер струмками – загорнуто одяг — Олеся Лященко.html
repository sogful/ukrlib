<div class="wrap">
 <div class="page-title">
  <h1>Вітер струмками – загорнуто одяг...</h1>
  <h2>Олеся Лященко</h2>
 </div>
 <div class="prose" id="content">
 Вітер струмками – загорнуто одяг,<br />
Руки вплелися у сіть парасолі.<br />
Нумо твою нерозтрачену вроду<br />
Фарбами по соборі.<br />
&nbsp;<br />
Вітер струмками стікає по стінах,<br />
Ти ще отримаєш злотий від майстра.<br />
Майстер до тебе – побожний і сильний.<br />
Не переймайся.
 </div>
