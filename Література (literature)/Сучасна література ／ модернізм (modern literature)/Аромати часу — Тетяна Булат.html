<title>Аромати часу</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Аромати часу</h1>
  <h2>Тетяна Булат</h2>
 </div>
 <div class="prose" id="content">
 Від когось пахне нікотином,<br />
Від когось вогкістю осель,<br />
Хтось не голив три дні щетину,<br />
Від когось аромат Шанель…<br />
&nbsp;<br />
І хто б не був ти – слабкий, сильний,<br />
Живеш у злиднях, чи в красі…<br />
З недавна запах у нас спільний —<br />
Війною пахнемо ми всі!
 </div>
</div>
