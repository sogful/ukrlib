<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мовчиш і все, чи я тебе образив?..</h1>
  <h2>Анатолій Клименко</h2>
 </div>
 <div class="prose" id="content">
 Мовчиш і все, чи я тебе образив?<br />
Чи вже знайти не можна добрих слів?<br />
Та що слова, пришли хоч порух брів,<br />
Хоч подихом своїм дихни у душу.<br />
І скільки бога вже благати про це мушу?
 </div>
</div>
