  <h1>Мюнхен 2.0</h1>
  <h2>Володимир Ліпкан</h2>
 </div>
 <div class="prose" id="content">
 А світ продовжував в брехні купатися,<br />
Своїми версіями миру упиватися.<br />
Кому ресурси треба, хто по гроші,<br />
Тепер вже точно знаємо: де гниди, а де воші…<br />
<br />
<i>19.02.2025</i>
