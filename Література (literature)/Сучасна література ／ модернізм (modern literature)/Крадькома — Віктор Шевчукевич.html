<body>
<div class="wrap">
 <div class="page-title">
  <h1>Крадькома</h1>
  <h2>Віктор Шевчукевич</h2>
 </div>
 <div class="prose" id="content">
 Крадькома біжу<br />
По дорозі схилу.<br />
Милою тобою,<br />
Проведеною мною.<br />
<br />
Крадькома біжу,<br />
Довіру я шукаю.<br />
Буду шукати до останнього світанку.<br />
Милувався родиною<br />
З західного сходу.<br />
<br />
Крадькома біжу,<br />
Квітневою дорогою.<br />
Зустріну я кохану,<br />
Споглядаючи в мрію.
 </div>
