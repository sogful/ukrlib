<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сенс життя</h1>
  <h2>Олександр Чалий</h2>
 </div>
 <div class="prose" id="content">
 В одній перлині всі відтінки моря,<br />
Вся дивовижність шахти в діаманті.<br />
В одній бджолі всі аромати поля,&nbsp;<br />
А чарівність скрипки в музиканті.<br />
&nbsp;<br />
Всю магію весни і аромати раю,<br />
красу зими, мереживо сніжинки,<br />
і навіть сенс життя я відшукаю,<br />
у поцілунку однієї жінки.<br />
<br>
 </div>
