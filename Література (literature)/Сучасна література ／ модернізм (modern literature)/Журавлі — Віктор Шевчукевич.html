<body>
<div class="wrap">
 <div class="page-title">
  <h1>Журавлі</h1>
  <h2>Віктор Шевчукевич</h2>
 </div>
 <div class="prose" id="content">
 Довкола речі страшні,<br />
Світ не ходить на думці одній.<br />
Гіркій, журливій, жахливій<br />
Від втечі твоєї зорі не йшли.<br />
Застрягли в подорожі ті журавлі.<br />
Тобою кохані,<br />
Сумую я за ними, коли читаю сонети.<br />
Але зміни не важливі, коли відкривав я себе.
 </div>
</div>
