<div class="wrap">
 <div class="page-title">
  <h1>Марафон</h1>
  <h2>Юрій Гундарів</h2>
 </div>
 <div class="prose" id="content">
 <blockquote>Михайлові Теплюку</blockquote><br />
День у день, немов Муракамі,<br />
долати марафонську дистанцію,<br />
адже ніхто на сріблястій таці<br />
не піднесе філософський камінь.<br />
<br />
Ніхто і ніколи не зробить за тебе<br />
те, що повинен здійснити сам,<br />
щодня перетворюючи сіре небо<br />
у божественні небеса.
 </div>
