<body>
<div class="wrap">
 <div class="page-title">
  <h1>Коли твоє чекання втратить...</h1>
  <h2>Марія Козиренко</h2>
 </div>
 <div class="prose" id="content">
 ***<br />
Коли твоє чекання втратить<br />
Звичне чуття часу,<br />
Годинник стече на підлогу,<br />
Продовживши справу Далі,<br />
Постріл стане повільним,<br />
Я буду себе малювати<br />
Тендітною жінкою в сарі —<br />
Відлунням минулих життів.
 </div>
