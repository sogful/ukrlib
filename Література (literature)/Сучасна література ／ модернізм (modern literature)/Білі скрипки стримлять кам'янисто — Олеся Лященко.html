<body>
<div class="wrap">
 <div class="page-title">
  <h1>Білі скрипки стримлять кам'янисто...</h1>
  <h2>Олеся Лященко</h2>
 </div>
 <div class="prose" id="content">
 Білі скрипки стримлять кам'янисто,<br />
І рука партитурами сколота.<br />
Очі ніжним тоненьким листям<br />
Із дрібними прожилками золота<br />
&nbsp;<br />
Вибігають на камінь неприбраний –<br />
Камінь пилом стікає просіяним.<br />
Небо падає квітними липами<br />
І заплутується поміж віями.
 </div>
