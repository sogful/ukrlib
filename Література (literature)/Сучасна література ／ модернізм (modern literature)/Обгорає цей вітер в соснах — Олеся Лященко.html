<div class="wrap">
 <div class="page-title">
  <h1>Обгорає цей вітер в соснах...</h1>
  <h2>Олеся Лященко</h2>
 </div>
 <div class="prose" id="content">
 Обгорає цей вітер в соснах,<br />
Щойно бог обтесав колибу.<br />
Його голос картавим воском<br />
На підлогу зі свічки виливсь.<br />
&nbsp;<br />
Ти його рукавами витреш,<br />
Сосни виплачуть вниз лезгінку.<br />
Прийде хлопець із гір з калитков,<br />
Забере твою гарну жінку.
 </div>
