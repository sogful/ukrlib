<body>
<div class="wrap">
 <div class="page-title">
  <h1>Закатований вірш</h1>
  <h2>Юрій Гундарів</h2>
 </div>
 <div class="prose" id="content">
 Мій вірш катували внизу у підвалі,<br />
лиш крик виривався у нього з грудей…<br />
Але він підвівся і рушив далі —<br />
нагору, скоріш до людей.<br />
<br><br />
Він все пам'ятає, але всім пробачив<br />
і далі по лезу йде босоніж…<br />
Він все відчуває, страждає і плаче,<br />
бо він є творець, він — Вірш!
 </div>
