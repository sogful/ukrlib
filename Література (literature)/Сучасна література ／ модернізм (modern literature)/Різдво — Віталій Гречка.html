<body>
<div class="wrap">
 <div class="page-title">
  <h1>Різдво</h1>
  <h2>Віталій Гречка</h2>
 </div>
 <div class="prose" id="content">
 В серці тепло – рідні дзвонили,<br />
Дай нам всім Бог доброї сили!<br />
Сьогодні Святвечір, страви готові —<br />
Сідайте сім'я та будьмо здорові!<br />
Завтра святкуємо разом Різдво —<br />
Христос народився! Славімо Його!
 </div>
