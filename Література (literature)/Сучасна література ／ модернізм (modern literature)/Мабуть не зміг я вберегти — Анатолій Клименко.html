<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мабуть не зміг я вберегти...</h1>
  <h2>Анатолій Клименко</h2>
 </div>
 <div class="prose" id="content">
 мабуть не зміг я вберегти<br />
твойого спокою підмурок<br />
мабуть не зміг я віднайти<br />
душі твоїй в собі притулок<br />
<br />
і сліз що у очах блищать<br />
і рук твоїх німе тремтіння<br />
і слів що в грудях так кричать<br />
й в волоссі золоте проміння<br />
<br />
<em>03.11.2025</em>
 </div>
</div>
</body>
