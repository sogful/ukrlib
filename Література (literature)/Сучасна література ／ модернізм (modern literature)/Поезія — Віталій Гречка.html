<body>
<div class="wrap">
 <div class="page-title">
  <h1>Поезія</h1>
  <h2>Віталій Гречка</h2>
 </div>
 <div class="prose" id="content">
 Поезія – то хворобливий стан,<br />
Світи, що головою тихо ходять,<br />
Видінь яскравість і видінь туман,<br />
Потенціал засіяного поля.<br />
&nbsp;<br />
Звичайний розум бачить в ній слова,<br />
Що почуттями інколи жонглюють,<br />
Та, раптом – зблиск! Твоя душа жива!<br />
Кохаєш ти тепер хворобу тую.
 </div>
</div>
