<body>
<div class="wrap">
 <div class="page-title">
  <h1>Раптом скажу: буває</h1>
  <h2>Віталій Круглов</h2>
 </div>
 <div class="prose" id="content">
 Раптом скажу: буває,<br />
потім додам: бувай.<br />
В пісні є щось безкрає,<br />
мов у мовчанні — край.<br />
Світло — воно не зовні.<br />
Світить з таких глибин,<br />
що відчуваєш повінь<br />
у відчуттях рибин.<br />
Прийде і час, і тиша,<br />
ми відсвяткуєм Спас.<br />
Знаю: ще буде ліпше,<br />
тільки уже без нас.
 </div>
