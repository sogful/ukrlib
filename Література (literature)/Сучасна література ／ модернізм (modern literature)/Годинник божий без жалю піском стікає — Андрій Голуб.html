<div class="wrap">
 <div class="page-title">
  <h1>Годинник божий без жалю піском стікає...</h1>
  <h2>Андрій Голуб</h2>
 </div>
 <div class="prose" id="content">
 Годинник божий без жалю піском стікає.<br />
Піщинка до піщинки, крок за кроком.<br />
Збиваються в століття й ери, рік за роком .<br />
Пташиним клином пролітають дні і ночі.<br />
І тільки не підвладні часу плину,<br />
Твої оливково-зелені очі.
 </div>
