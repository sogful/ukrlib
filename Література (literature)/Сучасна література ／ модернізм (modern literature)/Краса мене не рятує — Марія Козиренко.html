<body>
<div class="wrap">
 <div class="page-title">
  <h1>Краса мене не рятує...</h1>
  <h2>Марія Козиренко</h2>
 </div>
 <div class="prose" id="content">
 Краса мене не рятує,<br />
Співчуття і час не лікують рани,<br />
Мармурові плити здаються теплішими,<br />
Ніж погляд дзеркала.<br />
Час зав'язується у вузол,<br />
І я бачу, як тече скло<br />
І ростуть гори.<br />
Беру пір'їну і йду на край світу —<br />
Лоскотати Атланта.
 </div>
