 <div class="page-title">
  <h1>Diabel</h1>
  <h2>Олеся Лященко</h2>
 </div>
 <div class="prose" id="content">
 Diabel<a href="#_ftn1" target="_blank">[1]</a> на сонці – ніжний.<br />
Очі – дві сині скриньки.<br />
В них літо сухе і пізнє<br />
Поклало свою дитинку.<br />
&nbsp;<br />
Diabel на сонці – в танець,<br />
На лапках по дрібці пуху.<br />
Це літо свої ікебани<br />
Продасть за його туфлі.<br />
<br><br />
<br><br />
<br><br />
<a href="#_ftnref1" target="_blank">[1]</a>&nbsp;по-пол. чорт
 </div>
