<body>
<div class="wrap">
 <div class="page-title">
  <h1>Батьківщина</h1>
  <h2>Валентина Харченко</h2>
 </div>
 <div class="prose" id="content">
 Рідний край — це моя Батьківщина,<br />
Рідний край — це луга і поля!<br />
Рідний край — це маленька пташина,<br />
Рідний край — це родина моя!<br />
Все знайоме і рідне до болю,<br />
Де не глянь і куди не піди:<br />
І калина, і стара тополя,<br />
Що як матір все кличе сюди!
 </div>
