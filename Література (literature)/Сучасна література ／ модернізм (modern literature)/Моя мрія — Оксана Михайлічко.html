<body>
<div class="wrap">
 <div class="page-title">
  <h1>Моя мрія</h1>
  <h2>Оксана Михайлічко</h2>
 </div>
 <div class="prose" id="content">
 Хочу бути для тебе криницею,<br />
Кристально чистою водицею,<br />
Зеленою ялинкою,<br />
Гарною українкою,<br />
Калинкою,що цвіте при дорозі,<br />
Бузком,що чарує при дорозі,<br />
Радістю і смутком,<br />
Важливим в житті здобутком,<br />
Другом і коханою,<br />
І завжди жаданою!<br />
<br>
 </div>
