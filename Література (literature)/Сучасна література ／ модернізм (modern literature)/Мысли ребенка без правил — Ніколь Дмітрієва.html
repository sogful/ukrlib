<title>Мысли ребенка без правил</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мысли ребенка без правил</h1>
  <h2>Ніколь Дмітрієва</h2>
 </div>
 <div class="prose" id="content">
 Мысли ребенка<br />
Без правил, без рамок,<br />
Нет в них следов<br />
Прожитых дней.<br />
В мыслях ребенка<br />
Лишь радость сияет,<br />
Сверкает Душа<br />
Вечная в них.
 </div>
</div>
