<body>
<div class="wrap">
 <div class="page-title">
  <h1>Розрізане небо</h1>
  <h2>Юрій Гундарів</h2>
 </div>
 <div class="prose" id="content">
 У жовтневу ніч безжальну<br />
небо різали "кинджали".<br />
&nbsp;<br />
А на ранок —<br />
небо в ранах,<br />
що від ночі<br />
кровоточать…<br />
&nbsp;<br />
А тепер птахи-кравці<br />
зашивають рани ці.<br />
&nbsp;<br />
Лиш на серці нам на спомин<br />
додаються зайві коми.
 </div>
</div>
