<body>
<div class="wrap">
 <div class="page-title">
  <h1>Гоп!</h1>
  <h2>Станіслав Яценко</h2>
 </div>
 <div class="prose" id="content">
 Ми кмітливі й сміливі,<br />
Круті, мов окроп!<br />
Ми живемо стрибками,<br />
Ми кажемо — "Гоп!"<br />
&nbsp;<br />
Ми підстрибуєм вгору,<br />
А далі — як буде...<br />
Нестримане "Гоп!"<br />
Луна звідусюди.<br />
&nbsp;<br />
А люди... Що, люди?...<br />
Ну, люди сміються...<br />
І кажуть: "То хлопці,<br />
Такі, як нап'ються."
 </div>
