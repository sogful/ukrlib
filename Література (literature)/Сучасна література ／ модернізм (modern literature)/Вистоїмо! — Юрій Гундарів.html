<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вистоїмо!</h1>
  <h2>Юрій Гундарів</h2>
 </div>
 <div class="prose" id="content">
 Попри стійкість нашу й страждання<br />
скоротив майже всю допомогу —<br />
від техніки до розвідданих.<br />
Надія тепер лиш на Бога…<br />
<br />
Щодо "гарантій" жити у мирі<br />
стверджуємо воістину:<br />
нам не бути мішенню в тирі —<br />
вистоїмо!
 </div>
</div>
