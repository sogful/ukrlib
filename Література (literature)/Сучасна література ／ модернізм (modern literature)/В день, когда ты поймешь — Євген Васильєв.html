 <div class="page-title">
  <h1>В день, когда ты поймешь</h1>
  <h2>Євген Васильєв</h2>
 </div>
 <div class="prose" id="content">
 В день, когда ты поймешь,<br />
Кого потеряла,<br />
В день, когда ты захочешь<br />
Начать все сначала,<br />
Я скажу тебе лишь одно:<br />
"Подумай, как много смогло изменить<br />
Одно твоё слово, что мне не забыть".<br />
<br />
2002.
