 <div class="page-title">
  <h1>Do it ( джазовий дует)</h1>
  <h2>Олеся Лященко</h2>
 </div>
 <div class="prose" id="content">
 Грек – він на сцені і музика Африки.<br />
Бог&nbsp;африканський прийшов подивитися.<br />
Небо блакитними вкрилося кахлями.<br />
Сонце – велике.<br />
&nbsp;<br />
Грек – він на сцені один між тромбонами.<br />
Із розумінням і очі напружені.<br />
Знехтував бог африканський законами –<br />
Заздрив.
 </div>
