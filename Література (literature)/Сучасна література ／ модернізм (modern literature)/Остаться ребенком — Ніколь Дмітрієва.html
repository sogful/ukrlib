<title>Остаться ребенком</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Остаться ребенком</h1>
  <h2>Ніколь Дмітрієва</h2>
 </div>
 <div class="prose" id="content">
 Остаться ребенком,<br />
Или им стать —<br />
Задача поставлена нам.<br />
Душу вечную отражать<br />
И расти к ней.<br />
Расти и, сияние радости<br />
В глазах сохраняя,<br />
Открыть чувство<br />
Стремления к вечной Душе...<br />
Стремление ребенка,<br />
Что тянет и тянет<br />
К себе!
 </div>
</div>
