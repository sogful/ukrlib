<body>
<div class="wrap">
 <div class="page-title">
  <h1>Пшениця</h1>
  <h2>Валентина Харченко</h2>
 </div>
 <div class="prose" id="content">
 Я іду по полю по широкім полю,<br />
А кругом пшениця колос підійма.<br />
Ой моя пшениця, золота пшениця<br />
Рідна Україна, рідна сторона!<br />
<br />
На току дівчата старанно працюють,<br />
І співають пісні про свій рідний край.<br />
Комбайнере любий, комбайнере милий,<br />
Убирай пшеницю, золото вбирай!
 </div>
</div>
