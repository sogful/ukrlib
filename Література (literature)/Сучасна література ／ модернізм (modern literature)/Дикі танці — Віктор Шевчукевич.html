<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дикі танці</h1>
  <h2>Віктор Шевчукевич</h2>
 </div>
 <div class="prose" id="content">
 Дикі танці,<br />
Тиха зала,<br />
Мої, твої,<br />
Всі ми в справі.<br />
<br />
Очі зустрічаються,<br />
Серце б'ється,<br />
В пошуку запаху,<br />
Що нас зв'яже.<br />
<br />
Згідно з римою,<br />
Молодший Рим,<br />
Гуляємо разом,<br />
Тільки ти і я, ми.<br />
<br />
Зустрінеш ти,<br />
Палка, сміла,<br />
Безстрашна в думках,<br />
Моя ти мрія.
 </div>
