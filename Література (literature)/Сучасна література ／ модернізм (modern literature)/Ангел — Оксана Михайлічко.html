<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ангел</h1>
  <h2>Оксана Михайлічко</h2>
 </div>
 <div class="prose" id="content">
 Де мій ангел синьоокий,<br />
Що приносить мені спокій?<br />
Ти навчив мене любити –<br />
Зелений чай з жасмином пити.<br />
<br>
