<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сказане тобою</h1>
  <h2>Віктор Шевчукевич</h2>
 </div>
 <div class="prose" id="content">
 Серцем сказала ти:<br />
Порозуміємось ми.<br />
Зустрівши один,<br />
В сумнівній одежі,<br />
Місто колихавши,<br />
Проклинаючи словом батьківським.<br />
<br />
Безтурботний сон,<br />
Вгамувати себе<br />
Пурпурним парфюмом.<br />
Споглядавши оком,<br />
Дороги фонарі,<br />
Поринаючи в сторінки<br />
Твої марні,<br />
Спокуси згаслі.
 </div>
