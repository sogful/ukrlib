<body>
<div class="wrap">
 <div class="page-title">
  <h1>Краплинка щастя</h1>
  <h2>Оксана Михайлічко</h2>
 </div>
 <div class="prose" id="content">
 Побудь зі мною ще хвилинку!<br />
Я дам тобі щастя краплинку!<br />
Нічого не буду питати,<br />
Кохати і ще раз кохати,<br />
А потім в небо злітати –<br />
Для&nbsp;тебе зірочкою стати!<br />
<br>
 </div>
