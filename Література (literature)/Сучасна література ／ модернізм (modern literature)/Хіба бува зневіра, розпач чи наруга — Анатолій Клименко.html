<div class="wrap">
 <div class="page-title">
  <h1>Хіба бува зневіра, розпач чи наруга...</h1>
  <h2>Анатолій Клименко</h2>
 </div>
 <div class="prose" id="content">
 Хіба бува зневіра, розпач чи наруга,<br />
Хіба буває щось в житті нестерпно зле,<br />
Коли у душах двох звучить одна потуга,<br />
І в грудях серця два вже б'ється як одне!<br />
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;21.12.2023
 </div>
