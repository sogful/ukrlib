<div class="wrap">
 <div class="page-title">
  <h1>Жінка-море</h1>
  <h2>Оксана Михайлічко</h2>
 </div>
 <div class="prose" id="content">
 Я&nbsp;жінка-море:<br />
Буваю різна –<br />
Часами лагіда та ніжна,<br />
А інколи, – яка ж неспокійна!<br />
Але так хочу в одночас<br />
Для Тебе бути<br />
Сильна і покірна......<br />
<br>
