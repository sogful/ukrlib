<body>
<div class="wrap">
 <div class="page-title">
  <h1>З найтеплішим Святом...</h1>
  <h2>Анатолій Клименко</h2>
 </div>
 <div class="prose" id="content">
 З найтеплішим Святом<br />
у морозні дні!<br />
Хай пощезне лихо<br />
на усій землі!<br />
Хай зігріє серце<br />
усмішка твоя!<br />
Хай не змовкне в травні<br />
пісня солов'я!<br />
<br><br />
<em>25.12.2025</em>
