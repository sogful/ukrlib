<div class="wrap">
 <div class="page-title">
  <h1>Чому тиша породжує шепіт...</h1>
  <h2>Анатолій Клименко</h2>
 </div>
 <div class="prose" id="content">
 Чому тиша породжує шепіт,<br />
Чому шепіт народжує сни?<br />
І ключа журавлиного клекіт<br />
нам дарує привіти весни.<br />
<br />
Коли в серці розтануть тривоги,<br />
І сніги перейдуть в ручаї, —<br />
Я твої із своїми дороги<br />
Перетну на останній межі..<br />
<br />
<em>13.01.2026</em>
 </div>
</div>
