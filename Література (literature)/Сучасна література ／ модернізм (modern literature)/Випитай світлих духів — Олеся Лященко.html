<body>
<div class="wrap">
 <div class="page-title">
  <h1>Випитай світлих духів...</h1>
  <h2>Олеся Лященко</h2>
 </div>
 <div class="prose" id="content">
 Випитай світлих духів<br />
З нашого племені –<br />
Вони сплетуть тобі човен<br />
З мого волосся.<br />
Куди пливтимеш?<br />
Тільки не в гори –<br />
Мені боляче об каміння.
 </div>
