 <div class="page-title">
  <h1>Біль і радість народжують...</h1>
  <h2>Анатолій Клименко</h2>
 </div>
 <div class="prose" id="content">
 Біль і радість народжують<br />
віру в добро<br />
в те живе що<br />
цвіте й не вмирає<br />
те що пагінцем в полі<br />
крізь бурі і грім<br />
спілим колосом<br />
в нас виростає<br />
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;01.03.2025
 </div>
