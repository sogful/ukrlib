 <div class="page-title">
  <h1>3,14159 26535 897 93238</h1>
  <h2>Віталій Гречка</h2>
 </div>
 <div class="prose" id="content">
 Хто ж мені, у злеті поетичнім,<br />
Ту задачу хитру, про число,<br />
Розповів, розсіявши довічні<br />
Відкриття, щоб ум мій пройняло?!<br />
&nbsp;<br />
<em>Коментар — число ПІ і кількість букв у словах</em>
