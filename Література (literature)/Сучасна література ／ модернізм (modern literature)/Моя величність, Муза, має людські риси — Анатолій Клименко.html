</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Моя величність, Муза, має людські риси...</h1>
  <h2>Анатолій Клименко</h2>
 </div>
 <div class="prose" id="content">
 Моя величність, Муза, має людські риси.<br />
Вона із плоті, серця і крові.<br />
Із спільних рис одна іще примітна –<br />
Ми разом ходим по одій і тій землі.
 </div>
</div>
