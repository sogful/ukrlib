<body>
<div class="wrap">
 <div class="page-title">
  <h1>Янгол</h1>
  <h2>Тетяна Булат</h2>
 </div>
 <div class="prose" id="content">
 Вже рік ти — Янгол! Безкінечний рік!<br />
Ні голова, ні серце не сприймає.<br />
Як рано відлетіла, ще ж не вік...<br />
Але страшна хвороба не питає.<br />
&nbsp;<br />
Я не наобіймалася тебе,<br />
"Люблю" я сотні раз не досказала.<br />
Цей біль в житті ніколи не мине...<br />
Ти Янголом небесним нашим стала...
 </div>
