 <div class="page-title">
  <h1>Ніч</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Ніч.<br />
Ніч.<br />
Ніч.<br />
Стукотить у скронях.<br />
Порожньо в долонях.<br />
В серці — ще сумніш.<br />
В очах<br />
Жах.<br />
Ніч. Ніч. Ніч.
