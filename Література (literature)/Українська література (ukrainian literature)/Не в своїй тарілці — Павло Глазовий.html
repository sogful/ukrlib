<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не в своїй тарілці</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Прибув Сава до Києва<br />
З дружиною в парі.<br />
Продавали сало, м'ясо,<br />
Яйця на базарі.<br />
З покупцями торгувались,<br />
З людьми говорили.<br />
Потім пішли Хрещатиком<br />
На Дніпрові схили.<br />
А як звідти повертались,<br />
Мовив Сава жінці:<br />
— Давай "чтокать",<br />
бо невдобно,<br />
Що ми українці.
 </div>
