<title>Звірі на ялинці</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Звірі на ялинці</h1>
  <h2>Віктор Терен</h2>
 </div>
 <div class="prose" id="content">
 Ой, які суворі<br />
звірі паперові!<br />
<br />
Водять їх на ниточках навколо<br />
ялинки<br />
сміливі снігурки в білих пеле-<br />
ринках.<br />
<br />
Надто ті вовчиська!<br />
Он їх ціла низка!<br />
<br />
Топчуться, гуляють,<br />
На ліс поглядають.
 </div>
</div>
