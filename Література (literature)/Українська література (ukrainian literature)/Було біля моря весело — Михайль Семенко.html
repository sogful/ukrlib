<div class="wrap">
 <div class="page-title">
  <h1>Було біля моря весело</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Було біля моря весело,<br />
Цокотіли камінці.<br />
Так легко гнулись весла<br />
У міцній руці.<br /><br />
Дратись на скелю струмлену<br />
У вогкий чагарн&#8217;ик.<br />
Вдивлятись у даль отруєну,<br />
Де острів зник.<br /><br />
Почуватись маленьким хлопчиком,<br />
Бігать, радість, мов у сні.<br />
Жити б так і ночі і<br />
Дні!
 </div>
