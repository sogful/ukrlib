<div class="wrap">
 <div class="page-title">
  <h1>Столітні велетні-дуби...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Столітні велетні-дуби,<br />
Бувало, в бурю і негоду<br />
Шумлять, дивуючи природу,<br />
І ждуть з піснями боротьби.<br />
<br />
Зламав їх вік... Ростуть малі...<br />
І тільки вітер пронесеться,<br />
Вже ліс і труситься, і гнеться,<br />
І просить ласки на землі.
 </div>
