<body>
<div class="wrap">
 <div class="page-title">
  <h1>Устами славлена…</h1>
  <h2>Оксана Лятуринська</h2>
 </div>
 <div class="prose" id="content">
 Устами славлена<br />
стріла стужавлена.<br />
Хвалена, хвалена,<br />
в отруті калена!<br />
Стріла окрилена,<br />
стріла доцілена.<br />
Кров’ю гартована<br />
стріла значкована.
 </div>
</div>
