<body>
<div class="wrap">
 <div class="page-title">
  <h1>Удвох би йти — не одинцем...</h1>
  <h2>Володимир Біляїв</h2>
 </div>
 <div class="prose" id="content">
 Удвох би йти — не одинцем,<br />
Рука в руці у ранній присмерк,<br />
Із опроміненим лицем<br />
І на устах цілунків присмак.<br /><br />
Та доля нарекла іти<br />
Самому без сльози на оці.<br />
Потойбіч — смуток самоти<br />
Й не веселіше по цім боці…
 </div>
</div>
