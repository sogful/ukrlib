<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ідоли</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Мої неіснуючі ідоли<br />
Образи моїх мрій<br />
Як комічно ми снідали<br />
Який чудний на вас стрій<br /><br />
Ви назвали острів<br />
Шукав не знайшов на мапі<br />
Який сміх гострий<br />
При нічній лампі!
 </div>
</div>
