 <div class="page-title">
  <h1>Покличем на печаль і тугу...</h1>
  <h2>Олекса Слісаренко</h2>
 </div>
 <div class="prose" id="content">
 <blockquote>Пам'яті Гната Михайличенка</blockquote><br />
Покличем на печаль і тугу!<br />
Наш брат огнеокий догорів.<br />
На дороги повіяло з лугу<br />
Тінями диких вечорів.<br />
<br />
Над бур'янами сухими<br />
Наша печаль стогне.<br />
Гукнімо з вечорами глухими:<br />
"Воскресни, Огне!"
