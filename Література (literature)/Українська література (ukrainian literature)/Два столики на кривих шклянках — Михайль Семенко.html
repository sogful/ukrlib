 <div class="page-title">
  <h1>Два столики на кривих шклянках...</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Два столики на кривих шклянках,<br />
кави не більше двох—<br />
стьобнули ледве-живого,<br />
щоб не думав про дах<br />
і льох.<br />
<br />
Я тут без інструментів —<br />
легко кишені тримать вікні —<br />
і папироси 25 штук "Рента"<br />
і сумно, сумно мені.<br />
<br />
18-II&ndash;920. Київ.
 </div>
