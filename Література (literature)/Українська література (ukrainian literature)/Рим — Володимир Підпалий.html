<body>
<div class="wrap">
 <div class="page-title">
  <h1>Рим</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Видовиська влаштовуються в Римі<br />
у свята й будень.<br />
Тисячі зівак<br />
справляють лицедійство в пишнім гримі,<br />
тамуючи під серцем переляк,<br />
що нависає грізно тінь Спартача<br />
з десницею караючою&#8230;<br />
Вже<br />
видовиська нічого більше не значать,<br />
від помсти Рим ніщо не вбереже&#8230;
 </div>
</div>
