<div class="wrap">
 <div class="page-title">
  <h1>Харя</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Баба сердиться на внука:<br />
— Таке оглашенне...<br />
Харя, чуєш? Повернися!<br />
Харя, йди до мене!<br />
Біля баби зупинився<br />
Молодий мужчина:<br />
— Що за слово?<br />
Що за харя?<br />
Це ж мала дитина!<br />
Баба з місця підхопилась:<br />
— Причепився даром!<br />
Я ж не винна, що дитину<br />
Названо Ерхаром!
 </div>
