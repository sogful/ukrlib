<div class="wrap">
 <div class="page-title">
  <h1>Над затокою</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 В прозорім дзеркалі затоки<br />
зелені щуки, як тички;<br />
і не мілка і не глибока<br />
отут місцина...<br />
А ярки,<br />
немов стежки, ведуть до броду,<br />
де таволожник —<br />
оддалік,<br />
лякають щук, колотять воду —<br />
не день, не два, не рік, не вік...<br />
1968
