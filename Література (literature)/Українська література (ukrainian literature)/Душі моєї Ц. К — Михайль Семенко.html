<div class="wrap">
 <div class="page-title">
  <h1>Душі моєї Ц. К...</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Душі моєї Ц. К.<br />
І Патагонії далека мрія<br />
І на серці чиясь рука<br />
Мов пісок гарячий гріє.<br />
<br />
Делегати усіх згадок<br />
І пронизлий минулого спів.<br />
Треба забуть Владивосток<br />
І через'азійний гнів.<br />
<br />
18-II-920. Київ.
 </div>
