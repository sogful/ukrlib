<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ви, тату, витали...</h1>
  <h2>Богдан Жолдак</h2>
 </div>
 <div class="prose" id="content">
 * * *<br />
<br />
Ви, тату, витали<br />
а я в тюрмі пойнявся смугами<br />
крізь таке ж вікно глупоти<br />
ви, тату, знали ідеали<br />
я не трапив і взяв голку<br />
вмочив спозаранку<br />
на грудях витатуював вишиванку
 </div>
