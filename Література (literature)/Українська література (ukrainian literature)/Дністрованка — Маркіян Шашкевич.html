<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дністрованка</h1>
  <h2>Маркіян Шашкевич</h2>
 </div>
 <div class="prose" id="content">
 Марусенька мила<br />
Цвіточки садила,<br />
Водов підливала,<br />
Стихонька співала:<br />
"Ростіть ми, цвіточки,<br />
Райськії діточки;<br />
Ростіть ми весною,<br />
Розвиньтесь красою,<br />
Літом ми зацвійте,<br />
Головку пристрійте<br />
Мені молоденькій,<br />
Строїтись радненькій!"
 </div>
</div>
