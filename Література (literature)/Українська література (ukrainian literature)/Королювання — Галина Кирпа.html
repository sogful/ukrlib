<body>
<div class="wrap">
 <div class="page-title">
  <h1>Королювання</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Посеред неба сонце королює.<br />
Посеред лугу — його брат горицвіт.<br />
Ізранку день пейзажі помалює,<br />
до вечора вони, гляди, і вицвітуть.<br /><br />
А вечір, як прилине, то надворі<br />
простеле в небі темне полотно, —<br />
Тоді закоролюють уже зорі!<br />
Ану поглянь, хто хоче, у вікно!
 </div>
