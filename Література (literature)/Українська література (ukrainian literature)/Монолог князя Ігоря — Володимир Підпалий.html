<div class="wrap">
 <div class="page-title">
  <h1>Монолог князя Ігоря</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 <em>В. Яриничу</em><br /><br />
Разом вперше чи востаннє ми,<br />
що за шеломянем &#8211; невідомо:<br />
Дон чи галич з чорними крильми,<br />
що заждалися на мене довго?..<br /><br />
Змий вологим поглядом своїм<br />
ти мене із пам&#8217;яті своєї&#8230;<br />
Важко розумітися земним,<br />
зрозумівши там себе &#8211; землею&#8230;
 </div>
