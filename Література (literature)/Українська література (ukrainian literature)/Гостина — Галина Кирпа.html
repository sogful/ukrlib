<div class="wrap">
 <div class="page-title">
  <h1>Гостина</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Почалась, було, гостина:<br />
слива сливками вгостила,<br />
яблук яблунька дала,<br />
груша — грушок простягла.<br />
Лиш бурчав старезний пень:<br />
— Ну й морока! Що не день —<br />
хтось приходить гостювать:<br />
і по двоє, і по п'ять.<br />
Йдуть до мене, як до хати, —<br />
чим усіх їх пригощати?!
 </div>
