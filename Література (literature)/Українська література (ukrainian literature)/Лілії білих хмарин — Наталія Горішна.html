<body>
<div class="wrap">
 <div class="page-title">
  <h1>Лілії білих хмарин</h1>
  <h2>Наталія Горішна</h2>
 </div>
 <div class="prose" id="content">
 Лілії білих хмарин<br />
Повідцвітали.<br />
Чорними грудами спин<br />
Горбляться хмари.<br />
Осінь дісталась вершин<br />
Знагла, зухвало.<br />
Лілії білих хмарин –<br />
До п'єдесталу.<br />
Небо, немов крепдешин,<br />
Блякне розцвітка.<br />
Осене, не залиши<br />
Небо без квітки!
 </div>
