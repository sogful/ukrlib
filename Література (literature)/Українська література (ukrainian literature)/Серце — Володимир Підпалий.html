<div class="wrap">
 <div class="page-title">
  <h1>Серце</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Для золотого, доброго засіву<br />
я відберу зернятко до зерняти.<br />
Як прийдуть сходи – буду я щасливий,<br />
а в поосіння – буду я багатий!<br />
І не біда, що біль чи смуток серця<br />
почується у вірші а чи слові:<br />
якщо життям прийдешнім серце б’ється –<br />
воно й болить з великої любові!..<br />
<br />
1960
 </div>
