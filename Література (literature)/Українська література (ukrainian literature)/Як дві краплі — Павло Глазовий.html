<body>
<div class="wrap">
 <div class="page-title">
  <h1>Як дві краплі</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 В зоопарку кажуть бабці<br />
Веселі внучата:<br />
— Ота мавпа дуже схожа<br />
На нашого тата.<br />
— Не балакайте такого,<br />
Бо буде вам лихо!<br />
— Але ж мавпа не почула,<br />
Ми казали тихо...
