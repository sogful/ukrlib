<body>
<div class="wrap">
 <div class="page-title">
  <h1>Скажи мені, любий</h1>
  <h2>Леся Українка</h2>
 </div>
 <div class="prose" id="content">
 Скажи мені, любий, куди мої сльози поділись?<br />
Чи то вони всі вже, мов літні дощі, розточились?<br />
Чи, може, вони розійшлися в осіннім тумані<br />
І висять тепер надо мною, мов хмари важкі, нерухмані?
 </div>
</div>
