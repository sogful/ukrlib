<body>
<div class="wrap">
 <div class="page-title">
  <h1>Звернення</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 До вас, мої рідні, звертаюся я —<br />
Найменший у нашій сім'ї:<br />
<br />
Стоїть на узліссі ялинка моя —<br />
Не зрубайте її!<br />
<br />
На озері плаває пташка моя —<br />
Не убийте її!<br />
<br />
Яскріє на небі зірка моя —<br />
Не згасіте її!<br />
<br />
Світ-казку будує мрія моя —<br />
Не спиняйте її!
 </div>
</div>
