<div class="wrap">
 <div class="page-title">
  <h1>Блискавка</h1>
  <h2>Ігор Калинець</h2>
 </div>
 <div class="prose" id="content">
 Живе собі королева —<br />
королева темряви.<br />
Кортить їй зазирнути<br />
у дзеркало —<br />
а темно.<br />
Зблисне<br />
на мить світлом —<br />
зазирне:<br />
<br />
Хто на світі найгарніший<br />
<br />
— Ви, Ваша темність,—<br />
відкаже дзеркало<br />
похапцем.<br />
<br />
Заспокоїться королева<br />
на часину.<br />
<br />
Сказано, писана красуня.
 </div>
