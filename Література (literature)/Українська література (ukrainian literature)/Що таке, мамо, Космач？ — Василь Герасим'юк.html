  <h1>Що таке, мамо, Космач?..</h1>
  <h2>Василь Герасим'юк</h2>
 </div>
 <div class="prose" id="content">
 – Що таке, мамо, Космач?<br />
Скільки присілків у нього?<br />
– Сину, це материн плач.<br />
В неї немає нікого.<br />
<br />
– Хто його, мамо, зіткав?<br />
Звідки воскОвії плити?<br />
– Сину, це з жовтих отав.<br />
Бог не велів їх косити.
 </div>
