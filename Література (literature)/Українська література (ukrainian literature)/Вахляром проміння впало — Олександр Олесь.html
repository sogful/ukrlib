<div class="wrap">
 <div class="page-title">
  <h1>Вахляром проміння впало...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Вахляром [1] проміння впало,<br />
Сріблом хвилі облило.<br />
Дужче море заспівало,<br />
На скрипках, басах заграло,<br />
Густо в бубни загуло.<br />
<br />
В шумі білому біліє,<br />
Мов вишневий сад цвіте,<br />
А над морем вітер віє,<br />
Хвилі крилами леліє<br />
І на берег цвіт мете.<br />
<br />
[1] Вахляр — віяло
 </div>
