<body>
<div class="wrap">
 <div class="page-title">
  <h1>У саду</h1>
  <h2>Микола Матола</h2>
 </div>
 <div class="prose" id="content">
 У саду на пишній сливі<br />
Трійко милих пташенят.<br />
День у день шпаки щасливі<br />
Підгодовують малят.<br />
Іванко поодаль стане,<br />
Щоб шпаків не налякать,<br />
І про шпакову родину<br />
Все розкаже малюкам.
 </div>
</div>
