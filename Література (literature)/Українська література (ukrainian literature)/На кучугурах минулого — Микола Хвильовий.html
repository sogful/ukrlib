<div class="wrap">
 <div class="page-title">
  <h1>На кучугурах минулого...</h1>
  <h2>Микола Хвильовий</h2>
 </div>
 <div class="prose" id="content">
 На кучугурах минулого<br />
Повстав спогад — сонячний промінь,<br />
Задзвенів крик у повітрі фістулою,<br />
І похмурились золоті брови.<br />
<br />
То не крики я чую, а зойк…<br />
Ах, лани, зблідлі до смерті!<br />
Серце плигає раненою козою,—<br />
Осінь.
 </div>
