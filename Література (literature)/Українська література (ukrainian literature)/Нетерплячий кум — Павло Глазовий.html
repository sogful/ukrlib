<div class="wrap">
 <div class="page-title">
  <h1>Нетерплячий кум</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Кум гостює у кумасі:<br />
— Як ся маєш, пташко?<br />
— Пригостила б тебе, Васю —<br />
З продуктами важко.<br />
"Борщ та каша — їжа наша"<br />
Кажуть у народі.<br />
А на третє, то хоч себе<br />
Подавай та й годі.<br /><br />
Ця заява кумасина<br />
Зворушила Васю:<br />
— Давай тоді із третього<br />
Почнемо, кумасю.
