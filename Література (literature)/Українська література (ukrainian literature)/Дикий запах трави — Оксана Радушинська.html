<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дикий запах трави</h1>
  <h2>Оксана Радушинська</h2>
 </div>
 <div class="prose" id="content">
 Дикий запах трави<br />
На хрестинах у травня<br />
Толочили всю ніч<br />
Босі ноги дощів…<br />
По калюжах слідів<br />
Промінь сонячний зрання,<br />
Вкравши щастя, як гріш,<br />
Аж у осінь побрів.
 </div>
