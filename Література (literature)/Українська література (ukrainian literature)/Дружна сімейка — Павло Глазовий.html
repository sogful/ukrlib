<div class="wrap">
 <div class="page-title">
  <h1>Дружна сімейка</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 — Моя лапко, моя квітко,<br />
Лебідонько біла!<br />
Я так хочу, щоб ти близько<br />
Біля мене сіла!<br />
Погладь мені голівоньку<br />
Моя манюпулька.<br />
Вона гладить і питає:<br />
— А що це за Гулька?<br />
— Це ж ти вчора, моя лапко,<br />
Голубонько мила,<br />
Мені гульку, п'яненькому,<br />
Шваброю набила.
 </div>
