<body>
<div class="wrap">
 <div class="page-title">
  <h1>Котик і слон</h1>
  <h2>Григорій Фалькович</h2>
 </div>
 <div class="prose" id="content">
 Котик спав і бачив сон,<br />
Що не котик він, а слон,<br />
І що він, із вишини,<br />
Бачить все, немов слони:<br />
Крокодилів, слоненят,<br />
Левенят, буйволенят...<br />
<br />
А коти? Коти – дрібнота!<br />
Придивлятись неохота...
 </div>
</div>
