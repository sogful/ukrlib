<body>
<div class="wrap">
 <div class="page-title">
  <h1>Видатний</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 Життя вирує і цвіте,<br />
Коли уважно глянуть збоку.<br />
Марина знає, що і де<br />
І хто на кого кинув оком.<br />
І з хвилюванням в глибині<br />
Доводить стрімко й нелукаво:<br />
— Я не пліткарка... що ви! Ні...<br />
Я видатний бойфрендознавець.
 </div>
</div>
