<div class="wrap">
 <div class="page-title">
  <h1>Ти волі шукаєш – не треба волі...</h1>
  <h2>Кость Котко</h2>
 </div>
 <div class="prose" id="content">
 Ти волі шукаєш – не треба волі,<br />
Краще кайдани й тюрми-льохи:<br />
В життєвім полі<br />
Зорано вільні шляхи,<br />
Нікуди йти.<br />
<br />
І не вернеш ніколи<br />
Своєї путі.<br />
Волі не знайдеш, шляхів не шукай.<br />
Уночі<br />
Не ридай,<br />
Краще мовчи.<br />
<br />
Збився з дороги – вмирай!
 </div>
