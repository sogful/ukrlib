<div class="wrap">
 <div class="page-title">
  <h1>Рейд</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Бухта в тумані, не видно хмар і сопок.<br />
Вриваєсь тільки гамір, стогне рейд.<br />
Світ таке безмір'я, а я — я ніби зломок,<br />
Кавалок крейди.
 </div>
