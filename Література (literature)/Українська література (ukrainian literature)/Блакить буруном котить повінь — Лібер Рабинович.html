<body>
<div class="wrap">
 <div class="page-title">
  <h1>Блакить буруном котить повінь...</h1>
  <h2>Лібер Рабинович</h2>
 </div>
 <div class="prose" id="content">
 Блакить буруном котить повінь,<br />
Тону я цяткою у ній.<br />
Навколо зоряні вогні;<br />
Блакить буруном котить повінь.<br />
<br />
Пташині, гімни голосні<br />
Лунають десь у далині.<br />
Блакить буруном котить повінь.<br />
Тону я цяткою у ній.
 </div>
</div>
