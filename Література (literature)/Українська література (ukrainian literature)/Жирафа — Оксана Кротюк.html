<body>
<div class="wrap">
 <div class="page-title">
  <h1>Жирафа</h1>
  <h2>Оксана Кротюк</h2>
 </div>
 <div class="prose" id="content">
 Навіщо жирафі сукенка барвиста?<br />
Навіщо їй дев'ять разочків намиста?<br />
А туфлі вечірні на тонких підборах? —<br />
У них не побігаєш спритно і скоро.<br />
Чому ж це жирафа так пишно убралась?<br />
Тому що в театр жирафа зібралась.
 </div>
