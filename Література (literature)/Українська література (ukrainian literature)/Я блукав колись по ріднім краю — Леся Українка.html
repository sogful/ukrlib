<body>
<div class="wrap">
 <div class="page-title">
  <h1>Я блукав колись по ріднім краю</h1>
  <h2>Леся Українка</h2>
 </div>
 <div class="prose" id="content">
 Я блукав колись по ріднім краю<br />
Раю.<br />
І шукав на сім земнім надолі<br />
Долі.<br />
Приблудився під стріхату<br />
Хату.<br />
Там дівчину стрів я винозірку<br />
Зірку.<br />
Промінь ясний ті дівочі<br />
Очі.<br />
Подала мені пом&#8217;яту<br />
М&#8217;яту.<br />
І на тій моїй пригоді<br />
Годі.
 </div>
