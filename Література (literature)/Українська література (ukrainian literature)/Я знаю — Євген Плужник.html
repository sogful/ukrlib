<body>
<div class="wrap">
 <div class="page-title">
  <h1>Я знаю</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Я знаю:<br />
Перекують на рала мечі.<br />
І буде родюча земля —<br />
Не ця.<br />
І будуть одні ключі<br />
Одмикати усі серця.<br /><br />
Я знаю! І буде так:<br />
Пшеницями зійде кров,<br />
І пізнають, яка на смак<br />
Любов.<br /><br />
Вірю.
 </div>
</div>
