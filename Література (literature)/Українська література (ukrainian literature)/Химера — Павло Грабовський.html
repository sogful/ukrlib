<div class="wrap">
 <div class="page-title">
  <h1>Химера</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 На хвилю б тільки збутись туги,<br />
З неволі виглянуть на світ,<br />
Спинить тяжке чуття недуги,<br />
Украйні кинути привіт!<br />
<br />
Як гірко трупом почуватись,<br />
Безслідним полум’ям згоріть,<br />
До жизні-праці марно рватись,<br />
Душі коханої не здріть!
 </div>
