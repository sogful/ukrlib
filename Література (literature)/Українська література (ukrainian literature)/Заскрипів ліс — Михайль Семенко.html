<body>
<div class="wrap">
 <div class="page-title">
  <h1>Заскрипів ліс</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 З ранку повіяло вітром з півночі —<br />
Замело.<br />
Спить село<br />
В лінощах.<br /><br />
Застогнав зашумів заскрипів ліс<br />
Темною нічкою<br />
Шумить нід річкою<br />
Верболіз.
 </div>
</div>
