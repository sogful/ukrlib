<title>Знов зустріну тебе в трамваї...</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Знов зустріну тебе в трамваї...</h1>
  <h2>Наталя Лівицька-Холодна</h2>
 </div>
 <div class="prose" id="content">
 Знов зустріну тебе в трамваї,<br />
Чи побачу в театрі знов,<br />
І злетиться споминів зграя,<br />
І заграє татарська кров.<br />
<br />
Кинеш знов лиш один, звитяжний,<br />
Погляд гострих очей своїх,<br />
І безкрила душа відважно<br />
Вип’є знов, як отруту, гріх.
 </div>
</div>
