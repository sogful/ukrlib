<body>
<div class="wrap">
 <div class="page-title">
  <h1>У білому світі у синьому небі...</h1>
  <h2>Наталія Грегуль</h2>
 </div>
 <div class="prose" id="content">
 У білому світі у синьому небі<br />
І сонце і хмари ясна височінь<br />
Просіяв хтось зорі крізь сито рожеве,<br />
Збирай у долоні, милуйся, радій.
 </div>
