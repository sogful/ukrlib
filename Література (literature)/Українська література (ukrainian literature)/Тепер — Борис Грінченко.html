 <div class="page-title">
  <h1>Тепер</h1>
  <h2>Борис Грінченко</h2>
 </div>
 <div class="prose" id="content">
 Не тоді нам у полі до бою ставать,<br />
Як вже сонце і сяє, і гріє,<br />
І як співи пташині в повітрі летять,<br />
Усміхаються дні золотії!<br />
<br />
Не тоді! Не тоді! Як лютують вітри<br />
І скрізь ніч, всюди хмари похмурі,—<br />
Ти тоді уставай, свою зброю бери<br />
І борись серед темряви й бурі!..<br />
<br />
1885
 </div>
