<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мамине свято</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 Восьме березня настало –<br />
Славне свято всіх жінок,<br />
І сьогодні ми позвали<br />
Наших мам у дитсадок.<br /><br />
Кожній мамі подарунки<br />
Готували малюки,<br />
Малювали їм малюнки<br />
Вишивали килимки.<br /><br />
Ще й прикрашений квітками<br />
Написали їм плакат:<br />
"Хай живуть хороші мами<br />
Всіх дівчаток і хлоп'ят!"
 </div>
