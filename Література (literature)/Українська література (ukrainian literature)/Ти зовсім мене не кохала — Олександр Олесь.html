<div class="wrap">
 <div class="page-title">
  <h1>Ти зовсім мене не кохала</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Ти зовсім мене не кохала,<br />
А я був повинен забуть…<br />
Чого ж ти так тяжко зітхала<br />
В той час, як збирався я в путь?..<br />
Чого твої руки тремтіли,<br />
Чого ти тремтіла уся?!<br />
І роки уже пролетіли,<br />
А й досі не знаю ще я.
 </div>
