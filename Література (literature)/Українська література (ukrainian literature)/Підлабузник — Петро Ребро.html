<body>
<div class="wrap">
 <div class="page-title">
  <h1>Підлабузник</h1>
  <h2>Петро Ребро</h2>
 </div>
 <div class="prose" id="content">
 Він тут спокійно буде спать,<br />
Щасливий думкою одною:<br />
Зав — особисто! — метрів п'ять<br />
Ішов у нього<br />
за труною!
