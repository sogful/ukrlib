<div class="wrap">
 <div class="page-title">
  <h1>Добра натура</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 Грає скрипка, грає кобза<br />
І бандура грає;<br />
Чумак літом у кожусі<br />
Гопки витинає.<br /><br />
Витинає чумак гопки,<br />
Аж потом заллявся…<br />
"Та скинь-бо ти кожух, брате!"<br />
Якийсь обізвався.<br /><br />
"Ні, не скину! — чумак каже.—<br />
Бо натуру маю,<br />
Що йно тілько з себе скину,<br />
То все пропиваю!"
 </div>
