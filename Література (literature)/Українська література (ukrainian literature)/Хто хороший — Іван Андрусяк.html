<title>Хто хороший</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хто хороший</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 Засинає бегемот,<br />
позіхнувши на весь рот.<br />
Біля нього моститься<br />
ніжна бегемотиця,<br />
й бегемотенята<br />
полягали спати.<br />
<br />
Лиш в сусідньому вольєрі<br />
хижі зайчики не сплять<br />
і зубаті пащі шкірять –<br />
бегемота покусать…<br />
<br />
Не повірили? Авжеж!<br />
Бегемот хороший теж.
 </div>
</div>
