 <div class="page-title">
  <h1>За гороскопом</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 Пита Тетяна у Терези:<br />
— За гороскопом хто Іван?<br />
— Вівця — коли бува тверезий,<br />
А як нап'ється — то баран.
