<body>
<div class="wrap">
 <div class="page-title">
  <h1>Животина</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 &#8220;Де то, доню, животина<br />
Так?..&#8221;<br />
&#8220;Та то, мамо, коло тина<br />
Дяк…<br />
Все, бувало, грає, грає<br />
Та й…<br />
Все, бувало, примовляє:<br />
&#8220;Дай!..&#8221;<br /><br />
Раз підсунув, було, ручку<br />
В то…<br />
А я кажу: &#8220;Дай обручку,<br />
То…&#8221;<br />
А він каже: &#8220;На обручку,<br />
Дай!&#8221;<br />
Я пустила його ручку<br />
Та й…&#8221;
 </div>
