  <h1>Чи вірю я в удачу...</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Чи вірю я в удачу?<br />
Як ще вірю!<br />
Вона — Великдень творчого труда.<br />
Щаслива мить, коли небесну мрію<br />
Загнуздує земних думок орда.<br />
І сам дивуєшся — сягнув у неможливе.<br />
Ти вище себе підійняв себе.<br />
Але удача — пані шаноблива,<br />
Не гейкнеш їй ні цоб, ані цабе.
