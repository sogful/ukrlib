<div class="wrap">
 <div class="page-title">
  <h1>Там, де полягли вони за волю</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Там, де полягли вони за волю,<br />
Буряки тепер для цукроварні.<br />
І не треба слів. Не треба болю.<br />
– Іншим дні прозорі, тихі, гарні.<br /><br />
Скінчено. Записано. І крапка.<br />
– Спочивайте, стомлені над міру! –<br />
&#8230;Розгортає знов іржава сапка<br />
Землю, від утоми сіру.
 </div>
