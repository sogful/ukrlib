<body>
<div class="wrap">
 <div class="page-title">
  <h1>Метелик</h1>
  <h2>Микола Воробйов</h2>
 </div>
 <div class="prose" id="content">
 Поміж дерев<br />
нічний метелик пролітає,<br />
шукає квітку,<br />
котра цвіте вночі.<br />
Може, та квітка з макове зерня,<br />
а може,— як далека зірка.<br />
Між іскор і зірок він наблукається,<br />
на теплу хату сяде і засне.
 </div>
