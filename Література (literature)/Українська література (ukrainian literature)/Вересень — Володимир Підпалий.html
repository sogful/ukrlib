<div class="wrap">
 <div class="page-title">
  <h1>Вересень</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Цей вересень!<br />
Для нього не доволі<br />
пожежі сонця&#8230;<br />
Вже до лісу жар<br />
на конях скаче з гір&#8230;<br />
Уже він долі<br />
всю зелень оберта в казковий згар&#8230;<br /><br />
Ще полум&#8217;я розбурха.<br />
І зав&#8217;яне.<br />
І, на пеньок присівши, спочива,<br />
і хилиться поволі у тумани<br />
його розважна сива голова&#8230;
 </div>
