<body>
<div class="wrap">
 <div class="page-title">
  <h1>Діти Аполлона</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Лютий. Лютий. Лютий.<br />
Одинадцяте число.<br />
Мертвяк закутий<br />
Невиправданим злом.<br /><br />
Доживає останні дні<br />
Крижене лихо.<br />
В диханні білий сніг<br />
Порошить стиха.<br /><br />
В саванах білих, білих<br />
Плазують з усіх сторін.<br />
В кутках мізерять несміливо<br />
Діти Аполлона.
 </div>
