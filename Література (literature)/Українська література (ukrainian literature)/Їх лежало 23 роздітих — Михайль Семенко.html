 <div class="page-title">
  <h1>Їх лежало 23 роздітих..</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Їх лежало 23 роздітих —<br />
без голів і обідраних —<br />
вони теж були материні діти<br />
і волосся тремтіло на вітрі.<br />
<br />
Без шкури й напівзасипані<br />
вони поєднують живих і мертвих<br />
це ж трупи, кров'ю зліплені,<br />
і я не боюся вмерти.<br />
<br />
18&ndash;II&ndash;920. Київ.
 </div>
