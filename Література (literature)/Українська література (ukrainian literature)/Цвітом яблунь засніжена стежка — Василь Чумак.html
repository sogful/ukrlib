 <div class="page-title">
  <h1>Цвітом яблунь засніжена стежка</h1>
  <h2>Василь Чумак</h2>
 </div>
 <div class="prose" id="content">
 Цвітом яблунь засніжена стежка.<br />
…Білі-білі душі нарцисів…<br />
На межі тиховійних узліссів<br />
перетнеться мережка.<br /><br />
Гомін буде. Розійдеться тихий.<br />
…Білі-білі душі нарцисів…<br />
На межі тиховійних узліссів<br />
засотаються сміхи.
 </div>
