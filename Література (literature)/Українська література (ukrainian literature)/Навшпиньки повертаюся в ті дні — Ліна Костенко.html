<div class="wrap">
 <div class="page-title">
  <h1>Навшпиньки повертаюся в ті дні...</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 Навшпиньки повертаюся в ті дні.<br />
Вони, як сонце, сходять у мені.<br />
<br />
Там є наш дім і обрій твоїх рук,<br />
і ще душа не відає розлук<br />
<br />
І ще є час для друзів і гостей.<br />
І щастя є. І донечка росте.<br />
<br />
І син малює квіточку зорі,<br />
як той Маленький принц Екзюпері.
 </div>
