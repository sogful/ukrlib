<div class="wrap">
 <div class="page-title">
  <h1>Жаром палають тугі обняття...</h1>
  <h2>Андрій Панів</h2>
 </div>
 <div class="prose" id="content">
 Жаром палають тугі обняття,<br />
Морем хвилюється виступ грудей,<br />
І спалахують теплим завзяттям<br />
Блиски зелених любих очей.<br />
Буря цілунків, юрб голубиних,<br />
Голосно пестить лиця мої.<br />
Ген з-поза річки, стиха з долини<br />
Місяць підводить ріжки свої…
 </div>
