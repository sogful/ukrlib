<body>
<div class="wrap">
 <div class="page-title">
  <h1>Країна сонця</h1>
  <h2>Іван Малкович</h2>
 </div>
 <div class="prose" id="content">
 Убивця знахарює під місточком,<br />
безокий стереже серця й корони,<br />
банкір складає вірші про листочки,<br />
поет громаді шиє панталони;<br />
повії, співаки, і футболісти<br />
сидять на троні. Мулярка дебела<br />
на ковзанах фігурно чеше твісти,<br />
в дуплі регоче буйний Кампанелла…
 </div>
