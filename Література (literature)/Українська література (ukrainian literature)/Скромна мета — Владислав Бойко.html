<body>
<div class="wrap">
 <div class="page-title">
  <h1>Скромна мета</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 — Ліричну маю я натуру,<br />
списав паперу цілу хуру —<br />
дай, боже, сили донести!<br />
Хай не ввійду в літературу —<br />
аби лиш в Спілку увійти!
 </div>
