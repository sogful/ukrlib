<body>
<div class="wrap">
 <div class="page-title">
  <h1>Творчі сльози</h1>
  <h2>Григорій Чупринка</h2>
 </div>
 <div class="prose" id="content">
 Наче п'яні,<br />
На поляні<br />
Сплять рядки струнких беріз<br />
І в тумані<br />
Ллють зарані<br />
Краплі чистих творчих сліз.<br />
<br />
Їхні сльози —<br />
Перші роси,<br />
Що одроджують ростки<br />
Де морози<br />
В хуги-грози<br />
Злісно нищили квітки.
 </div>
</div>
