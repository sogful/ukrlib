<body>
<div class="wrap">
 <div class="page-title">
  <h1>Минувшину вивчавши, зрозумів</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Минувшину вивчавши, зрозумів<br />
Красу подій, що сталися допіру.<br />
Історіє! з твоїх важких томів<br />
Крізь давнини завісу димно-сіру<br />
Майбутнє дивиться.<br />
Поете, припади<br />
До джерела пророцтв, сухих анналів:<br />
Чимало слів покладено туди,<br />
Що процвітуть надалі!
 </div>
