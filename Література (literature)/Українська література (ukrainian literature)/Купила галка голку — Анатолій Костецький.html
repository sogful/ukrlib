<body>
<div class="wrap">
 <div class="page-title">
  <h1>Купила галка голку</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 Купила галка голку,<br />
бо здумала на літо<br />
своїм галчаткам голим<br />
легких штанцят нашити.<br />
<br />
На гілку гордо сіла,<br />
наділа окуляри<br />
і шила,<br />
шила,<br />
шила —<br />
красиво, швидко, гарно,<br />
<br />
Та досі ходять голі<br />
у тої галки діти,<br />
бо галка нитку в голку<br />
забула засилити...
 </div>
