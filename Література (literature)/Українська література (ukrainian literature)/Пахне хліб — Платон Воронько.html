<div class="wrap">
 <div class="page-title">
  <h1>Пахне хліб...</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Пахне хліб,<br />
Як тепло пахне хліб!<br />
Любов'ю трударів,<br />
І радістю земною,<br />
І сонцем, що всміхалося весною,<br />
І щастям наших неповторних діб.<br />
Духмяно пахне хліб.<br />
1952
