<title>Свині — не хоче</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Свині — не хоче</h1>
  <h2>Петро Гришко</h2>
 </div>
 <div class="prose" id="content">
 Вночі, як зірка не світила ні одна,<br />
Взяв бригадир на фермі кабана.<br />
Тепер він сторожа боїться, як вогню,<br />
Щоб не підсунув той свиню.
 </div>
</div>
