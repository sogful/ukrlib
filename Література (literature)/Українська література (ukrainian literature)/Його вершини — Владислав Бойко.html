<div class="wrap">
 <div class="page-title">
  <h1>Його вершини</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 Письменника Мефодія Мороку<br />
Скрізь видають. Ім'я його звучить.<br />
Друкує по роману він щороку,<br />
і критика захоплено кричить:<br /><br />
— Як розвивається його природний хист,<br />
які глибокі теми підіймає,<br />
яких вершин сягає романісті<br />
А романіст... давно вершки збиває.
 </div>
