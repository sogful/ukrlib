<title>Ти не бійся, милочко</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ти не бійся, милочко</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 У малої Милочки<br />
Є нові санчата,<br />
Та боїться Милочка<br />
З гірочки з'їжджати.<br />
І стоїть несміливо<br />
З ними на льоду<br />
Каже: — Не зумію...—<br />
Каже: — Уп-паду...<br />
Ти не бійся, Милочко:<br />
Не страшні вони...<br />
Ти зумієш, Милочко,—<br />
Тільки розпочни!
 </div>
</div>
