<body>
<div class="wrap">
 <div class="page-title">
  <h1>Що страшніше</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 Запитав у баби дід:<br />
— Що воно таке за СНІД?<br />
— Це страшна зараза віку —<br />
Робить з кожного каліку.<br />
— Ти мені скажи простіше —<br />
За колорадського жука страшніше?
 </div>
