<body>
<div class="wrap">
 <div class="page-title">
  <h1>День великий, а ти малий</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 — Гляньте, мамо,<br />
еге який день:<br />
од світання<br />
до смеркання<br />
золоту корону носить.<br />
Як спатунечки лягає,<br />
то корону золоту знімає,<br />
у густому пралісі ховає.<br />
І я знаю де!<br /><br />
— Не йди, хлопче,<br />
корони шукати.<br />
День великий,<br />
а ти малий —<br />
заблукаєш.<br />
Я не знатиму й де!
 </div>
