 Обpамлений у "Полум'я Паpижа*"<br />
Оcінній cонцезахід із-під хмаp…<br />
І пеpегоpне жовтень календаp,<br />
Поволі cтліє у пучечках хмизу.<br />
<br />
* – один із відтінків чеpвого кольоpу.
