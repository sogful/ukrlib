<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сонячне яблучко</h1>
  <h2>Вадим Крищенко</h2>
 </div>
 <div class="prose" id="content">
 Медом яблучко налите<br />
Примостилось на гіллі.<br />
По садочку ходить літо<br />
У солом'янім брилі.<br />
Літо яблука зриває<br />
І підносить дітлахам.<br />
Гарну пісеньку співає:<br />
— Цьому дам, і тому дам…<br />
Для моїх малят хороших<br />
Подарую цілий кошик.<br />
Покуштуйте, любі діти,<br />
Подаруночок від літа.
 </div>
