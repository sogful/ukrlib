<body>
<div class="wrap">
 <div class="page-title">
  <h1>Полтава</h1>
  <h2>Олесь Гончар</h2>
 </div>
 <div class="prose" id="content">
 Мов яхта біленька, у зелені плава<br />
Мирна моя Полтава.<br />
Чужого солдата говірка гаркава —<br />
Невже це моя Полтава?<br />
<br />
Сміється до нього землячка лукава —<br />
Зрадлива моя Полтава.<br />
Ведуть нас у табір — доріжка<br />
кривава.<br />
Ні!<br />
Не моя це Полтава!
 </div>
</div>
