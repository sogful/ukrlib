<div class="wrap">
 <div class="page-title">
  <h1>Смаглява і ніжна...</h1>
  <h2>Кость Москалець</h2>
 </div>
 <div class="prose" id="content">
 Смаглява і ніжна, у розповні літа лежиш.<br />
Пелюстка троянди на персах квітучих заснула.<br />
Ріка запашна і холодна, мов сон нездійсненний, минає.<br />
Довіку не зможе минути дівочого тіла реальність.
 </div>
