<body>
<div class="wrap">
 <div class="page-title">
  <h1>До нас журавлик прилітав</h1>
  <h2>Ігор Січовик</h2>
 </div>
 <div class="prose" id="content">
 До нас журавлик прилітав,<br />
Він гарні віршики читав<br />
Про синє небо і весну,<br />
Про Чорне море і Десну,<br />
Про Україну – рідний край...<br />
Ти ще раз, друже, прилітай!
 </div>
</div>
