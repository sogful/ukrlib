<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хмара</h1>
  <h2>Ігор Калинець</h2>
 </div>
 <div class="prose" id="content">
 То не хмара,<br />
а дірява парасоля:<br />
сама змокла,<br />
ще й мене<br />
до нитки намочила.<br />
Бачив я, бачив,<br />
як несе вона<br />
на плечах<br />
малі хмарята.<br />
А від них —<br />
маленькі дощики,<br />
дитячі парасольки,<br />
гороб&#8217;ячі калабаньки<br />
і веселки в росі.
 </div>
