<title>Не помітив</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не помітив</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — В Сахарі на мене накинувся Лев<br />
Я миттю на дерево!<br />
— Нема там дерев…<br />
— А я й не помітив того<br />
та дарма!<br />
Було не до того…<br />
Нема — то й нема!
 </div>
