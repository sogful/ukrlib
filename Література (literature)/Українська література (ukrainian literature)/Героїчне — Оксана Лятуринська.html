<body>
<div class="wrap">
 <div class="page-title">
  <h1>Героїчне</h1>
  <h2>Оксана Лятуринська</h2>
 </div>
 <div class="prose" id="content">
 Рівний степ, широкий степ<br />
видовжується і росте,<br />
могили товпляться узгір’ям.<br />
Як вимірять страшне безмір’я<br />
висот і сил, стремлінь, снаги?<br />
Як не притиснуть остроги<br />
тяжкокопитному коневі?<br />
І обрій дальній і рожевий<br />
наближується, рветься вшир.<br />
Пне дужі груди богатир.
 </div>
