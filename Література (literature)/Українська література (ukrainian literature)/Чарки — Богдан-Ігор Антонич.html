<div class="wrap">
 <div class="page-title">
  <h1>Чарки</h1>
  <h2>Богдан-Ігор Антонич</h2>
 </div>
 <div class="prose" id="content">
 Зелений ясень, серп і коні.<br />
Прилипнув хлопець до вікна.<br />
В чарки сріблисті і червоні<br />
поналивалася весна.<br />
<br />
І хочеться хлопчині конче<br />
від весняних воріт ключа.<br />
З трави неждано скочить сонце,<br />
немов сполохане лоша.
 </div>
