<body>
<div class="wrap">
 <div class="page-title">
  <h1>Випурхнули грози</h1>
  <h2>Анатолій Мойсієнко</h2>
 </div>
 <div class="prose" id="content">
 Випурхнули грози<br />
З хмарних вікон неба...<br />
На вранішні роси<br />
Косар косу клепле.<br />
<br />
Випурхнули грози<br />
В золотих громах...<br />
Де над верболози<br />
Вів співанку птах.<br />
<br />
Випурхнули грози<br />
На пахучі квіти...<br />
Буду ніжки босі<br />
Квіточкам я мити.
 </div>
