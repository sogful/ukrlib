<body>
<div class="wrap">
 <div class="page-title">
  <h1>Місяць і сонце</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 — Місяць, місяць, а навіщо<br />
з неба світиш ти щоночі?<br />
— Щоб за ніч поспало сонце,<br />
бо й воно спочити хоче.<br />
<br />
— Сонце, сонце, а навіщо<br />
ти щоденно з неба світиш?<br />
<br />
— Щоб мені раділи люди,<br />
щоб мене вітали квіти.<br />
Та і місяцю ж потрібно<br />
теж колись перепочити...
 </div>
