<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мавпоччин букварик</h1>
  <h2>Оксана Кротюк</h2>
 </div>
 <div class="prose" id="content">
 Якось мавпочка о книгарні<br />
Буквара купила<br />
і старанно цілий тиждень<br />
"А" та "Б" учила.<br />
<br />
"Це ж на "А" тут ананаси,<br />
А на "Б" — банани.<br />
Що й казати? Мій букварик<br />
Справді непоганий!"
 </div>
</div>
