 i…<br /><br />
я<br />
ніколи<br />
жодної речі<br />
не вгадував (на<br />
віть всесвіту) міг би<br />
так не цілком можливо<br />
найменший немов найкращий<br />
(майже невидимий де єси там єси) тут єси<br />
кармінного горла дому найти<br />
хішого який дійсно його<br />
(як і думка що три сві<br />
ти випереджує)<br />
хто всеви<br />
дяще<br />
Око
 </div>
