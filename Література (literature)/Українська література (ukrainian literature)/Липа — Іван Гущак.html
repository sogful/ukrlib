<body>
<div class="wrap">
 <div class="page-title">
  <h1>Липа</h1>
  <h2>Іван Гущак</h2>
 </div>
 <div class="prose" id="content">
 У дворі буяє липа.<br />
Біля липи Леся хлипа,<br />
бо на липі, плач не плач.<br />
Між гілками Лесин м'яч.<br />
З тої липи м'ячик зняти<br />
поспішає Лесин братик.
 </div>
</div>
