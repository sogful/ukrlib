 <div class="page-title">
  <h1>Відлуння</h1>
  <h2>Василь Голобородько</h2>
 </div>
 <div class="prose" id="content">
 Півень дивиться в дзеркальце маку,<br />
і мак дивиться в дзеркальце півня.<br />
<br />
Яблуня піднімає догори гілки,<br />
і гілки піднімають догори яблуню.<br />
<br />
Стежка лоскоче босі ступки,<br />
і ступки лоскочуть босу стежку.<br />
<br />
<strong>Джерело: </strong>Веселка, 1991.
 </div>
