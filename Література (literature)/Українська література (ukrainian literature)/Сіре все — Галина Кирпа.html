<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сіре все</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Сірий дах.<br />
Сірий птах.<br />
Сіра хмарка.<br /><br />
Пес в кущах.<br />
Кущ в дощах.<br />
В дверях — шпарка.<br /><br />
Сад. Село.<br />
Тиша. Сон.<br />
Дві пір'їни.<br /><br />
Чи було?<br />
Не було!<br />
Мов з картини.<br /><br />
Знов зима<br />
обійма<br />
білі віти.<br /><br />
Крадькома<br />
по домах<br />
ходять квіти.
 </div>
