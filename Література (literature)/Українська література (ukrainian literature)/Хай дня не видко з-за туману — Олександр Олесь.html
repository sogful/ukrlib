<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хай дня не видко з-за туману...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Хай дня не видко з-за туману<br />
Хай хмара з півночі росте,<br />
Але хіба я перестану<br />
Співать про сонце золоте.<br />
<br />
Ні, ні, прекрасну нашу мрію<br />
Я уберу в квітки весни.<br />
<br />
Я по борах її розвію<br />
І напою дитячі сни.
 </div>
</div>
