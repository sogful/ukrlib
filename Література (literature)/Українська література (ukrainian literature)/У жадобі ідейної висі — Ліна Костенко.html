 <div class="page-title">
  <h1>У жадобі ідейної висі...</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 У жадобі ідейної висі<br />
зіп'ялись на словесні котурни<br />
і шпурляють недокурки мислі<br />
у невпізнані прірви, як в урни.<br />
<br />
Бідні лицарі коньюнктури!<br />
Ви ж забули істину просту,<br />
що найвищі у світі котурни<br />
не замінять власного зросту.
 </div>
