<title>Білий бичок</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Білий бичок</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Біг бичечок білий, біг,<br />
А в бичечка збитий ріг.<br />
— З ким ти буцався, бичок,<br />
Як зламав собі ріжок?<br />
— З хижим вовком я змагався<br />
У бою ріжок зламався.<br />
Боронив же я телятко,<br />
Бо телятко<br />
Ще малятко.
 </div>
</div>
