<body>
<div class="wrap">
 <div class="page-title">
  <h1>На санчатах</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Я лечу,<br />
лечу,<br />
лечу —<br />
Накатаюсь досхочу.<br />
Все униз,<br />
униз,<br />
униз —<br />
Мимо сосен і беріз.<br />
Я веду,<br />
веду,<br />
веду —<br />
Саночки на поводу.<br />
Во з гори санки летять.<br />
А на гору —<br />
не хотять…
 </div>
</div>
