<body>
<div class="wrap">
 <div class="page-title">
  <h1>Гнізда радості</h1>
  <h2>Кость Москалець</h2>
 </div>
 <div class="prose" id="content">
 За шклом старенькі привиди і сніг<br />
нічна година борзо втіче з ними<br />
ще можна грати в шахи con sordino<br />
із відображенням у темному вікні<br />
<br />
і вірний пес пантрує карим оком<br />
як дзиґар вибирає цілу ніч<br />
між гніздами що високо у горах<br />
і тими що є глибоко в мені
 </div>
