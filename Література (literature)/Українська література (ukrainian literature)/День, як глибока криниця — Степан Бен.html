<body>
<div class="wrap">
 <div class="page-title">
  <h1>День, як глибока криниця</h1>
  <h2>Степан Бен</h2>
 </div>
 <div class="prose" id="content">
 День, як глибока криниця:<br />
прозорий, блакитний, холодний.<br />
Тільки береза на сонці<br />
сріблиться у синій безодні.<br />
<br />
Тихо під листям одежі<br />
вінки золоті заплітає…<br />
Осінь сьогодні розкинула<br />
вежі в зеленому гаю.
 </div>
