<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вже блакитне сяйво світу</h1>
  <h2>Людмила Старицька-Черняхівська</h2>
 </div>
 <div class="prose" id="content">
 Вже блакитне сяйво світу<br />
Виступа на небеса,<br />
На похиленії квіти<br />
Впала теплая роса;<br />
Гаснуть, бліднуть зорі ночі,<br />
Перекинувсь в небі "віз"...<br />
І на змученії очі<br />
Впали краплі теплих сліз...
 </div>
</div>
