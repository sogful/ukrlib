 <div class="page-title">
  <h1>Теж очікування</h1>
  <h2>Олег Коцарев</h2>
 </div>
 <div class="prose" id="content">
 Стівен із краю<br />
Цукрових заводів<br />
На залізниці<br />
Чекає кохану.<br />
<br />
Тої нема –<br />
Він замислено суне<br />
Пагорбами<br />
Лісостеп споглядати.<br />
<br />
З ножичком і<br />
Телефонною книжкою<br />
Взад погляда<br />
На іржавії рельси.<br />
<br />
6 липня. 1999 рік.
 </div>
