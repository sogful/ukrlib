<div class="wrap">
 <div class="page-title">
  <h1>Ти в життя пішла з моєю образою...</h1>
  <h2>Кость Котко</h2>
 </div>
 <div class="prose" id="content">
 Ти в життя пішла з моєю образою,<br />
Зі зробленим мною болем.<br />
<br />
Ти рвалась до мене за світлом і волею,<br />
Я – тобі темряву давав щораз.<br />
<br />
Зараз потонеш у життєвій безодні.<br />
Озирнувшись на минуле огидливо…<br />
<br />
Не найду ніколи твого сліду.<br />
<br />
І назавжди – один.
 </div>
