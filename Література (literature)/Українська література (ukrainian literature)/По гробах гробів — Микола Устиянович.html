<body>
<div class="wrap">
 <div class="page-title">
  <h1>По гробах гробів</h1>
  <h2>Микола Устиянович</h2>
 </div>
 <div class="prose" id="content">
 По гробах гробів ходим ми,<br />
І з ілу костей наших братій<br />
Возносим храм для отчини<br />
Величественний, пребагатий.<br />
Но хто вість, чи на місці тім,<br />
Де днесь взникає Руси дім,<br />
Не взнесуть колись судьб укори<br />
Розвалини, а на них бори!
 </div>
</div>
