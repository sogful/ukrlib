<title>Ніхто не забутий</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ніхто не забутий</h1>
  <h2>Борис Олійник</h2>
 </div>
 <div class="prose" id="content">
 Ніхто не забутий.<br />
На полі ніхто не згорів:<br />
Солдатські портрети<br />
На вишитих крилах пливуть…<br />
І доки є пам'ять в людей,<br />
І живуть матері,<br />
Допоти й сини, що спіткнулись об кулі,<br />
Живі!
 </div>
</div>
