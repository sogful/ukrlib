<title>Іншого немає</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Іншого немає</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Прийшов Кіндрат<br />
В дитячий сад.<br />
У сажі ніс у нього.<br />
Стоїть Кіндрат<br />
Серед малят,<br />
А няня каже строго:<br />
Чому такий<br />
Прийшов брудний?<br />
Відповідай же, просим…<br />
Негожо, брат,<br />
В дитячий сад<br />
З таким приходить носом!<br />
<br />
Кіндрат похнюплено зітхає:<br />
А в мене… іншого немає!..
 </div>
