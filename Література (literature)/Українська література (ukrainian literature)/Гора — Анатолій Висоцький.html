<body>
<div class="wrap">
 <div class="page-title">
  <h1>Гора</h1>
  <h2>Анатолій Висоцький</h2>
 </div>
 <div class="prose" id="content">
 По дорозі до гори<br />
Чути гомін дітвори:<br />
"Ну й бабуся!<br />
Ну й гора!<br />
Зразу видно, що стара.<br />
Унизу, погляньте ви,<br />
В неї сукня із трави.<br />
А он там, на голові,<br />
Сиві коси снігові".<br />
І цікаво дітворі:<br />
Скільки років цій горі?
 </div>
</div>
