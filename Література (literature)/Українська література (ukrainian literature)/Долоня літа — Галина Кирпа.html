<body>
<div class="wrap">
 <div class="page-title">
  <h1>Долоня літа</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 На долоні літа —<br />
самі стежечки,<br />
мов сірі вужі,<br />
шарудять у високій траві.<br />
Ой і побігла б я<br />
тими стежечками,<br />
та не хочу<br />
на сірого вужа<br />
наступити.
 </div>
</div>
