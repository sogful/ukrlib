<body>
<div class="wrap">
 <div class="page-title">
  <h1>Веселий дзвінок</h1>
  <h2>Оксана Кротюк</h2>
 </div>
 <div class="prose" id="content">
 Із лісу дрімучого<br />
Вийшов ведмідь.<br />
"Не буду я, — каже, —<br />
У хащі сидіть.<br />
Малина скінчилась,<br />
Кусаються бджоли,<br />
А чесно сказати,<br />
Я хочу до школи.<br />
Так весело дзвонить там<br />
Срібний дзвінок,<br />
Коли закликає<br />
Дітей на урок".
 </div>
