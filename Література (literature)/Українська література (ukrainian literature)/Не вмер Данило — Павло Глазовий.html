<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не вмер Данило</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Раз Данилові товариш<br />
Каже: — Оце маєш!<br />
Оженився і сам собі<br />
Штани зашиваєш.<br /><br />
— Що? — обурився Данило.<br />
Ти верзеш дурницю!<br />
Де штани? Я зашиваю<br />
Жінчину спідницю.
 </div>
