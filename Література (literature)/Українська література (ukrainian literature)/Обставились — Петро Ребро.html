<div class="wrap">
 <div class="page-title">
  <h1>Обставились...</h1>
  <h2>Петро Ребро</h2>
 </div>
 <div class="prose" id="content">
 — Погляньте, як ми живемо...<br />
— О, вам позаздрили б і графи!<br />
Сервант, комбайн, торшер, трюмо,<br />
І крісла, й пуфики, і шафи.<br /><br />
Скрізь — тюль, доріжки, килими.<br />
А гарнітурчик!! А тахтище!!!<br />
Не тісно?<br />
— Де там! Нині ми<br />
Вже перебрались на горище!
 </div>
