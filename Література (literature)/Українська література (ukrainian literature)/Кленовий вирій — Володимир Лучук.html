<body>
<div class="wrap">
 <div class="page-title">
  <h1>Кленовий вирій</h1>
  <h2>Володимир Лучук</h2>
 </div>
 <div class="prose" id="content">
 Летіли птахи зелені,<br />
сіли спочити на клені.<br />
<br />
По десять птахів<br />
на кожну вітку,<br />
Сіли весною,<br />
сидять улітку.<br />
<br />
А прийде осінь —<br />
запалить крони,<br />
Птахи зелені<br />
стануть червоними.<br />
<br />
Зірвуться з віток<br />
у мжичці сірій —<br />
полинуть з вітром<br />
в кленовий вирій.
 </div>
</div>
