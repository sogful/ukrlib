<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ой там у полі</h1>
  <h2>Василь Чумак</h2>
 </div>
 <div class="prose" id="content">
 Ой там у полі…– на обніжку<br />
тліє блакитний жар…<br />
Нащо так рано, метелику-сніжку,<br />
нащо так рано з-за хмар?<br />
Ой та погасли…– ті жарини –<br />
змерзли волошки в межі…<br />
…Білий метелик лине та лине,<br />
білий метелик сніжин.
 </div>
</div>
