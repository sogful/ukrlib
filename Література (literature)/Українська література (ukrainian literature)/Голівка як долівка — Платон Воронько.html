<title>Голівка як долівка</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Голівка як долівка</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Я умилась з милом,<br />
Прилягла на килим,<br />
І моя голівка<br />
Між квіток — мов квітка,<br />
Як ота найкраща,<br />
Що квітчає килим.<br />
А Ванько — ледащо —<br />
Не миється з милом.<br />
І тому голівка<br />
В нього як долівка.
 </div>
</div>
