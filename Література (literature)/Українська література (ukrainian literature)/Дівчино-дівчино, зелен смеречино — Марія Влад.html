<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дівчино-дівчино, зелен смеречино...</h1>
  <h2>Марія Влад</h2>
 </div>
 <div class="prose" id="content">
 Дівчино-дівчино,<br />
Зелен смеречино.<br />
Стогне кінь,<br />
А леґінь —<br />
До зірниць очима.<br />
Иой!<br /><br />
Дівчино-дівчино,<br />
Зелен смеречино…<br />
Небо в лісі<br />
Спочило —<br />
Иой…
 </div>
