<div class="wrap">
 <div class="page-title">
  <h1>Гноми</h1>
  <h2>Олександр Виженко</h2>
 </div>
 <div class="prose" id="content">
 Гном якось відвідав гнома,<br />
Три дні м'явся біля дому.<br />
Цілих три дні думав гном:<br />
"Дім-то є, а де ж то гном?"
