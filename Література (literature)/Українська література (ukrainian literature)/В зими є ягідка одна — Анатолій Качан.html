<div class="wrap">
 <div class="page-title">
  <h1>В зими є ягідка одна</h1>
  <h2>Анатолій Качан</h2>
 </div>
 <div class="prose" id="content">
 (Загадка)*<br />
<br />
В зими є ягідка одна,<br />
Немов полин, гірка вона.<br />
Та для голодної ворони<br />
Або сороки-гастролерки<br />
Гірка ця ягідка червона<br />
Солодша взимку від цукерки.<br />
<br />
*Назва ягідки — в тексті загадки.
