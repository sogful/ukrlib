<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ведмедики</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Ведмежаток я взяла,<br />
Посадила до стола,<br />
Стала медом частувати:<br />
— Пригощайтесь, ведмежата!<br />
А ведмедики сидять<br />
І нічого не їдять:<br />
Скуштувать медку охота —<br />
Та відкрить не можуть рота
 </div>
