 <div class="page-title">
  <h1>Котик плаче на морозі</h1>
  <h2>Людмила Лежанська</h2>
 </div>
 <div class="prose" id="content">
 Котик плаче на морозі,<br />
Бо йому померзли нозі.<br />
Ходи, котику, до хати.<br />
На лежанці будеш спати.
