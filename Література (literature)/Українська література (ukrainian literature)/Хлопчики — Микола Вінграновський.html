<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хлопчики</h1>
  <h2>Микола Вінграновський</h2>
 </div>
 <div class="prose" id="content">
 Мизатий хлопчик, як горобчик,<br />
З таким, як сам, до річки йде.<br />
Іде над хлопчиками дощик,<br />
Іде над ними й більш ніде.<br />
<br />
А фіолетово, а синьо<br />
При хаті півники цвітуть!<br />
Цвіте над півниками слива<br />
І абрикоса пахне тут.
 </div>
