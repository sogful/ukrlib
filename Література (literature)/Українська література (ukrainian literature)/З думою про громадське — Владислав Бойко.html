<div class="wrap">
 <div class="page-title">
  <h1>З думою про громадське</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 — Для мене громадське добро — над усе! —<br />
з трибуни горохом він сипле слова.<br />
Придивишся — й справді: громадське несе<br />
щодня і щоночі до свого хліва.
 </div>
