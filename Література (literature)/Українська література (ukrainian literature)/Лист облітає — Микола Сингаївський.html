<div class="wrap">
 <div class="page-title">
  <h1>Лист облітає</h1>
  <h2>Микола Сингаївський</h2>
 </div>
 <div class="prose" id="content">
 Лист облітає.<br />
Зупинюсь.<br />
Послухаю.<br />
І голос осені до серця долетить.<br />
Вона вже над гаями,<br />
вже над луками.<br />
Чи зупиню я дивовижну мить?<br /><br />
Щоб нині заглянути у майбутнє,<br />
на мить минувшину поворушить.<br />
Щоб осінню<br />
весняним знову бути<br />
і все почате<br />
вчасно довершить.
 </div>
