<body>
<div class="wrap">
 <div class="page-title">
  <h1>Спи, дитиночко кохана…</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Спи, дитиночко кохана,<br />
Баю, люлі, бай,<br />
<br />
А ти, місяцю, до рана<br />
В колисоньку сяй.<br />
<br />
Стану я казки казати<br />
Та співать пісні,<br />
<br />
Щоб ти щастя міг зазнати<br />
Хоч в дитячім сні.
 </div>
</div>
