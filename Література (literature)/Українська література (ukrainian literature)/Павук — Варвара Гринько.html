<body>
<div class="wrap">
 <div class="page-title">
  <h1>Павук</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Де на стовбурі сучок —<br />
Причаївся павучок.<br />
Виплів сітку між гілля.<br />
Гетьте, мухи, звідтіля:<br />
Бо отам он, де сучок,<br />
Вас впіймає павучок.
 </div>
