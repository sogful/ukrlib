  <h2>Василь Герасим'юк</h2>
 </div>
 <div class="prose" id="content">
 Я терпів свою душу. Страх. Бруд.<br />
Прошепочу: "Це як над убогою<br />
поглумитись. На божий суд<br />
не йди своєю дорогою".
