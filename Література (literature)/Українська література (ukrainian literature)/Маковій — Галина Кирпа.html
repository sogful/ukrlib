<body>
<div class="wrap">
 <div class="page-title">
  <h1>Маковій</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Біла хата, а навпроти — мак.<br />
Вже нема пелюсток, лиш головки.<br />
Це б дощу! Та і його нема:<br />
Маковій пахучий, аж солодкий.<br /><br />
Я не хочу ластівці казать,<br />
що їй скоро-скоро відлітати,<br />
бо для неї то — немов гроза&#8230;<br />
Краще б ту грозу перечекати!
 </div>
