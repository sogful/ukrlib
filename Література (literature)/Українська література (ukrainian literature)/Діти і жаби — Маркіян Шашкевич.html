<body>
<div class="wrap">
 <div class="page-title">
  <h1>Діти і жаби</h1>
  <h2>Маркіян Шашкевич</h2>
 </div>
 <div class="prose" id="content">
 Коло озера щодень звечора<br />
Хлопці сюда-туда бігали<br />
І на Жаби засідали.<br />
Лиш ся котра з води показала,<br />
Каменем зараз в лоб діставала.<br />
Одна з них, над другі сміла,<br />
Так з води до них повіла:<br />
"Діти, діти! Лишіть теє битє,<br />
Вам то грачкою, нам йде о житє".
 </div>
