<title>Що за птиця?</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Що за птиця?</h1>
  <h2>Леонід Глібов</h2>
 </div>
 <div class="prose" id="content">
 Між людьми, як пташка, в’ється,<br />
У людей і їсть, і п’є;<br />
Ходить старець, просить, гнеться,<br />
А у неї всюди є.
 </div>
