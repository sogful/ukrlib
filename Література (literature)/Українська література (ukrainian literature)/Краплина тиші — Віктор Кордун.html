<body>
<div class="wrap">
 <div class="page-title">
  <h1>Краплина тиші</h1>
  <h2>Віктор Кордун</h2>
 </div>
 <div class="prose" id="content">
 Мамо,<br />
вже навколо нашої хати<br />
звужується<br />
тиші сувій суцільний.<br />
Не зацвіли<br />
цього літа<br />
ні гарбузи твої,<br />
ні мальви.<br />
Те намисто,<br />
що ми назбирали<br />
по узбережжях щоденних озер<br />
самозгортних,<br />
вже заважке й захолодне<br />
для тебе.<br />
На постелі своїй<br />
світлій-світлій<br />
меншаєш,<br />
меншаєш.
 </div>
</div>
