<body>
<div class="wrap">
 <div class="page-title">
  <h1>Колискова</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Сплять сороки, снігурі<br />
й ангели-нічниці.<br />
Сплять ялинки у дворі,<br />
і зайці, й лисиці.<br /><br />
Спить ведмедик Вінні-Пух<br />
і золота рибка.<br />
За вікном мороз ущух, —<br />
засинає шибка.<br /><br />
Сплять і кактус, і примула,<br />
ляля, мама й тато.<br />
Ти, колисочко, забула —<br />
нам пора вже спати.
 </div>
