 <div class="page-title">
  <h1>Мудрий порадник</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Загадка<br /><br />
Завжди можу стати в пригоді,<br />
моїх вам порад не злічить.<br />
І кажуть про мене в народі:<br />
"Мовчить, а сто дурнів навчить".<br /><br />
Що це таке?<br /><br />
(Книга)
