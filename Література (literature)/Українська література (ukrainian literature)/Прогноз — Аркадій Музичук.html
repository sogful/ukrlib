<div class="wrap">
 <div class="page-title">
  <h1>Прогноз</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 Прослухавши останні вісті,<br />
Сказав дружині чоловік:<br />
— Готуйся, жінко, жити в гіпсі,<br />
Бо переломним буде рік.<br />
І президент, прем'єр і спікер<br />
Про це казали разів сто.<br />
Лише не обіцяє ліків<br />
Від переломів з них ніхто.
 </div>
