<div class="wrap">
 <div class="page-title">
  <h1>Світанок</h1>
  <h2>Микола Воробйов</h2>
 </div>
 <div class="prose" id="content">
 Безмежна крадіжка ночі.<br />
Сховище па горищі.<br />
Приготування мішків із сріблом.<br />
Гуркіт старої скрині<br />
із стрічками й намистом.<br />
Трохи пензлів з усякого пір'я.<br />
Довга драбина<br />
приставлена до зоряного дерева,<br />
де вже забіліла тріщина.
 </div>
