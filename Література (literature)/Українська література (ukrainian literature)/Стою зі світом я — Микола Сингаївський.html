<div class="wrap">
 <div class="page-title">
  <h1>Стою зі світом я</h1>
  <h2>Микола Сингаївський</h2>
 </div>
 <div class="prose" id="content">
 Стою зі світом я –<br />
лицем в лице,<br />
відкрите серце простору і цвіту.<br />
Квітує сад під райдужним вінцем,<br />
і пахощі розлиті на півсвіту.<br />
Квітує день на радощах буття.<br />
що нам кують зозулі із ліщини.<br />
І райдуги барвисте вишиття<br />
з&#8217;єднало схід і захід<br />
Батьківщини.
 </div>
