<div class="wrap">
 <div class="page-title">
  <h1>Ранній сніг</h1>
  <h2>Микола Палагута</h2>
 </div>
 <div class="prose" id="content">
 А сніг іде. І все густіший.<br />
Він дітлахів розвеселя.<br />
Гаї немов із казки вийшли,<br />
І білі-білі вже поля.<br />
<br />
Уже — зима. Хоч ніби й осінь:<br />
Шумить ріка. Стоги в снігах.<br />
Та ще один лелека й досі<br />
Блука, мов привид, по лугах.<br />
<br />
<strong>Джерело: </strong>Барвінок, 1985.
