<body>
<div class="wrap">
 <div class="page-title">
  <h1>Телефонна розмова</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Вам кого? — гукає в трубку<br />
Дружина Кіндрата. —<br />
Нема дома... Скоро буде...<br />
А що передати? —<br />
В трубці голос незнайомий:<br />
— За труд вибачайте...<br />
Я йому десятку винен,<br />
То ви передайте!
 </div>
