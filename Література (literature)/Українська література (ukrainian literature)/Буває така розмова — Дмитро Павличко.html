<body>
<div class="wrap">
 <div class="page-title">
  <h1>Буває така розмова...</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 Буває така розмова,<br />
Що ув'язнює, наче кліть.<br />
Темрява розумова,<br />
Як бескид, міцна стоїть.<br />
<br />
Буває таке мовчання<br />
Несподіване і страшне,<br />
Що тільки вибух ридання<br />
Від смерті рятує мене.<br />
<br />
Буває така година,<br />
Коли повертає глузд<br />
Моєму життю єдина<br />
Усмішка милих уст.
 </div>
