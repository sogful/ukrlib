<div class="wrap">
 <div class="page-title">
  <h1>Мати</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 Перше слово — Мати,<br />
Друге — Україна.<br />
Так учився розмовляти<br />
Я, мала дитина.<br />
<br />
Кожне слово пахне,<br />
Мов листочок м'яти.<br />
Та, мов квітка короваю,<br />
Пахне слово Мати.<br />
<br />
Кожне слово світить<br />
Гранями рубіна,<br />
Але сяє, наче сонце,<br />
Слово Україна.
 </div>
