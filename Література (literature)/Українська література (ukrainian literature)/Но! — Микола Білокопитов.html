<body>
<div class="wrap">
 <div class="page-title">
  <h1>Но!</h1>
  <h2>Микола Білокопитов</h2>
 </div>
 <div class="prose" id="content">
 Федько, як був іще хлоп'ятком,<br />
На шию забиравсь до татка<br />
Й гукав (як вершники в кіно):<br />
— Но!..<br />
І, догоджаючи маляті,<br />
Татусь конем скакав по хаті<br />
(Аби не плакало воно):<br />
— Но!..<br />
Тепер на шиї в того татка —<br />
Федько, невістка й онучатка.<br />
І кожен ногу в стремено:<br />
— Н-но-о!!!
 </div>
