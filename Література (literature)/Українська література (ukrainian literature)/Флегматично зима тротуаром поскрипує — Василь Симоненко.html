<body>
<div class="wrap">
 <div class="page-title">
  <h1>Флегматично зима тротуаром поскрипує</h1>
  <h2>Василь Симоненко</h2>
 </div>
 <div class="prose" id="content">
 Флегматично зима тротуаром поскрипує,<br />
Фантастичні плете казки,<br />
Позіхає десь під білою липою,<br />
На шибки покладе мазки.<br /><br />
Вкриє землю габою сріблястою,<br />
І є напруженій тиші нічній<br />
Світ здається чарівною казкою,<br />
Нерозгаданим плетивом мрій.
 </div>
</div>
