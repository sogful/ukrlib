<body>
<div class="wrap">
 <div class="page-title">
  <h1>Грядочка сестрички</h1>
  <h2>Михайло Стельмах</h2>
 </div>
 <div class="prose" id="content">
 У сестрички теж є грядочка,<br />
Невелика, наче кладочка,<br />
А на грядці — огірочки<br />
І кавун в рябій сорочці,<br />
Сім головок маку,<br />
Трохи пастернаку,<br />
Був на грядці і горох,<br />
Та його ми з'їли вдвох.
 </div>
