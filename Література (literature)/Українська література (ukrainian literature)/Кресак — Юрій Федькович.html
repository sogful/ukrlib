<div class="wrap">
 <div class="page-title">
  <h1>Кресак</h1>
  <h2>Юрій Федькович</h2>
 </div>
 <div class="prose" id="content">
 У неділю дуже рано<br />
Легінь кресак обшиває<br />
У золоті огальони, —<br />
Кому він ся ним поклонить?<br />
Чи цареві, чи дівчині?<br />
Чи на повній домовині<br />
Побратимки го покладуть<br />
Та й до церкви пишно зладять?..
 </div>
