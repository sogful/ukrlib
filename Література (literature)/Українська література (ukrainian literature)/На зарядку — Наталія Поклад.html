<body>
<div class="wrap">
 <div class="page-title">
  <h1>На зарядку</h1>
  <h2>Наталія Поклад</h2>
 </div>
 <div class="prose" id="content">
 Ців-ців-ців, ців-ців-ців,<br />
край вікна горобчик сів,<br />
крильцями махає,<br />
нам усім гукає:<br />
— Прокидайтеся, малята,<br />
сонце встало — годі спати,<br />
я вже в полі побував<br />
і росичку поспивав,<br />
а тепер гукну курчатку<br />
й разом зробимо зарядку!
 </div>
</div>
