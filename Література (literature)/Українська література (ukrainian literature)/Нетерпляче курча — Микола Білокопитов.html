<div class="wrap">
 <div class="page-title">
  <h1>Нетерпляче курча</h1>
  <h2>Микола Білокопитов</h2>
 </div>
 <div class="prose" id="content">
 Ще не проклюнулось, як слід,<br />
А вже часу не гає:<br />
У стінку стукає і квит —<br />
Сво-бо-ди вимагає.
