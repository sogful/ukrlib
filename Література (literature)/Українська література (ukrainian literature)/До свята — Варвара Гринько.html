<body>
<div class="wrap">
 <div class="page-title">
  <h1>До свята</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Дуже гарно шиє бабуся,<br />
Я від неї шити навчуся.<br />
Помережу ляльці кофтинку<br />
І собі пошию хустинку.<br />
Вийде гарний одяг до свята,<br />
Не пізнають мама і тато.
 </div>
</div>
