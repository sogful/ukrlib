<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вже ані словом, ні співом...</h1>
  <h2>Володимир Свідзінський</h2>
 </div>
 <div class="prose" id="content">
 Вже ані словом, ні співом,<br />
ні блиском очей не приваблю<br />
Юного серця.<br />
Та є в мене доня, мій паросток ніжний,<br />
Буде любити мене і вечірнього.<br />
Буду їй милий<br />
Навіть тоді,<br />
як затихну під брилами смертної<br />
ночі.<br />
<br />
Із збірки "Медобір"
 </div>
</div>
