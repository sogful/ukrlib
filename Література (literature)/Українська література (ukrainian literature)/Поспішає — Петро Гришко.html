 <div class="page-title">
  <h1>Поспішає</h1>
  <h2>Петро Гришко</h2>
 </div>
 <div class="prose" id="content">
 До каси — люду! Ніде стати.<br />
Та Гнат протиснувсь до вікна:<br />
— Без черги видайте зарплату,<br />
А то зачиниться пивна.
