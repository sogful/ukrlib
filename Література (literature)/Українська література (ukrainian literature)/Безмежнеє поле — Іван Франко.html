<body>
<div class="wrap">
 <div class="page-title">
  <h1>Безмежнеє поле</h1>
  <h2>Іван Франко</h2>
 </div>
 <div class="prose" id="content">
 Безмежнеє поле в сніжному завою,<br />
Ох, дай мені обширу й волі!<br />
Я сам серед тебе, лиш кінь підо мною<br />
І в серці нестерпнії болі.<br />
<br />
Неси ж мене, коню, по чистому полю,<br />
Як вихор, що тутка гуляє,<br />
А чень, утечу я від лютого болю,<br />
Що серце моє розриває.
 </div>
