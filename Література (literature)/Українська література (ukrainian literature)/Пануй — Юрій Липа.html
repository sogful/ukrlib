<div class="wrap">
 <div class="page-title">
  <h1>Пануй</h1>
  <h2>Юрій Липа</h2>
 </div>
 <div class="prose" id="content">
 Пануй, пануй, пануй над вільною землею<br />
Велика нація із берлом і мечем!<br />
<br />
Рости, рости, рости, блискуча Перемого,<br />
Стелись широко нам в шляхах до ворогів!<br />
<br />
Цвіти, цвіти, цвіти, могутня Україно,<br />
Як розцвітає день,<br />
Як розцвітає день!<br />
<br />
(1931)
 </div>
</div>
