<div class="wrap">
 <div class="page-title">
  <h1>Дев'ять</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Лічилка<br />
<br />
Раз, два —<br />
Ми в дорозі.<br />
Три, чотири —<br />
На порозі.<br />
П'ять, шість —<br />
Мити ніжки,<br />
Сім, вісім —<br />
Час у ліжко.<br />
Треба й дев'ять<br />
Всім сказати:<br />
— На добраніч,<br />
Будем спати!
 </div>
