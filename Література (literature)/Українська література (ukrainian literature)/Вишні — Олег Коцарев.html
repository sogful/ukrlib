<div class="wrap">
 <div class="page-title">
  <h1>Вишні</h1>
  <h2>Олег Коцарев</h2>
 </div>
 <div class="prose" id="content">
 Я гасаю<br />
У морі каміння<br />
Й не дуже розлогих<br />
Невисоких дерев.<br />
Я хапаюсь за гілки,<br />
Кусаю<br />
Вперемішку із листям<br />
Кусючі сонечка-вишні,<br />
Що гойдаються так соковито.<br />
Я по-своєму щасливий,<br />
Я не засуджую себе.<br />
<br />
7 травня. 1999 рік.
 </div>
