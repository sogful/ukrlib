<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сидить на перелазі хлопчик</h1>
  <h2>Віктор Терен</h2>
 </div>
 <div class="prose" id="content">
 Сидить на перелазі хлопчик,<br />
Хоч мама кликала давно.<br />
Збиває прутиком листочки,<br />
Вигукує: — Конячко, но!<br />
А сад, а сонях-самосійко!<br />
А чорнобривці запашні!<br />
І козаченько наш, Василько,<br />
Вже й сам як квітка на коні.
 </div>
