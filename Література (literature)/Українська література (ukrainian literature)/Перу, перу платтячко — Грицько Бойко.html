<body>
<div class="wrap">
 <div class="page-title">
  <h1>Перу, перу платтячко</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Перу, перу платтячко<br />
І хустинки<br />
Для моєї лялечки,<br />
Для Маринки.<br />
Перу, перу платтячко<br />
І співаю,<br />
У вікно на сонечко<br />
Поглядаю.<br />
Вийди, вийди, сонечко,<br />
З-за хмаринки,—<br />
Хай висохне платтячко<br />
Для Маринки.<br />
Буду, буду платтячко<br />
Прасувати,<br />
Буду мою лялечку<br />
Одягати.
 </div>
