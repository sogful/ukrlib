<body>
<div class="wrap">
 <div class="page-title">
  <h1>Грак</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Захотілося граку<br />
З чорного стать білим.<br />
Тричі входив він в ріку,<br />
Тричі мився милом.<br />
А коли пилюку змив,<br />
То ще більше почорнів.<br />
— Кепське мило! — карка грак.<br />
Та чи так?
 </div>
