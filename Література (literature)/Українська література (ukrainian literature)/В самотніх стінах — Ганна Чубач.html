<div class="wrap">
 <div class="page-title">
  <h1>В самотніх стінах</h1>
  <h2>Ганна Чубач</h2>
 </div>
 <div class="prose" id="content">
 В самотніх стінах<br />
Кляла розлуку.<br />
У крайню шибку<br />
Хтось тихо стукав.<br /><br />
Можливо, вітер.<br />
Можливо, вишня.<br />
Та я на стук той<br />
Тоді не вийшла.<br /><br />
Тепер, як серцю<br />
Минулась мука,<br />
У крайню шибку<br />
Ніхто не стука.<br /><br />
Дві довгі тіні<br />
Колишуть тишу —<br />
Можливо, вітру,<br />
Можливо, вишні…
 </div>
