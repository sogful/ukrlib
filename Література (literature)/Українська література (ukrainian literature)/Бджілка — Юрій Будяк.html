<body>
<div class="wrap">
 <div class="page-title">
  <h1>Бджілка</h1>
  <h2>Юрій Будяк</h2>
 </div>
 <div class="prose" id="content">
 Бджілко моя, бджілко,<br />
Тихенька гуділко,<br />
Сідаєш на квіти,<br />
Що садили діти.<br />
Принеси ж медочку<br />
І нам по шматочку,<br />
Принеси до хати.<br />
І для жовтеняти.
 </div>
</div>
