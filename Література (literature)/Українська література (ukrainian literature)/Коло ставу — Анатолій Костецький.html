<body>
<div class="wrap">
 <div class="page-title">
  <h1>Коло ставу</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 Сидить коник у траві<br />
і співа мені й тобі.<br />
Ще й сорока під вербою<br />
щось скрекоче<br />
нам з тобою.<br />
Навіть сонне жабеня<br />
тихо кумкає для нас.<br />
<br />
Тільки<br />
чорний сом вусатий<br />
ліг під корінь —<br />
і мовчить,<br />
щоб води не наковтатись,<br />
або просто<br />
спить...
 </div>
</div>
