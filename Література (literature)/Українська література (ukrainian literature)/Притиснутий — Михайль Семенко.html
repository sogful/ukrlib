<body>
<div class="wrap">
 <div class="page-title">
  <h1>Притиснутий</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Ще нижче поклонись! Ще кланяйсь, кланяйсь!<br />
Вони здобутки всі зараз тобі дали —<br />
І Ігор, і Бальмонт, і Білий, і Чурляніс —<br />
Всі хором і ретельно так гули:<br />
Семенко — кланяйсь, кланяйсь!<br />
— Ні, не схилюсь,<br />
Смерть буде перемогою моєю,<br />
Коли я буду сам,<br />
А коли ні…
 </div>
