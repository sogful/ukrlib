<body>
<div class="wrap">
 <div class="page-title">
  <h1>Безконечна пісенька</h1>
  <h2>Олена Пчілка</h2>
 </div>
 <div class="prose" id="content">
 Був собі журавель<br />
Та журавочка,<br />
Наносили сінця<br />
Повні ясельця.<br />
Наша пісня гарна й нова,—<br />
Почнем її, братця, знова:<br />
Був собі журавель<br />
Та журавочка<br />
<em>(і так далі, без кінця).</em>
 </div>
</div>
