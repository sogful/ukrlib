<body>
<div class="wrap">
 <div class="page-title">
  <h1>Про Вовка промовка</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Завили хижаки несамовито:<br />
— Ви чули?<br />
Вовка вбито!<br />
Ганьба убивці!<br />
Слід покарати кровопивцю!<br />
Це ж бо розбій!<br />
Відвертий тероризмі!!<br /><br />
...Про те ні слова правдолюбці ярі,<br />
Що вбито Вовка у чужій кошарі,<br />
Де Сірий не одне Ягня загриз!
 </div>
