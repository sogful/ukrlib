<body>
<div class="wrap">
 <div class="page-title">
  <h1>Що буде?</h1>
  <h2>Оксана Сенатович</h2>
 </div>
 <div class="prose" id="content">
 Смішинка<br />
<br />
Буде лис дружити<br />
з нашими курми,<br />
як весна до літа<br />
виїде саньми.<br />
<br />
Буде лис картоплю<br />
на вогні пекти,<br />
як возами будуть<br />
по річках плисти.<br />
<br />
Що то буде з лисом,<br />
як побачить лис<br />
сани на колесах,<br />
воза без коліс?..
 </div>
