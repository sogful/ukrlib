<body>
<div class="wrap">
 <div class="page-title">
  <h1>До рожі</h1>
  <h2>Юрій Федькович</h2>
 </div>
 <div class="prose" id="content">
 Зацвіла — світ увеселила!<br />
Про віщо ж ти, питаю я,<br />
Ох боже, рожечко моя,<br />
Лиш свій цвіточок терном вкрила?<br />
О, красна моя ти та мила,<br />
Я знаю чо!.. Та що й казать:<br />
Такий вже в сему світі лад,<br />
Щоб кожда рожа в терню цвіла<br />
Та з терня світ сей веселила!..
 </div>
