<title>Не міг би так</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не міг би так</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Любить сват розповідать,<br />
Як ходив він полювать.<br />
Каже: — Бачу, щось летить...<br />
Бабах!<br />
— І промазав?<br />
— Що ти?<br />
Качку й трьох зайців<br />
Підстрелив одразу! —<br />
А Клим йому:<br />
— Не міг би я,<br />
Признаюся, свате...<br />
— Так полювать? —<br />
— Не міг би я...<br />
Так, як ти, брехати!
 </div>
