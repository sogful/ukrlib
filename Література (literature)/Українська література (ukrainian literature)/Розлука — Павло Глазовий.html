<div class="wrap">
 <div class="page-title">
  <h1>Розлука</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Залишила колись Беба<br />
Мужа свого Льову.<br />
Десь полазила півроку<br />
І прилізла знову.<br />
— Прости мене! — на колінах<br />
Благала-просила.<br />
І сказав їй добрий Льова:<br />
— Бебо моя мила!<br />
У тім, що ти десь тинялась,<br />
Вини не знаходжу,<br />
А що назад повернулась —<br />
Простити не можу!
 </div>
