<body>
<div class="wrap">
 <div class="page-title">
  <h1>У кожусі</h1>
  <h2>Юрій Федькович</h2>
 </div>
 <div class="prose" id="content">
 — Єдиная, коханая<br />
Дівчино моя,<br />
Скажи мені вірну правду,<br />
Чи будеш моя?<br />
— Це лиш знає воскарочка<br />
Та той в небесіх,<br />
А може, й той, що приходить<br />
В новім кожусі!
 </div>
