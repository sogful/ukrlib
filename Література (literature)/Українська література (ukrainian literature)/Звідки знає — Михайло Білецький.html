<body>
<div class="wrap">
 <div class="page-title">
  <h1>Звідки знає</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Подивись на того типа,<br />
Що всміхається мені.<br />
Бідолаха...<br />
Коли б чув ти,<br />
Як хропе він уві сні! —<br />
Чоловік насупив брови:<br />
— Звідки теє тобі знать?!<br />
— Наші столи в установі<br />
Мало не впритул стоять!
 </div>
</div>
