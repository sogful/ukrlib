<title>Людей, звичайно, більше, ніж народу</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Людей, звичайно, більше, ніж народу</h1>
  <h2>Борис Олійник</h2>
 </div>
 <div class="prose" id="content">
 Людей, звичайно, більше, ніж народу&#8230;<br />
Коли виспівує на цілий сход<br />
Любов до людства&#8230; з сотого заходу, &#8211;<br />
Згадай, нарешті, і про свій народ<br />
Хоча б за те, що має він в цю мить<br />
Виконувати каторжну роботу:<br />
За тебе перед людством червоніть.
 </div>
</div>
