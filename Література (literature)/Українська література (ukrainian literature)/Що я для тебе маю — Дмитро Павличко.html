 <div class="page-title">
  <h1>Що я для тебе маю</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 Що я для тебе маю?<br />
Серце! Руки! Уста!<br />
Так, моя сумноока,<br />
Так, моя золота.<br /><br />
Руками тебе обгорну,<br />
Поцілунками обів'ю,<br />
А серце! А в серце своє<br />
Заховаю печаль твою.
