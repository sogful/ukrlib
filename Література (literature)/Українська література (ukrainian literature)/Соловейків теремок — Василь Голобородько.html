<div class="wrap">
 <div class="page-title">
  <h1>Соловейків теремок</h1>
  <h2>Василь Голобородько</h2>
 </div>
 <div class="prose" id="content">
 "Соловейку, соловейку,<br />
де твій теремок?"<br />
"У темних лісах,<br />
на високих деревах.<br />
Тут я живу, тут:<br />
на червоній калині,<br />
на долоні з гілочок,<br />
тут мій теремок,<br />
тут я коло віконця плачу,<br />
сльозами прикликаю дощ променів — день".<br />
<br />
<strong>Джерело: </strong>Веселка, 1991.
 </div>
