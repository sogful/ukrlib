<div class="wrap">
 <div class="page-title">
  <h1>Мати</h1>
  <h2>Марія Влад</h2>
 </div>
 <div class="prose" id="content">
 На лавиці два коники.<br />
Два коники з сиру.<br />
Вставай — пора до школи йти,<br />
Сину.<br /><br />
На лавиці стара мати.<br />
Кінь ірже присилений.<br />
Коли ж тебе виглядати,<br />
Сину?<br /><br />
На лавиці два голуби,<br />
Два голуби сиві.<br />
Третій голуб за горами.<br />
Сину…
 </div>
