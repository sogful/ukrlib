<div class="wrap">
 <div class="page-title">
  <h1>Колискова</h1>
  <h2>Михайло Стельмах</h2>
 </div>
 <div class="prose" id="content">
 <em>За народними мотивами</em><br /><br />
Наш ледащо — мурий кіт —<br />
Тихо вибрався на пліт,<br />
Позирнув собі убік<br />
Та й у хату нишком — скік!<br />
А із хати — в хижку:<br />
— Пошукаю мишку!..—<br />
Миші кіт не відшукав,<br />
А сметану поз&#8217;їдав<br />
Та й ховатися біжить,<br />
А дитя в колисці спить.
 </div>
