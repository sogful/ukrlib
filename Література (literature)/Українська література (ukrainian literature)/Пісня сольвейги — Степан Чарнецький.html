<div class="wrap">
 <div class="page-title">
  <h1>Пісня сольвейги</h1>
  <h2>Степан Чарнецький</h2>
 </div>
 <div class="prose" id="content">
 Кленовим листям вікна вбрала,<br />
А хату — чарами пісень,<br />
З Сольвейги піснею чекала<br />
І ніч і день, і ніч і день.<br /><br />
Кленове листя буря збила,<br />
В ніч задзвонив об шиби страх,<br />
А рано вістка прилетіла,<br />
Що він над Сочею поляг.<br /><br />
***<br /><br />
Джерело:Цифрова Українська Бібліотека.
 </div>
