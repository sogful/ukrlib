<body>
<div class="wrap">
 <div class="page-title">
  <h1>У безкрай, далечінь-дорогу...</h1>
  <h2>Оксана Лятуринська</h2>
 </div>
 <div class="prose" id="content">
 У безкрай, далечінь-дорогу<br />
надломлено я закричу<br />
про самоту і про тривогу,<br />
про дні, яких я не лічу,<br />
про дивовижну німоту<br />
без слів та звуків, про нечулу<br />
німу, глуху, пусту, пусту –<br />
що серце далечі жахнулось.
 </div>
