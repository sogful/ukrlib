 <div class="page-title">
  <h1>Нахаба</h1>
  <h2>Петро Ребро</h2>
 </div>
 <div class="prose" id="content">
 Коли душа його лишала тіло,<br />
Він тільки переможно посміхався:<br />
Хоч лікарі того і не хотіли,<br />
Та він без черги<br />
все-таки пропхався!
 </div>
