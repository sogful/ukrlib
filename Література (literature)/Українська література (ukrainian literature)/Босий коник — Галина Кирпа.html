<body>
<div class="wrap">
 <div class="page-title">
  <h1>Босий коник</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Конику, конику,<br />
ти хіба не чув,<br />
що не ходять<br />
коники взуті<br />
по дощу?<br /><br />
Слизько тоді<br />
ніженькам<br />
по траві —<br />
чи тих ніжок<br />
двісті,<br />
а чи дві.
 </div>
