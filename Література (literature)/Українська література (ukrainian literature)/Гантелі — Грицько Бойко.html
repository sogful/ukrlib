<body>
<div class="wrap">
 <div class="page-title">
  <h1>Гантелі</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Гантелі купив<br />
Тимішко,<br />
І кинув він їх<br />
Під ліжко.<br />
<br />
Лежать вони там<br />
Без діла,<br />
Лежать-припадають<br />
Пилом.<br />
<br />
Чому ж не бере<br />
Тимішко<br />
Гантелі свої<br />
З-під ліжка?<br />
<br />
Багато на них<br />
Пилюки:<br />
Не хоче бруднити<br />
Руки!
 </div>
