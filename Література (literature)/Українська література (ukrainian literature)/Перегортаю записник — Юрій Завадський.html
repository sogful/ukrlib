 Перегортаю записник,<br />
Коли нестає сил.<br />
<br />
Люди зо зброєю:<br />
— Вiршi можна писати олiвцем,<br />
На старих ґазетах, кривавих сорочках,<br />
Вугликом на бетоннiй стiнi,<br />
В окопах,<br />
Коли на тебе плюють<br />
I стають чоботами...<br />
