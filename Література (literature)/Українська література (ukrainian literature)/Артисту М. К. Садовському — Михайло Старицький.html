 <div class="page-title">
  <h1>Артисту М. К. Садовському</h1>
  <h2>Михайло Старицький</h2>
 </div>
 <div class="prose" id="content">
 <em>(Експромт у день бенефісу)</em><br /><br />
Артисте, друже, чудодіє,<br />
Віншую з святом я тебе.<br />
Най твій талант всім серцем гріє<br />
І підживля усе слабе…<br />
Най усміхнеться Неньці доля,<br />
Тобі ж сповнить сакви сріблом,<br />
Нехай твоя міцніша воля<br />
Зігріти рідний край теплом!
