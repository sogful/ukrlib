<body>
<div class="wrap">
 <div class="page-title">
  <h1>Невгамований, невтамований...</h1>
  <h2>Марина Соколян</h2>
 </div>
 <div class="prose" id="content">
 Невгамований, невтамований<br />
Дикий вітер,<br />
Вітер пусткою загартований,<br />
Несамовитий!<br />
Ти навіщо, давно засуджений,<br />
Повернувся,<br />
До землі тілом збудженим<br />
Доторкнувся?<br />
Не знайти тобі, лиховій,<br />
Тут оселі.<br />
Здіймеш куряву вихором,<br />
Пил пустелі.
 </div>
