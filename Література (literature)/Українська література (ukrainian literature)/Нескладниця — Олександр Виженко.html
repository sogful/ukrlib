<div class="wrap">
 <div class="page-title">
  <h1>Нескладниця</h1>
  <h2>Олександр Виженко</h2>
 </div>
 <div class="prose" id="content">
 Ось така є нескладниця:<br />
Сів комарик на лежницю;<br />
Сів, – і миттю провалився,<br />
В синім небі опинився.<br />
А на небі під землею<br />
Бородата шаста фея:<br />
На ногах серіжки,<br />
На вухах – босоніжки.
 </div>
