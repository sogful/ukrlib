<body>
<div class="wrap">
 <div class="page-title">
  <h1>Такий дійде!</h1>
  <h2>Василь Василашко</h2>
 </div>
 <div class="prose" id="content">
 "Дійшов до ручки й далі йде" —<br />
Так Єжи Лєц підмітив влучно.<br />
Такий, додам, і в рай ввійде —<br />
Була б лишень на дверях ручка...<br />
ахілЛесова п’ята<br />
Щоб мати ахіллесову п’яту,<br />
Не конче Ахіллесом бути мусиш —<br />
Для цього досить в п’ятку ту<br />
Від переляку заховати душу.
 </div>
