</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Запрошення (Я покажу вам безліч світів)</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Я покажу вам безліч світів —<br />
Оригінальних і капризних.<br />
Я покажу вам безліч шляхів —<br />
Хто хоче мого духа визвать?<br />
<br />
Ми проходимо до останнього пункту.<br />
Ми перемогли всі стихії й дощі.<br />
Я відчинив двері замкнуті —<br />
Хто хоче зі мною гулять вночі?
 </div>
</div>
