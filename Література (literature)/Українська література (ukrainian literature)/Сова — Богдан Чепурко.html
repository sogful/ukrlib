<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сова</h1>
  <h2>Богдан Чепурко</h2>
 </div>
 <div class="prose" id="content">
 Знає сива сова<br />
невідомі слова.<br />
<br />
Дуже мудра сова.<br />
О-Т-ТАКА ГОЛОВА!<br />
<br />
Як заухка бува —<br />
в лісі все ожива.<br />
<br />
Але ранком сова<br />
не кричить, не співа.<br />
<br />
Спить у дубі сова —<br />
сипле сон з рукава.
 </div>
</div>
