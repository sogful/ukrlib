<div class="wrap">
 <div class="page-title">
  <h1>В моїх повіках напівсонних...</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 В моїх повіках напівсонних<br />
Застигло сонце молоде.<br />
Як бджолами покритий сонях,<br />
Воно так міниться й гуде.<br />
<br />
Між сновидінням і явою<br />
В моїй сльозі стоїш і ти,<br />
І над твоєю головою<br />
Палають соняшні світи.
 </div>
