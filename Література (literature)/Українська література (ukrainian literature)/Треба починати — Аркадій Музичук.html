<body>
<div class="wrap">
 <div class="page-title">
  <h1>Треба починати</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 Перед батьками донька Люба<br />
Поставила питання руба:<br />
— Виходжу заміж я за Гриця!<br />
— Та він же ледар і п'яниця! —<br />
Ледь не зірвала голос мати.<br />
— Із когось треба ж починати!
