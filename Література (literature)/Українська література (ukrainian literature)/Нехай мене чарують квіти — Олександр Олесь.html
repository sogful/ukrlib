<body>
<div class="wrap">
 <div class="page-title">
  <h1>Нехай мене чарують квіти</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Нехай мене чарують квіти,<br />
Нехай життя їм віддаю:<br />
Ніяк я барвами досхочу<br />
Своїх очей не напою.<br /><br />
Нехай і так… але довіку<br />
Я не лишуся в їх саду:<br />
В останню ніч я вийду в поле<br />
І біля травоньки впаду.
 </div>
