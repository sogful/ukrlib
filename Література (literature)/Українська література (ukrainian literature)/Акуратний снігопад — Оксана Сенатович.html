<body>
<div class="wrap">
 <div class="page-title">
  <h1>Акуратний снігопад</h1>
  <h2>Оксана Сенатович</h2>
 </div>
 <div class="prose" id="content">
 Сів Іванко, пише: САД...<br />
Помилився — вийшло: ПАД.<br />
Перекреслювать негоже —<br />
"П" образитися може.<br />
— Хай вже п а д той буде п а д о м,<br />
почекає трохи сад.<br />
Допишу я СНІГ — і буде<br />
акуратний СНІГОПАД.
 </div>
