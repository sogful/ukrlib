<body>
<div class="wrap">
 <div class="page-title">
  <h1>Твоя мета</h1>
  <h2>Григорій Фалькович</h2>
 </div>
 <div class="prose" id="content">
 Своя мета життя &#8211; в кота.<br />
Мабуть, не та мета &#8211; в кита.<br />
Та й в них, напевне, не така,<br />
Як у гиндика чи бика.<br />
А у бика, вважаю я,<br />
Мета &#8211; інакша, ніж моя.<br />
Вже чималі й твої літа.<br />
Скажи, яка твоя мета?..
 </div>
</div>
