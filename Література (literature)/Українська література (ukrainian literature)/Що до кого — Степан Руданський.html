  <h1>Що до кого</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 "Хто йде їсти?" — пан питає.<br />
"Я йду!" — циган каже.<br />
"Хто йде жати?" — пан питає.<br />
"То громада скаже!"
