<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сонячний зайчик</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 На краю дзвінкого світу,<br />
там, де соняхи,<br />
волошковим небом сніда<br />
зайчик сонячний.<br />
<br />
Вдень у піжмурки по лісу<br />
гра з кульбабами,<br />
заплітає в тепле листя<br />
літо бабине.<br />
<br />
А під вечір між кущами<br />
плаче, стомлений,<br />
бо живе один, без мами,<br />
зайчик сонячний.
 </div>
</div>
</body>
