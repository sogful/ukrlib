<title>Вже обрії посивіли...</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вже обрії посивіли...</h1>
  <h2>Святослав Гординський</h2>
 </div>
 <div class="prose" id="content">
 Вже обрії посивіли<br />
В передосінній млі,<br />
Глянь, відлітають вивільги<br />
До теплої землі.<br />
<br />
Бліді проса покошено,<br />
Блукаю по стерні,<br />
Десь між весною й осеню<br />
Мої згубились дні.
 </div>
</div>
