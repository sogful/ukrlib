<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вітер</h1>
  <h2>Володимир Свідзінський</h2>
 </div>
 <div class="prose" id="content">
 Тече берізка<br />
Тремтячим блиском,<br />
За буйним вітром<br />
Простягши гілля;<br />
Могучі клени<br />
Свій шум зелений<br />
Бурхливо клонять<br />
На свіже зілля.<br /><br />
А буйне збіжжя<br />
Аж до обніжжя<br />
Горбів далеких<br />
Кипить розливне,<br />
І все, здається,<br />
Біжить, сміється<br />
У слід блакитний,<br />
За днем поривним.
 </div>
