<body>
<div class="wrap">
 <div class="page-title">
  <h1>Фламінго</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Рожевого птаха<br />
Природа створила,<br />
Лиш чорне на дзьобі<br />
Та трішки — на крилах.<br />
Ступає граційно,<br />
Тримається рівно,<br />
Мов вийшов на свято<br />
Рожевий фламінго.
 </div>
