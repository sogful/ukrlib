<body>
<div class="wrap">
 <div class="page-title">
  <h1>Гливка психіатрія домагань...</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 Гливка психіатрія домагань<br />
не безконечна. Обсихають банти<br />
розвішень наших. Безвісти прости.<br /><br />
Життя як розкурочений наган:<br />
ні вцілити не здатне Божі ґранди,<br />
ані в кишені жах його нести.
 </div>
</div>
