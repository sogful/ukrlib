<body>
<div class="wrap">
 <div class="page-title">
  <h1>Конвалії</h1>
  <h2>Марія Познанська</h2>
 </div>
 <div class="prose" id="content">
 Із зеленої сорочки,<br />
Що зіткав весною гай,<br />
Білі дивляться дзвіночки.<br />
Як зовуть їх – угадай!<br />
Це конвалії у гаї<br />
На галявині цвітуть.<br />
І ніде, ніде немає<br />
Кращих квіточок, мабуть.<br />
В них так пахощів багато,<br />
Цвіту свіжого, роси.<br />
Хай ростуть, не буду рвати, –<br />
Шкода їхньої краси!
 </div>
