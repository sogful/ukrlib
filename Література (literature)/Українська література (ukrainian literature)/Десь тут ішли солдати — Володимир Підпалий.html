<body>
<div class="wrap">
 <div class="page-title">
  <h1>Десь тут ішли солдати</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Десь тут ішли солдати<br />
в літню пекучу днину…<br />
Десь не діждала мати<br />
з бою додому сина…<br />
В'яне холодна рута,<br />
паморозь вкрила скроні…<br />
Горя повік не забути,<br />
сльози навік солоні…<br />
Ліки які шукати,<br />
рану її зцілити…<br />
Станьте поруч солдаток,<br />
чесні солдатські діти!
 </div>
