<body>
<div class="wrap">
 <div class="page-title">
  <h1>Кит і китиха</h1>
  <h2>Оксана Кротюк</h2>
 </div>
 <div class="prose" id="content">
 В кита запитала тихенько китиха:<br />
"Чому океан називається Тихий?"<br />
"Тому океан називається Тихий,<br />
Що ти в мене тиха, кохана китихо". —<br />
Погодилась лагідна тиха китиха:<br />
"І ти в мене тихий, і я в тебе тиха".
 </div>
