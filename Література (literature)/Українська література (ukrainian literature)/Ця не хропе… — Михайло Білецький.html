<title>Ця не хропе…</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ця не хропе…</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Помолодшали, дідусю,<br />
Ходите героєм!<br />
— Ще б, — сміється, — глек розбив я<br />
З моєю старою.<br />
Так хропла, бувало, ніччю —<br />
Гармати не треба!<br />
Розлучився...<br />
Взяв удвічі<br />
Молодшу за себе.<br />
Нині сплю, як після маку,<br />
Нічого не чую.<br />
— Ця не хропе?<br />
— Ні...<br />
Ця зовсім<br />
Дома не ночує!
 </div>
