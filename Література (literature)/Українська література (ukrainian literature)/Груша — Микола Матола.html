<body>
<div class="wrap">
 <div class="page-title">
  <h1>Груша</h1>
  <h2>Микола Матола</h2>
 </div>
 <div class="prose" id="content">
 Петрик грушу малював,<br />
Своїх фарб не шкодував,<br />
Довго мучився й старався,<br />
Тому груша і вдалася.<br />
Він поніс малюнок мамі.<br />
Мама сплеснула руками:<br />
— Ну й смачнючу змалював,<br />
Ніби з дерева зірвав!<br />
Петрик тихо відповів:<br />
— Я її ледь-ледь не з'їв.
 </div>
