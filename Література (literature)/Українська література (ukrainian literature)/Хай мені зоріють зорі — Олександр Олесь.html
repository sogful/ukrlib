<div class="wrap">
 <div class="page-title">
  <h1>Хай мені зоріють зорі...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Хай мені зоріють зорі,<br />
Доки сонце моє спить...<br />
Човен мій в бурхливім морі<br />
Серед гострих скель летить.<br />
<br />
Вже недовго ранку ждати —<br />
В хмарах папороть цвіте...<br />
Це іде мене стрівати<br />
Моє сонце золоте.
 </div>
