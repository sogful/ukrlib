<div class="wrap">
 <div class="page-title">
  <h1>Розмова</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 – Літак?<br />
– Так!<br />
– У вікні?<br />
– Ні,<br />
он там.<br />
– Сам?<br />
– Не сам,<br />
із хмариною<br />
темно-синьою.<br />
– Так то ж місяць<br />
небо місить,<br />
хлібчик сонця пече.<br />
– А хмара?<br />
– Гаряча пара<br />
від хлібця в небо тече.
 </div>
