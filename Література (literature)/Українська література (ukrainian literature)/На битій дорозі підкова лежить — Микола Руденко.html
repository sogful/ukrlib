<body>
<div class="wrap">
 <div class="page-title">
  <h1>На битій дорозі підкова лежить</h1>
  <h2>Микола Руденко</h2>
 </div>
 <div class="prose" id="content">
 На битій дорозі підкова лежить.<br />
Вилизує хвиля німі береги.<br />
В нікуди, в нікуди дорога біжить —<br />
В затоплені морем луги.<br /><br />
Над вербами тягне димком від села,<br />
А змучена думка волає одно:<br />
В нікуди, в нікуди дорога лягла —<br />
Кудись на замулене дно.
 </div>
