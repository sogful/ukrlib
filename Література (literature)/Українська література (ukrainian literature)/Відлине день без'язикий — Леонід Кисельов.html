 <div class="page-title">
  <h1>Відлине день без'язикий...</h1>
  <h2>Леонід Кисельов</h2>
 </div>
 <div class="prose" id="content">
 Відлине день без'язикий<br />
І чути в тиші нічній:<br />
Люди, дерева, ріки<br />
Тужно кричать: "Не бий!".<br /><br />
Затулити вуха. Заплющити очі.<br />
А втім не варто, бо я вже звик.<br />
Щогодини, щодня, щоночі,<br />
Немов білокрів'я, ковтати крик.<br /><br />
1968
 </div>
