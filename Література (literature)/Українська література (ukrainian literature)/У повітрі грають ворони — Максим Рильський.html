<div class="wrap">
 <div class="page-title">
  <h1>У повітрі грають ворони...</h1>
  <h2>Максим Рильський</h2>
 </div>
 <div class="prose" id="content">
 У повітрі грають ворони,<br />
Значить — от уже й весна...<br />
Скільки це разів говорене,<br />
А не сказане до дна!<br />
<br />
Березневою синицею<br />
Сад напружений дзвенить,<br />
І тебе, смагляволицьої,<br />
Я не можу не любить!<br />
<br />
1 березня 1939 р., Ірпінь
 </div>
