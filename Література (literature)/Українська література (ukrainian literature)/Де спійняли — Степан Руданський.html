<title>Де спійняли</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Де спійняли</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 "А чи знаєш ти, Романе,<br />
Батько під судом:<br />
Іспійняли неборака<br />
Над чужим добром…"<br /><br />
"Мого батька?.. Де спійняли?"<br />
Циганчук спитав.<br />
"Таки в нашії ж коморі —<br />
Бодню розбивав".<br /><br />
"Та в коморі й горобцеві<br />
Крила одшибеш…<br />
Ні! Пусти-но батька в поле!<br />
Чи тогді піймеш?"
 </div>
</div>
</body>
