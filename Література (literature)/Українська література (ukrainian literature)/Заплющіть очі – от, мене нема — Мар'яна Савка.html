<div class="wrap">
 <div class="page-title">
  <h1>Заплющіть очі – от, мене нема...</h1>
  <h2>Мар'яна Савка</h2>
 </div>
 <div class="prose" id="content">
 Заплющіть очі – от, мене нема.<br />
У теплих барвах міниться картина.<br />
Там, на сліпучо-свіжих килимах,<br />
Пасеться кінь. І пахне конюшина.<br />
<br />
А я – дитина. Ноги у росі.<br />
Синці на литках. Вигорілі пасма.<br />
І проступають в сонячній ясі<br />
І я, і кінь, якого я не пасла.
 </div>
