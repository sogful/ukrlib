<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хоробрі хробаки</h1>
  <h2>Григорій Фалькович</h2>
 </div>
 <div class="prose" id="content">
 Два хор-р-р-ро-брі хробаки<br />
Й два сміл-л-ли-ві слимаки<br />
Закладалися на гріш,<br />
Хто з них бігає скоріш.<br />
А дистанція така –<br />
До трухлявого пенька.<br />
Скоро землю вкриє сніг,<br />
Та ніхто ще не добіг.
 </div>
</div>
