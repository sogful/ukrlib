<div class="wrap">
 <div class="page-title">
  <h1>Думка</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Дружили ми, а пройдуть літа,<br />
І, може, стрінемось не ті;<br />
Душа, мов пустка неогріта,<br />
Перехолоне у чутті.<br />
<br />
Загасне світле чарування,<br />
Насунуть сірі, темні дні...<br />
Та не забудьмо почування,<br />
Що нас єднало до борні!
 </div>
