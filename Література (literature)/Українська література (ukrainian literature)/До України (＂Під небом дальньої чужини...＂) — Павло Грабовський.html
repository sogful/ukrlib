<body>
<div class="wrap">
 <div class="page-title">
  <h1>До України ("Під небом дальньої чужини...")</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Під небом дальньої чужини,<br />
Де хуги носяться одні,<br />
До тебе, кращої дружини,<br />
Складаю я мої пісні.<br />
<br />
І випливаєш ти над мене<br />
У тій збагніченій красі,<br />
Що не зруйнують, серце-нене,<br />
Твої пекельники усі!
 </div>
</div>
