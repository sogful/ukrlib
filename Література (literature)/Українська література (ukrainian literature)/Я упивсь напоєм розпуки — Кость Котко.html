 <div class="page-title">
  <h1>Я упивсь напоєм розпуки...</h1>
  <h2>Кость Котко</h2>
 </div>
 <div class="prose" id="content">
 Я упивсь напоєм розпуки.<br />
Я хорий своїм одчаєм.<br />
Не волію ні життя, ні штуки,<br />
Нічого не бажаю.<br />
<br />
Ах, ідіть ви з вашою весною.<br />
Не хочу щастя, ні горя…<br />
<br />
Я упився розпуки напоєм,<br />
Своїм одчаєм хорий.
 </div>
