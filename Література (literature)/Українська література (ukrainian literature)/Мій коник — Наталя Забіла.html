<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мій коник</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 Я мав колись-то коника,<br />
що звався Сірячок.<br />
Я дав його раз дівчинці<br />
поїхать на товчок.<br /><br />
Вона шмагала коника<br />
ще й била батіжком,<br />
вона ганяла коника<br />
болотяним лужком&#8230;<br /><br />
Навіщо дав їй коника! —<br />
я дуже шкодував,<br />
і вже ніколи коника<br />
дівчаткам не давав!
 </div>
</div>
