<div class="wrap">
 <div class="page-title">
  <h1>Замовкніть всі: великий час прийшов...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Замовкніть всі; великий час прийшов.<br />
Мовчать в сю мить громи-гармати,<br />
Схилилась наша хоругов,<br />
І на коліна стала мати,<br />
На терезах життя і смерті ми,<br />
І хтось один з них переваже...<br />
Коли життя — гриміть, громи!<br />
За волю кожний з нас поляже!<br />
<br />
1916
 </div>
