<body>
<div class="wrap">
 <div class="page-title">
  <h1>Відблиски</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 З самого ранку з дня капали сльози<br />
Переплакав день лише надвечір<br />
Заспокоївся кинув хникати і хлюпати погрози<br />
Хусткою втирає очі й походжає по скверу<br />
Трамвай веселий блискає в темних калюжах.<br />
Привітно дивляться на вулицю ілюзіонні фойе.<br />
Чому ж ти тужиш,<br />
Серце моє?
 </div>
