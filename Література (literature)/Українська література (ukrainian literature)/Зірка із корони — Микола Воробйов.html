<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зірка із корони</h1>
  <h2>Микола Воробйов</h2>
 </div>
 <div class="prose" id="content">
 Загубив мухомор,<br />
мухомор червоний<br />
зірку-пелюстинку<br />
зі своєї корони.<br />
<br />
Ходе скрізь,<br />
придивляється.<br />
Коли це їжачок<br />
із гори спускається:<br />
<br />
— Здоров був,<br />
чи не ти<br />
білу зірку забув?<br />
<br />
— Ох, я вам дуже дякую! —<br />
мухомор зрадів,<br />
аж заплакав
 </div>
