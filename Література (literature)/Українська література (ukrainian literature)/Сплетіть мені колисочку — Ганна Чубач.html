<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сплетіть мені колисочку</h1>
  <h2>Ганна Чубач</h2>
 </div>
 <div class="prose" id="content">
 <em>Ніні Матвієнко</em><br /><br />
Сплетіть мені колисочку<br />
Для моєї тиші.<br />
Нехай долю нерозумну<br />
Я в ній приколишу.<br />
Колисочка вербовая,<br />
Ой люленьки-люлі…<br />
Забарилась любов моя<br />
На вечірні гулі.<br />
Колисочка, колисочка,<br />
Вервечки шовкові,<br />
Я лозиночкою сохну<br />
Від тої любові…
 </div>
