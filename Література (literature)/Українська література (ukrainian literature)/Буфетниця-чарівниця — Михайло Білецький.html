 <div class="page-title">
  <h1>Буфетниця-чарівниця</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Як посміхнеться, як погляне,<br />
У покупця серденько тане.<br />
Така красуня ще де є?<br />
Жаль тільки...<br />
Здачі не дає!
