<body>
<div class="wrap">
 <div class="page-title">
  <h1>Почала хвалити</h1>
  <h2>Петро Гришко</h2>
 </div>
 <div class="prose" id="content">
 Довгенько по сусідству у Свині жила Кобила,<br />
Але Свиня її ніколи не хвалила,<br />
А це взялася вихвалять сусідоньку свою:<br />
Гніда дозволила поритись у гною.
 </div>
