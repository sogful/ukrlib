 <div class="page-title">
  <h1>Антистрофа</h1>
  <h2>Павло Тичина</h2>
 </div>
 <div class="prose" id="content">
 Дорослі й семилітні: "Ой, яблочко, да куда котишься".<br />
Так. Народ у толоку, а поети в борозну.<br />
Годі ж кривитись на фабричну: предтеча завше<br />
менш талановитий за месії.
