<div class="wrap">
 <div class="page-title">
  <h1>Вечір</h1>
  <h2>Борис Грінченко</h2>
 </div>
 <div class="prose" id="content">
 На землю вже тихий<br />
Скрізь вечір лягає;<br />
З високого неба<br />
Вже місяць сіяє;<br />
Затихла і пташка,<br />
І людська розмова,<br />
Мовчить, не шепоче<br />
Зелена діброва.<br />
І в мене на серці<br />
Так тихо все стало,<br />
Немовби те серце<br />
Заснуло і спало...<br />
<br />
1883
 </div>
