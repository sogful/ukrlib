<body>
<div class="wrap">
 <div class="page-title">
  <h1>Невинний Мошко</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 "Куди, Мошку, так ідеш?"<br />
"На війну виходжу!"<br />
"А чого ж то пізно так?"<br />
"Ще два-три положу!"<br /><br />
"А як тебе часом хто<br />
Схоче положити?"<br />
"А кому ж я винен що?<br />
За що ж мене бити?"
 </div>
