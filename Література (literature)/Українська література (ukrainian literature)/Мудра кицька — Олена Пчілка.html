<div class="wrap">
 <div class="page-title">
  <h1>Мудра кицька</h1>
  <h2>Олена Пчілка</h2>
 </div>
 <div class="prose" id="content">
 У збаночку молоко,—<br />
Ох, то штука ловка!<br />
Та як його скуштувать?<br />
Не влізе головка!&#8230;<br />
Наша киця дуже мудра —<br />
Способу добрала:<br />
У той кухличок вузенький<br />
Хвостика вмочала.<br />
Отже кухлик не звалила,<br />
Зробила обачно,<br />
Тепер хвостик витягає,<br />
Облизує смачно!
 </div>
