<div class="wrap">
 <div class="page-title">
  <h1>Березнева хмара</h1>
  <h2>Микола Сингаївський</h2>
 </div>
 <div class="prose" id="content">
 Березнева хмара –<br />
місяцю не пара.<br />
Вийшов місяць із-за бору<br />
вгору йде та вгору.<br /><br />
Розірвав сувої<br />
хмари весняної.<br />
І віщує на догоду<br />
нам усім погоду.<br /><br />
Дзвонить місяць денцем,<br />
ніби чую серцем,<br />
що весна гуляє бором –<br />
струни перебором.
 </div>
