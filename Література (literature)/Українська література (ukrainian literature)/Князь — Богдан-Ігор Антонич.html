<div class="wrap">
 <div class="page-title">
  <h1>Князь</h1>
  <h2>Богдан-Ігор Антонич</h2>
 </div>
 <div class="prose" id="content">
 Ще гори куряться від снігу,<br />
сім стріл неначе сім пісень,<br />
і юнака вітає день<br />
окриленим найменням: Ігор.<br />
<br />
Горять скрипки в весільній брамі,<br />
на ній стобарвний прапор дня.<br />
Іду в захопленні й нестямі,<br />
весни розспіваної князь.
 </div>
