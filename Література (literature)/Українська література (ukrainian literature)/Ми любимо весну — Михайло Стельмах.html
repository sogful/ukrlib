<title>Ми любимо весну</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ми любимо весну</h1>
  <h2>Михайло Стельмах</h2>
 </div>
 <div class="prose" id="content">
 Ми любимо весну,<br />
зелену, чудесну,<br />
грімницю у тучі,<br />
і дощик співучий,<br />
і луки широкі,<br />
і ріки глибокі,<br />
і поле веселе,<br />
і рідні оселі,<br />
і цвіт у маю &#8211;<br />
всю землю свою.
 </div>
</div>
