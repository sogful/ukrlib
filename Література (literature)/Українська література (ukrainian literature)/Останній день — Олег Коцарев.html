<body>
<div class="wrap">
 <div class="page-title">
  <h1>Останній день</h1>
  <h2>Олег Коцарев</h2>
 </div>
 <div class="prose" id="content">
 Не було<br />
Ні ангелів, ні труб,<br />
Була салатова блискавка,<br />
Чорна трава<br />
Заглядала<br />
В вікна,<br />
А на даху<br />
Ситий з голодним<br />
Починали розуміти<br />
Одне одного.<br />
<br />
8 липня. 2000 рік.
 </div>
