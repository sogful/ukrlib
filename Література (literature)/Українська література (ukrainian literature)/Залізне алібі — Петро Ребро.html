<body>
<div class="wrap">
 <div class="page-title">
  <h1>Залізне алібі</h1>
  <h2>Петро Ребро</h2>
 </div>
 <div class="prose" id="content">
 Рікою ллються сльози у дружини:<br />
Опівночі з'явився чоловік.<br />
— І знову був у клятої Горпини,<br />
Бодай би ти її не бачив вік!<br /><br />
— Це, звісно, факт, що я вернувся пізно, —<br />
Їй чоловік у відповідь прогув, —<br />
Але ж у мене алібі залізне —<br />
Я цілий вечір у Марини був!
 </div>
