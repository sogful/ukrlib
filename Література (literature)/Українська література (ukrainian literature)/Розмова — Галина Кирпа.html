 <div class="page-title">
  <h1>Розмова</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 — Березню, де дів санчата?<br />
— Та узяв продав.<br />
— Хочеш човника придбати?<br />
— Та узяв придбав.<br />
— І куди ж це ти веслуєш?<br />
У які краї?<br />
— Та в зелені, у вишневі,<br />
у краї свої.
