  <h1>Жита – в зеленому розливі...</h1>
  <h2>Олександр Лан</h2>
 </div>
 <div class="prose" id="content">
 Жита – в зеленому розливі<br />
Пахучим літеплом течуть.<br />
– Куди ви, сонячні, куди ви?<br />
В яку рожеву путь?<br />
<br />
– Устав розхристаний зі сходу<br />
Пісні гудками на весь світ.<br />
Йому, чорнявому заводу,<br />
Зелений наш привіт!
