<div class="wrap">
 <div class="page-title">
  <h1>Ередіа</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Це було увечері, коли місто вібрує стумливо.<br />
Це було на тім тижні у середу.<br />
Вона стояла, дивилась у очі задумливо.<br />
Зграйна, як сонет Ередіа.<br /><br />
Так, це тоді (було).
 </div>
