<body>
<div class="wrap">
 <div class="page-title">
  <h1>Щось у мені тремтить</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 Щось у мені тремтить,<br />
Як зимове повітря.<br />
Несхопне, наче мить,<br />
Студене, наче вістря.<br /><br />
То я тобою вщерть<br />
Наповнив душу, мила,<br />
Ти ж думала про смерть,<br />
Коли мене любила.
 </div>
