<body>
<div class="wrap">
 <div class="page-title">
  <h1>Батьківщина</h1>
  <h2>Микола Сингаївський</h2>
 </div>
 <div class="prose" id="content">
 Я сьогодні стояв у мовчанні,<br />
хоч дивився на нього давно, –<br />
краєвид, як здається,<br />
звичайний,<br />
тільки проситься на полотно.<br /><br />
Дайте барви,<br />
ліси і поля&#8230;<br />
Найрідніша, як рідна колиска,<br />
наша отча священна земля –<br />
Батьківщина моя і твоя<br />
біля воїна-обеліска.
 </div>
</div>
