 <div class="page-title">
  <h1>Гуцульська пісня</h1>
  <h2>Степан Чарнецький</h2>
 </div>
 <div class="prose" id="content">
 Мою колиску шум смерек пестив<br />
І Пруту шуми;<br />
Понад колибу зимний вітер вив<br />
Болючі думи.<br /><br />
Мені табір овець ріднею став<br />
У полонині;<br />
Вже змалку — гей! — я верхи покохав<br />
Та срібно-сині…<br /><br />
***<br /><br />
Джерело:Цифрова Українська Бібліотека.
