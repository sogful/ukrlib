<title>Дятел</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дятел</h1>
  <h2>Михайло Стельмах</h2>
 </div>
 <div class="prose" id="content">
 По рецепту на базарі<br />
Дятел вибрав окуляри,<br />
Натягнув собі на ніс,<br />
Полетів трудитись в ліс.<br />
У осінню хмуру пору<br />
Хитрий жук зашивсь під кору.<br />
Дятел глянув, сів на сук,<br />
Носом тук — і згинув жук.<br />
От які то окуляри<br />
Вибрав дятел на базарі!
 </div>
