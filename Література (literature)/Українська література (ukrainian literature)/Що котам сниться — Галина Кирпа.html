<div class="wrap">
 <div class="page-title">
  <h1>Що котам сниться</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Просинаюсь і питаю тата:<br />
— А чи тепло тобі, тату, спати?<br />
А чи Сонько сон тобі колише?<br />
А котам сняться квіти чи миші?<br />
А чи є де вітру ночувати?<br />
Як нема — поклич його до хати.<br />
Хай розкаже він нам, наколише,<br />
що котам сниться — квіти чи миші?
 </div>
