<title>Хто вона?</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хто вона?</h1>
  <h2>Леонід Глібов</h2>
 </div>
 <div class="prose" id="content">
 Лиха зима сховається,<br />
А сонечко прогляне,<br />
Сніжок води злякається,<br />
Тихенько тануть стане, —<br />
І здалеку бистресенько<br />
Вона до нас прибуде,<br />
Кому-кому любесенько,<br />
А діткам більше буде.
 </div>
