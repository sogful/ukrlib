<body>
<div class="wrap">
 <div class="page-title">
  <h1>Путь</h1>
  <h2>Микола Хвильовий</h2>
 </div>
 <div class="prose" id="content">
 Мороз у зорях блимав<br />
безкольорово —<br />
…сон.<br />
Співали сани на путі<br />
Сріблясту пісню про сніги.<br />
Співали сани на путі.<br />
І сни далекі (сни весни)…<br />
і снилась осінь у осоках…<br />
Про сині роси на світанку<br />
Співали сани на путі…<br />
Мороз у зорях блимав.<br />
Ми їхали<br />
на північ<br />
полем<br />
сніговим.
 </div>
