<body>
<div class="wrap">
 <div class="page-title">
  <h1>Перестаралась</h1>
  <h2>Євген Бандуренко</h2>
 </div>
 <div class="prose" id="content">
 Звичним рухом гумку вірну<br />
Вийнявши з пенала,<br />
Заходилась двійку жирну,<br />
Витирати Алла.<br />
<br />
І сама собі всміхнулась:<br />
"Виведу п'ятірку!"<br />
Посміхнулась та й незчулась,<br />
Як протерла дірку…
 </div>
