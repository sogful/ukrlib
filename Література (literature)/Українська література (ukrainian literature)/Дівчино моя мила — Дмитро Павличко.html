<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дівчино моя мила</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 Дівчино моя мила,<br />
Ти блискавкою брови<br />
Сонце мені затьмила.<br /><br />
Глянь, чаклування дівчаче, –<br />
Шукає поводиря<br />
Серце моє незряче.<br /><br />
Може, на переходах<br />
Ти руку йому даси,<br />
Ніжну й легку, як подих.<br /><br />
Доти життя, допоки<br />
Ти будеш його вести –<br />
Хоч би й чотири кроки!
 </div>
