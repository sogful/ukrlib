<div class="wrap">
 <div class="page-title">
  <h1>Журавлики-журавлі</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Журавлики-журавлі,<br />
Де літали ви, малі,<br />
Де бували?<br />
<br />
— Ми у теплі краї,<br />
У казкові гаї<br />
Мандрували.<br />
<br />
— Розкажіть, журавлі,<br />
Як на дальній землі<br />
Зимували?<br />
<br />
— Ми в казкових гаях<br />
Все по рідних краях<br />
Сумували.
 </div>
