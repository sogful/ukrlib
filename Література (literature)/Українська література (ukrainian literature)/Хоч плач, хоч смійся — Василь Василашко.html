<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хоч плач, хоч смійся</h1>
  <h2>Василь Василашко</h2>
 </div>
 <div class="prose" id="content">
 Вдягнув спідницю клоун і — дива:<br />
Забув народу рідного слова.<br />
Під регіт п’яний суржиком співа.<br />
І нескінченне бачимо кіно:<br />
не він і не вона, а лиш — в о н о !
 </div>
</div>
