<div class="wrap">
 <div class="page-title">
  <h1>Ночанка та Дитянка</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 Ночанка та Дитянка<br />
у мороку нічному<br />
все ходять, ходять сходами<br />
від дому і до дому,<br />
тихенько прокрадаються<br />
до кожного двора,<br />
крізь вікна придивляються,<br />
крізь двері прислухаються:<br />
Чи всі вже діти в ліжечках?
 </div>
