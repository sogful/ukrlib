<body>
<div class="wrap">
 <div class="page-title">
  <h1>Кавуни</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Кавунів з баштанів<br />
Навезли до двору.<br />
Кавуеів-смуганів<br />
Височені гори.<br />
<br />
І великі, і малі —<br />
Всі на смак чудові.<br />
Нині в місті і в селі<br />
Свято кавунове.
 </div>
