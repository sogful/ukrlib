<body>
<div class="wrap">
 <div class="page-title">
  <h1>Запитання (Чи чуєш ти мене)</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Чи чуєш ти мене<br />
Обагнена<br />
Ти зникла не оглянулась…<br />
Чи бачиш ти мене<br />
Я твій<br />
Ховаюсь в туманах<br />
Чи скотиться з війниці<br />
Сльоза<br />
Коли за горою зникну?<br />
________________<br />
Обагнена — неолоґізм автора від улюбленого його слова &#8220;багнути&#8221;.
 </div>
</div>
