<title>Кущ чи дерево</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Кущ чи дерево</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Якщо колись<br />
макове зерня<br />
ляже у землю<br />
й не проросте,<br />
то, мабуть,<br />
якась дівчинка —<br />
Катруся,<br />
Ганнуся<br />
чи Ясочка —<br />
спитає своєї бабусі:<br />
— А мак —<br />
кущ чи дерево?<br />
Якщо дерево,<br />
то скільки років<br />
воно росте?
 </div>
</div>
