<body>
<div class="wrap">
 <div class="page-title">
  <h1>Біля мапи</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Які слова — болючі, зимні —<br />
Вона поховає мене зимностями.<br />
Відчування інтимні —<br />
Зогрій моє серце інтимностями.<br /><br />
Далеко, далеко блакитне море…<br />
В душі — опрокльонені естампи.<br />
В тебе — душа загадана, в тебе серце — хоре.<br />
Не сиди біля мапи!..
 </div>
