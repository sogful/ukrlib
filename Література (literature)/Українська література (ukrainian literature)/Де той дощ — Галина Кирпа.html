<title>Де той дощ</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Де той дощ</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Ходить дощ у синім капелюсі,<br />
із прозорою сережкою у вусі,<br />
в чоботях з високими підборами —<br />
долами, садочками і горами.<br />
Ходить дощ по чагарях у лісі,<br />
по хатині — на зеленій стрісі<br /><br />
і ніде-ніде не присідає&#8230;<br />
А скажіть, чи хто на світі знає,<br />
де той дощ, коли його немає?
 </div>
</div>
