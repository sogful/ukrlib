<body>
<div class="wrap">
 <div class="page-title">
  <h1>Книжковечір</h1>
  <h2>Наталія Поклад</h2>
 </div>
 <div class="prose" id="content">
 Книжка в тата,<br />
книжка в мами,<br />
книжка в мене<br />
і в Світлани,<br />
з книжкою малий Тарас —<br />
книжковечір нині в нас.<br />
Книжковечір,<br />
книжкотиша,<br />
тільки чути: песик дише<br />
й сумно дивиться<br />
з-під ліжка,<br />
бо йому немає книжки.
 </div>
</div>
