<div class="wrap">
 <div class="page-title">
  <h1>Вихвалявся кавун</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Вихвалявся кавун<br />
Край городу:<br />
— Хто за мене кращий<br />
На вроду?<br />
Хто за мене кращий,<br />
Кругліший?<br />
Хто за мене в світі<br />
Смачніший? —<br />
І квасоля й огірки<br />
Дивувались,<br />
На красеня-кавуна<br />
Задивлялись.
