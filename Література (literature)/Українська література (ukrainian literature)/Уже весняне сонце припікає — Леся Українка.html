<div class="wrap">
 <div class="page-title">
  <h1>Уже весняне сонце припікає...</h1>
  <h2>Леся Українка</h2>
 </div>
 <div class="prose" id="content">
 Уже весняне сонце припікає,<br />
вже сон-трава перецвітати стала.<br />
От-от зозулька маслечко сколотить,<br />
в червоні черевички убереться<br />
і людям одмірятиме літа.<br />
Вже з вирію поприлітали гості.<br />
Он жовтими пушинками вже плавають<br />
на чистім плесі каченята дикі.
 </div>
