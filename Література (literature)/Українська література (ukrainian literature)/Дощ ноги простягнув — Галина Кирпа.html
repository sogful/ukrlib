<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дощ ноги простягнув</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Стомився Дощ<br />
і сів у нас на ґанку,<br />
а свої довгі ноги<br />
аж до Єгипту, мабуть,<br />
простягнув.
 </div>
