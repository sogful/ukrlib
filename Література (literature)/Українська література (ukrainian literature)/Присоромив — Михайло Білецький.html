<div class="wrap">
 <div class="page-title">
  <h1>Присоромив</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 На подвір'ї зустрів хлопчик<br />
Сусіда Микиту<br />
Та й гукає:<br />
— Агов, дядьку,<br />
Дайте закурити! —<br />
А той йому:<br />
— Сором з старшим<br />
Отак розмовляти.<br />
Ти скажи: "Будь ласка... дайте..."<br />
Тоді можна й дати!
 </div>
