<body>
<div class="wrap">
 <div class="page-title">
  <h1>Новорічна ялинка</h1>
  <h2>Максим Рильський</h2>
 </div>
 <div class="prose" id="content">
 Ой весела в нас зима,<br />
Веселішої нема:<br />
Грає срібними зірками,<br />
В'ється синіми димками,<br />
Снігом землю обійма.<br />
Ой струнка ялинка в нас!<br />
Скільки сяє тут прикрас!<br />
Ми зібралися юрбою —<br />
Разом з піснею новою<br />
Рік Новий стрічать.
 </div>
</div>
