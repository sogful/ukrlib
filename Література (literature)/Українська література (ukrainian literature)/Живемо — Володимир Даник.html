<div class="wrap">
 <div class="page-title">
  <h1>Живемо</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 А зазирнули б у трюмо —<br />
Ото ж... Зображення хороше!<br />
То як, шановні, живемо?!<br />
Та живемо... ну, хто як може!<br /><br />
Хтось критику — у сотні жал...<br />
Та справа це — неперспективна!<br />
— Базар... — ви кажете, — Вокзал...<br />
Бо квітнуть транспорт і торгівля!
 </div>
