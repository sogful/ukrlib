 <div class="page-title">
  <h1>Веселий крутисловик</h1>
  <h2>Сергій Пантюк</h2>
 </div>
 <div class="prose" id="content">
 Розвіршу&#769; вам ска&#769;жі кльо&#769;ві:<br />
Ко&#769;нить ска&#769;чик до дірбо&#769;ві,<br />
Схо&#769;дце со&#769;нцить, дрім котя&#769;чись,<br />
Щебете&#769;йко солов'я&#769;чить.<br />
<br />
Ра&#769;нний га&#769;рнок. Ле&#769;рез чо&#769;си<br />
Ло&#769;зять мчі у вербоко&#769;зи.<br />
До&#769;ді! Го&#769;сить! Збаг часну&#769;ти —<br />
Я замо&#769;вився у плу&#769;ті!
 </div>
