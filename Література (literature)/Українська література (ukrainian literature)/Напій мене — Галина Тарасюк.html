<div class="wrap">
 <div class="page-title">
  <h1>Напій мене</h1>
  <h2>Галина Тарасюк</h2>
 </div>
 <div class="prose" id="content">
 Напій мене. Твойого джерела<br />
Моя душа сто років не торкалась.<br />
Сто літ за нею назирці брела<br />
Німа печаль, неначе тінь зів&#8217;яла.<br /><br />
Сто довгих літ мої гіркі вуста<br />
Не оживали в лагідному слові…<br />
Перехиляюсь через всі літа<br />
До джерела неспитого любові.
 </div>
