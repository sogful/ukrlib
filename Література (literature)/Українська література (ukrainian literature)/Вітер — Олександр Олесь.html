<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вітер</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Вітер носиться, літає,<br />
Топче луки і поля,<br />
Жовті трави пригинає, Лист зриває із гілля.<br />
То скирти, стоги розносить,<br />
То у сурми загуде,<br />
То в безсиллі заголосить<br />
І до скелі припаде.
 </div>
