<div class="wrap">
 <div class="page-title">
  <h1>Партитура рути... Трап...</h1>
  <h2>Анатолій Мойсієнко</h2>
 </div>
 <div class="prose" id="content">
 Партитура рути... Трап...<br />
Довкруги — вигурк вод...<br />
Бузок вивив козуб,<br />
У краєвиди в'є арку,<br />
В'є у свiт і всує... в<br />
Ноти чужини нижучи тон...<br />
Матиме сон жiнка: так нiжно се ми там.
 </div>
