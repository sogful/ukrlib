<body>
<div class="wrap">
 <div class="page-title">
  <h1>Кожушок</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Йшов сніжок на торжок<br />
Продавати кожушок.<br />
Кіт купив того кожуха,<br />
Загорнувсь по самі вуха.<br />
Як забіг у нім до хати,<br />
Хутро стало розтавати,<br />
Сів Воркотик за мішком<br />
Та й умився кожушком.
 </div>
