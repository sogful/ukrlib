<div class="wrap">
 <div class="page-title">
  <h1>Смутні картини</h1>
  <h2>Борис Грінченко</h2>
 </div>
 <div class="prose" id="content">
 Убогії ниви, убогії села,<br />
Убогий, обшарпаний люд,-<br />
Смутнії картини, смутні-невеселі,<br />
А інших не знайдеш ти тут.<br />
<br />
Не став би дивитись, схотів би забути,<br />
Так сили забути нема:<br />
То ріднії села, то ріднії люди,<br />
То наша Вкраїна сама!..<br />
I883.
 </div>
