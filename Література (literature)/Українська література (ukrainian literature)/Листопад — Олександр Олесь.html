<div class="wrap">
 <div class="page-title">
  <h1>Листопад</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 В'ються тумани, пливуть над землею,<br />
Линуть в простори на білих човнах,<br />
Хиляться трави, прибиті дощами,<br />
Листя на землю поволі спада.
 </div>
