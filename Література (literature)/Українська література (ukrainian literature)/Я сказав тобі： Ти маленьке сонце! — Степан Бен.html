 <div class="page-title">
  <h1>Я сказав тобі: Ти маленьке сонце!...</h1>
  <h2>Степан Бен</h2>
 </div>
 <div class="prose" id="content">
 Я сказав тобі: "Ти маленьке сонце!"<br />
Ти оглянулася і засміялася.<br />
Сміх дзвенів промінням.<br />
В ньому я вчув задоволення,<br />
Перемішане з бризками соромливості.<br />
Серце тихо-тихо затремтіло<br />
І проспівало мені: "Щасливий,<br />
Ти знайшов незайману Радість!"
 </div>
