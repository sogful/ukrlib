<body>
<div class="wrap">
 <div class="page-title">
  <h1>Перший лід</h1>
  <h2>Віктор Зубар</h2>
 </div>
 <div class="prose" id="content">
 В сніговій хустині<br />
Хилиться верба,<br />
Їде на санчатах<br />
Хлопчик із горба.<br />
Крізь тонкі лозини,<br />
Гострі ситняки<br />
Їде на санчатах<br />
Хлопчик до ріки.<br />
А верба із страхом<br />
Дивиться услід:<br />
Ще ж ніхто не їхав<br />
Через перший лід!
 </div>
</div>
