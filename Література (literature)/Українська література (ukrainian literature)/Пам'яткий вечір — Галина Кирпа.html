 <div class="page-title">
  <h1>Пам'яткий вечір</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Той пізній вечір дуже пам’яткий:<br />
між зорями виблискує жар-птиця,<br />
під яблунями ходять їжаки.<br />
Сопуть і ходять.<br />
Їм чомусь не спиться.<br />
<br />
Вони зітхають тільки:<br />
"ох" та "ах",<br />
коли цвіркун на скрипці зацигоче…<br />
Жар-птиці палять світло на зірках,<br />
а в їжаків такі блискучі очі!
 </div>
