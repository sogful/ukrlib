<div class="wrap">
 <div class="page-title">
  <h1>Ранок</h1>
  <h2>Спиридон Черкасенко</h2>
 </div>
 <div class="prose" id="content">
 Годі спати, час вставать!<br />
Ось поглянь в віконце:<br />
Час роботу починать —<br />
Скоро зійде сонце.<br />
<br />
Ранні пташки піднялись,<br />
І туман біліє.<br />
Хмарки полум'ям взялись,<br />
Зорька червоніє.<br />
<br />
Хоч і мляве ще й німе<br />
Все спросоння ходить,<br />
Та життя своє візьме:<br />
Сонце вже зіходить.
 </div>
