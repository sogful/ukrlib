<body>
<div class="wrap">
 <div class="page-title">
  <h1>Великдень</h1>
  <h2>Микола Щербак</h2>
 </div>
 <div class="prose" id="content">
 Великий день! Великий день!<br />
Ясний Великдень на землі!<br />
Багато радості й пісень<br />
Приніс нам янгол на крилі...<br />
Веснянку діти хороводять —<br />
Христос Воскрес! Христос Воскрес!<br />
Сьогодні й сонце не заходить,<br />
А сяє й сяє із небес.
 </div>
