<body>
<div class="wrap">
 <div class="page-title">
  <h1>Втекти, втекти, о, так тікати</h1>
  <h2>Галина Тарасюк</h2>
 </div>
 <div class="prose" id="content">
 Втекти, втекти, о, так тікати,<br />
як від орди, як від біди!<br />
Травою, пилом, прахом стати,<br />
німою безвістю води.<br /><br />
Та коли й тінь моя розтане<br />
і слід непам&#8217;ять загребе —<br />
о, голос мій не перестане<br />
шукати-кликати тебе.
 </div>
