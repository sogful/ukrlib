 <div class="page-title">
  <h1>Дурень і Розумний</h1>
  <h2>Петро Гулак-Артемовський</h2>
 </div>
 <div class="prose" id="content">
 (Приказка)<br />
<br />
"На що, до халепи, той розум людям здався?" —<br />
Раз Дурень здуру — бовть!.. Розумного питався.<br />
"На те,— озвався сей,— коли кортить вже знать,<br />
Щоб дурням на сей спрос цур дурнів відвічать".<br />
1 декабря 1820 года, Харьков
