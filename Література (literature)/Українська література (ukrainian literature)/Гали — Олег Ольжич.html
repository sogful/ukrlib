<div class="wrap">
 <div class="page-title">
  <h1>Гали</h1>
  <h2>Олег Ольжич</h2>
 </div>
 <div class="prose" id="content">
 О, невмолимі скам'янілі дні,<br />
Міцна рука над людьми і богами<br />
...Чигає там, у сірій далині,<br />
Лягає горами за нами.<br />
<br />
Ми подолаєм знов. Ще не одні<br />
Нам скоряться. Над все є вірна криця<br />
Та нам також судилося розбиться<br />
Колись і десь об гори кам'яні.
 </div>
