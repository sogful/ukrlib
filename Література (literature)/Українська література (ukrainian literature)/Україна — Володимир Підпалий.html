 <div class="page-title">
  <h1>Україна</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Натомилася:<br />
дні немічені<br />
у роботі без відпочинку.<br />
Прилягла і здрімнула, як дівчина,<br />
крадькома,<br />
на часинку&#8230;<br /><br />
І привиділося:<br />
незлічені<br />
копачі йдуть джерел шукати:<br />
&#8211; Покажи нам криницю,<br />
дівчино,<br />
до тебе умивала мати&#8230;
 </div>
