<div class="wrap">
 <div class="page-title">
  <h1>Лився спів колись у мене</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Лився спів колись у мене,<br />
А тепер я сльози ллю…<br />
Про журбу мою співати<br />
Доручив я солов&#8217;ю.<br /><br />
Все втонуло в пісні — морі,<br />
Все забулось, як вві сні…<br />
Тільки ти, далека зоре,<br />
Рівно сяєш в вишині.
