<body>
<div class="wrap">
 <div class="page-title">
  <h1>Погоня</h1>
  <h2>Віктор Кордун</h2>
 </div>
 <div class="prose" id="content">
 То вже тікає не косуля, —<br />
то свище між дерев<br />
рогатий вітер.<br />
А смерть слідом петляє<br />
на чотирьох тремтливих ніжках<br />
в сполоханому руні.<br />
Вовки відстали,<br />
і продовжує погоню<br />
із останніх сил<br />
дух вовковийний,<br />
вирвавшись із тіл.
 </div>
