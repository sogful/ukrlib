<div class="wrap">
 <div class="page-title">
  <h1>Спокій світу наприкінці...</h1>
  <h2>Маріанна Кіяновська</h2>
 </div>
 <div class="prose" id="content">
 Спокій світу наприкінці.<br />
Всі пророцтва —— перепочаті.<br />
В Бога —— в серці і на лиці —-<br />
Золотава імла печаті.<br />
І стоїть за Його плечем<br />
(Може, навіть занадто близько)<br />
Ангел з дзеркалом і з мечем —-<br />
Нас засліплює блиском.
 </div>
