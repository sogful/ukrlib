 <div class="page-title">
  <h1>Гніздо Вечора</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 У Вечора — гніздечко на тополі.<br />
Там цілий день сплять<br />
жовтоокі вечорята.<br />
А виспляться —<br />
то пурхають на небо<br />
і зіронькам світити помагають,<br />
бо очі в них —<br />
ліхтарики безсонні.<br />
Гніздо порожнє і холодне<br />
на тополі —<br />
то ще не повернулись<br />
вечорята.
 </div>
