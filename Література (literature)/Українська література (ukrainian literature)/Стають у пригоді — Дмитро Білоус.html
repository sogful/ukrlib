<div class="wrap">
 <div class="page-title">
  <h1>Стають у пригоді</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Загадка<br /><br />
Коли твір якийсь готую,<br />
різні речення пишу,<br />
щось, буває, я цитую,<br />
мову вводячи чужу.<br />
Але, любий мій читачу,<br />
як для вас її позначу?<br />
Тут уже не допоможуть<br />
ані коми, ні крапки,<br />
у пригоді стати можуть —<br />
здогадались ви?<br /><br />
(Лапки)
 </div>
