<body>
<div class="wrap">
 <div class="page-title">
  <h1>Велика Зірка і манюня</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Велика Зірка до світанку<br />
дивиться<br />
у глибоке озеро,<br />
ніби в люстро.<br />
А її доня —<br />
Манюня Зіронька —<br />
минає галявки хмар,<br />
заглядає<br />
до мене у віконце<br />
й питає:<br />
— Чи гарна я?
 </div>
