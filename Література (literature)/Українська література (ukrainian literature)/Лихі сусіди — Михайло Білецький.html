<body>
<div class="wrap">
 <div class="page-title">
  <h1>Лихі сусіди</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Ну й сусіди!<br />
Що є сили<br />
Цілу ніч в стіну гатили!<br />
Й не набридло їм, скажи ти...<br />
Як з такими в дружбі жити?<br />
— То ви через них не спали?<br />
— Який там у біса сон...<br />
Ми ж до ранку танцювали<br />
Бугі-вугі<br />
І чарльстон!
 </div>
