 <div class="page-title">
  <h1>Просо</h1>
  <h2>Віктор Терен</h2>
 </div>
 <div class="prose" id="content">
 На порозі просто<br />
Виросло просо.<br />
<br />
Просо волохате<br />
Не пускає в хату!<br />
<br />
Ми його попросим:<br />
— Пропусти нас, просо!
 </div>
