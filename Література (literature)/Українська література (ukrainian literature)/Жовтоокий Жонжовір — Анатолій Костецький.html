<body>
<div class="wrap">
 <div class="page-title">
  <h1>Жовтоокий Жонжовір</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 Кажуть,<br />
є у лісі звір —<br />
жовтоокий Жонжовір,<br />
а у нього є дружина "—<br />
жовтоока Жонжорина.<br />
Я сьогодні<br />
в ліс ходив,<br />
їх зловив у квітах,<br />
до корзини посадив,<br />
та забув накрити.<br />
<br />
І тому<br />
втекли з корзини<br />
Жонжовір і Жонжорина!..
 </div>
