<div class="wrap">
 <div class="page-title">
  <h1>Троянда</h1>
  <h2>Борис Чигиринець</h2>
 </div>
 <div class="prose" id="content">
 Вона росла тут людям на вподобу,<br />
Троянда пишна, нерозквітла ще…<br />
Перенесла якусь тяжку хворобу<br />
І ожила, пробуджена дощем.<br />
<br />
І нагадала квітка Україну,<br />
Як милу дівчину дитячих літ, —<br />
Минеться слабість, хворість вся загине,<br />
І забуяє невмирущий цвіт.
 </div>
