<body>
<div class="wrap">
 <div class="page-title">
  <h1>Андрійко-школяр</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 Андрійко наш уже школярик:<br />
Іде з портфеликом в руці,<br />
а в ньому зошити й букварик,<br />
пенал, планшет та олівці.<br /><br />
Андрійко добре вчить уроки,<br />
бо хоче вміти й знати все.<br />
Додому йде веселим кроком<br />
&#8220;дванадцять&#8221; в зошиті несе!
 </div>
</div>
