<body>
<div class="wrap">
 <div class="page-title">
  <h1>Кульбабки</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 На леваду я пішла б,<br /><br />
Ціла купа там кульбаб —<br /><br />
Ніби сонечка малі<br /><br />
Посідали на землі.<br /><br />
Я нарвала б тих квіток,<br /><br />
Та сплела б собі вінок,<br /><br />
Щоб і я була в вінку,<br /><br />
Наче квітка на лужку.<br /><br />
Тільки вранці квіти всі<br /><br />
Умиваються в росі,<br /><br />
Росяна травичка —<br /><br />
Змокнуть черевички.
 </div>
