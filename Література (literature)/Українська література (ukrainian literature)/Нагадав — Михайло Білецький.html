<div class="wrap">
 <div class="page-title">
  <h1>Нагадав</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Як тебе я зустрічаю,<br />
То завжди й Петра згадаю...<br />
— Але ж ми з Петром не схожі!<br />
— Не кажи...<br />
Щось спільне є:<br />
Він, як ти, позичив гроші<br />
І не віддає!
 </div>
