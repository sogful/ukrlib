<div class="wrap">
 <div class="page-title">
  <h1>Пісні минулого</h1>
  <h2>Олена Пчілка</h2>
 </div>
 <div class="prose" id="content">
 Проречисті тії читаю скрижалі<br />
Народних пісень. І надії, і жалі<br />
Свої тут народ положив у піснях,<br />
Лунає та мова у дрібних листах.<br />
І мертвії ті ватаги із могили<br />
Говорять, торкаючи душу і сили.<br />
Та речі в пустині німій гомонять,<br />
Та люди живії мовчать!
 </div>
