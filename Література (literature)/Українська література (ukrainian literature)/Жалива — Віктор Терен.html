<title>Жалива</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Жалива</h1>
  <h2>Віктор Терен</h2>
 </div>
 <div class="prose" id="content">
 Кожну весну оживає<br />
жалива,<br />
<br />
налітає в жаливу<br />
комашва,<br />
<br />
дуже добре комашві<br />
в жаливі —<br />
<br />
всі наїдені, здорові<br />
і живі!
 </div>
</div>
