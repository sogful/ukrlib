<div class="wrap">
 <div class="page-title">
  <h1>Вже покорчились сніги…</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Вже покорчились сніги.<br />
Вже в яри потоки ллються,<br />
Зеленіють береги,<br />
В небі жайворонки в'ються.<br />
<br />
Вже ось-ось сади, гаї<br />
Уберуть зелені шати.<br />
Защебечуть солов'ї,<br />
Стануть горлиці турчати.
 </div>
