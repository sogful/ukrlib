<body>
<div class="wrap">
 <div class="page-title">
  <h1>Як не крути...</h1>
  <h2>Василь Симоненко</h2>
 </div>
 <div class="prose" id="content">
 Як не крути,<br />
на одне виходить,<br />
слід би катюгам давно зазубрить:<br />
можна прострелити мозок,<br />
що думку народить,<br />
думки ж не вбить.<br />
<br />
<em>26.10.1962</em>
