<body>
<div class="wrap">
 <div class="page-title">
  <h1>Пожаліла</h1>
  <h2>Петро Гришко</h2>
 </div>
 <div class="prose" id="content">
 Гвіздка в старій стіні не стало,<br />
Де був він, там Іржу знайшли,<br />
Яка так слізно застогнала:<br />
— О, як ми дружно з ним жили!
 </div>
