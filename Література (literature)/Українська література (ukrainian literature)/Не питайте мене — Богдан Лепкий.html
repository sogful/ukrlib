<title>Не питайте мене</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не питайте мене</h1>
  <h2>Богдан Лепкий</h2>
 </div>
 <div class="prose" id="content">
 Не питайте мене,<br />
Як я в світі живу:<br />
Шура-бура гуде,<br />
Я весельцем гребу.<br /><br />
Не питайте, як?<br />
В моїм мозку гадки –<br />
Йдуть осінні дощі,<br />
А я сію квітки.<br /><br />
Не питайте, чому<br />
Моє серце сумне –<br />
Як в чужині умру,<br />
То згадайте мене.
 </div>
</div>
