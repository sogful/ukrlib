<div class="wrap">
 <div class="page-title">
  <h1>непростимені...</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 непростимені<br /><br />
начезбілогоклинуводаперламутрова<br /><br />
листнаколіні<br /><br />
азъ воздам<br /><br />
криниця попелом вкрита<br /><br />
і київ з ночі<br /><br />
чотири легенди<br /><br />
кождому кару свою відкурличуть<br /><br />
криламивідообнімуть<br /><br />
і прісно<br /><br />
маківка<br /><br />
на дерев'янім стеблі<br /><br />
алілуя
 </div>
