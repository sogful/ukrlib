<body>
<div class="wrap">
 <div class="page-title">
  <h1>Причина</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Другий день лежить хлопчина<br />
В ліжку у кутку.<br />
І на те була причина:<br />
В батьковім садку<br />
Обірвав хтось грушку тихо<br />
Аж до самих віт.<br />
Ось у хлопця з того лиха<br />
Й заболів живіт.
 </div>
</div>
