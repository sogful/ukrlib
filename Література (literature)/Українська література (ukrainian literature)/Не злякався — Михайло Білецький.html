<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не злякався</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Гаманець або життя! —<br />
Грабіжник гукає.<br />
А прохожий:<br />
— Грабувать<br />
Себе дозволяю.<br />
А кричать отак на мене,<br />
Давать горлу волю, —<br />
Вибачайте... Я нікому<br />
Цього не дозволю!
 </div>
</div>
