<div class="wrap">
 <div class="page-title">
  <h1>У ластівки — ластовенятко...</h1>
  <h2>Микола Вінграновський</h2>
 </div>
 <div class="prose" id="content">
 У ластівки — ластовенятко,<br />
В шовковиці — шовковенятко,<br />
В гаю у стежки — стеженятко,<br />
У хмари в небі — хмаренятко,<br />
В зорі над садом — зоренятко<br />
Вже народилися.<br />
Лиш зажурилися<br />
Старезна скеля над урвищем<br />
Та дуба всохле стовбурище.
 </div>
