<body>
<div class="wrap">
 <div class="page-title">
  <h1>Як я кажу в своєму саду</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Калині кажу:<br />
— Тітко Калино!<br />
Горіхові кажу:<br />
— Дядьку Горіше!<br />
Нагідці кажу:<br />
— Сестро Нагідко!<br />
Барвінку кажу:<br />
— Брате Барвінку!<br />
А Хризантемі:<br />
— Панно!
 </div>
