<body>
<div class="wrap">
 <div class="page-title">
  <h1>Їхав, їхав</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Потішка<br />
<br />
їхав полем верхівець,<br />
Їхав лісом навпростець,<br />
Їхав, їхав, задививсь<br />
Та й за дуба зачепивсь.<br />
Ну й пригода,<br />
Хай їй грець,<br />
А хвалився — верхівець!..<br />
Зупинився.<br />
Відчепився.<br />
Тут і казочці кінець.
 </div>
