<body>
<div class="wrap">
 <div class="page-title">
  <h1>Три скелети сидять за кавою</h1>
  <h2>Василь Стус</h2>
 </div>
 <div class="prose" id="content">
 Три скелети сидять за кавою<br />
І провадять про філософію Ніцше<br />
до них присідає рудава бестія<br />
і починає з одного кпити<br />
що той недоладно грає<br />
справжню людину.
 </div>
