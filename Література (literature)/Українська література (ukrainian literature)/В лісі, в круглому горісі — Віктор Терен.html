<div class="wrap">
 <div class="page-title">
  <h1>В лісі, в круглому горісі...</h1>
  <h2>Віктор Терен</h2>
 </div>
 <div class="prose" id="content">
 В лісі,<br />
в круглому горісі..<br />
коник зиму зимував.<br />
<br />
Зимував — не сумував,<br />
підростав.<br />
<br />
Стало тісно в тім горісі —<br />
тріснув кований горіх!<br />
Страшно гукнуло у лісі,<br />
Кінь горіховий побіг.<br />
<br />
Тупотить, гукає всім:<br />
— От і я, весняний грім!
 </div>
