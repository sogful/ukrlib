<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зозуленька</h1>
  <h2>Дмитро Куровський</h2>
 </div>
 <div class="prose" id="content">
 Кує зозуленька, кує,<br />
Бо молоток у неї є,<br />
І є ковадлечко своє.<br />
<br />
Кує зозуленька літа.<br />
Кує — наковує до ста.<br />
<br />
Кує зозуленька з весни<br />
Маленьким діткам гарні сни.<br />
Кує з проміння та роси<br />
Маленьким діткам голоси.
 </div>
</div>
