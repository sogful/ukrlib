<div class="wrap">
 <div class="page-title">
  <h1>Комбайн</h1>
  <h2>Анатолій Гарматюк</h2>
 </div>
 <div class="prose" id="content">
 Взяв у поле сина тато,<br />
На комбайна посадив.<br />
Почали буряк копати —<br />
Зразу аж по шість рядів.<br />
— Втрьох — ого! — ми маєм силу! —<br />
Крикнув Гнат.— Лише копай!<br />
— Ну, а хто з нас третій, сину?<br />
— Третій, тату,— наш комбайн!
 </div>
