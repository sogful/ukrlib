<body>
<div class="wrap">
 <div class="page-title">
  <h1>Турист за океаном</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Що ви, — запитали пана, —<br />
Бачили за океаном?<br />
— Вірте, стіни лиш та стелю<br />
Бачив у готелі.<br />
Бо зідрали за житло<br />
З мене таку плату,<br />
Що невигідно було<br />
Залишать кімнату!
 </div>
