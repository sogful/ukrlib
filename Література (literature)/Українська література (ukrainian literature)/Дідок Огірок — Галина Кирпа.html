<div class="wrap">
 <div class="page-title">
  <h1>Дідок Огірок</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Дідок Огірок<br />
пішов у танок.<br />
Він і вальси, і мазурки,<br />
Певно, знає назубок.<br /><br />
Дідок Огірок<br />
зелененький, мов стручок.<br />
Такий самий брат у нього —<br />
непосидько і в'юнок.<br /><br />
Дідок Огірок<br />
пішов у танок:<br />
і вальсує, й гопакує,<br />
тільки — жаль! —<br />
без чобіток!
 </div>
