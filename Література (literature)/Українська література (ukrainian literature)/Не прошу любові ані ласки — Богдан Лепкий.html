<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не прошу любові ані ласки</h1>
  <h2>Богдан Лепкий</h2>
 </div>
 <div class="prose" id="content">
 Не прошу любові ані ласки,<br />
Бо любові випрохать не мож —<br />
Будь мені як королева з казки,<br />
Що заснула серед срібних рож.<br /><br />
Будь мені як тая біла дама,<br />
Що по замку в тиху північ йде,<br />
Будь мені неначе скарб Сезама —<br />
Ключ пропав... Ніхто не віднайде.
 </div>
</div>
