<div class="wrap">
 <div class="page-title">
  <h1>Дві піраміди</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Біля моря дві піраміди<br />
Ми в долину їдемо<br />
Де прозорий Сучан.<br />
— Глянь!<br /><br />
Ніч. Плями чужі.<br />
Живої душі<br />
Не знайдеш, скільки серце не жде…<br />
Де ж<br />
Бліді верби й крейдяність хат?<br />
Морок зітхає.
 </div>
