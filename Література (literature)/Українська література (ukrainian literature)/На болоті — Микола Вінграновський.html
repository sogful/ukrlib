<body>
<div class="wrap">
 <div class="page-title">
  <h1>На болоті</h1>
  <h2>Микола Вінграновський</h2>
 </div>
 <div class="prose" id="content">
 Хто розцвів, хто розцвів —<br />
запитало.<br />
Я розцвів, я розцвів —<br />
відказало.<br />
Хто помер, хто помер —<br />
запитало.<br />
Я помер, я помер —<br />
відказало.<br />
Що ж таке, що ж таке —<br />
запитало.<br />
А таке, а таке —<br />
відказало.
 </div>
</div>
