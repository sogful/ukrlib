<div class="wrap">
 <div class="page-title">
  <h1>Осопас</h1>
  <h2>Богдан Стельмах</h2>
 </div>
 <div class="prose" id="content">
 Ось осінні оси — ось!<br />
Я пасу осінніх ос.<br />
Синю сливу<br />
роздушу,<br />
спілу грушу<br />
надкушу —<br />
відкушене<br />
сам<br />
з'їм,<br />
надкушене<br />
дам<br />
їм.<br />
А кісточку та зернятка<br />
Хай ковтає чорна грядка.
 </div>
