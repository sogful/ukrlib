<div class="wrap">
 <div class="page-title">
  <h1>Кілійське</h1>
  <h2>Борис Нечерда</h2>
 </div>
 <div class="prose" id="content">
 О панно Інно, ніжна Інно...-<br />
живуть Тичинині дива.<br />
Тут воронованою міддю<br />
шугав карбований Дунай.<br /><br />
А жовті сови, з віт лапатих,<br />
і віск, що меду натягнув,<br />
надвечір світяться лампадно,<br />
як грішна квітка тютюну.
 </div>
