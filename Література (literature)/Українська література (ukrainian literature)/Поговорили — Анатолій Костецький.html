<body>
<div class="wrap">
 <div class="page-title">
  <h1>Поговорили...</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 — Кицю, кицю,<br />
хочеш мишу?<br />
<br />
— Мяу, так,<br />
неси скоріше!<br />
<br />
— Кицю,<br />
хочеш ковбаси?<br />
<br />
— Мяу, так,<br />
скоріш неси!<br />
<br />
— Хочеш,<br />
з другом познайомлю?<br />
— Хто ж він?<br />
— Просто пес<br />
бездомний...<br />
<br />
"Фрр!" — і киці<br />
вже нема!..<br />
Що ж,<br />
не хоче —<br />
то й дарма.
 </div>
</div>
