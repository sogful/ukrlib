<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вітер</h1>
  <h2>Олена Пчілка</h2>
 </div>
 <div class="prose" id="content">
 Віє вітер, повіває,<br />
Крізь свитину провіває,<br />
Снігом в очі дрібно сипле<br />
І потроху щічки щипле.<br />
— Та дарма, — мовля хлопчина, —<br />
Дошкуляє хай свитині&#8230;<br />
Вітру вже я не боюся<br />
Та й морозу не корюся!
 </div>
