<body>
<div class="wrap">
 <div class="page-title">
  <h1>Десь пішов дощ</h1>
  <h2>Віктор Кордун</h2>
 </div>
 <div class="prose" id="content">
 Десь<br />
а можливо й тут<br />
пішов такий дощ<br />
дощ пішов такий<br />
що стало нікому й нікуди<br />
витягати<br />
допіру втонулого<br />
<br />
від самого ранку<br />
я сиджу<br />
за своїм хистким столом<br />
і ніяк не зважуся<br />
доторкнутися<br />
до власного тіла
 </div>
