<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ми всі під одним дощем</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Ми всі під одним дощем —<br />
Хрущ, Метелик і я.<br />
У Хруща парасоля —<br />
із вишневого листка.<br />
У Метелика парасоля —<br />
із красолиної пелюстки.<br />
Я бігаю<br />
від Хрущевої парасолі<br />
до Метеликової<br />
і — росту.
 </div>
