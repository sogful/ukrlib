<div class="wrap">
 <div class="page-title">
  <h1>Ученому педантові</h1>
  <h2>Спиридон Черкасенко</h2>
 </div>
 <div class="prose" id="content">
 Великий ти — і в небі зорі<br />
Перелічив у темній млі,<br />
І знаєш всі піщини в морі,<br />
І що у надрах є землі.<br />
<br />
Світило ти єси науки,—<br />
Зорею ж щастя засвіти,<br />
Перелічи всі сльози, муки...<br />
Несила? ні? — Маленький ти!
 </div>
