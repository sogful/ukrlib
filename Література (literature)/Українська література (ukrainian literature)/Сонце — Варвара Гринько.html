<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сонце</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Раннє сонце<br />
Квіти будить.<br />
Тихо промінь<br />
В шибку: "Дзень!"<br />
Добрий ранок<br />
Добрим людям,<br />
Добрий день!<br />
Ходить сонце<br />
Низько-низько,<br />
Заглядає<br />
У колиску.<br />
Раннє сонце<br />
В шибку: "Дзень!"<br />
Шле вам, діти,<br />
Добрий ранок<br />
І ясний,<br />
Веселий день.
 </div>
