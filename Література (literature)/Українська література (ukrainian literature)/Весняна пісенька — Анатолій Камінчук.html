<body>
<div class="wrap">
 <div class="page-title">
  <h1>Весняна пісенька</h1>
  <h2>Анатолій Камінчук</h2>
 </div>
 <div class="prose" id="content">
 Співає пташечка: "Тю-лю",<br />
Мов каже: "Добрий день!"<br />
Співати з нею я люблю<br />
Про березень пісень.<br />
<br />
На ґанок вибігаю я,<br />
Щебече пташка з віт.<br />
Весняна пісенька моя<br />
Про маму і про світ.
 </div>
</div>
