<div class="wrap">
 <div class="page-title">
  <h1>Обіцяльник</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Митрофанка в школі й дома<br />
Обіцяльником звемо ми.<br />
Та і як його не звать?<br />
Любить хлопець обіцять.<br />
<br />
Тільки те, що обіцяє,<br />
він одразу ж забуває...<br />
<br />
Всі сміються з Митрофанка:<br />
— На наступних зборах ланки,<br />
коли будеш виступать,<br />
обіцяй... не о б і ц я т ь!
 </div>
