<div class="wrap">
 <div class="page-title">
  <h1>Не йди від мене</h1>
  <h2>Степан Чарнецький</h2>
 </div>
 <div class="prose" id="content">
 Не йди від мене ти, що все сіяла<br />
На небі мого щастя, як промінна зоря,<br />
Диви: найкращі квіти доля потоптала,<br />
І стежку заступили темні тіні горя…<br />
Не йди!..<br /><br />
***<br /><br />
Джерело:Цифрова Українська Бібліотека.
