 <div class="page-title">
  <h1>Дражнилки-жарти</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Йванко-дранко-дурисміх<br />
виліз на чужий горіх:<br />
лічить, бідний, до п'яти<br />
там сорочачі хвости.<br /><br />
***<br /><br />
Натка-дратка-дереза<br />
непосида — мов коза.<br />
Пісня в неї отака:<br />
— Меке-ке! Меке-ка!
 </div>
