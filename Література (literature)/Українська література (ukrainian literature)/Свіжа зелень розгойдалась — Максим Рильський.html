<div class="wrap">
 <div class="page-title">
  <h1>Свіжа зелень розгойдалась...</h1>
  <h2>Максим Рильський</h2>
 </div>
 <div class="prose" id="content">
 * * *<br />
<br />
Свіжа зелень розгойдалась,<br />
Розгулялась, поплила.<br />
Перші краплі засміялись<br />
До голодного зела.<br />
<br />
Голуби летять у сховок,<br />
І в тіснім голубнику<br />
Ряд округлих їх головок<br />
Як намисто на разку.<br />
<br />
28 квітня 1926 р.
