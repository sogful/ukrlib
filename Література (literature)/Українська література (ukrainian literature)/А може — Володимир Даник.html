<div class="wrap">
 <div class="page-title">
  <h1>А може</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 — А нам відомо ще з глибин сторіч —<br />
Це після чарки збуджено Микита, —<br />
Жінки усі... яку ти не поклич —<br />
Любительки такі... поговорити!<br /><br />
Та не один у Гриця був етап,<br />
Коли усе ж і сумнів, і досада:<br />
— Кума?! Перебалака і Генштаб,<br />
А може навіть... і Верховну Раду.
 </div>
