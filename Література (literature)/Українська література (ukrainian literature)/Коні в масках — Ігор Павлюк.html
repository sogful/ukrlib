<body>
<div class="wrap">
 <div class="page-title">
  <h1>Коні в масках</h1>
  <h2>Ігор Павлюк</h2>
 </div>
 <div class="prose" id="content">
 Коні в масках. Пустота.<br />
Скоро буде осінь.<br />
Як монета золота<br />
На чиїйсь дорозі.<br /><br />
Хриплувате світло фар.<br />
Запахи соснові…<br />
Недописана строфа<br />
На пташиній мові.
 </div>
</div>
