<div class="wrap">
 <div class="page-title">
  <h1>Голуб на галузці яблуневій...</h1>
  <h2>Володимир Біляїв</h2>
 </div>
 <div class="prose" id="content">
 Голуб на галузці яблуневій —<br />
Аж сипнуло в очі переквітлим.<br />
Біло-сині хмари ген у небі<br />
Гоять день зітлілий гойним світлом.<br /><br />
Смуток голубиний ліг на серце,<br />
Опада молитва пелюстками.<br />
Та даремно — знову не відверзся<br />
Самоти моєї й суму камінь.
 </div>
