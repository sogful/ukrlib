<body>
<div class="wrap">
 <div class="page-title">
  <h1>В лісі</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 Метелиця-хурделиця<br />
замела лісок.<br />
Як біла ковдра, стелиться<br />
під соснами сніжок.<br /><br />
Стрибають прудко білочки<br />
по соснах угорі.<br />
Напутрились на гілочках<br />
поважні снігурі.<br /><br />
Зайчата стали білими,—<br />
ну зовсім наче сніг! —<br />
щоб в лісі не зуміли ми<br />
відшукувати їх.
 </div>
