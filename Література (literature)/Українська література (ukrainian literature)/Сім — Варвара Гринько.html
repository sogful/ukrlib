<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сім</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Лічилка<br />
<br />
Мама, тато, дід, бабуся —<br />
Всіх назву, не помилюся.<br />
Старший братик і сестричка<br />
В нас сімейка невеличка.<br />
<br />
Не спиняйте, бо зіб'юся:<br />
Мама, тато, дід, бабуся...<br />
Старший брат, сестра і я<br />
Отака у нас сім'я.<br />
<br />
Нам лічилочку на "сім"<br />
Повторити треба всім.
 </div>
