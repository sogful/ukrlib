 <div class="page-title">
  <h1>Голос забитого</h1>
  <h2>Юрій Липа</h2>
 </div>
 <div class="prose" id="content">
 Вознесіте знамено<br />
Святого , великого краю!<br />
Говорить серце натхненно,<br />
Говорить серце: "Я знаю!<br />
Се твоя хорогва, Україно,<br />
Над мною клекоче, –<br />
Хто ж мене вбив безневинно<br />
За мої вірні очі?"<br />
<br />
(1931)
