<title>Є засіб</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Є засіб</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 Життя нуртує і нуртує —<br />
Це ж скільки злих вітрів ураз!<br />
Життя гартує і гартує —<br />
Кого ж усе ж бо... як не нас?!<br />
Хтось нарікає на недолю —<br />
Близько, мовляв, подих грози...<br />
Є засіб, щоб зміцнити волю —<br />
Це жити... у важкі часи!
 </div>
</div>
