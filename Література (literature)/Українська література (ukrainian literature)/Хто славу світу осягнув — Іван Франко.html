<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хто славу світу осягнув</h1>
  <h2>Іван Франко</h2>
 </div>
 <div class="prose" id="content">
 Хто славу світу осягнув<br />
Аж по найдальші межі,<br />
Не раз бува подібний він<br />
До наглої пожежі.<br />
З сухих дерев розпалена,<br />
Вона високо буха,<br />
Та швидко попелом сіда;<br />
Так слава наглая з&#8217;їда<br />
Не тільки тіло, але й духа.
 </div>
</div>
