<body>
<div class="wrap">
 <div class="page-title">
  <h1>Як татусь</h1>
  <h2>Наталія Поклад</h2>
 </div>
 <div class="prose" id="content">
 Я уколів не боюсь —<br />
бо свій дух гартую.<br />
Я сьогодні, як татусь,<br />
лікарем працюю.<br />
Песика полікував —<br />
дав йому мікстури,<br />
і ляльки здорові теж —<br />
без температури...
 </div>
</div>
