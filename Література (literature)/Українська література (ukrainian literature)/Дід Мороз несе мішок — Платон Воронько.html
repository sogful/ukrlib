<title>Дід Мороз несе мішок</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дід Мороз несе мішок</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Дід Мороз несе мішок,<br />
В ньому теплий кожушок.<br />
Ой ти, діду-дідусю,<br />
Зігрій нашу Ганнусю,<br />
Розв'яжи мерщій мішок,<br />
Дай Ганнусі кожушок,<br />
Надінь валянки на ніжки,<br />
Хай вона пограє в сніжки.
 </div>
</div>
