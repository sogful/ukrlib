<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дихай!</h1>
  <h2>Світлана Йовенко</h2>
 </div>
 <div class="prose" id="content">
 Тарабаню в глуху стіну:<br />
<br />
за нею — ти.<br />
<br />
Бачу,— притулившись з іншого<br />
<br />
боку,<br />
<br />
наслухаєш моє серце —<br />
<br />
хочеш у мене...<br />
<br />
Дихай,<br />
<br />
дихай всім ротом в стіну!<br />
<br />
Ми продихаємо камінь.<br />
<br />
Ми продихаємо крижаний заслон.<br />
<br />
Ми продихаємо Землю<br />
<br />
одне в одному...
 </div>
