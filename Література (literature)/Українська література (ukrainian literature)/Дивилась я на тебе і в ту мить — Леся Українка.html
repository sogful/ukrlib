<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дивилась я на тебе і в ту мить</h1>
  <h2>Леся Українка</h2>
 </div>
 <div class="prose" id="content">
 Дивилась я на тебе і в ту мить<br />
нестямилась, як рука самохіть<br />
для тебе почали вінок сплітати, –<br />
була твоя краса, як ті гранати…
 </div>
