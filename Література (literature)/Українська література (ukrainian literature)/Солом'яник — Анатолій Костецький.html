<body>
<div class="wrap">
 <div class="page-title">
  <h1>Солом'яник</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 В городі<br />
не чаклун страшний —<br />
даремно ми тікали,<br />
а дід-солом'яник старий<br />
у картузі з дірками.<br />
Так пояснила мама нам —<br />
мені й моєму брату...<br />
<br />
А хто ж про це<br />
сказав зайцям,<br />
які капусту крадуть?
 </div>
