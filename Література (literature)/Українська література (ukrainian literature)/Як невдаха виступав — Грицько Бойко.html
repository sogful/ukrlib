<body>
<div class="wrap">
 <div class="page-title">
  <h1>Як невдаха виступав</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 От я вчора виступав!<br />
Ви б почули, як співав!<br />
Хоч немає слуху,<br />
Я горлав щодуху!<br />
До-ре-мі-фа-соль-ля-сі!<br />
Голос мій почули всі.<br />
А скінчив — що сталось! —<br />
З місць усі зірвались,<br />
Сцену ледь не рознесли,<br />
А мене схопили —<br />
Аж на вулицю несли<br />
І вже там... набили.
 </div>
