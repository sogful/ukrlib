<body>
<div class="wrap">
 <div class="page-title">
  <h1>Цокотухи</h1>
  <h2>Марія Пригара</h2>
 </div>
 <div class="prose" id="content">
 Що за гомін, що за цокіт<br />
Чути в нашому дворі?<br />
Може, раптом дві сороки<br />
Посварились угорі?<br />
Може, десь уздрівши кішку,<br />
Величезну і страшну,<br />
Дві синички невеличкі<br />
Розкричались на тину?<br />
Чи в горобчиків на ґанку<br />
Бійка сталась голосна?<br />
Ні, це Галя і Оксанка<br />
Розмовляють край вікна!
 </div>
