<div class="wrap">
 <div class="page-title">
  <h1>В очах, мов сонце сходить світле...</h1>
  <h2>Олекса Стефанович</h2>
 </div>
 <div class="prose" id="content">
 В очах, мов сонце сходить світле —<br />
От-от запалить вії,<br />
На грудях вітонька розквітла<br />
Бузкова ліловіє.<br />
<br />
Де декольте — співає виріз,<br />
Де сніжність стидно-гола...<br />
Скажи, з душі то буз той виріс,<br />
Чи ти то приколола?<br />
<br />
1923
 </div>
</div>
