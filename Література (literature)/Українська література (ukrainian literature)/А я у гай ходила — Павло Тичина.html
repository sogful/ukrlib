<body>
<div class="wrap">
 <div class="page-title">
  <h1>А я у гай ходила</h1>
  <h2>Павло Тичина</h2>
 </div>
 <div class="prose" id="content">
 А я у гай ходила<br />
по квітку ось яку!<br />
А там дерева — люлі.<br />
І все отак зозулі:<br />
ку-<br />
ку!<br />
<br />
Я зайчика зустріла,<br />
дрімав він на горбку.<br />
Була б його спіймала —<br />
Зозуля ізлякала:<br />
ку-<br />
ку.
 </div>
