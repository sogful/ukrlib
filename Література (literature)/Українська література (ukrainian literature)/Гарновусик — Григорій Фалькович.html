<body>
<div class="wrap">
 <div class="page-title">
  <h1>Гарновусик</h1>
  <h2>Григорій Фалькович</h2>
 </div>
 <div class="prose" id="content">
 Ні, найкращі вуса –<br />
Не в того індуса,<br />
Що живе в готелі<br />
У самому Делі,<br />
І не в діда Толі<br />
На старім Подолі,<br />
Й не в дядька Кіндрата,<br />
Вовчиного тата...<br />
<br />
Знайте, любі діти,<br />
Правду ніде діти:<br />
Справжній гарновусик –<br />
То наш кіт Марусик.
 </div>
</div>
