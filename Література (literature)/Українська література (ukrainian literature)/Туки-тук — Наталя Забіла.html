<body>
<div class="wrap">
 <div class="page-title">
  <h1>Туки-тук</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 Хто на дереві над нами<br />
— туки-туки-тук?<br />
Прибиває щось гвіздками<br />
— туки-туки-тук!<br />
Наполегливо працює<br />
— туки-туки-тук!<br />
Хоч нічого й не майструє,<br />
— туки-туки-тук!<br />
Робить він корисну справу<br />
— туки-туки-тук!<br />
Ще й одягнений яскраво,<br />
— туки-туки-тук!
 </div>
</div>
