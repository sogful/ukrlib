 Мохом я сунуся, мохом-<br />
Бiд мохом, дiб<br />
Мохом...<br />
У холод умру, сонно сурму — до лоху.<br />
I чому? Шкода садок?.. Шум очi<br />
В атом увив, умотав.<br />
М'язами — зима з ям.<br />
Атома шамота<br />
Угрупує указами зим, а закує у пургу.<br />
...А тому — сумота.
