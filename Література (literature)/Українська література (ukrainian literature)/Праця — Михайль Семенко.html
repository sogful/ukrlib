<div class="wrap">
 <div class="page-title">
  <h1>Праця</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Батько рубає верболіз<br />
Я стягаю до тину.<br />
Тричі одніс —<br />
З-під шапки полився піт.<br /><br />
І так працював без упину,<br />
Заскородив стежку.<br />
Скільки послав на долину<br />
Дерзких рапід!<br /><br />
Гарну провів я мережку<br />
Між вишень в садку.<br />
Смуток замерз<br />
В кутку.
 </div>
