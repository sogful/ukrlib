<div class="wrap">
 <div class="page-title">
  <h1>Трудівниці</h1>
  <h2>Іван Гущак</h2>
 </div>
 <div class="prose" id="content">
 У саду бабуся Майя<br />
в'яже Олі колготки.<br />
Я в руках клубок тримаю<br />
і розмотую нитки.<br />
<br />
Біля мене киця скаче,<br />
хоче гратися з клубком.<br />
Я кажу їй: то не м'ячик,<br />
краще грайся із Рябком.
 </div>
