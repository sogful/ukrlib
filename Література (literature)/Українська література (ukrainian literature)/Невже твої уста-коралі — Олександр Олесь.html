<div class="wrap">
 <div class="page-title">
  <h1>Невже твої уста-коралі</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Невже твої уста-коралі<br />
У моря щастя я знайду?..<br />
Невже твої гадюки-руки<br />
Мене, як лози, обів&#8217;ють?..<br /><br />
Невже мене чекають знову<br />
Зітхання, зустрічи, пісні,<br />
Квітки надій в тернах розпуки<br />
І ніжних уст твоїх: &#8220;Люблю…&#8221;
 </div>
