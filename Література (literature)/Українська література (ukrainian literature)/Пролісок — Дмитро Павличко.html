<body>
<div class="wrap">
 <div class="page-title">
  <h1>Пролісок</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 Я бачив, як зірниця впала,<br />
Як на снігу вона палала,<br />
Як сніг, біліший від лілеї,<br />
Вночі іскрився біля неї.<br />
<br />
Де в темноті зоря згоріла,<br />
З'явилась вранці квітка біла,<br />
І сонце стало ніби вище,<br />
І сніг лежав, як попелище.
 </div>
