<title>Я хочу</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Я хочу</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Я хочу кожний день<br />
все слів нових<br />
Нових нових пісень<br />
ідей нових<br />
Я хочу кожний час<br />
новожиття<br />
Горіть палать в екстазі<br />
почуття<br />
Нових нових пісень<br />
і тем нових<br />
Я хочу кожний день<br />
років нових!<br />
<br />
12. III. 1914. Київ
 </div>
</div>
</body>
