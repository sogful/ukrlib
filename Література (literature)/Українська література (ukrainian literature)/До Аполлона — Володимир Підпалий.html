 <div class="page-title">
  <h1>До Аполлона</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Нема нічого важчого писати<br />
поетові, як осінь &#8211; восени!<br />
Та Аполлон накликав муз до хати,<br />
і порядкують за столом вони&#8230;<br /><br />
Шкода лише: відразу &#8211; всі богині,<br />
всі дев&#8217;ять. Всі натхненні, чарівні&#8230;<br /><br />
О Аполлоне! Відступися нині &#8211;<br />
між них одну &#8211; земну &#8211; пошли мені!..
 </div>
