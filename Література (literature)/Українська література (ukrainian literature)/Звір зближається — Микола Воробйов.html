<body>
<div class="wrap">
 <div class="page-title">
  <h1>Звір зближається...</h1>
  <h2>Микола Воробйов</h2>
 </div>
 <div class="prose" id="content">
 звір зближається<br />
чую як розчепилося повітря від кинутого списа<br />
я добре його гартував<br />
інших звуків не вловлюю<br />
хіба що в холоднім світанні<br />
обнявши за шию сіру гуску плаче дощ...<br />
мабуть у серце поцілений<br />
звір входить у мене<br />
тепер і я плачу
 </div>
</div>
