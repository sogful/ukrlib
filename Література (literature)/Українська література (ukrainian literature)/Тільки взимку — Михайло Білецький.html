<div class="wrap">
 <div class="page-title">
  <h1>Тільки взимку</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — У вас завжди так холодно у клубі? —<br />
Директора спитали.<br />
— Що ви, любі?<br />
Узимку, правда, холодно щодня,<br />
А влітку —<br />
Сторож навіть вікна відчиня!
