<div class="wrap">
 <div class="page-title">
  <h1>Хоробрі музики</h1>
  <h2>Юрій Будяк</h2>
 </div>
 <div class="prose" id="content">
 Курчаточка — маненькі,<br />
Рябенькі, жовтенькі —<br />
На току тулялися,<br />
Дуже розігралися,<br />
Посідали на снопі,<br />
Запищали: "Пі-пі-пі.<br />
Ми — сурмачі-музики,<br />
А ми того шуліки<br />
Не боїмось ніскільки…"<br />
А шуліка з-за копи,<br />
А музики під снопи:<br />
— Тихо, тихо, не сопи.
 </div>
