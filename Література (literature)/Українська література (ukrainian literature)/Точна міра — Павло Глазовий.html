<div class="wrap">
 <div class="page-title">
  <h1>Точна міра</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Прибрів п'яний із базару,<br />
Влещає дружину:<br />
— Приніс тобі подарунок!<br />
Тиче цибулину.<br />
А дружина: — Нализався?<br />
Це вже діло звісне...<br />
Ухопила цибулину<br />
Та у лоб як трісне!<br />
Той радіє: — Що то значить<br />
Саме в міру пити —<br />
Я ж міг тобі на базарі<br />
Гарбуза купити.
 </div>
