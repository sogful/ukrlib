<div class="wrap">
 <div class="page-title">
  <h1>Блакить мою душу обвіяла...</h1>
  <h2>Павло Тичина</h2>
 </div>
 <div class="prose" id="content">
 Блакить мою душу обвіяла,<br />
Душа моя сонця намріяла,<br />
Душа причастилася кротості трав<br />
Добридень я світу сказав!<br />
<br />
Струмком серед гаю як стрічечка.<br />
На квітці метелик мов свічечка.<br />
Хвилюють, маюють, квітують поля<br />
Добридень тобі, Україно моя!
 </div>
