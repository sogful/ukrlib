<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хай тішиться</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 Дуже хвилює — чи лінія брів,<br />
Чи ніжні очі… Чи гарні коліна!<br />
Чи економіка без хабарів —<br />
Як гонорея… без пеніциліна?!<br /><br />
Тільки ми все ж... не у Крим! А у Рим...<br />
Не дочекається хтось… хабаряки.<br />
Клятий хабарник хай тішиться тим,<br />
Що йому вкотре вже... щира подяка!
 </div>
