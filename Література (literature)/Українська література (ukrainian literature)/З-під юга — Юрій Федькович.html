<body>
<div class="wrap">
 <div class="page-title">
  <h1>З-під юга</h1>
  <h2>Юрій Федькович</h2>
 </div>
 <div class="prose" id="content">
 "Як же ж віє! наче пріє<br />
З-під юга!..<br />
Вадь, що з хмари громов вдарить<br />
Потуга?..<br />
Та коли вже, о южане,<br />
Він обсушить ваші рани?<br />
Коли то?..<br />
Ще ти то,<br />
Южане?" —<br />
"Ще я то!<br />
Почато:<br />
До брані!!"
 </div>
</div>
