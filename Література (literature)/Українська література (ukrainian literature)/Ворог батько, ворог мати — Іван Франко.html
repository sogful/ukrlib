<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ворог батько, ворог мати</h1>
  <h2>Іван Франко</h2>
 </div>
 <div class="prose" id="content">
 Ворог батько, ворог мати,<br />
Що не вчили сина!<br />
І піде він в світ блукати,<br />
Як та сиротина.<br /><br />
Як між павами ворона<br />
Поваги не має,<br />
Так невчений в товаристві<br />
Голову схиляє.
 </div>
