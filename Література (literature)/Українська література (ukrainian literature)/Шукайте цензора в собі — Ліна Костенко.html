<div class="wrap">
 <div class="page-title">
  <h1>Шукайте цензора в собі...</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 Шукайте цензора в собі.<br />
Він там живе, дрімучий, без гоління.<br />
Він там сидить, як чортик у трубі,<br />
і тихо вилучає вам сумління.<br />
Зсередини, потроху, не за раз.<br />
Все познімає, де яка іконка.<br />
І непомітно вийме вас — із вас.<br />
Залишиться одна лиш оболонка.
 </div>
