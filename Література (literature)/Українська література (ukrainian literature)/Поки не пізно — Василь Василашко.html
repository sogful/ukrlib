<title>Поки не пізно...</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Поки не пізно...</h1>
  <h2>Василь Василашко</h2>
 </div>
 <div class="prose" id="content">
 Нагинай галузку, поки низько,<br />
Вчи, допоки ходить під столом.<br />
Як очима до дівчат заблискав,<br />
Не припнути до стола, де книжка,<br />
А припнеш — то піде зі столом.
 </div>
