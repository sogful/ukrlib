<body>
<div class="wrap">
 <div class="page-title">
  <h1>В небі сонце падає, згорає</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 В небі сонце падає, згорає,<br />
блискавиця тьму над морем крає&#8230;<br /><br />
Береги землі за виднокраєм,<br />
і до них ще треба доплисти&#8230;
 </div>
</div>
