 <div class="page-title">
  <h1>Сіра мжичка за вікнами</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Сіра мжичка за вікнами. Ніч. Кімната.<br />
І сьогодні таке, як вчора&#8230;<br />
Перегортаю Рабіндраната<br />
Тагора.<br /><br />
Крізь щілини віконниці ніч знадвору:<br />
Доле людська, чудна яка ти, –<br />
На сторінках чужого твору<br />
Правду свою шукати!
 </div>
