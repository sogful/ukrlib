<body>
<div class="wrap">
 <div class="page-title">
  <h1>Душа вже п’яна...</h1>
  <h2>Юрій Гринюк</h2>
 </div>
 <div class="prose" id="content">
 Душа вже п’яна…<br />
Прощай, кохана.<br />
Гармати кличуть —<br />
На фронт іду.<br />
<br />
Як не загину,<br />
Як не заб’ють,<br />
То я ще верну,<br />
Я ще зайду,<br />
І знов, і знов<br />
Забурлить кров<br />
У мені.<br />
<br />
Добраніч, любко,<br />
Мила голубко.<br />
Спокійно сни<br />
Золоті сни…
 </div>
