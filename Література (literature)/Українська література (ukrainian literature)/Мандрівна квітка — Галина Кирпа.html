<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мандрівна квітка</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Така у мене квітка,<br />
що дома не сидить,<br />
гасає по сусідах<br />
і стиха бубонить:<br />
<br />
— Я зроду мандрівниця,<br />
для мене, як на те,<br />
і громовиць немає,<br />
і сонечко цвіте.<br />
<br />
Смородяно! Малиново!<br />
По голови трава!<br />
Чого ж сидіти сидьма?<br />
Чого не мандрувать?
 </div>
