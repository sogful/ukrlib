<div class="wrap">
 <div class="page-title">
  <h1>То все не так</h1>
  <h2>Василь Стус</h2>
 </div>
 <div class="prose" id="content">
 То все не так. Бо ти не ти,<br />
І не живий. А тільки згадка<br />
минулих літ. Черед мости<br />
віків блага маленька кладка.<br />
А небо корчиться в тобі<br />
своїм надсадним загасанням,<br />
яке ти тільки звеш стражданням.<br />
Ці роки, збавлені в ганьбі,—<br />
то так судилося…<br />
. . . . . . . . . . . . . . .
