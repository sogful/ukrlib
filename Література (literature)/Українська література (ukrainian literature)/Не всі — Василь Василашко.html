<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не всі</h1>
  <h2>Василь Василашко</h2>
 </div>
 <div class="prose" id="content">
 Коли ти кажеш, що усі крадуть,<br />
Коли ти кажеш, що всі люди п’ють,<br />
Коли ти кажеш, що нечесні всі, —<br />
То й ти такий. Ти — ні? Тоді не всі.
 </div>
