 <div class="page-title">
  <h1>Я знаю, від чого я гину...</h1>
  <h2>Василь Герасим'юк</h2>
 </div>
 <div class="prose" id="content">
 Я знаю, від чого я гину.<br />
В годину крикливу й глуху<br />
я крові чужої краплину<br />
не злижу, як звір, на снігу.<br /><br />
Коли я прощаюся з вами,<br />
сухі облизавши уста,<br />
сповитими матір'ю снами<br />
душа моя зла зароста.
