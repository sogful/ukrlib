<body>
<div class="wrap">
 <div class="page-title">
  <h1>Рідний край</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Водограй,<br />
Полів розмай,<br />
Зелен гай,<br />
Ліщина...<br />
Все це рідний,<br />
Любий край —<br />
Наша Батьківщина.<br />
<br />
Пам'ятай,<br />
Не забувай<br />
Батьківську<br />
Стежину.<br />
Прикрашай,<br />
Шануй свій край,<br />
Дім свій —<br />
Батьківщину.
 </div>
</div>
