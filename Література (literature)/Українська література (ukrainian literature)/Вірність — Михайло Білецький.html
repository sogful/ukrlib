<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вірність</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Дружину він завжди у серці мав<br />
І, вірите, любив її до того,<br />
Що навіть коли інших обнімав —<br />
Вона була перед очима в нього!
 </div>
