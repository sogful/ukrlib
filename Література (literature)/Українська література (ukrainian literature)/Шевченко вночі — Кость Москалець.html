<body>
<div class="wrap">
 <div class="page-title">
  <h1>Шевченко вночі</h1>
  <h2>Кость Москалець</h2>
 </div>
 <div class="prose" id="content">
 …І знову братися за справу українську —<br />
писати вірші, сіяти зерно<br />
і думати про військо запорізьке,<br />
якого вже немає так давно.<br />
<br />
Не відректися нам своєї вдачі,<br />
як білці колеса, як зорей — небесам…<br />
Чого ти плачеш, гетьман Сагайдачний?<br />
Чого ти знову сам не свій — і сам?
 </div>
