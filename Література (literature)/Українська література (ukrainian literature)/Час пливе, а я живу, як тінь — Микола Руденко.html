<div class="wrap">
 <div class="page-title">
  <h1>Час пливе, а я живу, як тінь</h1>
  <h2>Микола Руденко</h2>
 </div>
 <div class="prose" id="content">
 Час пливе, а я живу, як тінь.<br />
Мертво в душах, порожньо і глухо.<br />
Жду не лицарів, але прозрінь —<br />
Пломінкого воскресіння духу.<br /><br />
Дух, що воскресає з небуття,<br />
Хай гранують зорі — ювеліри.<br />
Бо навчило нелегке життя<br />
Гордим лицарям не йняти віри.
 </div>
