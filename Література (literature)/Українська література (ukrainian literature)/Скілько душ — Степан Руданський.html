<body>
<div class="wrap">
 <div class="page-title">
  <h1>Скілько душ</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 "Скілько, куме, в тілі душ?"<br />
"Одна, я гадаю".<br />
"Може, в тебе і одна,<br />
А я так дві маю:<br /><br />
Бо як руки на снігу<br />
В мене заколіють,<br />
Хукне теплая душа —<br />
І руки тепліють.<br /><br />
А як страва на столі<br />
Гарячая буде,<br />
То вже друга, бач, душа,<br />
Холодная, студить!"
 </div>
