<body>
<div class="wrap">
 <div class="page-title">
  <h1>Померлих образи</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Мене спокушають померлих образи<br />
Я люблю всіх суворих<br />
Я люблю вас що зникли в поросі<br />
Ви в моїх тугах хорих<br /><br />
Кісткам я даю загублені форми<br />
Одягаю в прозорий стрій<br />
Я люблю вас воскреслих хорами<br />
Підкресленостями мрій.
 </div>
</div>
