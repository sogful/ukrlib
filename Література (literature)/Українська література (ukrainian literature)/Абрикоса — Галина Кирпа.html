<body>
<div class="wrap">
 <div class="page-title">
  <h1>Абрикоса</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Цвіла і пахла в світі абрикоса.<br />
А світом був тоді Пелюсткопад.<br />
Її любила я. І бджоли. Й оси.<br />
Дідусь її любив. Славко. І сад.<br /><br />
Пелюсткопад минувся. Абрикоса<br />
живе так само в нашому саду.<br />
І люблять її знов і бджоли, й оси.<br />
Дідусь до неї йде.<br />
Славко до неї йде.<br />
І я до неї йду!
 </div>
