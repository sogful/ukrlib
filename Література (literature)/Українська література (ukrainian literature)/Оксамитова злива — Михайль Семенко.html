<body>
<div class="wrap">
 <div class="page-title">
  <h1>Оксамитова злива</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Плинуть ручаї в душу мені<br />
Отруйно<br />
І забриніли на останній струні<br />
Струйно<br /><br />
Змягчує гладить душу мені<br />
Оксамитова злива<br />
В грудях моїх на останній струні<br />
Припадає пестливо.
 </div>
</div>
