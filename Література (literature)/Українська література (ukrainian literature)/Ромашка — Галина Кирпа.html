  <h1>Ромашка</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 На цій галяві так, немов у раї:<br />
літають тихо бджілка і оса.<br />
А я котрусь гукну і поспитаю:<br />
— Чи гарно на мені блищить роса?
