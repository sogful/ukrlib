<div class="wrap">
 <div class="page-title">
  <h1>Доля</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Всі жита грозою збило;<br />
Полягла трава...<br />
Стихла буря: ясно, мило;<br />
Поле ожива.<br />
<br />
Так і наша хмура доля...<br />
Прогудуть громи —<br />
І зітхнем ми, збувшись горя,<br />
Повними грудьми!
 </div>
