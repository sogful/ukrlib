<body>
<div class="wrap">
 <div class="page-title">
  <h1>Висхли, висхли ранні роси</h1>
  <h2>Володимир Свідзінський</h2>
 </div>
 <div class="prose" id="content">
 Висхли, висхли ранні роси,<br />
і не пив я їх.<br />
А тепер&#8230; Лежать покоси<br />
на полях пустих.<br /><br />
* * *<br /><br />
Будуть роси ще вечірні&#8230;<br />
смутно я уп'юсь.<br />
І в степи, степи незмірні<br />
тихо віддалюсь.
 </div>
</div>
