<body>
<div class="wrap">
 <div class="page-title">
  <h1>Подвійна педагогіка</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Вовин тато звичку мав:<br />
Стружку з неслуха здіймав.<br />
І матуся не вгавала —<br />
День і ніч синка пиляла.<br />
Та як вони не старались,<br />
Не виходило пуття:<br />
Як було, так і зосталось<br />
Необтесаним дитя!
 </div>
