 <div class="page-title">
  <h1>В голові – одуд степовий...</h1>
  <h2>Іван Дорожній</h2>
 </div>
 <div class="prose" id="content">
 В голові – одуд степовий.<br />
– Не спивайтесь, зорі весняні.<br />
Не спивайтесь, трави шовкорясі…<br />
Бо не бувать добра… Ой не бувать.<br />
Так важко п’яному від сонця.
