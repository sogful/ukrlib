<div class="wrap">
 <div class="page-title">
  <h1>Парно, душно, як ніколи</h1>
  <h2>Михайло Старицький</h2>
 </div>
 <div class="prose" id="content">
 Парно, душно, як ніколи…<br />
Все куня у млявім сні,<br />
Лиш бринять пестливо бджоли<br />
До гвоздик, що ген рясні –<br /><br />
Пишні мліють в сутім злоті,<br />
Від жаги аж цвіт позблід…<br />
Я ж холону й на спекоті, –<br />
Бо на серці в мене лід!
 </div>
