<body>
<div class="wrap">
 <div class="page-title">
  <h1>Кіт і Пацюки</h1>
  <h2>Анатолій Косматенко</h2>
 </div>
 <div class="prose" id="content">
 Такий був делікатний Кіт, такого норову,<br />
Що Пацюки на нім зробили зоодром.<br />
За те й на пенсію випроводжали ж здорово —<br />
Нагородили пінопластовим хвостом!<br /><br />
І все ж: не будь таким Котом,<br />
Бо відгризуть ще й голову!
 </div>
