 <div class="page-title">
  <h1>Женило</h1>
  <h2>Петро Ребро</h2>
 </div>
 <div class="prose" id="content">
 Прекрасній половині він допік:<br />
Любов'ю день і ніч душа палала.<br />
Від дев'ятьох жінок успішно втік,<br />
Десята ж — смерть —<br />
сердегу наздогнала.
 </div>
