<body>
<div class="wrap">
 <div class="page-title">
  <h1>Маки</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Розцвіли червоно<br />
Маки-маченята<br />
І розкрили чорні<br />
Денця-оченята.<br />
<br />
У степу гуляють<br />
Подруги-дівчата,<br />
У вінок вплітають<br />
Маки-маченята.<br />
<br />
Червоніють маки —<br />
Степове багаття.<br />
От якби ті маки<br />
Та мені на плаття!
 </div>
</div>
