<body>
<div class="wrap">
 <div class="page-title">
  <h1>якби нікого не було...</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 якби нікого не було,<br /><br />
чи ти б тоді була,<br /><br />
приберігаючи тепло<br /><br />
до витоків тепла,<br /><br />
<br />
до перелистування лун<br /><br />
і відлипання крил –<br /><br />
який би скрушився валун<br /><br />
аби тебе відкрив,<br /><br />
<br />
якими в озероснігах<br /><br />
дрімали б комиші,<br /><br />
і з-понад чим стирався страх<br /><br />
у кутиках душі
 </div>
