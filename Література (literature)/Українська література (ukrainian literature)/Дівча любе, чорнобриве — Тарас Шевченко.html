<div class="wrap">
 <div class="page-title">
  <h1>Дівча любе, чорнобриве</h1>
  <h2>Тарас Шевченко</h2>
 </div>
 <div class="prose" id="content">
 Дівча любе, чорнобриве<br />
Несло з льоху пиво.<br />
А я глянув, подивився —<br />
Та аж похилився…<br />
Кому воно пиво носить?<br />
Чому босе ходить?..<br />
Боже сильний! Твоя сила<br />
Та тобі ж і шкодить.
 </div>
