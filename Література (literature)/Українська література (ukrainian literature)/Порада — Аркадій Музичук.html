 <div class="page-title">
  <h1>Порада</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 Новачок-парашутист<br />
До майстра гукає:<br />
— Я лечу — у, у вухах сви-и-ст...<br />
А коли — не знаю —<br />
Треба висмикнуть кільце,<br />
Щоб розкрився купол?<br />
Майстер гострий на слівце,<br />
Посміхнувся скупо,<br />
І порадив:<br />
"Пройде страх!<br />
Це бува так зразу!<br />
Помокріє у штанах —<br />
Рви кільце відразу!"
 </div>
