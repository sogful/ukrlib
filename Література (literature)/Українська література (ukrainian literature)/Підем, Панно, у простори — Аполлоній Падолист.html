<body>
<div class="wrap">
 <div class="page-title">
  <h1>Підем, Панно, у простори...</h1>
  <h2>Аполлоній Падолист</h2>
 </div>
 <div class="prose" id="content">
 Підем, Панно, у простори,<br />
Де мажорний вітра подув<br />
На безводній хвилі ходить<br />
Переходом, як на морі…<br />
<br />
Підем далі, там де луни<br />
Вічно-юних передзвонів<br />
Невгомонним срібним тоном<br />
Зунісонять наші струни…
 </div>
