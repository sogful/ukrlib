<div class="wrap">
 <div class="page-title">
  <h1>Ганнусина пісня</h1>
  <h2>Марійка Підгірянка</h2>
 </div>
 <div class="prose" id="content">
 Співаночки мої любі,<br />
Де я вас подію?<br />
Понесу вас в полонину,<br />
3 вітрами розвію.<br />
<br />
А там будуть вівчарики<br />
Вівці випасати,<br />
Будуть мої співаночки<br />
У траві збирати.<br />
<br />
Будуть, будуть вівчарики<br />
Білі вівці пасти,<br />
Будуть мої співаночки<br />
В трембіточку класти.
 </div>
