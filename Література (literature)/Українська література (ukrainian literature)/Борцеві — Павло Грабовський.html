<body>
<div class="wrap">
 <div class="page-title">
  <h1>Борцеві</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Не трать надій:<br />
Ти згинеш,— слід<br />
Твоїх подій<br />
Розтопить лід<br />
<br />
В серцях катів,<br />
Любов натхне<br />
Їм до братів...<br />
Вік промине;<br />
<br />
Любов же та<br />
Одним одна,<br />
Що день — свята,<br />
Що день — ясна,<br />
<br />
Переживе<br />
І всіх і все,<br />
Життя нове<br />
У мир внесе!
 </div>
