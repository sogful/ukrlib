<div class="wrap">
 <div class="page-title">
  <h1>Червень</h1>
  <h2>Михайло Стельмах</h2>
 </div>
 <div class="prose" id="content">
 Дні погожі,<br />
Ясні,<br />
Жаркі.<br />
На лугах<br />
Дзвенять косарки,<br />
І співають<br />
Всі луги,<br />
І підводяться<br />
Стоги.<br />
Я вминаю<br />
З дідом стіг,<br />
Щоб у дощик<br />
Не затік,<br />
Щоб сінце<br />
Худоба їла,<br />
Нас, колгоспників,<br />
Хвалила.
 </div>
