<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ні перед ким не станеш спину гнути</h1>
  <h2>Василь Симоненко</h2>
 </div>
 <div class="prose" id="content">
 Ні перед ким не станеш спину гнути,<br />
Не віддасися ворогу в ясу,<br />
Якщо ти зміг, товаришу, збагнути<br />
Свого народу велич і красу.
 </div>
