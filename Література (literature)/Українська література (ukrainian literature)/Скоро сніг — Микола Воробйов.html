<div class="wrap">
 <div class="page-title">
  <h1>Скоро сніг</h1>
  <h2>Микола Воробйов</h2>
 </div>
 <div class="prose" id="content">
 "Скоро сніг, скоро сніг",—<br />
у дзвіночки синиці дзвонять.<br />
А грибам ще не хочеться снігу,<br />
та що поробиш, у вербове дупло<br />
перебиратися треба.<br />
<br />
"Тут і так тісно",— слимаки обзиваються.<br />
Але посунулись І світлячка<br />
на середину стелі примостили.
 </div>
