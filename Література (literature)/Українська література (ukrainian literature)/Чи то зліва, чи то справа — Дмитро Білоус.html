<div class="wrap">
 <div class="page-title">
  <h1>Чи то зліва, чи то справа</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Загадка<br /><br />
Є слова — ну й цікаво!<br />
Є слова — просто диво!<br />
Прочитаймо їх з вами:<br />
чи то зліва направо,<br />
чи то справа наліво —<br />
означають те саме.<br />
Ось дивіться: корок, біб,<br />
око, Кирик, зараз, піп...<br />
Є ще й інші на умі,<br />
та назвіть ви їх самі.
 </div>
