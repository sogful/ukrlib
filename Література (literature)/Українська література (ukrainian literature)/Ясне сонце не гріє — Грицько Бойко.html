<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ясне сонце не гріє</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Ясне сонце не гріє,<br />
Холодок повіва,<br />
Засихає, жовтіє<br />
На узліссі трава.<br />
Небо хмуриться часто,<br />
Потемніла ріка...<br />
Щоб дощами упасти,<br />
Плине хмара важка.<br />
Осипаються клени,<br />
Листя з дуба летить...<br />
Лиш ялинка зелена<br />
Серед лісу стоїть.
 </div>
