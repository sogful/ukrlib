 <div class="prose" id="content">
 У павутин бабиного літа<br />
Сплітаєтьcя тепло із білим cумом.<br />
Душа іще не зна Те Dеum Witte*,<br />
Але й не вільна від її задуми.<br />
___________<br /><br />
* &#8211; утома від життя.
