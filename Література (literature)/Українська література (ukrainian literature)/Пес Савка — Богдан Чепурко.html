<div class="wrap">
 <div class="page-title">
  <h1>Пес Савка</h1>
  <h2>Богдан Чепурко</h2>
 </div>
 <div class="prose" id="content">
 Пес Савка<br />
на гуси гавка.<br />
<br />
Тікайте, гуси,—<br />
пес вкусить.<br />
<br />
Не робіть шкоду<br />
бабиному городу!
