<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не треба думати мізерно...</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 Не треба думати мізерно...<br />
Безсмертя є ще де-не-де...<br />
Хтось перевіяний, як зерно,<br />
У ґрунт поезії впаде.<br />
<br />
Митцю не треба нагород,<br />
Його судьба нагородила,<br />
Коли в людини є народ,<br />
Тоді вона уже людина.
 </div>
