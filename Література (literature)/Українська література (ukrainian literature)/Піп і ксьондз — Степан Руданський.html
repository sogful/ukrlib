 <div class="page-title">
  <h1>Піп і ксьондз</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 Ксьондз сміється: "Паки! Паки!<br />
Дай, попе, табаки!"<br />
А піп каже: "Surdum corda! *<br />
На, теляча морда!"<br />
___________________________<br /><br />
* Піднесімось духом! (лат.) — Ред.
