<div class="wrap">
 <div class="page-title">
  <h1>До... ("Ярмо важуче...")</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Ярмо важуче —<br />
То твій вінець,<br />
Життя замуче<br />
Тебе вкінець.<br />
<br />
Всю сум обійме...<br />
З чола ж твого<br />
Сам кат не здійме<br />
Вінця того.<br />
<br />
Він сяти буде<br />
Зі споду тьми,<br />
Любов розбуде<br />
Межи людьми!
 </div>
</div>
