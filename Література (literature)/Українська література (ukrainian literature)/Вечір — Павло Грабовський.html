<div class="wrap">
 <div class="page-title">
  <h1>Вечір</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Оддихнім від жару;<br />
Божий день потух;<br />
По селу отару<br />
Розігнав пастух.<br />
<br />
Холодненький морок<br />
Потяга з долин,<br />
Огорнув пригорок,<br />
І ставок, і млин.<br />
<br />
Гамір переднічний<br />
Всюди затиха:<br />
Спить трудівник вічний.<br />
Важко в сні зітха.
 </div>
