<body>
<div class="wrap">
 <div class="page-title">
  <h1>Обруч</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Покотив я обруча.<br />
Мій обруч — навтікача<br />
Стежкою-доріжкою.<br />
Я притупнув ніжкою:<br />
— Стій!<br />
Спинися!<br />
Не тікай!..—<br />
Мій обруч —<br />
В зелений гай.<br />
Тільки чую:<br />
— Д-О-О-О-ганяй!..
 </div>
</div>
