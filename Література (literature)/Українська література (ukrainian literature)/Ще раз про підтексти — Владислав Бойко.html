<div class="wrap">
 <div class="page-title">
  <h1>Ще раз про підтексти</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 Набір неологізмів, флексій,<br />
алітерацій, порівнянь...<br />
Ти кажеш:<br />
— Суть вірша — в підтексті,<br />
у підсвідомості сприймань!<br /><br />
Та другу істину я знаю —<br />
і взагалі, і зокрема:<br />
Як в голові<br />
думок немає,<br />
шукати нижче їх дарма!
 </div>
