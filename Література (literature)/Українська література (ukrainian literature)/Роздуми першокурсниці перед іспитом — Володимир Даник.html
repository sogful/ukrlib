<body>
<div class="wrap">
 <div class="page-title">
  <h1>Роздуми першокурсниці перед іспитом</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 Підфарбувати губи — неодмінно!<br />
І модна сукня, щоб видно — коліна...<br />
У дівчини і справді ж — гарні очі!<br />
То це що — для п'ятірки не причина?!
 </div>
