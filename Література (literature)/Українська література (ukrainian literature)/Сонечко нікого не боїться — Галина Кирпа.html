<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сонечко нікого не боїться</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Прилетіло сонечко<br />
у такому плащику:<br />
крап-крапи-крапиночка,<br />
горо-горошок:<br />
— Не боюся дощику,<br />
не боюся грімниці,<br />
не боюся котика,<br />
не боюсь пташок!
 </div>
</div>
