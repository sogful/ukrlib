<body>
<div class="wrap">
 <div class="page-title">
  <h1>Стояла я і слухала весну...</h1>
  <h2>Леся Українка</h2>
 </div>
 <div class="prose" id="content">
 Стояла я і слухала весну,<br />
Весна мені багато говорила,<br />
Співала пісню дзвінку, голосну<br />
То знов таємно-тихо шепотіла.<br />
<br />
Вона мені співала про любов,<br />
Про молодощі, радощі, надії,<br />
Вона мені переспівала знов<br />
Те, що давно мені співали мрії.
 </div>
