<body>
<div class="wrap">
 <div class="page-title">
  <h1>Після дощів смарагдова дібров</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 Після дощів смарагдова діброва,<br />
на білій ріні річка говірка.<br />
І смужка сонця тонко пурпурова<br />
далекий обрій пензликом торка.<br /><br />
Лежить городів гарбузова Мекка.<br />
У тихе небо струменіть тепло.<br />
І над стареньким комином лелека<br />
після дощу просушує крило.
 </div>
