<div class="wrap">
 <div class="page-title">
  <h1>Наче море в краях полудневих…</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Наче море в краях полудневих,<br />
Зеленіють зелені сади,<br />
Білий цвіт на деревах вишневих —<br />
Наче шум весняної води.<br />
<br />
Наче в морі русалки, ридають<br />
І сміються в садах солов'ї,<br />
Наче хвилі, мене заливають<br />
Недоспівані співи мої.
 </div>
