<title>Пам'яті друга</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Пам'яті друга</h1>
  <h2>Наталія Горішна</h2>
 </div>
 <div class="prose" id="content">
 <p>на піску на воді на листку</p>
<p>
ти писав свої вірші</p>
<p>
у шинку в квітнику в смітнику –</p>
<p>
ті які найсправжніші</p>
<p>
на щиті на гаку на хресті</p>
<p>
зледенівши від зради</p>
<p>
в самоті висоті марноті</p>
<p>
гетсиманського саду</p>
 </div>
</div>
</body>
