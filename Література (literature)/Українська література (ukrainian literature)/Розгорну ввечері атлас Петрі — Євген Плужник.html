<div class="wrap">
 <div class="page-title">
  <h1>Розгорну ввечері атлас Петрі</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Розгорну ввечері атлас Петрі,<br />
Четверту, здається, мапу&#8230;<br />
Доле! З буденних нетрів<br />
Не поїдеш нікуди, мабуть&#8230;<br /><br />
Подивлюсь стомлено правді в вічі:<br />
Ліжко знайоме, книжки у шафі&#8230;<br />
Годі! Не всім же личить<br />
Підручник з географії.
 </div>
