<title>Не зумію горя...</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не зумію горя...</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Не зумію горя<br />
Вимовить словами,<br />
Так зіллю дрібними,<br />
Тихими сльозами.<br />
<br />
Коли ж його, злого,<br />
Збутись не здолаю,<br />
Так журливо пісню<br />
Рідну заспіваю.
 </div>
</div>
