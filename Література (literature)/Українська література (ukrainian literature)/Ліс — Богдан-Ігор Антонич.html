<div class="wrap">
 <div class="page-title">
  <h1>Ліс</h1>
  <h2>Богдан-Ігор Антонич</h2>
 </div>
 <div class="prose" id="content">
 Навчися лісової мови<br />
із книги лисів та сарнят!<br />
Виходить місяць до діброви<br />
писать елегії на пнях.<br />
<br />
Струмки полощуть срібло тиші,<br />
в росі купається трава.<br />
Хай найпростіші з всіх слова<br />
у книзі лісу ніч напише!
 </div>
