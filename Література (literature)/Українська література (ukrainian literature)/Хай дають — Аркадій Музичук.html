<title>Хай дають</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хай дають</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 — Діду, діду, вам догану<br />
Дали на планірці.<br />
— Хай дають, — це не погано!<br />
Куплю кохту жінці.
 </div>
</div>
