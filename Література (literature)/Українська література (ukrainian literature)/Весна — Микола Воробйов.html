<div class="wrap">
 <div class="page-title">
  <h1>Весна</h1>
  <h2>Микола Воробйов</h2>
 </div>
 <div class="prose" id="content">
 А вже весна-весняночка<br />
крапотить ізраночка.<br />
Ноги скачуть,<br />
крига плаче,<br />
золотий казан кипить.
