 <div class="page-title">
  <h1>Відповідь по суті</h1>
  <h2>Петро Панч</h2>
 </div>
 <div class="prose" id="content">
 <p>В німецькій школі вчитель розповідав про багатства окупованих земель, а потім запитав:</p>
<p>
— Хто б з вас хотів поїхати на Україну?</p>
<p>
— Я,— відказав один хлопчик.</p>
<p>
— Молодчина. А що ти там будеш робити для честі третьої імперії?</p>
<p>
— Заберу труп мого батька.</p>
