<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не за своє</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 Любив Карпо чужеє брати<br />
і — в котрий раз вже! — сів за грати.<br />
— Тьху, дурень! — конвоїр плює, —<br />
ти знову взявся за своє?<br /><br />
Карпо очима тільки блудить:<br />
— Якби ж то... За своє не судять.
 </div>
