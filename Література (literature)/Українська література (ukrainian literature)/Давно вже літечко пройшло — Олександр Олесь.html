<div class="wrap">
 <div class="page-title">
  <h1>Давно вже літечко пройшло...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Давно вже літечко пройшло,<br />
Доволі бігати, гуляти...<br />
Садок снігами замело:<br />
Тепер учімося читати,<br />
Ж, Р гарненько вимовляти,<br />
Щоб нам не соромно було<br />
Себе на люди показати.
 </div>
