<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дурень</h1>
  <h2>Анатолій Гарматюк</h2>
 </div>
 <div class="prose" id="content">
 Усе життя<br />
Одну біду мав:<br />
Я говорив усе,<br />
Що думав.<br />
Ніхто не прислухавсь<br />
До того,<br />
То далі думати<br />
Для чого?<br />
Я так подумав<br />
І затих —<br />
Нема дурних!
 </div>
