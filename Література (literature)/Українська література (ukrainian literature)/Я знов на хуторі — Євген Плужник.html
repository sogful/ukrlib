 <div class="page-title">
  <h1>Я знов на хуторі</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Я знов на хуторі. Шовковий шум гаїв<br />
Приспав усе надворі і в господі&#8230;<br />
Навіть здається, що думки твої<br />
Додумано, – і віршувати годі!<br /><br />
Хіба одну в старенький свій альбом<br />
Вписати десь без зайвих слів і дати:<br />
І хуторові, й віршеві – обом<br />
Час помирати.
 </div>
