<body>
<div class="wrap">
 <div class="page-title">
  <h1>Відповідь по суті</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 — У кого ви, шановна пані,<br />
Так модно одягаєтесь щоразу?<br />
Не можете нам дати її дані?<br />
За послугу я заплачу одразу.<br />
— Не від одної тебе відбиваюсь:<br />
Ночую з ким — у того й одягаюсь.
 </div>
