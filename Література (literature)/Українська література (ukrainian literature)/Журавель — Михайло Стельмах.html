<body>
<div class="wrap">
 <div class="page-title">
  <h1>Журавель</h1>
  <h2>Михайло Стельмах</h2>
 </div>
 <div class="prose" id="content">
 За народними мотивами<br />
<br />
Журавель для баранця<br />
Накосив стіжок сінця<br />
Та й майструє ясельця,<br />
Не собі — для баранця.<br />
Хай баранчик — добрий гість —<br />
Із яселець сіно їсть,<br />
Хай не смикає він стіг,<br />
Бо зламати може ріг.
 </div>
