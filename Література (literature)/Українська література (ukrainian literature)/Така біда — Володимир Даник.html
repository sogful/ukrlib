<body>
<div class="wrap">
 <div class="page-title">
  <h1>Така біда</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 Сказати влучно Гриць мастак,<br />
Хоча й неговіркий на вид:<br />
— Ніколи не буває так,<br />
Щоб все виходило… як слід!<br />
А у словах Кіндрата гнів:<br />
— Така біда, що… Боже, збав!<br />
Бо позавчора недопив,<br />
А от учора — перебрав…
 </div>
