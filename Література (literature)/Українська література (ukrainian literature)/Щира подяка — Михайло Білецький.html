<body>
<div class="wrap">
 <div class="page-title">
  <h1>Щира подяка</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Хоч ти неук, лежибока —<br />
Взяв тебе в свою контору.<br />
Не минуло ще й півроку —<br />
Ти пішов угору:<br />
Кабінет свій власний маєш,<br />
Солідну зарплату.<br />
З чим тебе й поздоровляю!<br />
— Дякую вам, тату!
 </div>
</div>
