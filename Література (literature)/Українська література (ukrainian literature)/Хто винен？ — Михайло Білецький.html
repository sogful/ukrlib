<title>Хто винен?</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хто винен?</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Дзвонить бригадир до Гната:<br />
— Чом роботу кинув?<br />
— Та нещастя, — каже, — ногу<br />
Зламала дружина!<br />
— Ну то й що?<br />
Адже дружина в нас не працювала<br />
— Так вона ж не собі ногу,<br />
А мені зламала!
 </div>
