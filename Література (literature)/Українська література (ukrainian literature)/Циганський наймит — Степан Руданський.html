<div class="wrap">
 <div class="page-title">
  <h1>Циганський наймит</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 Віддавав у наймити<br />
Циган свого сина:<br /><br />
— "Та він, — каже, — буде в вас<br />
Добрая дитина!<br /><br />
А як коли зноровить<br />
Та їсти не схоче —<br />
Не жалуйте, прошу вас!..<br />
Нагайом, пан-отче!..<br /><br />
Та все йому говоріть:<br />
"А їж таки, враже!"<br />
А робити? — чорт із ним,<br />
Не силуйте!" — каже.
 </div>
