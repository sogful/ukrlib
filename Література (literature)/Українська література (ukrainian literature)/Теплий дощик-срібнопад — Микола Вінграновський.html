<body>
<div class="wrap">
 <div class="page-title">
  <h1>Теплий дощик-срібнопад...</h1>
  <h2>Микола Вінграновський</h2>
 </div>
 <div class="prose" id="content">
 Теплий дощик-срібнопад<br />
Вимив наш сьогодні сад.<br />
Попід садом до калюжі<br />
Йде гусак серйозний дуже.<br />
<br />
Льоп-люп-ляп<br />
В гусака з-під лап —<br />
При такому ляпі-льопі<br />
Лапи не болять!
 </div>
</div>
