<body>
<div class="wrap">
 <div class="page-title">
  <h1>Віддай мені своєї смерти частку</h1>
  <h2>Василь Стус</h2>
 </div>
 <div class="prose" id="content">
 Віддай мені своєї смерти частку,<br />
візьми од мене часточку життя,<br />
і вдвох уникнем самоти, як пастки,<br />
і не потрібне буде вороття<br />
у проминуле, що майбутнім стало,<br />
в вельможний нескінченний сон степів,<br />
та за тобою небо запалало,<br />
овогнене грозою стожалів.
 </div>
</div>
