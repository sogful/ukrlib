<div class="wrap">
 <div class="page-title">
  <h1>Павук</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Оцей Павук — вже дід.<br />
Його внучата —<br />
меткі<br />
чорненькі<br />
павучата —<br />
плетуть йому<br />
крислатий капелюх,<br />
щоб гарний був<br />
від сонця,<br />
від дощу,<br />
від преусякої мороки<br />
ще й від мух!
 </div>
