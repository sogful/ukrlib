<body>
<div class="wrap">
 <div class="page-title">
  <h1>Загубило сонце коромисло...</h1>
  <h2>Іван Дорожній</h2>
 </div>
 <div class="prose" id="content">
 Загубило сонце коромисло,<br />
беручи місяцем воду,<br />
в полі осінньо-пожовклому, між околків…<br />
Граючись, трави, у коників,<br />
спіткнувшись, упали до озера:<br />
– Гей, гукають, прозорість!<br />
Гуляймо до нового сонця!
 </div>
