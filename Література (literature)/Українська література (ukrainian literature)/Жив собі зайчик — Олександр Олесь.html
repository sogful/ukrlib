<body>
<div class="wrap">
 <div class="page-title">
  <h1>Жив собі зайчик...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Жив собі зайчик в бузиновій хатці,<br />
Мився з миски, спав на канапці,<br />
Мав кожуха і сіренькі капці.<br />
<br />
Сіяв моркву, редьку і капусту,<br />
Щоб не було в животику пусто,<br />
А в коморі щоб лежало густо.
 </div>
