<div class="wrap">
 <div class="page-title">
  <h1>Ватра</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Потухає священна ватра<br />
Що засвітив недбало<br />
Я заберу попіл завтра<br />
Для безецного балу<br /><br />
Зникну для огня непомітно<br />
Мій шлях безвинність<br />
Руштесь стіни бездовідно<br />
Ламте стриманість.
 </div>
