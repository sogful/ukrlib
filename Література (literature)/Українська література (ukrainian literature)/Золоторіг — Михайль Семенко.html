<div class="wrap">
 <div class="page-title">
  <h1>Золоторіг</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Хто, хто був ще такий радий,<br />
Як я учора?<br />
Місячні ночі будуть — будуть скоро,<br />
Як кілька часу назад.<br /><br />
Небо безплямне. Рожево-блідий захід.<br />
І тут же на золоторіг зором наткнувсь —<br />
Як гарно півмісяць неіснуючої мечеті зігнувсь!<br />
Це був моєї туги знахід.
 </div>
