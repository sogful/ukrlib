<div class="wrap">
 <div class="page-title">
  <h1>Розчиняться холодні двері...</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Розчиняться холодні двері<br />
І піде неправдивий дим.<br />
Багнеться Тайної Вечері<br />
І ворухнуть святим,<br />
<br />
І ворухнуть Європами й Азіями,<br />
Наскрізь проткнуть — як день —<br />
Викинуть думками в оберемок з'язаними<br />
Блакитний з голови пень.<br />
<br />
18-II-920. Київ.
