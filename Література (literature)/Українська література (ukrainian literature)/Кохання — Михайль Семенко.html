<div class="wrap">
 <div class="page-title">
  <h1>Кохання</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Як мрію світлу і прекрасну<br />
Я образ твій ловлю<br />
Як море любить сонце ясне<br />
Так я тебе люблю<br /><br />
Всю ясність серця що плекаю<br />
Віддам тобі тобі<br />
Відтак я тьми в душі не маю<br />
І не піддамсь злобі.<br />
<br />
1917 р.
 </div>
