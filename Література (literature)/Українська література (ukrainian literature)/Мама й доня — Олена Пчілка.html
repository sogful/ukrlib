<title>Мама й доня</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мама й доня</h1>
  <h2>Олена Пчілка</h2>
 </div>
 <div class="prose" id="content">
 Погляньте на двох їх:<br />
Он з донею мати.<br />
Чи можна ж маленьку<br />
Ще більше кохати?!<br /><br />
Впадає матуся,<br />
Дівчатко милує,—<br />
І рученьки й ніжки<br />
Маленькі цілує!
 </div>
</div>
