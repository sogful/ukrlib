<body>
<div class="wrap">
 <div class="page-title">
  <h1>Лис</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Під горою хвойний ліс,<br />
За горою хижий лис.<br />
Вкрита травами гора.<br />
Збоку — лисяча нора.<br />
Лис ховає неспроста<br />
Від собак свого хвоста:<br />
Як навідався в курник —<br />
То відразу півень зник!
 </div>
