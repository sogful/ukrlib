<body>
<div class="wrap">
 <div class="page-title">
  <h1>Старий і молодий лис</h1>
  <h2>Маркіян Шашкевич</h2>
 </div>
 <div class="prose" id="content">
 Молодий Лис, котрий ще стрільця не знав,<br />
Утішився, як нову красну шерсть дістав.<br />
А старий рік:<br />
"Безпечність тих ліпот не любить,<br />
Не тішся ними: сеся красота нас губить".<br />
Не все, що красне,<br />
Єсть для нас щасне.
 </div>
