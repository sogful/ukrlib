<body>
<div class="wrap">
 <div class="page-title">
  <h1>Усі трудяться</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Дерево трудиться назеленітися.<br />
Квіточка трудиться начервонітися.<br />
Бджілка трудиться налітатися.<br />
Метеличок трудиться нагойдатися.<br />
Травичка — водички напитися,<br />
росинка — на білий світ надивитися!
 </div>
</div>
