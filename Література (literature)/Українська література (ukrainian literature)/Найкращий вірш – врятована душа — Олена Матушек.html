<body>
<div class="wrap">
 <div class="page-title">
  <h1>Найкращий вірш – врятована душа...</h1>
  <h2>Олена Матушек</h2>
 </div>
 <div class="prose" id="content">
 Найкращий вірш – врятована душа.<br />
Врятована від пихи і від ліні<br />
Душа, яку повік не полиша<br />
Високістю освячене горіння.<br />
<br />
Найкращий вірш – то здивування мить,<br />
В буденному віднайдені дива<br />
І спогад, що у серці защемить...<br />
А інше все – слова.
 </div>
</div>
