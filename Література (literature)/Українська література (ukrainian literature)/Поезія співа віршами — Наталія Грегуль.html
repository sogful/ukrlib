 <div class="page-title">
  <h1>Поезія співа віршами...</h1>
  <h2>Наталія Грегуль</h2>
 </div>
 <div class="prose" id="content">
 Поезія співа віршами,<br />
Плете мереживо зі слів,<br />
Кохаю – промовля вустами,<br />
Бере за серце її спів.
