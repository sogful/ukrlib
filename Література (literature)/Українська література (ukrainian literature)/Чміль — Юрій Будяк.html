<body>
<div class="wrap">
 <div class="page-title">
  <h1>Чміль</h1>
  <h2>Юрій Будяк</h2>
 </div>
 <div class="prose" id="content">
 Гуде чміль,<br />
Сів на хміль,<br />
На листки-<br />
Пелюстки<br />
Припада,<br />
Погляда<br />
Все вперед<br />
Та пита<br />
На бігу:<br />
— Де той мед?<br />
Де той мед?<br />
Г-у-у-у-у…
 </div>
</div>
