<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сповнений почуття вдячності</h1>
  <h2>Василь Стус</h2>
 </div>
 <div class="prose" id="content">
 Сповнений почуття вдячності,<br />
він захотів переповісти мені<br />
всю свою історію,<br />
але виявилось,<br />
що історії нема,<br />
і він мусив був обмежитись<br />
самими словами вдячності.
 </div>
</div>
