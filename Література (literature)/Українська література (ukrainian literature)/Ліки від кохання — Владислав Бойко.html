<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ліки від кохання</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 Він так страждав, так плакав гірко!<br />
(Любов до того довела...)<br />
Він присвятив їй цілу збірку,<br />
і збірка видана була.<br /><br />
І доля з ним була ласкава:<br />
прийшли і гонорар, і слава...<br />
А шо ж любов?<br />
Любов пройшла!
 </div>
