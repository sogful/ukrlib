<title>Хвостик ніде діти</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хвостик ніде діти</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Я пошила на святки<br />
Нашій киці чобітки.<br />
Шапочку наділа,<br />
Тільки не зуміла<br />
Трусики надіти —<br />
Хвостик ніде діти.
 </div>
</div>
