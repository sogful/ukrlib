<body>
<div class="wrap">
 <div class="page-title">
  <h1>Люблячі синочки</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Запитав синочків тато:<br />
— Любі мої діти,<br />
Чи на шиї моїй довго<br />
Будете сидіти? —<br />
А вони йому на те:<br />
— Не можемо знати,<br />
Скільки ви проживете,<br />
Дорогий наш тату!
 </div>
