<body>
<div class="wrap">
 <div class="page-title">
  <h1>Коли разом</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 А слова — стрілою з лука!<br />
Гриць — людина терта:<br />
— Контрабанда — що за штука?!<br />
Поясни відверто...<br />
Та слова чіткі від Власа,<br />
Мов під час диктанту:<br />
— Ну, це коли... діють разом —<br />
І контра, і банда!
 </div>
