<div class="wrap">
 <div class="page-title">
  <h1>першого зову вівчаря...</h1>
  <h2>Василь Герасим'юк</h2>
 </div>
 <div class="prose" id="content">
 першого зову вівчаря<br />
і не тільки тому<br />
що над ним сіяла зоря<br />
двадцять століть тому<br /><br />
що був першим кому благу<br />
ангел вість передав<br />
а тому що ягня пастуху<br />
Бог на руки подав<br /><br />
на зорі йорданського дня<br />
розповийся глуха<br />
душе<br /><br />
бо задушить ягня<br /><br />
що було без гріха
 </div>
