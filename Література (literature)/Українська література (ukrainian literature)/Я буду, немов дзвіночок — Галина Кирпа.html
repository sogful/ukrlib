<body>
<div class="wrap">
 <div class="page-title">
  <h1>Я буду, немов дзвіночок</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Ой пустіть мене у садочок,<br />
у той пустіть,<br />
де я буду, немов дзвіночок,<br />
синім ясніть.<br /><br />
Ой пустіть мене меж отави<br />
і дуби, —<br />
чи полюблять мене там трави<br />
і гриби?<br /><br />
Принесе мені вітер казку<br />
у долоні<br />
чи гукатиме з мамою разом:<br />
&#8220;До-о-оню!&#8221;?
 </div>
