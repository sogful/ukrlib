<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ліс</h1>
  <h2>Микола Воробйов</h2>
 </div>
 <div class="prose" id="content">
 Ходив ліс золотий до міста.<br />
<br />
Підійде до скляної стіни,<br />
підструже золотого олівця,<br />
малює на скляній стіні.<br />
<br />
А вчора ліс не прийшов.<br />
<br />
Лежить золотий олівець у яру.<br />
<br />
Забрав у місто чорний ліс.
 </div>
</div>
