<title>Лазить сонечко в травах</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Лазить сонечко в травах</h1>
  <h2>Микола Вінграновський</h2>
 </div>
 <div class="prose" id="content">
 Лазить сонечко в травах,<br />
скаче коник за коником гоном,<br />
І метелик з метеликом<br />
в піжмурки грають на мить.<br />
Лиш одна біла чапля<br />
з малиновим волом<br />
У зеленій воді<br />
на сріблястій нозі стоїть.
 </div>
</div>
</body>
