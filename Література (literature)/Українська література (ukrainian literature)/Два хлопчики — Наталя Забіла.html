<body>
<div class="wrap">
 <div class="page-title">
  <h1>Два хлопчики</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 Два хлопчики, два хлопчики<br />
несли відро води.<br />
Зустріли звіра сірого<br />
розбіглись хто куди!<br /><br />
Відерце перекинулось,<br />
і витекла вода.<br />
А сірий звір з-під кущика<br />
лякливо вигляда.
 </div>
</div>
