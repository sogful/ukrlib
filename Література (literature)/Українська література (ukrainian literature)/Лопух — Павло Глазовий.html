<body>
<div class="wrap">
 <div class="page-title">
  <h1>Лопух</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Хваливсь лопух:<br />
— Погляньте-но<br />
на мене!<br />
Я листя маю гарне<br />
і тверде.<br />
Воно широке, свіже<br />
і зелене,<br />
Знайти не можна<br />
кращого ніде!<br />
<br />
Отак бува:<br />
послухаєш поета –<br />
Які слова!<br />
Який високий дух!<br />
Який розгін!<br />
Тісна йому й планета.<br />
А ближче глянеш —<br />
той же вам лопух.
 </div>
