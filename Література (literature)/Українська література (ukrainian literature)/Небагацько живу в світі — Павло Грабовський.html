<div class="wrap">
 <div class="page-title">
  <h1>Небагацько живу в світі...</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Небагацько живу в світі,<br />
А вже знаю горе;<br />
Сліз пекучих, мабуть, вилив<br />
Цілісіньке море.<br />
<br />
Задзвеніла пчілка божа,<br />
По саду літає...<br />
Пошукав би і я квітки,-<br />
Так де процвітає?
 </div>
