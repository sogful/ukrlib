<div class="wrap">
 <div class="page-title">
  <h1>Над морем (Котяться хвилі і грають...)</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Котяться хвилі і грають,<br />
Сиплють на берег піски.<br />
Ледве пісні проспівають,<br />
Чуєш — шепочуть казки.<br />
Ранок і день пролетіли,<br />
Ось уже й ніч настає,<br />
Я ж усе марю, що хвилі<br />
Викинуть щастя моє.
 </div>
