<body>
<div class="wrap">
 <div class="page-title">
  <h1>Бабця спить</h1>
  <h2>Віра Багірова</h2>
 </div>
 <div class="prose" id="content">
 Ходить тиша в теплих капцях,<br />
Задрімала в кріслі бабця.<br />
А годинник цокотить:<br />
Бабця спить, бабця спить.<br />
<br />
Я навшпиньки вийду з хати,<br />
Щоби їй не заважати.<br />
Не скачи, собачко, цить!<br />
Бабця спить.<br />
Бабця спить.<br />
<br />
<strong>Джерело: </strong>Київ "Веселка" 1989
