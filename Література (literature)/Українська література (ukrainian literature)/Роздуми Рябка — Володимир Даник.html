<body>
<div class="wrap">
 <div class="page-title">
  <h1>Роздуми Рябка</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 А думка гостра, ніби сталь,<br />
Бува, турбує тебе знову.<br />
Траплялося таке, на жаль,<br />
Що раптом... гавкнеш помилково!<br />
Ото ж бо сумнів і гризе...<br />
Але подумаєш з журбою:<br />
Не перегавкувати ж все,<br />
Що вигавкнулося тобою!
 </div>
