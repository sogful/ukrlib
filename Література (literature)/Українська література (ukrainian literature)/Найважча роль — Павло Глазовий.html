<body>
<div class="wrap">
 <div class="page-title">
  <h1>Найважча роль</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Вихваля свого синочка<br />
Мати на всі боки:<br />
— У студії при театрі<br />
Вчиться вже два роки.<br />
Дуже довго муштрували<br />
Хлопця режисери.<br />
Аж тепер він дочекався<br />
Першої прем'єри.<br />
Роль найважчу доручили<br />
Любому синочку:<br />
Він на сцені в третій дії<br />
Викочує бочку!
 </div>
