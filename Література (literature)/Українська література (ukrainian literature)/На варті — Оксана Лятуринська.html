<div class="wrap">
 <div class="page-title">
  <h1>На варті</h1>
  <h2>Оксана Лятуринська</h2>
 </div>
 <div class="prose" id="content">
 <blockquote>Світлій пам’яті Юрія Дарагана.</blockquote><br />
<br />
Не знаєш гасла – боронись!<br />
Освячений держу я спис.<br />
Я попіл бороню батьків,<br />
героїв – славу, честь – борців.<br />
<br />
Зухвальче, чолом, оком ниць!<br />
Тут недоторканість гробниць,<br />
багаття, і священний дуб,<br />
і Володимирів тризуб.
 </div>
