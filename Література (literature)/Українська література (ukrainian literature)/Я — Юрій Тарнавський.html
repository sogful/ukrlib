 <div class="page-title">
  <h1>Я</h1>
  <h2>Юрій Тарнавський</h2>
 </div>
 <div class="prose" id="content">
 я не поет,<br />
бо мої слова грубі,<br />
як поліна,<br />
і не мистець,<br />
бо мадонни німі до мене,<br />
як чужі фотографії,<br />
і не філософ,<br />
бо не можу читати<br />
ні Канта,<br />
ні Декарта<br /><br />
але коли ніч<br />
і коли пече мозок,<br />
що мені робити?<br />
— коли б я вмів ходити на голові,<br />
я ходив би
 </div>
