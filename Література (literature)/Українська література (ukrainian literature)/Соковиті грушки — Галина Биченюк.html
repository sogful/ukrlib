<body>
<div class="wrap">
 <div class="page-title">
  <h1>Соковиті грушки</h1>
  <h2>Галина Биченюк</h2>
 </div>
 <div class="prose" id="content">
 Росли у лісі дички,<br />
Три груші невеличкі.<br />
Ми з татом в ліс пішли,<br />
Ті грушки принесли.<br />
Я їх не забуваю,<br />
Щоденно поливаю,<br />
Бо то уже не дички,<br />
Не лісові кислички,—<br />
З роками будуть спіти<br />
Тут груші соковиті.
 </div>
