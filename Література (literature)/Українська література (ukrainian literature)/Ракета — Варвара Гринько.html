<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ракета</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Хочеш — вір,<br />
Не хоч — не вір:<br />
Привезли ракету<br />
В двір!<br />
Не для когось,<br />
А для нас —<br />
Всі вмістилися<br />
Якраз.<br />
— Пуск! —<br />
Знаходим кнопку<br />
Вмить...<br />
А ракета<br />
Не летить,<br />
Як не натискали...<br />
Жде,<br />
Щоб підростали!
 </div>
