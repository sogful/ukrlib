<body>
<div class="wrap">
 <div class="page-title">
  <h1>Смуток тиші</h1>
  <h2>Григорій Чупринка</h2>
 </div>
 <div class="prose" id="content">
 Все навколо захололо,<br />
Все заснуло;<br />
Гостро в серці закололо,<br />
Дух запнуло.<br />
<br />
В'януть квітоньки в утомі;<br />
Скрізь тужливо...<br />
Війте ж, війте, буроломи,<br />
Ворухливо!<br />
<br />
Дайте щастя, дайте духу,<br />
Дайте бою;<br />
Дайте жаху, страху, руху<br />
І розвою!..
 </div>
</div>
