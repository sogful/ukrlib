 <div class="page-title">
  <h1>Що за знак — стрункий, мов спис?</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Загадка<br /><br />
Що за знак — стрункий, мов спис,<br />
він над крапкою завис,<br />
спонука до поклику.<br /><br />
Хто ж бо він?<br /><br />
(Знак оклику)
 </div>
