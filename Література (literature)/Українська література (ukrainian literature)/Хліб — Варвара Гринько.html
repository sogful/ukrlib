<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хліб</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Хліб тобі не зайчик носить –<br />
Брат мій сіє, тато косить.<br />
Хліборобом хочу стати,<br />
Як мій братик, як мій тато.<br />
Прибіжить із лісу зайчик –<br />
Сам подам йому окрайчик!
 </div>
</div>
