<body>
<div class="wrap">
 <div class="page-title">
  <h1>Самота</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 І зелені і сонця &#8211; прибуло<br />
за день всього&#8230;<br />
Зелене все доокруж<br />
з відтінками блакиті&#8230;<br />
Дивина,<br />
немов журба поетова, та й годі!..<br /><br />
Зробилось зрозумілішим усе:<br />
земля, дерева, і високі птахи,<br />
і першй грім ламкий, і самота<br />
не видається більше самотою&#8230;
 </div>
