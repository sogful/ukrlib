 <div class="page-title">
  <h1>Образа</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 — А "під мухою", буває,<br />
Ти приходиш, друже...<br />
Як дружина зустрічає?<br />
Сварить тебе дуже?<br />
— На годинник зирка косо<br />
Та й бурчить щоденно...<br />
— А моя щораз голосить,<br />
Наче навіжена,<br />
Календар під носа тиче,<br />
І лякає СНІДом.<br />
Хоч спитала б: "Чоловіче!<br />
Де ж ти місяць снідав?.."
