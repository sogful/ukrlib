<body>
<div class="wrap">
 <div class="page-title">
  <h1>Люблю я море в шумний час прибою</h1>
  <h2>Володимир Сосюра</h2>
 </div>
 <div class="prose" id="content">
 Люблю я море в шумний час прибою,<br />
коли воно за валом вал жене.<br />
Але ще дужче в чарах супокою<br />
люблю я море мрійне і ясне.<br /><br />
Люблю тебе, коли ти балаклива,<br />
як не любив я так іще раніш.<br />
Але ще дужче, мавко пустотлива,<br />
люблю тебе тоді, як ти мовчиш…
 </div>
