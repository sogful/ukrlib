<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мальовані рибки</h1>
  <h2>Віктор Терен</h2>
 </div>
 <div class="prose" id="content">
 Трипки-дрибки,<br />
Мальовані рибки!<br />
<br />
Якось на папері<br />
Хвостиком змахнули,<br />
Випливли за двері.<br />
<br />
Дрибки-трипки,<br />
Не пустуйте, рибки!<br />
<br />
Ту, найбільшу, слухайте,<br />
Моря не розхлюпайте!
 </div>
</div>
