<body>
<div class="wrap">
 <div class="page-title">
  <h1>німці-німці ой білолиці...</h1>
  <h2>Богдан Жолдак</h2>
 </div>
 <div class="prose" id="content">
 німці-німці ой білолиці<br />
дали по спині і потилиці<br />
ловили й били нас поодинці<br />
ой із криниці сьорбали німці<br />
води ісподу води на дінці<br />
води ковтали<br />
гучно сміяли<br />
ой гудьте німці наші криниці<br />
не тіко пити а й утопицця
 </div>
</div>
