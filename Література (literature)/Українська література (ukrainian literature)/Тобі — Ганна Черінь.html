 <div class="page-title">
  <h1>Тобі</h1>
  <h2>Ганна Черінь</h2>
 </div>
 <div class="prose" id="content">
 Як не любиш, говори,<br />
Говори солодкі речі,<br />
Як вечірної пори<br />
Ти мої обіймеш плечі.<br />
<br />
Вибачся, охолоди<br />
Медом слів гарячу душу,<br />
Та й не матимеш біди:<br />
Я ж любити не примушу!<br />
<br />
А як любиш — то не трать<br />
Почуття для слів медових,<br />
Бо кохання розпізнать<br />
Можна серцем, і без мови.
 </div>
