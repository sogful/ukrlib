<body>
<div class="wrap">
 <div class="page-title">
  <h1>Порятунку мені не треба...</h1>
  <h2>Кость Москалець</h2>
 </div>
 <div class="prose" id="content">
 Порятунку мені не треба<br />
дай тільки дай тільки<br />
дай помаранч<br />
<br />
зимовий<br />
у візерунках як скло<br />
<br />
дай мені цю венецію<br />
помаранч<br />
<br />
ущерть повний алкоголями світла<br />
і усамітнення і тендітності рук<br />
<br />
що простягають помаранч<br />
замість порятунку
 </div>
</div>
