<div class="wrap">
 <div class="page-title">
  <h1>Критики, навчаючи поета</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Критики, навчаючи поета,<br />
Залюбки розводяться про те,<br />
Як писати мусить він, щоб Лета<br />
Років з п'ять проміння золоте<br />
На труні у нього не змивала;<br /><br />
Та чомусь історія не знала<br />
Прикладу, щоб критики колись<br />
На собі доводити взялись<br />
Силу ту, що їх наука мала.
 </div>
