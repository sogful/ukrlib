<div class="wrap">
 <div class="page-title">
  <h1>Турботливий братик</h1>
  <h2>Анатолій Гарматюк</h2>
 </div>
 <div class="prose" id="content">
 Каже мама Феді:<br />
— Де ти був, синок?<br />
— На велосипеді<br />
Їздив в дитсадок,<br />
Щоб забрати Рому<br />
З дитсадка додому.—<br />
Мама налякалась:<br />
— А якби що сталось?<br />
Ти ж з велосипеда<br />
З ним упасти міг…<br />
— Ні,— сміється Федя.—<br />
Рома ззаду біг!
 </div>
