<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сиділа раз бабуся</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 <em>(Жарт)</em><br /><br />
Сиділа раз бабуся<br />
в хатинці край вікна.<br />
Якщо нікуди не пішла,<br />
то й досі там вона.<br /><br />
Сиділа раз бабуся<br />
на лавочці сама.<br />
Якщо ж вона пішла звідтіль,<br />
то там її нема!
