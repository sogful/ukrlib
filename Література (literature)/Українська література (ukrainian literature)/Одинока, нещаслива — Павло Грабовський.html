<body>
<div class="wrap">
 <div class="page-title">
  <h1>Одинока, нещаслива...</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Одинока, нещаслива,<br />
Мов та зіронька одна,<br />
Ти мовчала, соромлива,<br />
У незгоді чарівна.<br />
<br />
Незгірш тебе одинокий,<br />
В сум тяжкий замкнувся я;<br />
Але погляд твій глибокий<br />
Поняла душа моя.
 </div>
</div>
