<body>
<div class="wrap">
 <div class="page-title">
  <h1>Одностайність</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Мене постійно серце зупиня:<br />
&#8211; За вік устигнеш все переробити!<br /><br />
Мене нагальна праця підганя:<br />
&#8211; Не смій, не смій мене переступити!<br /><br />
І я затих, бо їх не примирю,<br />
не приведу у гавань рівноваги,<br />
знов поспішаю, знов стою на прю,<br />
забувши болі, сумніви і страхи&#8230;
 </div>
</div>
