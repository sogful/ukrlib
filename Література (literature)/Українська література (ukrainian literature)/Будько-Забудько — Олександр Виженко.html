<body>
<div class="wrap">
 <div class="page-title">
  <h1>Будько-Забудько</h1>
  <h2>Олександр Виженко</h2>
 </div>
 <div class="prose" id="content">
 Один хлопець – ніби два;<br />
Давши слово – забува.<br />
Знайшов же собі за бавку –<br />
Обіцянку-цяцянку.<br />
Обіцяти він – Будько.<br />
А зробити – Забудько.
 </div>
