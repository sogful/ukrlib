<body>
<div class="wrap">
 <div class="page-title">
  <h1>А хто я?</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Загадка<br /><br />
Я такий же, як знак розділовий,<br />
і відомий шкільній дітворі.<br />
Та в словах української мови<br />
я пишусь не внизу, а вгорі.<br />
Спробуй лиш написати ім'я —<br />
зразу стану потрібним і я.<br /><br />
(Апостроф)
 </div>
