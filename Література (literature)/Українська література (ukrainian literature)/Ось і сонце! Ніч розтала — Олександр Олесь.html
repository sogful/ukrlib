<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ось і сонце! Ніч розтала...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Ось і сонце! Ніч розтала;<br />
Стоми ніби й не було,<br />
Хмара барвами заграла,<br />
Вся природа заспівала,<br />
Все всміхнулось, розцвіло.<br />
<br />
Зійде сонце, сонце волі,<br />
Поспадають ланцюги,<br />
І весь край в щасливій долі,<br />
Як в ясному ореолі,<br />
Засміється навкруги.
 </div>
