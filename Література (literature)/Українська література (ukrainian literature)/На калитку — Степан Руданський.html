<body>
<div class="wrap">
 <div class="page-title">
  <h1>На калитку</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 Прийшов мужик до крамниці,<br />
Сукно оглядає…<br />
Перекинув штук зо двадцять —<br />
Все не добирає…<br /><br />
Аж заглянув десь кармазин:<br />
"Дай-но, жидку, того!.."<br />
Розвертає, оглядає:<br />
"Се хіба нічого!.."<br /><br />
Виміряє середину:<br />
"А ходи-но, жидку!..<br />
Ото звідси мені, жидку,<br />
Виріж на калитку!"
 </div>
