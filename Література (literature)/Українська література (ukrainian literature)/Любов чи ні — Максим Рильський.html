<body>
<div class="wrap">
 <div class="page-title">
  <h1>Любов чи ні</h1>
  <h2>Максим Рильський</h2>
 </div>
 <div class="prose" id="content">
 Любов чи ні — не знаю…<br />
Тінь, смуток, тишина,<br />
Ніде життя немає,<br />
На світі ти — одна.<br /><br />
Колись було — чи снилось…<br />
Забулось — чи пройшло…<br />
В душі давно згубились<br />
Людське добро і зло.<br /><br />
У тьмі сіріють віти.<br />
Ні руху, ні людей…<br />
Одно лиш є на світі:<br />
Огонь твоїх очей.
 </div>
