 <div class="page-title">
  <h1>На дощ</h1>
  <h2>Галина Биченюк</h2>
 </div>
 <div class="prose" id="content">
 — Чом ви, чом ви, ластівочки,<br />
Розлітались низько?<br />
— Наближається негода,<br />
Хмари уже близько.<br />
<br />
— Чом ви, рибки, над водою<br />
Заскакали всюди?<br />
— Щоб ви знали: незабаром<br />
Добрий дощик буде.
 </div>
