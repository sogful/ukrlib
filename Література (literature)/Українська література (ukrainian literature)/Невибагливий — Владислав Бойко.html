<body>
<div class="wrap">
 <div class="page-title">
  <h1>Невибагливий</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 У видавництві — висновок незмінний:<br />
"Ваш твір незрілий<br />
і неповноцінний".<br />
— Ну, так чого ж<br />
торгуються вони?<br />
Нехай заплатять хоч і півціни!
 </div>
</div>
