<div class="wrap">
 <div class="page-title">
  <h1>Дубок навесні</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Серед галяви між старими кленами<br />
дубок мудрує думоньку свою:<br />
— Тепер і я вберуся по-зеленому.<br />
Чого це я і досі т а к стою?
