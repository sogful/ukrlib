<title>А не халасуй</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>А не халасуй</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 "Ото, тату, маєм воду,—<br />
Каже циганчук,—<br />
А якби нам іще сиру<br />
Та муки до рук —<br />
Наварили б вареників,<br />
Сіли край стола…"<br />
Тут старому вже по горлі<br />
Слинка потекла…<br />
"А якби нам іще масла,<br />
Отоді балуй!"<br />
Тут старий його фандою:<br />
"А не халасуй!"
 </div>
</div>
