 <div class="page-title">
  <h1>Україна</h1>
  <h2>Богдан Бойчук</h2>
 </div>
 <div class="prose" id="content">
 Вона осіла в моїй підсвідомості,<br />
І як лише закрию темрявою очі,<br />
Її болі вщеплюються в мої нерви<br />
І пускають парості.<br />
Її сльози виїдають мої зниці,<br />
Її рани дірявлять моє тіло,<br />
Її радощі виповнюють мої бажання
 </div>
