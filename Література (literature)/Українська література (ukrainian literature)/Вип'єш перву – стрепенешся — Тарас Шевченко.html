  <h1>Вип'єш перву – стрепенешся</h1>
  <h2>Тарас Шевченко</h2>
 </div>
 <div class="prose" id="content">
 Вип'єш перву – стрепенешся,<br />
Вип'єш другу – схаменешся,<br />
Вип'єш третю – в очах сяє,<br />
Дума думу поганяє.
