 <div class="page-title">

  <h2>Микола Байдюк</h2>
 </div>
 <div class="prose" id="content">
 Біла ворона<br />
серед білих ворон<br />
<br />
На костьолі дудка<br />
замість ліри<br />
<br />
Якби ще помилка<br />
на всі 52 мільйона відсотків
