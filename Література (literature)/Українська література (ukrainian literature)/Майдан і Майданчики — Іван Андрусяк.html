<div class="wrap">
 <div class="page-title">
  <h1>Майдан і Майданчики</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 – А чи є у Майдана майданчик? –<br />
запитався у Стефи Богданчик.<br />
<br />
Каже Стефа: – Їх сто або й двісті,<br />
вони в кожному, – каже, – місті,<br />
<br />
їх у нього дуже багато –<br />
він багатомайданний тато.
 </div>
