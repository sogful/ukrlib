<div class="wrap">
 <div class="page-title">
  <h1>Яка нудьга мережити рядки</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Яка нудьга мережити рядки&#8230;<br />
Дарма що жар думок у них розлитий!..<br />
Поетів дар (як всі дари, гіркий) –<br />
Всю недоцільність віршів розуміти.<br /><br />
Візьмись вогнем – і раптом прохолонь,<br />
Засхни чорнилом на якомусь вірші&#8230;<br />
Чудний вогонь! –<br />
Щоб не сказати гірше&#8230;
 </div>
