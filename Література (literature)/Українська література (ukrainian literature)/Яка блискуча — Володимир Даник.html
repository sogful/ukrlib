<div class="wrap">
 <div class="page-title">
  <h1>Яка блискуча</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 Та жодної фальшивої ноти…<br />
Ну, хто ж у дрібні подробиці лізтиме?!<br />
Яка блискуча акторська робота —<br />
Брехні у виконанні… ролі істини!
