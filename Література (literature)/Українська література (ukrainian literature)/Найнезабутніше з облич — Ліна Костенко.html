<div class="wrap">
 <div class="page-title">
  <h1>Найнезабутніше з облич...</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 * * *<br />
<br />
Найнезабутніше з облич,<br />
таке єдине, Боже, Боже!<br />
Не плач, не муч його, не клич.<br />
Він не обізветься. Не може.<br />
<br />
Там ні печалі, ані сліз.<br />
Ні дня, ні вечора, ні рання.<br />
Його нема ніде. Він скрізь,<br />
вже в остаточній формі існування.
 </div>
</div>
