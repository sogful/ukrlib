<div class="wrap">
 <div class="page-title">
  <h1>Тополя і калина</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Тополя — зеленька і красива —<br />
намистечка в калини попросила:<br />
<br />
— Чи ж до лиця намисто буде вам?<br />
— Та я поміряю й назад віддам!<br />
<br />
— Мені не шкода. Ось — беріть і міряйте.<br />
І, поки птахи не зібралися до вирію,<br />
в дорогу чужодальню і далеку,<br />
дасте мені приміряти лелеку?
 </div>
