<div class="wrap">
 <div class="page-title">
  <h1>Красно при долині...</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Красно при долині<br />
Квітонька цвіла,<br />
Та до кіс дівчині<br />
Мати заплела.<br />
<br />
Гордо чарівниця<br />
Вродою пиша:<br />
Чиста, як зірниця,<br />
Молода душа.<br />
<br />
Хай же сліз не баче,<br />
Сяє-розцвіта,<br />
Доки згине, наче<br />
Квітонька ота!
 </div>
