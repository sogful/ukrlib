<div class="wrap">
 <div class="page-title">
  <h1>Пташка</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 "Про що, пташко, нам співаєш<br />
Пісню голосну?" —<br />
"Я співаю всьому світу<br />
Пісню про весну.<br />
<br />
Про її квітки пахучі,<br />
Про сади, гаї...<br />
Раджу я і вам співати,<br />
Дітоньки мої".
 </div>
