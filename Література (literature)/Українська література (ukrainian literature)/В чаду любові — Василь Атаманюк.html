<title>В чаду любові</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>В чаду любові</h1>
  <h2>Василь Атаманюк</h2>
 </div>
 <div class="prose" id="content">
 Що за чар в твоїм цілунку,<br />
А в обіймах – рай без межі,<br />
Що за жар в твойому тілі,<br />
Що за казка в тій одежі.<br />
<br />
О, чаруй мене цілунком!<br />
Оп’яни мене в обіймах,<br />
І спали мене любов’ю,<br />
Загорнувши в шатах стрійних.
 </div>
</div>
