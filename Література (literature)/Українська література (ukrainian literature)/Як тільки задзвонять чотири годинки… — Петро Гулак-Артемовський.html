<div class="wrap">
 <div class="page-title">
  <h1>Як тільки задзвонять чотири годинки…</h1>
  <h2>Петро Гулак-Артемовський</h2>
 </div>
 <div class="prose" id="content">
 Як тільки задзвонять чотири годинки,<br />
Так ми й шморгнемо в високії будинки<br />
Та любих панночок<br />
Засадим до книжок:<br />
Нехай гуртом голосять<br />
Та хоч борщу Петрові просять.<br />
21 июня 1851 г., Полтава
 </div>
