<body>
<div class="wrap">
 <div class="page-title">
  <h1>Батьки і діти</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Порадь, тату, що робити?<br />
Хоч викинь штани:<br />
На животі не сходяться<br />
У мене вони!<br />
А татусь:<br />
— В штани щоб влізти,<br />
Я пораду дам:<br />
Будеш, синку, лиш те їсти,<br />
Що заробиш сам!
 </div>
