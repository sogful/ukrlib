<body>
<div class="wrap">
 <div class="page-title">
  <h1>Квітчастий вірш</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Квітчасте Літо у квітчастім платті<br />
квітчастою стежиною іде.<br />
Квітчасто засвітилося латаття,<br />
квітчаста бджілонька над мальвами гуде.<br /><br />
І небо-жайвір дзвонить кольорами<br />
та й падає у став на саме дно.<br />
З красивими квітчастими вітрами<br />
веде сьогодні Літо свій танок.
 </div>
