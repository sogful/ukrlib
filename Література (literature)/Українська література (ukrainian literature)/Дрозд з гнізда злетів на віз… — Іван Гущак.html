<div class="wrap">
 <div class="page-title">
  <h1>Дрозд з гнізда злетів на віз…</h1>
  <h2>Іван Гущак</h2>
 </div>
 <div class="prose" id="content">
 Дрозд з гнізда злетів на віз,<br />
рушив віз, а дрозд — у ліс.<br />
Ліза в лози до гнізда —<br />
ні дроздихи, ні дрозда,<br />
лиш п'ять сірих дрозденят<br />
у гнізді вищать-пищать.<br />
Поки вернуться дрозди,<br />
Ліза ягід і води<br />
принесла для дрозденят.<br />
Любить Ліза пташенят.
 </div>
