<body>
<div class="wrap">
 <div class="page-title">
  <h1>На Новий рік</h1>
  <h2>Богдан Лепкий</h2>
 </div>
 <div class="prose" id="content">
 І знову рік один життя,<br /><br />
Як сон, минув,<br /><br />
І більше вже не буду я<br />
Таким, як був.<br /><br />
І більше вже не вернеться<br />
Ні сміх, ні сум,<br />
Лиш дещо з них обернеться<br />
У постать дум.<br /><br />
І, може, хто, читаючи<br />
Письмо дрібне,<br />
Замислиться й, зітхаючи,<br />
Мене спімне.
 </div>
