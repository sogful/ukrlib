 <div class="page-title">
  <h1>Вітер</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Рябить Дніпро човнами&#8230; За водою,<br />
за повінню знялись і попливли,<br />
мов полетіли, птахи, білі крила<br />
раз по раз опускаючи до хвиль.<br /><br />
А берег причаївся, розгубившись:<br />
зник другий берег &#8211; виллється вода<br />
й човни о суходіл потрощить крила&#8230;<br /><br />
Гасає вітру тінь &#8211; туди й сюди&#8230;
 </div>
