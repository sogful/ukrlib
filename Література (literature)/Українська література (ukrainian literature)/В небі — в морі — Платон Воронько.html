<div class="wrap">
 <div class="page-title">
  <h1>В небі — в морі</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 В небі — в морі<br />
Сяють зорі,<br />
Місяць в човнику пливе<br />
І питає:<br />
"Де живе<br />
Той хлопчина,<br />
Молодчина,<br />
В кого ліжечко нове?<br />
Я візьму його у човен,<br />
Човен той сузір'я повен —<br />
Хай бере собі маля<br />
Щасну зірку звідтіля".
 </div>
