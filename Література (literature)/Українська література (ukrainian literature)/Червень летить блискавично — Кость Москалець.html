<div class="wrap">
 <div class="page-title">
  <h1>Червень летить блискавично...</h1>
  <h2>Кость Москалець</h2>
 </div>
 <div class="prose" id="content">
 Червень летить блискавично; тихо й невидимо зріє<br />
Громоподібне мовчання у хмарі блакитних ірисів.<br />
Чорний муравлик завмер біля тіла бджоли неживої, —<br />
Істин шляхетних четвірку зрить нині крихітний принц.
 </div>
</div>
