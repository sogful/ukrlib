<body>
<div class="wrap">
 <div class="page-title">
  <h1>Місяченько</h1>
  <h2>Володимир Сосюра</h2>
 </div>
 <div class="prose" id="content">
 Не шуміть ви, осокори,<br />
Щоб синок вас не почув.<br />
Довго бігав він надворі,<br />
Натомився і заснув.<br />
Місяченьку, чародію,<br />
Не жартуй крізь вікна з ним,<br />
Не лягай йому на вії<br />
Ти промінням голубим.
 </div>
