<div class="wrap">
 <div class="page-title">
  <h1>Немає сумніву: мені щораз нудніше</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Немає сумніву: мені щораз нудніше<br />
У товаристві друзів-юнаків;<br />
Їх дотепи могли б звучати тихше<br />
І навіть теми бути не такі&#8230;<br /><br />
Та в той же час кортить мене додому<br />
З поважних бесід про минулі дні&#8230;<br />
&#8230;Бути самому<br />
Хочеться мені.
 </div>
