 <div class="page-title">
  <h1>Котик-Воркотик</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 Котику-Воркотику,<br />
йдеш ти звідкіля?<br />
— У палаці був я, бачив короля!<br />
Котику-Воркотику,<br />
що ж ти там робив?<br />
— Я під ліжком мишку мало не схопив!
