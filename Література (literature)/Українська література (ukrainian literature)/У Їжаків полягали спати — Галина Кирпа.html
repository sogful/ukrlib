<div class="wrap">
 <div class="page-title">
  <h1>У Їжаків полягали спати</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Несу Їжачкові<br />
горнятко теплого молочка.<br />
Моросить дощик,<br />
а я несу.<br />
— У них уже не світиться,<br />
полягали спати, —<br />
каже старий кіт Мурко.<br />
Та й позіхає —<br />
на мене й на дощик.<br />
А на тепле молочко каже:<br />
— Ня-ав!
 </div>
