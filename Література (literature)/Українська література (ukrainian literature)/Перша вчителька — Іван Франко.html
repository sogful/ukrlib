<body>
<div class="wrap">
 <div class="page-title">
  <h1>Перша вчителька</h1>
  <h2>Іван Франко</h2>
 </div>
 <div class="prose" id="content">
 Говорить вість, що перша в раю Єва<br />
Згрішила пізнанням добра і зла,<br />
Вкусивши плід з заказаного древа,<br />
І плоду того мужеві дала.<br /><br />
Хто хоче, може вірить тому,<br />
Та тут же й заковика немала,<br />
Що в доброму порівно, як і в злому,<br />
Жона для мужа вчителька була.
 </div>
