<div class="wrap">
 <div class="page-title">
  <h1>Синя шапка на березі инію...</h1>
  <h2>Іван Дорожній</h2>
 </div>
 <div class="prose" id="content">
 Синя шапка на березі инію…<br />
Місяць ранковий на небі сизий…<br />
А на вигоні вітряк понуро дума думу:<br />
Правду кажуть люди людям…<br />
Прийде старість – нудно. Болять<br />
Кістки та поясниця… Болять ребра.<br />
Куди діть себе?
 </div>
