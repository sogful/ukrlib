<title>Не попрошу синю даль</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не попрошу синю даль</h1>
  <h2>Ганна Чубач</h2>
 </div>
 <div class="prose" id="content">
 Не попрошу синю даль<br />
Звеселить мою печаль.<br />
Не попрошу чорні ночі<br />
Щастя зорями пророчить.<br />
Не покличу навіть друга<br />
У свою невтішну тугу.<br />
Біль зневіри, мрій тепло —<br />
Все моє мені було.<br />
Хтось похвалить,<br />
Хтось осудить.<br />
Не моє — моїм не буде.
 </div>
</div>
