<title>Обвалюється берег...</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Обвалюється берег...</h1>
  <h2>Микола Воробйов</h2>
 </div>
 <div class="prose" id="content">
 Обвалюється берег<br />
на сивого півня<br />
у джерелі.<br />
Блискуче насіння<br />
виповнює луки,<br />
що завше в мені.<br />
І знову ростки його<br />
в світлі моєму –<br />
до сліз<br />
я люблю цей край.
 </div>
</div>
