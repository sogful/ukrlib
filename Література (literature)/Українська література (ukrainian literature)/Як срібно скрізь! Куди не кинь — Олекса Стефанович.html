<body>
<div class="wrap">
 <div class="page-title">
  <h1>Як срібно скрізь! Куди не кинь...</h1>
  <h2>Олекса Стефанович</h2>
 </div>
 <div class="prose" id="content">
 Як срібно скрізь! Куди не кинь,<br />
Усе виблискує, іскриться...<br />
Як чисто може засвітиться<br />
Земне в небесну голубінь!<br />
<br />
Душа окрилена, окріпла:<br />
"Кому хвалу свою пошлю?!"<br />
Не день в саду моїм, а шлюб<br />
Блакиті ясної і срібла.<br />
<br />
1925
 </div>
