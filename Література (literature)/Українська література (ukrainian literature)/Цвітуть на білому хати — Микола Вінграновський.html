<div class="wrap">
 <div class="page-title">
  <h1>Цвітуть на білому хати</h1>
  <h2>Микола Вінграновський</h2>
 </div>
 <div class="prose" id="content">
 Цвітуть на білому хати.<br />
У грудях грудня — зими, зими.<br />
Димів скуйовджені хвости,<br />
І дух овечий та козиний…<br /><br />
Цвітуть обмерзлі криниці<br />
Холодним квітом мармуровим.<br />
Дитя заснуло на руці,<br />
Як слово на долоні мови…
 </div>
