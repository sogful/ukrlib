<div class="wrap">
 <div class="page-title">
  <h1>Осінні джунглі</h1>
  <h2>Віктор Терен</h2>
 </div>
 <div class="prose" id="content">
 Висохлі, пожухлі<br />
споришеві<br />
джунглі.<br />
<br />
Носороги-рогачі,<br />
мурашині леви,<br />
де ховалися вночі?<br />
Полювали<br />
де ви?<br />
<br />
Довго сохнуть край дороги<br />
бур'янці-дерева.<br />
Дуже<br />
мерзнуть носороги,<br />
леви — ледве-ледве.
 </div>
