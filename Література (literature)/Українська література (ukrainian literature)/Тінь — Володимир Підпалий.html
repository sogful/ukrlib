 <div class="page-title">
  <h1>Тінь</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Є у Сосюри: &#8220;такий я ніжний,<br />
такий тривожний&#8221;&#8230;<br />
А як же я?..<br />
Вітер гуляє долами сніжними,<br />
спить до весни земля.<br /><br />
Ніч яка довга &#8211; довша за зиму<br />
(що наробила ти, заметіль!).<br />
&#8230;Над Україною ходить інтимна<br />
біла й тривожна поетова тінь.
 </div>
