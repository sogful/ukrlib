<title>Хто байдужий?</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хто байдужий?</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 В метро, в новім вагоні,<br />
Сиділи ми з Юрком,<br />
А біля нас бабуся<br />
Стояла з малюком.<br />
<br />
А я сидів і думав,<br />
Обурювався дуже:<br />
Ніхто не дав їм місця —<br />
Усі такі байдужі!
 </div>
</div>
