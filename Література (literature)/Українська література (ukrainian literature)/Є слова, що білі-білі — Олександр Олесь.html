</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Є слова, що білі-білі...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Є слова, що білі-білі,<br />
Як конвалії квітки,<br />
Лагідні, як усміх ранку,<br />
Ніжносяйні, як зірки.<br />
<br />
Є слова, як жар, пекучі<br />
І отруйні, наче чад...<br />
В чарівне якесь намисто<br />
Ти нанизуєш їх в ряд.
 </div>
</div>
