<body>
<div class="wrap">
 <div class="page-title">
  <h1>Фффф дмухкало пирхкало</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 фффф<br />
дмухкало пирхкало<br />
шшшш<br />
шипіло шумно за машиною<br />
брудносніг<br />
— тумані<br />
сани — сани<br />
колисали хрусти<br />
м'якшили сичанням<br />
злилися постатьно<br />
силь<br />
ветки<br />
м'які кокетки<br />
блискними поглядами<br />
кхе кхе кхе<br />
! Ви.
 </div>
