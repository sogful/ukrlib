<body>
<div class="wrap">
 <div class="page-title">
  <h1>Іскрина покотилася</h1>
  <h2>Дмитро Куровський</h2>
 </div>
 <div class="prose" id="content">
 Злетіла пташка високо<br />
Та й сіла на хмарину.<br />
Та й тьохнула — та й висікла<br />
Із хмароньки іскрину.<br />
<br />
Іскрина покотилася,<br />
У потемках не згасла.<br />
Із неї розгорілася<br />
Над світом днина ясна.
 </div>
