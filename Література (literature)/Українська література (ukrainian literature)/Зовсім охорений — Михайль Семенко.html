<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зовсім охорений</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Я незадоволений і розчарований.<br />
Скажу простіш — цілком нудний я.<br />
Життям беззмістовним доконче зморений,<br />
Цілком зануджений, зовсім охорений, —<br />
Хочу додому я, хочу в Київ…
 </div>
