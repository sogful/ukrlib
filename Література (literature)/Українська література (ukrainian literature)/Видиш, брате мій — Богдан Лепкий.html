<body>
<div class="wrap">
 <div class="page-title">
  <h1>Видиш, брате мій...</h1>
  <h2>Богдан Лепкий</h2>
 </div>
 <div class="prose" id="content">
 Видиш, брате мій,<br />
Товаришу мій,<br />
Відлітають сірим шнуром<br />
Журавлі у вирій.<br />
Кличуть: кру!кру!кру!<br />
В чужині умру,<br />
Заки море перелечу,<br />
Крилонька зітру,<br />
Крилонька зітру.<br />
<br />
Мерехтить в очах<br />
Безконечний шлях,<br />
Гине, гине в синіх хмарах<br />
Слід по журавлях.<br />
<br />
1912р.
 </div>
</div>
</body>
