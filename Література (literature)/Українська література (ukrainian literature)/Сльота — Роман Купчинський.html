<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сльота</h1>
  <h2>Роман Купчинський</h2>
 </div>
 <div class="prose" id="content">
 Ситом сіє сиві струї<br />
Хтось химерний. Хмар хитон<br />
Розпростер на небі вітер.<br />
Слизько. Слізно. Сумно. Сон.<br />
<br />
Вимок ворон на воротях.<br />
Сльози скапують зі стріх.<br />
Ластівка пройшла, як стрілка.<br />
Сниться: Сяйво. Сонце. Сміх.
 </div>
</div>
