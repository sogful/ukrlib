<title>Ой, сяду я під хатою</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ой, сяду я під хатою</h1>
  <h2>Тарас Шевченко</h2>
 </div>
 <div class="prose" id="content">
 Ой сяду я під хатою,<br />
На улицю гляну,<br />
Як-то тії дівчаточка<br />
Без своєї Ганни,<br />
Без моєї Ганнусеньки<br />
У хрещика грають.<br />
І граються невесело,<br />
І не так співають<br />
Дівчаточка. А моєї<br />
Голубки немає.<br />
У свекрухи десь воркує,<br />
Мене виглядає.
 </div>
</div>
