<body>
<div class="wrap">
 <div class="page-title">
  <h1>Отець ся один...</h1>
  <h2>Маркіян Шашкевич</h2>
 </div>
 <div class="prose" id="content">
 Отець ся один<br />
Учителя питав:<br />
"Яким би світом<br />
Синок щастя мав?"<br />
Сей му одповів:<br />
"Навчи бога знати,<br />
Навчи хороше<br />
Читати, писати;<br />
Вмісто імінє<br />
Дай му розум ясний,<br />
Тогда твой синок<br />
Повік буде щасний".
 </div>
