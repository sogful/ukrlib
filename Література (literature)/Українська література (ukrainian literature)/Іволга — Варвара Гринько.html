<body>
<div class="wrap">
 <div class="page-title">
  <h1>Іволга</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Де багато сонця,<br />
Де гайок хороший,<br />
Іволга гніздечко<br />
Виплела, мов кошик.<br />
<br />
Он співа на дубі —<br />
Схованка надійна —<br />
Мов на флейті грає,<br />
Ніжно, мелодійно.<br />
<br />
Іволга-красуня<br />
Жовто-золотиста.<br />
Іволга ляклива —<br />
Заховалась в листі.
 </div>
