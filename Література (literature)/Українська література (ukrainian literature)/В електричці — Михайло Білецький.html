<body>
<div class="wrap">
 <div class="page-title">
  <h1>В електричці</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — У вас є квиток, бабусю?<br />
— Як же... Є, синок! —<br />
Показала.<br />
— Так не дійсний же у вас квиток! —<br />
А бабуся:<br />
— Не задурюй голову мені.<br />
Сім днів їздила — був дійсний,<br />
А сьогодні — ні?!
 </div>
</div>
