<div class="wrap">
 <div class="page-title">
  <h1>За стінами холодна віє ніч</h1>
  <h2>Максим Рильський</h2>
 </div>
 <div class="prose" id="content">
 За стінами холодна віє ніч;<br />
Огонь то згасне, то засяє знову&#8230;<br />
Ах, так давно я чув людськую річ,<br />
Що вже й забув земну, звичайну мову.<br /><br />
А знаєш що? І там, поміж людьми,<br />
Та сама тайна світиться незримо,<br />
Але вони не бачать у пітьмі<br />
Її своїми бідними очима.
 </div>
