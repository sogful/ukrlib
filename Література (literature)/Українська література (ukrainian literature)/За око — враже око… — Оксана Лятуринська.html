<body>
<div class="wrap">
 <div class="page-title">
  <h1>За око — враже око…</h1>
  <h2>Оксана Лятуринська</h2>
 </div>
 <div class="prose" id="content">
 За око — враже око,<br />
оселя — за оселю!<br />
Благословляйте келих,<br />
де хміль нуртує соком!<br />
<br />
За око — враже око!<br />
Одному з двох упасти.<br />
Рука тверда, гранчаста,<br />
ніж гострий та широкий.
 </div>
</div>
