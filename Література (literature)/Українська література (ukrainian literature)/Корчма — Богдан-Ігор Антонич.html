<body>
<div class="wrap">
 <div class="page-title">
  <h1>Корчма</h1>
  <h2>Богдан-Ігор Антонич</h2>
 </div>
 <div class="prose" id="content">
 Про дівчат і про купців<br />
оповідає давня повість.<br />
Крилата чарка у руці,<br />
жага і трунок гусне в крові.<br />
<br />
Червінці дзвонять на столі,<br />
і місяць – найхмільніший келих.<br />
Схилився вечір до землі<br />
і срібним сяйвом ріки стелить.
 </div>
