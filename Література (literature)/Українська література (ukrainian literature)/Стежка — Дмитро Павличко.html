<body>
<div class="wrap">
 <div class="page-title">
  <h1>Стежка</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 Стежка з головою<br />
Вкрилася травою<br />
І заснула. Спить.<br />
<br />
Я біленькі ніжки<br />
Полоскочу трішки —<br />
Хай встає й біжить.<br />
<br />
Хай тікає в поле,<br />
Аж на ті околи,<br />
Де ширяє птах.<br />
<br />
Але ні! Хай стежка,<br />
Люба траволежка,<br />
Політає в снах.
 </div>
