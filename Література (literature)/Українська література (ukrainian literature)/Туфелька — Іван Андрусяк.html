<body>
<div class="wrap">
 <div class="page-title">
  <h1>Туфелька</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 діти миліші ніж дорослі<br />
тварини миліші ніж діти<br />
кажеш якщо продовжувати<br />
в тому ж дусі<br />
мусиш дійти висновку<br />
що наймиліша інфузорія туфелька<br /><br />
ну то й що<br /><br />
туфелька мені миліша<br />
ніж ти сволото
 </div>
</div>
