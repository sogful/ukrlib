  <h1>хлюпає хлюпає ніжна сльота...</h1>
  <h2>Богдан Жолдак</h2>
 </div>
 <div class="prose" id="content">
 хлюпає хлюпає ніжна сльота<br />
а ми поставим білі пустелі<br />
куди росиця не доліта<br />
понад нащад буде принад<br />
тим хто сповідує водоспад
 </div>
