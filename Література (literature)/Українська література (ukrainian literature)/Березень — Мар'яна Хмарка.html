<div class="wrap">
 <div class="page-title">
  <h1>Березень</h1>
  <h2>Мар'яна Хмарка</h2>
 </div>
 <div class="prose" id="content">
 Я переміг жорстоку владу стужі,<br />
Струмком біжу: веселий ллється дзвін,<br />
Гаптує сонце золотом калюжі<br />
І вітер вітром креше навздогін.<br />
<br />
Я чую: десь росте новітня змога,<br />
Вже прозелень упала на лани.<br />
Над нами плещуть крила перемоги<br />
Вселюдської весни.
 </div>
