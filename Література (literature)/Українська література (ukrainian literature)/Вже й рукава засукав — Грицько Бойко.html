<title>Вже й рукава засукав</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вже й рукава засукав</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 От Іванко молодець!<br />
Змайструвать хотів стілець.<br />
Вже й рукава засукав,<br />
Та оглянувся і став:<br />
Не було ж ні молотка,<br />
Ані дошки, ні гвіздка,—<br />
То й не починав.
 </div>
</div>
