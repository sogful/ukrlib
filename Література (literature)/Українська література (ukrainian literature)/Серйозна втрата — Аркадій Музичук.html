  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 Що зникли черги в магазинах<br />
Жаліє досі баба Ніна:<br />
"Немає де і з ким у місті<br />
Обговорить останні вісті!"
