<body>
<div class="wrap">
 <div class="page-title">
  <h1>Решето</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 Через партійне решето<br />
У владі вже — тридцята сотня!<br />
Та добровільно ще ніхто<br />
Не взяв звідтіль квиток зворотній.<br />
Хоча клялись і присягались,<br />
Христилися разів по сто!<br />
Та не покаявся ніхто.<br />
І знову — крали, крали, крали...
 </div>
