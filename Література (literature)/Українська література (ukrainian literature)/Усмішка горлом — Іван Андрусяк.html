<body>
<div class="wrap">
 <div class="page-title">
  <h1>Усмішка горлом</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 це спів розрізаної шиї<br />
фістула тиха але щира<br />
впились червоним розімліли<br />
пухнасті чорні груди ночі<br />
це спів розрізанорї шиї<br />
попід огризками дзеркал<br /><br />
співає як хлюпоче з крана<br />
прибита ковдрою до рани<br />
неначе парус голова<br />
і ти повір їй бо вона<br />
всміхається кривавим горлом
 </div>
</div>
