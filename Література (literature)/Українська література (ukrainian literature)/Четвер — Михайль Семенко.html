 <div class="page-title">
  <h1>Четвер</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Мені сьогодні тоскно — може тому<br />
Що дощ іде.<br />
Ах невже тільки тому тільки тому?<br />
Місця нема ніде.<br /><br />
Сьогодні середа — лише завтра побачусь<br />
Завтра четвер.<br />
Я з нудьгою своєю ношусь не розстанусь<br />
Нудьга нудьга відтепер.
 </div>
