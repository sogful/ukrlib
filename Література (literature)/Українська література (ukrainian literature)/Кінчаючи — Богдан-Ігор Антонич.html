<body>
<div class="wrap">
 <div class="page-title">
  <h1>Кінчаючи</h1>
  <h2>Богдан-Ігор Антонич</h2>
 </div>
 <div class="prose" id="content">
 Кінчаючи цієї книги<br />
співні, п'янливі сторінки,<br />
не думай, друже, що у них я<br />
горіти зможу крізь віки.<br />
Із поривань, натхнень, одчаю<br />
останеться лиш попіл мрій.<br />
Бо ж пам'ятник крихкий лишаю<br />
турботі й радості своїй.
 </div>
