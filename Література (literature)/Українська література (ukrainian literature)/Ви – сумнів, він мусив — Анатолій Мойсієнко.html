</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ви – сумнів, він мусив...</h1>
  <h2>Анатолій Мойсієнко</h2>
 </div>
 <div class="prose" id="content">
 Ви – сумнів, він мусив<br />
На рать – таран,<br />
Удар за зраду,<br />
Вимулом смолу мив –<br />
А то пурха хрипота,<br />
А ще та теща...<br />
У хижу – вужиху!<br />
У... громада жада моргу.
 </div>
</div>
