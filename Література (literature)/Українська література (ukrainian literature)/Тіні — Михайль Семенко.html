<div class="wrap">
 <div class="page-title">
  <h1>Тіні</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Тіні лягли насторожені,<br />
Тіні вечірні.<br />
Сині вогні — заворожені,<br />
Далі — безмірні.<br /><br />
Вічність розмірених плисків,<br />
Шумів містичних,—<br />
Ніжність осліплених стисків,<br />
Рисок незвичних.<br /><br />
Світ і душа — ототожнені,<br />
Далі — безмірні.<br />
Тіні лягли насторожені,<br />
Тіні вечірні.
 </div>
