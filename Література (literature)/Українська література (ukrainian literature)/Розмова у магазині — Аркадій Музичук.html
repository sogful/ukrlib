<div class="wrap">
 <div class="page-title">
  <h1>Розмова у магазині</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 — Чому ціни попливли,<br />
Як весною крига?<br />
Заморожені ж були?<br />
— Надворі відлига...<br />
— Ні, що ціни, як живі,<br />
Інша є причина —<br />
Мабуть, повінь в голові<br />
Не в одного чина...
