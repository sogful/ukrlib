<title>Здивовані квіти (Сю ніч зорі чомусь колючі...)</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Здивовані квіти (Сю ніч зорі чомусь колючі...)</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 Сю ніч зорі<br />
чомусь колючі,<br />
Як налякані їжачки.<br />
Сю ніч сойка<br />
кричала в кручі,<br />
Сю ніч ворон казав:<br />
"Апчхи!"<br />
<br />
Сю ніч квітка<br />
питала квітку:<br />
— Що це робиться,<br />
поясни?<br />
Тільки вчора<br />
було ще влітку,<br />
А сьогодні вже —<br />
восени!
 </div>
