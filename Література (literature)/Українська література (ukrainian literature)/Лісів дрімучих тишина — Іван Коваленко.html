<body>
<div class="wrap">
 <div class="page-title">
  <h1>Лісів дрімучих тишина</h1>
  <h2>Іван Коваленко</h2>
 </div>
 <div class="prose" id="content">
 Лісів дрімучих тишина,<br />
Озер прозорих глибина,<br />
Річкові хвилі голубі –<br />
Це все – тобі.<br />
<br />
І промінь сонячний, ясний,<br />
І цвіт на дереві рясний,<br />
І серце любляче моє –<br />
Це все — твоє.
 </div>
</div>
