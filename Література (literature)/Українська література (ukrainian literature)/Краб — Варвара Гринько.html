<div class="wrap">
 <div class="page-title">
  <h1>Краб</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Щось мене за ногу шкряб...<br />
Це, напевне, знову краб.<br />
Краб — хитрун, тікає вбік,<br />
Він від мене вдруге втік.<br />
<br />
Не тікай собі на дно,<br />
Я ж впіймаю все одно.<br />
Поведу в садок дитячий,<br />
Хай тебе усі побачать.
 </div>
