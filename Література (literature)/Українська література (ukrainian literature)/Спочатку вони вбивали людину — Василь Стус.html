<body>
<div class="wrap">
 <div class="page-title">
  <h1>Спочатку вони вбивали людину</h1>
  <h2>Василь Стус</h2>
 </div>
 <div class="prose" id="content">
 Спочатку вони вбивали людину,<br />
потім вбитого оживляли.<br />
Реанімацією займалися<br />
в косметичних кабінетах<br />
(малярі — замість лікарів).<br />
Справі оживлення<br />
віддавали життя<br />
цілі династії майстрів пензля.<br />
Зате й відрізнити живого від мертвого<br />
було неможливо.
 </div>
