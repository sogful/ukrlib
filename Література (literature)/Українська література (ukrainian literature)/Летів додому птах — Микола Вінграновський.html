<body>
<div class="wrap">
 <div class="page-title">
  <h1>Летів додому птах</h1>
  <h2>Микола Вінграновський</h2>
 </div>
 <div class="prose" id="content">
 Далекими світами<br />
Вночі і по ночах,<br />
Горбатими морями<br />
Летів додому птах.<br />
<br />
Його мала голівка<br />
Боялась над крилом —<br />
Та зацвітала гілка<br />
Блакитно-білим сном.<br />
<br />
І птах сказав до себе,<br />
До вітру на крилі:<br />
Нам лиш літати небом,<br />
А жити на землі.
 </div>
