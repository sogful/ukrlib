<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хибний діагноз</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 Лікар хворого оглянув,<br />
Взяв аналіз крові:<br />
— Я лукавити не стану —<br />
Хвороби спадкові.<br />
Не сприйняв діагноз хворий:<br />
— З вами я не згоден!<br />
Я ніякий не спадковий —<br />
Сирота від роду.
 </div>
</div>
