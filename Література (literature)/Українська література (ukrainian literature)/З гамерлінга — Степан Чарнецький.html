<div class="wrap">
 <div class="page-title">
  <h1>З гамерлінга</h1>
  <h2>Степан Чарнецький</h2>
 </div>
 <div class="prose" id="content">
 Гей, гей! Чимало полетіло<br />
Пташат від своїх гнізд,<br />
Чимало хмар перекотилось,<br />
Чимало згасло звізд!<br /><br />
Гей, гей! Чимало із левади<br />
Сплило води у ліс,<br />
І серця мрій чудових, ясних<br />
Чимало час розніс?..<br /><br />
***<br /><br />
Джерело:Цифрова Українська Бібліотека.
 </div>
