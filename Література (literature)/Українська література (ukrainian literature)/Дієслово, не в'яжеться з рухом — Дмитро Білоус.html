<div class="wrap">
 <div class="page-title">
  <h1>Дієслово, не в'яжеться з рухом</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Загадка<br /><br />
Дієслово, не в'яжеться з рухом.<br />
Його змісту не знать просто сором:<br />
як без префікса — сприйметься слухом,<br />
а як з префіксом — сприйметься зором.<br /><br />
Яке це дієслово?<br /><br />
(Казати, показати)
 </div>
