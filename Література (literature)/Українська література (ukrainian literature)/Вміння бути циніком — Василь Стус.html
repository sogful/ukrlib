<title>Вміння бути циніком</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вміння бути циніком</h1>
  <h2>Василь Стус</h2>
 </div>
 <div class="prose" id="content">
 Вміння бути циніком<br />
дається і без зусиль<br />
Бути людиною —<br />
дертися по вертикальній стіні<br />
Сізіфова робота<br />
звичайне глупство<br />
Кому то вдавалося —<br />
дертися по вертикальній стіні
 </div>
</div>
