<body>
<div class="wrap">
 <div class="page-title">
  <h1>А чому він усміхається?</h1>
  <h2>Оксана Сенатович</h2>
 </div>
 <div class="prose" id="content">
 Жабенята зелені<br />
кумкають<br />
у кишені.<br />
Коники-стрибунці<br />
затиснуті в кулаці.<br />
<br />
Голова безжалісна<br />
ходить, усміхається.<br />
Усміхається. А з чого?<br />
З свого розуму МАЛОГО!
 </div>
</div>
