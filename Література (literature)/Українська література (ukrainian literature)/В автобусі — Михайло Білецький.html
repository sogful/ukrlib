 <div class="page-title">
  <h1>В автобусі</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Може, хочете присісти? —<br />
Чемно Гриць питає.<br />
— Та присіла б, соколику,<br />
Сил стоять немає.<br />
— Коли так, то не відходьте, —<br />
Шепче хлопець жінці, —<br />
Бо я буду виходити<br />
На п'ятій зупинці!
 </div>
