<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ні, ні! Прийдешнє — не казарма...</h1>
  <h2>Максим Рильський</h2>
 </div>
 <div class="prose" id="content">
 * * *<br />
<br />
Ні, ні! Прийдешнє — не казарма,<br />
Не цементовий коридор!<br />
Сіяє в небі нам недарма<br />
Золотоокий метеор.<br />
<br />
І він черкне щасливу землю,<br />
І світ наш буде голубим<br />
Од стін золоченого Кремлю<br />
До піль, де спить залізний Рим.<br />
<br />
1923
 </div>
