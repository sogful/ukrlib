<title>Дівчина довгошия, мов сарна</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дівчина довгошия, мов сарна</h1>
  <h2>Василь Стус</h2>
 </div>
 <div class="prose" id="content">
 Дівчина<br />
довгошия, мов сарна,<br />
несла яйця<br />
у червоному фартушку<br />
І заворожені<br />
збентеженою<br />
цнотливістю,<br />
світліли<br />
похмурі люди<br />
люди,<br />
даючи їй<br />
дорогу.
 </div>
</div>
