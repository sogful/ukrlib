<title>Здрастуй, сонечко!</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Здрастуй, сонечко!</h1>
  <h2>Марія Познанська</h2>
 </div>
 <div class="prose" id="content">
 Я всміхаюсь сонечку:<br />
— Здрастуй, золоте! —<br />
Я всміхаюсь квітоньці —<br />
Хай вона цвіте!<br />
Я всміхаюсь дощику:<br />
— Лийся, мов з відра!<br />
Друзям усміхаюся —<br />
Зичу їм добра!
 </div>
</div>
