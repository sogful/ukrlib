 <div class="page-title">
  <h1>До мене</h1>
  <h2>Олег Коцарев</h2>
 </div>
 <div class="prose" id="content">
 Віддаючи<br />
Всі варіанти<br />
Заради одної – останньої<br />
Миті<br />
Веселогарячої<br />
Жовтовеселої<br />
Питають мене<br />
А?<br />
А її посмішки<br />
Летять до мене<br />
Мов жовте листя<br />
З молодих дубів<br />
Відтак стає<br />
Захоплююче наче<br />
На кордоні.<br />
<br />
25 жовтня. 1999 рік.
 </div>
