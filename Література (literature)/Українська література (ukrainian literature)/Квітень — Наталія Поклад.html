 <div class="page-title">
  <h1>Квітень</h1>
  <h2>Наталія Поклад</h2>
 </div>
 <div class="prose" id="content">
 Котики вербові,<br />
пташка голосна…<br />
Повен світ любові,<br />
бо – весна.<br />
Бо неділя вербна,<br />
сонечка ярінь;<br />
бо вділив Бог щедро<br />
воскресінь.<br />
Тож змагай і віруй,<br />
серце розпогодь –<br />
нашу Україну<br />
береже Господь.
 </div>
