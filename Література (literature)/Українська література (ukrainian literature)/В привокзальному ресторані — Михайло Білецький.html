<body>
<div class="wrap">
 <div class="page-title">
  <h1>В привокзальному ресторані</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Запитав офіціанта:<br />
— Скажи, мій миленький,<br />
Чому такі в ресторані<br />
Порції маленькі?<br />
— А це в нас про пасажирів, —<br />
Каже він, — турбота:<br />
Бо кому з вас від поїзда<br />
Відстати охота?!
 </div>
