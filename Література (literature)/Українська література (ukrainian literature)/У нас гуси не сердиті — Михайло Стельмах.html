<title>У нас гуси не сердиті</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>У нас гуси не сердиті</h1>
  <h2>Михайло Стельмах</h2>
 </div>
 <div class="prose" id="content">
 Невеличка наша річка —<br />
Я її перепливаю,<br />
А на березі сестричка<br />
"Гиля, гусоньки" — співає.<br />
Гуси слухають сестричку,<br />
З рук її скубуть травичку —<br />
У нас гуси не сердиті,<br />
Бо ми вмієм їх любити.
 </div>
</div>
