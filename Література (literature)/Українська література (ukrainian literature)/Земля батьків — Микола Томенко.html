<div class="wrap">
 <div class="page-title">
  <h1>Земля батьків</h1>
  <h2>Микола Томенко</h2>
 </div>
 <div class="prose" id="content">
 Земля батьків — моя проста колиска,<br />
любов і тугу в ній ділю навпіл,<br />
коли над вечоровим полем блискавка<br />
гойдливий лан освітлює довкіл.<br />
<br />
Зернина до зернини — піраміди<br />
підносяться з натруджених долонь.<br />
Куди не йду, в які світи не іду —<br />
земля батьків — життя мого вогонь.
 </div>
