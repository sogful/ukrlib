<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не минай з погордою</h1>
  <h2>Іван Франко</h2>
 </div>
 <div class="prose" id="content">
 Не минай з погордою<br />
І не смійсь, дитя!<br />
Може, в тім осміянім<br />
Суть твого життя.<br /><br />
Може, в тім зневаженім<br />
Твого щастя карб,<br />
Може, в тім погордженім<br />
Є любові скарб.<br /><br />
Може, сміх твій нинішній,<br />
Срібний та дзвінкий,<br />
Стане в твоїй пам&#8217;яті<br />
За докір гіркий.
 </div>
</div>
