<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сонце стояло в соняхах теплих</h1>
  <h2>Микола Сингаївський</h2>
 </div>
 <div class="prose" id="content">
 Сонце стояло<br />
в соняхах теплих,<br />
квітка до квітки ніжно цвіли.<br />
Маки пишалися зеленостеблі &#8211;<br />
ще молоді і веселі були.<br /><br />
Мати знімала з маків узори,<br />
цвіт, наче полум&#8217;я,<br />
грав у руках.<br />
І зацвітали макові зорі,<br />
вишиті матір&#8217;ю на рушниках.
 </div>
