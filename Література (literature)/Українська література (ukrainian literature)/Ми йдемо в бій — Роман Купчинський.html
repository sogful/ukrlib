<title>Ми йдемо в бій</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ми йдемо в бій</h1>
  <h2>Роман Купчинський</h2>
 </div>
 <div class="prose" id="content">
 Стрілецька пісня<br />
<br />
Ми йдемо в бій, ми йдемо в бій<br />
По згарищах руїни,<br />
За рідний край, за нарід свій,<br />
За волю України!<br />
<br />
Ми йдемо в бій, земля дуднить,<br />
Вадіють гори, степи,<br />
Бо нас у бій благословить<br />
Могутній дух Мазепи!
 </div>
</div>
</body>
