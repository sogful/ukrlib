<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ох, тяжко</h1>
  <h2>Михайло Старицький</h2>
 </div>
 <div class="prose" id="content">
 Ох, тяжко! Під гнітом пошарпане серце холоне,<br />
Здається, що я, і брати, і все рідне у морі кривавому тоне,<br />
А зверху ще давить якась невміркована сила.<br />
Невже під ногами у мене чорніє розкрита могила?!
 </div>
</div>
