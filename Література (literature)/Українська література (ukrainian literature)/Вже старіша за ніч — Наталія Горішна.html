<title>Вже старіша за ніч...</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вже старіша за ніч...</h1>
  <h2>Наталія Горішна</h2>
 </div>
 <div class="prose" id="content">
 <p>Вже старіша за ніч,</p>
<p>
і мудріша за день.</p>
<p>
Генна пам'ять сторіч</p>
<p>
виринає з пісень.</p>
<p>
Та в хвилину негожу</p>
<p>
по тім'ю довбе:</p>
<p>
Не кохати не можу –</p>
<p>
чому б не тебе ?</p>
<p>
Не життя – без натхнень,</p>
<p>
не шляхи – без узбіч...</p>
<p>
Вже мудріша за день,</p>
<p>
і старіша за ніч.</p>
 </div>
</div>
