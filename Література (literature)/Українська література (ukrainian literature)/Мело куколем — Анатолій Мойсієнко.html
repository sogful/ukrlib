 Мело куколем,<br />
Мело болем...<br />
Але перепела<br />
Пилип<br />
З<br />
Низин<br />
Веде в<br />
З'явовир-кривов'яз<br />
Оголiлого...<br />
А липа лови сиволапила,<br />
Пильно говiв огонь лип,<br />
Яса лип отут утопилася.<br />
Я<br />
З утоми мотуз<br />
Вивив<br />
I розважав зорi.
