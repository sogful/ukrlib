<div class="wrap">
 <div class="page-title">
  <h1>Глібова травма</h1>
  <h2>Петро Ребро</h2>
 </div>
 <div class="prose" id="content">
 Гліб на трибуні — просто геній,<br />
Та виступати більш не буде:<br />
Відбив, сердега, всі легені,<br />
Коли гатив себе у груди!
