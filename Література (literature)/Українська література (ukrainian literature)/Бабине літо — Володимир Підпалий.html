<body>
<div class="wrap">
 <div class="page-title">
  <h1>Бабине літо</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Знову сьогодні літає в полях<br />
бабине літо&#8230;<br />
Бабине літо&#8230;<br />
За справжнім як &#8211;<br />
жаліти чи не жаліти?..<br /><br />
Тиша окутує земний храм.<br />
Тиша, як мед, густа&#8230;<br />
Фата моргана&#8230;<br />
І все. І край&#8230;<br />
Тільки бабине літо,<br />
наче літа,<br />
проліта.
 </div>
</div>
