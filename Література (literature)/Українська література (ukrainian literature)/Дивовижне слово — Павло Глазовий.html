<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дивовижне слово</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Десь на вулиці матусю<br />
Запитав хлопчина:<br />
— А чи може без бельзину<br />
Їхати машина?<br /><br />
Мати вражена спинилась,<br />
Вдарила в долоні:<br />
— Звідки слово це взялося<br />
В твоїм силіконі?!
 </div>
