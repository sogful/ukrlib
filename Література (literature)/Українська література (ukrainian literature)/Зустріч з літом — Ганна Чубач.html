<div class="wrap">
 <div class="page-title">
  <h1>Зустріч з літом</h1>
  <h2>Ганна Чубач</h2>
 </div>
 <div class="prose" id="content">
 Сховалось літо за вербу:<br />
Очікує, чи я прийду.<br />
А я вдаю, що знать не знаю:<br />
На довгу стежку поглядаю.<br />
Стояло б літо в холодку,<br />
І я б очима стежку пасла,<br />
Якби в пахучого бузку<br />
Остання свічка не погасла.
 </div>
