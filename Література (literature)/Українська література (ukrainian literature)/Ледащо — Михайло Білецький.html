<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ледащо</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Над разгадкою кросворда<br />
Чоловік падкує.<br />
А на кухні йому жінка<br />
Вечерю готує.<br />
— Як закипить борщ, — гукає<br />
Від плити до нього, —<br />
Газ виключиш.<br />
Я ж тим часом<br />
Домию підлогу!..<br />
Муж відбуркнув:<br />
— Ну й ледащо<br />
Послав мені, боже.<br />
Вона вже й борщу без мене<br />
Зварити не може!
 </div>
