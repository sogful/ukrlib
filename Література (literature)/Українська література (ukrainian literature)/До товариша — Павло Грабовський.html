<div class="wrap">
 <div class="page-title">
  <h1>До товариша</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Не скаржись на власне довідане горе,<br />
Що в жизні нести довелось;<br />
Поглянь лиш на сльози — цілісіньке море<br />
Їх по світу геть розлилось.<br />
<br />
Куди не піткнешся — панують кайдани;<br />
То де вже спокою нам ждать?<br />
Як щирі народу свого громадяни,<br />
За край ми повинні гадать!
 </div>
