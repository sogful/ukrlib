<title>Щоб сміялися онуки</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Щоб сміялися онуки</h1>
  <h2>Валентин Бичко</h2>
 </div>
 <div class="prose" id="content">
 Ну й кумедний<br />
Дід Василь,<br />
У кисіль<br />
Він сипле сіль,<br />
Ну а цукор —<br />
В холодець,<br />
В чай кладе<br />
Жовтки з яєць.<br />
<br />
Та дідусь наш<br />
Не дивак,<br />
Тільки робить<br />
Все це так.<br />
Тільки робить це<br />
Для штуки,—<br />
Щоб сміялися<br />
Онуки!
 </div>
