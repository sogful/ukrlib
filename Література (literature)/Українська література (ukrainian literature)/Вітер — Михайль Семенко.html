<div class="wrap">
 <div class="page-title">
  <h1>Вітер</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Вітер обскрібує спини гір.<br />
Вітер забиває віддих.<br />
Вітер нас, зблідлих,<br />
Оскелює – хижий звір.<br />
Вітер осклянив будинки.<br />
Вітер серце проймив.<br />
Вітер станув навшпиньки<br />
І нас забив.<br />
Вітре, замкнув мені дух ти!<br />
Обкрижанив ограду.<br />
Розсипав між нами зраду…<br />
Вітер окайданив бухту…
 </div>
