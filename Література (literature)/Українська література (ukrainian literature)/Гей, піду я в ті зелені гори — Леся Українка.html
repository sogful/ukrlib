<div class="wrap">
 <div class="page-title">
  <h1>Гей, піду я в ті зелені гори</h1>
  <h2>Леся Українка</h2>
 </div>
 <div class="prose" id="content">
 Гей, піду я в ті зелені гори,<br />
Де смереки гомонять високі,<br />
Понесу я жалі одинокі<br />
Та й пущу їх у гірські простори.<br /><br />
Кину свої жалі<br />
На зелені галі,<br />
Пущу бором свою тугу,<br />
Чи не знайде другу…
 </div>
