<body>
<div class="wrap">
 <div class="page-title">
  <h1>Одну я любив за веселість</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Одну я любив за веселість,<br />
Другу я за вроду кохав,<br />
А третій за соняшний усміх<br />
Квітками дорогу встилав.<br /><br />
Ти зовсім була не вродлива<br />
І завжди, як вечір, смутна…<br />
Чого ж ти з усіх моїх милих<br />
У серці осталась одна?!
 </div>
