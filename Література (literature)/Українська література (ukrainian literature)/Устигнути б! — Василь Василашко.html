<div class="wrap">
 <div class="page-title">
  <h1>Устигнути б!</h1>
  <h2>Василь Василашко</h2>
 </div>
 <div class="prose" id="content">
 З далеких сіл в село ідуть на празник,<br />
Але на прощу спершу в церкву йдуть.<br />
Чи піп гріхи відпустить своєчасно?..<br />
Таж по хатах столи святкові ждуть!
