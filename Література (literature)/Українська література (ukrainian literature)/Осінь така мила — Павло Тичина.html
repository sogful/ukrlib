<div class="wrap">
 <div class="page-title">
  <h1>Осінь така мила</h1>
  <h2>Павло Тичина</h2>
 </div>
 <div class="prose" id="content">
 Осінь така мила,<br />
Осінь<br />
Славна.<br />
Осінь матусі їсти несе:<br />
Борщик у горщику,<br />
Кашка у жменьці,<br />
Скибка у пазусі,<br />
Грушки у фартушку.
 </div>
