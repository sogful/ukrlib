<body>
<div class="wrap">
 <div class="page-title">
  <h1>В вигнанні дні течуть, як сльози</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 В вигнанні дні течуть, як сльози,<br />
Думки в вигнанні сплять, як мертві,<br />
Солодкі спогади сичать, як змії,<br />
Душа ридає, як дитина.<br /><br />
Душа розірвана, як рана&#8230;<br />
Бальзам далеко так, як сонце,<br />
А сонце, сонце, як і щастя,<br />
Там, там, лише в краю коханім.
 </div>
</div>
