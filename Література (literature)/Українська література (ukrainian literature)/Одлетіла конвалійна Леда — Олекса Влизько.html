<div class="wrap">
 <div class="page-title">
  <h1>Одлетіла конвалійна Леда...</h1>
  <h2>Олекса Влизько</h2>
 </div>
 <div class="prose" id="content">
 Одлетіла<br />
конвалійна Леда<br />
на далекі сніжні гаї,<br />
і не пахнуть вже<br />
липовим медом<br />
поцілунки холодні<br />
твої.<br />
Це початок кінця,<br />
о, кохана,<br />
о, до лютого болю чужа!<br />
Це навіки<br />
найкраща рана<br />
і до споминів<br />
літ іржа.<br />
<br />
ЖИВУ, ПРАЦЮЮ. Харків, 1930, с. 55.
 </div>
