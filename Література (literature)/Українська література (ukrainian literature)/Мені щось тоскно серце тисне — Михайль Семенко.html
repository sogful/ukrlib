<div class="wrap">
 <div class="page-title">
  <h1>Мені щось тоскно серце тисне</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Мені щось тоскно серце тисне<br />
Моєї мами колисанка<br />
Така стара і ніжна висне<br />
І буде виснуть до світанку<br />
І буде виснуть до світанку.<br /><br />
І буде виснуть до світанку<br />
Співучим спогадом нависне<br />
Тиха і ніжна серце тисне<br />
Моєї мами колисанка<br />
Моєї мами колисанка.
 </div>
