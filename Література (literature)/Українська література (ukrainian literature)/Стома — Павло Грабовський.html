<div class="wrap">
 <div class="page-title">
  <h1>Стома</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Тихо, наче у могилі;<br />
Замира душа...<br />
Мої думоньки безсилі<br />
Стома заглуша.<br />
<br />
Тільки стука дощ у кришу;<br />
Вітер загува,<br />
Зворушає сумну тишу,<br />
Серце надрива.
 </div>
