<body>
<div class="wrap">
 <div class="page-title">
  <h1>Знов весна, і знов надії</h1>
  <h2>Леся Українка</h2>
 </div>
 <div class="prose" id="content">
 Знов весна, і знов надії<br />
В серці хворім оживають,<br />
Знов мене колишуть мрії,<br />
Сни про щастя навівають.<br /><br />
Весно красна! Любі мрії!<br />
Сни мої щасливі!<br />
Я люблю вас, хоч і знаю,<br />
Що ви всі зрадливі…
 </div>
