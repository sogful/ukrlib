<div class="wrap">
 <div class="page-title">
  <h1>Твоє життя минуло й знебуло</h1>
  <h2>Василь Стус</h2>
 </div>
 <div class="prose" id="content">
 Твоє життя минуло й знебуло.<br />
І гусне крик. Довліє злоба дневі.<br />
І спроневіра спалює чоло,<br />
і дивен див біжить поверхи древа,<br />
і ніч біжить — поверхи давніх днів,<br />
і тінь лягла на заволоку часу.<br />
Поезіє, красо моя, окрасо,<br />
я перед тебе чи до тебе жив?
 </div>
