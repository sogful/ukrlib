<body>
<div class="wrap">
 <div class="page-title">
  <h1>Черевички</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Черевички у житі,<br />
Черевички у житі,<br />
Черевички по стерні...<br />
Сині, сині, невеличкі<br />
Зозулині черевички<br />
Як зірвати мені?<br />
<br />
Черевички у житі,<br />
Черевички у житі,<br />
Рясно-рясно по стерні!<br />
Будуть хай зозуленятам,<br />
Всім зозулиним малятам —<br />
Не зриватиму, ні!
 </div>
