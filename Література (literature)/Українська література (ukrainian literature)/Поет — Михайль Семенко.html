 <div class="page-title">
  <h1>Поет</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Я про тихі тіні співаю<br />
І про боязну в серці гру<br />
На цих струнах я граю<br />
Доки їх не порву<br />
Про тихі тіні співаю я.<br />
<br />
3. ІX. 1913. Київ
