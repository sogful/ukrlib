<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зорепад</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Небо підставило пелену<br />
й нападало в неї зірок —<br />
малих, маленьких,<br />
ще меншеньких:<br />
цілий стіжок.<br /><br />
Хотів упасти ще й місяць.<br />
Та добре, що не упав.<br />
Небо струсило пелену —<br />
і небозвід запалав.
 </div>
