<div class="wrap">
 <div class="page-title">
  <h1>Сльоза</h1>
  <h2>Іван Малкович</h2>
 </div>
 <div class="prose" id="content">
 Покосили мої полонини<br />
так, що й досі поліг не згребу…<br />
Я заграю в зозульку із глини,<br />
спогадаю гуцульську журбу.<br /><br />
Я зірвусь проти Пруту й Дунаю,<br />
я метнуся на Львів і Судак,<br />
я сльозу у кулак заховаю —<br />
і розірве сльоза мій кулак.
 </div>
