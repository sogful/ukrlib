<body>
<div class="wrap">
 <div class="page-title">
  <h1>Одних виучують писарить...</h1>
  <h2>Юрій Федькович</h2>
 </div>
 <div class="prose" id="content">
 Одних виучують писарить,<br />
А другі пнуться аж в попи;<br />
А я лиш співанки на швару<br />
Хотів посіяти, да й те<br />
Мені не повелось, небого!..<br />
Да що робити? — бити з богом<br />
Ніхто не буде ся!.. Мабіть,<br />
Така вже доля або світ.
 </div>
