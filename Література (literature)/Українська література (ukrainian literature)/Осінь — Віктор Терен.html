<div class="wrap">
 <div class="page-title">
  <h1>Осінь</h1>
  <h2>Віктор Терен</h2>
 </div>
 <div class="prose" id="content">
 Вітер з пожовклим листком<br />
Грається в котика-мишки.<br />
То поженеться біжком,<br />
То підкрадається нишком.<br />
<br />
Ну, а коли спійма,<br />
Буде, дітки,<br />
Зима.
 </div>
