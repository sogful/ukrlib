 <div class="page-title">
  <h1>Вітання</h1>
  <h2>Ігор Січовик</h2>
 </div>
 <div class="prose" id="content">
 Літака спитав Лелека:<br />
– Ти куди летиш?<br />
– Далеко:<br />
в Україну – рідний край!<br />
– То, будь ласка, помахай<br />
Над моїм гніздом-селом<br />
Хоч однесеньким крилом!
