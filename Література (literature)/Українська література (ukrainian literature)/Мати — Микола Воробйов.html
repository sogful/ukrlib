<div class="wrap">
 <div class="page-title">
  <h1>Мати</h1>
  <h2>Микола Воробйов</h2>
 </div>
 <div class="prose" id="content">
 А мати до весни говорить:<br />
— Оце сажу потрушу,<br />
оце хату побілю,<br />
оце трохи підсиню,<br />
оце підведу,<br />
та й буде.<br />
Гріється, всміхається земля,<br />
Щоб усе могло розквітнути.
 </div>
