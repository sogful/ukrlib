 <div class="page-title">
  <h1>В тремкому полум’ї' весни...</h1>
  <h2>Кость Москалець</h2>
 </div>
 <div class="prose" id="content">
 В тремкому полум’ї' весни<br />
згорять сніги, дотліє крига.<br />
Допишеш ти свої листи<br />
і дочитаєш книги.<br />
<br />
Піднімеш голову, зирнеш —<br />
і вибухнуть зіниці:<br />
у світі є сонця, жінки,<br />
і птиці.<br />
<br />
1989
