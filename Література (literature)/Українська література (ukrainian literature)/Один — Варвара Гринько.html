<div class="wrap">
 <div class="page-title">
  <h1>Один</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Лічилка<br />
<br />
Один,<br />
Один,<br />
Одинична —<br />
До вікна летить<br />
Синичка.<br />
<br />
Та синичка<br />
Лиш одна:<br />
Дзінь, дзінь,<br />
Дзінь<br />
Біля вікна!<br />
<br />
Один,<br />
Один,<br />
Одинична —<br />
По-ле-ті-ла<br />
Синичка.
 </div>
</div>
