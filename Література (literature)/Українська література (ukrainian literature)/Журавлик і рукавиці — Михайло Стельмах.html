<body>
<div class="wrap">
 <div class="page-title">
  <h1>Журавлик і рукавиці</h1>
  <h2>Михайло Стельмах</h2>
 </div>
 <div class="prose" id="content">
 До журавлика під стіг<br />
Баранець з села прибіг.<br />
Він приніс в своїй торбині<br />
Для журавлика хлібину,<br />
Трохи ярої пшениці<br />
І червоні рукавиці.<br />
Та не знає птиця,<br />
Нащо птиці рукавиці:<br />
Чи на ноги їх надіти,<br />
Чи на крила почепити,<br />
Чи принести у хатину,<br />
Де живе мала дитина?
 </div>
</div>
