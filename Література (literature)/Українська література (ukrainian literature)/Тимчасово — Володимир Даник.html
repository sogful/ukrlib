<body>
<div class="wrap">
 <div class="page-title">
  <h1>Тимчасово</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 — Як вага, звиняйте... зайва, —<br />
Б'є Іван себе у груди, —<br />
Ну, то це... не дуже файно,<br />
Вас ніхто хвалить не буде!<br /><br />
Тільки думка ця Кіндрату —<br />
Не вогнем... Ледь чутним димом!<br />
— Треба всіх гладких вважати —<br />
Тимчасово не худими...
 </div>
