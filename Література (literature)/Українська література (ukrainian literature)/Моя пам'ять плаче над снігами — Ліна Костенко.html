<div class="wrap">
 <div class="page-title">
  <h1>Моя пам'ять плаче над снігами...</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 * * *<br />
<br />
Моя пам'ять плаче над снігами,<br />
де стоять берези і хрести.<br />
У зимові срібні амальгами<br />
біле сонце хоче прорости.<br />
<br />
Я живу, бо ще мені живеться.<br />
<br />
Бо живу, дав Бог мені снаги.<br />
Із твого невидимого серця<br />
кров калини капле у сніги.
 </div>
