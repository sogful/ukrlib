<body>
<div class="wrap">
 <div class="page-title">
  <h1>За що ненавидів</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Терпіть не міг він патланів:<br />
Ганьбив, паплюжив як умів<br />
В тролейбусі, в трамваї...<br />
"Нема на вас перукарів,<br />
Кийка добрячого немає!<br />
Раніш не видно було вас,<br />
Де ви взялися в біса?!"<br />
Він розпікав їх повсякчас<br />
Тому...<br />
Що сам був лисий!
 </div>
</div>
