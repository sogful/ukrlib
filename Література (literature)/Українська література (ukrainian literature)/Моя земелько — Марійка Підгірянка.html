<body>
<div class="wrap">
 <div class="page-title">
  <h1>Моя земелько</h1>
  <h2>Марійка Підгірянка</h2>
 </div>
 <div class="prose" id="content">
 Моя земленько ти ріднесенька,<br />
як твій чар описати?<br />
Не затихла ще моя пісенька,<br />
Щоб про тебе співати.<br />
Ніч невидная, ніч тихесенька,<br />
Але сон не приходить.<br />
<br />
Моя земелько ти ріднесенька<br />
Святе моє кохання,<br />
Для тебе було перша пісенька,<br />
Тобі буде й остання.
 </div>
