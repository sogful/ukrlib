<body>
<div class="wrap">
 <div class="page-title">
  <h1>Осінь</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Осінь похмура йде<br />
Хмари дощі тумани<br />
Осінь у серце веде<br />
Смуток нежданий<br />
Холод суне німий<br />
В душу вповзає мла<br />
Осінь серпанок густий<br />
Ти принесла<br />
Ради не дам собі<br />
В серці моїм мовчання<br />
Спогад ридає в журбі<br />
Давнє кохання.
 </div>
