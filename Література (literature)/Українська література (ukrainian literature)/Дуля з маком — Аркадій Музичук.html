<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дуля з маком</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 Гриць нашіптує Максиму:<br />
— Вір мені, як брату.<br />
Біжи швидше і отримуй<br />
За той рік зарплату.<br />
Прилетів той. Наче куля.<br />
А касир зі смаком:<br />
— У якій валюті — "дуля",<br />
А чи "дуля з маком"?
 </div>
</div>
