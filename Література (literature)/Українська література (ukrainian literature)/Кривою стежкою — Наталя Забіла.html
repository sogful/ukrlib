<body>
<div class="wrap">
 <div class="page-title">
  <h1>Кривою стежкою</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 <em>(Жарт)</em><br /><br />
Колись кривою стежкою<br />
ішов кривий хлопчак.<br />
І під кривими вербами<br />
знайшов кривий п&#8217;ятак.<br />
Купив кривого котика<br />
ловить криву мишву.<br />
спати всі вони пішли<br />
в хатиночку криву.
 </div>
