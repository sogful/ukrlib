<body>
<div class="wrap">
 <div class="page-title">
  <h1>Молитва</h1>
  <h2>Богдан-Ігор Антонич</h2>
 </div>
 <div class="prose" id="content">
 Заходить день за днину,<br />
мов сонце за параван далеких гір.<br />
<br />
Вже від ждання нас болить зір,<br />
вже сивини на головах є трупі.<br />
<br />
…шалом наших душ<br />
ми молимося за нову людину.
 </div>
