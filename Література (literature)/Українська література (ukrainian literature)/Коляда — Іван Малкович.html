<div class="wrap">
 <div class="page-title">
  <h1>Коляда</h1>
  <h2>Іван Малкович</h2>
 </div>
 <div class="prose" id="content">
 При цій малій нехитрій коляді<br />
все менше нас: мороз на голос тисне.<br />
Вмерзає слово у грубезний лід,<br />
як риба — до весни (а лід розтане? трісне?).<br />
Змерзає коляда у кожен звук —<br />
і тут не допоможуть нам кожухи,<br />
не виручить і пташка тетерук,<br />
якщо наш хор хисткий і слабодухий...
 </div>
