<body>
<div class="wrap">
 <div class="page-title">
  <h1>По-осінньому хмари пливуть</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 По-осінньому хмари пливуть,<br />
По-осінньому вітер кигиче&#8230;<br />
У далеку лаштуючись путь,<br />
Чорна галич злетілась на віче.<br /><br />
І весь день в берестках стрекотня<br />
Все полохає хмари високі,<br />
Безгоміння осіннього дня<br />
І мій спокій&#8230;
 </div>
</div>
