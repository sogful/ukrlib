<body>
<div class="wrap">
 <div class="page-title">
  <h1>Додумався</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Покарав малого тато, —<br />
Той стоїть в кутку кімнати.<br />
Плаче хлопчик і рида.<br />
Дума хлопчик: "Не біда!<br />
<br />
От як виросту, — кімнати<br />
Буду круглі будувати.<br />
Буде хата в нас така:<br />
В ній ні одного кутка!"
 </div>
</div>
