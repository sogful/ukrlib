 <div class="page-title">
  <h1>Вечори</h1>
  <h2>Наталя Лівицька-Холодна</h2>
 </div>
 <div class="prose" id="content">
 Це нічого, що вже не такі<br />
вечори ні взимку, ні<br />
весною.<br />
Ти їх любиш тепер із кимсь,<br />
а я сама з собою.<br />
І так добре мені в самоті:<br />
самота – то гордість духа.<br />
Це нічого, що очі вже<br />
не ті<br />
і що вже ні батька, ні друга.<br />
1971.
 </div>
