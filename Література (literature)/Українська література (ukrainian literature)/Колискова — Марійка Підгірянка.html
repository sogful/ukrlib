<body>
<div class="wrap">
 <div class="page-title">
  <h1>Колискова</h1>
  <h2>Марійка Підгірянка</h2>
 </div>
 <div class="prose" id="content">
 Спіть, діточки, спіть,<br />
Віченька стуліть!<br />
Дрібен дощик стукотить,<br />
Вікнам казку гомонить...<br />
Дрібен дощик пада там,<br />
А тут тихо, тепло нам.<br />
При матусі рідненькій,<br />
У світличці чистенькій,<br />
Спіть, діточки, спіть,<br />
Віченька стуліть!
 </div>
