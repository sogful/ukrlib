<div class="wrap">
 <div class="page-title">
  <h1>На спомин</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Як тут гарно: шелест і шерех,<br />
синій іній, і синя вись,<br />
і вогнями дніпровський берег<br />
над кришталем льоду провис.<br />
<br />
І нічого більше не видно.<br />
Загубилися ціль і мета.<br />
<br />
Лиш синичка хвостом, як віником,<br />
сніг між лавками заміта...<br />
1968
 </div>
