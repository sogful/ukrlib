 <div class="page-title">

  <h2>Максим Рильський</h2>
 </div>
 <div class="prose" id="content">
 * * *<br />
<br />
Піднялися крила<br />
Сонних вітряків,<br />
І черешню білу<br />
Вітер розбудив,<br />
<br />
І війнув на книги,<br />
Розметав листи...<br />
Серце! Ти не з криги?<br />
Не з заліза ти?<br />
<br />
1926
