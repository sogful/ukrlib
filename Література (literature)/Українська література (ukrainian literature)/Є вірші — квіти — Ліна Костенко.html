<div class="wrap">
 <div class="page-title">
  <h1>Є вірші — квіти...</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 * * *<br />
<br />
Є вірші — квіти.<br />
Вірші — дуби.<br />
Є іграшки — вірші.<br />
Є рани.<br />
Є повелителі і раби.<br />
І вірші є —<br />
каторжани.<br />
Крізь мури в’язниць,<br />
по тернах лихоліть —<br />
ідуть, ідуть по етапу століть…
 </div>
