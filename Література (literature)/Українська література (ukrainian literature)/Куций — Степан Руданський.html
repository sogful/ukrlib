 <div class="page-title">
  <h1>Куций</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 Ходить піп коло крамниці<br />
Та й чогось питає.<br />
Аж до нього такий хитрий<br />
Жидок підбігає:<br /><br />
"Добродзею, добродзею!" —<br />
Просить почекати<br />
Та й новому ножикові<br />
Ім'я яке дати.<br /><br />
А той, довго не гадавши,<br />
Казав ножик дати,<br />
Зламав його та й каже:<br />
"Куцим будеш звати!.."
