 <div class="page-title">
  <h1>Про сонячну вроду...</h1>
  <h2>Олекса Стефанович</h2>
 </div>
 <div class="prose" id="content">
 Про сонячну вроду<br />
Не мрій.—<br />
Дай серцю, природо,<br />
Спокій.<br />
Шарлатную барму —<br />
Зміни,—<br />
Хай срібло і мармур —<br />
Зими.<br />
<br />
1928

</div>
