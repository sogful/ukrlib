 <div class="page-title">
  <h1>Сова</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Потішка<br />
<br />
— Вдень в дуплі сидить сова,<br />
Навіть дзьою не висува.<br />
А вночі вона полює,<br />
Совенят малих годує.<br />
<br />
— Мамо, вдень чого сова<br />
Навіть дзьоб не висува?<br />
— Дуже кепсько бачить вдень,<br />
То й сидить, анітелень.<br />
<br />
І чого ота сова<br />
Навіть дзьоб не висува?..
 </div>
