<div class="wrap">
 <div class="page-title">
  <h1>Облітав журавель</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Облітав журавель<br />
Сто морів, сто земель,<br />
Облітав, обходив,<br />
Крила, ноги натрудив.<br />
Ми спитали журавля:<br />
— Де найкращая земля? —<br />
Журавель відповідає:<br />
— Краще рідної немає!
