<body>
<div class="wrap">
 <div class="page-title">
  <h1>Гриб діткам купив шапки</h1>
  <h2>Михайло Стельмах</h2>
 </div>
 <div class="prose" id="content">
 Гриб діткам купив шапки.<br />
Повдягалися грибки<br />
І стають аж на носочки,<br />
Щоб їх бачили в лісочку.<br />
Гриб говорить їм: — Дітки,<br />
Не спинайтесь на носки,<br />
Не показуйте шапки:<br />
Ходить баба за дубами —<br />
Попадете в борщ грибами.
 </div>
</div>
