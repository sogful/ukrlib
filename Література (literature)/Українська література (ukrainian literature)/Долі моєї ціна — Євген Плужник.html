<body>
<div class="wrap">
 <div class="page-title">
  <h1>Долі моєї ціна</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Долі моєї ціна –<br />
У повітовому місті осінь,<br />
А вона витягла серце, – на!<br />
– Неціловане й досі!<br /><br />
От і упала на неї тінь!<br />
От і знесилів.<br />
Мало, мало хотінь!<br />
– Сили!<br /><br />
А коли ж сила уся –<br />
Шклянка насіння?<br />
Хоч би вже спокій мені засяв,<br />
Весно моя осіння!
 </div>
