<body>
<div class="wrap">
 <div class="page-title">
  <h1>Розкадрую уважно</h1>
  <h2>Ірина Цілик</h2>
 </div>
 <div class="prose" id="content">
 Розкадрую уважно<br />
кожен клаптик твоєї оселі,<br />
ще вчора — нашої.<br />
Новорічну ялинку<br />
тепер уже сам розбиратимеш…<br />
Бажано<br />
доходити кактуси.<br />
Все прости,<br />
що непрощене!<br />
Гну олівець<br />
об лід…<br />
Хороший мій,<br />
десь в моєму теплі<br />
рветься плетивом<br />
те,<br />
що зветься білетом<br />
в один кінець….
 </div>
