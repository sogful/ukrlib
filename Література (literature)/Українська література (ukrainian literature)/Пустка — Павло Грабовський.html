 <div class="page-title">
  <h1>Пустка</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Пусто та голо —<br />
Скільки збагнеш;<br />
Степу навколо<br />
Не осягнеш.<br />
<br />
Рве хуртовина;<br />
Хата — сумна,<br />
Мов домовина<br />
Несподівна.<br />
<br />
Темрява ночі<br />
Перемага,<br />
Тяжить на очі,<br />
Гнітом ляга.
 </div>
