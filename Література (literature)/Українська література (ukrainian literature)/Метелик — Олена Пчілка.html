<body>
<div class="wrap">
 <div class="page-title">
  <h1>Метелик</h1>
  <h2>Олена Пчілка</h2>
 </div>
 <div class="prose" id="content">
 Діти бігають, стрибають,<br />
Далі — весело гукають:<br />
— Ах, метелик!.. подивіться!..<br />
Ось він, ось він метушиться!<br />
Та який же гарний, гожий!<br />
Наче квітка, прехороший!
 </div>
