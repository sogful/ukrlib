<div class="wrap">
 <div class="page-title">
  <h1>Маля притулило до вуха...</h1>
  <h2>Володимир Біляїв</h2>
 </div>
 <div class="prose" id="content">
 Маля притулило до вуха<br />
Кручену мушлю рожеву,<br />
Заплющило очі й слуха<br />
Вітер, хвилі та меву.<br /><br />
Вітер пестить обличчя,<br />
Хвилі слух лоскочуть,<br />
Мева мевенят все кличе,<br />
Що літать не хочуть.
 </div>
