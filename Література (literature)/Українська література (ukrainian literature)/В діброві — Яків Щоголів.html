<div class="wrap">
 <div class="page-title">
  <h1>В діброві</h1>
  <h2>Яків Щоголів</h2>
 </div>
 <div class="prose" id="content">
 Он чорний шпак співа вгорі,<br />
Зозуля голосно кукука;<br />
Скриплять червоні снігурі,<br />
В дубову кору дятел стука.<br />
<br />
Щебече зяблича сім'я,<br />
І сиза горлиця воркує;<br />
Чудова ж пісня солов'я<br />
Над всіми співами царює.
 </div>
