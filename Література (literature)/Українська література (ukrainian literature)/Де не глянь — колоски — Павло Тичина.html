<title>Де не глянь — колоски</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Де не глянь — колоски</h1>
  <h2>Павло Тичина</h2>
 </div>
 <div class="prose" id="content">
 Гей, простори які!<br />
Любо-мило землі:<br />
де не глянь — колоски<br />
та всі в злоті-сріблі.<br />
Де не глянь — колоски<br />
проти сонця блись-блись.<br />
Лиш ген з краю ліски,<br />
ніби дим, простяглись...
 </div>
