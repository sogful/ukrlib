<body>
<div class="wrap">
 <div class="page-title">
  <h1>Без пут, розбурханії змисли...</h1>
  <h2>Оксана Лятуринська</h2>
 </div>
 <div class="prose" id="content">
 Без пут, розбурханії змисли<br />
Зірвались з гуком тяглим<br />
Ні! не затрима Ваґнер<br />
Того – без форми й мисли, –<br />
Що в степ жене дикунським предком,<br />
Що страшить в повний місяць,<br />
Виходить вовком з лісу,<br />
Не має назви й осередку.
 </div>
