<body>
<div class="wrap">
 <div class="page-title">
  <h1>На поверх вище</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 За бомжами постовий<br />
Забравсь на горище:<br />
— Де живете?<br />
— Я ніде.<br />
— Ви?<br />
— На поверх вище!
