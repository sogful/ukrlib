<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зимо, зимо, відступись!</h1>
  <h2>Лідія Компанієць</h2>
 </div>
 <div class="prose" id="content">
 От обманники які —<br />
Березневі ранки!<br />
Тане сніг,<br />
Течуть струмки,—<br />
Я й закинув санки.<br />
<br />
Кожушинку розстебнув —<br />
Жарко!<br />
А надвечір<br />
Вітер з півночі дмухнув,—<br />
Знову холоднеча!<br />
<br />
Мерзнуть щоки, мерзне ніс<br />
При такій погоді...<br />
Зимо, зимо, відступись!<br />
Побула — і годі!
 </div>
