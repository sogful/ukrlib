 <div class="page-title">
  <h1>Неслухняні думки</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 — Летіте, думи, у широкий світ, —<br />
казав поет, — неначе віщі птиці!<br />
А птиці щось не квапляться в політ:<br />
сидять на сідалі — в книгарні на полиці...
