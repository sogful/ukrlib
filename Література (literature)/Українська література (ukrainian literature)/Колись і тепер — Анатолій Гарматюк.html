<body>
<div class="wrap">
 <div class="page-title">
  <h1>Колись і тепер</h1>
  <h2>Анатолій Гарматюк</h2>
 </div>
 <div class="prose" id="content">
 — Ну й комірці пішли в нас далебі —<br />
Дихнути скоро не дадуть тобі!<br />
Колись було —<br />
Так зовсім інше діло, —<br />
Хрипіла<br />
Шия розжиріла.
 </div>
</div>
