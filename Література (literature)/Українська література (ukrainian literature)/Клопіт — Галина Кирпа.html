<body>
<div class="wrap">
 <div class="page-title">
  <h1>Клопіт</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Про свій клопіт я частенько<br />
та й кажу бабусі:<br />
— Коли вже я так, як ви,<br />
в'язати навчуся?<br /><br />
Коли будуть слухняними<br />
і нитки, і спиці?<br />
Коли вже я Дюймовочці<br />
сплету рукавиці?<br /><br />
А тоді ще й голубеньку<br />
шапочку весняну…<br />
Коли вже я, бабусенько,<br />
бабусею стану?!
 </div>
