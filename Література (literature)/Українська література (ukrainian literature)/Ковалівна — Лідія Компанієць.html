<div class="wrap">
 <div class="page-title">
  <h1>Ковалівна</h1>
  <h2>Лідія Компанієць</h2>
 </div>
 <div class="prose" id="content">
 — Звідкіля ти?<br />
— Із Стеблева,<br />
— А чия ти?<br />
— Ковалева.<br />
В мене тато коваль,<br />
І дідусь був коваль,<br />
І мій брат коваленко.<br />
— А як звуть тебе?<br />
— Оленка.<br />
— Ну, бувай!<br />
Рости здорова,<br />
Ковалівно чорноброва!
 </div>
