<body>
<div class="wrap">
 <div class="page-title">
  <h1>Де ви пасли, олені небесні?...</h1>
  <h2>Василь Герасим'юк</h2>
 </div>
 <div class="prose" id="content">
 Де ви пасли, олені небесні?<br />
Ви почули срібний свист стріли?<br />
Ви скупались у черленім плесі<br />
чи в залізну дебрю утекли?<br />
<br />
Де ви спали, олені небесні?<br />
Ви відчули жовтий зір змії?<br />
Ви наснили золотому теслі<br />
білу платву в дереві її?
 </div>
</div>
