<title>Небезпечний вік</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Небезпечний вік</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Запросив директор школи<br />
Це вже в котрий раз! —<br />
Матір лобура, що ходить<br />
У десятий клас.<br />
— Угамуйте свого сина,<br />
Вчора ваш Петро<br />
Семикласницю затиснув<br />
І зламав ребро.<br />
Мати каже:<br />
— Ви, звиняюсь,<br />
Странний чоловік.<br />
Я ж не винна, що у сина<br />
Переломний вік.
 </div>
</div>
