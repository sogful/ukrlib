<body>
<div class="wrap">
 <div class="page-title">
  <h1>Скільки важить макіяж</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 — Я зважилась, — каже вранці<br />
Молоденька кудла. —<br />
Порівняно з учорашнім<br />
На кілограм схудла.<br /><br />
Мама дивиться ласкаво<br />
На дитя кохане:<br />
— Як намажешся, голубко,<br />
Все на місце стане.
 </div>
