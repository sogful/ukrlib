<body>
<div class="wrap">
 <div class="page-title">
  <h1>Тракторець</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 А мені купили трактор —<br />
Самохідний тракторець.<br />
Накручу тугу пружинку —<br />
Хай рушає навпростець.<br />
Зоремо бабусі грядку<br />
Так, як в полі<br />
Оре татко.
 </div>
