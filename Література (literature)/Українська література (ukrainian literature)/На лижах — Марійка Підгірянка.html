<body>
<div class="wrap">
 <div class="page-title">
  <h1>На лижах</h1>
  <h2>Марійка Підгірянка</h2>
 </div>
 <div class="prose" id="content">
 Сніги упали свіжі,<br />
Прослався білий шлях,—<br />
Візьму я бистрі лижі,<br />
Полину, наче птах.<br />
<br />
Засніжена дорога<br />
Зникає десь у млі —<br />
Коли б летіти змога<br />
На голубі шпилі.<br />
<br />
В далеку Верховину,<br />
Що мріє в півсні,<br />
У тиху полонину,<br />
В Карпати чарівні!
 </div>
