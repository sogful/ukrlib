<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сонечко</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Біля сонечка, вгорі<br />
Плавала хмаринка.<br />
Проти сонечка, в дворі,<br />
Бавилась Яринка.<br />
Не журись, Яринко,<br />
Не на вік хмаринка:<br />
Хмарка розпливається<br />
Сонечко ж — лишається!
 </div>
