<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не кусається</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 – Не дивись на мене, вуже –<br />
я тебе боюся дуже.<br />
Не підійду, й не проси –<br />
Бережусь, щоб не вкусив.<br />
<br />
Вуж образився: – Кусючка?!<br />
Та ніколи у житті!<br />
Стережу я нашу річку<br />
від кусючих хижаків.<br />
<br />
Хай лише яка гадюка<br />
підповзе до комишу,<br />
я таку одразу злюку<br />
упіймаю і… вкушу.
 </div>
