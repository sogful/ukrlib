<body>
<div class="wrap">
 <div class="page-title">
  <h1>Проста арифметика</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 Якщо<br />
дві руки<br />
до лопати<br />
додати,<br />
а потім додати<br />
бажання завзяте,<br />
а потім<br />
відняти від них<br />
неохоту,<br />
помножити все<br />
на веселу роботу,<br />
зібрати дітей<br />
і дорослих усіх<br />
і порівну все<br />
розділити на них,<br />
то будемо мати<br />
один результат:<br />
зелений,<br />
співучий,<br />
заквітчаний сад!
 </div>
</div>
