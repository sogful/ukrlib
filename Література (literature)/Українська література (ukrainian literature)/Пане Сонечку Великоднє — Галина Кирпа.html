<body>
<div class="wrap">
 <div class="page-title">
  <h1>Пане Сонечку Великоднє</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Пане Сонечку, пане ясний,<br />
не заходь нам, бо світ прекрасний!<br /><br />
Пане Сонечку Великоднє,<br />
будь навіки нам, як сьогодні!<br /><br />
Та князюй удень, та князюй вночі —<br />
небо віддає Тобі всі ключі.
 </div>
</div>
