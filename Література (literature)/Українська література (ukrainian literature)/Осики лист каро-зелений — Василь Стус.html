<div class="wrap">
 <div class="page-title">
  <h1>Осики лист каро-зелений</h1>
  <h2>Василь Стус</h2>
 </div>
 <div class="prose" id="content">
 Осики лист каро-зелений<br />
тремтить на вітрі і тремтить.<br />
Ще досвіток. Господь ще спить.<br />
Зітхає в'язень коло мене<br />
і моторошно так кричить,<br />
окритий сном. В вікні глухому<br />
на день займається зоря.<br />
Недоле, нишком догоряй<br />
і не кажи про те нікому.
 </div>
