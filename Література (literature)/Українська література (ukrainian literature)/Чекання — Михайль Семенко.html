<div class="wrap">
 <div class="page-title">
  <h1>Чекання</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Пройшло 5 веселих трамваїв.<br />
Вас нема.<br />
Ах, як зимно на розі чекати в маї,<br />
Коли в серці пустка німа.<br /><br />
Вийшла панна — на Вас не схожа цілком,<br />
В атмосфері конвалій.<br />
І довго-довго я стежив зором за блискучим каблучком,<br />
І мене мрії заколихали.
 </div>
