<body>
<div class="wrap">
 <div class="page-title">
  <h1>Лелеченьки</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 3 далекого краю<br />
Лелеки летіли,<br />
Та в одного лелеченьки<br />
Крилонька зомліли.<br />
<br />
Висушила силу<br />
Чужина проклята,<br />
Візьміть мене, лелеченьки,<br />
На свої крилята.<br />
<br />
Ніч накрила очі<br />
Мені молодому,<br />
Несіть мене, лелеченьки,<br />
Мертвого додому.
 </div>
