<title>Коли мене гнітить зневіра...</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Коли мене гнітить зневіра...</h1>
  <h2>Василь Грінчак</h2>
 </div>
 <div class="prose" id="content">
 Коли мене гнітить зневіра<br />
До тих, кому я довіряв,<br />
Біль серце давить, мов удав,<br />
Коли мене гнітить зневіра.<br />
<br />
Фальшиве все, що з ними мав,<br />
І дружба їх — буденність сіра,<br />
Коли мене гнітить зневіра<br />
До тих, кому я довіряв.
 </div>
</div>
