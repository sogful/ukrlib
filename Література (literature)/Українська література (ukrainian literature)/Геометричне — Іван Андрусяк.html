<div class="wrap">
 <div class="page-title">
  <h1>Геометричне</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 Прийшли до круга. Стали зусібіч.<br />
І голови накрили прапорами.<br />
І хтось завів нестямно довгу річ<br />
про конуси і паралелограми.<br />
<br />
А ми поволі падали в траву,<br />
підклавши сон під голови патлаті.<br />
І так виразно, ніби наяву,<br />
у нас в очах світилися квадрати.
 </div>
