<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ведмідь</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Буркотливий, вайлуватий<br />
Ходить лісом дід кудлатий.<br />
Одягнеться в кожушину,<br />
Мед шукає і ожину.<br />
Літом любить полювати.<br />
Взимку – у барлозі спати.<br />
Як зачує він весну,<br />
Прокидається від сну.
 </div>
