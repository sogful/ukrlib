<body>
<div class="wrap">
 <div class="page-title">
  <h1>Надходить золота хвилина</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 Надходить золота хвилина,<br />
Як шелестить в руках мені<br />
Твоя одежа – шумелина<br />
На вже достиглім качані.<br /><br />
Моя рука вже затремтіла,<br />
Бо мріяла вона давно<br />
Пучкам відкрити твого тіла<br />
Пахуче і тверде зерно.
 </div>
