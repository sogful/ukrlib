<body>
<div class="wrap">
 <div class="page-title">
  <h1>По в'язкій стежці</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Чвалав сьогодні по полю,<br />
По в'язкій стежці.<br />
Вітер дув в шию до болю,<br />
Зір губивсь на далекій мережці.<br /><br />
Я нічого сказати не можу.<br />
Вітер по полю гуляє.<br />
Хутко вишле сторожу<br />
Чорна земля.
 </div>
</div>
