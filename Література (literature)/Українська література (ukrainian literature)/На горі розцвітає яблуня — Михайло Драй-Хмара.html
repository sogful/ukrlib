<div class="wrap">
 <div class="page-title">
  <h1>На горі розцвітає яблуня...</h1>
  <h2>Михайло Драй-Хмара</h2>
 </div>
 <div class="prose" id="content">
 На горі розцвітає яблуня,<br />
Розцвітає білим шатром.<br />
Вітер їй: — Стережись! на зваблювання,<br />
На чари твої – буруном!<br />
<br />
А вже небо в квітчастих паволоках:<br />
Хмарна галич біду пасе.<br />
Ой, ярує вітер в червоних таволга:<br />
Як зірветься – ввесь цвіт знесе!
 </div>
