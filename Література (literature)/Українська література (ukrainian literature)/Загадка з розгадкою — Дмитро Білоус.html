<div class="wrap">
 <div class="page-title">
  <h1>Загадка з розгадкою</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Акростих<br /><br />
Розтина блакить, гостроголова,<br />
Аж до зір готова досягти;<br />
Космонавтики вона основа,<br />
Екіпаж споряджено — лети!..<br />
Тут, у вірші, й відповідь готова,<br />
А тобі — лишається знайти.
 </div>
