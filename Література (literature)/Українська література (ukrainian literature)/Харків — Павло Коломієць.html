<body>
<div class="wrap">
 <div class="page-title">
  <h1>Харків</h1>
  <h2>Павло Коломієць</h2>
 </div>
 <div class="prose" id="content">
 Розкинулося місто між горбами.<br />
Пливе аулом ген аж ген, до небосхилу, —<br />
там металеві дамби й бомби<br />
багряно покололи обрій.<br />
Розкинулося місто: табор:<br />
де гноми перетворюються на титанів.<br />
Де землю взято в металеві дуги,<br />
в залізний крик.
 </div>
