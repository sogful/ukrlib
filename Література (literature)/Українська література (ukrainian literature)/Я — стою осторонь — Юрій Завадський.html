Я — стою осторонь.<br />
<br />
Я, я не воюю.<br />
Моє бажання — роздорiжжя, сваволя.<br />
Бажання, хворе невiдповiднiстю —<br />
Єдина зброя супроти.<br />
<br />
Здобуваючи крик, залишаю собi зраду,<br />
Зрада притягує голод, а голод — миттєвiсть.<br />
Одна рiч пояснює iншу.<br />
<br />
