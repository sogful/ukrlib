<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не забудь!</h1>
  <h2>Віктор Терен</h2>
 </div>
 <div class="prose" id="content">
 Ще малий, але ж сміливець —<br />
Сам біжить у гай...<br />
Ти, мій хлопче, українець —<br />
Те запам'ятай.<br />
<br />
Ще мала, а по барвінок<br />
Вже ходила в гай...<br />
Ти, дівчатко, українка —<br />
Тож не забувай.<br />
<br />
Вирина стежина рідна<br />
З теплої трави...<br />
Мати наша — Україна,<br />
Не забудьте ви.
 </div>
</div>
