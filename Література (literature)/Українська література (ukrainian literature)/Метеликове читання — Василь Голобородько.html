<body>
<div class="wrap">
 <div class="page-title">
  <h1>Метеликове читання</h1>
  <h2>Василь Голобородько</h2>
 </div>
 <div class="prose" id="content">
 Чи метелик,<br />
чи велика дитяча книжка<br />
з малюнками кольоровими олівцями,<br />
із словом, що його важко читати:<br />
тінь.<br />
<br />
Метелик женеться за метеликом,<br />
зазирає в розгорнені сторінки крил,<br />
читає по літері —<br />
і виходить слово легеньке:<br />
промінь.
 </div>
</div>
