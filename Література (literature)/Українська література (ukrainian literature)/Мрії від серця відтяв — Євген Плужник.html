 <div class="page-title">
  <h1>Мрії від серця відтяв</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Мрії від серця відтяв, –<br />
Корінь виснажують віти.<br />
&#8230;Мало прожити життя, –<br />
Треба життя зрозуміти.<br /><br />
Може, й поети лиш ті,<br />
Що за юнацтва вже сиві&#8230;<br />
&#8230;Мрії ж мої золоті,<br />
Мрії ж мої нещасливі!
 </div>
