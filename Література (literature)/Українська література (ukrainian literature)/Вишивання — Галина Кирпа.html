<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вишивання</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Вишила суничку нитка червоненька,<br />
вишила листочок нитка зелененька.<br />
Вишила садочок, вишила долинку,<br />
вишила у небі хмарку і хмаринку,<br />
щоб гуляли тихо, весело обоє<br />
та й учили птахів, як літать по двоє.<br />
Щоб весняні квіти не були сумними,<br />
то учили дощик, як ходить за ними.
 </div>
