<div class="wrap">
 <div class="page-title">
  <h1>Тихий</h1>
  <h2>Анатолій Гарматюк</h2>
 </div>
 <div class="prose" id="content">
 На цьому світі<br />
Змін я не відчув:<br />
Мовчати —<br />
Жінка за життя привчила;<br />
Як і раніш —<br />
Ні пари з уст!<br />
Мовчу!<br />
Могила!
 </div>
