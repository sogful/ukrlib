<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ціпонька-ненька</h1>
  <h2>Олександр Виженко</h2>
 </div>
 <div class="prose" id="content">
 Ходило курчатко<br />
В зелений садочок,<br />
Водило з собою<br />
Чотирнадцять квочок.<br />
– Дивіться, рідненькі,<br />
Далеко не йдіть –<br />
Я чую, за хатою<br />
Кішка нявчить.<br />
Збігаються квочки<br />
До ціпоньки-неньки,<br />
Бо їм не до жартів<br />
З моїх вигаденьків.
 </div>
