<div class="wrap">
 <div class="page-title">
  <h1>Христос воскрес, прийнявши муки...</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Христос воскрес, прийнявши муки<br />
Від іудейських книгарів;<br />
Та мир підняв би знову руки,<br />
Коли б де страдника уздрів.<br />
<br />
В немручім слові правди всюди<br />
Воскрес прибитий до хреста;<br />
А люди (як звичайно люди)<br />
Все дожидаються Христа.
 </div>
