<body>
<div class="wrap">
 <div class="page-title">
  <h1>Цибулина</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Поки чистила Цибулину,<br />
Не одну пролила Сльозину.<br />
Та почистила,<br />
Хоч і плакала,<br />
Хоч і слізоньки<br />
Рясно капали!<br />
Що ті слізоньки?<br />
То дрібниця.<br />
Я — матусина<br />
Помічниця.
 </div>
