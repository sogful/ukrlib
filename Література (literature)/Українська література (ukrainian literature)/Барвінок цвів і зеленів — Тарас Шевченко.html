<div class="wrap">
 <div class="page-title">
  <h1>Барвінок цвів і зеленів</h1>
  <h2>Тарас Шевченко</h2>
 </div>
 <div class="prose" id="content">
 <em>Н. Я. МАКАРОВУ<br />
На пам'ять 14 сентября</em><br /><br />
Барвінок цвів і зеленів,<br />
Слався, розстилався;<br />
Та недосвіт перед світом<br />
В садочок укрався.<br /><br />
Потоптав веселі квіти,<br />
Побив… Поморозив…<br />
Шкода того барвіночка<br />
Й недосвіта шкода!
