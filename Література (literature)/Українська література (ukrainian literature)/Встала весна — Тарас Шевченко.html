<body>
<div class="wrap">
 <div class="page-title">
  <h1>Встала весна...</h1>
  <h2>Тарас Шевченко</h2>
 </div>
 <div class="prose" id="content">
 Встала весна, чорну землю<br />
Сонну розбудила,<br />
Уквітчала її рястом,<br />
Барвінком укрила;<br />
<br />
І на полі жайворонок,<br />
Соловейко в гаї<br />
Землю, убрану весною,<br />
Вранці зустрічає.
 </div>
