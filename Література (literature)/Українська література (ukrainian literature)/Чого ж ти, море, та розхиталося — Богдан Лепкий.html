<body>
<div class="wrap">
 <div class="page-title">
  <h1>Чого ж ти, море, та розхиталося</h1>
  <h2>Богдан Лепкий</h2>
 </div>
 <div class="prose" id="content">
 Чого ж ти, море, та розхиталося,<br />
Мов колиска новенька,<br />
Чого ж ти, серце, та розридалося,<br />
Мов дитина маленька?<br /><br />
Як тяжко море та уговорити,<br />
Щоб більше не гуділо,<br />
Як тяжко серце утихомирити,<br />
Що з болю не скиміло.
 </div>
