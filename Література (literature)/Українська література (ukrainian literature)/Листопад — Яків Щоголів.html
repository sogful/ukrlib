<body>
<div class="wrap">
 <div class="page-title">
  <h1>Листопад</h1>
  <h2>Яків Щоголів</h2>
 </div>
 <div class="prose" id="content">
 Звелося літо і не знать,<br />
Як день за днем минув,<br />
І серпень дав, що можна дать,<br />
І вересень майнув...<br />
<br />
Морозний вітер в гай і ліс<br />
Подув з холодних міст<br />
И нещадно з дерева обніс<br />
Червоножовтий лист.
 </div>
