 <div class="page-title">
  <h1>При дорозі</h1>
  <h2>Степан Чарнецький</h2>
 </div>
 <div class="prose" id="content">
 На Поділлю при дорозі,<br />
Що йшла вздовж ланів,<br />
В спеках, в стужах, на морозі<br />
Малин хрест чорнів…<br /><br />
Місяць сяєвом стелився<br />
На стерні пусті:<br />
Йшли стрільці… Слізьми залився<br />
Ісус на хресті…<br /><br />
***<br />
Джерело:Цифрова Українська Бібліотека.
