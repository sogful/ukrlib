<title>Як нема здоров'я</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Як нема здоров'я</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 Дід Данило молодицю<br />
"Поїда" очима...<br />
Аж змінився на обличчі.<br />
Й до сусіда Клима:<br />
— Оце, милий друже, знов я<br />
Думаю про себе:<br />
Якщо вже нема здоров'я,<br />
То й думок не треба.
 </div>
