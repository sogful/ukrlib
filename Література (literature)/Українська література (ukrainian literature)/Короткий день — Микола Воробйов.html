<body>
<div class="wrap">
 <div class="page-title">
  <h1>Короткий день</h1>
  <h2>Микола Воробйов</h2>
 </div>
 <div class="prose" id="content">
 Будинки потекли,<br />
дахів попливли шапки,<br />
жовті камінці помостили вікна.<br />
<br />
По камінцях жінка<br />
перейшла струмок,<br />
нагодувала тарілку,<br />
долила криницю —<br />
і по червоних камінцях<br />
в цей бік перейшла струпом.
 </div>
