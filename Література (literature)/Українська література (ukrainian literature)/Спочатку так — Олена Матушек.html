<body>
<div class="wrap">
 <div class="page-title">
  <h1>Спочатку так...</h1>
  <h2>Олена Матушек</h2>
 </div>
 <div class="prose" id="content">
 Спочатку так – на швидкості, вперед,<br />
Крізь дорогі обличчя друзів давніх.<br />
Так легко перекреслюєм старе<br />
Оманливим на краще сподіванням.<br />
<br />
А потім – пригальмовується лет,<br />
І, озирнувшись у роки зболіло,<br />
Відчуємо: так вирвались вперед,<br />
Що по дорозі краще розгубили.
 </div>
