 <div class="page-title">
  <h1>ЧП</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Знову ліфт застряв? Полундра<br />
П'яндига гукає. —<br />
Скажіть жінці — вечеряти<br />
Нехай не чекає!<br />
А в черзі хтось обізвався:<br />
— Вилазь-но, та хутко!<br />
Чи не бачиш — ти забрався<br />
В телефонну будку!
 </div>
