<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дорога шапка</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Сто карбованців за шапку,<br />
Чи не забагато?<br />
Та я п'ять пар черевиків<br />
За сто зможу взяти!<br />
— Черевики ви, звичайно,<br />
Зможете купити,<br />
Та як ви їх на голові<br />
Будете носити?!
 </div>
</div>
