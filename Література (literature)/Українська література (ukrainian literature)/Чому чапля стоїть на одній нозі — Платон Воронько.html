<title>Чому чапля стоїть на одній нозі</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Чому чапля стоїть на одній нозі</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Чапля зшила черевички<br />
І мерщій пішла до річки.<br />
— Чапу-лапу, чапу-лапу,<br />
В мене гарні черевички! —<br />
Поки хвастала, ходила,<br />
Черевичок загубила.<br />
І стоїть вона в лозі<br />
На одній своїй нозі,<br />
Другу вгору підіймає —<br />
Черевичка немає.
 </div>
</div>
