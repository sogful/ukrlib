 <div class="page-title">
  <h1>Зациклене літо</h1>
  <h2>Олег Коцарев</h2>
 </div>
 <div class="prose" id="content">
 Південно-західними звуками зі скрипки<br />
Заслухались в калюжі маслянистій рибки.<br />
<br />
Стрибає вогник дискотеки в темнім небі.<br />
Розчинені дороги проривають греблі.<br />
<br />
Огре, замучений відсутністю ідей,<br />
Ковтає жовтий самогон вже третій день.<br />
<br />
24 травня. 1999 рік.
 </div>
