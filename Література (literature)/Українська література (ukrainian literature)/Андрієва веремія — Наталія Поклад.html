<body>
<div class="wrap">
 <div class="page-title">
  <h1>Андрієва веремія</h1>
  <h2>Наталія Поклад</h2>
 </div>
 <div class="prose" id="content">
 У Андрія — веремія,<br />
все тікає від Андрія:<br />
утекли книжки й рюкзак,<br />
чоботи й кашне...<br />
Доганяє їх козак,<br />
та не здожене.<br />
А чому усе це сталось?<br />
Винен в чім Андрій?<br />
Він кидав, куди попало,<br />
речі й одяг свій.<br />
Ось вони його й провчили —<br />
утікають, що є сили.
 </div>
