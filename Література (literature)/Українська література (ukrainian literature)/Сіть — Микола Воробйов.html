<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сіть</h1>
  <h2>Микола Воробйов</h2>
 </div>
 <div class="prose" id="content">
 Я надто довго був самим собою. Не через якісь<br />
сумніви,<br />
а через те, що все на світі має бути самим собою.<br />
І не помітив, як одна петля заплуталась<br />
і затягла іншу, — вузол в тому місці потемнів,<br />
поважчав і тепер тягне всю сіть мого життя.
 </div>
