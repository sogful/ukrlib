<body>
<div class="wrap">
 <div class="page-title">
  <h1>Павучок</h1>
  <h2>Григорій Фалькович</h2>
 </div>
 <div class="prose" id="content">
 Цей маленький павучок –<br />
Не прихильник балачок:<br />
Він ні з ким не розмовляє,<br />
Він уголос не співає.<br />
Мріє швидше підрости.<br />
Вчиться прясти та плести.<br />
Хай побачить цілий світ<br />
Виставки його робіт.
 </div>
</div>
