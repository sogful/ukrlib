<body>
<div class="wrap">
 <div class="page-title">
  <h1>Усе було — і сум, і самота...</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 Усе було — і сум, і самота,<br />
і горе втрат, і дружба нефальшива.<br />
А ця любов — як нитка золота,<br />
що й чорні дні життя мого прошила.<br />
<br />
Усе було, було й перебуло.<br />
А ця любов — як холодно без неї!<br />
Як поцілунок долі у чоло.<br />
Як вічний стогін пам'яті моєї.
 </div>
