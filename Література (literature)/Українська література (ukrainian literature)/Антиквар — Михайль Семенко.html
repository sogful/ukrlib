<body>
<div class="wrap">
 <div class="page-title">
  <h1>Антиквар</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Студіює обездужено<br />
Мій антиквар.<br />
Чому скрізь бездушно<br />
І все марно?<br /><br />
Знайденостей безладність<br />
І в кінці сором.<br />
Бракує істоти владності —<br />
Синтези кворум.
 </div>
