<div class="wrap">
 <div class="page-title">
  <h1>Снігова гірка</h1>
  <h2>Віктор Терен</h2>
 </div>
 <div class="prose" id="content">
 Гірку ліпимо нову — Білу-білу, снігову.<br />
Та від сонця, від тепла Наша гірка потекла.<br />
Галас на подвір'ячку: — Ми зліпили річечку!
