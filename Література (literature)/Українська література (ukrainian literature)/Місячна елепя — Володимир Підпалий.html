<body>
<div class="wrap">
 <div class="page-title">
  <h1>Місячна елепя</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Ой сіро, сіро,<br />
не сіро &#8211; синьо:<br />
заголубіло<br />
місячне сіно&#8230;<br /><br />
Од того сіна<br />
та й заморока:<br />
ступив по ньому &#8211;<br />
пропав, як голка&#8230;
 </div>
