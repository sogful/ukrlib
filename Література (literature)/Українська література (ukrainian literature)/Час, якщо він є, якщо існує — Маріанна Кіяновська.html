<body>
<div class="wrap">
 <div class="page-title">
  <h1>Час, якщо він є, якщо існує...</h1>
  <h2>Маріанна Кіяновська</h2>
 </div>
 <div class="prose" id="content">
 Час, якщо він є, якщо існує, —<br />
Час як час і час як іже з ним —<br />
Тільки квітка, зірвана усує<br />
Богом безконечно молодим,<br />
Що всенастає. Тече і точить<br />
Точку скелі силою води.<br />
І, як кожне тіло, кровоточить —<br />
Всеніколи. Всененазавжди.
 </div>
</div>
