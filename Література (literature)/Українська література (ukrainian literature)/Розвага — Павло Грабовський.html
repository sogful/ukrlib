 <div class="page-title">
  <h1>Розвага</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Пада сніг, степи вкриває;<br />
Хуга б’є в моє вікно;<br />
Серце в грудях заниває,<br />
Що однісіньке-одно.<br />
<br />
Справді ж так? А мрії ясні;<br />
Шлях до світлої мети;<br />
А чаруючі, прекрасні,<br />
Дорогі мої брати?<br />
<br />
Хай же виє хуга люта,<br />
Жахом серце зворуша:<br />
Сил здобуде думка скута,<br />
Загартується душа!
 </div>
