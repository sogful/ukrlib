 <div class="page-title">
  <h1>Порада</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 Як вам хтось язиком своїм допік —<br />
хапати марно палицю дубову!<br />
Підкиньте ласий кусень гострослову —<br />
дивись, мо', проковтне з ним і язик...
