<title>Любій мамі</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Любій мамі</h1>
  <h2>Василь Грінчак</h2>
 </div>
 <div class="prose" id="content">
 Мамо, настала весна,<br />
Квітне верба запашна,<br />
Річка в долині синіє.<br />
Мамо, настала весна,<br />
Пташечка в полі співає,<br />
Пісня її чарівна<br />
Сонечко вранці стрічає.<br />
Мамо, настала весна,<br />
Квітів нарвали ми з татом<br />
Там, де поляна ясна,—<br />
В тебе ж веснянеє свято!
 </div>
