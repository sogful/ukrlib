<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хуртовина</h1>
  <h2>Анатолій Камінчук</h2>
 </div>
 <div class="prose" id="content">
 Хурто-хурто-хуртовина<br />
Захурделила поля.<br />
Біля двору, біля тину<br />
Сніг замети простеля.<br />
<br />
Ні тобі у ліс поїхать,<br />
Ні тобі у сад піти.<br />
Хуртовина — біла втіха.<br />
Біло вбілює хати!
 </div>
</div>
