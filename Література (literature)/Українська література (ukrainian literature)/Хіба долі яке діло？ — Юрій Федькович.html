<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хіба долі яке діло?</h1>
  <h2>Юрій Федькович</h2>
 </div>
 <div class="prose" id="content">
 Іду з шинку, потикаюсь, —<br />
З свойов долев зустрічаюсь!<br />
Хитаюся — вітаюся,<br />
Про здоров'я питаюся.<br />
А вна мені відповіла:<br />
"Коли хочеш, хлопче, жити, —<br />
Треба дома спати вчитись..."<br />
Хіба долі яке діло?..
 </div>
