<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ти несись, мій спів, з мольбою…</h1>
  <h2>Володимир Александров</h2>
 </div>
 <div class="prose" id="content">
 Ти несись, мій спів, з мольбою,<br />
В небо відлітай.<br />
І на тихую розмову<br />
Вийди, мила в гай.<br />
А в гаю гримить, стихає<br />
Пісня солов'я,<br />
Тож він милу викликає,<br />
Молить, як і я.
 </div>
