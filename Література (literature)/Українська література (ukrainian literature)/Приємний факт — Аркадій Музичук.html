<body>
<div class="wrap">
 <div class="page-title">
  <h1>Приємний факт</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 — Я вам приніс приємний факт! —<br />
Петрусь до діда Власа. —<br />
Мені продовжують контракт<br />
В ліцеї з п'ятим класом.<br />
Дід від почутого завмер:<br />
— Так ти ж у п'ятому тепер?<br />
Угору руку внук підняв:<br />
— Я хочу закріпить знання!
 </div>
