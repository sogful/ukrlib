<div class="wrap">
 <div class="page-title">
  <h1>Запахли яблука у сіні...</h1>
  <h2>Василь Герасим'юк</h2>
 </div>
 <div class="prose" id="content">
 Запахли яблука у сіні –<br />
на молодість, на перший гріх.<br />
Містечка галицькі осінні.<br />
Є щось феллінівське у них.<br /><br />
Когось повік не розшукати.<br />
Губити щось, як божий дар.<br />
На обрії стоять Карпати.<br />
Горять ліси. Гуде базар.
 </div>
