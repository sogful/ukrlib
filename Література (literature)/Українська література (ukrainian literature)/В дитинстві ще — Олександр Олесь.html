<body>
<div class="wrap">
 <div class="page-title">
  <h1>В дитинстві ще</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 В дитинстві ще… давно, давно колись<br />
Я вибіг з хати в день майовий…<br />
Шумів травою степ шовковий,<br />
Сміявся день, пісні лились…<br /><br />
Весь Божий світ сміявсь, радів…<br />
Раділо сонце, ниви, луки…<br />
І я не виніс щастя-муки,<br />
І задзвеніли в серці звуки,<br />
І розітнувсь мій перший спів…
 </div>
