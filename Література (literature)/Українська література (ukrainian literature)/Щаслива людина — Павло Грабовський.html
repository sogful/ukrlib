<body>
<div class="wrap">
 <div class="page-title">
  <h1>Щаслива людина</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Кругом щаслива ти людина:<br />
Не залякаєшся грози,<br />
Бо ще не бачила країна<br />
Від тебе Щирої сльози.<br />
<br />
Не знавсь ти з мукою гіркою,<br />
Не будеш віку ти конать...<br />
Дай тільки бог того покою<br />
Нікому на світі не знать!
 </div>
</div>
