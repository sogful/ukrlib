<div class="wrap">
 <div class="page-title">
  <h1>Папуга</h1>
  <h2>Микола Білокопитов</h2>
 </div>
 <div class="prose" id="content">
 Щодня із клітки гонорово<br />
Кричав:<br />
"Мені свободу слова —<br />
Я б народив такі думки!.."<br />
Його дослухались таки,<br />
Тепер свободу слова має:<br />
Що хоче, те і... повторяє.
 </div>
