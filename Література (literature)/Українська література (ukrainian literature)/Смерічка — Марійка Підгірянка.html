<body>
<div class="wrap">
 <div class="page-title">
  <h1>Смерічка</h1>
  <h2>Марійка Підгірянка</h2>
 </div>
 <div class="prose" id="content">
 Дзвонить, грає срібна ріпка,<br />
А в криштальну воду<br />
Задивилася смерічка<br />
Та й на свою вроду.<br />
<br />
Гей, виросла ж та й висока,<br />
Та нема їй пари:<br />
Пила воду із потоку<br />
І сивої хмари.<br />
Брала пахощі з повітря<br />
У весняну пору;<br />
Вибуяла так на вітрі,<br />
Виросла угору!
 </div>
</div>
