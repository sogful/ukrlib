 <div class="page-title">
  <h1>Справедливо</h1>
  <h2>Петро Ребро</h2>
 </div>
 <div class="prose" id="content">
 — Чи чув? Віднині Козоріз<br />
Не голова сільради.<br />
— Що ж, справедливо! Не доріс<br />
Славко на ці посади.<br /><br />
— Тепер начальником він став<br />
На весь район, чувати.<br />
— Що ж, справедливо! Ярослав —<br />
Хлопчина головатий!
 </div>
