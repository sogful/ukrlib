<div class="wrap">
 <div class="page-title">
  <h1>Ти купила чорнила...</h1>
  <h2>Богдан Жолдак</h2>
 </div>
 <div class="prose" id="content">
 * * *<br />
<br />
Ти купила чорнила<br />
ручку там умочила<br />
не одмиєш водою<br />
ані піною<br />
оту пляму немилу<br />
піском не одітреш од тіла<br />
і тяжко немов на роботу<br />
долубаєш скорботу<br />
неси звідтіля мов зарплату<br />
веселую пісню горлату
 </div>
