<body>
<div class="wrap">
 <div class="page-title">
  <h1>Наша ялинка</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 За вікном летять сніжинки<br />
І сідають на вікні.<br />
Ми танцюєм круг ялинки<br />
І співаємо пісні.<br />
<br />
Ми щасливії малята<br />
Найщасливіших батьків.<br />
Це ж для нас — веселі свята,<br />
Подарунки, сміх і спів.
 </div>
</div>
