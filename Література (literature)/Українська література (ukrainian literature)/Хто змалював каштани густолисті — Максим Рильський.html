<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хто змалював каштани густолисті</h1>
  <h2>Максим Рильський</h2>
 </div>
 <div class="prose" id="content">
 Хто змалював каштани густолисті<br />
На голубому тлі?<br />
Хто вдяг у барви ніжно-променисті<br />
Лоно землі?<br /><br />
Хто дав мені мій дух повноголосий<br />
І радість юних днів?..<br />
І сльози ці, і самоцвітні роси<br />
Хто сотворив?
 </div>
</div>
