<body>
<div class="wrap">
 <div class="page-title">
  <h1>Риба</h1>
  <h2>Петро Ребро</h2>
 </div>
 <div class="prose" id="content">
 Хлопці грали у козла<br />
В теплий ранок літній.<br />
Раптом баба підійшла.<br />
— Хто ж, — пита, —<br />
послідній?<br /><br />
Тут зчинився шум і гам.<br />
Стали всі сміятись:<br />
— Та хіба під силу вам<br />
З молоддю змагатись?<br /><br />
— Що ви, боже сохрани! —<br />
Баба гнівно глипа. —<br />
Я — купити свіжини.<br />
Хтось горлав тут "Риба!"
 </div>
