<body>
<div class="wrap">
 <div class="page-title">
  <h1>Він жив один в своїй пустелі</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Він жив один в своїй пустелі,<br />
В краю думок і мрій своїх,<br />
На мить одну злітав на скелі<br />
І знов для неба кидав їх.<br /><br />
&#8220;Самотній він, — юрба казала, —<br />
Як жаль його…&#8221; і далі йшла,<br />
І в повній щирості бажала<br />
Зробить посмітюху з орла.
 </div>
