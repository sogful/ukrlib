<div class="wrap">
 <div class="page-title">
  <h1>Листок</h1>
  <h2>Юрій Буряківець</h2>
 </div>
 <div class="prose" id="content">
 Світлою вкривсь пеленою<br />
З дуба листок і блищить.<br />
Зрошений в травах сльозою,<br />
Ваш зупиняє привіт.<br />
Хай же в порожньому світі<br />
Ви, ідучі в пізній час<br />
Листям, замислитесь миттю:<br />
Серце десь, слізьми покрите,<br />
Мріє ночами про Вас.<br />
<br />
1947
 </div>
