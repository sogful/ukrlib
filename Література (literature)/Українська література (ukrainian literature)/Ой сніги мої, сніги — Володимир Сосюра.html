<title>Ой сніги мої, сніги</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ой сніги мої, сніги</h1>
  <h2>Володимир Сосюра</h2>
 </div>
 <div class="prose" id="content">
 Ой сніги мої, сніги<br />
срібні та пухнасті,<br />
наче все, що навкруги,<br />
потонуло в щасті.<br /><br />
Діаманти, де не глянь,<br />
скрізь переді мною<br />
розкидає осіянь<br />
щедрою рукою.<br /><br />
Може, й я за дні туги<br />
потону у щасті…<br />
Ой сніги, мої сніги,<br />
срібні та пухнасті!
 </div>
</div>
