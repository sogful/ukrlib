<title>Чіткіші лінії і фарби спокійніші</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Чіткіші лінії і фарби спокійніші</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Чіткіші лінії і фарби спокійніші, –<br />
Благословляється на осінь, на дощі&#8230;<br />
Десь журавлі в похолоділій тиші:<br />
– Мерщій! Мерщій!<br /><br />
Спішать до Індії, озер північних діти,<br />
До кинутих на чужині осад&#8230;<br />
Але ж нудьга яка – вперед летіти,<br />
Щоб повернутися назад!
 </div>
</div>
