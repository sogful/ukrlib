<div class="wrap">
 <div class="page-title">
  <h1>Natura</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Не випадало вибраться до лісу<br />
ції весни&#8230; Не пригадаю вже,<br />
як хворостинки у гніздо сороки<br />
несуть, як на старих пеньках<br />
солдатики свої червоні спини<br />
до сонця підставляють&#8230; Вже забув,<br />
як босому ходити, як в долоні<br />
під деревом ловить зелений дощ&#8230;
 </div>
