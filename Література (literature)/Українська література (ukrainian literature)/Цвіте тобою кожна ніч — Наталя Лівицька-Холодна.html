<body>
<div class="wrap">
 <div class="page-title">
  <h1>Цвіте тобою кожна ніч...</h1>
  <h2>Наталя Лівицька-Холодна</h2>
 </div>
 <div class="prose" id="content">
 Цвіте тобою кожна ніч,<br />
І кожний день тобою повний.<br />
О, як забути ніжність віч,<br />
І палкість рук і шал любовний?<br />
<br />
Але слова згубила я:<br />
Чи ти сказав мені "єдина"?<br />
О, любий, знов твоє ім’я<br />
В моїй душі немов перлина.
 </div>
</div>
