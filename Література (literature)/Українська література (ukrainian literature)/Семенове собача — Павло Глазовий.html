<div class="wrap">
 <div class="page-title">
  <h1>Семенове собача</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 — Мав я, куме, собача —<br />
Ну, на всю округу!<br />
Узнавало по очах<br />
Злодія, хапугу.<br />
Як зустріне десь того,<br />
Хто хапає, краде —<br />
Загарчить, аж зашкварчить,<br />
Тут же і насяде.<br />
— А куди ж те собача<br />
Діли ви, Семене?<br />
— Та продав, бо почало<br />
Кидатись на мене.
