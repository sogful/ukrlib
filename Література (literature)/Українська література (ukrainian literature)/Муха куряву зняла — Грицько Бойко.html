<title>Муха куряву зняла</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Муха куряву зняла</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Сіла муха на машину<br />
Відпочити на хвилину.<br />
<br />
Повезла машина муху,<br />
По дорозі мчить щодуху.<br />
<br />
Муха крильцями тріпоче.<br />
Муха весело дзумкоче.<br />
<br />
Запишалася мала!<br />
— От я куряву зняла!
 </div>
</div>
