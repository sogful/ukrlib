<title>Забарилася зима</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Забарилася зима</h1>
  <h2>Анатолій Камінчук</h2>
 </div>
 <div class="prose" id="content">
 Листя облетіло,<br />
Холодно землі.<br />
На дерева сіли<br />
Птахи-снігурі.<br />
<br />
Хмарки в небі тануть,<br />
Де ж бо ти, зима?<br />
Снігурі літають,<br />
А снігу нема!
 </div>
</div>
