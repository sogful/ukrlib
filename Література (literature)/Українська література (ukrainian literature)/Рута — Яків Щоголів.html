<body>
<div class="wrap">
 <div class="page-title">
  <h1>Рута</h1>
  <h2>Яків Щоголів</h2>
 </div>
 <div class="prose" id="content">
 Я рученьки мила<br />
В холоднім ставочку,<br />
Як сіяла руту<br />
В зеленім садочку.<br />
<br />
На гілках калини<br />
Пташки колихались;<br />
Я пісню співала,<br />
Вони озивались.<br />
<br />
Вони озивались,<br />
Неначе казали:<br />
"І ми тобі руту<br />
Саджать помагали".
 </div>
