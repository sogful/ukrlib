 <div class="page-title">
  <h1>Вір мені, і не мрів...</h1>
  <h2>Анатолій Мойсієнко</h2>
 </div>
 <div class="prose" id="content">
 – Вір мені, і не мрів<br />
Вірами-римами римарів.<br />
В Ірпені* не прів.<br />
У фрак – арфу,<br />
У вал – славу,<br />
У пси – СПУ...<br />
І сопе в епосі.
