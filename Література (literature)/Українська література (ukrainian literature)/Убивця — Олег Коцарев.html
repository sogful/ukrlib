 <div class="page-title">
  <h1>Убивця</h1>
  <h2>Олег Коцарев</h2>
 </div>
 <div class="prose" id="content">
 Помаранчева вбивця Бджола<br />
з кінцем світу та суржиком вибору<br />
в лапках<br />
<br />
прилетіла,<br />
електрогуділа,<br />
ламала<br />
бліді ртутні градусники,<br />
щоби людям не було так<br />
жарко.<br />
<br />
17 липня. 1999 рік.
 </div>
