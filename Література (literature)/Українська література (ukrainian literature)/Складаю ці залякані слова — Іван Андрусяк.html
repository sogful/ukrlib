<div class="wrap">
 <div class="page-title">
  <h1>Складаю ці залякані слова..</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 складаю ці залякані слова<br />
немов дитина кубики складає<br />
задарма степ тікатиме з сенаю<br />
його чекає та сама жорства<br /><br />
однакі мари у цієї мли<br />
зійшло вікно і пельку мохом вкрило<br />
а ти мені хоч дерева налий<br />
лише такого щоб не говорило
 </div>
