<div class="wrap">
 <div class="page-title">
  <h1>Калино-малино, чом листячко рониш</h1>
  <h2>Богдан Лепкий</h2>
 </div>
 <div class="prose" id="content">
 Калино-малино, чом листячко рониш<br />
І мечеш на фалю?<br />
Дівчино-рибчино, чому мене гониш<br />
Від себе без жалю?<br /><br />
Зелені листочки поплинуть з водою<br />
Й не вернуть ніколи.<br />
Я молодість твою заберу з собою,<br />
Моя ти недоле!
 </div>
