<body>
<div class="wrap">
 <div class="page-title">
  <h1>Як довго ждали ми своєї волі слова...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Як довго ждали ми своєї волі слова,<br />
І ось воно співа, бринить.<br />
Бринить, співає наша мова,<br />
Чарує, тішить і п'янить.<br />
<br />
Як довго ждали ми... Уклін чолом народу,<br />
Що рідну мову нам зберіг,<br />
Зберіг в таку страшну негоду,<br />
Коли він сам стоять не міг...
 </div>
</div>
