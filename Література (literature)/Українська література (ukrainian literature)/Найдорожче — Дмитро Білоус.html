<div class="wrap">
 <div class="page-title">
  <h1>Найдорожче</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Синів і дочок багатьох народів<br />
я зустрічав, які перетинали<br />
гірські й морські кордони і на подив<br />
багато бачили, багато знали.<br /><br />
Я їх питав із щирою душею:<br />
— Яку ви любите найбільше мову? —<br />
І всі відповідали: — Ту, що нею<br />
співала рідна мати колискову.
 </div>
