<body>
<div class="wrap">
 <div class="page-title">
  <h1>Смерічка</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 Стоїть смерічка на горі<br />
У сонці, наче в янтарі,<br />
І ми до неї в гості йдем —<br />
Вона росте, і ми ростем.<br />
<br />
Стоїть смерічка на горі<br />
В снігу, неначе в кептарі.<br />
І ми до неї в гості йдем —<br />
Вона росте, і ми ростем.
 </div>
