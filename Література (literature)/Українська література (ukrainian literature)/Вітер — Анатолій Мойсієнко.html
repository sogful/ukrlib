<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вітер</h1>
  <h2>Анатолій Мойсієнко</h2>
 </div>
 <div class="prose" id="content">
 Ходить вітер навкруги,<br />
Гонить хвилю з берегів,<br />
Задира стогам шапки<br />
Набакир.<br />
З гір несе льодовики...<br />
Ох, який він, ох, який!<br />
Лиш під вечір вгамувавсь.<br />
...На погоду кіт вмивавсь.<br />
Стало скрізь на лузі<br />
Тихо, як у вусі.
 </div>
