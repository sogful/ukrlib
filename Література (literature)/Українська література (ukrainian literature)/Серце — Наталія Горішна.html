<div class="wrap">
 <div class="page-title">
  <h1>Серце</h1>
  <h2>Наталія Горішна</h2>
 </div>
 <div class="prose" id="content">
 <p>Вирвали серце й спитали: "Кому?.."</p>
<p>
Хто западе на скривавлене серце?</p>
<p>
Кинули серце в жадливу юрму.</p>
<p>
Он і ловці, а воно не дається.</p>
<p>
Марні потуги: хвала і хула,</p>
<p>
Й мертве – свідоме, кому присягало,</p>
<p>
Як тріпотіло від маху крила…</p>
<p>
Вирвали серце моє і спитали…</p>
