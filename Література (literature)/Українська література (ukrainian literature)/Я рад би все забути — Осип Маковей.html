<div class="wrap">
 <div class="page-title">
  <h1>Я рад би все забути...</h1>
  <h2>Осип Маковей</h2>
 </div>
 <div class="prose" id="content">
 Я рад би все забути,<br />
що трапилось мені,<br />
і знову хлопцем бути<br />
у рідній стороні.<br />
<br />
Нехай би жив і бідно,<br />
та знав уже свій шлях —<br />
<br />
і вік провів свобідно<br />
при плузі на полях.<br />
<br />
А так я загубився<br />
і плакати дарма:<br />
від роду вже відбився,<br />
і вороття нема.<br />
<br />
1900
