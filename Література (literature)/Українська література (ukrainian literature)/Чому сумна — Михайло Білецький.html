<div class="wrap">
 <div class="page-title">
  <h1>Чому сумна</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Катря, подруга, у загсі<br />
Пита наречену:<br />
— Чого така засмучена<br />
Сьогодні, Олено?<br />
— Як же мені не журиться,<br />
Ти лиш подивися —<br />
У жениха мого Гриця<br />
Вся голова лиса!<br />
— Ти що ж раніш не бачила,<br />
Що зараз "не в дусі"?<br />
— А він, коли знайомились,<br />
Був у капелюсі!
