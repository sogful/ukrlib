<div class="wrap">
 <div class="page-title">
  <h1>Не зразу</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 — Ну й роззява, ну й роззява!<br />
Говорив про кума Слава:<br />
Тільки спродав кабанця,<br />
Як украли гаманця.<br />
Кум до Слави:<br />
— А про себе?<br />
Того ж дня украли й в тебе?<br />
— Е, не зразу, друже милий,<br />
А з півдня попоходили.
