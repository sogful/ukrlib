<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ви довго боком, оком Бог водив...</h1>
  <h2>Анатолій Мойсієнко</h2>
 </div>
 <div class="prose" id="content">
 Ви довго боком, оком Бог водив.<br />
Око<br />
В<br />
Око.<br />
Високо Гюго косив...<br />
І Сиваша висі<br />
Он Бог обно-<br />
вив,<br />
Бо ж об-<br />
вив<br />
У мак... А ви душу — дивакам...
 </div>
</div>
