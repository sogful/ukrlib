<div class="wrap">
 <div class="page-title">
  <h1>Над зелен-рікою, на деревці скраю</h1>
  <h2>Іван Малкович</h2>
 </div>
 <div class="prose" id="content">
 Над зелен-рікою, на деревці скраю,<br />
на третім листочку —<br />
там коник пасеться: з черешні сідельце<br />
і чала сорочка;<br />
там коник пасеться — листок не прорветься<br />
від легкого ходу:<br />
води не куштує — лиш дує і дує,<br />
лиш дує на воду&#8230;
 </div>
