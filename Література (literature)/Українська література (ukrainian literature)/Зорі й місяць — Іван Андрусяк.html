<title>Зорі й місяць</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зорі й місяць</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 Усі сови<br />
попросиналися,<br />
із небесних зворів<br />
очима світяться,<br />
<br />
лиш одна сова<br />
зо звору висовилася,<br />
над сонним ставом<br />
пір'я чистить.
 </div>
</div>
