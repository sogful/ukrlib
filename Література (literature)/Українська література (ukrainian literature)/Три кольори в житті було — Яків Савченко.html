<body>
<div class="wrap">
 <div class="page-title">
  <h1>Три кольори в житті було...</h1>
  <h2>Яків Савченко</h2>
 </div>
 <div class="prose" id="content">
 Три кольори в житті було,<br />
В трьох кольорах уся земля.<br />
В двох кольорах горіло Зло,<br />
А третій мій. А в третім — я.<br />
<br />
І третій — чорний, як агат.<br />
Я вмер уже — і ним свічусь.<br />
І третій — блиск страшних Свічад,<br />
Що мертвий я тепер дивлюсь.
 </div>
</div>
