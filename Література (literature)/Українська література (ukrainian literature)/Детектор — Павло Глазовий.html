<div class="wrap">
 <div class="page-title">
  <h1>Детектор</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Попросив сусід сусіда:<br />
— А скажи мені,<br />
Чи ти бачив коли-небудь<br />
Детектор брехні?<br />
А той каже: — Я щоденно<br />
Бачу наяву,<br />
Бо на ньому оженився<br />
Й сьомий рік живу.<br />
Ні спокою, ні спочинку,<br />
Ні життя нема:<br />
Не устиг розкрити рота —<br />
На брехні пійма.
 </div>
