 <div class="page-title">
  <h1>Порушниця</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Старшина бабусю лає:<br />
— Сорому не маєте.<br />
Ви чого ото з трамваю<br />
На ходу стрибаєте?<br /><br />
А бабуся з переляку<br />
Жалібно захлипала:<br />
— Та хіба ж то я стрибала?<br />
Я, синочку, випала...
