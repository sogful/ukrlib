<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вітер</h1>
  <h2>Антін Павлюк</h2>
 </div>
 <div class="prose" id="content">
 Біжать берези, верби,<br />
Жита, корчі та трави…<br />
Ох, вітер, вітер буйний,<br />
Життя моє ласкаве!<br />
<br />
Біжить ось небом хмарка,<br />
Течуть, течуть глибини…<br />
І серце, очи смокче<br />
Далекий обрій синій…<br />
<br />
Ох синій, синій – нині<br />
В ранковії заграви<br />
Зростав у безмір біль останній,<br />
Життя моє ласкаве.
 </div>
</div>
