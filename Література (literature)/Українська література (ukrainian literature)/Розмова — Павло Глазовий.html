 <div class="page-title">
  <h1>Розмова</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 — Жінку мав я, друже,<br />
Ідеал краси!<br />
Талія тоненька,<br />
Як ото в оси.<br />
А тепер змінилась,<br />
А тепер не та.<br />
Зіпсувала к бісу<br />
Зайва повнота.<br />
Другий головою<br />
Сивою хита:<br />
— Правду ти говориш,<br />
Котяться літа.<br />
Тільки в мене жінка<br />
Й досі, як оса:<br />
Наче й не тоненька,<br />
А проте куса...
 </div>
