<div class="wrap">
 <div class="page-title">
  <h1>Твердий принцип</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 Пер щаблями кар'єри все вище,<br />
не міняючи гасла свого:<br />
"Підсідай<br />
до начальства поближче,<br />
щоб підсидіти<br />
врешті кого!"
 </div>
