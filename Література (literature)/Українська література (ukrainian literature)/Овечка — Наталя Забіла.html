<div class="wrap">
 <div class="page-title">
  <h1>Овечка</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 Овечка в дівчинки була<br />
найкраща на весь світ!<br />
І де б та дівчинка не йшла,<br />
овечка бігла вслід.
