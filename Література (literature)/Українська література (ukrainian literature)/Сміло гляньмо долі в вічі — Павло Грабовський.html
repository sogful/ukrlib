<div class="wrap">
 <div class="page-title">
  <h1>Сміло гляньмо долі в вічі...</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Сміло гляньмо долі в вічі;<br />
Що дурити себе дальш?<br />
Не буває життя двічі,<br />
Не загоїть серця фальш.<br />
<br />
Тут потрібні справжні ліки,<br />
Їх свідомість нам дає:<br />
Власні втіхи не навіки,<br />
Рух ідей немручим є!
 </div>
