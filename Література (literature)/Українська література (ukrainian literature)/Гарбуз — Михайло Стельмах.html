<body>
<div class="wrap">
 <div class="page-title">
  <h1>Гарбуз</h1>
  <h2>Михайло Стельмах</h2>
 </div>
 <div class="prose" id="content">
 Трипудовий гарбуз<br />
На городі<br />
Загруз.<br />
А на цей гарбуз<br />
Сів з дітьми<br />
Чорногуз.<br />
Каже він до діток:<br />
— Сіли ми<br />
На горбок.—<br />
І не зна чорногуз,<br />
Що він сів<br />
На гарбуз.
 </div>
