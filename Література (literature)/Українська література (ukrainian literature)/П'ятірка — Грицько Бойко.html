<div class="wrap">
 <div class="page-title">
  <h1>П'ятірка</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 — Сьогодні ми диктант писали!<br />
— То що ти хочеш цим сказать?<br />
— П'ятірок в нас тепер чимало!<br />
— Напевно, вже і в тебе п'ять?<br />
— Та ні, у мене лиш четвірка…<br />
— Чому ж не п'ять, скажи, хлопча?<br />
І тут малий зітхає гірко:<br />
— П'ятірок всім не вистача…
 </div>
