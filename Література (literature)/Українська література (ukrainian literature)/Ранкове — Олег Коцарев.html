<div class="wrap">
 <div class="page-title">
  <h1>Ранкове</h1>
  <h2>Олег Коцарев</h2>
 </div>
 <div class="prose" id="content">
 І<br />
Знову<br />
Звикає<br />
Поступово<br />
Повітря – тремтить<br />
Над упевненим сірим<br />
Конструктором – Держпромом<br />
Озивається ранішньо<br />
Тупо-щасливою радістю<br />
Із опуклих очей машин<br />
Їхніх червоних дверей<br />
Ззаду встає сонце<br />
Обличчя воно<br />
Всім лоскоче<br />
Не сумний<br />
Я ще!<br />
Нє!<br />
<br />
20 грудня. 1998 рік.
 </div>
