<div class="wrap">
 <div class="page-title">
  <h1>Чи то ти, чи то я...</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 who are you, little i…<br /><br />
чи то ти, чи то я<br /><br />
(літ чи п'ять чи то шість)<br />
озираєш з вікна<br /><br />
сонця схилену віть<br /><br />
золотий листопад<br /><br />
(відчуваєш: цей день<br />
стане ніччю от-от<br /><br />
хай же диво гряде)
 </div>
</div>
