<body>
<div class="wrap">
 <div class="page-title">
  <h1>Що кому...</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 У музеї на стіні<br />
Велика картина:<br />
Іван Грозний — цар<br />
На ній<br />
Убиває сина.<br />
Екскурсовод розказав<br />
Про все те, а далі:<br />
— Може, хто бажає знати<br />
Ще які деталі? —<br />
Жінка з натовпу до нього:<br />
— Я знати бажаю!<br />
Чим в музеї труть підлогу,<br />
Що вона так сяє?!
 </div>
