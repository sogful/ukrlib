<div class="wrap">
 <div class="page-title">
  <h1>То вберу в троянди, то у сажу</h1>
  <h2>Микола Руденко</h2>
 </div>
 <div class="prose" id="content">
 То вберу в троянди, то у сажу.<br />
Світло чи пітьма тобі за тло.<br />
А коли ж, кохана, врівноважу<br />
Я в тобі людське добро і зло?<br /><br />
І коли нарешті зникне з хати<br />
Докір, котрий смуток залиша?..<br />
Мабуть, лиш тоді, коли кохати<br />
Вже не вмітиме моя душа.
 </div>
