<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ти пробач...</h1>
  <h2>Василь Еллан-Блакитний</h2>
 </div>
 <div class="prose" id="content">
 Ти пробач мені, любов, маленька дівчинко, —<br />
Я з тобою і нерівний, і розкиданий.<br />
Се тому, що я боям довіку відданий,<br />
Се тому, що я шаленим бурям рідний,<br />
Що в тебе таке нервове, ніжне личенько...
 </div>
</div>
