<body>
<div class="wrap">
 <div class="page-title">
  <h1>На прем'єрі</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Вже в роздягальні всі...<br />
А він в долоні б'є —<br />
Над долею героїв гірко плаче...<br />
Коли б то автор міг усе те бачить!<br />
Голубчику,<br />
То ж автор сам і є!
 </div>
