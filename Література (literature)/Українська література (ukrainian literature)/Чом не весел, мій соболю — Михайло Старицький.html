<body>
<div class="wrap">
 <div class="page-title">
  <h1>Чом не весел, мій соболю</h1>
  <h2>Михайло Старицький</h2>
 </div>
 <div class="prose" id="content">
 Чом не весел, мій соболю,<br />
Чи й мені журби не знять?<br />
Хоч у шахи я з тобою<br />
Буду сміливо гулять?<br /><br />
"Ох, то туга незбавима, –<br />
Я боровся кільки крат:<br />
Вже давно мені очима<br />
Ти дала і шах, і мат!"
 </div>
</div>
