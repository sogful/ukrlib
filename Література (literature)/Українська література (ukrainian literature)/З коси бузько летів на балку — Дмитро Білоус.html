<div class="wrap">
 <div class="page-title">
  <h1>З коси бузько летів на балку</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Каламбур<br /><br />
З коси бузько летів на балку<br />
(косар косу там брав на брус),<br />
і сів бузько в дворі на балку,<br />
на довгий дерев'яний брус.
 </div>
