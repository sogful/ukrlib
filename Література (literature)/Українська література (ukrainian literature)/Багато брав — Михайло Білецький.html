<div class="wrap">
 <div class="page-title">
  <h1>Багато брав</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 В міліції хтось несуна спитав:<br />
— Коли ти ніс те на своїм горбі,<br />
Там же на прохідній вахтер стояв,<br />
Невже ні слова не сказав тобі?<br />
— Як же, сказав...<br />
— А що?<br />
— А те, що треба:<br />
"Багато, — каже, — ти береш на себе!"
