<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вертольотчики</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 Над водою вертольотики<br />
все літають взад-вперед,<br />
і від їх легкого дотику<br />
не схитнеться очерет.<br />
Що за дивні вертольотики —<br />
не гуркочуть, не гудуть<br />
і самі себе, без льотчиків,<br />
понад озером ведуть?!
 </div>
