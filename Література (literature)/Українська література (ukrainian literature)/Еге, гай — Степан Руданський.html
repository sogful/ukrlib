<title>Еге, гай</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Еге, гай</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 Йде видючий і сліпий,<br />
Та й каже видючий:<br />
"Ото, брате, синій гай!<br />
Ото ліс дрімучий!"<br /><br />
"Еге! Еге! — каже той.—<br />
Як ти собі важиш!"<br />
"А ти ж, брате, бачиш що?"<br />
"Та ж ти, брате, кажеш!"
 </div>
