<div class="wrap">
 <div class="page-title">
  <h1>До Н. К. С. ("Зранку в холодну могилу...")</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Зранку в холодну могилу<br />
Ти жертвою часу лягла;<br />
Без жалю загублено силу...<br />
А в мене пак гадка жила:<br />
<br />
Що повівом навіть не скине<br />
На тебе пануюче зло,<br />
Що смерть над тобою залине<br />
Отрутою повне жало!
 </div>
