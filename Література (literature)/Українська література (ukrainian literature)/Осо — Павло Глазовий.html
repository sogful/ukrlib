 <div class="page-title">
  <h1>Осо</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 — Чого плачеш? —<br />
Внука Савку<br />
Пита дід Бавило.<br />
— Мене, діду, у долоньку<br />
Осо укусило.<br />
— Яке осо?<br />
— Таке довге, —<br />
Показує Савка. —<br />
Трошки жовте,<br />
Трошки чорне,<br />
А в попі — булавка.
