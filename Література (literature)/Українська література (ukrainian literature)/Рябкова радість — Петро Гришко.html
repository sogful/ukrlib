<div class="wrap">
 <div class="page-title">
  <h1>Рябкова радість</h1>
  <h2>Петро Гришко</h2>
 </div>
 <div class="prose" id="content">
 Рябко Свині гукав з порога:<br />
— Вставай, кирпата! Новина, небого.<br />
До нас у двір приходить свято —<br />
Тут ратиць і кісток лежатиме багато.<br />
Гризи досита, їж та їж!..<br />
Господар вже рихтує ніж...<br />
Поглянь, іде вже до хліва!..<br />
<br />
* * *<br />
<br />
Не всім Рябкова радість втіхою бува.
 </div>
