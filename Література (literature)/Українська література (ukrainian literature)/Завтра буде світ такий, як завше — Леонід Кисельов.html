<div class="wrap">
 <div class="page-title">
  <h1>Завтра буде світ такий, як завше...</h1>
  <h2>Леонід Кисельов</h2>
 </div>
 <div class="prose" id="content">
 Завтра буде світ такий, як завше, —<br />
Білий, жовтий, трохи вороний.<br />
І зависне небо, наче зашморг,<br />
Як і має бути восени.<br /><br />
Сон, мов смерть, настигне на світанку,<br />
І незваний день в останню мить<br />
Забере тебе, як полонянку,<br />
Як у пісні — конями умчить
 </div>
