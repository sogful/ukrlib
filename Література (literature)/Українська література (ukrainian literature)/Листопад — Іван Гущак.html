<body>
<div class="wrap">
 <div class="page-title">
  <h1>Листопад</h1>
  <h2>Іван Гущак</h2>
 </div>
 <div class="prose" id="content">
 У шкільний осінній сад<br />
завітав листопад.<br />
Ще врожаю не зібрали —<br />
а він вітрові рад!<br />
<br />
В яблуневому саду<br />
засміявся і подув.<br />
Позривав з дерев листочки,<br />
жваво грає на дуду.
 </div>
</div>
