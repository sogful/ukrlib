<div class="wrap">
 <div class="page-title">
  <h1>Березень</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Зірвався сніг — до ночі не стихає.<br />
Невже Зима надумала вернутись?<br />
Шпаківню у саду вже так гойдає,<br />
що їй завиграшки й перевернутись.<br />
<br />
Шпаки негоду переждуть на вишні,<br />
гукаючи мені через дорогу:<br />
— Не бійся хмар — вони уже торішні!<br />
— Не бійся снігу — він же не надовго!
 </div>
