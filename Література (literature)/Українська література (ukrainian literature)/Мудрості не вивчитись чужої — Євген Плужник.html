<div class="wrap">
 <div class="page-title">
  <h1>Мудрості не вивчитись чужої</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Мудрості не вивчитись чужої, —<br />
Треба помилятися самим.<br />
&#8230;Скільки слів лишилося від Трої,<br />
Що забрав собі на оди Рим?<br /><br />
А проте вчитайся в кожну кому,—<br />
Всякий промовлятиме рядок:<br />
Краще помилятися самому,<br />
Ніж чужих навчитись помилок!
 </div>
