<div class="wrap">
 <div class="page-title">
  <h1>Є вихід!</h1>
  <h2>Петро Ребро</h2>
 </div>
 <div class="prose" id="content">
 — Допився я! — поскаржився Івану<br />
Співпляшник Стьопа. — Знать, мені каюк:<br />
Коли прийду до хати з ресторану —<br />
Кругом мені ввижається... віслюк!<br /><br />
— Та ти не дрейф! — одказує Степану<br />
Його товариш. — Ти затям одно:<br />
Як тільки повернувся з ресторану —<br />
Відразу кинь на дзеркало рядно!
 </div>
