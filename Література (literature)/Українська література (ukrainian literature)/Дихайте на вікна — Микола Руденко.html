<title>Дихайте на вікна</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дихайте на вікна</h1>
  <h2>Микола Руденко</h2>
 </div>
 <div class="prose" id="content">
 Дихайте на вікна,<br />
Сковані морозом,<br />
Бо загине вік наш<br />
І зав'яне розум —<br />
Дихайте на вікна,<br />
Сковані морозом.<br /><br />
Тільки сила духу<br />
Явить сонце в хату,<br />
Прожене наругу<br />
Й темряву пихату —<br />
Тільки сила духу<br />
Явить сонце в хату.
 </div>
</div>
