<div class="wrap">
 <div class="page-title">
  <h1>Куди пішов олівець</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Куди пішов олівець?<br />
До циркуля в гості:<br />
Показати букву А<br />
Маленькому Кості.<br />
Подивись, прошу тебе:<br />
Ключ в траві — як буква Бе!<br />
Тут веселик походив,<br />
Ключ від азбуки згубив.
 </div>
