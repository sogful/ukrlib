<div class="wrap">
 <div class="page-title">
  <h1>Школа</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 Наче вулик, наша школа,<br />
Вся вона гуде, як рій.<br />
І здається, що довкола<br />
Розквітають квіти мрій.<br />
<br />
Бігають, сміються діти,<br />
Та — лиш дзвоник задзвенить —<br />
Стане тихо, ніби в квіти<br />
Поховались бджоли вмить.
 </div>
