<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вишиванка</h1>
  <h2>Вадим Крищенко</h2>
 </div>
 <div class="prose" id="content">
 Мама вишила мені<br />
Квітами сорочку.<br />
Квіти гарні, весняні:<br />
— На, вдягай, синочку!<br />
В нитці — сонце золоте,<br />
Пелюстки — багряні.<br />
Ласка мамина цвіте<br />
В тому вишиванні.<br />
Вишиваночку візьму,<br />
Швидко одягнуся,<br />
Підійду і обніму<br />
Я свою матусю.
 </div>
