<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зимове шкло</h1>
  <h2>Максим Рильський</h2>
 </div>
 <div class="prose" id="content">
 Так сумно, так без краю сумно.<br />
Усе скінчилось. (Чи й було?)<br />
Дивлюсь недвижно і бездумно<br />
Крізь зимове морозне шкло.<br /><br />
В цю ніч ясну все зрозуміле,<br />
І далі нікуди іти:<br />
Життя і радісне, і миле, —<br />
Та не для тих, хто без мети…
 </div>
