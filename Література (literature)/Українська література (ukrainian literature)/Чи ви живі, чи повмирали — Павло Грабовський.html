<body>
<div class="wrap">
 <div class="page-title">
  <h1>Чи ви живі, чи повмирали...</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Чи ви живі, чи повмирали;<br />
Чи я діждусь коли, чи ні,<br />
Щоб клаптик часом переслали<br />
Паперу братнього мені?<br />
<br />
Прохав, молив... Що більше вдію?<br />
Хоча б хто на сміх написав...<br />
То все б кохав дурну надію,<br />
Все б долі привид не згасав.
 </div>
</div>
