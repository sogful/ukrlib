<body>
<div class="wrap">
 <div class="page-title">
  <h1>До дитини</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Тішся вволю; смійся, доки<br />
Озаряє сміх уста,<br />
Та безхмарні літа-роки<br />
Не накладують хреста;<br />
<br />
Доки сумом та журбою<br />
Ще не здибало тебе;<br />
Доки небо над тобою<br />
І ясне, і голубе.<br />
<br />
Так, дитино моя люба,<br />
Погуляй — твоя пора,<br />
Бо вже, може, лиха згуба<br />
І по тебе десь чухра.
 </div>
