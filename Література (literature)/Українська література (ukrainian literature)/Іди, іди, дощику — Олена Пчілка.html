<title>Іди, іди, дощику</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Іди, іди, дощику</h1>
  <h2>Олена Пчілка</h2>
 </div>
 <div class="prose" id="content">
 Іди, іди, дощику,<br />
Зварю тобі борщику,<br />
В полив'янім горщику!<br />
Іди, іди, дощику,—<br />
Цебром, відром, дійницею<br />
Над нашою пашницею!
 </div>
</div>
