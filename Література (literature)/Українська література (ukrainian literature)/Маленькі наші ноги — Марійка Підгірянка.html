<body>
<div class="wrap">
 <div class="page-title">
  <h1>Маленькі наші ноги</h1>
  <h2>Марійка Підгірянка</h2>
 </div>
 <div class="prose" id="content">
 Маленькі наші ноги<br />
Та знають свою путь.<br />
На службу Україні,<br />
Як виростуть підуть.<br />
<br />
Маленькі наші руки,<br />
Та кріпнуть і ростуть.<br />
На службу Україні<br />
Всю працю віддадуть.<br />
<br />
Дитячі в нас сердечка<br />
Та щире в них чуття.<br />
Любити Україну<br />
Будуть ціле життя.
 </div>
</div>
