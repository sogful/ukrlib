<body>
<div class="wrap">
 <div class="page-title">
  <h1>На два подвір'я</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 — Ти чого собачу будку<br />
Тягнеш аж на хату? —<br />
Спантеличена дружина<br />
Питає у Гната.<br />
— Так оце ж сусід поїхав<br />
До тещі, в Підгір'я,<br />
І просив, щоб пес наш гавкав<br />
Й на його подвір'я.
 </div>
