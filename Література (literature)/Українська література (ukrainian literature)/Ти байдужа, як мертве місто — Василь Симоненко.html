<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ти байдужа, як мертве місто</h1>
  <h2>Василь Симоненко</h2>
 </div>
 <div class="prose" id="content">
 Ти байдужа, як мертве місто,<br />
І далека, як зір вогні,<br />
До безумства ясна і чиста<br />
Пригадалася знов мені.<br /><br />
Де знайти фантастичну поляну,<br />
Щоб у колі сестер твоїх<br />
Впасти в руки твої, Світлано,<br />
І померти від лоскоту їх?
 </div>
