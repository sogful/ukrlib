<body>
<div class="wrap">
 <div class="page-title">
  <h1>Єсть у мене одна</h1>
  <h2>Леся Українка</h2>
 </div>
 <div class="prose" id="content">
 Єсть у мене одна<br />
Розпачлива, сумна,<br />
Одинокая зірка ясная;<br />
Сеї ж ночі дарма<br />
її кличу, – нема!<br />
Я стою у журбі самотная.<br />
І шукаю вгорі<br />
Я тієї зорі:<br />
"Ох, зійди, моя зірко лагідна!"<br />
Але зорі мені<br />
Шлють проміння сумні:<br />
"Не шукай її, дівчино бідна!"
 </div>
