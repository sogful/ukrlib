<div class="wrap">
 <div class="page-title">
  <h1>Пісня трампа</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Закапало з брудного неба<br />
Промок картуз —<br />
Ах промок картуз без потреби<br />
А на спині туз.<br />
<br />
А на спині — колишня дірка,<br />
Свердлить нещадно протяг.<br />
Колись же виблисне і моя зірка<br />
На тлі небеснім злотнім!<br />
<br />
1&ndash;I&ndash;920. Київ.
 </div>
