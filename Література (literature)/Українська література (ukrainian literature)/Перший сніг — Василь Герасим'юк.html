<body>
<div class="wrap">
 <div class="page-title">
  <h1>Перший сніг</h1>
  <h2>Василь Герасим'юк</h2>
 </div>
 <div class="prose" id="content">
 Притишив кров. Притишив крок.<br />
І вищі стали гори.<br />
Йде перший сніг,<br />
немов пророк,<br />
в якого серце хворе.<br />
Як важко дихати йому!<br />
Як свіжо доокола!<br />
Ступає у порожню тьму<br />
нога різьблена, гола.
 </div>
