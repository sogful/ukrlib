<div class="wrap">
 <div class="page-title">
  <h1>Україні</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Кожен пише себе, як уміє:<br />
"Я – оргбн... Я – усйсвіт... Я..."<br />
Кожен тішить себе, як уміє,<br />
Україно моя...<br />
<br />
І мені б за столом письмовим<br />
знаків оклику стрій вести,<br />
так забаглось у ріднім слові<br />
зрозуміть, яка справді ти...<br />
<br />
1966
 </div>
