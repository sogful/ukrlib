<div class="wrap">
 <div class="page-title">
  <h1>Він після речення, цитати</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Загадка<br /><br />
Він після речення, цитати<br />
вмостився, схожий на гачок.<br />
Всіх нас примушує питати,<br />
а сам ні пари з уст — мовчок.<br /><br />
Що це таке?<br /><br />
(Знак запитання)
 </div>
</div>
