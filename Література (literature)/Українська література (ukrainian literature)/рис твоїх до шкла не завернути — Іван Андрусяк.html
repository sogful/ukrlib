<body>
<div class="wrap">
 <div class="page-title">
  <h1>рис твоїх до шкла не завернути...</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 рис твоїх до шкла не завернути<br /><br />
це відбиток а життя тонке<br /><br />
у скутарі крику гони скель<br /><br />
чути а не видко – і не чути<br /><br />
<br />
міниться парує (шелест шкла)<br /><br />
трав'яніє тихий подих шкіри<br /><br />
я збирався жити кличу звіра<br /><br />
шелестить – а то земля прийшла
 </div>
