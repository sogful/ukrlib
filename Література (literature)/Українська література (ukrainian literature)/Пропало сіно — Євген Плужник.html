<body>
<div class="wrap">
 <div class="page-title">
  <h1>Пропало сіно</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Пропало сіно! Тільки покосили,<br />
А дощ його й прибрати не дає!<br />
Вже третій день ллє з усієї сили,<br />
А особливо на моє!<br /><br />
В долинці саме. Їжте, коненята!<br />
Журюсь, лежу, й книжок нових нема&#8230;<br />
А за вікном темно-зелена м'ята<br />
З-під стріхи краплі перейма.
 </div>
