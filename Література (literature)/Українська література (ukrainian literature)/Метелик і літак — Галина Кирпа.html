<div class="wrap">
 <div class="page-title">
  <h1>Метелик і літак</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 На конюшині задрімав метелик.<br />
А поруч прилетів і сів літак:<br />
— Чого це ти то синій, то рожевий?<br />
Ти не такий, як я!<br />
У тебе все не так!
