<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дід і колода</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Я життя вже доживаю,<br />
А й досі, нівроку,<br />
Таку ж силу в руках маю,<br />
Як в юнацькі роки!<br />
Бачиш он оту колоду?<br />
То я її, сину,<br />
В двадцять літ не міг підняти...<br />
І зараз не здвину!
 </div>
