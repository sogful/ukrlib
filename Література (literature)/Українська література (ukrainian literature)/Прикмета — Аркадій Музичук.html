<body>
<div class="wrap">
 <div class="page-title">
  <h1>Прикмета</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 — Васю, збігай до контори, —<br />
Просить сина мати. —<br />
Запитай, чи буде скоро<br />
В татуся зарплата.<br />
— Нащо бігать до контори, —<br />
Знаю сам — сьогодні! —<br />
Тато з бочки помідори<br />
Брав напередодні.
 </div>
