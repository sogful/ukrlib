<div class="wrap">
 <div class="page-title">
  <h1>Коли у мене на могилі...</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Коли у мене на могилі<br />
Чудесний виросте будяк,<br />
Хотів би я, щоб друзі милі<br />
Про мене згадували так:<br />
<br />
— Ти пам'ятаєш Глазового?<br />
Невже забув? Це ж той Павло,<br />
Який життя прожив для того,<br />
Щоб людям весело було.
 </div>
