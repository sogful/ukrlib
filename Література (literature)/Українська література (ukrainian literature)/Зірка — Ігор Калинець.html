 <div class="page-title">
  <h1>Зірка</h1>
  <h2>Ігор Калинець</h2>
 </div>
 <div class="prose" id="content">
 Заслухалась зірка<br />
цвіркуна,<br />
вихилилась через віконце —<br />
хотіла ружечку кинути<br />
та й сама впала.<br />
Підібрав її лопух,<br />
думав, що світлячок.<br />
Сидить зірка на листкові,<br />
до неба високо,<br />
до землі чужинно.<br />
Ще й очі<br />
як у Дзвінки.<br />
— Як ти називаєшся?<br />
А вона:<br />
— А я цвіркуна слухала.
 </div>
