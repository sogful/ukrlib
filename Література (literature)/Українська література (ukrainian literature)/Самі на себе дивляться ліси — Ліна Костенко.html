<body>
<div class="wrap">
 <div class="page-title">
  <h1>Самі на себе дивляться ліси...</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 Самі на себе дивляться ліси,<br />
розгублені од власної краси.<br />
<br />
Немов пройшов незримий Левітан —<br />
то там торкнув їх пензликом, то там.<br />
<br />
Осінній вітер одгуляв, затих.<br />
Стоїть берізонька — як в іскрах золотих.
 </div>
