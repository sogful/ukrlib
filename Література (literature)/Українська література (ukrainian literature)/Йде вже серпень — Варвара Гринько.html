<title>Йде вже серпень</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Йде вже серпень</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Серед літа місяць липень<br />
Заквітчав медову липу,<br />
І запахло все навколо,<br />
Налетіли роєм бджоли.<br />
<br />
Не все літо липню жити —<br />
Он у полі стигне жито.<br />
Вже він піде, коли смеркне,<br />
Завтра прийде місяць серпень.
 </div>
