<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не варто заходить</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 Через місяць повернувся<br />
Додому Павло.<br />
Й до сусіда, до Петруся:<br />
— Ну, як тут було?<br />
— Не заходив, слава Богу,<br />
Ніхто із мужчин.<br />
— Як, за місяць і нікого?<br />
Ну хоча б один...<br />
— Я кажу тобі без жартів.<br />
Слідкував. Авжеж!<br />
— Ну тоді й мені не варто<br />
Заходити теж.
