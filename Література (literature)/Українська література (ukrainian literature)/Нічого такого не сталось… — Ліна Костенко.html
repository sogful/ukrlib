<body>
<div class="wrap">
 <div class="page-title">
  <h1>Нічого такого не сталось…</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 Нічого такого не сталось.<br />
Бо хто ти для мене? Сторонній.<br />
Життя соталось, соталось<br />
гіркими нитками іронії.<br />
Життя соталось, соталось.<br />
Лишився клубочок болю.<br />
Нічого такого не сталось.<br />
Ти просто схожий на Долю.
 </div>
