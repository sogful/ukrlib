<div class="wrap">
 <div class="page-title">
  <h1>Туманом вкрились верхогір'я...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Туманом вкрились верхогір'я<br />
І в снах небесних тихо сплять...<br />
Вітри над ними не шумлять,—<br />
Все повно тиші і примир'я.<br />
<br />
А море хвилями страшними<br />
Все в гніві, крику і борні,<br />
І, мов маяк, горить над ними<br />
Спокійний місяць вдалині.
 </div>
