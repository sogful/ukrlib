<body>
<div class="wrap">
 <div class="page-title">
  <h1>В глибокому затоні</h1>
  <h2>Максим Рильський</h2>
 </div>
 <div class="prose" id="content">
 В глибокому затоні,<br />
Далеко од людей<br />
Цвітуть лілеї сонні,<br />
І тихо круг лілей.<br /><br />
В глибокому затоні<br />
Води зелений тон,<br />
І відблиски червоні<br />
Спадають на затон.<br /><br />
Тут — кайдани, закони<br />
І суєта страшна…<br />
А там, в яснім затоні —<br />
Прозорість, тишина.
 </div>
