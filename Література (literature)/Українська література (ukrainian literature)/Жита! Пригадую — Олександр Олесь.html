<body>
<div class="wrap">
 <div class="page-title">
  <h1>Жита! Пригадую...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Жита! Пригадую...<br />
Як сон... дитячий, золотий...<br />
Схиляюся і падаю на землю,<br />
І серце біля них кладу...<br />
<br />
О дорогі мої!<br />
<br />
Шуміть мені забуту казку,<br />
П'яніть мене своїм диханням,<br />
Щоб я упився і не знав,<br />
Де зараз я,— чи на чужині,<br />
Чи там, ах, там, в краю коханім.
 </div>
