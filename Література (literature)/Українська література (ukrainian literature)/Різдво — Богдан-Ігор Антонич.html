<body>
<div class="wrap">
 <div class="page-title">
  <h1>Різдво</h1>
  <h2>Богдан-Ігор Антонич</h2>
 </div>
 <div class="prose" id="content">
 Народився Бог на санях<br />
в лемківськім містечку Дуклі.<br />
Прийшли лемки у крисанях<br />
і принесли місяць круглий.<br />
<br />
Ніч у сніговій завії<br />
крутиться довкола стріх.<br />
У долоні у Марії<br />
місяць — золотий горіх.
 </div>
