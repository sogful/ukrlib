<div class="wrap">
 <div class="page-title">
  <h1>Україна</h1>
  <h2>Тодось Осьмачка</h2>
 </div>
 <div class="prose" id="content">
 Шляхи мої неміряні,<br />
гори мої неважені,<br />
звірі мої ненаджені,<br />
води мої неношені,<br />
риба у них неціджена,<br />
птахи мої незлякані,<br />
діти мої не лічені,<br />
щастя для їх незлежане.<br />
<br />
Оце такая в тебе<br />
матінка,<br />
в руці Господній<br />
Україна<br />
Синьонебая!<br />
<br />
1917
 </div>
