 <div class="page-title">
  <h1>Капуста</h1>
  <h2>Михайло Стельмах</h2>
 </div>
 <div class="prose" id="content">
 Ми капусту роздягали,<br />
Сто одежинок знімали,<br />
А одежинки оці<br />
Підуть нам на голубці.
