<body>
<div class="wrap">
 <div class="page-title">
  <h1>Я сам... Ася...</h1>
  <h2>Анатолій Мойсієнко</h2>
 </div>
 <div class="prose" id="content">
 Я сам... Ася<br />
Молодо подолом<br />
У кущі щуку,<br />
А вода – адова...<br />
Море... ром...<br />
Я і Ася... Яса...<br />
Моросно сон-сором...<br />
Я...<br />
Ася... Яса...
 </div>
