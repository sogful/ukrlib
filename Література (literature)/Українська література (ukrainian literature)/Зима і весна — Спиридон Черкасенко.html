<div class="wrap">
 <div class="page-title">
  <h1>Зима і весна</h1>
  <h2>Спиридон Черкасенко</h2>
 </div>
 <div class="prose" id="content">
 — Насуплю я брови,— говорить зима,—<br />
І вітер з морозом повіє:<br />
Усе скрізь загине — рятунку нема!<br />
Під снігом замре, заніміє.<br />
— А я засміюся,— весна відмовля,—<br />
І сонце пекуче засяє:<br />
Прокинуться луки, ліси і поля,<br />
Усе зацвіте, заспіває.
