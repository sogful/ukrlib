<body>
<div class="wrap">
 <div class="page-title">
  <h1>Засівна</h1>
  <h2>Василь Симоненко</h2>
 </div>
 <div class="prose" id="content">
 Гей, прослала нива<br />
Чорне полотно.<br />
Ллється жовта злива —<br />
Сіється зерно.<br />
Сійся-родися,<br />
Колосом розвийся,<br />
Засівайся, ниво,<br />
Людям на добро!<br />
<br />
Хай у дні яснії<br />
Зерно пророста.<br />
Як мої надії,<br />
Як мої літа.<br />
Сійся-родися,<br />
Колосом розвийся,<br />
Засівайся щастям,<br />
Ниво молода!
 </div>
