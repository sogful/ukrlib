<body>
<div class="wrap">
 <div class="page-title">
  <h1>Лелечі спомини</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Літо ходить від зим далеко,<br />
від дощів, від квіток і трав,<br />
щоб останній сумний лелека<br />
теплих спогадів назбирав.<br /><br />
Щоб пішов за тим літом босим<br />
по квітки, по дощі й громи<br />
та й приніс до бабусі Осені<br />
гарні спогади для зими.
 </div>
</div>
