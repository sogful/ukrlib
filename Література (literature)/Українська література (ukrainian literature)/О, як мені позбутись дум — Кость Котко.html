<body>
<div class="wrap">
 <div class="page-title">
  <h1>О, як мені позбутись дум...</h1>
  <h2>Кость Котко</h2>
 </div>
 <div class="prose" id="content">
 О, як мені позбутись дум,<br />
Таких сумних, таких холодних,<br />
Як темрява ночей.<br />
<br />
Коли б я міг втопить свій сум<br />
В зелено-хвилевій безодні<br />
Твоїх очей.
 </div>
</div>
