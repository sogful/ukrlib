<div class="wrap">
 <div class="page-title">
  <h1>Кто шумєл?</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 В ресторані київськім<br />
Питає директор:<br />
— Кто шумєл здесь — контрольор,<br />
Ревізор, інспектор? —<br />
Кухар каже: — Ето тіп<br />
В вишітой рубашкє<br />
По-українскі мораль<br />
Рєзал нашей Машкє.<br />
Распєкал: "Ваш борщ такий.<br />
Що не можна їсти".<br />
— Розжірєлі, стєрвєци,<br />
Націоналісти.
