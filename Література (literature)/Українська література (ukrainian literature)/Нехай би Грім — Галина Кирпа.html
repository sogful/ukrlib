<body>
<div class="wrap">
 <div class="page-title">
  <h1>Нехай би Грім</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Боже,<br />
якщо Ти створив Грім,<br />
то нехай би він<br />
грав на сопілці,<br />
а не торохтів,<br />
розсипаючи по небу сухарі.<br />
Тоді б я його не боялася!<br />
Тоді б я йому<br />
цілий день танцювала<br />
ще й наспівувала:<br />
&#8220;А вже весна,<br />
а вже красна,<br />
із стріх вода капле&#8230;&#8221;
 </div>
