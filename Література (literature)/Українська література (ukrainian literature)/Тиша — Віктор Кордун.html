<body>
<div class="wrap">
 <div class="page-title">
  <h1>Тиша</h1>
  <h2>Віктор Кордун</h2>
 </div>
 <div class="prose" id="content">
 Підвів мене Господь-Бог<br />
до великої тиші<br />
й спитав:<br />
що ти можеш<br />
на ній написати?<br />
<br />
Я сказав, що хотів би<br />
написати по цій ось тиші<br />
ще таку тишу,<br />
заради вслухання в яку<br />
слід було неминуче<br />
створити цей світ.<br />
<br />
Мовчуще<br />
стояла між нами<br />
смолиста поліська ніч, —<br />
безмежна і безгомінна.
 </div>
