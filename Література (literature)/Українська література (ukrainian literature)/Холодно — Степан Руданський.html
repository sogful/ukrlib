<title>Холодно</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Холодно</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 Сидить голий Циганчук,<br />
Аж мало не плаче.<br />
— "Тату! — каже, — холодно!<br />
Зуб до зуба скаче!"<br /><br />
А той йому поясок:<br />
"Та на, не жури ся!<br />
Коли тобі холодно,<br />
То підпережи ся."
 </div>
