<title>Тузиків картузик</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Тузиків картузик</h1>
  <h2>Оксана Кротюк</h2>
 </div>
 <div class="prose" id="content">
 В понеділок песик Тузик<br />
Сам собі купив картузик.<br />
Ходить в ньому у вівторок,<br />
І у середу, й четвер,<br />
Бо ж новесенький картузик<br />
Є у Тузика тепер.
 </div>
</div>
