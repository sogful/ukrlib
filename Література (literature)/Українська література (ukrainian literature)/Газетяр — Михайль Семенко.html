<body>
<div class="wrap">
 <div class="page-title">
  <h1>Газетяр</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 День ідейного краму<br />
Новин, крові і хмар<br />
Дай телеграму,<br />
Газетяре!<br /><br />
Захвати, пориви й вигуки.<br />
Декларації, наради.<br />
Смішні комічні крики<br />
І настрій радий.<br /><br />
Преклоніть, схиліть хоругви<br />
У час найтихших свят,<br />
Ах, не підводьте голови —<br />
Ще гармати не сплять!
 </div>
