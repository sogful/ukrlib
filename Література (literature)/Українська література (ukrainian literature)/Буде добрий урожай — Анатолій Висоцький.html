<title>Буде добрий урожай</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Буде добрий урожай</h1>
  <h2>Анатолій Висоцький</h2>
 </div>
 <div class="prose" id="content">
 Мокрі трави,<br />
Мокрий шлях —<br />
Ходить дощик<br />
По полях.<br />
<br />
Ніжки довгі,<br />
Мов нитки.<br />
Ось чому<br />
Той дощ прудкий.<br />
<br />
Вітре, геть,<br />
Не заважай!<br />
Буде добрий<br />
Урожай.
 </div>
</div>
