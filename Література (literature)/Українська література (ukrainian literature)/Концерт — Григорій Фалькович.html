<body>
<div class="wrap">
 <div class="page-title">
  <h1>Концерт</h1>
  <h2>Григорій Фалькович</h2>
 </div>
 <div class="prose" id="content">
 Волохата синя гусінь<br />
Цілий день була не в дусі:<br />
І у спокої, і в русі<br />
Щось гуло у лівім вусі.<br />
<br />
З’ясувалося, що це –<br />
Не гудіння, а концерт,<br />
А музиками були<br />
Два джмелі і дві бджоли.<br />
<br />
Я відкрию вам секрет:<br />
Два дуети – вже квартет.
 </div>
