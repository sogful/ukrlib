 <div class="page-title">
  <h1>Перше – сніп по обмолоті</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Шарада<br /><br />
Перше — сніп по обмолоті<br />
на покрівлю хати,<br />
друге — жінка, ще точніше —<br />
материна мати.<br /><br />
А коли в одному слові<br />
поєднаєш те і те —<br />
буде квітка, що весною<br />
жовтим цвітом зацвіте.<br /><br />
Що це таке?<br /><br />
(Кульбаба)
 </div>
