<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ти погасла, ясна зоре!</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Ти погасла, ясна зоре!<br />
Став я мовчки, загадався...<br />
Не гадалось... В темне море<br />
Без весельця сам подався.<br />
<br />
Де сіромі прихилитись,<br />
Що казати, що робити,<br />
Як нема кому молитись,<br />
Як нема кого любити?
 </div>
