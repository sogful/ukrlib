<div class="wrap">
 <div class="page-title">
  <h1>Василь Мисик (Епіграма)</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Постій, Ілько! Поїду в Бухару,<br />
сходжу в мечеть, а на базар &#8211; не стану,<br />
і повернусь&#8230; Завдам тоді перу<br />
роботи, що й на маківки не гляне&#8230;
 </div>
