<div class="wrap">
 <div class="page-title">
  <h1>Чотири</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Лічилка<br />
<br />
Я жмурюсь, заплющив очі.<br />
Всі ховайтесь, хто де хоче!<br />
Вмить розбіглась дітвора.<br />
Йти шукать мені пора.<br />
Більш не буду я чекать:<br />
Раз, два, три — іду шукать.<br />
Раз — за Петра.<br />
Два — за Дмитра.<br />
Три — за Тетянку.<br />
Чотири — за Оксанку.<br />
Я усіх уже знайшов,<br />
Сам ховатися пішов.
 </div>
