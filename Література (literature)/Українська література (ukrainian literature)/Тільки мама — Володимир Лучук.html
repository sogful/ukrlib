<body>
<div class="wrap">
 <div class="page-title">
  <h1>Тільки мама</h1>
  <h2>Володимир Лучук</h2>
 </div>
 <div class="prose" id="content">
 — Я на ковзанку піду!<br />
— А коли ж до хати? —<br />
Тільки мама вміє так<br />
лагідно спитати.<br />
<br />
— На ходу сніданок з'їм!<br />
— Так не слід робити! —<br />
Тільки мама може так<br />
лагідно сварити.<br />
<br />
В снах літаю до зірок…<br />
— Час вставати, сину…—<br />
Тільки мама збудить так<br />
лагідно дитину.
 </div>
