<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вірш про Крука</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Ішов Крук<br />
через луг,<br />
бачить — холодочок.<br />
— Мо', спочинеш,<br />
Круче,<br />
тут?<br />
— Ні, — сказав, —<br />
не хочу.<br />
Я ще лап не находив<br />
і не натрудився,<br />
і на білий-білий світ<br />
ще не надивився.
 </div>
