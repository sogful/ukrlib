<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вірителеві</h1>
  <h2>Маркіян Шашкевич</h2>
 </div>
 <div class="prose" id="content">
 Перед зорями в люту непогоду<br />
Розігралася душа молодецька.<br />
Імив за керму та й чухнув на воду,<br />
На буйне море, гей, кров молодецька.<br />
А море бистре, гей, носить собою,<br />
Кипить і б’ється, аж страх ся здуває,<br />
Волня на волню зводиться горою,<br />
Пре сила силу, плавця затопляє.
 </div>
