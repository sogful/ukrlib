<title>Зламався краник</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зламався краник</h1>
  <h2>Наталія Поклад</h2>
 </div>
 <div class="prose" id="content">
 Що, дитиночко, за диво?<br />
Плачуть очка вередливо.<br />
<br />
Плачуть очка усі дні —<br />
І робочі, й вихідні.<br />
<br />
Плачуть очка кожен ранок…<br />
Може, в них зламався краник?
 </div>
</div>
