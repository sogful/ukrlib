<body>
<div class="wrap">
 <div class="page-title">
  <h1>Татові на зло</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 — Чому погано вчишся, Гнате?<br />
— Це я на зло своєму тату…<br />
— Ну, а "на зло" чого буває?<br />
— Того, що тато мене лає…<br />
— За віщо ж лає твій татусь?<br />
— За те, що я погано вчусь.
 </div>
