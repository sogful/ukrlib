<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зайчик і перекотиполе</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Перекотиполе<br />
Зайчикові лапки<br />
коле.<br />
— Ой, спіймаю,<br />
попадешся,<br />
Перекотиполе!<br />
Відкочу тебе<br />
далеко —<br />
за луги і доли.<br />
Або й далі —<br />
куди сонце<br />
ночувати ходить.<br />
А ще далі<br />
нехай тебе<br />
Вітрик<br />
світом котить!
 </div>
