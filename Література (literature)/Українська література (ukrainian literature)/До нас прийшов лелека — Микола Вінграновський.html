<body>
<div class="wrap">
 <div class="page-title">
  <h1>До нас прийшов лелека...</h1>
  <h2>Микола Вінграновський</h2>
 </div>
 <div class="prose" id="content">
 До нас прийшов лелека<br />
З косою на плечі,<br />
Води напився з глека<br />
Та й сів на спориші.<br />
І так сидів лелека,<br />
І думав те, що знав:<br />
Пропало десь далеко<br />
Все, що косити мав.<br />
Пропало десь далеко,<br />
Не видно вдень-вночі...<br />
І плакав наш лелека<br />
З косою на плечі.
 </div>
</div>
