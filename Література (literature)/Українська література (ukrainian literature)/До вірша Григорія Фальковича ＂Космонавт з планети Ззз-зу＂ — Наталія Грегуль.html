<title>До вірша Григорія Фальковича "Космонавт з планети Ззз-зу"</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>До вірша Григорія Фальковича "Космонавт з планети Ззз-зу"</h1>
  <h2>Наталія Грегуль</h2>
 </div>
 <div class="prose" id="content">
 Пан Григорій від душі<br />
Пише всі свої вірші,<br />
І козу з планети Ззз-зу<br />
Бачив певно уві сні.<br />
Довелося раз й мені<br />
В очі глянуть тій козі –<br />
Справді – очі неземні!
 </div>
</div>
