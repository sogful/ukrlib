<body>
<div class="wrap">
 <div class="page-title">
  <h1>Коли вона спала</h1>
  <h2>Ігор Калинець</h2>
 </div>
 <div class="prose" id="content">
 коли вона спала<br />
я вибудував для неї терем<br />
приносив їй страви<br />
коли вона спала<br /><br />
звикла до несподіванок<br />
як до сходу сонця<br /><br />
вірила в чари крила<br /><br />
вже на другий день<br />
грала вона так солодко<br /><br />
що тремтіла моя душа<br />
як дека скрипки
 </div>
</div>
