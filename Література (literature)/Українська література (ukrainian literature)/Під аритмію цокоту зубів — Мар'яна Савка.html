<div class="wrap">
 <div class="page-title">
  <h1>Під аритмію цокоту зубів...</h1>
  <h2>Мар'яна Савка</h2>
 </div>
 <div class="prose" id="content">
 Під аритмію цокоту зубів<br />
Колись мене виводили на танго.<br />
І плуталися ноги. Й ненастанно<br />
Іржавий сніг під пальцями рипів.<br />
<br />
І зачиняли в просторі пвкуль<br />
Мелодію, розписану на ґратах.<br />
І вже було несила обірвати<br />
Останнє па в замерлому танку.
 </div>
