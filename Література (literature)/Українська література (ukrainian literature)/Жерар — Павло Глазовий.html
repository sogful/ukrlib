<div class="wrap">
 <div class="page-title">
  <h1>Жерар</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Жорі рівно двадцять п'ять.<br />
Всі прожиті даром.<br />
Татко й матінка чомусь<br />
Звуть його Жераром.<br />
І дивується сусід:<br />
— Чи вони не хворі,<br />
Що таке чудне ім'я<br />
Притулили Жорі?<br />
А сусідка молода<br />
Весело цокоче:<br />
— Він же в них жере за трьох,<br />
А робить не хоче...
 </div>
