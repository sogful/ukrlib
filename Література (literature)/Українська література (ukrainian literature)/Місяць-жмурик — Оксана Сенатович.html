 <div class="page-title">
  <h1>Місяць-жмурик</h1>
  <h2>Оксана Сенатович</h2>
 </div>
 <div class="prose" id="content">
 Лічилка<br />
<br />
Місяць жмурить. Раз і два —<br />
в тінь сховалася трава.<br />
<br />
Три, чотири — і ріка<br />
швидко в сутінки тіка.<br />
<br />
За рікою слідом ліс<br />
з головою в темінь вліз.<br />
<br />
Раз, два, три, чотири, п'ять —<br />
місяць каже: — Йду шукать!<br />
<br />
Срібне око, жовтий хвіст —<br />
вийшов жмурик на поміст.
 </div>
