<div class="wrap">
 <div class="page-title">
  <h1>Серед скель, гаїв, каміння…</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Серед скель, гаїв, каміння<br />
Я гранітні мурії стрів...<br />
"Гей, чиї це володіння,<br />
Хто фортеці тут завів?"<br />
<br />
І, вартуючи на скелі,<br />
Гордо вітер відмовля:<br />
"Ці фортеці і оселі<br />
Гір ясного короля".
 </div>
