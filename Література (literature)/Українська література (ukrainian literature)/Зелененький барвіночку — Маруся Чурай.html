<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зелененький барвіночку</h1>
  <h2>Маруся Чурай</h2>
 </div>
 <div class="prose" id="content">
 Зелененький барвіночку,<br />
Стелися низенько!<br />
А ти, милий, чорнобривий,<br />
Присунься близенько!<br />
<br />
Зелененький барвіночку,<br />
Стелися ще нижче!<br />
А ти, милий, чорнобривий,<br />
Присунься ще ближче!
 </div>
</div>
