<body>
<div class="wrap">
 <div class="page-title">
  <h1>Гриб-боровик</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Білий гриб-<br />
Боровик,<br />
В зелен-лісі<br />
Жити звик.<br />
<br />
Як до лісу<br />
Прийдеш,<br />
То не зразу<br />
Знайдеш.<br />
Бо він гриб-<br />
Боровик,<br />
Він<br />
ховатися<br />
Звик.
 </div>
</div>
