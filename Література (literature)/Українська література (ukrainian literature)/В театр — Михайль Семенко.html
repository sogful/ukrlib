<body>
<div class="wrap">
 <div class="page-title">
  <h1>В театр</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Хутко йти в театр і заправляти скрипку<br />
Мовчати цілий вечір між натовпу<br />
з колегою<br />
Ах я буду цілий вечір уявляти катеринку<br />
Ах я буду почувати себе цілий вечір<br />
калікою.
 </div>
