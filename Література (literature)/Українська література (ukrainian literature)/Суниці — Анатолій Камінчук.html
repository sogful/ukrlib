<body>
<div class="wrap">
 <div class="page-title">
  <h1>Суниці</h1>
  <h2>Анатолій Камінчук</h2>
 </div>
 <div class="prose" id="content">
 Ходила синиця<br />
У синій спідниці,<br />
Збирала у кошик<br />
Достиглі суниці.<br />
<br />
А синичатко,<br />
Жовтенький животик,<br />
Збирало суниці<br />
Не в кошик, а в ротик.
 </div>
</div>
