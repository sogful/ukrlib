<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сидять яблука</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Отам, у траві травучій,<br />
сидять яблука.<br />
Їхні серденька-зернятка<br />
перестукуються,<br />
перегукуються:<br />
— Еге, холодно?<br />
— Еге, мокро?<br />
— Хто нас знайде?<br />
— Хто нас підніме?<br />
— Хто нас умиє?<br />
— Хто нас погладить?<br />
— А хто нас з'їсть?
 </div>
