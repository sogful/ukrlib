<body>
<div class="wrap">
 <div class="page-title">
  <h1>Одні — за правду...</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 — Ніби ж… немає революцій!<br />
І всі недоліки — подолано…<br />
А на екрані — чогось б'ються! —<br />
Грицько говорить невдоволено.<br />
— За що ж там б'ються, не сказав ти! —<br />
Іван у кожну справу лізтиме.<br />
— Ну, як за що?! Одні — за правду…<br />
А інші, певна річ… за істину!
 </div>
