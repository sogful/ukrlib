<body>
<div class="wrap">
 <div class="page-title">
  <h1>Елегія</h1>
  <h2>Антін Дикий</h2>
 </div>
 <div class="prose" id="content">
 Брожу по парку,<br />
Дивлюся на красу,<br />
Залиту золотом і сумом,<br />
І сам себе на вогнище несу,<br />
Бо чую серцем осінь хмуру…<br />
Я сам<br />
у собі<br />
сиву<br />
волосину<br />
вирвав.<br />
Згадай давно – минулий гул…<br />
Неначе я й не жив…<br />
Чому ж я оцвітаю?<br />
Сивіє<br />
голова<br />
од дум…
 </div>
