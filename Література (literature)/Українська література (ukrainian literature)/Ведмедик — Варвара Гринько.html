<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ведмедик</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 В лісі тихо, всі поснули,<br />
Шепчуть сосни люлі-люлі...<br />
Вліз ведмедик в теплу хату,<br />
Смокче лапу волохату.<br />
Та не спить, малий, зітхає,<br />
Хоче меду, та немає.
 </div>
