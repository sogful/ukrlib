<div class="wrap">
 <div class="page-title">
  <h1>Дід Дніпро розплющив очі…</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Дід Дніпро розплющив очі,<br />
Чоло зморщує чогось,<br />
Серед ночі шаблю точе<br />
І гуде крізь зуби щось.<br />
Хто тебе розсердив, сивий,<br />
Стогін хвиль Чи береги?..<br />
Заспокойся — спи щасливий:<br />
Тихо, ясно навкруги.
 </div>
