<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хвостата мова</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 Мале щеня<br />
хвостом махає —<br />
воно зі мною<br />
розмовляє.<br />
І я —<br />
даю вам слово!—<br />
збагнув<br />
хвостату мову:<br />
щеня мене просило,<br />
щоб ми з ним<br />
подружили.<br />
І хоч не маю я<br />
хвоста,<br />
та в мене<br />
відповідь проста:<br />
я усміхнувсь малому<br />
і взяв його<br />
додому!
 </div>
