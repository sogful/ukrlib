<div class="wrap">
 <div class="page-title">
  <h1>Глянь: золоть, ледве вичутна...</h1>
  <h2>Святослав Гординський</h2>
 </div>
 <div class="prose" id="content">
 Глянь: золоть, ледве вичутна,<br />
Лягає на ліси.<br />
Ах, серце, чуєш: кличуть нас<br />
Далекі голоси.<br />
<br />
Ховаючись за обрії,<br />
Там жде крило пожеж,<br />
В барв полум’яних оргії<br />
Ти знову спалахнеш!
 </div>
