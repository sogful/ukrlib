<div class="wrap">
 <div class="page-title">
  <h1>Перечекати дощ</h1>
  <h2>Галина Тарасюк</h2>
 </div>
 <div class="prose" id="content">
 Перечекати дощ. Перечекати…<br />
Передощить до самозабуття,<br />
і знову необачно закохатись,<br />
І думати, що вже на все життя.<br /><br />
На дні усі, на всі літа, до скону<br />
Поміж тісних п&#8217;янливих берегів<br />
Котити хвилю чи сльозу солону<br />
І марити дощем, що відшумів.
 </div>
