<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сюрконик</h1>
  <h2>Любов Голота</h2>
 </div>
 <div class="prose" id="content">
 У траві стрибає коник.<br />
— Ні, не коник, а сюрконик,<br />
бо стрибає, не біжить,<br />
не ірже він, а сюрчить.<br />
Правлять ним не віжки,<br />
а тоненькі ніжки!
 </div>
