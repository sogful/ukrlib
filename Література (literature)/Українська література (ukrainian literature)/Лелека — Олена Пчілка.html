 <div class="page-title">
  <h1>Лелека</h1>
  <h2>Олена Пчілка</h2>
 </div>
 <div class="prose" id="content">
 <em>(Полтавські примовки)</em><br /><br />
— Лелеко, лелеко!<br />
До осені далеко?<br />
— Як замовкнуть жаби.<br />
Як померзнуть баби,<br />
Тоді осінь настане,—<br />
Мені їсти не стане,<br />
Полечу в інший край,<br />
На той рік дожидай!
