 <div class="page-title">
  <h1>Сусіди</h1>
  <h2>Олена Пчілка</h2>
 </div>
 <div class="prose" id="content">
 Сусіди близькії<br />
Не завжди бувають "вороги тяжкії",<br />
Мир, згода частенько між ними бувають,—<br />
Сусідоньки любо собі розмовляють.<br />
Та краще, як пужка,<br />
Не буде у ручках маленьких,—<br />
Бо може зостатися смужка<br />
На плечках сусідських біленьких!
 </div>
