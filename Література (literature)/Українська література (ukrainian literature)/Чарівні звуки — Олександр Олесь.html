<body>
<div class="wrap">
 <div class="page-title">
  <h1>Чарівні звуки</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Привіт на крилах прилетів,<br />
Метелик білий в час зимовий...<br />
Хтось добрий, ніжний, невідомий<br />
Зіткав його з найтонших слів.<br />
<br />
Ніжніше дзвону двох квіток<br />
Два слова соняшно сміються...<br />
А в мене сльози й сльози ллються,<br />
Як сонцем збуджений поток.
 </div>
