<body>
<div class="wrap">
 <div class="page-title">
  <h1>Айстри задумані, квіти останнії</h1>
  <h2>Володимир Сосюра</h2>
 </div>
 <div class="prose" id="content">
 Айстри задумані, квіти останнії,<br />
осені пізньої сльози багрянії…<br />
Сумно шепочеться вітер над вами,<br />
і обмиває вас небо дощами.<br /><br />
Ви як любов, що весни не зазнала<br />
і як вечірня зоря одсіяла.<br />
Айстри задумані, квіти останії,<br />
осені пізньої сльози багрянії…
 </div>
