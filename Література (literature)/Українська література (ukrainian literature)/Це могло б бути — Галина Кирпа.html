<title>Це могло б бути</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Це могло б бути</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Нікого немає вдома.<br />
Тільки тиша.<br />
І якось отак зненацька<br />
могла б шарудіти миша.<br /><br />
Тоді довелося б миші<br />
разом із нами жити,<br />
щоб могла вона в тиші<br />
хоч якось пошарудіти.
 </div>
</div>
