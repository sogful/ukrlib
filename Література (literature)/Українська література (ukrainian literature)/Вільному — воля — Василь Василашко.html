<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вільному — воля...</h1>
  <h2>Василь Василашко</h2>
 </div>
 <div class="prose" id="content">
 — Ал-ло! Спізнюся, жінко, в святі річ...<br />
— Ал-ло! Під ранок жди — не йдуть чомсь ноги...<br />
— Гуляй, мій любий, далі, хоч всю ніч,<br />
Якщо тебе тримає хтось за роги...
 </div>
