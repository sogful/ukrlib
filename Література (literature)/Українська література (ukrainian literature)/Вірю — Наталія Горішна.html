<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вірю</h1>
  <h2>Наталія Горішна</h2>
 </div>
 <div class="prose" id="content">
 <p>Вірю, що не все іще сказала,</p>
<p>
Вірю, що сказала не усім,</p>
<p>
Що коханням не відквітувала</p>
<p>
І не навтішалася твоїм.</p>
<p>
Вірю, що позбудемось страждання</p>
<p>
І згадаєм: у вінку садів</p>
<p>
Україна – це земля кохання,</p>
<p>
А не си&#769;ріт і невтішних вдів!</p>
 </div>
</div>
