<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дорогою серця</h1>
  <h2>Микола Сингаївський</h2>
 </div>
 <div class="prose" id="content">
 Багато мостів на Влтаві,<br />
безліч доріг до тебе.<br />
Та я найтруднішу вибрав –<br />
і йтиму до тебе<br />
дорогою серця,<br />
якою ходить кохання,<br />
бо не кожному це судилось,<br />
хоч безліч доріг у людини.
 </div>
