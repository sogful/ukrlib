<div class="wrap">
 <div class="page-title">
  <h1>Прощення</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Довго думаю про тих,<br />
що ображають словами<br />
мене&#8230;<br /><br />
Довго думаю про тих,<br />
вчинки чиї ображають<br />
мене&#8230;<br /><br />
Ближніми стали мені вороги&#8230;<br /><br />
Ближніх годиться прощати&#8230;<br /><br />
Я вас простив, вороги&#8230;<br /><br />
Хто-де простить &#8211; мене?
 </div>
