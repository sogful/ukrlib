<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сунички</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 Під маленькими яличками<br />
у смарагдовій траві<br />
літо виросло суничками —<br />
то по одній, то по дві.<br />
<br />
Ой, сестриченько-яличко,<br />
ти не дряпай моє личко,<br />
я суничок назбираю<br />
жменьку мамі і собі!
 </div>
</div>
