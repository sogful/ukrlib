<body>
<div class="wrap">
 <div class="page-title">
  <h1>Пиріжки</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Пиріжечки-пундики<br />
У печі —<br />
Учинялось тістечко<br />
Уночі.<br />
<br />
Пиріжечків-пундиків<br />
Напечу,<br />
Малюків рум'яними<br />
Пригощу.<br />
Ой і добрі ж<br />
Пундики-пиріжки!<br />
Покуштуйте,<br />
Прошу вас, малюки!
 </div>
</div>
