<body>
<div class="wrap">
 <div class="page-title">
  <h1>А я хлопець молодий</h1>
  <h2>Осип Маковей</h2>
 </div>
 <div class="prose" id="content">
 А я хлопець молодий,<br />
не зважаю на людий,<br />
на хвалу їх, на їх сміх —<br />
не кермуюсь судом їх.<br />
<br />
Мій закон — то розум мій,<br />
розум, серце і настрій;<br />
а чим тішусь-дорожу —<br />
вийди завтра, то скажу.<br />
<br />
1911
 </div>
