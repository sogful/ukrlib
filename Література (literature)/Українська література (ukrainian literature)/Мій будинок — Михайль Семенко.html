<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мій будинок</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Не жалкуй, що мій будинок звалений,—<br />
Не турбуйся про звіт.<br />
Бо не я сам — спалений,<br />
Зі мною падає цілий світ.<br /><br />
І нехай він мертвим лічиться,<br />
І нехай міниться без снаги.<br />
Настрій мій розметерліниться,<br />
Повний ваги.
 </div>
</div>
