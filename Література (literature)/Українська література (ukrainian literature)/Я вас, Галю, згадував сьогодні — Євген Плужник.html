<body>
<div class="wrap">
 <div class="page-title">
  <h1>Я вас, Галю, згадував сьогодні</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Я вас, Галю, згадував сьогодні,<br />
Хотілося мені вас побачити.<br />
Все здавалося, що ви самотні<br />
І десь далеко плачете.<br /><br />
Смішно це, але мені так хочеться<br />
Про якесь майбутнє з вами балакати,<br />
Дивитися, як день квітневий точиться,<br />
А може, й плакати.
 </div>
