  <h1>Шумить, і шепче, і тривожить...</h1>
  <h2>Максим Рильський</h2>
 </div>
 <div class="prose" id="content">
 * * *<br />
<br />
Шумить, і шепче, і тривожить<br />
Зрадливий дощ із-за кутка,<br />
А в серці: сонячна сіножать,<br />
З граблями дівчина струнка,<br />
<br />
І передзвони косовиці,<br />
І житні золоті коржі,<br />
І запах в'ялої копиці,<br />
Полинь і кашка на межі.<br />
<br />
1924
