 <div class="page-title">
  <h1>Падає з дерев пожовкле листя</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Падає з дерев пожовкле листя,<br />
День уже в обіди догорів,—<br />
Кажуть, що вночі на передмістя<br />
Осінь приблукала з хуторів.<br /><br />
В центрі вона буде завтра ранком,<br />
Повагом вступаючи туди&#8230;<br />
Що ж! Приходь, задумлива селянко,—<br />
Я тебе побачити радий.
