<div class="wrap">
 <div class="page-title">
  <h1>Підприємство і затока</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Загадка<br /><br />
Двоскладове наше слово —<br />
підприємство промислове,<br />
а знак м'якшення додай —<br />
буде вже частина річки<br />
чи затока невеличка.<br /><br />
Що за слово? Відгадай.<br /><br />
Власне, два тут слова (з різним<br />
наголосом навіть).<br />
Хочеш — підкажу тобі я:<br /><br />
це —<br /><br />
(завод і заводь)
 </div>
