<body>
<div class="wrap">
 <div class="page-title">
  <h1>Загадка про того, хто у свиті ходить</h1>
  <h2>Григорій Фалькович</h2>
 </div>
 <div class="prose" id="content">
 Хто це, хто іде по світі<br />
В дощовій осінній свиті,<br />
І така в нього хода,<br />
Що коли заходить в місто –<br />
Облітає жовте листя,<br />
Жовте листя опада.<br />
<br />
Рівно тридцять днів підряд<br />
Ходить місяць ... .<br />
(листопад)
 </div>
</div>
