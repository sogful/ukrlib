 <div class="page-title">
  <h1>Весна</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 За горою сніговою<br />
пливе дівчина водою —<br />
у вербовому човенці,<br />
у човенця — два весельця.<br />
<br />
За горою сніговою<br />
пливе дівчина водою:<br />
із лівого рукава —<br />
струмки витікають,<br />
із правого рукава —<br />
пташки вилітають,<br />
круг голівки,<br />
круг ясної<br />
рутяний віночок<br />
розцвітає.
 </div>
