<body>
<div class="wrap">
 <div class="page-title">
  <h1>Всім видно яблучко</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Вітер зірвав із яблуні<br />
найспіліше яблучко,<br />
сів собі на моріжку<br />
та й бавиться.<br /><br />
Всім видно яблучко,<br />
а я бачу Вітра.
 </div>
