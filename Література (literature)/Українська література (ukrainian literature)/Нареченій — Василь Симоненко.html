<body>
<div class="wrap">
 <div class="page-title">
  <h1>Нареченій</h1>
  <h2>Василь Симоненко</h2>
 </div>
 <div class="prose" id="content">
 По Шляху Чумацькому у росах<br />
Буде вічність мчати коні,<br />
Я ж губамі у розкішних косах<br />
Позбираю зоряні вогні.<br /><br />
Де світи стискаються у шалі<br />
І сміється злісно маніак,<br />
Я свої повідаю печалі<br />
Тій, що жду і не дождусь ніяк.
 </div>
