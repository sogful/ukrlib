<body>
<div class="wrap">
 <div class="page-title">
  <h1>Залізне майно</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 — Чого, брате, засмутився?<br />
Чого зажурився?<br />
— З дружиною позавчора<br />
В суді розлучився.<br />
Все вона собі забрала,<br />
Що було в квартирі,<br />
А мені утюг дістався<br />
Та залізні гирі.<br />
— А нащо ти брав залізо,<br />
Інтересне діло?<br />
— Хто там брав!<br />
Воно за мною<br />
Слідом все летіло.
 </div>
