<title>Тане сніг</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Тане сніг</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Тануть, в'януть сніги, —<br />
Як крізь хмари летючі<br />
Гляне сонце блискуче.<br />
Усміхнеться в привіті,<br />
Розіллється в блакиті.<br />
Тане сніг, в'яне сніг,<br />
Гине.
 </div>
</div>
