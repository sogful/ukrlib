<body>
<div class="wrap">
 <div class="page-title">
  <h1>Скоро сонечко пригріє...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Скоро сонечко пригріє,<br />
потечуть струмки,<br />
темний гай зазеленіє, .<br />
зацвітуть квітки.<br />
<br />
Підем ми тоді з тобою<br />
в ліс на цілий день<br />
і натішимось весною,<br />
і наслухаємось пісень.
 </div>
