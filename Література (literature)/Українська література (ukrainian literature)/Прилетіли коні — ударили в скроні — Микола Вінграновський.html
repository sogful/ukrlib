 <div class="page-title">
  <h1>Прилетіли коні — ударили в скроні...</h1>
  <h2>Микола Вінграновський</h2>
 </div>
 <div class="prose" id="content">
 Павлові Загребельному<br />
<br />
Прилетіли коні — ударили в скроні.<br />
Прилетіли в серпні — ударили в серце.<br />
Ударили в долю, захмеліли з болю,<br />
Захмеліли з болю, наїржались вволю.<br />
<br />
Отакі-то коні — сльози на долоні.<br />
<br />
1964
