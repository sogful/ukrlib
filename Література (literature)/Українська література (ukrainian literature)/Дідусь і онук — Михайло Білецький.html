<title>Дідусь і онук</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дідусь і онук</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Як маленьким був,<br />
Онука<br />
Все водив дідусь за руку,<br />
А коли онук підріс —<br />
Водить дідуся за ніс!
 </div>
</div>
