<div class="wrap">
 <div class="page-title">
  <h1>Вже другий місяць сонце</h1>
  <h2>Олександр Рябошапка</h2>
 </div>
 <div class="prose" id="content">
 Вже другий місяць сонце землю сушить,<br />
а небо ні краплинки не дає.<br />
На диво всім стара, зігнута груша<br />
багатим розродилась врожаєм.<br /><br />
Зів&#8217;яли сливи, яблуні притихли,<br />
засохли вишні і горіх стоїть…<br />
Упали груші – жовті, перестиглі,<br />
немов хотіли землю напоїть.
 </div>
