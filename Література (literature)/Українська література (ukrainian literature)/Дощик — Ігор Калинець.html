<div class="wrap">
 <div class="page-title">
  <h1>Дощик</h1>
  <h2>Ігор Калинець</h2>
 </div>
 <div class="prose" id="content">
 Випив суховій<br />
увесь нектар із квітки.<br />
Заглянула бджілка в гості<br />
нічим почастуватися.<br />
А в пана дощу<br />
ворота дощаті.<br />
— Пане дощ, пане дощ,<br />
вийдіть-но з хати.<br />
— Нема батька вдома,<br />
а я — дощик.<br />
— Ну, то вийди ти —<br />
треба квітці помогти.<br />
— А я ліпше капусті<br />
за комір —<br />
ото сміху буде!
 </div>
