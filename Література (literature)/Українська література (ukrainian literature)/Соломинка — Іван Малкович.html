<div class="wrap">
 <div class="page-title">
  <h1>Соломинка</h1>
  <h2>Іван Малкович</h2>
 </div>
 <div class="prose" id="content">
 Якийсь вітер низький<br />
жене стебла соломи<br />
понад глибокі стежки,<br />
повні утоми.<br /><br />
Повз ріку з кучерявим склом,<br />
повз човенці червоні,<br />
де попасом<br />
землю теплом<br />
продихали<br />
коні.<br /><br />
Попри мертвий давно живопліт<br />
далі — зречено — плинко…<br />
Чути голос, шепоче услід:<br />
прощай, соломинко.
 </div>
