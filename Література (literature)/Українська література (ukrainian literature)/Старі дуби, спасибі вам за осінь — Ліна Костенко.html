<body>
<div class="wrap">
 <div class="page-title">
  <h1>Старі дуби, спасибі вам за осінь</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 Старі дуби, спасибі вам за осінь,<br />
За відлітання радості і птиць.<br />
Ще, певно, я затуркана не зовсім,<br />
<br />
Моя княгине! Ти ідеш вмирати,<br />
Піднявши вгору стомлене лице.<br />
Я плачу й можу сліз не витирати.<br />
Старі дуби, спасибі вам за це.
 </div>
