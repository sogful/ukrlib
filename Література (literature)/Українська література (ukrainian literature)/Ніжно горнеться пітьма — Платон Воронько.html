<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ніжно горнеться пітьма</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Ніжно горнеться пітьма,<br />
Ніч підходить крадькома,<br />
Хоче вкрасти з хати сина,<br />
Понести туди, де зимно.<br />
Ми сховаєм сина в ліжко,<br />
Вкриєм ручки, вкриєм ніжки —<br />
Аж до ранку, до світанку,<br />
Поки ніч не піде з ганку.
 </div>
