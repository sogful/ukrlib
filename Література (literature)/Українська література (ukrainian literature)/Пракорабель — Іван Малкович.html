<div class="wrap">
 <div class="page-title">
  <h1>Пракорабель</h1>
  <h2>Іван Малкович</h2>
 </div>
 <div class="prose" id="content">
 Вантажений калиною, сповільна<br />
він рівно опускається до дна;<br />
сто років углибає — божевільна<br />
у тих прозорих водах глибина,<br /><br />
Там сховок духу, там — ясна година,<br />
комори наші: з тих запасників<br />
зцілюща виринатиме калина<br />
на сотнях затаєних кораблів.
 </div>
