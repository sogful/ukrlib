 <div class="page-title">
  <h1>Трішечки напруги</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Загадка<br /><br />
Нумо трішечки напруги,<br />
ось вам і подробиці:<br />
перше тут — предмет, а друге<br />
що з предметом робиться.<br /><br />
Як би речення словами<br />
не були заклечані,<br />
досить легко ми їх з вами<br />
визначимо в реченні.<br /><br />
Хто вони?<br /><br />
(Підмет і присудок)
 </div>
