<body>
<div class="wrap">
 <div class="page-title">
  <h1>Губи твої від шовку ніжніш...</h1>
  <h2>Світлана Йовенко</h2>
 </div>
 <div class="prose" id="content">
 Губи твої від шовку ніжніш<br />
тануть мені на губах<br />
руки твої від вогню гарячіш<br />
владні вже як судьба<br />
<br />
чом же я чую і щем і ляк<br />
важча крило легке<br />
серце твоє сухе як мак<br />
стомлене і гірке
 </div>
</div>
