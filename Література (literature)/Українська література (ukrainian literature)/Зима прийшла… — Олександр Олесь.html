<div class="wrap">
 <div class="page-title">
  <h1>Зима прийшла…</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Зима прийшла. Холодними руками<br />
Скувала ріки і ставки,<br />
Заслала ниви килимами,<br />
До сел засипала стежки.<br />
Усе замовкло під снігами.<br />
Даремно! Сонце переможе!<br />
Розіб'є громом ланцюги,<br />
Розтопить криги і сніги,<br />
Змете всі заміри ворожі<br />
І кине квіти навкруги.
