<body>
<div class="wrap">
 <div class="page-title">
  <h1>Довший час</h1>
  <h2>Ігор Калинець</h2>
 </div>
 <div class="prose" id="content">
 довший час<br />
я не показувався їй на вічі<br /><br />
захований за віями<br />
як за густим частоколом<br /><br />
всі десять її пісеньок<br />
навчився не мавши слуху<br /><br />
коли вона тулила крило<br />
до грудей<br />
я хотів бути крилом<br /><br />
одного вечора<br />
навіть зазирнув у шпарку<br />
як вона роздягалася
 </div>
