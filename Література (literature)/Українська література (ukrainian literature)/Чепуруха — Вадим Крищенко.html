<body>
<div class="wrap">
 <div class="page-title">
  <h1>Чепуруха</h1>
  <h2>Вадим Крищенко</h2>
 </div>
 <div class="prose" id="content">
 Наша доня — чепуруха —<br />
Миє шийку, миє вуха,<br />
Миє руки, миє ніжки,<br />
Як лягає спати в ліжко.<br />
Та іще гарненько очі<br />
Миє — аж блищать вони,<br />
Щоб приходили щоночі<br />
Голубі чистенькі сни.
 </div>
