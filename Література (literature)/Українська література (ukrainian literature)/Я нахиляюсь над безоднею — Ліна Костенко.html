 <div class="prose" id="content">
 * * *<br />
<br />
Я нахиляюсь над безоднею,<br />
кричу у безвісті віків:<br />
— А як же ми один без одного<br />
в Сузір'ї Гончих Павуків?<br />
<br />
І як же ти один у Всесвіті?<br />
І як же тут без тебе я?!<br />
Впізнай мене в холодній безвісті,<br />
згадай моє земне ім'я!
