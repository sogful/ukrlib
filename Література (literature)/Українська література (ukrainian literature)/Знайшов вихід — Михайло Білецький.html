<body>
<div class="wrap">
 <div class="page-title">
  <h1>Знайшов вихід</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Знай, твоєї поведінки<br />
Я не схвалюю цілком!<br />
В тебе ніжна така жінка,<br />
А ти її — кулаком! —<br />
Федір блимнув із-під лоба:<br />
— Яку маю, таку б'ю.<br />
А як ця не до вподоби,<br />
Приведи сюди свою!
 </div>
