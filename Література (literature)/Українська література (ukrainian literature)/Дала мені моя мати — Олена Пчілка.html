<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дала мені моя мати</h1>
  <h2>Олена Пчілка</h2>
 </div>
 <div class="prose" id="content">
 Дала мені моя мати<br />
Козу з козенятком,<br />
Так щоб же я не ходила<br />
По селу з горщатком.<br />
А я тую кізоньку<br />
Пасла та пасла,<br />
Бо вдалася козуненька<br />
Добрая до масла!
 </div>
