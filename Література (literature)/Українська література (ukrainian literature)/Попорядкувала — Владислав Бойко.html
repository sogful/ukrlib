<div class="wrap">
 <div class="page-title">
  <h1>Попорядкувала</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 Взялась Нова Мітла за діло:<br />
пилюку в хаті добре збила...<br />
А як нарешті вгомонилась —<br />
пилюка в хаті знову всілась.
