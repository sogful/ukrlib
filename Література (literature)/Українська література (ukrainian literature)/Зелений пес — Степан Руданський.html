<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зелений пес</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 Зайшов Німець раз на баль,<br />
З панною сідає,<br />
Мовчить, мовчить, далі враз<br />
Сусідку питає:<br /><br />
"Чи зелений коли пес<br />
Пані не здибала?"<br />
— Та ні, — каже. — або що?"<br />
Німця запитала.<br /><br />
"Та нічого, — каже той, —<br />
Я так лиш питав ся,<br />
Бо з зеленим, пані, псом<br />
І я не здибав ся!"
 </div>
