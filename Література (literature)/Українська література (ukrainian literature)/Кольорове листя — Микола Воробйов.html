<body>
<div class="wrap">
 <div class="page-title">
  <h1>Кольорове листя</h1>
  <h2>Микола Воробйов</h2>
 </div>
 <div class="prose" id="content">
 Ніч згубила чорне листя<br />
і ранком стала.<br />
Ранок згубив синє листя<br />
і днем став.<br />
День згубив зелене листя<br />
і вечором став.<br />
Вечір згубив червоне листя<br />
і ніччю став.
 </div>
</div>
