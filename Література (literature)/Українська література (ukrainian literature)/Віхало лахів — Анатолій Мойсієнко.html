 <div class="page-title">
  <h1>Віхало лахів</h1>
  <h2>Анатолій Мойсієнко</h2>
 </div>
 <div class="prose" id="content">
 Віхало лахів —<br />
Ружа зажур.<br />
Атакує біда і шрамує, б&#8217;є у марші, а діб&#8217;є у ката.<br />
А то — духото-худота,<br />
Кат сам мечем мастак.<br />
..Віхало лахів —<br />
Ружа зажур.
 </div>
