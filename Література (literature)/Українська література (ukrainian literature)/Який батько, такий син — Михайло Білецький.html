<title>Який батько, такий син</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Який батько, такий син</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Я не хочу їсти каші<br />
Вівсяної, тату...<br />
Овес їдять лише коні,<br />
Ще буду іржати! —<br />
А татусь хлопчині каже:<br />
— Дурненький ти, бачу.<br />
Я вживаю курятину,<br />
А не кудкудачу!
 </div>
