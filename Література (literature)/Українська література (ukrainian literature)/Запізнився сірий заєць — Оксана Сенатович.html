<div class="wrap">
 <div class="page-title">
  <h1>Запізнився сірий заєць</h1>
  <h2>Оксана Сенатович</h2>
 </div>
 <div class="prose" id="content">
 Запізнився сірий заєць,<br />
сірий заєць із Підгаєць.<br />
<br />
Біг щодуху: — Гей, капусто! —<br />
А її немає — пусто.<br />
<br />
Носом цілить на буряк —<br />
попадає на будяк.<br />
<br />
На городі землю порпа:<br />
де поділася та морква?<br />
<br />
Скрізь всього було завізно.<br />
А тепер, зайчиську, пізно...
 </div>
