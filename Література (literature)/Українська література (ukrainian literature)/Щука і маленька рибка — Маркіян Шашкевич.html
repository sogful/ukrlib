<body>
<div class="wrap">
 <div class="page-title">
  <h1>Щука і маленька рибка</h1>
  <h2>Маркіян Шашкевич</h2>
 </div>
 <div class="prose" id="content">
 Рибка у воді<br />
Черв'ячка ловила,<br />
Не могла з'їсти і дужесь сердила.<br />
Надбігла Щука,<br />
Черв'ячка ковтнула,<br />
А з Червом вудка причіплена була.<br />
Взяв рибар Щуку на берег тягнути,<br />
Взялась Рибка радувати,<br />
Взяла подружкам казати:<br />
"Часом то добре і маленьков бути!"
 </div>
