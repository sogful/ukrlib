<div class="wrap">
 <div class="page-title">
  <h1>Мати</h1>
  <h2>Марійка Підгірянка</h2>
 </div>
 <div class="prose" id="content">
 Хто тебе так щиро любить,<br />
І вбирає, і голубить,<br />
І кладе у постіль спати?<br />
Мати.<br />
<br />
Хто стеріг тебе від злого,<br />
Відмовляв собі усього,<br />
Щоб тобі віддати?<br />
Мати.<br />
<br />
Хто тебе узяв за руку<br />
І до школи на науку<br />
Вів, щоб розуму навчати?<br />
Мати.
 </div>
