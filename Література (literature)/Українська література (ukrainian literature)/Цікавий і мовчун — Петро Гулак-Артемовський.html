 <div class="page-title">
  <h1>Цікавий і мовчун</h1>
  <h2>Петро Гулак-Артемовський</h2>
 </div>
 <div class="prose" id="content">
 (Приказка)<br />
<br />
Цікавий, Мовчуна зустрівши раз, спитав:<br />
<br />
"Від чого голосний так дзвін той на дзвіниці?"<br />
"Від того, що (коли не втнеш сеї дурниці)<br />
Всередині, як ти, порожній він",— сказав.<br />
<br />
Харьков<br />
І декабря 1820 года
