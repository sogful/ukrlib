<body>
<div class="wrap">
 <div class="page-title">
  <h1>Голос отрути</h1>
  <h2>Максим Рильський</h2>
 </div>
 <div class="prose" id="content">
 Люблю отруту, сховану в лілеї,<br />
Люблю порок із поглядом ясним,<br />
І безсоромність ніжності твоєї,<br />
І терпких милощів незнаний дим.<br /><br />
Люблю тебе, бо ти чужа коханню,<br />
Бо ти мені лишилася одна;<br />
Люблю в тобі мою любов останню,<br />
Солодкий шум допитого вина.
 </div>
</div>
