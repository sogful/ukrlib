<body>
<div class="wrap">
 <div class="page-title">
  <h1>Цигарка</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Ох, як буває інколи!..<br />
Вночі<br />
прорветься небо, ллє безперестанку<br />
холодний дощ&#8230;<br />
На сході хтось ключі<br />
украв од сонця &#8211; не діждатись ранку.<br /><br />
І сон не йде, оказію таку<br />
щоб якось, приручивши, підкорити&#8230;<br />
Тоді цигарка спалахне&#8230;<br />
В кутку<br />
тінь вигойда живі дереворити&#8230;
 </div>
