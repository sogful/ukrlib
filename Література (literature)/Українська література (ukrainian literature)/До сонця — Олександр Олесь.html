<body>
<div class="wrap">
 <div class="page-title">
  <h1>До сонця</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 На гори високі, на срібло снігів!<br />
На саму далеку вершину!<br />
З якої раніше крилатих орлів,<br />
Вітаючи, ранок я стріну...<br />
<br />
За хмари! Де сонце блискуче жиє,<br />
Не томлячись сяєво лити...<br />
Де світу набрав би я в серце своє<br />
І сам уже зміг би світити.
 </div>
