 <div class="page-title">
  <h1>Темна ніч, вітрець тихесенький...</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Темна ніч, вітрець тихесенький<br />
Зашумів в моїм вікні;<br />
Дощик капає дрібнесенький,<br />
В серце падає мені.<br />
<br />
Ні, се мрія доторкнулася<br />
І навіки утекла;<br />
Ти до мене усміхнулася<br />
І свій погляд одвела!<br />
<br />
1900 — 1902
