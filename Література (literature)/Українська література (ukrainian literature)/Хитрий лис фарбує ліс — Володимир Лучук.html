<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хитрий лис фарбує ліс</h1>
  <h2>Володимир Лучук</h2>
 </div>
 <div class="prose" id="content">
 Хитрий лис на верховині<br />
носить фарби<br />
у тайстрині.<br />
Лис,<br />
покіль зима настане,<br />
ліс фарбує у багряне.<br />
<br />
На дива дивитись скорі<br />
звірі<br />
збіглися<br />
у зворі:<br />
— Лис фарбує ліс!<br />
Дивіться!<br />
Не торка ж ялиць одних:<br />
хитрий він,<br />
тому й боїться<br />
поколотися об них.
 </div>
