<div class="wrap">
 <div class="page-title">
  <h1>Або-або</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Чоловік прийшов, як ніч,<br />
Пари слів не в'яже.<br />
— Яз тобою розлучусь! —<br />
Жінка йому каже. —<br />
Остогидла вже мені<br />
Вічна нервотряска.<br />
Або пиво, або я!<br />
Вибирай, будь ласка!<br />
П'яний мимрить: — Не кричи.<br />
Тьху, яка сварлива.<br />
Ти спочатку уточни,<br />
Скільки пляшок пива...
 </div>
