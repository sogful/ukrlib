<div class="wrap">
 <div class="page-title">
  <h1>Моя люба зоря ронить в серце мені</h1>
  <h2>Леся Українка</h2>
 </div>
 <div class="prose" id="content">
 Моя люба зоря ронить в серце мені,<br />
Наче сльози, проміння тремтяче,<br /><br />
Рвуть серденько моє ті проміння страшні.<br />
Ох, чого моя зіронька плаче!
 </div>
