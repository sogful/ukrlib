<body>
<div class="wrap">
 <div class="page-title">
  <h1>Біла курява</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Курява. Біла курява.<br />
Курява снігова.<br />
Далина в степу одурена,<br />
Ототожнена голова.<br /><br />
Курява. Біла курява.<br />
Курява снігова.<br />
Далина в степу одурена —<br />
Тільки люлька моя жива.
 </div>
