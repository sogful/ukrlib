<body>
<div class="wrap">
 <div class="page-title">
  <h1>Я — суцільне жадання тебе</h1>
  <h2>Світлана Йовенко</h2>
 </div>
 <div class="prose" id="content">
 Безвідмовне, безмовне, безмірне...<br />
<br />
Я — рабиня твоя і царівна.<br />
<br />
Хоч і в пекло з тобою тепер!<br />
<br />
Хоч на плаху —<br />
<br />
мов кара, жага.<br />
<br />
О, нема мені, грішній, прощення!<br />
<br />
А покинеш — піду я в прощання,<br />
<br />
як на ввігнаний в серце<br />
<br />
кинджал.
 </div>
</div>
