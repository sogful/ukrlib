<body>
<div class="wrap">
 <div class="page-title">
  <h1>Люби Батьківщину</h1>
  <h2>Марія Познанська</h2>
 </div>
 <div class="prose" id="content">
 Щоб ти був щасливий, — тобі заповім:<br />
Люби Батьківщину всім серцем своїм!<br />
Найбільше у світі люби ти її!<br />
Є інші держави, є інші краї —<br />
А рідна Вітчизна у світі одна,<br />
Для тебе, мій друже, як мати, вона.
 </div>
