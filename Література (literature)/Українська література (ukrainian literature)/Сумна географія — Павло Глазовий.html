 <div class="page-title">
  <h1>Сумна географія</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Каже дідові старому<br />
Третьокласник Яшка:<br />
— Географію, дідусю,<br />
Вивчити не важко.<br />
Все на карті, всю планету<br />
Можу показати.<br />
Це, дідусю, Україна,<br />
А оце — Карпати.<br />
Дід голівку кучеряву<br />
Ніжно гладить Яшці:<br />
— Ото тільки й України,<br />
Що є на бумажці...
