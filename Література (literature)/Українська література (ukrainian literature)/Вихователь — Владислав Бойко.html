<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вихователь</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 Вважає батьком він себе зразковим:<br />
дітей виховує не бійкою, а словом.<br />
Від слів отих, що з вуст його лунають,<br />
дорослі дяді вуха затуляють.
 </div>
