 <div class="page-title">
  <h1>Мухомори</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 Мухомор сказав до мухомора:<br />
— В нашім лісі ти найкращий гриб!—<br />
І подумав: "От яка потвора —<br />
Де ти взявсь, чорти тебе взяли б!"<br />
<br />
Мухомор одмовив мухомору:<br />
— В нашім лісі кращий ти за всіх! —<br />
І подумав: "Хто таку потвору<br />
Сотворив і виставив на сміх!"
 </div>
