<body>
<div class="wrap">
 <div class="page-title">
  <h1>Коли я був</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Коли я був у Панамі, —<br />
розгулював у піжамі,<br />
й ніхто не дивувався.<br /><br />
А повернувся додому,<br />
не розказав нікому,<br />
щоб ніхто не сміявся.<br /><br />
Ну, а тепер я вчуся<br />
гуляти у капелюсі<br />
і мокнути під дощами.<br /><br />
А нагуляюсь до краю —<br />
спати без ніг лягаю<br />
так само, як без Панами.
 </div>
