<body>
<div class="wrap">
 <div class="page-title">
  <h1>Золотий човник</h1>
  <h2>Степан Пушик</h2>
 </div>
 <div class="prose" id="content">
 Он летять журавлики —<br />
Літо йде!<br />
Зачепили сонечко<br />
Золоте!<br />
<br />
Сонце заховалося —<br />
Не знайти.<br />
Виплив місяць човником<br />
Золотим.<br />
<br />
Я б у цьому човнику<br />
Плив та плив.<br />
Тільки де ж він веслоньки<br />
Загубив?<br />
Чи за гору впали десь,<br />
За круту?<br />
Ви скажіть, журавлики!<br />
Чути — "кру"!
 </div>
