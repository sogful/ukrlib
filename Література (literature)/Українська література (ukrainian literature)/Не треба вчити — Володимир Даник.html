<title>Не треба вчити</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не треба вчити</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 То у чому ж щастя наше?<br />
У латаній свиті?!<br />
Телевізор нам покаже,<br />
Як потрібно жити.<br />
А коли укотре знову<br />
Та іще й та сама,<br />
То Микита принципово<br />
Вимика рекламу.<br />
А крім того гучно й дзвінко<br />
Висловитись може:<br />
— А не треба вчити жінку...<br />
Витрачати гроші!
 </div>
</div>
