<body>
<div class="wrap">
 <div class="page-title">
  <h1>Заплети косу міцніш</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Я на страждання тебе веду —<br />
На повільне згорання.<br />
Вибухнемо на прощання —<br />
Так написано на роду.<br /><br />
І, може, в світі не бачив ніхто<br />
Боліда, за наш бучніш.<br />
Заплети косу міцніш,<br />
Застебни пальто…
 </div>
