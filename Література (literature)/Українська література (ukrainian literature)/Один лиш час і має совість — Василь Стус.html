<div class="wrap">
 <div class="page-title">
  <h1>Один лиш час і має совість</h1>
  <h2>Василь Стус</h2>
 </div>
 <div class="prose" id="content">
 Один лиш час і має совість:<br />
тече й тече, немов Дніпро.<br />
Не знаю, зло це чи добро —<br />
та загадкова невідомість<br />
вже й закінчитися спішить.<br />
І те — померти ачи жить —<br />
однаковісінько, їй богу ж<br />
однаково. Чи ти чи ні,<br />
а помремо на чужині,<br />
шукавши отчого порогу.
 </div>
