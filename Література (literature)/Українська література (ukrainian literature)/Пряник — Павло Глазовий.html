 <div class="page-title">
  <h1>Пряник</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 — У вас зуби є, дідусю? —<br />
Онучок питає.<br />
Дід журливо посміхнувся:<br />
— Вже давно немає...<br />
Це почувши, хлопченятко<br />
Зраділо без краю:<br />
— Тоді пряник потримайте,<br />
А я пострибаю!
