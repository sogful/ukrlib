<body>
<div class="wrap">
 <div class="page-title">
  <h1>Притулив до стінки людину</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Притулив до стінки людину,<br />
Витяг нагана&#8230;<br />
Придивляйсь, дітлоха, з-за тину, –<br />
Гра бездоганна!<br /><br />
Потім їли яєшню з салом,<br />
До синців тисли Мотрі груди&#8230;<br />
О, минуле! Твоїм васалам<br />
І в майбутньому тісно буде!
 </div>
