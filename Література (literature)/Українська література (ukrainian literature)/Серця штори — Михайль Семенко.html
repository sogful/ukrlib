<div class="wrap">
 <div class="page-title">
  <h1>Серця штори</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Що тобі каже не мапі море?<br />
Яка самотна у присмерк постать!<br />
Вирисуються у пітьмі твори —<br />
Тоді поїдем у гості.<br /><br />
До рідних скель через степи і гори,<br />
Через Азію по веселій лінії.<br />
А тепер… Затули серця штори,<br />
Не буди туги осінньої.
 </div>
