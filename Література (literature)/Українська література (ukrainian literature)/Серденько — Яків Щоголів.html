<body>
<div class="wrap">
 <div class="page-title">
  <h1>Серденько</h1>
  <h2>Яків Щоголів</h2>
 </div>
 <div class="prose" id="content">
 Стрів козак дівчину,<br />
Став їй казати:<br />
Дівчино-рибчино,<br />
Як тебе звати?<br />
<br />
Глянула дівчина<br />
Й зачервоніла,<br />
Та і не стямилась,<br />
Як говорила:<br />
<br />
Звуть мене донею<br />
Батько та ненька;<br />
Ти ж, як зустрінешся,<br />
Скажеш: "Серденько!"
 </div>
