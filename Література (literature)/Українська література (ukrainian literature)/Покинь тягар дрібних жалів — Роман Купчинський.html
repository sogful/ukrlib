<div class="wrap">
 <div class="page-title">
  <h1>Покинь тягар дрібних жалів...</h1>
  <h2>Роман Купчинський</h2>
 </div>
 <div class="prose" id="content">
 Покинь тягар дрібних жалів,<br />
Турботи сірих днів.<br />
Найкращий лік для нас усіх —<br />
Веселий спів, безжурний сміх.<br />
<br />
Лине час над нами бистро<br />
І стрясає цвіт життя.<br />
Тільки чесне товариство<br />
Дасть хвилину забуття.
 </div>
