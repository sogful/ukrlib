<body>
<div class="wrap">
 <div class="page-title">
  <h1>Козак Андрій</h1>
  <h2>Наталія Поклад</h2>
 </div>
 <div class="prose" id="content">
 Сива шапка набакир, —<br />
хто цей хлопчик-богатир?<br />
Витанцьовує гопак —<br />
ну й мастак!<br />
<br />
Шаровари ловлять вітер,<br />
сорочина біло світить,<br />
чобіточки усміхаються —<br />
ледь підлоги доторкаються.<br />
<br />
Це малий козак Андрій<br />
нам дарує танець свій.
 </div>
</div>
