 <div class="page-title">
  <h1>Лікар і Здоров'я</h1>
  <h2>Петро Гулак-Артемовський</h2>
 </div>
 <div class="prose" id="content">
 <p>(Приказка)</p>
<p>
Йшов Лікар у село — селу на безголов'я,</p>
<p>
А із села біжить, злякавшися, Здоров'я:</p>
<p>
"Куди, Здоров'ячко? — пита він.— Як ся можеш?"</p>
<p>
"Та цур тобі!.. я йду, куди ти не заходиш!"</p>
<p>
1 декабря 1820 года, Харьков</p>
