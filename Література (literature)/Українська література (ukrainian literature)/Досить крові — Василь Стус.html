<body>
<div class="wrap">
 <div class="page-title">
  <h1>Досить крові</h1>
  <h2>Василь Стус</h2>
 </div>
 <div class="prose" id="content">
 — Досить крові,— продекламував кат,<br />
коли ніж, загнаний мені поміж ребер,<br />
стримів у спині.<br />
А я подумав, скулившись весь од болю:<br />
що як він захоче ще й лікувати мене?
 </div>
