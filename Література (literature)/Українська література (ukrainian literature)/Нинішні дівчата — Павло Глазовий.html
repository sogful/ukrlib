<div class="wrap">
 <div class="page-title">
  <h1>Нинішні дівчата</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Докоряє дід онуці:<br />
— Дивні нині діти.<br />
Розучилися дівчата<br />
Навіть червоніти.<br />
А колись були дівчата<br />
Дуже соромливі.<br />
Скажеш слово — червоніли,<br />
Як той мак на ниві.<br />
А онучка аж руками<br />
Вдарила об поли:<br />
— Я, дідусю, уявляю,<br />
Що ви їм мололи!
 </div>
