<body>
<div class="wrap">
 <div class="page-title">
  <h1>Рідні поля</h1>
  <h2>Віктор Зубар</h2>
 </div>
 <div class="prose" id="content">
 Ось поля, долини,<br />
Ось зелені схили,<br />
Де в літа дитячі<br />
Набиравсь я сили.<br />
<br />
Де ловив устами<br />
Вітерці блакитні,<br />
Де кувало сонце<br />
Груди мої мідні.<br />
<br />
Тут мені співали<br />
Золоті билини<br />
Старовинні думи<br />
Рідної Вкраїни.<br />
Розпростерши руки,<br />
Мов лелека крила,<br />
Я тебе обняти<br />
Хочу, земле мила!..
 </div>
