<body>
<div class="wrap">
 <div class="page-title">
  <h1>Як чудово</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 Та звісно ж… не одненьку гривню!<br />
На сяйво барв… кипіння слів...<br />
Піар — це стрімко і активно,<br />
Піар — це… потаємний вплив!<br /><br />
Бува, у ціль влучає… знову!<br />
Але погодьтеся таки —<br />
Усе ж бо… як же це чудово,<br />
Що не запудрені мізки!
 </div>
