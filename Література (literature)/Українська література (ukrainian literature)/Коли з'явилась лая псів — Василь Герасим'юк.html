<div class="wrap">
 <div class="page-title">
  <h1>Коли з'явилась лая псів...</h1>
  <h2>Василь Герасим'юк</h2>
 </div>
 <div class="prose" id="content">
 Коли з'явилась лая псів<br />
і забрехала,<br />
між ними ти своє посів.<br />
Душа сховала<br /><br />
свої обгризені часи<br />
в старі бесаги,<br />
а що залишилось – на пси!<br />
На злі ватаги!<br /><br />
Трепети сивої сини<br />
зазнали скрути...<br />
Неначе іншої ціни<br />
не може бути…
 </div>
