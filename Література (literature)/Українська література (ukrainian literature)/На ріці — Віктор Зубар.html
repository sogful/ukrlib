<body>
<div class="wrap">
 <div class="page-title">
  <h1>На ріці</h1>
  <h2>Віктор Зубар</h2>
 </div>
 <div class="prose" id="content">
 Гомону, гомону вранці<br />
Там на лужку-бережку:<br />
Діти міцні, як спартанці,<br />
Скачуть з верби у ріку.<br />
<br />
Сонце жарке розімліле,<br />
Кинувши в річку свій бриль,<br />
Теж набирається сили,<br />
Плаває радо між хвиль.
 </div>
