<div class="wrap">
 <div class="page-title">
  <h1>На вокзалі</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 — Шановні зустрічаючі! Увага!<br />
Запізнюється поїзд "Київ — Прага"<br />
На дві години. Тому є нагода<br />
Зустріти за годину "Київ — Броди",<br />
Провести "Київ — Львів",<br />
"Надвірна — Косів",<br />
Та інші рейси... додатково оголосим.
 </div>
