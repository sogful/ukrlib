<div class="wrap">
 <div class="page-title">
  <h1>Що страшніше</h1>
  <h2>Петро Ребро</h2>
 </div>
 <div class="prose" id="content">
 Ілько на вухо — шу-шу-шу:<br />
— Дмитро про тебе, Грицю,<br />
Верзе — їй-богу, не брешу —<br />
Усяку небилицю.<br /><br />
— Хай, — одказав на теє Гриць, —<br />
Мені, щоб, друже, знав ти,<br />
Не страшно зовсім небилиць.<br />
Лиш не казав би правди!
 </div>
