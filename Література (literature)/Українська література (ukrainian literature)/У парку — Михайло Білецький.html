<div class="wrap">
 <div class="page-title">
  <h1>У парку</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Він її за руку взяв,<br />
Мовби випадково.<br />
Думав — гніватися буде,<br />
А вона — ні слова!<br />
Він їй рученьку стискає,<br />
Вона — мов не чує.<br />
Вже він її пригортає,<br />
Ось уже й цілує...<br />
— Чого мовчиш? — запитує.<br />
— Мама наказала,<br />
Щоб у парку з незнайомим<br />
Я не розмовляла!
 </div>
