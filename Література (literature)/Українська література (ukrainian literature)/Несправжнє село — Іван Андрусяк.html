<body>
<div class="wrap">
 <div class="page-title">
  <h1>Несправжнє село</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 Я цього метелика<br />
бачила по телику,<br />
зайчика-розвідника –<br />
в мультику по відику,<br />
а телятко – ось воно! –<br />
зустрічала у кіно.<br />
Також справжнього коня<br />
і маленьке слоненя.<br />
<br />
А в бабусі у селі<br />
слоненята є малі?<br />
Як, немає?! Й не було?<br />
Ну й неспра-а-авжнє тут село…
 </div>
