<body>
<div class="wrap">
 <div class="page-title">
  <h1>Без жартів</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Ви назвали мене дурнем?<br />
Це, звичайно, жарти?<br />
— Ні!<br />
— То добре...<br />
Бо зі мною<br />
Жартувать не варто!
