<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мій день народження</h1>
  <h2>Микола Вінграновський</h2>
 </div>
 <div class="prose" id="content">
 Мій день народження — це ти.<br />
Повите муками у тебе є минуле.<br />
В огні буденної людської суєти<br />
У мене є майбутнє незаснуле.<br /><br />
В первонароджену хвилину чистоти<br />
З тобою обмінялись ми серцями —<br />
Моє майбутнє в грудях носиш ти,<br />
А твої муки я повив піснями.
 </div>
</div>
