 <div class="page-title">
  <h1>Атож, ота...</h1>
  <h2>Анатолій Мойсієнко</h2>
 </div>
 <div class="prose" id="content">
 "Атож, ота".<br />
І<br />
За руку – раз,<br />
В кабак, в<br />
Бар "Краб".<br />
– Каву, чувак!<br />
Ух, кави вакху<br />
Ув зіллі... Зву<br />
Її.<br />
– Завжди джаз...<br />
– І – раті гітар, і...<br />
Умугикав, аки гуму.
 </div>
