<div class="wrap">
 <div class="page-title">
  <h1>Коли гай на обрію квітне...</h1>
  <h2>Олекса Стефанович</h2>
 </div>
 <div class="prose" id="content">
 <blockquote>Л.А.</blockquote><br />
<br />
Коли гай на обрію квітне,<br />
То здається очам,<br />
Що розкішне царство блакитне<br />
Розгортається там.<br />
А наближ його володіння —<br />
Десь подінеться синь...<br />
Далечінь тому лише синя,<br />
Що вона — далечінь.<br />
<br />
Прага, 1928
 </div>
