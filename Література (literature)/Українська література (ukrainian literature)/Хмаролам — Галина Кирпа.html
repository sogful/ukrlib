<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хмаролам</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Може, таменьки хмаролам<br />
ходить<br />
і ламає хмарки<br />
зісподу?<br />
Хмарку — лам,<br />
і другу — лам,<br />
мов навсправжки<br />
ХМАРО-ЛАМ!
 </div>
