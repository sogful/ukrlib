<body>
<div class="wrap">
 <div class="page-title">
  <h1>Клени</h1>
  <h2>Богдан-Ігор Антонич</h2>
 </div>
 <div class="prose" id="content">
 Схилились два самітні клени,<br />
читаючи весни буквар,<br />
і знов молюсь землі зеленій,<br />
зелений сам, немов трава.<br />
<br />
Оброслий мохом лис учений<br />
поетику для кленів склав.<br />
Співає день, співають клени,<br />
лопоче сонячна стріла.
 </div>
