<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вівчарик</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 Вівчарику-дударику!<br />
Заграй у свій ріжок! —<br />
Бредуть овечки гречкою,<br />
теля скубе стіжок&#8230;<br /><br />
А де ж отой вівчарик,<br />
що вівці тут пасе?<br />
В травиці під копицею<br />
заснув собі та й все!<br /><br />
А хто його будитиме? —<br />
Не я, не я, не я!<br />
Не хочу я, щоб плакало<br />
розбуркане хлоп&#8217;я!
 </div>
