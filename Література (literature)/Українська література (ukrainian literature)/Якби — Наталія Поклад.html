<body>
<div class="wrap">
 <div class="page-title">
  <h1>Якби</h1>
  <h2>Наталія Поклад</h2>
 </div>
 <div class="prose" id="content">
 Якби я мав сестричку,<br />
я б їй книжки читав,<br />
гуляв би разом з нею<br />
і разом з нею спав.<br />
<br />
Віддав би я сестричці<br />
всі іграшки свої<br />
і на сопілці грати<br />
навчив би я її...
 </div>
</div>
