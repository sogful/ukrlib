<body>
<div class="wrap">
 <div class="page-title">
  <h1>У лузі</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 Цілий день пасуться в лузі<br />
найулюбленіші друзі:<br />
<br />
і корова<br />
чорноброва,<br />
і телиця<br />
білолиця…<br />
<br />
А бичок,<br />
ко-ло-бо-чок,<br />
тихо вклався на бочок.<br />
Каже: – Я уже попас,<br />
а тепер поспати час.
 </div>
</div>
