 <div class="page-title">
  <h1>Два</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Лічилка<br />
<br />
Літо, спека, бо жнива.<br />
В житі зайчиків аж два.<br />
— Де ми будем, брате, жити,<br />
Як покосять в полі жито?<br />
<br />
— Раз, два — та й тікати<br />
Буде нас стіжок ховати!<br />
Раз, два — та й зима...<br />
В ліс втечемо — нас нема.<br />
<br />
Раз і два, раз і два.
 </div>
