<div class="wrap">
 <div class="page-title">
  <h1>Тут ліс повалений лежав...</h1>
  <h2>Василь Герасим'юк</h2>
 </div>
 <div class="prose" id="content">
 Тут ліс повалений лежав,<br />
гіллям трупіни прикривав<br />
немовби сам себе чімхав<br />
і падав, де стояв.<br /><br />
Тоді настала тут весна,<br />
змагались води і вітри,<br />
і в сонці зблиснула згори<br />
сокира замашна!<br /><br />
Вже я: "Дитину забери!" –<br />
кричу очима діда з дна<br />
старого міста.
 </div>
