<title>Запливає ранок</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Запливає ранок</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Запливає ранок<br />
голубим човном:<br />
сонце — за веслярика,<br />
за музику — гном.<br />
<br />
Вже година човнику<br />
до берега пристать.<br />
Запливає ранок.<br />
Весла хлюпотять.
 </div>
</div>
