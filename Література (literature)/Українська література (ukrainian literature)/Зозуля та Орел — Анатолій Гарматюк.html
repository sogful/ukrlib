<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зозуля та Орел</h1>
  <h2>Анатолій Гарматюк</h2>
 </div>
 <div class="prose" id="content">
 — Яка в тобі краса і сила!<br />
А дзьоб який, а крила! —<br />
Зозуля так Орла хвалила<br />
І в такт хвостом вертіла.<br />
<br />
Орел не витримав:<br />
— Нахабна ти без меж,<br />
Учора Півню говорила те ж.<br />
Від мене похвали даремно ждеш.
 </div>
