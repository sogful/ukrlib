<body>
<div class="wrap">
 <div class="page-title">
  <h1>Заклик</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Перестаньте сваритися,<br />
сварливі!<br />
Втамуйте голод,<br />
голодні!<br />
Кохайтеся до нестями,<br />
закохані!<br />
Втричі більше ревнуйте,<br />
ревниві!<br />
Щоб поети усього світу<br />
писали елегії<br />
і серенади!..
 </div>
</div>
