<div class="wrap">
 <div class="page-title">
  <h1>Метаморфози</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 Як замом став, то де, до лиха,<br />
взялась відразу в нього пиха!<br />
Та зайде зав — і в зама пиха<br />
куди й дівається до лиха...
 </div>
