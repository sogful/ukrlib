<body>
<div class="wrap">
 <div class="page-title">
  <h1>Я – Леда, ти – цитаделя...</h1>
  <h2>Анатолій Мойсієнко</h2>
 </div>
 <div class="prose" id="content">
 Я – Леда, ти – цитаделя,<br />
Закопана напоказ...<br />
Ув орбіті брову<br />
Я –<br />
Воркун у кров...<br />
І мажорно сон рожам,<br />
А тіло літа...<br />
І тіл експресія... І серп скелі ті –<br />
Аж ржа<br />
З<br />
Літ, з тіл...<br />
О, тявся свято!<br />
І тіло поламало політ, і...<br />
Я – Леда. Ти – цитаделя?
 </div>
</div>
