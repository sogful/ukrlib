<body>
<div class="wrap">
 <div class="page-title">
  <h1>Шукаю роботу</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 "Шукаю роботу<br />
На пів, чверть зарплати,<br />
Умію доноси і скарги<br />
Писати.<br />
І різного роду наклепи,<br />
Протести.<br />
Та ще до інфаркту<br />
Швиденько довести".
 </div>
</div>
