<div class="wrap">
 <div class="page-title">
  <h1>Всі враз! — Як розрив гранати...</h1>
  <h2>Олекса Стефанович</h2>
 </div>
 <div class="prose" id="content">
 "Всі враз!" — Як розрив гранати,<br />
Як гострий короткий стріл<br />
Мов меч, що руба навпіл,<br />
Десь тяжко брязнув об ґрати.<br />
<br />
Всі враз, всі сорок соколіх,<br />
Всі сорок мільйонов серць —<br />
І, втіхши, побачать герць<br />
Прапори ворога долі.<br />
<br />
1935
 </div>
