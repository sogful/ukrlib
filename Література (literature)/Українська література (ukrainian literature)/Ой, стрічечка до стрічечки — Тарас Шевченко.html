<title>Ой, стрічечка до стрічечки</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ой, стрічечка до стрічечки</h1>
  <h2>Тарас Шевченко</h2>
 </div>
 <div class="prose" id="content">
 Ой стрічечка до стрічечки,<br />
Мережаю три ніченьки,<br />
Мережаю, вишиваю,<br />
У неділю погуляю.<br />
Ой плахотка-червчаточка<br />
Дивуйтеся, дівчаточка,<br />
Дивуйтеся, парубки,<br />
Запорозькі козаки.<br />
<br />
Ой дивуйтесь, лицяйтеся,<br />
А з іншими вінчайтеся,<br />
Подавані рушники…<br />
Отаке-то, козаки!
 </div>
</div>
</body>
