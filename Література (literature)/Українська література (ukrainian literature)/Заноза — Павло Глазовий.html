 <div class="page-title">
  <h1>Заноза</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Сказав якось Федір Галка<br />
Занозі Панькові:<br />
— Ти чому не розмовляєш<br />
На вкраїнській мові?<br />
— Зачим вона мінє нада? —<br />
Прошипів Заноза. —<br />
Што я — дядько тібє, что лі,<br />
З какогось колхоза?
 </div>
