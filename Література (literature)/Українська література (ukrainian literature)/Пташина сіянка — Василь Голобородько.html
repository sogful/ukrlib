<div class="wrap">
 <div class="page-title">
  <h1>Пташина сіянка</h1>
  <h2>Василь Голобородько</h2>
 </div>
 <div class="prose" id="content">
 Синку, пильнуй навесні<br />
не пропустити синичку з торбинкою:<br />
покладеш туди насінинку трави —<br />
хай летить собі<br />
і посіє десь,<br />
де город синички,<br />
річка синички,<br />
школа синички,<br />
діти синички,<br />
які починають навесні<br />
читати зелений буквар.
 </div>
