<body>
<div class="wrap">
 <div class="page-title">
  <h1>У тебе тонке болісне обличчя...</h1>
  <h2>Кость Котко</h2>
 </div>
 <div class="prose" id="content">
 У тебе тонке болісне обличчя<br />
І великі сумні очи.<br />
Хочу —<br />
Залишитись<br />
Назавжди отак… в юрбі…<br />
Дивлячись тобі<br />
У вічі —<br />
Здалі…<br />
<br />
Я заховавсь у ворожій натовпленій залі.<br />
Я переливсь у вічі сумні.<br />
<br />
Ти мене не знаєш? Ні?
 </div>
</div>
