<body>
<div class="wrap">
 <div class="page-title">
  <h1>Заздрість</h1>
  <h2>Євген Юхниця</h2>
 </div>
 <div class="prose" id="content">
 <p>Та що це з ним— За мить змінився...</p>
<p>
Застигла посмішка, мов крига...</p>
<p>
Чи то надувся, чи знітився,</p>
<p>
Як та несвіжа мамалига,</p>
<p>
Hемов побачив щось гидотне,</p>
<p>
Hемов колгоспники-естета,</p>
<p>
Hемов, повірив в неістотне,</p>
<p>
Hі, то поет зустрів поета...</p>
 </div>
</div>
