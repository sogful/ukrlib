<div class="wrap">
 <div class="page-title">
  <h1>Прийми мене, весно рожева...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Прийми мене, весно рожева,<br />
Слугою твоєї краси,<br />
Візьміть мене братом, дерева,<br />
Візьміть мене в прийми, ліси.<br />
<br />
Розкрию я широко віти,<br />
До сонця гілля простягну,<br />
І буду вам пісню шуміти,<br />
Казатиму казку ясну...
 </div>
