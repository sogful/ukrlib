<title>Дощ іде пішки</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дощ іде пішки</h1>
  <h2>Дмитро Куровський</h2>
 </div>
 <div class="prose" id="content">
 Райдуга — дуга,<br />
Сива хмара — віз,<br />
А грім — жеребець,<br />
А блискавка — віжки.<br />
<br />
Їдуть-їдуть!<br />
Їдуть-їдуть! —<br />
А дощ іде пішки.
 </div>
</div>
