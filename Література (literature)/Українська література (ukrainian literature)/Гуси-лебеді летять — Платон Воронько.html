<body>
<div class="wrap">
 <div class="page-title">
  <h1>Гуси-лебеді летять</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Гуси-лебеді летять,<br />
Просять їсти, квилять.<br />
Я поставила пшениці<br />
У дубовому коритці.<br />
Гуси не сідають,<br />
Далі пролітають<br />
В рідні луговиська,<br />
В добрі пасовиська.
 </div>
</div>
