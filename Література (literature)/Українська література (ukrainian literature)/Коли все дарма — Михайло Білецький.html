<title>Коли все дарма</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Коли все дарма</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Хай ви встали до світання,<br />
Хай охрипли від промов,<br />
Сотні про силосування<br />
Настрочили постанов,<br />
Очі лізуть хай на лоба...<br />
Та коли кормів нема —<br />
Все дарма!<br />
Постанов не їсть худоба!
 </div>
</div>
