<div class="wrap">
 <div class="page-title">
  <h1>Взяла Орися кошеня</h1>
  <h2>Володимир Сосюра</h2>
 </div>
 <div class="prose" id="content">
 Взяла Орися кошеня<br />
Й воно подряпало їй руки<br />
І сльози падали в онучі<br />
Їх витирав з любов&#8217;ю я.<br /><br />
&#8220;Чи будеш гнать за ним усюди<br />
І в руки брать це кошеня?&#8221;<br />
І відповіло маленя<br />
Одним коротким словом: &#8220;Буду&#8221;.
 </div>
