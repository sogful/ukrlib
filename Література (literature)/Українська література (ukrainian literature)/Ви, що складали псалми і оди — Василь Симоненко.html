<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ви, що складали псалми і оди</h1>
  <h2>Василь Симоненко</h2>
 </div>
 <div class="prose" id="content">
 Ви, що складали псалми і оди,<br />
Світ оглядали крізь щілини рам —<br />
Як ви боїтеся, що вийде в люди<br />
Ваш заношений храм!<br /><br />
Говоріть голосніше, ридайте більше —<br />
Може, й прилипне комусь до рук.<br />
А ні — то зав&#8217;язуйте пояс тугіше,<br />
Ідіть і глитайте брук.
 </div>
