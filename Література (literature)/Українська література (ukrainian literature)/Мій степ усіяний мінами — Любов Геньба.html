<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мій степ усіяний мінами...</h1>
  <h2>Любов Геньба</h2>
 </div>
 <div class="prose" id="content">
 Мій степ усіяний мінами,<br />
але ми це змінимо,<br />
але ми ворога виманимо<br />
ще, на Махновську дугу.<br />
І буде він без імені,<br />
із позначкою на тімені,<br />
лежать під Заріччям, на вигоні,<br />
вічно у нас у боргу.
 </div>
</div>
