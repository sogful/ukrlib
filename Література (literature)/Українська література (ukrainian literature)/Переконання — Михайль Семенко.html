<body>
<div class="wrap">
 <div class="page-title">
  <h1>Переконання</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Моя думка пестила мріюі.<br />
Які дрібненькі квіточки!<br />
І мрія шептала: я тебе зогрію —<br />
Припести думки!<br /><br />
І було так багато здивованості<br />
В нашім яснім єднанні.<br />
Ми — щасні в цій прикованості,<br />
У цім переконанні.
 </div>
