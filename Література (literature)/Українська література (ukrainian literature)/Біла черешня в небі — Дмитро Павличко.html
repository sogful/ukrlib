<body>
<div class="wrap">
 <div class="page-title">
  <h1>Біла черешня в небі</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 Біла черешня в небі<br />
Над селом проплива,<br />
Ніби заснулий лебідь,<br />
Під крилом — голова.<br />
<br />
Дівчина жде на мене,<br />
Де бринять ячмені,<br />
Веселим брилем ромену<br />
Махає вона мені.<br />
<br />
Мрієм про дні прийдешні,<br />
Про те, як станем людьми.<br />
Втім, чуємо, як черешня<br />
Залопотіла крильми.
 </div>
