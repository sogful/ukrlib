<div class="wrap">
 <div class="page-title">
  <h1>Зима</h1>
  <h2>Богдан-Ігор Антонич</h2>
 </div>
 <div class="prose" id="content">
 Кравці лисицям хутра шиють,<br />
вітри на бурю грізно трублять.<br />
О доле, стережи в завію<br />
І людські, і звірячі кубла.<br />
<br />
У ста млинах зима пшеницю<br />
на сніг сріблясто-синій меле.<br />
Назустріч бурі ніч іскриться,<br />
приваблюючи небом села.
 </div>
