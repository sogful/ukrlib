<body>
<div class="wrap">
 <div class="page-title">
  <h1>До бабусі</h1>
  <h2>Наталія Поклад</h2>
 </div>
 <div class="prose" id="content">
 До бабусі у село<br />
небагато прибуло:<br />
татко і матуся,<br />
я і кішка Туся,<br />
і папуга Буздуган,<br />
і дарунків чемодан,<br />
поки їх дивилися,<br />
геть усі втомилися.
 </div>
</div>
