 <div class="page-title">
  <h1>В передчутті</h1>
  <h2>Іван Малкович</h2>
 </div>
 <div class="prose" id="content">
 Дитинку носить, Бога просить<br />
і сни дитинчині — мені<br />
розказує, і в напівсні<br />
до ката (місяця) голосить.<br /><br />
І наслухає — ще не мама —<br />
ще маменятко лиш, однак<br />
тривоги тої — повне море…<br /><br />
Вслухаюсь в серденько так само:<br />
тулюсь, шепчу йому про гори,<br />
і вгадуємо долі знак.
 </div>
