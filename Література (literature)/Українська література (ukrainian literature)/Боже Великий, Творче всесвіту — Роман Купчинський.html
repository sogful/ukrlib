<body>
<div class="wrap">
 <div class="page-title">
  <h1>Боже Великий, Творче всесвіту...</h1>
  <h2>Роман Купчинський</h2>
 </div>
 <div class="prose" id="content">
 Боже Великий, Творче всесвіту,<br />
На нашу землю поглянь!<br />
Ми були вірні Твому завіту,<br />
Вислухай нині наших благань.<br />
<br />
Люд у кайданах, край у руїні,<br />
Навіть молитись ворог не дасть…<br />
Боже Великий, дай Україні<br />
Силу і славу, волю і власть.
 </div>
