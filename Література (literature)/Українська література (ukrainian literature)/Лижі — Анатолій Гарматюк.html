<div class="wrap">
 <div class="page-title">
  <h1>Лижі</h1>
  <h2>Анатолій Гарматюк</h2>
 </div>
 <div class="prose" id="content">
 Лесь на лижах — перший раз.<br />
— Ой, та що це з ними,—<br />
Він дивується весь час,—<br />
З лижами отими?<br />
Спотикаються вони,<br />
Їдуть в різні боки.<br />
Через них подер штани,<br />
Падаю щокроку.—<br />
Розвело хлоп'я руками:<br />
— Ой, аж ноги мліють…<br />
Ну й купила лижі мама —<br />
Їздити не вміють!
 </div>
