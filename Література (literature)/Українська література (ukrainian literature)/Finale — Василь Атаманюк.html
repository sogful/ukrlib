 <div class="page-title">
  <h1>Finale</h1>
  <h2>Василь Атаманюк</h2>
 </div>
 <div class="prose" id="content">
 По тисячу поцілунках,<br />
Ще й ще по одному,<br />
Цілував тебе б я, серце,<br />
І не кидав дому.<br />
<br />
Що один солодкий, другий<br />
Солодший за того,<br />
Цілував тебе б я з ранку<br />
До ранку другого.<br />
<br />
По тисячу поцілунках<br />
Розстатись не сила,<br />
Якому б з них буть останнім,<br />
Не відаю, мила.
 </div>
