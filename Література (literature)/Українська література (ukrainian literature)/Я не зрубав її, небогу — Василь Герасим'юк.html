<div class="wrap">
 <div class="page-title">
  <h1>Я не зрубав її, небогу...</h1>
  <h2>Василь Герасим'юк</h2>
 </div>
 <div class="prose" id="content">
 Я не зрубав її, небогу,<br />
я тільки шепотів: "Пади…<br />
і перегороди дорогу,<br />
смереко, перегороди.<br /><br />
Ми ж молимось одному богу,<br />
з одної глини і води.<br />
Щоб мали ми й одну дорогу,<br />
дорогу перегороди".
 </div>
</div>
