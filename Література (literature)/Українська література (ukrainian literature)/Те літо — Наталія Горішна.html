<body>
<div class="wrap">
 <div class="page-title">
  <h1>Те літо</h1>
  <h2>Наталія Горішна</h2>
 </div>
 <div class="prose" id="content">
 <p>Я кричала "люблю!" – у повітря,</p>
<p>
Я стогнала у землю – "люблю…",</p>
<p>
Коли літо ввійшло в повноліття,</p>
<p>
Відчуваючи силу свою.</p>
<p>
Здійняло&#769;ся розвихреним валом,</p>
<p>
Поскладало свій посаг у схов.</p>
<p>
І тебе, мов зернину, сховало</p>
<p>
У безплідну посмертну любов.</p>
 </div>
</div>
