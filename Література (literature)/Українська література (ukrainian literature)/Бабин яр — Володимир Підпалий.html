<div class="wrap">
 <div class="page-title">
  <h1>Бабин яр</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 У Бабин яр!.. А там джерела<br />
водою крижаною б&#8217;ють,<br />
у синім небі каравели<br />
бездомних хмар пливуть<br />
і пропливають без печалі<br />
за сум, за суть, за сміх&#8230;<br />
На тихі вечорів скрижалі<br />
слів не стає моїх.<br />
Отут заснути без печалі,<br />
сказавши все, що міг&#8230;
 </div>
