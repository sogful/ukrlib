 <div class="page-title">
  <h1>Не раз душа моя скимить...</h1>
  <h2>Степан Чарнецький</h2>
 </div>
 <div class="prose" id="content">
 * * *<br /><br />
Не раз душа моя скимить<br />
В глухі беззвіздні ночі,<br />
І сум туманний давить грудь<br />
І до землі толочить…<br /><br />
Не сниться стать мені твоя,<br />
Ні твої сині очі,<br />
А душа стогне і скимить<br />
В глухі беззвіздні ночі…<br /><br />
***<br /><br />
Джерело:Цифрова Українська Бібліотека.
