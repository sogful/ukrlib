<div class="wrap">
 <div class="page-title">
  <h1>Коник</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Я зробив собі конька,<br />
Стригуночка-воронька.<br />
Взяв, запріг його у возик,<br />
Але він мене не возить.<br />
Попросив би я конька<br />
На конюшні у Ілька,<br />
Не вербового,<br />
Живого,<br />
Та боюсь — впаду із нього<br />
Всім на сміх і на біду...<br />
Краще з цим у двір піду.
 </div>
