<div class="wrap">
 <div class="page-title">
  <h1>Я сьогодні в тузі, в горі</h1>
  <h2>Леся Українка</h2>
 </div>
 <div class="prose" id="content">
 Я сьогодні в тузі, в горі,<br />
Мов у тяжкім сні, –<br /><br />
Отруїли ясні зорі<br />
Серденько мені.
