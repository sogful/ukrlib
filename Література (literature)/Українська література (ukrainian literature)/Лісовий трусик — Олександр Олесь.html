<div class="wrap">
 <div class="page-title">
  <h1>Лісовий трусик</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Виліз Трусик. Озирнувсь.<br />
Став на задні: щось послухав...<br />
Шийку лапкою почухав<br />
І доріжкою метнувсь.<br />
<br />
Став. Назад і вправо — зирк!<br />
Тиша. Вискочив на гірку.<br />
Аж — сорока! Круть! — і в нірку!<br />
Сів. Сидить. Анічичирк.
 </div>
