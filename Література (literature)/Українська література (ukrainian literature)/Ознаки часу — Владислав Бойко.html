 <div class="page-title">
  <h1>Ознаки часу</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 Коли із милою під вишнею стояв —<br />
варіював одну й ту ж саму тему:<br />
— Тебе я так, голубко, покохав,<br />
що ти повік — у серденьку моєму!<br /><br />
З'єдналися вони... А час пливе,<br />
прочитано життя не 'дну сторінку —<br />
і вже голубка в серці не живе;<br />
переселилась звідти у печінку!
 </div>
