<body>
<div class="wrap">
 <div class="page-title">
  <h1>Кораблик</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 Приплив до нас кораблик,<br />
з чужих країв приплив.<br />
У трюмі — повно яблук,<br />
в каютах — повно слив.<br /><br />
І все на нім казкове,<br />
небачене в житті:<br />
і паруси шовкові,<br />
і щогли золоті.
 </div>
