<body>
<div class="wrap">
 <div class="page-title">
  <h1>Коли закінчиться війна...</h1>
  <h2>Олекса Бик</h2>
 </div>
 <div class="prose" id="content">
 Коли закінчиться війна<br />
І всі повернуться додому,<br />
Коли зі стін аеродрому<br />
Зітруться їхні імена,<br />
Коли відродиться земля<br />
Перетравивши кулі й міни,<br />
Ти мовчки плюнеш на руїни<br />
Колись могутнього Кремля.
 </div>
