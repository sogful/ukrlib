<div class="wrap">
 <div class="page-title">
  <h1>Гаряче душа молилась...</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Гаряче душа молилась,<br />
Лихом вражена новим;<br />
Наді мною ти схилилась,<br />
Ніби світлий херувим.<br />
<br />
І замовкло люте горе,<br />
Серце марить, ожива...<br />
Чи надовго? Де ти, зоре?<br />
Боже! Хмара виплива.
 </div>
