 <div class="page-title">
  <h1>Десь там планети в просторі безмеж...</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 Десь там планети в просторі без меж<br />
яка сумна у безвісти ночівля!<br />
А може, ми їм світимося теж?<br />
А може ми їм — зіронька вечірня?
