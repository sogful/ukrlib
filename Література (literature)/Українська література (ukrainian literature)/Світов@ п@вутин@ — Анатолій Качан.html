  <h1>Світов@ п@вутин@</h1>
  <h2>Анатолій Качан</h2>
 </div>
 <div class="prose" id="content">
 <em>Загадка*</em><br />
<br />
Цю загадку-недомовку<br />
Загадав мій друг Микола:<br />
"Хто сьогодні без вірьовки<br />
Прив'язав мене до столу?<br />
<br />
В павутину невідому<br />
Я попав, як риба в сіті,<br />
І забув, чи я на цьому,<br />
Чи уже на тому світі".<br />
<br />
<em>* Відповідь — у тексті загадки.</em>
