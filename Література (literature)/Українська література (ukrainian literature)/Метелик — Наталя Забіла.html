<body>
<div class="wrap">
 <div class="page-title">
  <h1>Метелик</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 Я біжу, біжу по гаю,<br />
Я метелика впіймаю,<br />
А метелик не схотів,<br />
Геть від мене полетів.<br />
Полетів він на лужок,<br />
Заховався між квіток...<br />
Я іду, іду, іду,<br />
Метелика не знайду.
 </div>
</div>
