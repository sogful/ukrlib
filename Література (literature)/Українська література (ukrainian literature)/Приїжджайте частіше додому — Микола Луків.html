<body>
<div class="wrap">
 <div class="page-title">
  <h1>Приїжджайте частіше додому...</h1>
  <h2>Микола Луків</h2>
 </div>
 <div class="prose" id="content">
 Приїжджайте частіше додому,<br />
Щоб не мучила совість потому.<br />
Ні грошей не привозьте, ні слави, –<br />
Будьте з рідними ніжні й ласкаві.<br />
Бо не вічні ні батько, ні мати,<br />
Завтра можете їх не застати.<br />
Щоб не мучила совість потому,<br />
Приїжджайте частіше додому.
 </div>
</div>
