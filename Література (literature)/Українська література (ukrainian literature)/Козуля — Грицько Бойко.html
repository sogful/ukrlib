 <div class="page-title">
  <h1>Козуля</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Кізонька-козуля<br />
Маленька,<br />
Кізонька-козуля<br />
Гарненька.<br />
Підійшла козуля<br />
До річки<br />
Чистої попити<br />
Водички.
 </div>
