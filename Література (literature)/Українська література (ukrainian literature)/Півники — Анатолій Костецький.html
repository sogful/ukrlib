<body>
<div class="wrap">
 <div class="page-title">
  <h1>Півники</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 Знов півники на квітнику<br />
заквітли так блакитно,<br />
що я від неба їх ніяк<br />
не можу відрізнити.<br />
<br />
І пахощі від них такі,<br />
що я питаю в себе:<br />
"Це небом пахнуть півники,<br />
чи півниками — небо?.."
 </div>
</div>
