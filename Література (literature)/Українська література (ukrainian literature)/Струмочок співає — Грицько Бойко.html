<body>
<div class="wrap">
 <div class="page-title">
  <h1>Струмочок співає</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Мов білі морквинки ясні,<br />
Бурульки висять весняні.<br />
З-під снігу земля вигляда.<br />
І капає тала вода:<br />
Кап-кап!<br />
Кап-кап!<br />
<br />
Вітерець-летунець прилетів,<br />
Він вісті приніс із полів,—<br />
Що буде травичка рости,<br />
Що проліски стали цвісти<br />
В ліску,<br />
В ліску.
 </div>
