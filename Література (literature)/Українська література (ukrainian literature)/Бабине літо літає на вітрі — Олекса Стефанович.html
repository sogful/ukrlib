<div class="wrap">
 <div class="page-title">
  <h1>Бабине літо літає на вітрі...</h1>
  <h2>Олекса Стефанович</h2>
 </div>
 <div class="prose" id="content">
 Бабине літо літає на вітрі.<br />
Бабине літо...<br />
Що це пахуче таке у повітрі<br />
Розлито?..<br />
Листя — мов злотом обвіяні віття,<br />
Листя, мов злото...<br />
Хмарка там ясна, чи птахи то світять<br />
Одльотом?..
 </div>
