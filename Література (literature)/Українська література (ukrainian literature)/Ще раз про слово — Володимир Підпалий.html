<div class="wrap">
 <div class="page-title">
  <h1>Ще раз про слово</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Ет, ну що й говорити &#8211; дива:<br />
з дива пива ждати дарма &#8211;<br />
тьмою тьменною сунуть слова,<br />
а між ними слова нема.<br /><br />
Чи його десь лихий пристрів<br />
на поторжці?.. А коли &#8211; ні,<br />
хай уб&#8217;є мене чорний грім,<br />
тільки слово явить мені!..
 </div>
