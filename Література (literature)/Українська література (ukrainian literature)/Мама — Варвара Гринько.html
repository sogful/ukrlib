<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мама</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Ще в колисці немовля<br />
Слово "мама" вимовля.<br />
Найдорожче в світі слово<br />
Так звучить у рідній мові.<br />
Мати, матінка, матуся,<br />
Мама, мамочка, мамуся.<br />
Називаю тебе я,<br />
Рідна ненечко моя!
 </div>
