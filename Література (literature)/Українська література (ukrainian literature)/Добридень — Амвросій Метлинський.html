<body>
<div class="wrap">
 <div class="page-title">
  <h1>Добридень</h1>
  <h2>Амвросій Метлинський</h2>
 </div>
 <div class="prose" id="content">
 Добридень!<br />
Глянь, який усюди день:<br />
Світ вже в хаті й надворі;<br />
Вже зібрались косарі<br />
Та в клепала дзень, дзень, дзень!<br />
Добридень!<br /><br />
Годі спать!<br />
На роботу уставать<br />
Спозаранку привикай,<br />
Та й мене лишень не гай:<br />
Бо пора й почастувать!<br />
Годі спать!
 </div>
