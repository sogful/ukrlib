<div class="wrap">
 <div class="page-title">
  <h1>Нічні пастухи буття</h1>
  <h2>Кость Москалець</h2>
 </div>
 <div class="prose" id="content">
 Нічні пастухи буття<br />
Угорі весняна лампа<br />
і зелене полум'я в небесах<br />
зорана земля і бездомна<br />
вечір буйний у бутті<br />
стихне<br />
сам<br />
<br />
і загасне полум'я<br />
скло зелене трісне<br />
і вечірні коні<br />
стануть зовсім темні<br />
<br />
як весна<br />
або<br />
Одкровення
 </div>
