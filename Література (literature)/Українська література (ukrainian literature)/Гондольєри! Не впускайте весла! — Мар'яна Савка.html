 <div class="page-title">
  <h1>Гондольєри! Не впускайте весла!..</h1>
  <h2>Мар'яна Савка</h2>
 </div>
 <div class="prose" id="content">
 Гондольєри! Не впускайте весла!<br />
Йде весна Венецією п’яна.<br />
На каналів різнобарвні плеса<br />
Викотилось яблуко рум’яне.<br />
<br />
І вино густе, як кров венозна.<br />
Весняна Венеція довкола.<br />
Бозна-звідки ллється голос. Бозна…<br />
Баркарола. Чуєш? Баркарола…
 </div>
