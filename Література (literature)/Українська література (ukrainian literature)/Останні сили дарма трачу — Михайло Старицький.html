<div class="wrap">
 <div class="page-title">
  <h1>Останні сили дарма трачу</h1>
  <h2>Михайло Старицький</h2>
 </div>
 <div class="prose" id="content">
 Останні сили дарма трачу,<br />
Минає марно день по дню…<br />
Посивів волос, а ледачу<br />
Сльозу ніяк я не спиню;<br />
Поки життям ще серце тліє,<br />
Вона зі дна його зрина, –<br />
У ній одурена надія<br />
Й морозом стиснута весна.
 </div>
