<body>
<div class="wrap">
 <div class="page-title">
  <h1>Цапок</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 По обніжку йшов цапок,<br />
Опирався на ціпок.<br />
Він гіллячки із лози<br />
Ніс для білої кози.<br />
А для сірих козенят —<br />
Півмішка гарбузенят.<br />
Бородою тряс цапок,<br />
Опирався на ціпок.
 </div>
</div>
