<body>
<div class="wrap">
 <div class="page-title">
  <h1>Чудесна бритва</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Чоловік як сяде бритись,<br />
Так і почалося:<br />
— Ну й дере ж клятюща бритва!<br />
Просто рве волосся...<br /><br />
І не витримала жінка:<br />
— Це вже ти нечесно...<br />
Я картоплю нею чищу —<br />
Так бере чудесно...
 </div>
