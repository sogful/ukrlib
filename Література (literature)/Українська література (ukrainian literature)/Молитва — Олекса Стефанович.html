 <div class="page-title">
  <h1>Молитва</h1>
  <h2>Олекса Стефанович</h2>
 </div>
 <div class="prose" id="content">
 О, Ти, що тамо, де Почаїв,<br />
Під небом вставши голубим,<br />
Далеко в простори засяяв<br />
Золотоглавієм своїм,<br />
О, Найсвятішая, Єдина,<br />
До стіп схиляюся чиїх,<br />
Умилостив свойого Сина,<br />
Щоб від одра її воздвиг!<br />
<br />
Прага, 1926.
 </div>
