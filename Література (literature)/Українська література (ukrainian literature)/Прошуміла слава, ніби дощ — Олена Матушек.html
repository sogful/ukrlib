<div class="wrap">
 <div class="page-title">
  <h1>Прошуміла слава, ніби дощ...</h1>
  <h2>Олена Матушек</h2>
 </div>
 <div class="prose" id="content">
 Прошуміла слава, ніби дощ,<br />
Висохли дороги і калюжі.<br />
А зрадлива злива крила дужі<br />
Вже над іншим іменем полоще.<br />
<br />
Все минає, бо, як не ростем,<br />
Лиш відлуння в полі залишаєм...<br />
Літо ж пам'ятають не дощем,<br />
Літо ж пам'ятають – урожаєм...
 </div>
