<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хто як тренується</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Гриць як сталеві м'язи має —<br />
Бо він гантелі піднімає.<br />
<br />
Тренує м'язи і Іванко:<br />
До турніка іде щоранку.<br />
<br />
В Степана ж турніка нема,<br />
Гантелі він не підніма.<br />
<br />
Руками часто він махає,<br />
Коли на зборах виступає.<br />
<br />
Про нього кажуть хлопчаки:<br />
— Язик тренує дві руки!
 </div>
