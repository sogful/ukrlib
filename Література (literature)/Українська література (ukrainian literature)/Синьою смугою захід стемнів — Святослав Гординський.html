<body>
<div class="wrap">
 <div class="page-title">
  <h1>Синьою смугою захід стемнів...</h1>
  <h2>Святослав Гординський</h2>
 </div>
 <div class="prose" id="content">
 Синьою смугою захід стемнів,<br />
Понад яругою пил закурів,<br />
В плесі відбилися осокори,<br />
Тихо спустилися тіні згори,<br />
Щедро розсипали на полини<br />
Й перекотиполе зоряні сни:<br />
Сходить невловними кроками ніч,<br />
Слів недомовлених, серце, не клич!
 </div>
