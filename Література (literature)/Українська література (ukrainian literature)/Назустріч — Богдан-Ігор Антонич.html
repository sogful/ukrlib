<div class="wrap">
 <div class="page-title">
  <h1>Назустріч</h1>
  <h2>Богдан-Ігор Антонич</h2>
 </div>
 <div class="prose" id="content">
 Росте хлоп'я, мов кущ малини,<br />
підкови на шляхах дзвенять.<br />
Ось ластівки в книжках пташиних<br />
записують початок дня.<br />
<br />
Запрягши сонце до теліги,<br />
назустріч виїду весні.<br />
Окриленим, хрещатим снігом<br />
співають в квітні юні дні.
 </div>
