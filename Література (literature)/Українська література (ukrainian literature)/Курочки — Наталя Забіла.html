<body>
<div class="wrap">
 <div class="page-title">
  <h1>Курочки</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 На подвір'ї курочки —<br />
Ціпу, ціпу, ціп!<br />
Ось Маринка й Юрочка<br />
Кришать ціпкам хліб.<br />
Ціпки бачать кришечки,<br />
Дзьобики — тук-тук!<br />
Весь шматок — ой лишенько!<br />
Вихопили з рук!
 </div>
</div>
