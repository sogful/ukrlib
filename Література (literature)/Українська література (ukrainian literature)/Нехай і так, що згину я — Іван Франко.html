<title>Нехай і так, що згину я</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Нехай і так, що згину я</h1>
  <h2>Іван Франко</h2>
 </div>
 <div class="prose" id="content">
 Нехай і так, що згину я,<br />
Забутий десь під тином,<br />
Що всі мої думки, діла<br />
Сліду не лишать, мов та мла<br />
На небі синім!<br /><br />
Нехай і так! Я радо йду<br />
На чесне, праве діло!<br />
За нього радо в горі вмру<br />
І аж до гробу додержу<br />
Свій прапор ціло.
 </div>
</div>
