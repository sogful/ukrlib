<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мій боже милий, знову лихо!..</h1>
  <h2>Тарас Шевченко</h2>
 </div>
 <div class="prose" id="content">
 Мій боже милий, знову лихо!..<br />
Було так любо, було тихо;<br />
Ми заходились розкувать<br />
Своїм невольникам кайдани.<br />
Аж гульк!.. Ізнову потекла<br />
Мужицька кров! Кати вінчанні,<br />
Мов пси голодні за маслак,<br />
Гризуться знову.
 </div>
</div>
