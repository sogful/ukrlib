<body>
<div class="wrap">
 <div class="page-title">
  <h1>Серйозна розмова про звірів</h1>
  <h2>Сергій Пантюк</h2>
 </div>
 <div class="prose" id="content">
 Дідусь:<br />
— Слухайте-но правду<br />
Замість баєчок:<br />
Вийшли на веранду<br />
Вовк і віслючок.<br />
Ви, можливо, мені й не повірите,<br />
Але дружать давненько вже звірі ті!<br />
<br />
Онуки:<br />
<br />
— Ну і що ж то за звір з віслючка?<br />
<br />
Дідусь:<br />
— Запитайте в трави й будячка!
 </div>
</div>
