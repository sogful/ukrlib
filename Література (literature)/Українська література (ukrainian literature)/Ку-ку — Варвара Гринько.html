<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ку-ку</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 На зеленому суку<br />
Зачепилося "ку-ку"...<br />
Линь, зозуленько, сюди,<br />
Дам пшонця і дам води,<br />
Посідаєм край воріт —<br />
Накуємо двісті літ.<br />
<br />
— Ку-ку-ку, ку-ку-ку! —<br />
То зозуля на суку:<br />
— Не злечу я до воріт,<br />
Біля тебе сірий кіт.
 </div>
</div>
