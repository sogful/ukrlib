<div class="wrap">
 <div class="page-title">
  <h1>Місцем прирощення крил до стебла...</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 місцем прирощення крил до стебла<br />
місцем приручення маски до миски<br />
дуже кортить аби кара була<br />
хоч на дещицю несхожа на вишкіл<br /><br />
дуже кортить аби сонце було<br />
примхою ката ув опочивальні<br />
і над лобами гніздилось тавро<br />
періодичного каменування
 </div>
