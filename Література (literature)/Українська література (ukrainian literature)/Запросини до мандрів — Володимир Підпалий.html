<body>
<div class="wrap">
 <div class="page-title">
  <h1>Запросини до мандрів</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Прошелестів під ногами пил,<br />
у колію наїжджену ліг.<br />
Смага палить губи.<br />
Напийсь<br />
і відпочинь від доріг.<br />
<br />
А завтра,<br />
як благословиться на світ,<br />
як сторона підійме червоний шовк,<br />
по голубій холодній траві<br />
за синьою птицею ходімо знов!<br />
1969
 </div>
