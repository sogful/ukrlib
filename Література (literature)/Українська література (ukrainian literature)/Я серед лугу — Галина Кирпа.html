<div class="wrap">
 <div class="page-title">
  <h1>Я серед лугу</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Стою серед лугу. Пташечка тенька.<br />
Бабки до вечора в піжмурки грають.<br />
Я проти неба — така маленька:<br />
до мене хмарки не долітають.<br /><br />
Річечка лугом біжить вузенька,<br />
за нею вітер аж не встигає.<br />
Я проти світу така маленька,<br />
що він навряд чи про мене й знає.
 </div>
