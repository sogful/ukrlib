<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не розібрався</h1>
  <h2>Вадим Крищенко</h2>
 </div>
 <div class="prose" id="content">
 Хлопчик Петрик<br />
Насмішив усіх,<br />
Сплутав знов<br />
Морозиво і сніг.<br />
Бо на сніг,<br />
Який встелив наш двір,<br />
Він сказав:<br />
Морозяний пломбір.<br />
Сніжку взяв<br />
І майже всеньку з'їв.<br />
Далі що?<br />
Спитайте лікарів.
 </div>
</div>
