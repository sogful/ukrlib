 <div class="page-title">
  <h1>Чорногуз</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 — Де літав ти, чорногуз?<br />
— Купував собі картуз.<br />
<br />
— Де ж він?<br />
Дай-но подивиться!<br />
— Поміняв на рукавиці.<br />
<br />
— Що ж, узимку тепло буде.<br />
— Де там!<br />
Їх зміняв на бублик.<br />
<br />
— Ну, а бублик де подів?<br />
— Та летів назад — і з'їв...
 </div>
