<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мушка-політушка</h1>
  <h2>Юрій Будяк</h2>
 </div>
 <div class="prose" id="content">
 Мушка, мушка-<br />
політушка,<br />
в ложку сіла —<br />
юшку з'їла,<br />
їстку крала —<br />
в миску впала<br />
та й пропала —<br />
діткам<br />
їстку<br />
зіпсувала,<br />
Гони, гони<br />
мушку,<br />
щоб не впала<br />
в юшку<br />
та не пила страви,<br />
не зробила вави.<br />
Гай-гай-гай,<br />
переймай,<br />
лиху муху-<br />
політуху<br />
виганяй,<br />
гай-гай,<br />
гай-гай!
 </div>
