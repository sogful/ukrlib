<body>
<div class="wrap">
 <div class="page-title">
  <h1>Руська мова</h1>
  <h2>Маркіян Шашкевич</h2>
 </div>
 <div class="prose" id="content">
 Руська мати нас родила,<br />
Руська мати нас повила,<br />
Руська мати нас любила:<br />
Чому ж мова єй немила?<br />
Чом ся нев встидати маєм?<br />
Чом чужую полюбляєм?..
 </div>
</div>
