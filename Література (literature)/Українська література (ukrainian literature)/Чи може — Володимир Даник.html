<body>
<div class="wrap">
 <div class="page-title">
  <h1>Чи може</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 Куди все ж — у ворота... чи у тин!<br />
Радість удачі?! Чи, на жаль, непруха!<br />
Живемо у часи тривожних змін,<br />
Отож не слід — розвішувати вуха!<br /><br />
Ще вистачає для усіх — галер...<br />
Отож і гострий біль у попереку!<br />
Ви, дядьку, ще у форвардах тепер —<br />
Чи може... перебрались у хавбеки?!
 </div>
