<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дама й драма</h1>
  <h2>Петро Ребро</h2>
 </div>
 <div class="prose" id="content">
 — Більш не прийду в театр оцей! —<br />
В фойє обурювалась дама. —<br />
Лише обдурюють людей:<br />
В афіші пишуть крупно: "драма".<br /><br />
Нікого тут ніхто не 6'є,<br />
Ніхто не зраджує нікого.<br />
Як на понятіє моє,<br />
Так це комедія, їй-богу!
 </div>
