<body>
<div class="wrap">
 <div class="page-title">
  <h1>Три</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Лічилка<br />
<br />
Приступаємо<br />
До гри:<br />
М'яч один,<br />
А нас<br />
Аж три.<br />
<br />
Грав я сам,<br />
І грали вдвох.<br />
А тепер Пограєм<br />
Втрьох.<br />
<br />
Раз, два, три –<br />
Приступаємо до гри.
 </div>
</div>
