<body>
<div class="wrap">
 <div class="page-title">
  <h1>О, стрункі твої ноги, стрункі...</h1>
  <h2>Наталя Лівицька-Холодна</h2>
 </div>
 <div class="prose" id="content">
 О, стрункі твої ноги, стрункі,<br />
і усмішка така проста!<br />
А у мене обійми палкі<br />
і солодкі, як мед, уста.<br />
<br />
О, міцні твої руки, міцні,<br />
і бездонна глибінь очей!<br />
Золоті, як весна, наші дні,<br />
і палка самота ночей.
 </div>
