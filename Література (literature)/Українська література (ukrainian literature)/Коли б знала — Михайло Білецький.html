<body>
<div class="wrap">
 <div class="page-title">
  <h1>Коли б знала...</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Увечері не встиг Тимко<br />
Додому з'явиться,<br />
Як назустріч йому жінка —<br />
Лясь його по пиці!<br />
— За що? — пита бідолаха.<br />
— Замовчи, ледащо!<br />
Коли б знала, за що бити,<br />
Не так би дала ще!
 </div>
