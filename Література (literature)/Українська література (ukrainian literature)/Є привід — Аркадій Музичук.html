<div class="wrap">
 <div class="page-title">
  <h1>Є привід</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 — Взяли Грицька! — Петро Мартину. —<br />
І не маленький світить строк...<br />
— За що?<br />
— Та жінку свою кинув.<br />
— Ти переплутав щось, дружок.<br />
Я кинув трьох і маю волю.<br />
І буде ще не менше трьох.<br />
— Грицько з балкона кинув Олю.<br />
Є привід випить за обох.
 </div>
