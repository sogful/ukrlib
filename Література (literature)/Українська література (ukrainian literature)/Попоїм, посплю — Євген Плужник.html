 <div class="page-title">
  <h1>Попоїм, посплю</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Попоїм, посплю&#8230; Щасливий ніби.<br />
Роздобув собі штани нові!<br />
Тільки очі так немов у риби<br />
Та на в'язах мулько голові.<br /><br />
Дотягнусь, пурну – і буде тихо!<br />
Мудреці!<br />
Через віщо серце ніби віхоть<br />
У чужій невимитій руці?
 </div>
