 <div class="page-title">
  <h1>Слово це – старовинна будова</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Загадка<br /><br />
Слово це — старовинна будова<br />
з гостряками мурованих веж.<br />
Щойно зміниш ти наголос слова<br />
цим одразу будову замкнеш.<br /><br />
Що це за слово?<br /><br />
(замок, замок)
 </div>
