<div class="wrap">
 <div class="page-title">
  <h1>Тумба</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 — Отже, друже, ти нарешті<br />
Знайшов собі пару?<br />
Вчора з тумбою якоюсь<br />
Брів по тротуару.<br />
Нащо таке опудало<br />
Тобі, молодому?<br />
— То я з клубу твою жінку<br />
Проводжав додому.
 </div>
