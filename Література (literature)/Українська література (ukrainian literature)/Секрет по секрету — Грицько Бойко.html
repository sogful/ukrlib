<title>Секрет по секрету</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Секрет по секрету</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Я вмію держать<br />
За зубами язик.<br />
А от мій товариш<br />
До цього не звик.<br />
Секрет він почує<br />
Від мене —<br />
І зразу ж секрет<br />
У Семена.<br />
Семен по секрету<br />
Розкаже рідні,<br />
І мій же секрет<br />
По секрету — мені!
 </div>
</div>
</body>
