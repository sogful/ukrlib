<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дивлюсь я на яснії зорі</h1>
  <h2>Леся Українка</h2>
 </div>
 <div class="prose" id="content">
 Дивлюсь я на яснії зорі,<br />
Смутні мої думи, смутні.<br /><br />
Сміються байдужії зорі<br />
Холодним промінням мені.<br /><br />
Ви, зорі, байдужії зорі!<br />
Колись ви інакші були,<br /><br />
В той час, коли ви мені в серце<br />
Солодку отруту лили.
 </div>
