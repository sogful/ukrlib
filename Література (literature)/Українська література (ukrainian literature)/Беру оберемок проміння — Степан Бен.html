 <div class="page-title">
  <h1>Беру оберемок проміння...</h1>
  <h2>Степан Бен</h2>
 </div>
 <div class="prose" id="content">
 Беру оберемок проміння<br />
Жовто-пухкої кульбаби,<br />
Стелю і лягаю.<br />
Коло мене коса,<br />
Молоток і мантачка.<br />
Бриль золотий захищає від спеки…<br />
А в небі лелеки.<br />
Далеко-далеко<br />
Якісь невідомі лани<br />
І високі намети…<br />
Хороше бути ліриком степу,<br />
Молодим косарем<br />
І поетом!<br />
<br />
1926
 </div>
