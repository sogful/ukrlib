<div class="wrap">
 <div class="page-title">
  <h1>Музо, ритмом ти розум...</h1>
  <h2>Анатолій Мойсієнко</h2>
 </div>
 <div class="prose" id="content">
 Музо, ритмом ти розум.<br />
О<br />
Музо, реве розум...<br />
Мила, поета за те опалим.<br />
І, рівен зневірі,<br />
Уріс у сіру<br />
Дорогу, що дощ у город.<br />
О<br />
Віро босих... Охи соборів...<br />
І на бані –<br />
Над Гобі! – Богдан.
 </div>
