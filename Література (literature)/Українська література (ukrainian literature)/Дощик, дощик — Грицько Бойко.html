<title>Дощик, дощик</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дощик, дощик</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Дощик,<br />
Дощик! —<br />
Аж залопотіло.<br />
Ліс і поле,<br />
Все навколо<br />
Дощику зраділо.<br />
Дощик,<br />
Дощик! —<br />
По дорозі стука.<br />
Ми краплини,<br />
Мов перлини,<br />
Ловимо у руки.<br />
Дощик,<br />
Дощик! —<br />
Не дає гуляти.<br />
Ми з ляльками,<br />
З іграшками<br />
Біжимо до хати.
 </div>
</div>
