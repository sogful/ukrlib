<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дівочих непорочних ліній</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 Дівочих непорочних ліній<br />
Довершеність – літак і лук.<br />
Вона прийшла у день осінній,<br />
Вся повна чародійних мук.<br /><br />
На грудях, на стрункому лоні<br />
Одежу тихо розпина.<br />
Неначе куля на долоні,<br />
Лежить прекрасна і страшна.
 </div>
