<body>
<div class="wrap">
 <div class="page-title">
  <h1>Половина правди</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 З кулаками перестріла<br />
Циганочку Люда:<br />
— Ти ж мені наворожила,<br />
Що у мене буде<br />
Чоловік і троє діток,<br />
Квартира і дача...<br />
Та я вештаюсь по світу<br />
І від горя плачу.<br />
Бо півправду ти сказала,<br />
Брехухо велика,<br />
Я діток лише надбала...<br />
Давай чоловіка!
 </div>
