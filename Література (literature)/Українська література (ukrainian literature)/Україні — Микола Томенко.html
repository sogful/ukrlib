<div class="wrap">
 <div class="page-title">
  <h1>Україні</h1>
  <h2>Микола Томенко</h2>
 </div>
 <div class="prose" id="content">
 Україно,<br />
у серцях-перлинах<br />
світиться твій образ, як зоря.<br />
Підняли тебе аж на вершину<br />
непокірні крила Кобзаря.<br />
І нікому, рідна, у негоду<br />
опустити не дамо тебе,<br />
бо в твого великого народу<br />
небо<br />
золотисто-голубе.
 </div>
