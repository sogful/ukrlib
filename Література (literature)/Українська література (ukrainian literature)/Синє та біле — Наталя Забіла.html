<title>Синє та біле</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Синє та біле</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 Синє небо, синє море,<br />
білий парус вдалині.<br />
Понад морем — сині гори<br />
й білі хмари, наче сніг.<br />
На матросах білий одяг,<br />
тільки сині комірці.<br />
І біленька ляля ходить<br />
з синім м'ячиком в руці.
 </div>
</div>
