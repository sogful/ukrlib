 <div class="page-title">
  <h1>Крізь хмару</h1>
  <h2>Віра Багірова</h2>
 </div>
 <div class="prose" id="content">
 З дідусем жену отару<br />
Крізь вечірню теплу хмару.<br />
І в оцій туманній хвилі —<br />
Білі трави, вівці білі,<br />
І дзвіночки дзвонять збоку,<br />
І ліхтар моргає оком,<br />
А крисаня в дідуся —<br />
Наче місяць в небесах.<br />
<br />
<strong>Джерело: </strong>Київ "Веселка" 1989
