<body>
<div class="wrap">
 <div class="page-title">
  <h1>Старосвітська пісенька</h1>
  <h2>Олена Пчілка</h2>
 </div>
 <div class="prose" id="content">
 Превеселий сей день,<br />
Ходім гулять на весь день,<br />
Та вкрадемо порося,<br />
Та й прославимося!<br />
А порося утекло,<br />
Тільки руки попекло.<br />
Утік, утік кабанець —<br />
Зоставсь хріну корінець,<br />
Що у роті він держав,<br />
Сам п'ятами накивав,<br />
Ніхто його не догнав!
 </div>
