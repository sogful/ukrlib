<body>
<div class="wrap">
 <div class="page-title">
  <h1>Працьовита</h1>
  <h2>Анатолій Гарматюк</h2>
 </div>
 <div class="prose" id="content">
 Сова щоночі<br />
Скаржиться без краю:<br />
— Ну й перевтомлююсь!<br />
Ночей недосипаю!<br />
А як розвидниться —<br />
Анітелень:<br />
Спить як убита<br />
Цілий день.
 </div>
