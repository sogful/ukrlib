<body>
<div class="wrap">
 <div class="page-title">
  <h1>Насолода кохання</h1>
  <h2>Василь Атаманюк</h2>
 </div>
 <div class="prose" id="content">
 Жаром палає, пашить наше тіло,<br />
Чаром сіяють твої ясні очи,<br />
Сили охляли, душа оп’яніла,<br />
Вкрили нас ніжні пеленочки ночі.<br />
<br />
І не почує ніхто й не побаче<br />
Захват солодкий, ніжне раювання.<br />
Ти тільки й я, і бажання гаряче,<br />
Й темна нічка до видного рання.
 </div>
