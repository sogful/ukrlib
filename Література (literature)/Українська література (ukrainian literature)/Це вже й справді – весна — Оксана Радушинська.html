<div class="wrap">
 <div class="page-title">
  <h1>Це вже й справді – весна</h1>
  <h2>Оксана Радушинська</h2>
 </div>
 <div class="prose" id="content">
 Це вже й справді — весна?<br />
Це трава вже з-під снігу гукає?<br />
Прілим листям ярів<br />
Зустрічає, прокинувшись, ліс…<br />
Це вже й справді — весна?<br />
О, як серце когось виглядає<br />
З-поза обрію снів,<br />
З капежу дрімливицих беріз…
 </div>
