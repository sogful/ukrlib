 <div class="page-title">
  <h1>Здогадлива</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 Раділа Курка:<br />
— Знаєте, сестриці, —<br />
тепер нам не страшні оті лисиці!<br />
Казав Хазяїн, що з нового року<br />
поріже всіх — щоб збути цю мороку!
 </div>
