<body>
<div class="wrap">
 <div class="page-title">
  <h1>Забудько</h1>
  <h2>Михайло Стельмах</h2>
 </div>
 <div class="prose" id="content">
 Дуже зранку, на світанку,<br />
Шпарить котик на рибалку.<br />
Котик миттю всівсь на грудку<br />
Закидає в річку вудку.<br />
До полудня просидів,<br />
А нічого не зловив,<br />
Бо забувся на гачок<br />
Наживити черв&#8217;ячок.
 </div>
</div>
