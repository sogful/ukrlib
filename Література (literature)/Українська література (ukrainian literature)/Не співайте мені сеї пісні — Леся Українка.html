<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не співайте мені сеї пісні</h1>
  <h2>Леся Українка</h2>
 </div>
 <div class="prose" id="content">
 Не співайте мені сеї пісні,<br />
Не вражайте серденька мого!<br />
Легким сном спить мій жаль у серденьку,<br />
Нащо співом будити його?<br /><br />
Ви не знаєте, що я гадаю,<br />
Як сиджу я мовчазна, бліда.<br />
То ж тоді в мене в серці глибоко<br />
Сяя пісня сумная рида!
 </div>
</div>
