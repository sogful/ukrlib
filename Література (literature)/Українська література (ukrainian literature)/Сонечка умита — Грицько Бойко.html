<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сонечка умита</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Задивилось сонечко<br />
На маленьку Сонечку:<br />
Сонечка умита,<br />
Сонечка удіта,<br />
Чисті черевички,<br />
У косичках стрічки.<br />
Усміхнулось сонечко<br />
До малої Сонечки.
 </div>
</div>
