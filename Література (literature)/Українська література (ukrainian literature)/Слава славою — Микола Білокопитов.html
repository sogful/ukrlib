<body>
<div class="wrap">
 <div class="page-title">
  <h1>Слава славою...</h1>
  <h2>Микола Білокопитов</h2>
 </div>
 <div class="prose" id="content">
 Глобальну тему<br />
розробив поет<br />
І в двох рядках<br />
зумів її розкрити.<br />
Прийшли визнання<br />
і авторитет,<br />
І — гонорар...<br />
— А треба ж якось жити, —<br />
Зітхнув поет.<br />
Узяв мізерну тему<br />
І о-от-такенну<br />
сотворив поему.
 </div>
