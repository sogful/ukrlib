  <h1>Польова зустріч</h1>
  <h2>Степан Бен</h2>
 </div>
 <div class="prose" id="content">
 ПОЛЬОВА ЗУСТРІЧ<br />
Глянула…<br />
Таким гарячим золотим рум'янцем<br />
Зацвіли щоки,<br />
Заблищав серп коло пояса.<br />
Пригадую:<br />
На його блискучій поверхні<br />
Коливались дві веселі сині волошки.<br />
<br />
1924
