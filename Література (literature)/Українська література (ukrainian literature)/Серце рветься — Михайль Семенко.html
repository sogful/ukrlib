<body>
<div class="wrap">
 <div class="page-title">
  <h1>Серце рветься</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Лягає сум і серце б'ється,<br />
Згадаю як літа старі.<br />
Пусти — і зразу понесеться,<br />
Куди — не знаю, а мерщій<br />
В глибоке небо серце рветься,<br />
В широкий молиться простір.
 </div>
