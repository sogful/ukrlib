<div class="wrap">
 <div class="page-title">
  <h1>Ходили білі вишні по саду</h1>
  <h2>Микола Сингаївський</h2>
 </div>
 <div class="prose" id="content">
 Ходили білі вишні по саду,<br />
і ніч цвіла під кронами вишневими.<br />
Щасливу думу думав я тоді,<br />
що саме в цім краю міг народитись.<br /><br />
1 прагнула душа моя цвісти,<br />
немов на святі, власною любов&#8217;ю.<br />
Чого ж іще бажати, коли я<br />
з тобою злився, мій коханий краю.
 </div>
