<div class="wrap">
 <div class="page-title">
  <h1>Чому Тимко подряпаний</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 — Чому це ти подряпаний? —-<br />
Юрко Тимка пита.<br />
Тимко йому відказує:<br />
— Та я ж купав кота!<br />
<br />
— А я от не подряпаний,<br />
Хоч теж купав свого...<br />
— Еге, ти ж не викручував<br />
І не сушив його!
 </div>
