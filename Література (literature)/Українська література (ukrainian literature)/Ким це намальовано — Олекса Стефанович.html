<div class="wrap">
 <div class="page-title">
  <h1>Ким це намальовано...</h1>
  <h2>Олекса Стефанович</h2>
 </div>
 <div class="prose" id="content">
 Ким це намальовано<br />
На вікнах срібний сад?<br />
Ким це заціловано<br />
Лиця у дівчат?<br />
<br />
Хто це улаштовує<br />
З криштальної гори<br />
Сковзання санковеє,<br />
Баль для дітвори?<br />
<br />
Прага, 1926
 </div>
</div>
