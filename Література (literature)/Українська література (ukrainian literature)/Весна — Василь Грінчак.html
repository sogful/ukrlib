 <div class="page-title">
  <h1>Весна...</h1>
  <h2>Василь Грінчак</h2>
 </div>
 <div class="prose" id="content">
 Тане сніг. Чорніють полонини.<br />
Небо наче синькою взялось.<br />
Ручаї, зійшовшись на долині,<br />
Цілий день змовляються про щось.<br />
<br />
Непомітно, за якусь хвилину,<br />
Посивіли котики в теплі,<br />
Вилізли із бруньки на лозину<br />
І на сонці гріються малі...
 </div>
