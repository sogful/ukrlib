<div class="wrap">
 <div class="page-title">
  <h1>Бракує дрібнички...</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 Вже виросли ми з дядькового гумору,<br />
і з хати батькової,<br />
й з маминої пісні...<br />
От не навчились тільки жвачку гумову<br />
та замість хліба дядькового<br />
їсти.
