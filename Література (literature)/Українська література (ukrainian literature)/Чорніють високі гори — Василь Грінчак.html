<body>
<div class="wrap">
 <div class="page-title">
  <h1>Чорніють високі гори...</h1>
  <h2>Василь Грінчак</h2>
 </div>
 <div class="prose" id="content">
 Чорніють високі гори,<br />
Синіє вечірня даль.<br />
І міниться річка на сонці,<br />
Неначе розплавлена сталь.<br />
<br />
Лягає тиша у трави,<br />
Вечірня зоря встає.<br />
І коник зелений на скрипці<br />
Мелодію ночі снує.
 </div>
