<div class="wrap">
 <div class="page-title">
  <h1>Колискова</h1>
  <h2>Марина Соколян</h2>
 </div>
 <div class="prose" id="content">
 Місячна доріжка,<br />
Місячне шосе.<br />
Ти сумуєш трішки,<br />
Трішки, та й усе.<br />
Хай зітхає вітер,<br />
То його біда.<br />
Завтра буде літо,<br />
Сонце і вода.<br />
Ніч нечутно пише<br />
Букви сновидінь…<br />
Спи, буває гірше.<br />
І мотузку кинь.
 </div>
