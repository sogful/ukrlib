<body>
<div class="wrap">
 <div class="page-title">
  <h1>Оранжерея</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Де на горі Батиєвій масив<br />
у мареві червневому гойдає<br />
кварталами, сьогодні ледве я<br />
уперше за життя не став злочинцем:<br /><br />
в оранженеї, &#8211; як від школи йти, &#8211;<br />
до шкла голівки посхиляли маки<br />
й линяють проти сонця&#8230;<br /><br />
Каменюки<br />
ніде на все подвір&#8217;я не знайшлось!..
 </div>
