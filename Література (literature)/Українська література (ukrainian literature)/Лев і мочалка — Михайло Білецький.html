<body>
<div class="wrap">
 <div class="page-title">
  <h1>Лев і мочалка</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 У лісі вихвалявсь Вухатий,<br />
Що з Левом він живе,<br />
Як з рідним братом.<br />
Що навіть банитись у вихідні<br />
Без нього Лев не вирушає,<br />
Ні!<br />
І, вірите, Зайчисько не брехав —<br />
Лев справді банитись його з собою брав,<br />
Не міг без нього обійтись.<br />
Чому?<br />
Вухатий за мочалку був йому!
 </div>
</div>
