<body>
<div class="wrap">
 <div class="page-title">
  <h1>Веселий дощик</h1>
  <h2>Любов Голота</h2>
 </div>
 <div class="prose" id="content">
 По калюжах скік та скок —<br />
скаче дощик, як горох.<br />
<br />
Скок та скік,<br />
скок та скік —<br />
розбирає Паву сміх:<br />
на долоньку скочив<br />
і лоскоче дощик!<br />
<br />
Скок та скік,<br />
скок та скік —<br />
на траву і на горіх,<br />
на маленьку Паву<br />
і на мокру ґаву!<br />
<br />
Ґава ображається,<br />
а дощик не кінчається!
 </div>
