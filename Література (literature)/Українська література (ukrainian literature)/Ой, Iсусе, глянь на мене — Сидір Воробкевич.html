<div class="wrap">
 <div class="page-title">
  <h1>Ой, Iсусе, глянь на мене...</h1>
  <h2>Сидір Воробкевич</h2>
 </div>
 <div class="prose" id="content">
 Ой, Iсусе, глянь на мене,<br />
Зроби дитя добре з мене.<br />
В мене серце ще маленьке, —<br />
Хто в нiм буде?<br />
Ти — Iсусе дорогенький —<br />
Я тебе благаю,<br />
Рученьки зношу,<br />
Для мами, для тата<br />
Здоров'ячка прошу.<br />
Для дiда, бабусi<br />
I всеї родини<br />
Вислухай, Боже,<br />
Малої дитини.
 </div>
