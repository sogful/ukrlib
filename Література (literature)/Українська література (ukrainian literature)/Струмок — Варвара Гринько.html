 <div class="page-title">
  <h1>Струмок</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 — Ти куди біжиш, струмок?<br />
— Через поле у ярок.<br />
— І зупинишся в ярку?<br />
— Ні, звідтіль — в Десну-ріку!<br />
— Аз Десни-ріки куди?<br />
— До Дніпрової води.<br />
Попливу Дніпром у море,<br />
В море Чорне, неозоре.
