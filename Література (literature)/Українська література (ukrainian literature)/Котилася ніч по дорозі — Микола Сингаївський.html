<body>
<div class="wrap">
 <div class="page-title">
  <h1>Котилася ніч по дорозі</h1>
  <h2>Микола Сингаївський</h2>
 </div>
 <div class="prose" id="content">
 Котилася ніч по дорозі,<br />
колисала в житах перепілки.<br />
Спали зерна в тужавім колоссі,<br />
не зривалося яблуко з гілки.<br /><br />
Тиша спати собі стелила,<br />
та не спали в душі тривоги.<br />
Давні рани солдату боліли,<br />
і котилася ніч під ноги.
 </div>
