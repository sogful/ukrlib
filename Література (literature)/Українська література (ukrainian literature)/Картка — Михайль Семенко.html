<body>
<div class="wrap">
 <div class="page-title">
  <h1>Картка</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Мого життя газельну срібність<br />
І випадковість<br />
Складаю в картки вузьку безмірність<br />
І загадковість<br /><br />
Моїх гріхів легку безкарність<br />
І слів блискучість<br />
Знов наповняє безпорадність<br />
І днів сліпучість.
 </div>
