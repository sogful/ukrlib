<body>
<div class="wrap">
 <div class="page-title">
  <h1>Їдуть трактори</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Раз, два, три!<br />
Їдуть трактори.<br />
На переднім тато з братом<br />
Їдуть плугом степ орати.<br />
<br />
Я у братика питаю —<br />
Чи мене він покатає?<br />
Каже братик: "Підростеш,<br />
Сам цей трактор поведеш!"
 </div>
</div>
