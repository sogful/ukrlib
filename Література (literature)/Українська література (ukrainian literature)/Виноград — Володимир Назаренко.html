<div class="wrap">
 <div class="page-title">
  <h1>Виноград</h1>
  <h2>Володимир Назаренко</h2>
 </div>
 <div class="prose" id="content">
 Дощ заліз у виноград<br />
І гуляв до ранку.<br />
Вийшла вранці у сад<br />
Дівчинка Оксанка.<br />
<br />
І сказала: "Ой-ой-ой!<br />
Виноград чорненький —<br />
Повні грона вгорі,<br />
А внизу — ні жменьки.<br />
<br />
Певно, дощик цей малий<br />
Борщику їв мало —<br />
Там подзьобав, де я<br />
І сама б дістала"
 </div>
