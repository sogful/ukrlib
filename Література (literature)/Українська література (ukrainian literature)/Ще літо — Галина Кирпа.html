<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ще літо</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Скільки тут ще літа,<br />
літа,<br />
літа, —<br />
в нього досі молода хода.<br />
Ще верба зелена. Пахне жито.<br />
І бодай листок — не опада!<br /><br />
Тут так легко і просторо дихать!<br />
Скільки всюди стежок і доріг!<br />
Ця — співуча,<br />
а он та он — тиха.<br />
Й сонце — князь небесний — угорі!
 </div>
