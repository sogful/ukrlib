<div class="wrap">
 <div class="page-title">
  <h1>Сучасна лірика</h1>
  <h2>Василь Симоненко</h2>
 </div>
 <div class="prose" id="content">
 <em>(Чи не пародія, бува)</em><br /><br />
По лузі травами зеленими<br />
З газетою зім&#8217;ятою в руках,<br />
Натхненний рішеннями пленуму,<br />
Я лину на побачення, мов птах.<br /><br />
Для нас обох на даному моменті<br />
Нові можливості указує ЦК,<br />
Щоб цілуватися, як у цьому документі<br />
Велика партія нас заклика.
 </div>
