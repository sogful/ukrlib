<body>
<div class="wrap">
 <div class="page-title">
  <h1>Веснятка</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Дражнилка<br />
<br />
— Васильку, Васильку,<br />
Ти бавився в просі,<br />
Що цятки-просинки<br />
На щічках, на носі?<br />
— Дівчатка-росинки,<br />
А то ж не просинки!<br />
Руденькі веснятка —<br />
Окраса хлоп'ятка!
 </div>
