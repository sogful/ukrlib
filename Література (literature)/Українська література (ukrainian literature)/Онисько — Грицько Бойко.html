<body>
<div class="wrap">
 <div class="page-title">
  <h1>Онисько</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Вниз по сходах —<br />
Тупу-тупу! —<br />
Ніс Онисько<br />
Миску<br />
Супу.<br />
<br />
Мама каже:<br />
— Не впади!<br />
Обережненько<br />
Іди!<br />
<br />
— Не впаду! —<br />
Гукнув Онисько.—<br />
Я ж тримаюся<br />
За миску!
 </div>
