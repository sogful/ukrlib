<body>
<div class="wrap">
 <div class="page-title">
  <h1>Припасти знов до рук коханих...</h1>
  <h2>Наталя Лівицька-Холодна</h2>
 </div>
 <div class="prose" id="content">
 Припасти знов до рук коханих,<br />
Почути знов твій любий сміх<br />
І знать, що, завжди мною п’яний,<br />
Ти все шукаєш уст моїх.<br />
<br />
Було і є, і вічно буде<br />
Це свято соняшних утіх:<br />
Твоїх палких обіймів чудо<br />
І ніжність пестощів моїх.
 </div>
</div>
