<div class="wrap">
 <div class="page-title">
  <h1>Пропахли не тільки руки...</h1>
  <h2>Володимир Ярошенко</h2>
 </div>
 <div class="prose" id="content">
 Пропахли не тільки руки,<br />
Волосся пройшло і очи —<br />
Полинем, любистком і рухами<br />
Ночі.<br />
<br />
Там ходять тільки омани,<br />
Ворожба, сновиди й навроки,<br />
Де в болоті одбилось в тумані,<br />
В трясині – одиноке —<br />
Червоне, як рана —<br />
Місяця око.
 </div>
