 <div class="page-title">
  <h1>Синичка</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 Синичка сіла на поміст —<br />
цвірінь, цвірінь, цвірінь! —<br />
і заспівала жартома:<br />
цвірінь, цвірінь, цвірінь!<br /><br />
Насипать солі б їй на хвіст!..<br />
Цвірінь, цвірінь, цвірінь!<br />
Підкравсь —<br />
а пташки вже нема!,<br />
Цвірінь, цвірінь, цвірінь!
 </div>
