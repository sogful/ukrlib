<body>
<div class="wrap">
 <div class="page-title">
  <h1>Золотокудра дівчинка</h1>
  <h2>Наталя Забіла</h2>
 </div>
 <div class="prose" id="content">
 Золотокудра дівчинко,<br />
ходімо разом жить.<br />
Ніколи не посваримось,<br />
а будемо дружить.<br /><br />
Я в лузі вівці пастиму<br />
і гратиму в ріжок.<br />
А ти пектимеш на обід<br />
солодкий пиріжок.<br /><br />
А потім вишиватимеш<br />
шовкові сорочки<br />
і їстимеш медяники,<br />
цукерки та вершки.
 </div>
