<body>
<div class="wrap">
 <div class="page-title">
  <h1>Старе й мале</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 — Лягай спати вже, онучку, —<br />
Дід говорить басом. —<br />
Я, як був такий маленький,<br />
Лягав з курми разом.<br />
А онучок зуби скалить:<br />
— Як же ви там спали?<br />
Як же, діду, ви додолу<br />
З сідала не впали?
 </div>
