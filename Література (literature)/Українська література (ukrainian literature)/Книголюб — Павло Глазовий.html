 <div class="page-title">
  <h1>Книголюб</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Чоловік у книгах рився<br />
Зранку й до обіду.<br />
Жінка вийшла із квартири<br />
Й мовила сусіду:<br />
— Ти в пивну не клич Івана,<br />
Він за ум узявся.<br />
Все читає та читає,<br />
Книгами обклався.<br />
А сусід собі подумав:<br />
— Значить, все в порядку.<br />
Не збрехав, що десь у книзі<br />
Заховав десятку...
 </div>
