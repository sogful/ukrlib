 <div class="page-title">
  <h1>Трохи недоспиш</h1>
  <h2>Павло Тичина</h2>
 </div>
 <div class="prose" id="content">
 Трохи недоспиш,<br />
трохи недоїси —<br />
то й вірші гарні пишуться.<br /><br />
Мораль: як хочеш<br />
будь поетом —<br />
не спи уліжно,<br />
не їж уїжно.<br />
Будь настільки тонкий,<br />
щоб хміль поезії<br />
круг тебе<br />
вився.
 </div>
