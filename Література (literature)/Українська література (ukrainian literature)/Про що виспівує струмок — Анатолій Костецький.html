<div class="wrap">
 <div class="page-title">
  <h1>Про що виспівує струмок</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 Про що виспівує струмок<br />
Про сонце золоте.<br />
Про що співає колосок?<br />
Про те, як вік росте.<br />
Про що виспівує земля?<br />
Про неба синь і шир.<br />
Про що співаєм ти і я?<br />
Про маму і про мир!
 </div>
