<body>
<div class="wrap">
 <div class="page-title">
  <h1>Наш прапор</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 Небеса блакитні<br />
сяють з глибини,<br />
а пшеничні й житні<br />
мерехтять лани.<br />
<br />
Образ цей не зблідне,<br />
хоч минуть жнива.<br />
Це знамено рідне —<br />
злото й синява.<br />
<br />
Прапор наш, як літо,<br />
в сонці майорить —<br />
по долині жито,<br />
по горі блакить.
 </div>
