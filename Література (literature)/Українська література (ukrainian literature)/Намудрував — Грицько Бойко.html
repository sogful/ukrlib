 <div class="page-title">
  <h1>Намудрував</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Дві шпаківні торішні<br />
Прикріпив він на вишні:<br />
— Прилітайте, шпаки,<br />
Дорогі співаки!<br />
<br />
А опудало — рядом<br />
Височіє над садом:<br />
— Хай же влітку шпаки<br />
Не клюють вишеньки!<br />
<br />
І весна вже минає —<br />
Ходить хлопець, зітхає:<br />
— Де ж веселі шпаки?<br />
Чом пустують хатки?
 </div>
