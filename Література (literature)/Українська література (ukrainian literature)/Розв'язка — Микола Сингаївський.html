<div class="wrap">
 <div class="page-title">
  <h1>Розв'язка</h1>
  <h2>Микола Сингаївський</h2>
 </div>
 <div class="prose" id="content">
 Просить батька син-школярик,<br />
лагідний на вдану:<br />
— Поможи мені, татусю,<br />
розв'язать задачу.<br />
— А подумав ти над нею? —<br />
той питає сина.<br />
— Думав, татку, вже минула<br />
не одна година.<br />
— І на чому ж зупинився,<br />
хотів би я знати?<br />
— Я надумався, що краще<br />
у тебе спитати.
 </div>
