 <div class="page-title">
  <h1>Немає вічності вершин</h1>
  <h2>Григорій Хорошко</h2>
 </div>
 <div class="prose" id="content">
 Немає вічності вершин.<br />
Падіння з них питання лічених хвилин.<br />
Сьогодні долі власної ти цар.<br />
А завтра лиш жебрак між тих печаль примар.<br />
<br />
Не варто із життям нам зарікатись.<br />
Хто знає де й куди прийдеться в темний день податись…
 </div>
