</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Де забарився ти, вечоре милий</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Де забарився ти, вечоре милий?<br />
Очі в журі за тобою,<br />
Груди без тебе спочити не вміли,<br />
Думи юрбою&#8230;<br /><br />
Кожна з них ятрить негоїсті рани, –<br />
Тільки в мені себе вилий!<br />
&#8230;Де забаривсь ти, спочинку жаданий,<br />
Вечоре милий?
 </div>
</div>
</body>
