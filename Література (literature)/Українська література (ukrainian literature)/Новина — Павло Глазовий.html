<div class="wrap">
 <div class="page-title">
  <h1>Новина</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 В гості дівчинка прийшла<br />
До своєї тітки.<br />
Про новини торохтить<br />
Весело і швидко:<br />
— А ви знаєте, Панько<br />
Вчора оженився,<br />
Жінку взяв собі таку,<br />
Наче з глузду збився.<br />
Ну товста така ж, як ви,<br />
Або й ще товстіша.<br />
І страшна така ж, як ви,<br />
Або й ще страшніша!
 </div>
