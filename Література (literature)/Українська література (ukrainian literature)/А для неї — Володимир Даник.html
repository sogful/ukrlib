<body>
<div class="wrap">
 <div class="page-title">
  <h1>А для неї</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 Мовить Мишка молода,<br />
Невгамовна і завзята:<br />
— Вийду заміж за Кота —<br />
І… ним буду керувати!<br />
То ж і мрій квітучий шквал,<br />
Де ні крапельки омани:<br />
— Він для когось — генерал!<br />
А для мене він… коханий.
 </div>
