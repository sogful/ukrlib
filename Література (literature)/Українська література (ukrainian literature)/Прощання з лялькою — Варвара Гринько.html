<div class="wrap">
 <div class="page-title">
  <h1>Прощання з лялькою</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Колискова<br />
<br />
Буду співати я<br />
Пісеньку тиху:<br />
— Спи, моя лялечко,<br />
Ти ж моя втіхо.<br />
Разом з тобою<br />
Літери вчили.<br />
Спи, моя ластівко,<br />
Спи, моя мила!<br />
Спи, моя крихітко,<br />
В теплім куточку.<br />
Я вже до школи<br />
Йду з дитсадочка.
 </div>
