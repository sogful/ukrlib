<body>
<div class="wrap">
 <div class="page-title">
  <h1>Березень</h1>
  <h2>Лідія Компанієць</h2>
 </div>
 <div class="prose" id="content">
 Іще мороз<br />
Береться на зорі,<br />
Ще поле вкрите<br />
Сніжною габою,—<br />
А трактори<br />
В колгоспному дворі<br />
Готові до сівби,<br />
Немов до бою!
 </div>
