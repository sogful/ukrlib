<body>
<div class="wrap">
 <div class="page-title">
  <h1>Коли лягати</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 Катря на роботу запізнилась,<br />
І начальник тут як тут: "Чому?"<br />
— Біля двох лягла... Перевтомилась... —<br />
Чесно все розказує йому.<br />
А начальник:<br />
— Не було б такого,<br />
Як би ти лягла біля одного.
 </div>
