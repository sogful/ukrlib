<body>
<div class="wrap">
 <div class="page-title">
  <h1>Груша</h1>
  <h2>Варвара Гринько</h2>
 </div>
 <div class="prose" id="content">
 Діти стояли,<br />
Вітра прохали:<br />
Грушок дрібненьких<br />
Кинути жменьку.<br />
<br />
Вітер послухав,<br />
Дітям подмухав:<br />
Кидав гнилички<br />
В жмені й спіднички
 </div>
