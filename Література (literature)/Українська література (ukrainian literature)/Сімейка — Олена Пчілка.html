<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сімейка</h1>
  <h2>Олена Пчілка</h2>
 </div>
 <div class="prose" id="content">
 Невеличка сімеєчка:<br />
Тільки він, та вона,<br />
Та старий, та стара,<br />
Та Іван, та Степан,<br />
Та Василь, та Панас<br />
Та той хлопець, що в нас,<br />
Та дві дівки косатих,<br />
Та два парубки усатих.
 </div>
