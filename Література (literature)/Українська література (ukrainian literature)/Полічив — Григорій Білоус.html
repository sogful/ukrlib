 <div class="page-title">
  <h1>Полічив</h1>
  <h2>Григорій Білоус</h2>
 </div>
 <div class="prose" id="content">
 За вікном — лапатий сніг.<br />
В хаті — вечір синій.<br />
Відпочити тато ліг<br />
і спитав у сина:<br />
— Скільки буде, як кавун<br />
розділить скибками:<br />
п'ять — тобі,<br />
п'ять — мені,<br />
а ще п'ять — для мами?<br />
<br />
Син чомусь почервонів<br />
і відповідає:<br />
— Тату, адже кавунів<br />
взимку не буває!
 </div>
