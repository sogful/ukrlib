<body>
<div class="wrap">
 <div class="page-title">
  <h1>Весна-красна</h1>
  <h2>Лідія Компанієць</h2>
 </div>
 <div class="prose" id="content">
 Як прийшла весна-красна,<br />
Не складала рук вона:<br />
Спершу пташку із мандрівки<br />
Повернула до домівки,<br />
Потім з хмари на лану<br />
Полила озимину.<br />
Сонцем бризнула навколо,<br />
Трактор вивела у поле,<br />
Звеселила луки, гай<br />
І увесь наш рідний край.
 </div>
