<div class="wrap">
 <div class="page-title">
  <h1>Понад берегом</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Липне грязюка до ніг над Сучаном<br />
Після дощу.<br />
Кинув у воду капусти качан,<br />
Кричу.<br /><br />
Скінчивсь, — і другого не буде, —<br />
Мій bloc-notes.<br />
Гей, коли ж уже прибуде<br />
Пароход?
 </div>
