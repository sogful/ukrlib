<div class="wrap">
 <div class="page-title">
  <h1>Крокодил</h1>
  <h2>Олександр Виженко</h2>
 </div>
 <div class="prose" id="content">
 Один Крокодил<br />
Все блукав та бубонів:<br />
– Я дуже жахастий!<br />
Я вельми зубастий!<br />
І, видно, про це<br />
Пам'ятав він прекрасно.<br />
Та ось заковика:<br />
Зубастий і грубий,<br />
Забув крокодил наш,<br />
Нащо йому зуби.
 </div>
