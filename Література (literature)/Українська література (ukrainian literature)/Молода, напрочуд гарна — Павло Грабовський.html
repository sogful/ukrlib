<body>
<div class="wrap">
 <div class="page-title">
  <h1>Молода, напрочуд гарна...</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Молода, напрочуд гарна,<br />
Кароока та струнка,<br />
Швидкометна, наче сарна,<br />
Мов тополенька гнучка.<br />
<br />
. . . . . . . . . . . . . . . . . . . . . .<br />
. . . . . . . . . . . . . . . . . . . . . .<br />
Весь малюнок без додатку,<br />
Бо нема чого додать.
 </div>
</div>
