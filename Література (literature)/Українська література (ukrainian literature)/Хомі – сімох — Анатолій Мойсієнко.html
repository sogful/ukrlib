<title>Хомі – сімох...</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хомі – сімох...</h1>
  <h2>Анатолій Мойсієнко</h2>
 </div>
 <div class="prose" id="content">
 Хомі – сімох.<br />
Химі – німих.<br />
А мені – нема?..<br />
Німого бо гомін<br />
Заз-<br />
дро норд<br />
Поніс у Сіноп.<br />
Я сватався...<br />
А туркеня – не крута,<br />
За сури сиру – саз.<br />
Шинка і книш,<br />
І смак у камсі...<br />
Хомі – сімох.<br />
Химі – німих.<br />
А мені – нема?<br />
... Я сватався.
 </div>
