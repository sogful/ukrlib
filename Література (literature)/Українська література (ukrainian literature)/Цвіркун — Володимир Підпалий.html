<body>
<div class="wrap">
 <div class="page-title">
  <h1>Цвіркун</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Упали в сиве жито<br />
увечері цвіркуни<br />
і заходилися хором<br />
тягати смички вони&#8230;<br /><br />
І так уже ж грають, кляті,<br />
немов не перед добром &#8211;<br />
із тіла душу виймають,<br />
холодять у жилах кров.<br /><br />
Немає сили тікати,<br />
а слухать &#8211; нема снаги&#8230;<br />
Хіба що стать на коліна<br />
замолювати гріхи&#8230;
 </div>
