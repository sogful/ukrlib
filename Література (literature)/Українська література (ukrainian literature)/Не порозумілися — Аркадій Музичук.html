<title>Не порозумілися</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не порозумілися</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 — Ти знов всю ніч із нею говорив, —<br />
Дружина чоловікові тривожно.<br />
Розсердився:<br />
— З якої це пори,<br />
Вже навіть уві сні поговорить не можна?
 </div>
