<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ранок</h1>
  <h2>Григорій Чупринка</h2>
 </div>
 <div class="prose" id="content">
 Птаство, прокинувшись, дзенькнуло, ахнуло,<br />
В полі, в лісі ожило!<br />
Сонце пожежею жарко спалахнуло,<br />
Землю сяйвом облило.<br />
<br />
Серце забилося, радістю схоплене,<br />
Ясні думи розцвілись!<br />
Лихо розвіялось, в сяйві потоплене,<br />
Тіні в далеч понеслись.
 </div>
