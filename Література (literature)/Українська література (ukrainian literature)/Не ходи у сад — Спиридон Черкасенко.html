<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не ходи у сад</h1>
  <h2>Спиридон Черкасенко</h2>
 </div>
 <div class="prose" id="content">
 Не ходи у сад сонливий<br />
Ти ніколи уночі:<br />
Там шепоче клен журливий,<br />
Світить місяць чарівливий,<br />
Тихо в небі ідучи.<br />
<br />
Не буди нічне мовчання<br />
Співом щастю і журбі,<br />
Бо той сад, його зітхання<br />
Про минулеє кохання<br />
Нагадає знов тобі.<br />
<br />
1905
 </div>
</div>
