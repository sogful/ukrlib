<div class="wrap">
 <div class="page-title">
  <h1>Учена розмова</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Зустрілися на дорозі<br />
Муза і Жанетта.<br />
У Жанетти під пахвою<br />
Журнал і газета.<br />
— Ти подумай тільки, Музо!<br />
Пишуть у журналі,<br />
Що є люди аж на Марсі,<br />
А може, ще й далі.<br />
— От сказала! — гордовито<br />
Відмахнулась Муза. —<br />
Це ж іще не точні факти,<br />
А гіпотенуза.
 </div>
