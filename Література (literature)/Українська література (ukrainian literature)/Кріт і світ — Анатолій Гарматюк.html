<body>
<div class="wrap">
 <div class="page-title">
  <h1>Кріт і світ</h1>
  <h2>Анатолій Гарматюк</h2>
 </div>
 <div class="prose" id="content">
 В норі старенький Кріт<br />
Навчав дітей проворних.<br />
— Це помилка —<br />
Казати "білий світ",<br />
Бо світ, як бачте,<br />
Чорний.
 </div>
</div>
