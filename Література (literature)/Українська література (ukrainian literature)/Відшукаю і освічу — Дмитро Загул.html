<body>
<div class="wrap">
 <div class="page-title">
  <h1>Відшукаю і освічу...</h1>
  <h2>Дмитро Загул</h2>
 </div>
 <div class="prose" id="content">
 Відшукаю і освічу<br />
Кожну стежку чоловічу,<br />
Відшукаю кожну душу,<br />
З грязі виведу на сушу,<br />
І направлю блудні ноги<br />
На дороги, на розлоги.<br />
Я розвію пітьму ночі,<br />
Всім обмию сонні очі…<br />
Я розвію пітьму чорну<br />
з їх очей,<br />
всіх людей<br />
Я притулю і пригорну<br />
до грудей.
 </div>
