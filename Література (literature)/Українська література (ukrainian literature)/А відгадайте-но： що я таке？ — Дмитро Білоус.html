 <div class="page-title">
  <h1>А відгадайте-но: що я таке?</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Загадка<br /><br />
А відгадайте-но: що я таке?<br />
Всі хочуть, як народиться дитина,<br />
щоб я було красиве і дзвінке,<br />
бо носить все життя мене людина.<br /><br />
(Ім'я)
