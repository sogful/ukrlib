<div class="wrap">
 <div class="page-title">
  <h1>Гуляю я... Луг...</h1>
  <h2>Анатолій Мойсієнко</h2>
 </div>
 <div class="prose" id="content">
 Гуляю я... Луг...<br />
І –<br />
Гул у луг.<br />
Диво: не сяє ясен овид...<br />
Круговиду диво-гурк...<br />
Луг... Я свищу ледь не Дунаю:<br />
"Ану!" День, де лущився гул,<br />
Гуля, і турка-крутія Луг<br />
Тне, мудрогорд, умент<br />
("Ану!.." – луна<br />
Гула за Базалуг).<br />
Гуляю я... Луг.
 </div>
