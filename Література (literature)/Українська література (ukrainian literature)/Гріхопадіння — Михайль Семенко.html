<div class="wrap">
 <div class="page-title">
  <h1>Гріхопадіння</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Я не хочу своєї уваги скупчувати<br />
Нудним шаблоном розважань.<br />
Вам не побачити моєї уступчивості<br />
Під сміхом зблідлим ображань.<br /><br />
І коли людину остаточно вимучите —<br />
Я займусь філософією натхнення.<br />
Кому, кому ви кров із серця виточите<br />
За ілюзорну ганьбу гріхопадення?
 </div>
