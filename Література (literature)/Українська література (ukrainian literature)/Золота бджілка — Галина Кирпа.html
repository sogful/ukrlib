<div class="wrap">
 <div class="page-title">
  <h1>Золота бджілка</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 За мною ходить бджілка золота,<br />
мені казки розказує про літо —<br />
про трави молоді і про жита,<br />
про квіти, що всміхаються, мов діти.<br /><br />
Метелики гойдаються в квітках,<br />
вимахують крильцятами малими,<br />
а вітер то співає, наче птах,<br />
то солодко співає щось над ними.
 </div>
