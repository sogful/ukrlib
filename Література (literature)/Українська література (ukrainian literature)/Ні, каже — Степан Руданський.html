<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ні, каже</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 Раз набожний архирей<br />
Гумена питає:<br />
"Чи то в тебе всі черці —<br />
Кожний дівку має?"<br /><br />
— Ні, — той каже, — у моїх<br />
Сього не бувало,<br />
Бо для моїх, — каже, — всіх<br />
По дівчині мало.
 </div>
