<body>
<div class="wrap">
 <div class="page-title">
  <h1>Бузовка</h1>
  <h2>Олександр Виженко</h2>
 </div>
 <div class="prose" id="content">
 Ішов "Блись".<br />
Зустрів – "Брись!",<br />
Взяв обух,<br />
В лоба – бух!<br />
"Брись" на "Блися"<br />
З кулаками,<br />
А іще із буцаками…<br />
Й почалася в них бузовка<br />
Аж до сьомого вівторка.
 </div>
