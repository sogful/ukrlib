<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мов ангела, тебе я стрінув...</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Мов ангела, тебе я стрінув<br />
В тюрмі, так доля розлуча:<br />
Мене в один край жереб кинув,<br />
Тебе до другого труча.<br />
<br />
Поглянуть раз, послухать мови,<br />
Очей подовше не звести —<br />
І тихо полум’я любови<br />
Самому довіку нести!
 </div>
