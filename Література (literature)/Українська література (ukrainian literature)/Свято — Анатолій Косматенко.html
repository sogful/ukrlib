<body>
<div class="wrap">
 <div class="page-title">
  <h1>Свято</h1>
  <h2>Анатолій Косматенко</h2>
 </div>
 <div class="prose" id="content">
 Я виїхав подалі, геть за місто.<br />
І там, на килимі трави,<br />
Качавсь, як пес, плигав цаписто —<br />
І так на серці стало гарно, чисто,<br />
Омила душу свіжість синяви!..<br /><br />
Мораль: зробіть таке і ви!
 </div>
