 <div class="page-title">
  <h1>Гроза пройшла, і сліз безкрає...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Гроза пройшла, і сліз безкрає<br />
На листях, травах, на квітках,<br />
Ласкаво, ясно сонце сяє<br />
І відбивається в сльозах.<br />
<br />
1905
