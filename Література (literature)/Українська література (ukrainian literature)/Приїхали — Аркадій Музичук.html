<body>
<div class="wrap">
 <div class="page-title">
  <h1>Приїхали</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 Завалився у таксі<br />
Пасажир п'яненький:<br />
— До жони мене везіть,<br />
До жони! Швиденько!<br />
Сів. Вовтузиться з плащем —<br />
Скинути невзмозі...<br />
— Не приїхали ж іще.<br />
— А де ж я?<br />
— В дорозі!<br />
— Зупиніть таксі, водій,<br />
Чом же ви мовчали,<br />
Я ж роззувся ще тоді,<br />
Коли ми рушали...
 </div>
