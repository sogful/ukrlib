 <div class="page-title">
  <h1>Жабка</h1>
  <h2>Лідія Повх</h2>
 </div>
 <div class="prose" id="content">
 Журилась під осінь<br />
малесенька жабка:<br />
— Уже потемніла<br />
у соняха шапка,<br />
і жовтими стали<br />
листочки у клена,<br />
а я іще й досі<br />
зелена-зелена&#8230;<br />
<br />
<strong>Джерело: </strong>Золота осінь. Вірші, оповідання, казки, загадки.— К., Веселка, 1989.
 </div>
