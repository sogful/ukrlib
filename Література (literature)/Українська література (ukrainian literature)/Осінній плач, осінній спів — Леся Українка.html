</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Осінній плач, осінній спів</h1>
  <h2>Леся Українка</h2>
 </div>
 <div class="prose" id="content">
 Осінній плач, осінній спів<br />
посеред літа золотого<br />
непереможно забринів<br />
із серця мого<br /><br />
Ох, то ж за те, що восени,<br />
сумного, млистого поранку,<br />
я раз невчасно завела<br />
собі веснянку.
 </div>
</div>
