<body>
<div class="wrap">
 <div class="page-title">
  <h1>Лелеки</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Мені дуже подобається<br />
У білій залі слухати Шопена.<br />
G-moll баладний настрій в мене<br />
І серце з серцем сміється грається<br /><br />
А в антракті боязкі розмови.<br />
Теми вишукані і близькі-далекі.<br />
Але серце серце схопить напівслові<br />
І між люстр лунає дві душі-лелеки.
 </div>
