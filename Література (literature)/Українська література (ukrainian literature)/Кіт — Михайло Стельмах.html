<body>
<div class="wrap">
 <div class="page-title">
  <h1>Кіт</h1>
  <h2>Михайло Стельмах</h2>
 </div>
 <div class="prose" id="content">
 За народними мотивами<br />
<br />
Біля річки на пісочку<br />
Кіт зиркує з-за пеньочка,<br />
Кіт у воду заглядає,<br />
Тяжко думає-гадає:<br />
"Як би рибу так зловити,<br />
Щоб і ніг не замочити?".
 </div>
</div>
