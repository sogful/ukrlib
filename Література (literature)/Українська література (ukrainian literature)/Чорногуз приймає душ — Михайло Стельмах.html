<title>Чорногуз приймає душ</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Чорногуз приймає душ</h1>
  <h2>Михайло Стельмах</h2>
 </div>
 <div class="prose" id="content">
 Там, де гнеться верболіз,<br />
Чорногуз<br />
В ставок заліз.<br />
А на птицю з верболозу<br />
Вітер трусить<br />
Срібну росу.<br />
Рясно падає росиця —<br />
Славний душ<br />
Приймає птиця<br />
Коло берега щодня<br />
І не хниче,<br />
Що росиця<br />
Крижана!
 </div>
</div>
