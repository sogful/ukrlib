<body>
<div class="wrap">
 <div class="page-title">
  <h1>Після бурі</h1>
  <h2>Максим Рильський</h2>
 </div>
 <div class="prose" id="content">
 Минулася буря — і сонце засяло,<br />
Веселка всміхнулась в ясних небесах,<br />
Проміння у краплях прозорих заграло,<br />
І хмари у шати блискучі убрало,<br />
І світ стрепенувся, мов збуджений птах.
 </div>
