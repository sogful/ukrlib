<body>
<div class="wrap">
 <div class="page-title">
  <h1>На арфі господній колись увірвалася...</h1>
  <h2>Дмитро Загул</h2>
 </div>
 <div class="prose" id="content">
 На арфі господній колись увірвалася<br />
Найтонша, найкраща струна.<br />
І так до сьогодні та арфа зосталася<br />
Без радісних згуків, сумна.<br />
І в нашому серці єсть арфа розбитая,<br />
І в серці чогось не стає.<br />
Пісенька кожда журбою вповитая<br />
Ще більше жалю додає.
 </div>
</div>
