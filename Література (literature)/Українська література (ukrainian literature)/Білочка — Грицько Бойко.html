<body>
<div class="wrap">
 <div class="page-title">
  <h1>Білочка</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Хвіст трубою, спритні ніжки —<br />
Плиг із гілки на сучок! —<br />
Носить білочка горішки<br />
В золотий свій сундучок.<br />
В неї й очі, мов горішки,<br />
Кожушинка хутряна,<br />
Гострі вушка, наче ріжки,<br />
У дуплі живе вона.
 </div>
