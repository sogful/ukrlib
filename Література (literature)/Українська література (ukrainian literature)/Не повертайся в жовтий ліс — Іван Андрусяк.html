<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не повертайся в жовтий ліс...</h1>
  <h2>Іван Андрусяк</h2>
 </div>
 <div class="prose" id="content">
 не повертайся в жовтий ліс<br />
не повертайся<br />
по розпорошених слідах<br />
неандертальця<br /><br />
поміж рухомих ефемер<br />
не загубися<br />
чигає місяць з-за куща<br />
блідий убивця…
 </div>
