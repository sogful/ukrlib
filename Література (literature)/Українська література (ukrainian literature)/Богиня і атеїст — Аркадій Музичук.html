 <div class="page-title">
  <h1>Богиня і атеїст</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 — Називав богинею до шлюбу... —<br />
Пригадала Василеві Люба.<br />
— Як женився — атеїстом став! —<br />
Чоловік у відповідь сказав.
