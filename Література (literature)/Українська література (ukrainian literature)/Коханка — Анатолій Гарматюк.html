<body>
<div class="wrap">
 <div class="page-title">
  <h1>Коханка</h1>
  <h2>Анатолій Гарматюк</h2>
 </div>
 <div class="prose" id="content">
 Мій чоловік —<br />
В коханні пень бездарний,<br />
Та ще й наївний, мов ягня.<br />
Зате коханець був прегарний,<br />
Стрічались мало не щодня.<br />
Востаннє клявся:<br />
— Не забуду!<br />
Ми скоро стрінемось, душа...<br />
Лежу і жду.<br />
А він десь блудить,<br />
Сюди не дуже поспіша.
 </div>
