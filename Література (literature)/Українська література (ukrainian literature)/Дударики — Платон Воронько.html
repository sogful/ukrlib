<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дударики</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Дударики.<br />
В нас новенькі<br />
Кептарики,<br />
Шапочки<br />
Із повстини,<br />
Дудочки<br />
Із бузини.<br />
Ми подмемо<br />
У дуду<br />
І затнемо:<br />
Ду-ду-ду.<br />
Нас почує<br />
Добрий дід,<br />
Що корчує<br />
В лісі глід.<br />
Ми несем<br />
Йому обід<br />
І гукаєм:<br />
— Діду-ду,<br />
Ой, зробіть<br />
Нову дуду!
 </div>
