 <div class="page-title">
  <h1>Псалом 16</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 Єдиний Боже! Все обсіли хами.<br />
Веди мене шляхетними шляхами.<br /><br />
І не віддай цим людям на поталу,—<br />
вони вже іншу віру напитали.<br /><br />
Одплач в мені, одплач і одболи,—<br />
вони ж моїми друзями були!
