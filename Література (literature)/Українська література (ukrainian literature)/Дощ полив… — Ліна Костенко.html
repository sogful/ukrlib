<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дощ полив…</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 Дощ полив, і день такий полив'яний.<br />
Все блищить, і люди як нові.<br />
Лиш дідок старесенький, кропив'яний,<br />
блискавки визбирує в траві.<br />
<br />
Струшується сад, як парасолька.<br />
Мокрі ниви, і порожній шлях...<br />
Ген корів розсипана квасолька<br />
доганяє хмари у полях.
 </div>
</div>
