<div class="wrap">
 <div class="page-title">
  <h1>Паж Весни</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Весна розпочинає вернісаж, —<br />
злетілися шпаки її вітати.<br />
Однині Вітер у Весни — мов паж:<br />
за нею ходить назирці — по п'ятах.<br /><br />
Вона ж така раденька. Й залюбки<br />
весь час міняє щось на вернісажах.<br />
Уже злетілись навіть ластівки,<br />
а Вітер досі у Весни за пажа.
 </div>
