<body>
<div class="wrap">
 <div class="page-title">
  <h1>О принесіть як не надію...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 О принесіть як не надію,<br />
То крихту рідної землі:<br />
Я притулю до уст її<br />
І так застигну, так зомлію...<br />
<br />
Хоч кухоль з рідною водою!..<br />
Я тільки очі напою,<br />
До уст спрагнілих притулю,<br />
Торкнусь душею вогняною.<br />
<br />
12.IX.1921
 </div>
