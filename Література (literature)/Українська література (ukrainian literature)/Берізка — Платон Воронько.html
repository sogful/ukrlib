<body>
<div class="wrap">
 <div class="page-title">
  <h1>Берізка</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 В нашої берізки<br />
Білая кориця,<br />
Вичесані кіски —<br />
Любо подивиться.<br />
<br />
На дорогу з двору<br />
Вистрибали кізки,<br />
Стали гризти кору<br />
Білої берізки...<br />
<br />
Ми сказали кізкам:<br />
"Не гризіть, не треба.<br />
Хай мала берізка<br />
Виросте до неба!"
 </div>
