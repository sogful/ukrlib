 <div class="page-title">
  <h1>Василеві Чумаку</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Розніміть пальці — вони заклякли,<br />
Серце у білім огні.<br />
Розніміть пальці вони залякані<br />
І в труні червоний гнів.<br />
<br />
І над лобом холодні леза.<br />
І на небі холодні огні.<br />
Розніміть пальці — гудуть марсельєзи<br />
І в труні червоний гнів.<br />
<br />
4&ndash;8&ndash;I&ndash;920. Київ.
