<body>
<div class="wrap">
 <div class="page-title">
  <h1>Твоїх долонь сяйлива лодь</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 Твоїх долонь сяйлива лодь<br />
Несе в космічному просторі<br />
Моєї мислі дивну плоть,<br />
Мов блиск вітрильника на морі.<br /><br />
А на землі, як ночі сміх,<br />
Пожежа в лісі заряхтіла:<br />
То іскри дотиків твоїх<br />
Звіває вітер з мого тіла.
 </div>
