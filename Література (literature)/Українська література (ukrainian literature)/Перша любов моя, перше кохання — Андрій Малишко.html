<div class="wrap">
 <div class="page-title">
  <h1>Перша любов моя, перше кохання</h1>
  <h2>Андрій Малишко</h2>
 </div>
 <div class="prose" id="content">
 Перша любов моя, перше кохання,<br />
Стежечка, стоптана в білій росі,<br />
Тихе зітхання, дальнє світання,<br />
Може, його і не бачили всі.<br />
<br />
Там щебетала в яру криниця,<br />
Там, у бузках, за вікном отим,<br />
Миле обличчя і досі сниться<br />
Мрією, спогадом, сном золотим.<br />
(1938)
 </div>
