<body>
<div class="wrap">
 <div class="page-title">
  <h1>Чудний школяр</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Двох онуків дід старий<br />
Посадив на руки,<br />
Та й розказує казки...<br />
Слухають онуки.<br />
Раптом меншенький спитав:<br />
— А скажіть, дідусю,<br />
Ви ходили в перший клас?<br />
— Та ходив, Павлусю.<br />
— От був номер! — малюки<br />
Сміхом залилися, —<br />
Як до школи ви прийшли<br />
З бородою й лисі!
 </div>
