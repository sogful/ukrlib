<div class="wrap">
 <div class="page-title">
  <h1>Луна</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Поїхали туди, де рідне поле,<br />
і ліс, і річка, й місяць на воді<br />
на стьожках хвиль, немов мала дитина,<br />
гойдається поволеньки&#8230; Тоді<br />
засміємося голосно і вільно<br />
та й сторожко прислухаймось: луна<br />
відіб&#8217;ється й покотиться над нами<br />
і нас, мов чуженицю, не впізна&#8230;
 </div>
