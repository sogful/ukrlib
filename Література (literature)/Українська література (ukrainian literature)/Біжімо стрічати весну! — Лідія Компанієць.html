<title>Біжімо стрічати весну!</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Біжімо стрічати весну!</h1>
  <h2>Лідія Компанієць</h2>
 </div>
 <div class="prose" id="content">
 На яворі — сонячні бризки,<br />
Парує поораний лан,<br />
Берізки, берізки, берізки<br />
Вдяглися в зелений туман.<br />
<br />
І човен на річці, мов цятка,<br />
У синю пливе далину...<br />
Дівчатка, дівчатка, дівчатка,<br />
Біжімо стрічати весну!
 </div>
</div>
