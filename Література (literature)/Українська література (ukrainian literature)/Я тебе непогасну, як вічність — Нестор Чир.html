<body>
<div class="wrap">
 <div class="page-title">
  <h1>Я тебе непогасну, як вічність...</h1>
  <h2>Нестор Чир</h2>
 </div>
 <div class="prose" id="content">
 Я тебе непогасну, як вічність,<br />
До причастя прошу і до віри.<br />
Ти прости мою стомлену грішність,<br />
І пробач недолугі зневіри.<br /><br />
Обійму я з тобою півсвіту,<br />
Сонцем серця тебе обігрію.<br />
Подаруй мені долю, як літо,<br />
Її ниви коханням засію.
 </div>
</div>
