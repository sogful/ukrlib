 <div class="page-title">
  <h1>Україна</h1>
  <h2>Володимир Сосюра</h2>
 </div>
 <div class="prose" id="content">
 Дзвін шабель, пісні, походи,<br />
Воля соколина,<br />
Тихі зорі, ясні води —<br />
Моя Україна.<br /><br />
Синь гаїв, поля, світання,<br />
Пісня солов&#8217;їна,<br />
Ніжний шепіт і зітхання —<br />
Моя Україна.<br /><br />
І в очах твоїх, кохана,<br />
Міниться і лине<br />
Сонцем щастя осіянна<br />
Моя Україна.
 </div>
