<body>
<div class="wrap">
 <div class="page-title">
  <h1>Краєвид</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Дивлюсь на бухту я де хінські човнвітрила<br />
рухаються крізь туман м'яко<br />
і в оксамиті спокійного безхвилля<br />
окреслюється світ.
 </div>
