<div class="wrap">
 <div class="page-title">
  <h1>Півень</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Ти хто — я не знаю<br />
й дивуюсь на те:<br />
ти той, що співає,<br />
чи той, що цвіте?<br /><br />
Ти той, що на ґанку,<br />
чи той, що в саду?<br />
— Я з самого ранку<br />
піснями цвіту!<br /><br />
Я вмію співати!<br />
Я вмію цвісти!<br />
Мене відгадати<br />
зумієш і ти!
 </div>
