<body>
<div class="wrap">
 <div class="page-title">
  <h1>Рінь</h1>
  <h2>Олег Ольжич</h2>
 </div>
 <div class="prose" id="content">
 Де шлях у жовті врізується стіни<br />
І урвище над кручею стремить,<br />
Наш погляд неуважливий на мить<br />
Затримує жорсткий прошарок ріни.<br />
<br />
Вода суха і сіра. Але вії<br />
Примкнеш перед камінням у піску<br />
І раптом чуєш слу вод рвучку<br />
І різкість вітру, що над ними віяв.
 </div>
