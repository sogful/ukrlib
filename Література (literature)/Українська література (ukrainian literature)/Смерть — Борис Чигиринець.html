<body>
<div class="wrap">
 <div class="page-title">
  <h1>Смерть</h1>
  <h2>Борис Чигиринець</h2>
 </div>
 <div class="prose" id="content">
 Уздрів я череп під ногами<br />
З пробитим кулею чолом…<br />
Зернятко, внесене вітрами,<br />
Тюльпаном в скронях проросло.<br />
<br />
І череп той, мов пишна ваза<br />
На імператорських столах…<br />
Так. Смерть взяла когось і зразу<br />
Новим життям вже зацвіла.
 </div>
