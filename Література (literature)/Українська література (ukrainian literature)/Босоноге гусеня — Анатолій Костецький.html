<div class="wrap">
 <div class="page-title">
  <h1>Босоноге гусеня</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 — Гусенятко, гусенятко,<br />
чом у тебе босі лапки?<br />
<br />
— А тому, що я багато<br />
люблю плавать і пірнати,<br />
а пірнати в черевичках<br />
і незручно, і незвично.
 </div>
