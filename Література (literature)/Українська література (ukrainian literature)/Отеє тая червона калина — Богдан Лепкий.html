<body>
<div class="wrap">
 <div class="page-title">
  <h1>Отеє тая червона калина</h1>
  <h2>Богдан Лепкий</h2>
 </div>
 <div class="prose" id="content">
 Отеє тая червона калина,<br />
Що повік не зів'яне:<br />
Пригадає її Україна,<br />
Як із мертвих повстане.<br /><br />
Будуть тую калину в світлиці<br />
Поза образи класти,<br />
Хоч пропали шаблі і рушниці,<br />
Так славі не пропасти!
 </div>
