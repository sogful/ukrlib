<div class="wrap">
 <div class="page-title">
  <h1>Половина саду квітне…</h1>
  <h2>Микола Луків</h2>
 </div>
 <div class="prose" id="content">
 Половина саду квітне,<br />
Половина в'яне.<br />
Серед яблунь стану квітнем,<br />
Огорни, тумане.<br />
<br />
Може, вийде опівночі,<br />
Де колись ходила, —<br />
Чорні брови, карі очі, —<br />
Не забута, мила.<br />
<br />
Може, стане, ніжно гляне:<br />
— Я твоя, єдина. —<br />
Половина саду в'яне,<br />
Квітне половина.
 </div>
