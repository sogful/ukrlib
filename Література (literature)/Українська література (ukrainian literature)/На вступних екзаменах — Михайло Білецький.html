<div class="wrap">
 <div class="page-title">
  <h1>На вступних екзаменах</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 Професор пильно подививсь:<br />
— Ми... ніби зустрічались з вами? —<br />
Студент знітився, очі вниз...<br />
— Торік здавав я...<br />
Проваливсь...<br />
— Що ж я питав тоді?<br />
— Те саме:<br />
"Ми ніби зустрічались з вами..."
 </div>
