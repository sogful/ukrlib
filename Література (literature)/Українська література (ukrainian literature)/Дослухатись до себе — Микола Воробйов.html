<body>
<div class="wrap">
 <div class="page-title">
  <h1>Дослухатись до себе</h1>
  <h2>Микола Воробйов</h2>
 </div>
 <div class="prose" id="content">
 Дослухатись до себе —<br />
Це протирати шкло.<br />
Спершу подмухати, щоб запітніло,<br />
щоб просто — тиша...<br />
А потім нараз посвітлішала:<br />
скрипне стіл<br />
відлунням тебе самого.<br />
Квіти на кожній стіні —<br />
відлунням світу.<br />
Дослухатись до себе —<br />
це бачити,<br />
як поволі розвидняється.
 </div>
