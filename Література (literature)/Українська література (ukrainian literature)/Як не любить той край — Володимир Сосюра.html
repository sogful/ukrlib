<body>
<div class="wrap">
 <div class="page-title">
  <h1>Як не любить той край...</h1>
  <h2>Володимир Сосюра</h2>
 </div>
 <div class="prose" id="content">
 * * *<br />
<br />
Як не любить той край,<br />
де вперше ти побачив<br />
солодкий дивний світ,<br />
що ми звемо життям,<br />
де вперше став ходить,<br />
і квіткою неначе<br />
в його теплі зростав,<br />
і усміхавсь квіткам!
 </div>
</div>
