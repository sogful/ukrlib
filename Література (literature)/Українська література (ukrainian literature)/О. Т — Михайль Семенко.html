 <div class="page-title">
  <h1>О. Т.</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Останні блими комінка<br />
На профілі журної панни.<br />
Ховається самотно бліда рука,<br />
Ятриться весняна рана.<br />
<br />
Може затримаю останній блим,<br />
Спалахнуть тремтячі тіні.<br />
Їй сумно під грою осінніх рим,<br />
Під звуки осінньої сонатіни.<br />
<br />
19 — XI — 1919. Київ.
 </div>
