<div class="wrap">
 <div class="page-title">
  <h1>Соняшник і пень</h1>
  <h2>Петро Гришко</h2>
 </div>
 <div class="prose" id="content">
 Із затінку оброслий мохом Пень<br />
До Соняшника шамкав день у день:<br />
— Звик Сонцю поклонятися ти, друже,<br />
До всього іншого тобі байдуже.<br />
Так жити зовсім нецікаво...<br />
Не втерпів Соняшник: — Моє це право!<br />
На умовляння марно тратиш силу.<br />
Хоч я і поклоняюсь — так світилу!
 </div>
