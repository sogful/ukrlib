<body>
<div class="wrap">
 <div class="page-title">
  <h1>Розстання</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Люблю, коли ми ображені<br />
І розходимось, як чужі, —<br />
Розходимось недоказані,<br />
З тривогою в душі.<br /><br />
Розходимось і знову стрінемось —<br />
Це ж міф, що ми чужі!<br />
Ми обоє — подумай — де ми дінемось,<br />
Скажи!
 </div>
