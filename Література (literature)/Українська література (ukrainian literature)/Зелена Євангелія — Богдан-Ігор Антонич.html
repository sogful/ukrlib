<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зелена Євангелія</h1>
  <h2>Богдан-Ігор Антонич</h2>
 </div>
 <div class="prose" id="content">
 Весна — неначе карусель,<br />
на каруселі білі коні.<br />
Гірське село в садах морель,<br />
і місяць, мов тюльпан, червоний.<br />
<br />
Стіл ясеновий, на столі<br />
слов’янський дзбан, у дзбані сонце.<br />
Ти поклоняйся лиш землі,<br />
землі стобарвній, наче сон цей!
 </div>
