<title>Так гарно, що весна</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Так гарно, що весна</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Вже гуси прибираються в дорогу,<br />
взувають червоненькі чобітки,<br />
а з саду аж до нашого порогу<br />
під снігом народилися струмки.<br />
<br />
Ми весело ідемо в корабели.<br />
Нам гарно, що весна, а ми малі,<br />
і наші паперові каравели<br />
причалять десь до рідної землі.
 </div>
