<title>Як журавель збирав щавель</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Як журавель збирав щавель</h1>
  <h2>Михайло Стельмах</h2>
 </div>
 <div class="prose" id="content">
 На болоті журавель<br />
Цілий день збирав щавель.<br />
Назбирав собі на борщ,<br />
Та якраз вперіщив дощ,<br />
І щавель знесла водиця,—<br />
Без борщу лишилась птиця.<br />
З того часу журавель<br />
Сировим жує щавель.
 </div>
</div>
