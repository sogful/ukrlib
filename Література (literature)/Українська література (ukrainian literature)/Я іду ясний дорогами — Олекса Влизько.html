<body>
<div class="wrap">
 <div class="page-title">
  <h1>Я іду ясний дорогами...</h1>
  <h2>Олекса Влизько</h2>
 </div>
 <div class="prose" id="content">
 Я іду ясний дорогами,<br />
Серце вимивши вогнем,<br />
І на поминки з убогими<br />
Не гукають вже мене!<br />
<br />
Я втримав в осіннім покоті<br />
Повну сміху козубень,<br />
І мене тепер на покуті<br />
Посадовлять для пісень!
 </div>
</div>
