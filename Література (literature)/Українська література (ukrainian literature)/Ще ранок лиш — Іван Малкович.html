<div class="wrap">
 <div class="page-title">
  <h1>Ще ранок лиш</h1>
  <h2>Іван Малкович</h2>
 </div>
 <div class="prose" id="content">
 Ще ранок лиш. Нічого ще не гасло,<br />
та бубнявіє чорна горошина —<br />
Рядки у віршах, як порожні ясла:<br />
сегорік не вродила конюшина.<br /><br />
Сегорік ні стеблиночки задарма:<br />
лиш куриться ранкова порошина,<br />
лиш сипле світ свої біленькі ярма,<br />
і тупо зріє чорна горошина.
 </div>
