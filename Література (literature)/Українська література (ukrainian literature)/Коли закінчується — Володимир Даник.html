<body>
<div class="wrap">
 <div class="page-title">
  <h1>Коли закінчується</h1>
  <h2>Володимир Даник</h2>
 </div>
 <div class="prose" id="content">
 Та що вже там… Які розмови!<br />
Ну, звісно ж — вистача досад!<br />
Шансів — нема… Тренер — фартовий!<br />
І збірна… — на чемпіонат!<br /><br />
Ну, що робить… буває — туго!<br />
Власних воріт — не вберегти.<br />
Коли закінчується пруха,<br />
То й м'яч летить — хтозна-куди!
 </div>
