<body>
<div class="wrap">
 <div class="page-title">
  <h1>Для кого живеш?</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Квіти живуть для мене<br />
там, де є лист зелений,<br />
де напувають дощі<br />
трави веселі й кущі,<br />
сливину спраглу гілку<br />
і золотеньку бджілку,<br />
мамину білу хатку,<br />
річчину довгу кладку,<br />
котика на осонні<br />
і гусенятко сонне…<br />
<br />
Питають мене щоранку:<br />
— Для кого живеш, Олянко?
 </div>
