<div class="wrap">
 <div class="page-title">
  <h1>Польовичок</h1>
  <h2>Павло Мовчан</h2>
 </div>
 <div class="prose" id="content">
 Польовик-польовичок,<br />
золотий капелюшок,<br />
золота борідка,<br />
вуса — наче щітка.<br />
Солом'яні постольці<br />
топчуть землю звично.<br />
В нього дзвоник у руці —<br />
колосок пшеничний.<br />
"Дзінь-дзень,<br />
дзінь-дзень",—<br />
дзвонить дзвоник<br />
всенький день.<br />
Кличе він щоліта<br />
косарів косити.
 </div>
