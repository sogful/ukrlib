<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ніч</h1>
  <h2>Степан Бен</h2>
 </div>
 <div class="prose" id="content">
 Ніч блукає по леваді<br />
Темна-темна та стара<br />
І жене зірок отари<br />
В сині стайні до двора.<br />
Положила чорний палець —<br />
Кучеряве помело.<br />
Золотих овець без цапа<br />
Не пускає на село.
 </div>
</div>
