 <div class="page-title">
  <h1>Все переплутане</h1>
  <h2>Василь Голобородько</h2>
 </div>
 <div class="prose" id="content">
 Все переплутане:<br />
голуби зліталися на бойовище<br />
і скльовували очі мертвим воякам<br /><br />
Круків підгодовували на площах<br />
малювали як вони цілуються дзьобами<br />
і співали про них пісень<br /><br />
Хіба перелякаємося тільки здивуємося<br />
і проженемо голубів із мерців<br />
бо жаліємо круків
 </div>
