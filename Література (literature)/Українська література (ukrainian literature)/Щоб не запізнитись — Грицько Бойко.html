<title>Щоб не запізнитись</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Щоб не запізнитись</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Мама черепаха<br />
В серпні перший раз<br />
Проводжала сина<br />
В школу, в перший клас.<br />
А чому це в серпні?<br />
Ясно нам чому:<br />
Щоб не запізнитись<br />
На урок йому!
 </div>
</div>
</body>
