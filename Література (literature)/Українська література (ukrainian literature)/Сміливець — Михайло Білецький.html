<div class="wrap">
 <div class="page-title">
  <h1>Сміливець</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Я на галявину виходжу,<br />
Аж бачу...<br />
Вовк в траві лежить!<br />
Тікать?<br />
На мене це не схоже...<br />
Беру сокиру й в одну мить<br />
Відрубую йому хвоста!—<br />
А хтось здивовано пита:<br />
— Чому ж не голову, Євмене?<br />
— Її хтось відрубав до мене...
 </div>
