<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вранці сніг сипонув межи очі...</h1>
  <h2>Наталія Горішна</h2>
 </div>
 <div class="prose" id="content">
 Вранці сніг сипонув межи очі,<br />
Від зими передавши привіт,<br />
Не спитавши, чи треба, чи хочу<br />
Я холодний її пустоцвіт…<br />
Біла грудочка висне з травинки,<br />
У природі усе до ладу.<br />
Обдурю себе: це не крижинка,<br />
Це конвалія квітне в саду.
 </div>
