<body>
<div class="wrap">
 <div class="page-title">
  <h1>Отави вато...</h1>
  <h2>Анатолій Мойсієнко</h2>
 </div>
 <div class="prose" id="content">
 Павловi Поповичу<br /><br />
Отави вато,<br />
Варто трав...<br />
О — травень! Не варто<br />
Морозити зором...<br />
Он воду чудовно<br />
Низує Узин.<br />
Низ у хатах... Узин.<br />
Узин у хатах унизу.<br />
Мати там...<br />
Матиму думи там...
 </div>
</div>
