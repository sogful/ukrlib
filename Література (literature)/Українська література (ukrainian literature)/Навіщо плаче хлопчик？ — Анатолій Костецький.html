<body>
<div class="wrap">
 <div class="page-title">
  <h1>Навіщо плаче хлопчик?</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 Як бурулька плаче —<br />
то весна надворі.<br />
Як роса заплаче —<br />
то вже ранок скоро.<br />
Як заплаче дощик —<br />
трави підростають.<br />
<br />
А навіщо хлопчик<br />
плаче,—<br />
я не знаю...
 </div>
</div>
