<div class="wrap">
 <div class="page-title">
  <h1>Експресовітер</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 З експресовітром я товаришую.<br />
Він вільний і зі мною бачиться завжди.<br />
Слова безсловесні — заклику — чую,<br />
Вони проймають, щоб мою душу взнав ти.<br /><br />
А ще краще в обіймах тихої пітьми.<br />
Тоді бринять лише найдальші струни.<br />
За поворотом зникають відьми.<br />
Буруни.
 </div>
