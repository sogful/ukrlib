<div class="wrap">
 <div class="page-title">
  <h1>Мавпа бігала, гуляла...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Мавпа бігала, гуляла<br />
Та пташок перекривляла.<br />
Та на лишенько, бджола<br />
Десь над вухом загула...<br />
Що тут думати-гадати...<br />
Та відомо що — тікати!<br />
Коли бачить мавпа — бочка!<br />
І, здається, з-під медочка!<br />
Треба в неї заховатись<br />
І медком поласуватись.
 </div>
