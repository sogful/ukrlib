<title>Не треба згадувати ранньої розлуки</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не треба згадувати ранньої розлуки</h1>
  <h2>Інна Рябченко</h2>
 </div>
 <div class="prose" id="content">
 Не треба згадувати ранньої розлуки,<br />
Не накликати пізньої сльоти,<br />
А вірити, що серце суєти<br />
Заломить світло, простягнувши руку.
 </div>
</div>
