<body>
<div class="wrap">
 <div class="page-title">
  <h1>Рукавички</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 Узимку, в морози,<br />
хуртечі й завії<br />
тебе і мене<br />
рукавички зігріють.<br />
<br />
А теплі<br />
від чого вони<br />
і чому?<br />
Скажу вам<br />
по щирості:<br />
теплі тому,<br />
що наші ласкаві<br />
бабусі та мами<br />
вплітають<br />
тепло своїх рук<br />
між нитками.
 </div>
