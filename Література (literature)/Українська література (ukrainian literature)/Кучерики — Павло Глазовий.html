<div class="wrap">
 <div class="page-title">
  <h1>Кучерики</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 — Що ви носите, голубко,<br />
В своїм медальйоні?<br />
— Кучерики мого мужа,<br />
Дорогого Льоні.<br />
— Що ви кажете, голубко?<br />
Льоня врізав дуба?<br />
— Ні, живий ще, тільки лисий,<br />
Вже давно без чуба.
