 <div class="page-title">
  <h1>Розмова</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 Прибув Мошко із Варшави<br />
Та й людей дурив,<br />
Що ніби він у столиці<br />
З царем говорив.<br /><br />
"А як же ви говорили?" —<br />
Якийсь запитав.<br />
"О, ми славно говорили, —<br />
Мошко відвічав.—<br /><br />
Я казав усе крулеві:<br />
"Ура" та "ура!",<br />
А воно мені казало:<br />
"Дурак" та "дурак!"
 </div>
