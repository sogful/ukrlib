 <div class="page-title">
  <h1>Перевага</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 — Чим ми гірші, ніж Максим,<br />
Наш сусід ізправа?<br />
Він щоліта їздить в Крим.<br />
Бізнес у Полтаві.<br />
В нього навіть не така,<br />
Як у інших, псина, —<br />
Чоловіку доріка<br />
Кожен день дружина. —<br />
Через рік авто міня,<br />
А Наталка — шати.<br />
— Та зате ми п'єм щодня,<br />
А вони — у свято.
 </div>
