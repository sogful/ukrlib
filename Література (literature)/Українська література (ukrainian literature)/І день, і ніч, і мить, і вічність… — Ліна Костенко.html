<body>
<div class="wrap">
 <div class="page-title">
  <h1>І день, і ніч, і мить, і вічність…</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 І день, і ніч, і мить, і вічність,<br />
і тиша, і дев'ятий вал —<br />
твоїх очей магічна ніжність<br />
і губ розплавлений метал.<br />
<br />
В ніч високосного притулку,<br />
коли йде обертом земля,<br />
ти до плеча мене притулиш<br />
безсмертним рухом скрипаля.
 </div>
