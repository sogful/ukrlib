<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сім днів</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Боже,<br />
як гарно,<br />
що Ти створив день!<br />
Як добре,<br />
що він Тобі сподобався.<br />
І Ти створив<br />
ще другий,<br />
третій,<br />
четвертий,<br />
п&#8217;ятий<br />
і шостий!<br />
А найкраще Тобі вдався<br />
сьомий день.<br />
Молодчина, що Ти додумався<br />
мати сім днів,<br />
бо інакше<br />
у нас ніколи не було б<br />
неділі!
 </div>
