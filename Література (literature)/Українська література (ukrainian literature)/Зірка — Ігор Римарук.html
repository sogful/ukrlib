<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зірка</h1>
  <h2>Ігор Римарук</h2>
 </div>
 <div class="prose" id="content">
 Може, так би невидимо й жив —<br />
та котроїсь липневої ночі<br />
впала зірка з високих верхів<br />
у дитячі незамкнені очі,<br />
пропекла борозну межи брів<br />
і засіяла пам'ять золою…<br />
Затулитись од неї хотів —<br />
та долоня була замалою.
 </div>
