<body>
<div class="wrap">
 <div class="page-title">
  <h1>Люблю! Як в перший раз люблю</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Люблю! Як в перший раз люблю,<br />
Хоч це любов моя остання…<br />
Але вона — як день в маю,<br />
Як пташки перше щебетання.<br />
Люблю!<br /><br />
Люблю для сліз, для мук, для жалю…<br />
Але коли б, коли б ти знала,<br />
Як квітне серце, як люблю,<br />
Ти б на устах моїх сказала:<br />
Люблю!
 </div>
