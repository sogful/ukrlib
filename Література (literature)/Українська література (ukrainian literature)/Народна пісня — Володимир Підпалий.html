<body>
<div class="wrap">
 <div class="page-title">
  <h1>Народна пісня</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Мов непогрішна звірена стріла,<br />
сягаєш цілі&#8230; Мент &#8211; і на півтоні<br />
заплачеш-заридаєш з-під крила<br />
чаїного&#8230; І в горі не потонеш.<br /><br />
Із блуду повертаються сини,<br />
неначе діти, повноліття прагнуть&#8230;<br /><br />
Хіба тобі забракне глибини,<br />
як освіжиш вуста у спеку спраглими!..
 </div>
