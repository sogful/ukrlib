<body>
<div class="wrap">
 <div class="page-title">
  <h1>У меблевому магазині</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 До завмага покупець<br />
В кабінет пропхався:<br />
— Вчора лиш купив стілець,<br />
Він уже зламався!<br />
— Кричите ви тут даремно, —<br />
Зав промовив строго. —<br />
Самі винні...<br />
Ви, напевне,<br />
Сідали на нього!
 </div>
