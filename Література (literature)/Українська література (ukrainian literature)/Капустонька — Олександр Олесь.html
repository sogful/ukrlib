<body>
<div class="wrap">
 <div class="page-title">
  <h1>Капустонька</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Покинута, занедбана на лугу,<br />
Зеленіє капустонька в снігу,<br />
А до неї стежечку не одну<br />
Протоптали ніженьки по лану.<br />
<br />
Догадайтесь, дітоньки, ви самі,<br />
Хто ці робить стежечки у зимі.<br />
Я вам в. цьому віршику не скажу,<br />
Бо сам ще раз подивитись побіжу.
 </div>
