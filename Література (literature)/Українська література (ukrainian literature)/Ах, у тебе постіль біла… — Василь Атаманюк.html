<div class="wrap">
 <div class="page-title">
  <h1>Ах, у тебе постіль біла…</h1>
  <h2>Василь Атаманюк</h2>
 </div>
 <div class="prose" id="content">
 Ах, у тебе постіль біла!<br />
Ах, у тебе постіль тепла!<br />
Під покривалом у тебе<br />
Радощі раю і пекла.<br />
<br />
На грудях твоїх я млію,<br />
У обіймах завмираю.<br />
Тільки знаю: Я щасливий!<br />
Тільки чую: Я кохаю!
 </div>
