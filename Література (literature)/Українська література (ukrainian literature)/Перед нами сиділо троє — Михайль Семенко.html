<div class="wrap">
 <div class="page-title">
  <h1>Перед нами сиділо троє...</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Перед нами сиділо троє<br />
І в губах стремів жах.<br />
Дзвеніла шибка захриплою грою<br />
І розхристував крила птах<br />
<br />
Вечером, коли крутять каву,<br />
І заблимає чадний огонь —<br />
Вилізе й загине смертю безславною<br />
На брудному й метушливому пероні.<br />
<br />
22-II-920. Київ.
 </div>
