 <div class="page-title">
  <h1>Танець</h1>
  <h2>Сидір Твердохліб</h2>
 </div>
 <div class="prose" id="content">
 Ой кобзи рясно грали,<br />
Лунав веселий сміх,<br />
Мов звізди, очі сяли,<br />
Сріблистий танець біг,<br />
Сріблистий танець біг,<br />
А кобзи перестали<br />
Замовк веселий сміх,<br />
Кінкети погасали,<br />
Кутами царив гріх —<br />
Кутами царив —<br />
Сміх!<br /><br />
***<br /><br />
Джерело:Цифрова Українська Бібліотека.
 </div>
