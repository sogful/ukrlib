<title>Будь природі другом... (Батьківщина)</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Будь природі другом... (Батьківщина)</h1>
  <h2>Анатолій Камінчук</h2>
 </div>
 <div class="prose" id="content">
 Он повзе мурашка,<br />
Ось хлюпоче річка.<br />
Не зривай ромашку,<br />
Не топчи травичку.<br />
В зелені діброва,<br />
В китицях ліщина.<br />
Глянь, яка чудова<br />
Наша Україна.<br />
Журавлі над лугом<br />
Крилять рівним клином.<br />
Будь природі другом,<br />
Будь природі сином
 </div>
</div>
