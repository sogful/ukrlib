<div class="wrap">
 <div class="page-title">
  <h1>Молитва</h1>
  <h2>Людмила Старицька-Черняхівська</h2>
 </div>
 <div class="prose" id="content">
 Втомлена, іду я спатки,<br />
Сон стулив вже оченятки;<br />
Добрий янголе, святий,<br />
Тихий сон мені навій.<br />
<br />
Коли я що зле зробила,<br />
Наді мною білі крила<br />
Ти, як завше, розпусти —<br />
Все пробач і захисти!
 </div>
