<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не ховайся, зайчику!</h1>
  <h2>Оксана Кротюк</h2>
 </div>
 <div class="prose" id="content">
 Не ховайся, зайчику,<br />
Бачу, де ти є.<br />
Он стирчить за деревом<br />
Вушечко твоє.<br />
<br />
Не прийшов я кривдити —<br />
Я приніс тобі<br />
Листя капустяного<br />
Й моркви на обід.<br />
<br />
Бо сніжком засипала<br />
Геть усе зима,<br />
І тобі ж ні крихтоньки<br />
Їсточки нема.
 </div>
