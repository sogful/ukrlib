 <div class="page-title">
  <h1>Прощання</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 — Ще по одній хильнемо, може?<br />
Бо так розходитись не гоже.<br />
— Ти зрозуміть повинен, друже,<br />
Що я того... уже...<br />
— Байдуже!<br />
Я теж червоний, наче рак.<br />
Коли побачимось ще так?<br />
— Ти зрозумій мене, козаче,<br />
Я зараз вже тебе не бачу...
