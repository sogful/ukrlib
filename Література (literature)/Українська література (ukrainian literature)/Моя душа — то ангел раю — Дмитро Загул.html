<div class="wrap">
 <div class="page-title">
  <h1>Моя душа — то ангел раю...</h1>
  <h2>Дмитро Загул</h2>
 </div>
 <div class="prose" id="content">
 Моя душа — то ангел раю,<br />
Упавший херувим.<br />
Чужим між рідними блукаю,<br />
Даремно щастя тут шукаю…<br />
Не тут, не тут мій дім!<br />
<br />
За недосяжною красою<br />
Блукаю серцем скрізь;<br />
Щодня вмиваюся сльозою,<br />
А смутку, смутку не загою<br />
Росою власних сліз.
 </div>
