<body>
<div class="wrap">
 <div class="page-title">
  <h1>Перша рима</h1>
  <h2>Наталія Горішна</h2>
 </div>
 <div class="prose" id="content">
 <p>Як не дати собі замакітриться,</p>
<p>
Напустивши на себе пиху,</p>
<p>
Як невдовзі бузок свої китиці</p>
<p>
Розчахне в запахущім гріху?</p>
<p>
І допоки цвітіння буятиме,</p>
<p>
Огортаючи щастям до п'ят,</p>
<p>
Перша рима дівчиську кирпатому</p>
<p>
Припаде до малих груденят.</p>
 </div>
</div>
