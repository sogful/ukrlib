<div class="wrap">
 <div class="page-title">
  <h1>До Н. К. С. ("Такої певної, святої...")</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Такої певної, святої,<br />
Такої рідної, як ти,<br />
Такої щирої, простої,-<br />
Вже більше, мабуть, не знайти.<br />
<br />
Таку не часто скинеш оком,<br />
Такою тільки що марить...<br />
А раз зустрінеш ненароком —<br />
Навіки долю озарить!
 </div>
