<body>
<div class="wrap">
 <div class="page-title">
  <h1>Він опанував розуміння</h1>
  <h2>Василь Голобородько</h2>
 </div>
 <div class="prose" id="content">
 Він опанував розуміння<br />
стислого кулака<br />
коли п'ять річок як пальці<br />
текли в одне море<br />
а на долоні плавали кораблі<br />
а з розщепленого кулака<br />
пальці течуть у різні боки<br />
і долоня стає пустелею<br />
про це він уже знав
 </div>
</div>
