<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зійшли сніги, шумить вода...</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 <p>Зійшли сніги, шумить вода,</p>
<p>
Весною повіва;</p>
<p>
Земля квіточки викида,</p>
<p>
Буяє травка молода;</p>
<p>
Все мертве ожива.</p>
<p>
Веселе сонечко блистить,</p>
<p>
Проміння щедро ллє;</p>
<p>
Гайок привітно шелестить,</p>
<p>
Неначе кличе пригостить;</p>
<p>
Струмочок виграє...</p>
 </div>
</div>
</body>
