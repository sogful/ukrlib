<div class="wrap">
 <div class="page-title">
  <h1>А ми шпаківні будували</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 А ми шпаківні будували...<br />
Як розпускалися садки,<br />
До нас весною завітали<br />
Веселі наші співаки.<br />
І ціле літо, ціле літо<br />
Вони співали нам пісні<br />
Повиростали їхні діти,<br />
Такі ж співучо-голосні.
 </div>
