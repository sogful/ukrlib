<body>
<div class="wrap">
 <div class="page-title">
  <h1>А я плисти за обрій поривавсь...</h1>
  <h2>Нестор Чир</h2>
 </div>
 <div class="prose" id="content">
 А я плисти за обрій поривавсь<br />
до вічності, до божевілля весен...<br />
Нащо мені химера ця здалась,<br />
як човен вутлий, без керма і весел?<br /><br />
Але така вже магія душі,<br />
така солодка і гірка спокуса,<br />
що нам любіші звабні міражі,<br />
ніж Істина безсмертного Ісуса.
 </div>
