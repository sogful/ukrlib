 <div class="page-title">
  <h1>Казка</h1>
  <h2>Іван Малкович</h2>
 </div>
 <div class="prose" id="content">
 Ця казка дивна і стара,<br />
як пошуки святого руна:<br /><br />
Христос приходив до Дніпра,<br />
щоби повергнути Перуна.<br /><br />
Перун сказав: "Не розіпни…" —<br />
і обривається писання.<br /><br />
Ревуть Дніпрові береги —<br />
занурення і виринання…
 </div>
