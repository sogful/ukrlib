<div class="wrap">
 <div class="page-title">
  <h1>Савине горе</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Люди Саві дорікають:<br />
— Доки будеш пити?<br />
А він каже: — Хочу горе<br />
У вині втопити.<br />
— Та ти ж уже бочку випив.<br />
Скільки літ минуло!<br />
Давно уже твоє горе<br />
К бісу потонуло.<br />
— Не знаєте мого горя, —<br />
Відказує Сава. —<br />
Моє горе дуже хитре:<br />
Воно зверху плава.
