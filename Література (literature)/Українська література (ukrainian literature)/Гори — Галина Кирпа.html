<body>
<div class="wrap">
 <div class="page-title">
  <h1>Гори</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Якось одна гора<br />
прийшла до мене у вірші.<br />
Коли це і друга гукає:<br />
— А я ще горіша!<br />
<br />
А я люблю обидві гори.<br />
А я люблю, як і вчора:<br />
і ту, що горіша за всіх,<br />
і просто гору!
 </div>
