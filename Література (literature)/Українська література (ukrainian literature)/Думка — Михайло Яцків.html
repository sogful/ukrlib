 <div class="page-title">
  <h1>Думка</h1>
  <h2>Михайло Яцків</h2>
 </div>
 <div class="prose" id="content">
 Утихла буря.<br />
Зламане весло на розбитім човні, спочив керманич в глибинах, спочило братство.<br />
І ти, моя любко, спочила.<br />
Захід сонця прощав золоту корону на твоїй голові, біла ручка махнула прощання до мого берега.<br />
Я взяв твою тугу і пішов у світ.<br />
<em>1914</em>
 </div>
