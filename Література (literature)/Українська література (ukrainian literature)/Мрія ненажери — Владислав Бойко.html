<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мрія ненажери</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 — От кажуть, що сучасна хірургія<br />
вже справжні чудеса робити вміє:<br />
не зчуєшся, як вже тобі за мить<br />
і серце, й печінки спроворять замінить!<br /><br />
А я б тим лікарям був вдячний до могили,<br />
якби мені<br />
ще й другий шлунок вшили...
 </div>
