<div class="wrap">
 <div class="page-title">
  <h1>Любов — кошмар, любов — наруга...</h1>
  <h2>Василь Еллан-Блакитний</h2>
 </div>
 <div class="prose" id="content">
 Любов — кошмар, любов — наруга,<br />
Любов — насмішка над собою…<br />
Як день і ніч — одна і друга,<br />
Як серця зміни — перебої…<br />
П'янить очима перша нині —<br />
Екстазно-молитовна туга,<br />
А завтра в буйному горінні<br />
Шумить, бушує вихром друга.
