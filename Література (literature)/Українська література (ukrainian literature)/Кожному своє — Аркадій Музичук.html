 <div class="page-title">
  <h1>Кожному своє</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 — Ну яка від тебе користь? —<br />
Кіт собаці дорікав. —<br />
Я один служу на совість,<br />
Вчора мишу знов спіймав.<br />
А ти спиш безперестанку,<br />
Я щораз тебе буджу.<br />
— Я ж хазяїна щоранку<br />
На прогулянку воджу.
 </div>
