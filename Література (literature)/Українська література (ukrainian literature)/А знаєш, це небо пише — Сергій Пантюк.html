 <div class="page-title">
  <h1>А знаєш, це небо пише...</h1>
  <h2>Сергій Пантюк</h2>
 </div>
 <div class="prose" id="content">
 А знаєш, це небо пише<br />
Нам долю земну на двох.<br />
М'які поцілунки в тиші<br />
Карбує різдвяний Бог.<br />
І гріється чай на Сонці,<br />
Й лиш вітер його доп'є.<br />
На ніжній твоїй долоньці<br />
Життя причаїлось моє…<br />
<br />
29.12. 2013 – 06.01. 2014 рр.
