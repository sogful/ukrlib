<body>
<div class="wrap">
 <div class="page-title">
  <h1>Де вихід?</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Кепсько, лікарю, мені —<br />
Розмовляю уві сні!<br />
— Ну то й розмовляйте,<br />
На те не зважайте!<br />
— Я, признатись, не зважаю,<br />
Та шеф у нас клятий.<br />
Каже, що я заважаю<br />
Людям працювати!
 </div>
