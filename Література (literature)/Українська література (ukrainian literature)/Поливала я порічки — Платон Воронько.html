<body>
<div class="wrap">
 <div class="page-title">
  <h1>Поливала я порічки</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Я носила воду із річки<br />
Поливала наші порічки.<br />
<br />
Розцвітали кущики рясно,<br />
Поспівали ягоди вчасно.<br />
<br />
Я два тижні ягоди рвала,<br />
Всіх подружок своїх пригощала.
 </div>
