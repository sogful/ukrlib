<div class="wrap">
 <div class="page-title">
  <h1>лід без вікон ні воріт...</h1>
  <h2>Богдан Жолдак</h2>
 </div>
 <div class="prose" id="content">
 * * *<br />
<br />
лід без вікон ні воріт<br />
як немає вороття<br />
не потрібне, гей, буття-завороття<br />
замість щастя каяття<br />
замість серця<br />
піску цеберце
 </div>
