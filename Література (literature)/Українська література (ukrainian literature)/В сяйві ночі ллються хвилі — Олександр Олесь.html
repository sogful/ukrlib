<body>
<div class="wrap">
 <div class="page-title">
  <h1>В сяйві ночі ллються хвилі...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 В сяйві ночі ллються хвилі<br />
І землі про щось шумлять.<br />
У саду, повиті млою,<br />
Кипариси тихо сплять.<br />
<br />
А у море кинув з неба<br />
Місяць, стрічку золоту,<br />
Та ніяк з цієї стрічки<br />
Я вже пісні не сплету.
 </div>
