<div class="wrap">
 <div class="page-title">
  <h1>Не вернувся із походу</h1>
  <h2>Тарас Шевченко</h2>
 </div>
 <div class="prose" id="content">
 Не вернувся із походу<br />
Гусарин-москаль.<br />
Чого ж мені його шкода,<br />
Чого його жаль?<br />
Що на йому жупан куций,<br />
Що гусарин чорноусий,<br />
Що Машею звав?<br />
Ні, не того мені шкода;<br />
А марніє моя врода,<br />
Люде не беруть.<br />
А на улиці дівчата<br />
Насміхаються, прокляті,<br />
Гусаркою звуть.
 </div>
