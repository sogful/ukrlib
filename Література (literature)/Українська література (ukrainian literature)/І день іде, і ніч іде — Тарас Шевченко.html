<body>
<div class="wrap">
 <div class="page-title">
  <h1>І день іде, і ніч іде</h1>
  <h2>Тарас Шевченко</h2>
 </div>
 <div class="prose" id="content">
 І день іде, і ніч іде.<br />
І, голову схопивши в руки,<br />
Дивуєшся, чому не йде<br />
Апостол правди і науки?<br />
<br />
<em>5 ноября [1860, С.-Петербург]</em>

</div>
