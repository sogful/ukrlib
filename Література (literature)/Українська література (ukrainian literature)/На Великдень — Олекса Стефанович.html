 <div class="page-title">
  <h1>На Великдень</h1>
  <h2>Олекса Стефанович</h2>
 </div>
 <div class="prose" id="content">
 На Великдень діл і вись<br />
Сонце злотом заливає,<br />
На Великдень сонце грає —<br />
Блись-блись!..<br />
<br />
На Свята усім святам,<br />
На яєчко на червоне,<br />
На дзвіницях усі дзвони —<br />
Бам-бам!..<br />
<br />
І так любо для діток<br />
Позбігатися гуртками<br />
І на сонці крашанками —<br />
Цок-цок!..<br />
<br />
Прага, 1941
 </div>
