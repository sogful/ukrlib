<div class="wrap">
 <div class="page-title">
  <h1>Дим</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Запахло димом гіркуватим<br />
у надвечір&#8217;я від садів,<br />
сипнуло іскрами до неба &#8211;<br />
з землі метеоритний дощ.<br /><br />
Всю душу пойняло й жбурнуло<br />
на всі вітри, на всі вогні,<br />
і місяць вибіг серед неба<br />
і на пожежу б&#8217;є у дзвін&#8230;
 </div>
</div>
