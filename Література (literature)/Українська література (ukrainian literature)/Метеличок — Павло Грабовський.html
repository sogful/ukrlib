<div class="wrap">
 <div class="page-title">
  <h1>Метеличок</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Мій метеличку любенький!<br />
Як щастить тобі?<br />
Увесь-деньки, моторненький,<br />
Вієшся собі?<br />
— Зелень лугу, блескіт неба —<br />
З того радий я;<br />
Запах квітів — більш не треба,<br />
То — вся харч моя.<br />
Небагацько вік мій ліче,<br />
Через день мине...<br />
Вдій же ласку, чоловіче,<br />
Не воруш мене.
 </div>
