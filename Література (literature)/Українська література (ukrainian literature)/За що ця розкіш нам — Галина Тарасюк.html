<div class="wrap">
 <div class="page-title">
  <h1>За що ця розкіш нам</h1>
  <h2>Галина Тарасюк</h2>
 </div>
 <div class="prose" id="content">
 За що ця розкіш нам? Ця благодать?!<br />
Цей шал бузковий, цей ліловий безум,<br />
Як засвіт у розквітлих хащах безу,<br />
Мов божевільні, солов&#8217;ї кричать.<br /><br />
Ми ж — мовчимо. Погідні небеса<br />
На нас пролили фіалкові зливи,<br />
І м&#8217;яко, ніби перестиглі сливи,<br />
На підвіконня падає роса.
 </div>
