<body>
<div class="wrap">
 <div class="page-title">
  <h1>Досяг визнання</h1>
  <h2>Петро Гришко</h2>
 </div>
 <div class="prose" id="content">
 Як пробивавсь в літературу —<br />
Ані визнання, ні хвали.<br />
А став здавать макулатуру —<br />
Дивись — і премію дали.
