<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зоре вечорова</h1>
  <h2>Андрій Малишко</h2>
 </div>
 <div class="prose" id="content">
 Де в гаю сія Росі течія<br />
Ходить садом вечоровим<br />
Молодість моя,<br />
Оглядає світ, обриває цвіт,<br />
Подає своїй любові<br />
Вісточку &#8220;Привіт&#8221;.<br /><br />
Чи й тепер вона жде мене одна?<br />
Чи заплетена перлами сиза далина?<br />
Вірю прийде знов у красі обнов,<br />
Не розстане, не зів&#8217;яне<br />
Вірная любов.
 </div>
