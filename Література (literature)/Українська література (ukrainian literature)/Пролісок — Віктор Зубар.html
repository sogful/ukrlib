<div class="wrap">
 <div class="page-title">
  <h1>Пролісок</h1>
  <h2>Віктор Зубар</h2>
 </div>
 <div class="prose" id="content">
 В коряві двері лісові скрипучі<br />
Постукав пролісок малий, як гном.<br />
— Заходь, заходь! — і дуб кивнув верхом.<br />
Як не боїшся приморозків злючих.<br />
І от він, босий серед клаптів снігу<br />
На ніжці з гордістю стоїть,<br />
І від його лункого весно-сміху<br />
В барлозі прокидається ведмідь...
 </div>
