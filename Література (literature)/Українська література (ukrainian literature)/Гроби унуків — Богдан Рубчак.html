<body>
<div class="wrap">
 <div class="page-title">
  <h1>Гроби унуків</h1>
  <h2>Богдан Рубчак</h2>
 </div>
 <div class="prose" id="content">
 Це тут були гроби моїх унуків,<br />
де ми з тобою, мила, лежимо,<br />
а я тобі — любовник молодий.<br /><br />
У синіх сумерках середньовіччя<br />
коханій я показував траву:<br />
вона росте з дітей моїх дітей.
 </div>
