<div class="wrap">
 <div class="page-title">
  <h1>До рідної землі</h1>
  <h2>Ігор Січовик</h2>
 </div>
 <div class="prose" id="content">
 Линуть в морі кораблі,<br />
А над ними – журавлі.<br />
Тратять сили чималі,<br />
Прокладаючи в імлі<br />
Шлях до рідної землі.
