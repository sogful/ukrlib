<title>Полюбилася я</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Полюбилася я</h1>
  <h2>Тарас Шевченко</h2>
 </div>
 <div class="prose" id="content">
 Полюбилася я,<br />
Одружилася я<br />
З безталанним сиротою<br />
Така доля моя!<br /><br />
Люде гордії, злі<br />
Розрізнили, взяли<br />
Та повезли до прийому<br />
Оддали в москалі!<br /><br />
І московкою я,<br />
Одинокою я<br />
Старіюся в чужій хаті —<br />
Така доля моя!
 </div>
</div>
