<div class="wrap">
 <div class="page-title">
  <h1>Моя кохана спить, а за вікном...</h1>
  <h2>Кость Москалець</h2>
 </div>
 <div class="prose" id="content">
 Моя кохана спить, а за вікном<br />
Сади стоять, облиті молоком.<br />
І губи її ніжні, навісні<br />
До себе посміхаються вві сні.<br />
<br />
А ніч тече, прозора і легка,<br />
Ледь світиться у темряві рука.<br />
На голому смаглявому плечі —<br />
Слід кольору багряної парчі.
 </div>
