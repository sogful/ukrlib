<div class="wrap">
 <div class="page-title">
  <h1>Листя падає</h1>
  <h2>Павло Тичина</h2>
 </div>
 <div class="prose" id="content">
 Листя<br />
падає<br />
Осінь листопадує<br />
По доріжці, на &#8216;дній ніжці<br />
вітер робить па<br />
вітер<br />
па<br /><br />
Де ж<br />
Аполінер<br />
Вітер<br />
стер<br /><br />
Там<br />
фонтанами<br />
бубнами — там-тамами<br /><br />
Там фон<br />
танами<br />
бубнами — тамтамами<br /><br />
Вітер<br />
каже<br />
оббіжу я оббіжу я<br />
заколишу я буржуя
 </div>
