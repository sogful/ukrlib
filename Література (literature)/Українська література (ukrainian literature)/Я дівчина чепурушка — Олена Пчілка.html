<body>
<div class="wrap">
 <div class="page-title">
  <h1>Я дівчина чепурушка</h1>
  <h2>Олена Пчілка</h2>
 </div>
 <div class="prose" id="content">
 Я дівчина чепурушка,<br />
Хоч я й невеличка,—<br />
В мене лиштва мережана,<br />
Червоная стрічка.<br /><br />
Я дівчина, як калина.<br />
Люблю чепуритись;<br />
Горе ж моє! — брела річку,<br />
Забула умитись!
 </div>
