<div class="wrap">
 <div class="page-title">
  <h1>Ти – як дощ</h1>
  <h2>Дмитро Павличко</h2>
 </div>
 <div class="prose" id="content">
 Ти – як дощ. А я – мов явір.<br />
Хочу листям тебе зловить.<br />
Але в кроні, як сни в уяві,<br />
Крапелини твої – лиш мить.<br /><br />
Щоб листки мої, наче свічі,<br />
Твоїм світлом засяяли в млі,<br />
Ти повинна приходити двічі:<br />
Спершу – з неба, а вдруге – з землі.
 </div>
