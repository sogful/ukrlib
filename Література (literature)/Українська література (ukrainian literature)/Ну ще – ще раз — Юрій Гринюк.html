<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ну ще – ще раз...</h1>
  <h2>Юрій Гринюк</h2>
 </div>
 <div class="prose" id="content">
 Ну ще – ще раз…<br />
Вогонь горить,<br />
Вогонь не згас,<br />
А ще більше,<br />
Ще дужче палає.<br />
Все тіло,<br />
Всю кров охопляє.<br />
Чи бачиш? —<br />
Подивись.<br />
До мене нахились.<br />
А – ні, то ляж.<br />
Так міцно, міцно,<br />
Щоб… аж…<br />
Ти знаєш як —<br />
О – ти добре вмієш…<br />
<br />
– У-у-у —<br />
– Що тобі?<br />
Млієш?
 </div>
</div>
