<body>
<div class="wrap">
 <div class="page-title">
  <h1>А тоді я розкажу тобі на вухо</h1>
  <h2>Василь Голобородько</h2>
 </div>
 <div class="prose" id="content">
 А тоді я розкажу тобі на вухо<br />
метеликові крила<br />
прошепчу оксамит із моху<br />
скажу мед тобі на вухо<br />
і ти узнаєш<br />
який я ніжний і лагідний
 </div>
</div>
