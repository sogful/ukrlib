<div class="wrap">
 <div class="page-title">
  <h1>Скоромовки</h1>
  <h2>Віктор Терен</h2>
 </div>
 <div class="prose" id="content">
 А скажи-но швидко:<br />
"Жала бджола житко".<br />
<br />
* * *<br />
<br />
Старому сому везли солому —<br />
Нащо солома старому сому?<br />
<br />
* * *<br />
<br />
Розбіглися по росі смугасті поросята...<br />
<br />
* * *<br />
<br />
За горою, біля броду,<br />
Обгороджений город.<br />
Барабанять по городу<br />
Бараболя та горох!
 </div>
