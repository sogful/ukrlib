<div class="wrap">
 <div class="page-title">
  <h1>Розпука крає...</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Розпука крає<br />
Серце на дні...<br />
Зіронька сяє,<br />
Та не мені.<br />
<br />
Чи їй знать треба,<br />
Як біль дійма?<br />
Зіронька неба<br />
На все німа!
