<body>
<div class="wrap">
 <div class="page-title">
  <h1>Смерть</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Мамо. Страждає твій син<br />
Мамо. Погибає він<br />
Мамо. Так хутко загин<br />
Мамо. Жалібний дзвін.<br />
Од жінки маю життя.<br />
Загину од жінки теж.<br />
Мамо. Спалило чуття.<br />
Я коло смерті меж<br />
Жінко. Хрест з рамена скинь<br />
Жінко. Вирви зі стін<br />
Мамо. Конає твій син<br />
Мамо. Жалібний дзвін.
 </div>
</div>
