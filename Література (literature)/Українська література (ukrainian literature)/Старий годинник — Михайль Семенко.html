<body>
<div class="wrap">
 <div class="page-title">
  <h1>Старий годинник</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 В сутінках сумних отінених<br />
Образ забутий виник.<br />
Його родив у однотонних цокотіннях<br />
Старий годинник.<br /><br />
Фрази плетуться в журнім смерканні<br />
Старомодних перлів.<br />
Сумні, далекі і рідно-незнані<br />
Душі померлі.
 </div>
