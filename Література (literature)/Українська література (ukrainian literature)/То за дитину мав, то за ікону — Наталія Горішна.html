<title>То за дитину мав, то за ікону...</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>То за дитину мав, то за ікону...</h1>
  <h2>Наталія Горішна</h2>
 </div>
 <div class="prose" id="content">
 <p>То за дитину мав, то за ікону,</p>
<p>
То гнівом вибухав, то каяттям…</p>
<p>
Любив мене, любив мене до скону –</p>
<p>
Любов'ю, несумісною з життям.</p>
 </div>
</div>
