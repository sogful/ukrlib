<body>
<div class="wrap">
 <div class="page-title">
  <h1>Адаме ти що вкусив від істини...</h1>
  <h2>Маріанна Кіяновська</h2>
 </div>
 <div class="prose" id="content">
 Адаме<br />
ти що вкусив від істини<br />
звідки знаєш<br />
що ти вразливий<br />
народжений<br />
сотворений<br />
щоразу без батька?<br />
<br />
пустки звукопис<br />
<br />
усе<br />
що ти називаєш<br />
існує – і…є<br />
<br />
Померлі<br />
хто плаче<br />
за яблуком<br />
на околиці саду<br />
<br />
***
 </div>
