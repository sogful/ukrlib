</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>О Боже, не дай загубити ключі</h1>
  <h2>Володимир Свідзінський</h2>
 </div>
 <div class="prose" id="content">
 О Боже, не дай загубити ключі<br />
Від сонця, від серця Твого огняного,<br />
Бо тяжко і страшно вночі<br />
У кривавому хаосі світу земного.<br /><br />
Але дай, щоб духовний мій зір<br />
Убачав перед себе щохвилі,<br />
Як пасмо сіяючих гір,<br />
Верховини Твоєї одвічної цілі.
 </div>
</div>
