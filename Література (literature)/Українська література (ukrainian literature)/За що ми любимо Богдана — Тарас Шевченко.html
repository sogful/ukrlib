 <div class="page-title">
  <h1>За що ми любимо Богдана</h1>
  <h2>Тарас Шевченко</h2>
 </div>
 <div class="prose" id="content">
 За що ми любимо Богдана?<br />
За те, що москалі його забули,<br />
У дурні німчики обули<br />
Великомудрого гетьмана.
