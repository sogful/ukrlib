<body>
<div class="wrap">
 <div class="page-title">
  <h1>Молитва до ангела</h1>
  <h2>Іван Малкович</h2>
 </div>
 <div class="prose" id="content">
 <em>(за дитячою молитвою)</em><br />
<br />
Ангелику мій,<br />
охоронцю мій!<br />
Рано, ввечір, вдень, вночі<br />
будь мені до помочі.<br />
<br />
Свічечкою<br />
присвіти,<br />
а крилами<br />
захисти.
 </div>
</div>
