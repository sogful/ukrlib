<div class="wrap">
 <div class="page-title">
  <h1>І жах, і кров, і смерть, і відчай</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 &#8220;І жах, і кров, і смерть, і відчай,<br />
І клекіт хижої орди,<br />
Маленький сірий чоловічок<br />
Накоїв чорної біди.<br /><br />
Це звір огидної породи,<br />
Лох-Несс холодної Неви.<br />
Куди ж ви дивитесь, народи?!<br />
Сьогодні ми, а завтра – ви&#8221;.
 </div>
</div>
