<title>Каченята вчаться</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Каченята вчаться</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 У калюжі коло хати<br />
жовтопузі каченята<br />
у своєї мами-качки<br />
зранку вчилися пірнати.<br />
<br />
Тільки мілко у калюжі,<br />
бо води у ній — не дуже,<br />
і тому пішли до річки<br />
каченята жовтопузі.
 </div>
</div>
