<div class="wrap">
 <div class="page-title">
  <h1>Киця</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 — Кицю, кицю,<br />
Де була?<br />
Що ти їла,<br />
Що пила?<br />
<br />
— Я на річці була,<br />
Там водичку пила,<br />
А що їла — не скажу,<br />
Тільки хвостик покажу.
 </div>
