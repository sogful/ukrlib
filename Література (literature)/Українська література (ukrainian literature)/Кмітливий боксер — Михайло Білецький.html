<body>
<div class="wrap">
 <div class="page-title">
  <h1>Кмітливий боксер</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 У роздягальні після бою<br />
Питає тренер:<br />
— Що з тобою?<br />
Задкуєш все...<br />
На що це схоже,<br />
Де взяв ти тактику таку?<br />
— З ним ближній бій вести не можу,<br />
Бо він наївся часнику!
 </div>
