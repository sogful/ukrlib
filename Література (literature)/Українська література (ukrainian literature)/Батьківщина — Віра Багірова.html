 <div class="page-title">
  <h1>Батьківщина</h1>
  <h2>Віра Багірова</h2>
 </div>
 <div class="prose" id="content">
 Як же край той зветься,<br />
Де ти, хлопче, зріс,<br />
Де твій дім, озерце,<br />
Дитсадочок, ліс,<br />
Де верхам синіти<br />
Вічно вдалині,<br />
Де найкращі в світі<br />
Люди і пісні?..<br />
<br />
<strong>Джерело: </strong>Київ "Веселка" 1989
 </div>
