<title>Зелена неділя</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зелена неділя</h1>
  <h2>Павло Тичина</h2>
 </div>
 <div class="prose" id="content">
 Із золотих своїх дворів<br />
Свята Неділя вийшла.<br />
Тихо. Сумно.<br />
Ніщо не пролетить, не заспіває.<br />
— Пошли, о Боже, пташку в світ!<br />
Хоча б і без голосу — аби кукала.<br />
І Бог послав зозулю.<br /><br />
— на віку<br />
пий музику<br />
муку<br />
випадковий цього віку<br />
потопельнику —<br /><br />
Сумно.<br /><br />
Зелена Неділя.
 </div>
</div>
