<body>
<div class="wrap">
 <div class="page-title">
  <h1>Півники-розбійники</h1>
  <h2>Віктор Терен</h2>
 </div>
 <div class="prose" id="content">
 Он півники-розбійники вийшли на подвір'я,<br />
Обвішались шаблюками з блискучого пір'я.<br />
<br />
І лякали, і співали! Аж раптом замовкли:<br />
На подвір'я випав дощ — і шаблі промокли.<br />
<br />
Ті півники-розбійники ходять біля хати —<br />
Як висохнуть шабельки, будуть ще лякати.
 </div>
