<body>
<div class="wrap">
 <div class="page-title">
  <h1>Нам сняться сині береги...</h1>
  <h2>Оксана Лятуринська</h2>
 </div>
 <div class="prose" id="content">
 Нам сняться сині береги<br />
морей далеких і ясних,<br />
подертий одяг дорогий,<br />
і спущені уряд човни.<br />
<br />
Ось море стрілем загорить.<br />
На страх і подив стамбулян<br />
приб’ємо ми Олегів щит.<br />
Але мовчить наш отаман.
 </div>
