<div class="wrap">
 <div class="page-title">
  <h1>Птиці із крильми, зробленими з фольги...</h1>
  <h2>Маріанна Кіяновська</h2>
 </div>
 <div class="prose" id="content">
 Птиці із крильми, зробленими з фольги, —<br />
Жовто і крихко, ніби зі світу вбогого.<br />
Ти залишаєш слід на землі — ноги.<br />
Або крила — у небі. Або нічого…
 </div>
