<div class="wrap">
 <div class="page-title">
  <h1>Шипиш...</h1>
  <h2>Анатолій Мойсієнко</h2>
 </div>
 <div class="prose" id="content">
 Шипиш...<br />
Ти – войовит.<br />
Віки тер єретиків.<br />
Ти – щит.<br />
Живи ж.<br />
Я – цар під роями рим'я, орд...<br />
і праця –<br />
Осяяння. ( Ясо<br />
Осяяння, ясо!)<br />
Я – цар. Пієтет є і праця.<br />
І – цар патики та праці.
 </div>
