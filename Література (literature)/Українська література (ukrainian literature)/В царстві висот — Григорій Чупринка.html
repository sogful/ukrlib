<body>
<div class="wrap">
 <div class="page-title">
  <h1>В царстві висот</h1>
  <h2>Григорій Чупринка</h2>
 </div>
 <div class="prose" id="content">
 Я, мов дух, в самоті<br />
В чарівній висоті,<br />
В невимовно-чудовому мирі,<br />
Де горять,<br />
Миготять<br />
Зорі — свічі святі<br />
В голубому ефірі,—<br />
Красоті помолюсь<br />
І заллюсь,<br />
Розіллюсь<br />
В передзвонах та царственій лірі.
 </div>
</div>
