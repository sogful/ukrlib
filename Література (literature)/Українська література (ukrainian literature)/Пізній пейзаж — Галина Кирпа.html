 <div class="page-title">
  <h1>Пізній пейзаж</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Ясне й прозоре полотно полів.<br />
Вітри —<br />
в калинових вінках червоних.<br />
Останній передсніжний цвіт землі.<br />
Це знову — вперше.<br />
Знову — як ніколи.
 </div>
