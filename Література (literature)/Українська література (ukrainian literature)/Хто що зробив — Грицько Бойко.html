<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хто що зробив</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Татуньо мій сходив у ліс<br />
Сухих дровець у дім приніс.<br />
<br />
Бабуся воду скип'ятила,<br />
І підмела, і стіл накрила.<br />
<br />
Тут мама стала до стола<br />
І всім нам чаю палила.<br />
<br />
Для мене теж знайшлося діло:<br />
Я мила чашку, та… розбила.
 </div>
