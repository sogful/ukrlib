<div class="wrap">
 <div class="page-title">
  <h1>Вороне чорний</h1>
  <h2>Богдан Лепкий</h2>
 </div>
 <div class="prose" id="content">
 Вороне чорний! Ти з якого краю<br />
линеш?.. &#8220;Кров! кров! кров!..&#8221;<br />
Тихо, я вже знаю.<br /><br />
Вітре, чого ти так сумно й робільно<br />
виєш?.. &#8220;Шу! шу! ш-нір!..&#8221;<br />
Пст! говорити не вільно.<br /><br />
Річко, чом плесо твоє так рум'яне?..<br />
Га! розумію.<br />
Випливаєш з рани.
 </div>
