 <div class="page-title">
  <h1>Дитина</h1>
  <h2>Юрій Федькович</h2>
 </div>
 <div class="prose" id="content">
 — Чого ж бо ти плачеш, дитинонько мила?<br />
— А, ненечко-утко: котюга вкусила!<br />
— Коли від котюги такий тобі жас,<br />
То ще ти на світі заплачеш не раз.
