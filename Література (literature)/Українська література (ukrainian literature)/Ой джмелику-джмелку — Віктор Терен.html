<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ой джмелику-джмелку</h1>
  <h2>Віктор Терен</h2>
 </div>
 <div class="prose" id="content">
 Ой джмелину-джмелку,<br />
Літай помаленьку!<br />
<br />
Літай помалечку,<br />
Не сідай на стежку!<br />
<br />
Там бігає близько<br />
Мурашине військо.<br />
У дудочки трубить,<br />
На тебе наступить!..<br />
<br />
А сідай скраєчку<br />
На дрібненьку гречку.
 </div>
</div>
