 <div class="page-title">
  <h1>Диво калинове</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Як прислів'я чудове,<br />
йде від роду до роду,<br />
що народ — зодчий мови,<br />
мова – зодчий народу.
