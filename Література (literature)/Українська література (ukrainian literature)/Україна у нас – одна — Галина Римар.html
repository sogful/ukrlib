<div class="wrap">
 <div class="page-title">
  <h1>Україна у нас – одна</h1>
  <h2>Галина Римар</h2>
 </div>
 <div class="prose" id="content">
 Нема на світі більшого добра,<br />
Ніж та земля, яка нас народила,<br />
Скупала в руті-м'яті, любистках<br />
І на добро усіх благословила.<br />
<br />
Не пасинки, ми діти всі її,<br />
З її піснями ідемо по світу,<br />
Немає більш святого у житті,<br />
Як рідну землю над усе любити!
 </div>
