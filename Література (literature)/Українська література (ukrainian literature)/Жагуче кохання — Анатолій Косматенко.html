<body>
<div class="wrap">
 <div class="page-title">
  <h1>Жагуче кохання</h1>
  <h2>Анатолій Косматенко</h2>
 </div>
 <div class="prose" id="content">
 Гадюка покохала Їжака.<br />
Як обіймала! Цілувала! Обливалась кров'ю!<br />
І — що ж, кохання річ тонка —<br />
І задоволена була любов'ю...<br /><br />
Ну й на здоров'я!<br />
Кого ж було кохать — верткого Вужака?<br />
Чи тютіньку слизького — Слимака?!
 </div>
