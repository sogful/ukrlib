<div class="wrap">
 <div class="page-title">
  <h1>Віки живуть в старому фоліанті...</h1>
  <h2>Ліна Костенко</h2>
 </div>
 <div class="prose" id="content">
 Віки живуть в старому фоліанті.<br />
Душа шукає не прощення — прощ.<br />
А дощ так само ходить по веранді,<br />
екологічно небезпечний дощ.<br />
<br />
І сам на сам зі Всесвітом імлистим<br />
летить Земля із людством на плечі.<br />
А дощ шепочеться із листям,<br />
як я з тобою уночі.
 </div>
