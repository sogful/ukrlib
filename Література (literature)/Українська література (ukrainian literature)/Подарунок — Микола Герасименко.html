 <div class="page-title">
  <h1>Подарунок</h1>
  <h2>Микола Герасименко</h2>
 </div>
 <div class="prose" id="content">
 <p>Одного разу мама говорить Ганнусі:</p>
<p>
— Незабаром у нашого діда день народження. Треба подарувати йому щось таке, що йому найбільше подобається…</p>
<p>
— Краще за все книжку казок,— пропонує Ганнуся.</p>
<p>
— Чому ти так думаєш?</p>
<p>
— Тому що він дуже любить їх мені читати.</p>
