<body>
<div class="wrap">
 <div class="page-title">
  <h1>На батька бісового я трачу</h1>
  <h2>Тарас Шевченко</h2>
 </div>
 <div class="prose" id="content">
 На батька бісового я трачу<br />
І дні, і пера, і папір!<br />
А іноді то ще й заплачу,<br />
Таки аж надто. Не на мир<br />
І на діла його дивившись,<br />
А так, мов іноді, упившись,<br />
Дідусь сивесенький рида —<br />
Того, бачте, що сирота.
 </div>
