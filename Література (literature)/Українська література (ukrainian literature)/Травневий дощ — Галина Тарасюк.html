<body>
<div class="wrap">
 <div class="page-title">
  <h1>Травневий дощ</h1>
  <h2>Галина Тарасюк</h2>
 </div>
 <div class="prose" id="content">
 Травневий дощ,<br />
Немов лоша,<br />
Процокотів<br />
По голубому листі.<br />
І розчинилася душа<br />
У з&#8217;яві цій,<br />
Терпкій, пречистій.<br />
В саду навпроти<br />
Жінка молода<br />
Всміхалася безжурно<br />
Перехожим.<br />
Кирпата, ясноока і руда,<br />
На мене і на осінь<br />
Ранню схожа.
 </div>
