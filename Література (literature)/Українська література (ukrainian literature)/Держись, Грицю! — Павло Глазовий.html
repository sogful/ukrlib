<body>
<div class="wrap">
 <div class="page-title">
  <h1>Держись, Грицю!</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 Колись, було, мати каже<br />
Маленькому Грицю:<br />
— Загубишся на базарі.<br />
Держись за спідницю.<br /><br />
Не ті тепер пішли мами,<br />
Не ті тепер Гриці.<br />
Не так легко тепер дітям<br />
Дістать до спідниці...
 </div>
