<title>Йде січове військо</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Йде січове військо</h1>
  <h2>Михайло Гайворонський</h2>
 </div>
 <div class="prose" id="content">
 Йде січове військо,<br />
Та співає стиха:<br />
Як поборем воріженьків,<br />
Не буде в нас лиха!<br />
<br />
Йде січове військо<br />
В боротьбу криваву.<br />
Як поборем воріженьків,<br />
Здобудемо славу!<br />
<br />
Йде січове військо,<br />
Пісня степом лине:<br />
Як поборем воріженьків,<br />
Слава не загине!
 </div>
</div>
</body>
