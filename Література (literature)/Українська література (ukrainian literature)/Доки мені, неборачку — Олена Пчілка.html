<body>
<div class="wrap">
 <div class="page-title">
  <h1>Доки мені, неборачку</h1>
  <h2>Олена Пчілка</h2>
 </div>
 <div class="prose" id="content">
 Доки мені, неборачку,<br />
Сидіти в запічку?<br />
Я великий, я вже можу<br />
Погасити й свічку!<br />
Що пальчика спекти можна,<br />
Теє добре знаю,<br />
Вже тепер отак на "жижу" —<br />
Губки надимаю:<br />
— Фу!
 </div>
</div>
