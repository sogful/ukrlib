<title>Не дивуйтесь</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не дивуйтесь</h1>
  <h2>Євген Бандуренко</h2>
 </div>
 <div class="prose" id="content">
 Фотоплівку ввечері татусь<br />
Проявляв і скарживсь на невдачу:<br />
— Що за чудасія! Знов чомусь<br />
Жодного зображення не бачу.<br />
<br />
— Не дивуйтесь, тату,— відказав<br />
Гриць малий, що грався біля нього,—<br />
Я ще вдень цю плівку розглядав<br />
І не бачив теж на ній нічого.
 </div>
