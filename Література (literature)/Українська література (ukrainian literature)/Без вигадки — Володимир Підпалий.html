<body>
<div class="wrap">
 <div class="page-title">
  <h1>Без вигадки</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Перекреслить ластівка крилом<br />
день за вікнами.<br />
Ніч дощами вмиє шибки,<br />
витре вітром&#8230;<br /><br />
Що про осінь оцю собі<br />
я у пам&#8217;яті залишу &#8211;<br />
чи кленовий лапатий листок,<br />
а чи вигадку?..<br /><br />
Сиро. Холодно. Сіро.<br />
Аж під ранок<br />
пригадав перехожого,<br />
що розказував про любов.
 </div>
