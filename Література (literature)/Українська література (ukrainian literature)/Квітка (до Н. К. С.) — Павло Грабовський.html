<div class="wrap">
 <div class="page-title">
  <h1>Квітка (до Н. К. С.)</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Прощайся з ясною красою,<br />
Бо вже заходять косарі;<br />
Зайшли — поникла під косою,<br />
Зів’яла ранком на зорі.<br />
<br />
Ронивши слізку, посихаєш,-<br />
Беруть на образи святі;<br />
Ти все жива; благоухаєш<br />
На кипарисному хресті!
 </div>
