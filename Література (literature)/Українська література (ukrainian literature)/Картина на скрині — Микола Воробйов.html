<body>
<div class="wrap">
 <div class="page-title">
  <h1>Картина на скрині</h1>
  <h2>Микола Воробйов</h2>
 </div>
 <div class="prose" id="content">
 Чарівна картина намальована на скрипі:<br />
скачуть коні по долині,<br />
а чи далеко — ніхто не знає.<br />
<br />
Трохи збоку річка тече,<br />
а чи далеко — ніхто не знає.<br />
<br />
А за річкою сонце червоне сідає,<br />
а в скині на самому дні<br />
коралове намисто лежить.
 </div>
