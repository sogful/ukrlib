<body>
<div class="wrap">
 <div class="page-title">
  <h1>Для потішечки</h1>
  <h2>Катерина Перелісна</h2>
 </div>
 <div class="prose" id="content">
 Попід вікнами Мороз<br />
Ходить-щулиться,<br />
То загляне у садок.<br />
То на вулицю:<br />
"Де це дітоньки малі —<br />
Поховалися?<br />
Та невже ж вони мене<br />
Ізлякалися?<br />
Я ж їм шкоди не зроблю<br />
Анітрішечки,<br />
Тільки носика вщипну<br />
Для потішечки!"
 </div>
