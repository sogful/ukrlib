<body>
<div class="wrap">
 <div class="page-title">
  <h1>Коріння й насіння</h1>
  <h2>Павло Глазовий</h2>
 </div>
 <div class="prose" id="content">
 — А ти, татку, в школі вчився?<br />
— Учився, Сергійку.<br />
— А це правда, що ти, тату,<br />
Був одержав двійку?<br />
— Було таке, траплялося...<br />
Малий засміявся:<br />
— Тоді мама правду каже,<br />
Що я в тебе вдався.
 </div>
