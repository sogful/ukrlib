<body>
<div class="wrap">
 <div class="page-title">
  <h1>Перший сніг</h1>
  <h2>Ірина Наріжна</h2>
 </div>
 <div class="prose" id="content">
 Сипле з неба перший сніг<br />
Зіроньками білими,<br />
Тихо стелить по землі<br />
Ніжно-пишні килими.<br />
<br />
В білі шати одяга<br />
Дерева безлистії.<br />
Проти сонечка горить<br />
Іскрами барвистими.<br />
<br />
Вся природа стала вмить<br />
Зовсім-зовсім новою —<br />
І здається все мені<br />
Казкою чудовою.
 </div>
