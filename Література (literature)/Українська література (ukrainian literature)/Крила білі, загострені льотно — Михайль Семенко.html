<div class="wrap">
 <div class="page-title">
  <h1>Крила білі, загострені льотно</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Крила білі, загострені льотно —<br />
Крила смілі душі-Розалінди —<br />
Оескезені знов безтурботно<br />
Перед острахом Сцілли й Харібди.<br /><br />
Крила м'якості снів оксамитних,<br />
Крила казок осніжених Сканди,—<br />
Скільки згибів на схилах блакитних,<br />
Які блисні ажурні гірлянди.
 </div>
