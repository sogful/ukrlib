<body>
<div class="wrap">
 <div class="page-title">
  <h1>Завелика порція</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 В ресторані замовляє вечерю дідок:<br />
— Дайте півлітра горілки<br />
Й один огірок! —<br />
Йому кажуть: — Завелика<br />
Порція така.<br />
— Тоді, — просить дідок, — дайте<br />
Лиш пів-огірка!
 </div>
