<div class="wrap">
 <div class="page-title">
  <h1>"Пожежник"</h1>
  <h2>Василь Василашко</h2>
 </div>
 <div class="prose" id="content">
 Він сам підпалював і сам таки й гасив,<br />
Палив тихенько, а гасив —<br />
щоб люди бачили.<br />
І от — свого домігся, сучий син:<br />
Вже палія — пожежником призначили!
 </div>
