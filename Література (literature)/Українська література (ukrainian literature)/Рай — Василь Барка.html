<div class="wrap">
 <div class="page-title">
  <h1>Рай</h1>
  <h2>Василь Барка</h2>
 </div>
 <div class="prose" id="content">
 Моляться соняшники.<br />
<br />
Грім на хмарі Біблію читає...<br />
тополя пошепки: страшний який<br />
твій плачі Ісаіє!<br />
<br />
Моляться соняшники.<br />
<br />
Голод. Мати немовля вбиває...<br />
тополя закричала: он який<br />
мій рай, Ісаіє!<br />
<br />
("Білий світ", 1947)
 </div>
</div>
