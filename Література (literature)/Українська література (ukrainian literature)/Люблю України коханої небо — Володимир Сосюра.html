<div class="wrap">
 <div class="page-title">
  <h1>Люблю України коханої небо</h1>
  <h2>Володимир Сосюра</h2>
 </div>
 <div class="prose" id="content">
 Люблю України коханої небо,<br />
що буде, люблю, й що було.<br />
Живи, моє серце, живи не для себе,<br />
для себе ж бо ти й не жило.<br /><br />
Щасливії люди, щасливих багато.<br />
Живуть для живого живі.<br />
Тому я й повинен про щастя співати,<br />
коли навіть серце в крові!..
 </div>
