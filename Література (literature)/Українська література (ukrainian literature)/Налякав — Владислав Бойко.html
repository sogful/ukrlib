<body>
<div class="wrap">
 <div class="page-title">
  <h1>Налякав</h1>
  <h2>Владислав Бойко</h2>
 </div>
 <div class="prose" id="content">
 — Гей, Петре, чув? Біжи мерщій в село!<br />
На річці греблю повінню прорвало,<br />
дворів зо двадцять, мабуть, вже знесло —<br />
хліви і погреби — усе пропало!<br />
Ось-ось і твій будинок геть змете...<br /><br />
— Тю, налякав! А я вже, як на те,<br />
подумав, що "Динамо" знов програло!
 </div>
