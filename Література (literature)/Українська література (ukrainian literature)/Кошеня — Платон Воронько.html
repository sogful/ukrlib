<div class="wrap">
 <div class="page-title">
  <h1>Кошеня</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Засмутилось кошеня —<br />
Треба в школу йти щодня.<br />
І прикинулося вмить,<br />
Що у нього хвіст болить.<br />
Довго думав баранець<br />
І промовив, як мудрець:<br />
"Це хвороба не проста,<br />
Треба різати хвоста".<br />
Кошеня кричить:<br />
"Ніколи!<br />
Краще я піду до школи!"
 </div>
