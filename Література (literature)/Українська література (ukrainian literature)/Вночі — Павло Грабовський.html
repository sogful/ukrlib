<div class="wrap">
 <div class="page-title">
  <h1>Вночі</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 Ніч панує непроглядна,<br />
Тьма усе заволіка...<br />
О, яка ж ти безвідрадна,<br />
Моя тюрмо, та тяжка!<br />
<br />
І в минулому — могили,<br />
І попереду — хрести;<br />
Як-то вельми треба сили<br />
Світлу віру донести.
 </div>
