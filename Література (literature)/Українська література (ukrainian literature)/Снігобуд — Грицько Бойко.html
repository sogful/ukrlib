<body>
<div class="wrap">
 <div class="page-title">
  <h1>Снігобуд</h1>
  <h2>Грицько Бойко</h2>
 </div>
 <div class="prose" id="content">
 Снігобуд! Снігобуд!<br />
Наробили ми споруд!<br />
<br />
Носить сніг дітвора —<br />
У дворі росте гора.<br />
<br />
З снігу робимо цеглини —<br />
Кладемо високі стіни.<br />
<br />
Ти замерз? Ану ходім<br />
Будувати сніжний дім!
 </div>
