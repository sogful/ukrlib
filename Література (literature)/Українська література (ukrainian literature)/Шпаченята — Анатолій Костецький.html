<body>
<div class="wrap">
 <div class="page-title">
  <h1>Шпаченята</h1>
  <h2>Анатолій Костецький</h2>
 </div>
 <div class="prose" id="content">
 Веселий клен росте<br />
при хаті,<br />
на нім —<br />
шпаківня між гілками,<br />
а у шпаківні —— шпаченята<br />
сидять під крилами<br />
у мами.<br />
<br />
Їм у шпаківні<br />
гарно й тепло<br />
лежати в матінки під серцем,<br />
бо з крил її<br />
струмочком щедрим<br />
у їхні крильця<br />
сила ллється.
 </div>
