<div class="wrap">
 <div class="page-title">
  <h1>Після грози</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Гроза пройшла... Зітхнули трави,<br />
Квітки головки підняли,<br />
І сонце, тепле і ласкаве,<br />
Спинило погляд на землі.<br />
<br />
Літає радість, щастя світить,<br />
Дзвенять пташки в садах рясних,<br />
Сміються знову трави, квіти...<br />
А сльози ще тремтять на них.
 </div>
