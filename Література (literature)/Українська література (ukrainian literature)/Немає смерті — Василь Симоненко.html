<div class="wrap">
 <div class="page-title">
  <h1>Немає смерті</h1>
  <h2>Василь Симоненко</h2>
 </div>
 <div class="prose" id="content">
 Немає смерті. І не ждіть — не буде.<br />
Хто хоче жить, ніколи не помре.<br />
І будуть вічно веселитись люди,<br />
І танцювать дівчата в кабаре.<br /><br />
І в сіру ніч, коли мене не стане,<br />
Коли востаннє римою зітхну —<br />
Я не помру, лиш серце в грудях стане,<br />
Схолоне кров, а я навік засну.
 </div>
