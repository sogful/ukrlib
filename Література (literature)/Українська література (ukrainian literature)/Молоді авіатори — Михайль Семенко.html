<body>
<div class="wrap">
 <div class="page-title">
  <h1>Молоді авіатори</h1>
  <h2>Михайль Семенко</h2>
 </div>
 <div class="prose" id="content">
 Я вітаю вас, молоді авіатори,<br />
І тепло стискую руки.<br />
Зсунувся штучний екватор,<br />
В мого порога виріс бамбук.<br /><br />
Я освітлюю блиском серця бензинного<br />
Шум пропелера й шкіряне кепі.<br />
Руште все огороджене незмінно —<br />
Інтернаціональте степ!
 </div>
