<body>
<div class="wrap">
 <div class="page-title">
  <h1>Весняні тріолети</h1>
  <h2>Лібер Рабинович</h2>
 </div>
 <div class="prose" id="content">
 Проміння злотні пасма стелить<br />
Під грізним натиском весни;<br />
Барвиста синь з височини<br />
Проміння злотні пасма стелить.<br />
<br />
Проходять геть зимові сни<br />
І світить день ясний-ясний.<br />
Проміння злотні пасма стелить<br />
Під грізним натиском весни.
 </div>
</div>
