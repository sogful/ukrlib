 <div class="page-title">
  <h1>З однієї ми родини</h1>
  <h2>Дмитро Білоус</h2>
 </div>
 <div class="prose" id="content">
 Загадка<br /><br />
З однієї ми родини<br />
від Андрія до Ярини.<br />
Як по одному, самі,<br />
ми буваємо німі,<br />
хоч і маєм різні назви<br />
й добре знаєте всіх нас ви.<br />
Певним станемо рядком –<br />
заговоримо ладком.<br />
Ми – писемності основа.<br />
А без нас ніхто ні слова!<br /><br />
Що це таке?<br /><br />
(Літери абетки)
 </div>
