<title>Оце ще й так бува</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Оце ще й так бува</h1>
  <h2>Галина Кирпа</h2>
 </div>
 <div class="prose" id="content">
 Мій давній друже Кроте,<br />
не сиди в норі!<br />
А сядь отут, навпроти,<br />
о літяній порі.<br /><br />
Послухав мене Кріт<br />
і вийшов із нори.<br />
Дививсь на білий світ<br />
він день&#8230;<br />
і два&#8230;<br />
і три&#8230;<br /><br />
І все шептав: — Дива!<br />
Оце ще й так бува?<br />
Чого ж сидіть в норі<br />
о літяній порі?
 </div>
</div>
