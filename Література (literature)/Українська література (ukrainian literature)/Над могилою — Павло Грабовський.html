<body>
<div class="wrap">
 <div class="page-title">
  <h1>Над могилою</h1>
  <h2>Павло Грабовський</h2>
 </div>
 <div class="prose" id="content">
 І пекло мук, і крові море,<br />
Якого, може, не знайду,<br />
І найлютіше в світі горе<br />
Я бачив — гіршого не жду.<br />
<br />
Чи мислив я ж, щоб ізнялася<br />
Рука на неї, всесвяту,<br />
Щоб кров та чиста пролилася,<br />
Щоб помста вбила душу ту!
 </div>
