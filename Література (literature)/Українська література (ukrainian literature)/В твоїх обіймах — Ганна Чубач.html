<body>
<div class="wrap">
 <div class="page-title">
  <h1>В твоїх обіймах</h1>
  <h2>Ганна Чубач</h2>
 </div>
 <div class="prose" id="content">
 В маленькім човнику<br />
Долоні золотої<br />
Я почалася,<br />
Мов легенда Трої.<br />
Я піднялася<br />
Піною із моря.<br />
Я посміхнулась<br />
Радістю до горя<br />
І попливла<br />
Між хмарами рікою<br />
У човнику долоні золотої…
 </div>
