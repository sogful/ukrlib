<body>
<div class="wrap">
 <div class="page-title">
  <h1>Впало – ставай до стінки</h1>
  <h2>Євген Плужник</h2>
 </div>
 <div class="prose" id="content">
 Впало – ставай до стінки! –<br />
Сперся плечем на ґанок&#8230;<br />
Тільки й згадав: у жінки<br />
Грошей нема на ранок.<br /><br />
І ні жалю, ні болю.<br />
Бачив – нагана наставив&#8230;<br />
Ніби виконував ролю<br />
В нецікавій виставі.<br /><br />
Тільки й думок – на ранок<br />
Хліба нема у жінки&#8230;<br />
Ґанок.<br />
Труп біля стінки.
 </div>
