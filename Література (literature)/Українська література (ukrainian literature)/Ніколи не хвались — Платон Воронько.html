<title>Ніколи не хвались</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ніколи не хвались</h1>
  <h2>Платон Воронько</h2>
 </div>
 <div class="prose" id="content">
 Хвалився кіт,<br />
Що він убрід<br />
Дніпро перебреде.<br />
Та як пішов —<br />
І не прийшов,<br />
Нема кота ніде.<br />
<br />
І ти ніколи не хвались,<br />
Коли не можеш — не берись.
 </div>
</div>
</body>
