<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ми – дим...</h1>
  <h2>Анатолій Мойсієнко</h2>
 </div>
 <div class="prose" id="content">
 Ми – дим.<br />
Ми – дим віків, ми – дим.<br />
Ми – дим низин, ми – дим.<br />
Ми – долом молодим.<br />
Ви – дивами див.<br />
Ви – душу димами, душу див.<br />
Ви – духу за пазуху див.<br />
Ми – дух у дим.
 </div>
