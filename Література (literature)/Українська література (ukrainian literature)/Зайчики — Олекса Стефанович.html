 <div class="page-title">
  <h1>Зайчики</h1>
  <h2>Олекса Стефанович</h2>
 </div>
 <div class="prose" id="content">
 <blockquote>М. К.</blockquote><br />
<br />
Мете і мете.<br />
Кругом така пустка:<br />
Минулась капустка,<br />
Нічого ніде.<br />
<br />
Мороз — без послабки:<br />
Вже мало не плачуть...<br />
Все бігають, скачуть,<br />
Постукують в лапки...<br />
<br />
Дихнуть та потруть,<br />
Та все надаремно...<br />
Ах, як неприємно,<br />
Що лапок не чуть!..<br />
<br />
Прага, 1936
