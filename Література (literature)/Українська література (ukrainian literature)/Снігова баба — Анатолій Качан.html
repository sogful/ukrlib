<body>
<div class="wrap">
 <div class="page-title">
  <h1>Снігова баба</h1>
  <h2>Анатолій Качан</h2>
 </div>
 <div class="prose" id="content">
 — Нуте, хто з вас там бистріший?<br />
То ідіть в садок скоріше!<br />
Купи снігу там лежать! —<br />
Хлопці поклик підхопили,<br />
Бабу з снігу враз зліпили,<br />
Очі з вугілля всадили,<br />
От так "баба"! Молодці!<br />
Ну, дивуйтесь, горобці!
 </div>
