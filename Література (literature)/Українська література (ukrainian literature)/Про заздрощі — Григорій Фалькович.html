<body>
<div class="wrap">
 <div class="page-title">
  <h1>Про заздрощі</h1>
  <h2>Григорій Фалькович</h2>
 </div>
 <div class="prose" id="content">
 Задоволені в'юни –<br />
По ставках живуть вони.<br />
Задоволені й слони –<br />
По лісах живуть вони.<br />
Водоплавному в'юнові<br />
Нащо заздрити слонові,<br />
Суходольному ж слону<br />
Нащо заздрити в'юну?<br />
В кожного життя своє.<br />
Тож радій тому, що є.
 </div>
</div>
