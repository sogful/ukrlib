<body>
<div class="wrap">
 <div class="page-title">
  <h1>Кленове дитятко</h1>
  <h2>Микола Воробйов</h2>
 </div>
 <div class="prose" id="content">
 Листя-жовтятко,<br />
кленове дитятко,<br />
летить собі за вітрим,<br />
не знає, де сісти.<br />
<br />
— Сідай за горою,<br />
де сонце сідає.<br />
За горою кам'янок,<br />
за синім Дунаєм.
 </div>
</div>
