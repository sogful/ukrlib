<body>
<div class="wrap">
 <div class="page-title">
  <h1>Зелена колиска</h1>
  <h2>Василь Голобородько</h2>
 </div>
 <div class="prose" id="content">
 Нитки променів,<br />
ні, золоті вервечки,<br />
що на них зелена колиска<br />
гойдається.<br />
<br />
Криничка з дитячими очима<br />
сміється тихенько,<br />
бо косарі губами лоскочуть.
 </div>
</div>
