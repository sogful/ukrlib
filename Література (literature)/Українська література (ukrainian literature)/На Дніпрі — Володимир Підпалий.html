 <div class="page-title">
  <h1>На Дніпрі</h1>
  <h2>Володимир Підпалий</h2>
 </div>
 <div class="prose" id="content">
 Ні припонів, ані човнів —<br />
даль широка, мов розкрил брів.<br />
<br />
Тільки хвиля сива встає,<br />
небо гребенем дістає<br />
<br />
і сміється собі вгорі,<br />
що скупає мене в Дніпрі,<br />
<br />
що заковані береги<br />
повінь-розповінь не вберегли...<br />
1969
 </div>
