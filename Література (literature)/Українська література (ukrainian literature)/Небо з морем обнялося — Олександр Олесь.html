<body>
<div class="wrap">
 <div class="page-title">
  <h1>Небо з морем обнялося...</h1>
  <h2>Олександр Олесь</h2>
 </div>
 <div class="prose" id="content">
 Небо з морем обнялося,<br />
Море в небі розлилося...<br />
Цілий світ вони забули<br />
І в туманах потонули...<br />
<br />
* * *<br />
<br />
Море і море! Блакить і блакить...<br />
Крил мені, крил! Щоб туди полетіть!<br />
Чайкою в небі над морем спинитись,<br />
Дихать і вдалеч за обрій дивитись...
 </div>
</div>
