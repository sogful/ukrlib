<body>
<div class="wrap">
 <div class="page-title">
  <h1>Чий пес кращий</h1>
  <h2>Михайло Білецький</h2>
 </div>
 <div class="prose" id="content">
 — Пес у мене знаменитий,<br />
Діє без розкачки.<br />
Не встигну з ружжа пальнути —<br />
Уже несе качку! —<br />
А сусід розгладив вуса:<br />
— То ото й усе?<br />
Мій так обскубе спочатку,<br />
А тоді несе!
 </div>
