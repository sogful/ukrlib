<body>
<div class="wrap">
 <div class="page-title">
  <h1>Славная конина</h1>
  <h2>Степан Руданський</h2>
 </div>
 <div class="prose" id="content">
 Сидить мале циганя,<br />
Коня виїжджає,<br />
А старий — його й коня<br />
Нагайкою крає.<br /><br />
Заплакало циганя,<br />
Лягло на коневі&#8230;<br />
А той тогді до купця<br />
Та й каже купцеві:<br /><br />
"Та купуй уже, купуй,<br />
Славная конина!<br />
Чи ж не бачиш, як по ній<br />
Сплакалась дитина?"
 </div>
</div>
