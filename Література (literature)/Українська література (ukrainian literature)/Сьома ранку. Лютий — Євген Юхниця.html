 <div class="prose" id="content">
 Сьома ранку. Лютий<br />
Ху&#769;хкає снігами.<br />
Вийшов не зітхнути –<br />
Дихати світами.<br />
…Ой, смакую досвід<br />
Вимерзлий, снігастий…<br />
Дихання свободи –<br />
Послугує щастю-<br />
<br />
06.02.19р.
