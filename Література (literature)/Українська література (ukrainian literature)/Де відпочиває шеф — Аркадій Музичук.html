<body>
<div class="wrap">
 <div class="page-title">
  <h1>Де відпочиває шеф</h1>
  <h2>Аркадій Музичук</h2>
 </div>
 <div class="prose" id="content">
 Дві подруги розмовляють —<br />
Олена і Ната:<br />
— Де твій шеф відпочивав?<br />
— Щороку в Карпатах.<br />
— Старомодний він у тебе!<br />
Помінять не хочеш?<br />
Ось мій їздить — куди треба...<br />
Куди я захочу.
 </div>
