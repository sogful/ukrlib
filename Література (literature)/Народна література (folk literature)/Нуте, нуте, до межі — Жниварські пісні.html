<title>Нуте, нуте, до межі — Жниварські пісні</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Нуте, нуте, до межі</h1>
  <h2>Жниварські пісні</h2>
 </div>
 <div class="prose" id="content">
<p>
 </p>
<p>
Нуте, нуте, до межі,</p>
<p>
Варенички у діжі.</p>
<p>
 </p>
<p>
Ой нуте, робіть,</p>
<p>
Себе не баріть.</p>
<p>
 </p>
<p>
Нуте, нуте, по п'ять,</p>
<p>
Варенички киплять.</p>
<p>
 </p>
<p>
Не будете пильнувать,
—</p>
<p>
Тут будете ночувать.</p>
<p>
 </p>
<p>
Вгору, сонінько, вгору,</p>
<p>
Хай я нивочку дожну.</p>
 </div>
</div>
