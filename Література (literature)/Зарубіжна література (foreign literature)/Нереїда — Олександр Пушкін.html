<div class="wrap">
 <div class="page-title">
  <h1>Нереїда</h1>
  <h2>Олександр Пушкін</h2>
 </div>
 <div class="prose" id="content">
 Серед зелених вод, що пе&#769;стують Тавріду,<br />
На вранішній зорі я бачив Нереїду.<br />
Сховавшись між дерев, дихнуть я ледве смів:<br />
Напівбогиня та край тихих берегів<br />
Грудьми, за лебедя білішими, зринала<br />
І піну з кіс важких струмками вижимала.
 </div>
