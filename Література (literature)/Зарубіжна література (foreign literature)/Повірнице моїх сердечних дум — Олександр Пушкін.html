</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Повірнице моїх сердечних дум...</h1>
  <h2>Олександр Пушкін</h2>
 </div>
 <div class="prose" id="content">
 Повірнице моїх сердечних дум,<br />
О ти, чий голос ніжний та недбалий<br />
Смиряв чуття, що в серці бушували,<br />
І часом веселив печальний ум,<br />
Моя ти вірна і мрійлива ліро.
 </div>
</div>
