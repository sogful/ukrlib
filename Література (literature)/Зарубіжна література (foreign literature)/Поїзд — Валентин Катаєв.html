 <div class="page-title">
  <h1>Поїзд</h1>
  <h2>Валентин Катаєв</h2>
 </div>
 <div class="prose" id="content">
 Знов узліссям гуркочуть колеса!..<br />
Мов коханець, в призначений час<br />
З білим написом поїзд "Одеса"<br />
Пробігає шумливо повз нас.<br />
<br />
Він димами крайнебо посмужив.<br />
Стогнуть рейки, щасливо дзвенять,<br />
Кожен гляне услід забайдуже,<br />
А я знов у полоні сум'ять.<br />
<br />
1944, Передєлкіно
