<title>Я це не я...</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Я це не я...</h1>
  <h2>Хуан Рамон Хіменес</h2>
 </div>
 <div class="prose" id="content">
 <em>Перекладач: І.Качуровський</em><br />
<br />
Я це не я.<br />
Я той,<br />
Що йде, небачений, зі мною поруч.<br />
Що іноді до нього я зайду.<br />
А іноді забуду.<br />
<br />
Той, що мовчить, сумирний, як<br />
говорю,<br />
Що вибача, благий, коли ненавиджу,<br />
Що там проходить, де мене нема,<br />
І що стоятиме, коли помру я.
 </div>
</div>
