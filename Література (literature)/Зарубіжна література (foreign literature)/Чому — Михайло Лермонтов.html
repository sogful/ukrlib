<div class="wrap">
 <div class="page-title">
  <h1>Чому</h1>
  <h2>Михайло Лермонтов</h2>
 </div>
 <div class="prose" id="content">
 Сумний я через те, що я тебе люблю,<br />
І знаю: молодість уквітчану твою<br />
Не омине гірка підступність поговору.<br />
За кожний світлий день чи насолоди пору<br />
Печаллю і слізьми заплатиш ти судьбі.<br />
Сумний я... через те, що весело тобі.<br />
<br />
Перекладач: Л. С. Первомайський
 </div>
