<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ячні пироги</h1>
  <h2>Роберт Бернс</h2>
 </div>
 <div class="prose" id="content">
 Ой см&#225;чні, см&#225;чні<br />
Пироги ячні.<br />
Люблять горяни<br />
Пироги ячні...<br />
В бою безстрашні,<br />
Завжди звитяжні<br />
Хлопці, що люблять<br />
Пироги ячні.<br />
<br />
Ой см&#225;чні, см&#225;чні<br />
Пироги ячні.<br />
Люблять горяни<br />
Пироги ячні,<br />
Мужні, відважні<br />
I не продажні<br />
Хлопці, що люблять<br />
Пироги ячні.
 </div>
