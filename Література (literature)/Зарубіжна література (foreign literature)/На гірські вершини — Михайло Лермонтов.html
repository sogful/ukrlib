<div class="wrap">
 <div class="page-title">
  <h1>На гірські вершини...</h1>
  <h2>Михайло Лермонтов</h2>
 </div>
 <div class="prose" id="content">
 На гірські вершини<br />
Темрява лягла;<br />
Свіжістю долини<br />
Затопила мла;<br />
Не курить дорога,<br />
Не тремтить полинь…<br />
Помолись до Бога<br />
І лягай, спочинь.<br />
<br />
Переклад Грязнова Олександра Андрійовича
