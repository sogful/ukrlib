<div class="wrap">
 <div class="page-title">
  <h1>На півночі кедр одинокий...</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 На півночі кедр одинокий<br />
В холодній стоїть вишині,<br />
І, сніжною млою повитий,<br />
Дрімає і мріє вві сні.<br />
<br />
Він мріє про пальму чудову,<br />
Що десь у східній землі<br />
Самотньо і мовчки сумує<br />
На спаленій сонцем скалі.<br />
<br />
<em>Переклад Максима Рильського</em>
 </div>
</div>
