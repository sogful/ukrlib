<body>
<div class="wrap">
 <div class="page-title">
  <h1>Таборові огні</h1>
  <h2>Гійом Аполлінер</h2>
 </div>
 <div class="prose" id="content">
 Вогні бродячі таборові<br />
Освітлюють танок привидь<br />
I сни встають без плоті й крові<br />
Поміж узорних верховіть<br />
<br />
Зневага жаль що так гордливо<br />
Буяли в серці де вони<br />
Ледь жевріє нещасне тливо<br />
Із спогаду і таїни
 </div>
</div>
