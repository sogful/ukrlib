<body>
<div class="wrap">
 <div class="page-title">
  <h1>Та підійди</h1>
  <h2>Галина Посвятовська</h2>
 </div>
 <div class="prose" id="content">
 та підійди<br />
я обійму тебе цнотливо<br />
як землю втихомирена вода<br />
<br />
та підійди<br />
торкнуся брів твоїх<br />
росою вранішньою<br />
<br />
та підійди<br />
ввілюся у вуста твої<br />
водою джерела найглибшого<br />
<br />
теплим дощем<br />
впаду<br />
на шибку посмішки твоєї<br />
і залишуся аби висхнути<br />
за решту сонцедайних днів
 </div>
</div>
</body>
