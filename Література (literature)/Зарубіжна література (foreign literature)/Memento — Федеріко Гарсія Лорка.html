<div class="wrap">
 <div class="page-title">
  <h1>Memento</h1>
  <h2>Федеріко Гарсія Лорка</h2>
 </div>
 <div class="prose" id="content">
 Коли я помру,<br />
покладіть мене й мою гітару<br />
в піскову труну.<br />
Коли я помру,<br />
поховайте мене в руті-м'яті<br />
в миртовім гаю.<br />
Коли я помру,<br />
прапорцем на дах мене поставте<br />
хай помайорю.<br />
Коли я помру.
 </div>
