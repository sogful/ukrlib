<body>
<div class="wrap">
 <div class="page-title">
  <h1>На личку в тебе літо...</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 На личку в тебе літо,<br />
Неначе жар горить,<br />
Але в малім твоїм серці<br />
Зима, зима лежить.<br />
<br />
Нічого в цьому світі<br />
Тривалого нема —<br />
Палатиме в серці літо,<br />
А личко зв'ялить зима.
 </div>
