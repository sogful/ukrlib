<body>
<div class="wrap">
 <div class="page-title">
  <h1>Пушкін</h1>
  <h2>Анна Ахматова</h2>
 </div>
 <div class="prose" id="content">
 Хто знає, що є в світі слава!<br />
І чим він заплатив за право,<br />
Можливість або благодать<br />
Над всім так мудро і лукаво<br />
Пожартувати, помовчать<br />
І ногу ніжкою назвать?..<br />
<br />
7 березня 1943
 </div>
</div>
