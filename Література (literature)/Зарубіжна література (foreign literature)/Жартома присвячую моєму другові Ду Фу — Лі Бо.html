</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Жартома присвячую моєму другові Ду Фу</h1>
  <h2>Лі Бо</h2>
 </div>
 <div class="prose" id="content">
 На гірській верховині,<br />
де вибігли сосни на схили,<br />
<br />
Випадково зійшлися<br />
ополудні наші стежки.<br />
<br />
— Ох, шановний мій друже,<br />
та й як же ви зблідли й змарніли!<br />
<br />
Чи важка ж то робота —<br />
складати у віршах рядки?
 </div>
</div>
