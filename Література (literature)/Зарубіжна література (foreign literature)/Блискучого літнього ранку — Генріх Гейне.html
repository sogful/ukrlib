<body>
<div class="wrap">
 <div class="page-title">
  <h1>Блискучого літнього ранку</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Блискучого літнього ранку<br />
Ходжу я по свому саду.<br />
Квітки розмовляють, шепочуть,<br />
А я, я мовчазний іду.<br />
<br />
Квітки розмовляють, шепочуть,<br />
Благає їх погляд смутний:<br />
"Не гнівайсь на нашу сестричку,<br />
Блідий чоловіче, сумний!"
 </div>
</div>
