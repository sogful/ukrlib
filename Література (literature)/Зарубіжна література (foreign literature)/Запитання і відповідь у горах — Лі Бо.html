<div class="wrap">
 <div class="page-title">
  <h1>Запитання і відповідь у горах</h1>
  <h2>Лі Бо</h2>
 </div>
 <div class="prose" id="content">
 Мене спитали, в чому смисл мого життя у горах.<br />
Я усміхнувсь і промовчав, ну що тут говорити!<br />
З дерев опалі пелюстки пливуть у далечі-безвісті —<br />
В новий, у зовсім інший світ, байдужі до людського!<br />
<br />
<em>Переклад Генадія Туркова</em>
 </div>
