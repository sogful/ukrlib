<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мабуть, раз в житті буває...</h1>
  <h2>Давид Гофштейн</h2>
 </div>
 <div class="prose" id="content">
 Мабуть,<br />
Раз в житті буває<br />
День такий хороший, гожий!<br />
Мабуть,<br />
Разом дні усі хороші<br />
<br />
Десь зібрались світлим маєм<br />
I обрали одностайно<br />
Цей хороший день вождем!<br />
Мабуть,<br />
Світ увесь, як надзвичайний,<br />
Відзначає теж цей день!..
 </div>
