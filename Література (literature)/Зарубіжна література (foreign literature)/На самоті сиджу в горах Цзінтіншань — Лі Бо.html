</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>На самоті сиджу в горах Цзінтіншань</h1>
  <h2>Лі Бо</h2>
 </div>
 <div class="prose" id="content">
 Зграя птиць пролетіла<br />
і зникла ту ж мить вдалині,<br />
<br />
Сиротлива хмаринка<br />
за ними слідом поспішає.<br />
<br />
Я на гори дивлюся —<br />
і не набридає мені,<br />
<br />
Горам також на мене<br />
дивитися не набридає.
 </div>
