<title>Три коханки</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Три коханки</h1>
  <h2>Сааді</h2>
 </div>
 <div class="prose" id="content">
 Є три любки, три коханки є:<br />
Ця за хліб свою любов дає,<br />
<br />
Та красою звабить, чарівниця,<br />
Третя в душу ввійде й залишиться.<br />
<br />
Першій хліба дай і одвернись.<br />
З другою натішся й розлучись.<br />
<br />
Третю стрінеш, не роздумуй двічі:<br />
Душу всю віддай їй, чоловіче.
 </div>
</div>
