<body>
<div class="wrap">
 <div class="page-title">
  <h1>В альбом</h1>
  <h2>Джордж Гордон Байрон</h2>
 </div>
 <div class="prose" id="content">
 Як зупиня нас невідоме<br />
Ім'я на брилі гробовій,<br />
Так і рядки оці в альбомі<br />
Нехай привернуть погляд твій.<br />
<br />
Колись їх, може, прочитавши,<br />
Ти в суєті буденних справ<br />
Подумаєш: "Його нема вже,<br />
Та серце тут він поховав".<br />
<br />
14 вересня 1809
 </div>
</div>
