<div class="wrap">
 <div class="page-title">
  <h1>З пісень моїх плине отрута...</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 З пісень моїх плине отрута,<br />
Інакших не знаю я.<br />
Отрути до мого серця<br />
Влила ти, кохана моя.<br />
<br />
З пісень моїх плине отрута,<br />
Інакших не знаю я,<br />
Бо в серці у мене змії<br />
I ти, кохана моя.
 </div>
