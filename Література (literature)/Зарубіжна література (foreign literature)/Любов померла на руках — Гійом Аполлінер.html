<body>
<div class="wrap">
 <div class="page-title">
  <h1>Любов померла на руках...</h1>
  <h2>Гійом Аполлінер</h2>
 </div>
 <div class="prose" id="content">
 Любов померла на руках<br />
Ти пам'ятаєш першу зустріч<br />
Та інша прилетить як птах<br />
Ти тільки вийди їй назустріч<br />
<br />
Минула ще одна весна<br />
Вона була ласкава й ніжна<br />
Прощай годино чарівна<br />
Ти прийдеш знов жадана й ніжна
 </div>
