<body>
<div class="wrap">
 <div class="page-title">
  <h1>Пам'яті друга</h1>
  <h2>Анна Ахматова</h2>
 </div>
 <div class="prose" id="content">
 І в День Перемоги, ніжний і туманний,<br />
Коли зоря, як заграва, красна,<br />
Вдовою у безіменної могили<br />
Клопочеться запізніла весна.<br />
Вона з колін піднятися не поспішає,<br />
Дихне на нирку, і траву погладить,<br />
І метелика з плеча на землю ссадит,<br />
І перший кульбаба распушит.
 </div>
