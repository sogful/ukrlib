<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сурмлять блакитні гусари</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Сурмлять блакитні гусари<br />
І геть виїжджають з воріт.<br />
Кохана, я знову для тебе<br />
Приношу троянди цвіт.<br />
<br />
Чудові були в нас гості,-<br />
Військового щастя сини!<br />
Здається, і в серці твоєму<br />
Були на постої вони.
 </div>
</div>
