<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ланцюги</h1>
  <h2>Віслава Шимборська</h2>
 </div>
 <div class="prose" id="content">
 Спекотний день, собача буда і пес на ланцюгу.<br />
За кілька кроків – наповнена водою миска.<br />
Але ланцюг короткий надто і пес не дістає до неї.<br />
Додаймо до цього образу іще одну деталь:<br />
наші – довші набагато<br />
та не такі помітні – ланцюги,<br />
що дозволяють нам спокійно пройти повз.
 </div>
