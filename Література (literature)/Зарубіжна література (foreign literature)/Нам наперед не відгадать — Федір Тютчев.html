<body>
<div class="wrap">
 <div class="page-title">
  <h1>Нам наперед не відгадать...</h1>
  <h2>Федір Тютчев</h2>
 </div>
 <div class="prose" id="content">
 Нам наперед не відгадать,<br />
Як слово наше відгукнеться, —<br />
Та співчуття нам надається,<br />
Як нам дається благодать.<br />
<br />
Переклад: Грязнов Олександр Андрійович
 </div>
</div>
