<body>
<div class="wrap">
 <div class="page-title">
  <h1>До місяця</h1>
  <h2>Персі Біші Шеллі</h2>
 </div>
 <div class="prose" id="content">
 Чи стомився ти, що зблід,<br />
На небо сходячи — і звідти одиноко<br />
Зорячи в наш темний світ<br />
Поміж зірок чужих, як журне око,<br />
Що міниться, не можучи знайти<br />
Достойної для вірності мети?<br />
<br />
Переклад Василя Мисика
 </div>
</div>
