<div class="wrap">
 <div class="page-title">
  <h1>У склянці стоїть обліпиха...</h1>
  <h2>Олег Дмитрієв</h2>
 </div>
 <div class="prose" id="content">
 У склянці стоїть обліпиха,<br />
Ледь світить вода через край.<br />
В кімнаті так лунко і тихо,<br />
Хоч заново жить починай.<br />
<br />
Та ні — що було, те минуло:<br />
День чорний і день золотий.<br />
Хіба що у серці кольнуло,<br />
Бо висновок справді простий.
 </div>
