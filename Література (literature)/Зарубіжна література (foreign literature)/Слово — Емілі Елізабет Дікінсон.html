<div class="wrap">
 <div class="page-title">
  <h1>Слово</h1>
  <h2>Емілі Елізабет Дікінсон</h2>
 </div>
 <div class="prose" id="content">
 Не пам'ятає біль коли<br />
початок був його,<br />
чи може дні такі були,<br />
як не було його?<br />
<br />
Він сам для себе — майбуття,<br />
у безконечну даль<br />
минуле, верне до життя<br />
нового часу біль.<br />
<br />
<em>[The Mystery of Pain (Pain has an element of blank)]<br />
З англійської переклала Марта Тарнавська</em>
 </div>
