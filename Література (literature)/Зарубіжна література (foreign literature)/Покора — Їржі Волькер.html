<div class="wrap">
 <div class="page-title">
  <h1>Покора</h1>
  <h2>Їржі Волькер</h2>
 </div>
 <div class="prose" id="content">
 Я стану малим-малим,<br />
найменшим на цілім світі.<br />
<br />
Порану, на лузі, літом<br />
зійдусь з найдрібнішим цвітом,<br />
злебедію, обнявшися з ним:<br />
"Босий мій хлоню<br />
в росі крапчастій,<br />
небо обперлось об тебе долонню,<br />
аби не впасти".<br />
<br />
Переклад М. Лукаша
 </div>
</div>
