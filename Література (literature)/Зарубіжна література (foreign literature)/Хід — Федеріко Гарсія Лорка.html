<div class="wrap">
 <div class="page-title">
  <h1>Хід</h1>
  <h2>Федеріко Гарсія Лорка</h2>
 </div>
 <div class="prose" id="content">
 Мадонна у скельцях,<br />
Мадонна Соледад,<br />
розкрита незмірним<br />
тюльпаном.<br />
У своєму човні світла<br />
пливе<br />
через приплив<br />
міста,<br />
серед сает тривоги<br />
та зірок із кришталю.<br />
Мадонна у скельцях<br />
ти ідеш<br />
річкою вулиці,<br />
аж до моря!
 </div>
