 <div class="page-title">
  <h1>Цей вечір — книга...</h1>
  <h2>Райнер Марія Рільке</h2>
 </div>
 <div class="prose" id="content">
 Цей вечір — книга. Гарна й пишна<br />
оправа з пурпуру на ній,<br />
і розмика рука неспішна<br />
гачок на клямрі золотій.<br />
<br />
І, повен щастя, я читаю<br />
сторінку першу в тишині,<br />
і другу продивлюсь до краю,<br />
а третю вимарю вві сні.<br />
<br />
1897
