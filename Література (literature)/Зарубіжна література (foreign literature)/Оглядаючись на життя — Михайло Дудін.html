<body>
<div class="wrap">
 <div class="page-title">
  <h1>Оглядаючись на життя</h1>
  <h2>Михайло Дудін</h2>
 </div>
 <div class="prose" id="content">
 Я рівноваги не стрічав<br />
Прекрасного й мерзоти, —<br />
В поєднанні цих двох начал<br />
Завжди свої незгоди.<br />
<br />
Але на захист грішних нас<br />
Живе від сотворіння<br />
Святий, невичерпний запас<br />
Любові та сумління.
 </div>
</div>
