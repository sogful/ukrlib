<body>
<div class="wrap">
 <div class="page-title">
  <h1>Незаперечна кар'єра</h1>
  <h2>Светозар Ваянський</h2>
 </div>
 <div class="prose" id="content">
 Вірний він, мов гад,<br />
мов туман, несхитний,<br />
лагідний, мов кат,<br />
мов луна, новітній,<br />
певний, мов імла,<br />
і, мов заєць, смілий,<br />
мов гієна зла,<br />
гарний він і милий,<br />
чистий, мов смітни?к,<br />
і, мов лід, гарячий,-<br />
блазень цей повік<br />
шитиме добряче!
 </div>
