 <div class="page-title">
  <h1>Учора в шостій на Сінну</h1>
  <h2>Микола Некрасов</h2>
 </div>
 <div class="prose" id="content">
 Учора в шостій на Сінну<br />
Зайшов я наостанку;<br />
Там били дівчину одну,<br />
Ще молоду селянку.<br /><br />
З грудей ні звука, ні зітхань.<br />
Лиш бич по тілу свище...<br />
І музі я сказав: "Поглянь!<br />
Сестра твоя найближча ".<br /><br />
<br /><br />
Переклад М. Терещенка
 </div>
