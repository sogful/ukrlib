<title>В думках не Гігес...</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>В думках не Гігес...</h1>
  <h2>Архілох</h2>
 </div>
 <div class="prose" id="content">
 В думках не Гігес, що багатий на скарби,<br />
Мене не мучить заздрість, не дивуюся<br />
З діянь богів я, влади царської не жду:<br />
Далеке дуже все це від очей моїх.
 </div>
