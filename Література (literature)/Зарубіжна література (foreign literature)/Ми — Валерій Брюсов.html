<div class="wrap">
 <div class="page-title">
  <h1>Ми</h1>
  <h2>Валерій Брюсов</h2>
 </div>
 <div class="prose" id="content">
 В морі широкім, розбурханім світі<br />
Ми — сплески найвищих валів.<br />
Солодко й чудно теперішнім жити,<br />
Надією повниться спів.<br />
<br />
Браття, віддаймося морю шумнoму,<br />
Звитяжцями вийдем з боїв,<br />
Нам сумнів незнаний, нам жах невідомий,<br />
Ми — сплески найвищих валів.
 </div>
