<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не клопочись і не міркуй...</h1>
  <h2>Федір Тютчев</h2>
 </div>
 <div class="prose" id="content">
 Не клопочись і не міркуй,<br />
У каятті не бий у груди!<br />
Щоденні рани сном лікуй,<br />
А завтра буде те, що буде.<br />
<br />
Зумій спокійно пережить<br />
Печаль, і радість, і тривогу.<br />
Чого бажать? За чим тужить?<br />
День промайнув – і слава богу!<br />
<br />
Переклад: Грязнов Олександр Андрійович
 </div>
</div>
</body>
