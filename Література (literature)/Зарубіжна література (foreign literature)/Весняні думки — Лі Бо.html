<body>
<div class="wrap">
 <div class="page-title">
  <h1>Весняні думки</h1>
  <h2>Лі Бо</h2>
 </div>
 <div class="prose" id="content">
 Там у тебе ледь-ледь<br />
почали зеленіти поля,<br />
<br />
А у нас вже шовковиця<br />
важко схилила гілля.<br />
<br />
Коли б ти про дорогу до мене<br />
помислити міг,-<br />
<br />
Серце б, мабуть, од щастя<br />
порвалося в грудях моїх.
 </div>
