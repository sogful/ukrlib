<title>Де я не гляну, всюди очі</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Де я не гляну, всюди очі</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Де я не гляну, всюди очі<br />
Темнота чорна застилає,<br />
Бо зникли оченьки дівочі,<br />
Для мене промінь їх не сяє.<br />
<br />
Погасла золотої зорі<br />
Коханая краса велична,<br />
Скрізь – дикії страшні простори…<br />
Прийми мене ти, ніч одвічна!
 </div>
</div>
