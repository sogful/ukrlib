<div class="wrap">
 <div class="page-title">
  <h1>Саета</h1>
  <h2>Федеріко Гарсія Лорка</h2>
 </div>
 <div class="prose" id="content">
 Христос темний<br />
іде<br />
від лілей Юдеї<br />
до гвоздик Еспанії.<br />
<br />
Дивіться, куди йде!<br />
<br />
До Еспанії.<br />
Небо чисте та темне,<br />
земля опалена,<br />
та русла, де вода<br />
тече дуже повільно.<br />
Христос темний,<br />
із волоссям опаленим,<br />
вилицями високими<br />
та зіницями білими<br />
<br />
Дивіться, куди йде!
 </div>
