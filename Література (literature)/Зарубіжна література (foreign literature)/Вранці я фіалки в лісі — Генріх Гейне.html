<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вранці я фіалки в лісі...</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Вранці я фіалки в лісі<br />
Для коханої збираю,<br />
На ніч шлю я їй троянди,<br />
Що увечері зриваю.<br />
<br />
Хочу я, щоб ти, кохана,<br />
Мову квітів зрозуміла:<br />
Вдень мені лишалась вірна<br />
І вночі мене любила.
 </div>
