<div class="wrap">
 <div class="page-title">
  <h1>Прийшли ми чистими...</h1>
  <h2>Омар Хайям</h2>
 </div>
 <div class="prose" id="content">
 Прийшли ми чистими — і стали ми брудними,<br />
Прийшли веселими — зробилися сумними.<br />
Гарячі сльози нам у серці запікались!<br />
Життя розвіявши, тепер у прах лягли ми.<br />
<br />
<em>Переклад Василя Мисика</em>
 </div>
