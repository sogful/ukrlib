<div class="wrap">
 <div class="page-title">
  <h1>Знайомтесь</h1>
  <h2>Аттіла Йожеф</h2>
 </div>
 <div class="prose" id="content">
 Це Лідочки молодший брат,<br />
далекий пагонець Батия;<br />
він хлібу чорному був рад,<br />
про синю ковдру і не мріяв.<br />
<br />
За вірші смерть йому у дар<br />
пуд бобу зварить, ще й доложить.<br />
Гей, буржуа! Гей, пролетар!<br />
Це я, поет Аттіла Йожеф.
 </div>
