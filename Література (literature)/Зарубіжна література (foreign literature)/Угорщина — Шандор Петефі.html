 <div class="page-title">
  <h1>Угорщина</h1>
  <h2>Шандор Петефі</h2>
 </div>
 <div class="prose" id="content">
 Навчитись того куховарства,<br />
Вітчизно, тобі уже слід:<br />
На одному боці готовий,<br />
На другім — сирий твій обід.<br />
<br />
В той час, як на одному боці<br />
Пиячать, жирують, жеруть,<br />
На другому боці, вітчизно,<br />
Сини твої з голоду мруть.
 </div>
