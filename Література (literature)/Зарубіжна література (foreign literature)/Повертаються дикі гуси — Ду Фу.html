<body>
<div class="wrap">
 <div class="page-title">
  <h1>Повертаються дикі гуси</h1>
  <h2>Ду Фу</h2>
 </div>
 <div class="prose" id="content">
 Я приїхав на схід —<br />
від домівки це тисячі лі.<br />
Як уляжеться бунт,<br />
повернуся якої весни?<br />
Споглядаю над містом гусей —<br />
Серце рветься з німої журби,<br />
Бо на північ летять,<br />
на вітчизну вертають вони!
 </div>
