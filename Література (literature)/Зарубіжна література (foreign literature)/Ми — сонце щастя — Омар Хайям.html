 <div class="page-title">
  <h1>Ми — сонце щастя...</h1>
  <h2>Омар Хайям</h2>
 </div>
 <div class="prose" id="content">
 Ми — сонце щастя й горя океан.<br />
Ми справедливість любим — і обман.<br />
Злі й добрі ми, довершені й нікчемні,<br />
Іржаве дзеркало й Джемшідів жбан.<br />
<br />
<em>Переклад Василя Мисика</em>
