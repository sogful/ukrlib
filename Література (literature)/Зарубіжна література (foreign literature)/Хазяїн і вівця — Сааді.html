<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хазяїн і вівця</h1>
  <h2>Сааді</h2>
 </div>
 <div class="prose" id="content">
 Вівцю однявши у вовків,<br />
Хазяїн нищечком хотів<br />
<br />
Сердешній горло перетнути.<br />
Заплакала: "Так от чому ти<br />
<br />
Не попустив мене вовкам:<br />
Ти із тії породи й сам!"
 </div>
</div>
