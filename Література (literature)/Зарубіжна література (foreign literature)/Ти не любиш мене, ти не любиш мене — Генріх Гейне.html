<title>Ти не любиш мене, ти не любиш мене</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ти не любиш мене, ти не любиш мене</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Ти не любиш мене, ти не любиш мене,<br />
Я не дуже за теє журюся;<br />
Як погляну на личенько любе, ясне,<br />
То веселий, мов цар, я роблюся.<br />
<br />
Ненавидиш мене, те говорять мені<br />
Сі коханії уста-рубіни;<br />
Але дай поцілую ті уста знадні,<br />
То забуду всі прикрі хвилини!
 </div>
</div>
