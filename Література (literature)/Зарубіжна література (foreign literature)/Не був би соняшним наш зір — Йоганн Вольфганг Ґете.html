<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не був би соняшним наш зір...</h1>
  <h2>Йоганн Вольфганг Ґете</h2>
 </div>
 <div class="prose" id="content">
 Не був би соняшним наш зір,<br />
Він не спромігся б сонце зріти;<br />
Була б могута в нас не Бога твір,<br />
Як боже нас могло б огнити?<br />
<br />
I що, як міти чи закони<br />
Ти в тисячах книжок найшов,<br />
Є тільки вежа Вавілону,<br />
Якщо не в'яже все любов.
 </div>
