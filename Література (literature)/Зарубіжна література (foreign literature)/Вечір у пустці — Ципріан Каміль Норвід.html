 <div class="page-title">
  <h1>Вечір у пустці</h1>
  <h2>Ципріан Каміль Норвід</h2>
 </div>
 <div class="prose" id="content">
 (Фантазія)<br />
<br />
Дух дихає, де хоче,<br />
і голос його вчуваєш,<br />
але не знаєш, звідки приходить<br />
чи куди іде.
