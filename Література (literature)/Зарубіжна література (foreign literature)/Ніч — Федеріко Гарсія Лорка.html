<div class="wrap">
 <div class="page-title">
  <h1>Ніч</h1>
  <h2>Федеріко Гарсія Лорка</h2>
 </div>
 <div class="prose" id="content">
 Лампада, свічка,<br />
ліхтар та світляк.<br />
<br />
То є сузір'я<br />
саети.<br />
<br />
Віконця тремтять<br />
золотом,<br />
і холітаються на заході<br />
хрести підупалі.<br />
<br />
Лампада, свічка,<br />
ліхтар та світляк
 </div>
</div>
