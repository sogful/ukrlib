<div class="wrap">
 <div class="page-title">
  <h1>Ми стоїмо на кручі</h1>
  <h2>Ендре Аді</h2>
 </div>
 <div class="prose" id="content">
 Ми стоїмо на кручі<br />
Грудь в грудь і очі в очі,<br />
Самі, удвох, тремтючи,<br />
Без сліз, без зойків, без розмов:<br />
Бо рух — і в прірву впадемо.<br />
<br />
Поки устами злиті<br />
(То скріпа з крові й плоті),<br />
Поти й живем на світі...<br />
Цілуй і слова не промов:<br />
Бо звук — і в прірву впадемо.
 </div>
