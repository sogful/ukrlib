 <div class="page-title">
  <h1>Солодке в світі цім я знав...</h1>
  <h2>Фрідріх Гельдерлін</h2>
 </div>
 <div class="prose" id="content">
 Солодке в світі цім я знав. Воно канУло,<br />
Всі юні радості давно, давно минули!<br />
Май, червень, липень — їх забули очі;<br />
Я є ніхто, живу я неохоче.
