 <div class="page-title">
  <h1>З кефалонійського щоденника</h1>
  <h2>Джордж Гордон Байрон</h2>
 </div>
 <div class="prose" id="content">
 Померлих збуджено — чи можу спать?<br />
Світ на тиранів став — чи гнутись можу?<br />
Серпа жде колос — жнив не починать?<br />
..Я не дрімаю — терня в моїм ложі.<br />
Щодень сурма мені дзвенить у вухах,—<br />
І в серці відгомін...<br />
<br />
19 червня 1823
