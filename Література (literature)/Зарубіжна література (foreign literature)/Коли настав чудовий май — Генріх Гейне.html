<body>
<div class="wrap">
 <div class="page-title">
  <h1>Коли настав чудовий май</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Коли настав чудовий май,<br />
Садочків розвивання,<br />
Тоді у серденьку моїм<br />
Прокинулось кохання.<br />
<br />
Коли настав чудовий май,<br />
І пташок щебетання,<br />
Тоді я милій розказав<br />
Мою журбу й кохання.<br />
<br />
<em>Переклад Лесі Українки</em>
 </div>
</div>
