<div class="wrap">
 <div class="page-title">
  <h1>Село</h1>
  <h2>Федеріко Гарсія Лорка</h2>
 </div>
 <div class="prose" id="content">
 На лисогір'ї<br />
фігура.<br />
Тиха вода,<br />
столітні оливи-понури.<br />
В закутках, завулках<br />
закутані люди,<br />
а на вишках<br />
крутяться флюгери.<br />
Крутяться, крутяться, крутяться<br />
флюгери.<br />
Ох ви, села заблукані<br />
в нетрях Андалусії-туги!
 </div>
