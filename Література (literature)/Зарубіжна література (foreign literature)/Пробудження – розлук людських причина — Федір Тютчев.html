 <div class="page-title">
  <h1>Пробудження – розлук людських причина...</h1>
  <h2>Федір Тютчев</h2>
 </div>
 <div class="prose" id="content">
 Пробудження – розлук людських причина:<br />
Як не кохай, хоч вік, хоч ніч одну,<br />
Кохання – сон, а сон – лиш мить єдина,<br />
І все одно прокинеться людина<br />
Колись від зачарованого сну.<br />
<br />
Переклад: Грязнов Олександр Андрійович
