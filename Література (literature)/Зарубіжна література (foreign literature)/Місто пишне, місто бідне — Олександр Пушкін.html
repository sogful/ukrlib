<title>Місто пишне, місто бідне...</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Місто пишне, місто бідне...</h1>
  <h2>Олександр Пушкін</h2>
 </div>
 <div class="prose" id="content">
 Місто пишне, місто бідне,<br />
Дух тюрми, палат черга,<br />
Це склепіння неба блідне,<br />
Камінь, холод і нудьга,—<br />
Все ж до вас у мене звичка,<br />
Бо в пустелі цій сумній<br />
Ходить ніжка невеличка,<br />
В'ється локон золотий.
 </div>
</div>
