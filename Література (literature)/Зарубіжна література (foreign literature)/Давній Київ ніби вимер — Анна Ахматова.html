<body>
<div class="wrap">
 <div class="page-title">
  <h1>Давній Київ ніби вимер...</h1>
  <h2>Анна Ахматова</h2>
 </div>
 <div class="prose" id="content">
 * * *<br />
<br />
Давній Київ ніби вимер,<br />
Дивний мій приїзд.<br />
Над рікою Володимир<br />
Чорний хрест підніс.<br />
<br />
Серед саду темнокорі<br />
Липи й осокір,<br />
І до Бога світять горі<br />
Діаманти зір.<br />
<br />
Шлях високий, шлях офіри<br />
Тут закінчу я,—<br />
Де лиш ти, мені до міри,<br />
І любов моя.<br />
<br />
Літо 1914
