<body>
<div class="wrap">
 <div class="page-title">
  <h1>Іще горять в душі бажання...</h1>
  <h2>Федір Тютчев</h2>
 </div>
 <div class="prose" id="content">
 Іще горять в душі бажання,<br />
Ще манить зір краса твоя,<br />
Крізь любі спогади туманні<br />
Іще ловлю твій образ я.<br />
Твій образ милий та прекрасний<br />
Всякденно видиться мені,<br />
І недосяжний, і незгасний,<br />
Немов зоря в височині.<br />
<br />
Перекладач: М. Рильський
 </div>
</div>
