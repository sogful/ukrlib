  <h2>Джанні Родарі</h2>
 </div>
 <div class="prose" id="content">
 Тунель<br />
Це як ніч, але ненадовго.<br />
Хоч в око стрель<br />
Не видно нічого!<br />
Одну лиш хвилину триває тьма:<br />
Не встигнеш злякатись — її вже й нема.
