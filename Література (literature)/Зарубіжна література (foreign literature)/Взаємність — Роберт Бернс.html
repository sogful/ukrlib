 <div class="page-title">
  <h1>Взаємність</h1>
  <h2>Роберт Бернс</h2>
 </div>
 <div class="prose" id="content">
 Взаємність<br />
<br />
Іншим хтозна-що потрібне —<br />
Слава, блиск, начиння срібне,<br />
А у мене в серці мила<br />
Срібло й золото затьмила.<br />
<br />
Хай лише до мене ступить,<br />
Одного мене полюбить,-<br />
От де скарб! Оце придане,<br />
Що за всі маєтки стане!
 </div>
