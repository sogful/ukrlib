<div class="wrap">
 <div class="page-title">
  <h1>Що вдієш ти з світом...</h1>
  <h2>Йоганн Вольфганг Ґете</h2>
 </div>
 <div class="prose" id="content">
 Що вдієш ти з світом? Вже створений він,-<br />
Подумав про все владика причин.<br />
Твій жереб упав, віддайсь течії,<br />
Дорога почата, завершуй її —<br />
I що тут змінити жалям і тужбі!<br />
Вони рівновагу хитають тобі.
 </div>
