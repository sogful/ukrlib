<div class="wrap">
 <div class="page-title">
  <h1>Рано-вранці виїжджаю з міста Боді</h1>
  <h2>Лі Бо</h2>
 </div>
 <div class="prose" id="content">
 Одпливаю з Боді,-<br />
хмари в небі пливуть, наче в сні.<br />
<br />
До Цзянліна далеко,<br />
вернусь я надвечір чи ні?<br />
<br />
На обох берегах<br />
над рікою регочуться мавпи,<br />
<br />
Але тисячі гір<br />
залишились уже вдалині.
 </div>
