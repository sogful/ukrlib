 <div class="page-title">
  <h1>Миліший квіт осінніх днів... (переклад О. Грязнова)</h1>
  <h2>Олександр Пушкін</h2>
 </div>
 <div class="prose" id="content">
 Миліший квіт осінніх днів<br />
Розкішних первістків полів.<br />
Він роздуми журби легкої<br />
Живіше збуджує у нас.<br />
Так інколи розлуки час<br />
Живіший зустрічі палкої.<br />
<br />
Переклад: Грязнов Олександр Андрійович
 </div>
