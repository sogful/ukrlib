<title>Троянду і сонце, лілею й голубку...</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Троянду і сонце, лілею й голубку...</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Троянду і сонце, лілею й голубку<br />
Любив я колись, мов укохану любку.<br />
Тепер не люблю їх — люблю до загину<br />
Єдину, безвинну дитину, перлину;<br />
Віднині й навіки мені моя любка —<br />
Троянда і сонце, лілея й голубка.
 </div>
</div>
