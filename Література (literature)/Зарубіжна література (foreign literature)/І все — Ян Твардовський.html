  <h2>Ян Твардовський</h2>
 </div>
 <div class="prose" id="content">
 Ян Твардовський<br />
І все<br />
<br />
Написав "Мій Бог" та закреслив, адже подумав<br />
настільки мій наскільки я себелюбець<br />
написав "Бог людства" і прикусив язика згадавши<br />
іще і янголів і каміння в снігу на кроликів схоже<br />
зрештою написав тільки "Бог". І все<br />
І так забагато вийшло<br />
<br />
1968, 1986
 </div>
</div>
