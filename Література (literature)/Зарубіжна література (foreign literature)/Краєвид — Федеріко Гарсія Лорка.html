<body>
<div class="wrap">
 <div class="page-title">
  <h1>Краєвид</h1>
  <h2>Федеріко Гарсія Лорка</h2>
 </div>
 <div class="prose" id="content">
 <blockquote>Риті, Кончі, Пепе та Карменситі</blockquote><br />
Заморочений вечір<br />
Горнеться в холод.<br />
<br />
У дітей розплющені очі,<br />
Бо за вікном покірно<br />
Обростає птахами дерево.<br />
<br />
Дрімота лягла над рікою.<br />
Затремтіло біляве яблуко,<br />
Вдарило в дах.
 </div>
</div>
