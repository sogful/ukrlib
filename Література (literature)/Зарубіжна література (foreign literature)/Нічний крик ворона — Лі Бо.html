<body>
<div class="wrap">
 <div class="page-title">
  <h1>Нічний крик ворона</h1>
  <h2>Лі Бо</h2>
 </div>
 <div class="prose" id="content">
 Під жовтими хмарами<br />
ворон над містом кричить,<br />
<br />
Притулку шукає на дереві<br />
ніч одпочить.<br />
<br />
А жінка з Цзіньчжоу<br />
од кросен своїх не встає,<br />
<br />
Прозору парчу<br />
невідомо для кого снує.<br />
<br />
Спинила свій човник,<br />
а ниті пливуть золоті...<br />
<br />
Як гірко їй ніч ночувати<br />
в журбі й самоті!
 </div>
</div>
