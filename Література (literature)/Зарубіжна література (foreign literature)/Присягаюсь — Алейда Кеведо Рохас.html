<div class="wrap">
 <div class="page-title">
  <h1>Присягаюсь</h1>
  <h2>Алейда Кеведо Рохас</h2>
 </div>
 <div class="prose" id="content">
 У той самий спосіб, як птах<br />
ловить запах світу,<br />
з тією ж силою<br />
світ лишається поза цим.<br />
<br />
Точно так само ці вірші,<br />
мають запах світу,<br />
не втрачаючи жодного з моїх почуттів.<br />
<br />
<em>Переклад на українську Марини Сушко</em>
 </div>
