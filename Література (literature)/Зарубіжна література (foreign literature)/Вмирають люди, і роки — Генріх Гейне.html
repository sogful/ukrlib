<body>
<div class="wrap">
 <div class="page-title">
  <h1>Вмирають люди, і роки...</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Вмирають люди, і роки<br />
Минають один за одним,<br />
Але не вмирає кохання,<br />
Що в серці живе моїм.<br />
<br />
Ще раз подивитись на тебе<br />
І мовити в смертний нас,<br />
Обнявши твої коліна:<br />
"Madame, я кохаю вас!"
 </div>
</div>
