<body>
<div class="wrap">
 <div class="page-title">
  <h1>Лисиця і виноград</h1>
  <h2>Езоп</h2>
 </div>
 <div class="prose" id="content">
 <p>Молода Лисиця побачила, що з виноградної лози звисають грона, і захотіла дістати їх, але не змогла. Відходячи, сказала сама до себе:</p>
<p>
— Вони кислі!</p>
<p>
Так і в людей буває. Коли хто неспроможний досягти чогось, посилається на обставини.</p>
 </div>
</div>
