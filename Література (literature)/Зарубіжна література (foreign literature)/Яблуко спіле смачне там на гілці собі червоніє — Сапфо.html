<title>Яблуко спіле смачне там на гілці собі червоніє...</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Яблуко спіле смачне там на гілці собі червоніє...</h1>
  <h2>Сапфо</h2>
 </div>
 <div class="prose" id="content">
 Яблуко спіле смачне там на гілці собі червоніє<br />
Ген, аж на самім вершечку — забув садівник обірвати.<br />
Ні, не забув — не зумів він того досягнути вершечка.
 </div>
</div>
