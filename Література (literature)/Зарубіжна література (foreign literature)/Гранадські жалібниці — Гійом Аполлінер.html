<body>
<div class="wrap">
 <div class="page-title">
  <h1>Гранадські жалібниці</h1>
  <h2>Гійом Аполлінер</h2>
 </div>
 <div class="prose" id="content">
 Десь там їх двоє у Гранаді<br />
Оплакують один твій гріх<br />
Ми ж тут жбурляємо гранати<br />
I вже то яйця із яких<br />
<br />
Клюються півники Інфанто<br />
Ви чуєте той спів Жах-жах<br />
Які гранати ви погляньте<br />
У наших визріли садах
 </div>
</div>
