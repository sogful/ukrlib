<body>
<div class="wrap">
 <div class="page-title">
  <h1>Як я з милою розставсь</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Як я з милою розставсь,<br />
З того часу не сміявсь;<br />
Чув я жарти, чув я сміх,<br />
Та сміяться сам не міг.<br />
<br />
Як же втратив я її, –<br />
Сльози виплакав свої;<br />
В серці жаль, нудьга німа,<br />
А на очах сліз нема.
 </div>
