 <div class="page-title">
  <h1>Я вчора загубила Світ...</h1>
  <h2>Емілі Елізабет Дікінсон</h2>
 </div>
 <div class="prose" id="content">
 Я вчора загубила Світ.<br />
Чи з ним не стрілись ви?<br />
У нього знак — вінок із Зір<br />
Довкола голови.<br />
<br />
Він — певно — геть непоказний<br />
Для пана з вищих сфер.<br />
Мені ж — найбільший скарб. Знайдіть<br />
Його для мене сер!<br />
<br />
<em>(З англійської переклав Олександр Гриценко)</em>
