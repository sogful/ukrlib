<body>
<div class="wrap">
 <div class="page-title">
  <h1>На летовищі</h1>
  <h2>Віслава Шимборська</h2>
 </div>
 <div class="prose" id="content">
 Біжать одне до одного з розкритими обіймами,<br />
і сміючись кричать: Нарешті! Нарешті!<br />
Обоє у важкому зимовому вбранні,<br />
у грубих шапках,<br />
шаликах,<br />
у рукавичках,<br />
черевиках,<br />
але лише для нас.<br />
Адже одне для одного – нагі.
 </div>
</div>
