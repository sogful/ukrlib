 <div class="page-title">
  <h1>Ангел</h1>
  <h2>Ян Твардовський</h2>
 </div>
 <div class="prose" id="content">
 Ян Твардовський<br />
Ангел<br />
<br />
є такі хвилини коли відходиш<br />
від Ангелів Охоронців навіть Херувимів<br />
від тих що високо<br />
від тих що ближче —— до Ісуса людини<br />
низенько на землі<br />
<br />
Ангел не зрозуміє не висів на хресті<br />
і любов знає легкою<br />
бо немає тіла
 </div>
