<body>
<div class="wrap">
 <div class="page-title">
  <h1>Прощання вершника</h1>
  <h2>Гійом Аполлінер</h2>
 </div>
 <div class="prose" id="content">
 Війна! Як їй радіє вершник<br />
Які пісні який розгул<br />
Ну нa тобі на згадку персник<br />
Вітрець зітхання звіяв з губ<br />
<br />
Прощай! Він зник за поворотом<br />
I десь поліг у боротьбі<br />
Вона ж як перше хтивим ротом<br />
Сміялась дивній цій судьбі
 </div>
</div>
