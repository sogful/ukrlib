<body>
<div class="wrap">
 <div class="page-title">
  <h1>Задзвени із глибини</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Задзвени із глибини<br />
Тихої печалі,<br />
Мила пісенька весни, —<br />
Линь все далі й далі!<br />
Линь, дзвени, знайди той дім,<br />
В квітах сад зелений,<br />
І троянду перед ним<br />
Привітай від мене.<br />
<blockquote class="cita" style='text-align:left'>Переклад Леоніда Первомайського</blockquote>
 </div>
</div>
