<div class="wrap">
 <div class="page-title">
  <h1>Коли розлучаються двоє...</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Коли розлучаються двоє,<br />
За руки беруться вони,<br />
I плачуть, і тяжко зітхають,<br />
Без ліку зітхають, смутні.<br />
<br />
З тобою ми вдвох не зітхали.<br />
Ніколи не плакали ми;<br />
Той сум, оті тяжкі зітхання<br />
Прийшли до нас згодом самі.<br />
<br />
<em>Переклад із німецької Максима Стависького</em>
 </div>
</div>
