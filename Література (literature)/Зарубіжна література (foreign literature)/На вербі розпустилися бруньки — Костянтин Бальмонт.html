<body>
<div class="wrap">
 <div class="page-title">
  <h1>На вербі розпустилися бруньки...</h1>
  <h2>Костянтин Бальмонт</h2>
 </div>
 <div class="prose" id="content">
 На вербі розпустилися бруньки,<br />
Береза слабкі листочки<br />
Розкрила — більше сніг не ворог.<br />
Трава зійшла на кожній купині,<br />
Заизумрудился яр.
 </div>
