<div class="wrap">
 <div class="page-title">
  <h1>Виноград</h1>
  <h2>Олександр Пушкін</h2>
 </div>
 <div class="prose" id="content">
 Не буду я тужить по розах,<br />
Зів'ялих ранньої пори;<br />
До серця й виноград на лозах,<br />
Що в гронах визрів край гори,<br />
Краса долин, що тішить зори<br />
Під осінь, повну ясноти,<br />
Продовгуватий і прозорий,<br />
Як діви юної персти.
 </div>
