 <div class="page-title">
  <h1>Музика</h1>
  <h2>Анна Ахматова</h2>
 </div>
 <div class="prose" id="content">
 Д. Д. Ш.<br />
<br />
В ній справді чудотворне щось горить,<br />
І на очах її краї граняться.<br />
Вона одна зі мною гомонить,<br />
Копи всі інші підійти бояться.<br />
Копи останній друг одвів свій зір,<br />
Вона була зі мною в тьмі могили,—<br />
Співала, уподібнившись грозі,<br />
Або немов квітки заговорили.<br />
<br />
1957—1958
