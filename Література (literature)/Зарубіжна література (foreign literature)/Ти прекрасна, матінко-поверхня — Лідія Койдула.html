</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Ти прекрасна, матінко-поверхня</h1>
  <h2>Лідія Койдула</h2>
 </div>
 <div class="prose" id="content">
 Ти є прекрасна, матінко-поверхня!<br />
І дотепер як здавна!<br />
Де соловейком був маля<br />
Лив співаночки славно.<br />
На руцях теплила мене,<br />
В живих обіймах.<br />
Увік від тих не одверне,<br />
Хоч збудусь у сивинах!<br />
<br />
<em>Переклад Юлії Черниш</em>
 </div>
</div>
