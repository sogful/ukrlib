<body>
<div class="wrap">
 <div class="page-title">
  <h1>Перепросини</h1>
  <h2>Фрідріх Гельдерлін</h2>
 </div>
 <div class="prose" id="content">
 Чиста серцем! Тобі я отіняв не раз<br />
Злотий спокій богів, і гіркоти життя,<br />
Глибших болів і тайних<br />
Часто був я учитель твій.<br />
<br />
О, забудь і прости! Хмара від мирної<br />
Люни, я відійду пріч — і засяєш ти<br />
Знову, світло солодке,<br />
Знов спокійне в красі своїй.
 </div>
