<div class="wrap">
 <div class="page-title">
  <h1>Н. Ф. І.</h1>
  <h2>Михайло Лермонтов</h2>
 </div>
 <div class="prose" id="content">
 Дай боже вам, щоб ви не знали,<br />
Що плещуть здуру вороги,<br />
Щоб смутку вам не завдавали<br />
Мундири, вуса й остроги.<br />
<br />
Дай боже, щоб перемагали<br />
Ви всіх суперниць навкруги<br />
І щоб до ваших ніг упали<br />
Мундири, й вуса, й остроги.<br />
<br />
Перекладач: Л. С. Первомайський
 </div>
