 <div class="page-title">
  <h1>Визначеність</h1>
  <h2>Алейда Кеведо Рохас</h2>
 </div>
 <div class="prose" id="content">
 Я прослизаю<br />
між металевими ліжками<br />
та кисневими балонами<br />
<br />
Я замерзла<br />
В Амазонці цього хоспісу<br />
<br />
Мої родичі визнають, що попіл повернеться<br />
в гори<br />
звідки і прийшов,<br />
як камені, які перенесла сюди<br />
віра моїх батьків.<br />
<br />
<em>Переклад на українську Марини Сушко</em>
 </div>
