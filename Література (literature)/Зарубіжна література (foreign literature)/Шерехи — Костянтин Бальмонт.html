<body>
<div class="wrap">
 <div class="page-title">
  <h1>Шерехи</h1>
  <h2>Костянтин Бальмонт</h2>
 </div>
 <div class="prose" id="content">
 Не дізнаєшся,<br />
Не зрозумієш,<br />
Це хвилі<br />
Чи жито.<br />
<br />
Це ліс<br />
Або очерет,<br />
Іль з небес<br />
Струмує тиша.<br />
<br />
Або хтось<br />
Точить ножа.<br />
Не дізнаєшся,<br />
Не зрозумієш.
 </div>
</div>
