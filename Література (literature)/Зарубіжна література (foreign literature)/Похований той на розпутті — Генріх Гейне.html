<body>
<div class="wrap">
 <div class="page-title">
  <h1>Похований той на розпутті</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Похований той на розпутті,<br />
Хто сам себе вбив, і журлива<br />
Блакитная квітка зросла там, –<br />
То квітка гріха нещаслива.<br />
<br />
Холодної, тихої ночі<br />
Стою і зітхаю журливо,<br />
При місяці тихо леліє<br />
Та квітка гріха нещаслива.
 </div>
