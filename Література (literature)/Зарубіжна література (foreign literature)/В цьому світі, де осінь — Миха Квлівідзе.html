 <div class="page-title">
  <h1>В цьому світі, де осінь...</h1>
  <h2>Миха Квлівідзе</h2>
 </div>
 <div class="prose" id="content">
 <blockquote class="cita" style='text-align:left'>Переклад Олександра Грязнова</blockquote><br />
<br />
В цьому світі, де осінь<br />
блукає в садах передмістя,<br />
Де приречені душі<br />
постійно звучати не в лад,<br />
Хтось та є… Він слідкує,<br />
щоб падало пошепки листя,<br />
І, незримий, вершить<br />
урочистої тиші обряд.
 </div>
