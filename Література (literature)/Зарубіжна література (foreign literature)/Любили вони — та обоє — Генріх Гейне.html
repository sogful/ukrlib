<div class="wrap">
 <div class="page-title">
  <h1>Любили вони — та обоє...</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Любили вони — та обоє<br />
Дивились, немов вороги,<br />
I вперто обоє мовчали,<br />
Хоч мліли обоє з жаги.<br />
<br />
Вони розлучились — лиш зрідка<br />
Їх сни єднали німі.<br />
Вони давно вже померли<br />
Й не знали про те самі.
 </div>
