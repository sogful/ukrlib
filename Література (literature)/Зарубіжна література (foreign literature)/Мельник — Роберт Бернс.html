<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мельник</h1>
  <h2>Роберт Бернс</h2>
 </div>
 <div class="prose" id="content">
 Мельник<br />
<br />
Мельнику мій білий,<br />
Біла голова!<br />
Проживає шилінг,<br />
Заробляє два.<br />
<br />
Біла голова,<br />
Брови у муці,<br />
Білий поцілунок<br />
На моїй щоці.<br />
<br />
Мельнику мій білий,<br />
Серденько моє!<br />
Що не день, то цілий<br />
Міх мені наб'є!<br />
<br />
Борошном наб'є,<br />
Грошей принесе.<br />
За білого мельника<br />
Віддала б я все!
 </div>
</div>
