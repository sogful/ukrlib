<div class="wrap">
 <div class="page-title">
  <h1>Твоє обличчя любе, миле</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Твоє обличчя любе, миле,<br />
Колись мені щоночі снилось,<br />
Тепер обличчя янголине<br />
Бліде – від жалю так змінилось;<br />
<br />
Смерть поцілунок свій положить<br />
Блідий на устоньках прекрасних,<br />
І згасне те небесне світло,<br />
Що сяє в оченьках тих ясних.
 </div>
