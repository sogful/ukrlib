<div class="wrap">
 <div class="page-title">
  <h1>Мамо, мамусю, що маю робить?</h1>
  <h2>Роберт Бернс</h2>
 </div>
 <div class="prose" id="content">
 Мамо, мамусю, що маю робить —<br />
Як їх примусить мене любить?<br />
"Доню моя, не будь дурна,<br />
Ти будь такою, як я була".<br />
<br />
Як буду чорна — ніхто не пригорне,<br />
Як буду біла — нікому не мила,<br />
Як буду горда — ніхто не займе...<br />
Що маю діяти, навчи мене.
 </div>
