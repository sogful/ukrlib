 <div class="page-title">
  <h1>До тебе</h1>
  <h2>Галина Посвятовська</h2>
 </div>
 <div class="prose" id="content">
 до тебе<br />
крізь час<br />
а часом зовсім близько<br />
що доторкаюся<br />
<br />
не знаю<br />
де закінчується пам'ять<br />
а де початок дійсності<br />
<br />
годинник мого тіла<br />
зупиняється<br />
<br />
уперто повертає<br />
до хвилин<br />
уже загуслих<br />
всередині дерев<br />
<br />
у мені<br />
час не захолоне<br />
струмує<br />
разом із кров'ю
 </div>
