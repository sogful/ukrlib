<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сніг</h1>
  <h2>Петер Аліпієв</h2>
 </div>
 <div class="prose" id="content">
 Від ранку сніг все сипле, сипле, сипле...<br />
Я сів на тин: нехай душа хоч схлипне.<br />
Я вже тону в засніженім саду,<br />
але сиджу, чекаю, не боюся, —<br />
ще, може, з білим снігом та зіллюся<br />
і в чистоті сніговій пропаду...
 </div>
