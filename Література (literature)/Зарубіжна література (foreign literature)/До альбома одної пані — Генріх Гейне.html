 <div class="page-title">
  <h1>До альбома одної пані</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Hande kussen. Hute rucken.<br />
<br />
Цілувати ручки, і бриля скидати,<br />
I згинать коліна, і чолом давати, —<br />
Це, дитятко, тільки марне малпування,<br />
Як нема до того в серці почування.<br />
<br />
Відень, 1895 р.
 </div>
