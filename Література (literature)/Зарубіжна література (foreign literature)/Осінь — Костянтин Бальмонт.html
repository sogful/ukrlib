<body>
<div class="wrap">
 <div class="page-title">
  <h1>Осінь</h1>
  <h2>Костянтин Бальмонт</h2>
 </div>
 <div class="prose" id="content">
 Поспіває брусниця,<br />
Стали дні холодніше,<br />
І від пташиного крику<br />
У серце стало сумніше.<br />
<br />
Зграї птахів відлітають<br />
Геть, за синє море.<br />
Всі дерева блищать<br />
У різнобарвному вбранні.<br />
<br />
Сонце рідше сміється,<br />
Немає в кольорах пахощі.<br />
Скоро Осінь прокинеться<br />
І заплаче спросоння.
 </div>
