<body>
<div class="wrap">
 <div class="page-title">
  <h1>Усміхнений кажу</h1>
  <h2>Галина Посвятовська</h2>
 </div>
 <div class="prose" id="content">
 усміхнений кажу<br />
згаси лампу посмішки<br />
над заплющеними очима<br />
<br />
тільки в темряві<br />
стрічаємося безіменні<br />
тільки в темряві<br />
ми доторкнемося до шерсті смерті<br />
<br />
здивованим долоням<br />
накличем ніч<br />
<br />
бо день мов птаха<br />
в якої крила<br />
підбиті червінню — палають.
 </div>
