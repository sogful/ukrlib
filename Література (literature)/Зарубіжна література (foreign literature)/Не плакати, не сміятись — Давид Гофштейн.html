<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не плакати, не сміятись...</h1>
  <h2>Давид Гофштейн</h2>
 </div>
 <div class="prose" id="content">
 Не плакати, не сміятись,<br />
а розуміти.<br />
Спіноза<br />
<br />
Із тобою, світ,<br />
Легко віч-на-віч.<br />
Бачу скрізь твій вид,<br />
Чую скрізь твій клич.<br />
<br />
На шляхах земних,<br />
Де шумить розмай,<br />
В небесах ясних,<br />
Де блищить безкрай.
 </div>
