<body>
<div class="wrap">
 <div class="page-title">
  <h1>Весняної ночі в Лояні чую флейту</h1>
  <h2>Лі Бо</h2>
 </div>
 <div class="prose" id="content">
 Чути з дому чужого в темряві<br />
флейти ніжної тихий спів.<br />
<br />
Вітерець весняний мелодію<br />
"Верб поламаних" підхопив.<br />
<br />
Над Лояном вона колишеться,<br />
а в душі моїй постає<br />
<br />
Рідний край за дальніми далями<br />
в білім цвіті рідних садів.
 </div>
</div>
