<body>
<div class="wrap">
 <div class="page-title">
  <h1>Була холодна північ та німа</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Була холодна північ та німа,<br />
А я блукав дібровою з нудьгою;<br />
Прокинулись дерева всі од сна<br />
І жалібно кивали головою.
 </div>
