<div class="wrap">
 <div class="page-title">
  <h1>Шах i поет</h1>
  <h2>Джамі</h2>
 </div>
 <div class="prose" id="content">
 <p>Забувся б гордий шах Махмуд,</p>
<p>
Якби не знали всі,</p>
<p>
Що не зумів він оцінить</p>
<p>
Співця Фірдоусі.</p>
<p>
Переклад В. Мисика</p>
