<body>
<div class="wrap">
 <div class="page-title">
  <h1>Мене ти так і не вгадала...</h1>
  <h2>Гійом Аполлінер</h2>
 </div>
 <div class="prose" id="content">
 Мене ти так і не вгадала<br />
А вже дивись іде кортеж<br />
Ця гра була для нас невдала<br />
А втіхи ж ми хотіли теж<br />
<br />
Розбіглись маски кожна з кожним<br />
Троянда в хвилю порина<br />
В мені бринить гучком тривожним<br />
Тобі не знана таїна
 </div>
</div>
