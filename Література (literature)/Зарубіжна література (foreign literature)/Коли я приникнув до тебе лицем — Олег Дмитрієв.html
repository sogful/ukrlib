<div class="wrap">
 <div class="page-title">
  <h1>Коли я приникнув до тебе лицем...</h1>
  <h2>Олег Дмитрієв</h2>
 </div>
 <div class="prose" id="content">
 Коли я приникнув до тебе лицем,<br />
А ти прихилилась до мене плечем —<br />
Повіяло холодом-жаром.<br />
Недаром було все, недаром.<br />
<br />
Немарно, немарно... А ми, далебі,<br />
Задарма все це віддаємо судьбі,<br />
Що дивиться збоку лукаво...<br />
Мовляв, ну то що ж — ваше право.
 </div>
