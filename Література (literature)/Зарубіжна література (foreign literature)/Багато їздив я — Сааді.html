<title>Багато їздив я</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Багато їздив я</h1>
  <h2>Сааді</h2>
 </div>
 <div class="prose" id="content">
 Багато їздив я, далеко мандрував,<br />
Із різними людьми я дні свої збував.<br />
<br />
Поживи доброї напитував я скрізь,<br />
З гарману кожного я по зерну привіз.
 </div>
