<div class="wrap">
 <div class="page-title">
  <h1>Хоч як страшить до строку нас...</h1>
  <h2>Федір Тютчев</h2>
 </div>
 <div class="prose" id="content">
 Хоч як страшить до строку нас<br />
Незрозумілий смертний час –<br />
Томління марні і пропащі, –<br />
Та ще страшніше слідкувать,<br />
Як починають вимирать<br />
У серці спогади найкращі.<br />
<br />
Переклад: Грязнов Олександр Андрійович
