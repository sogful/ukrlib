<body>
<div class="wrap">
 <div class="page-title">
  <h1>Подорожній мовить</h1>
  <h2>Їржі Волькер</h2>
 </div>
 <div class="prose" id="content">
 Люблю зорі,<br />
бо вони схожі на брукові камені —<br />
аби я ходив по небу босими ногами,<br />
то об них поранився б.<br />
<br />
Люблю брукові камені,<br />
бо вони схожі на зорі —<br />
од рана аж до вечора<br />
світять мені дорогу.<br />
<br />
Переклад М. Лукаша
 </div>
