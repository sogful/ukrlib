 <div class="page-title">
  <h1>Любов</h1>
  <h2>Ян Твардовський</h2>
 </div>
 <div class="prose" id="content">
 Ян Твардовський<br />
Любов<br />
<br />
чисстота тіла<br />
чистота рук пана президента<br />
чистота ідей<br />
чистота снігу що плаче з зимою<br />
води що ходить нагою<br />
чистота того що найпростіше<br />
<br />
і все це собаці в буду<br />
без любові
 </div>
