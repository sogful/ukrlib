<body>
<div class="wrap">
 <div class="page-title">
  <h1>Стомивсь я в цю мить від всезнання...</h1>
  <h2>Давид Гофштейн</h2>
 </div>
 <div class="prose" id="content">
 Стомивсь я в цю мить від всезнання,<br />
Обридло мені всехотіння;<br />
Єдине бажання,<br />
Єдине воління —<br />
Це світле незнання,<br />
Солодке безвілля,<br />
Лиш плинути вдаль із легким хлюпотінням,<br />
Як хвиля, як хвиля...
 </div>
