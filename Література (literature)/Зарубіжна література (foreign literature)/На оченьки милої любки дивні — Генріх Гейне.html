<div class="wrap">
 <div class="page-title">
  <h1>На оченьки милої любки дивні</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 На оченьки милої любки дивні<br />
Я гарні складаю канцони,<br />
На устонька милої любки дрібні<br />
Складаю найкращі терцини;<br />
На щічки хороші її чарівні<br />
Складаю чудовії станси,<br />
Якби ж було серце в дівчатка мого,<br />
Хороший сонет би зложив на його!
 </div>
