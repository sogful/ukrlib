<body>
<div class="wrap">
 <div class="page-title">
  <h1>Бакуніній</h1>
  <h2>Олександр Пушкін</h2>
 </div>
 <div class="prose" id="content">
 <p>Дарма б оспівував я ваші іменини,</p>
<p>
Хоч вашу похвалу хотілось би здобуть.</p>
<p>
Не стали кращою ви в день Єкатерини</p>
<p>
Тому, що кращою ніяк не можна буть.</p>
<p>
Переклад М. Рильського</p>

</div>
