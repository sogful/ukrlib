<body>
<div class="wrap">
 <div class="page-title">
  <h1>Що ж ти думаєш-гадаєш</h1>
  <h2>Роберт Бернс</h2>
 </div>
 <div class="prose" id="content">
 Що ж ти думаєш-гадаєш,<br />
Чом на інших поглядаєш?<br />
Чи мене ти покидаєш?<br />
Любий, милий, повернись,<br />
Знов до мене пригорнись!<br />
<br />
Я ж тебе кохала вірно,<br />
Довірялася безмірно<br />
I тепер прошу покірно —<br />
Любий, милий, не зраджай,<br />
Мого серця не вражай!
 </div>
</div>
