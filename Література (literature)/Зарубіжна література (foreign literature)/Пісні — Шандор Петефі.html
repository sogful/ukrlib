<div class="wrap">
 <div class="page-title">
  <h1>Пісні</h1>
  <h2>Шандор Петефі</h2>
 </div>
 <div class="prose" id="content">
 Не спить в колисці, плаче немовля,<br />
А ще не день,-<br />
I нянька, присипляючи його,<br />
Співа пісень.<br />
<br />
Дитя моїх страждань — безсонний біль<br />
Кричить в мені,-<br />
Щоб він заснув на мить, складаю я<br />
Свої пісні.
 </div>
