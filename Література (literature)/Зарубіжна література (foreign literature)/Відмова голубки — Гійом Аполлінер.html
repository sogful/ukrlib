<body>
<div class="wrap">
 <div class="page-title">
  <h1>Відмова голубки</h1>
  <h2>Гійом Аполлінер</h2>
 </div>
 <div class="prose" id="content">
 Різдво скінчилося Страстями<br />
Благовіщення підвело<br />
Болюче й любе до нестями<br />
Це самозречення було<br />
<br />
Якщо зарізана голубка<br />
Кривавиться з своїх відмов<br />
То з крил їй вилониться думка<br />
В поему виллється любов
 </div>
</div>
