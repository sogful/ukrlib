 <div class="page-title">
  <h1>Хто знизу Неба не знайшов</h1>
  <h2>Емілі Елізабет Дікінсон</h2>
 </div>
 <div class="prose" id="content">
 Хто знизу Неба не знайшов –<br />
Не вийде і вгорі –<br />
Бо завжди Ангелів житло,<br />
В сусідньому дворі –<br />
<br />
<em>Переклад Віталія Гречки</em><br />
<em>05.03.2024</em>
