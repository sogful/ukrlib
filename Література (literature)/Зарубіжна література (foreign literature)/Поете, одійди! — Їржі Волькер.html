<body>
<div class="wrap">
 <div class="page-title">
  <h1>Поете, одійди!</h1>
  <h2>Їржі Волькер</h2>
 </div>
 <div class="prose" id="content">
 Поете, одійди!<br />
Закинь усе,— візьми лиш рискаля<br />
й перекопай той лан од цвинтаря до обрію,<br />
засій його ізвечора любов'ю доброю,<br />
щоб ранок сяйно-золотий вродився,<br />
а в ньому щоб поет ні на що не згодився,-<br />
бо люди геть усі<br />
уміли б плакати й співати.<br />
<br />
Переклад М. Лукаша
 </div>
</div>
