<div class="wrap">
 <div class="page-title">
  <h1>Переможцям</h1>
  <h2>Анна Ахматова</h2>
 </div>
 <div class="prose" id="content">
 Ззаду Нарвські ворота,<br />
Попереду була тільки смерть...<br />
Так радянська йшла піхота<br />
Прямо в жовті жерла "Берт".<br />
От про вас і напишуть книжки:<br />
"Життя своє за други своя",<br />
Невигадливі хлопчини —<br />
Ваньки, Васьки, Олешки, Гришки, —<br />
Онуки, брати, сини!
 </div>
