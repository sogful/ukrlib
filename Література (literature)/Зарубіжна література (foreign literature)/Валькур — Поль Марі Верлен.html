<div class="wrap">
 <div class="page-title">
  <h1>Валькур</h1>
  <h2>Поль Марі Верлен</h2>
 </div>
 <div class="prose" id="content">
 Місто цегляних<br />
Дімків чепурних —<br />
Парам коханих<br />
Затишно в них!<br />
<br />
Хміль зелениться<br />
I виноград —<br />
Щирий п'яниця<br />
Тій зелені рад!<br />
<br />
А ресторани,<br />
Бари, пивні,<br />
Служки старанні<br />
I чарівні!<br />
<br />
О атмосфера<br />
Битих доріг...<br />
Для Агасфера<br />
Скільки утіх!
 </div>
