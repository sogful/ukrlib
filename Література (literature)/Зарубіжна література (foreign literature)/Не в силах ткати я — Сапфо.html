<div class="wrap">
 <div class="page-title">
  <h1>Не в силах ткати я...</h1>
  <h2>Сапфо</h2>
 </div>
 <div class="prose" id="content">
 Не в силах ткати я —<br />
Серце болить,<br />
O рідна мамо!<br />
Жагою, мов вогнем,<br />
Мучить мене<br />
Кіпріда ніжна. [150]
