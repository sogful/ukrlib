<div class="wrap">
 <div class="page-title">
  <h1>Колоди</h1>
  <h2>Франц Кафка</h2>
 </div>
 <div class="prose" id="content">
 <p>Бо ми — наче ті колоди на снігу. Враження таке, ніби вони гладенькі, досить лише їх легенько штовхнути — і вони покотяться. Таж ні, не вийде, вони ж бо міцно примерзли до землі. Але знаєш, навіть це — також тільки враження.</p>
<p>
(Переклав Олекса Логвиненко)</p>
