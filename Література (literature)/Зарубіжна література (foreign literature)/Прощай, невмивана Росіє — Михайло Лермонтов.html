<div class="wrap">
 <div class="page-title">
  <h1>Прощай, невмивана Росіє...</h1>
  <h2>Михайло Лермонтов</h2>
 </div>
 <div class="prose" id="content">
 Прощай, невмивана Росіє,<br />
Країно пана і раба,<br />
Де скрізь мундир ще блакитніє<br />
І мовчки хилиться юрба!<br />
<br />
Ачей Кавказу грань висока<br />
Мене сховає від башей,<br />
Від всевидющого їх ока,<br />
Від всеслухащих їх ушей.<br />
<br />
Переклад М. Драй-Хмари
 </div>
