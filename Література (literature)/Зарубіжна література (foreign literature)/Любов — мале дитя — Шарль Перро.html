 <div class="page-title">
  <h1>Любов — мале дитя...</h1>
  <h2>Шарль Перро</h2>
 </div>
 <div class="prose" id="content">
 Любов — мале дитя, хоч і найстарше в світі.<br />
Найменший цей божок — найбільший із богів!<br />
Огонь його горить у хвилі і у цвіті,<br />
І все ж в очах його Ірис у сяйві снів.<br />
<br />
<em>Переклад Миколи Терещенка</em>
 </div>
</div>
