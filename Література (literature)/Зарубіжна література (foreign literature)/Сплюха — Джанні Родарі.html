<body>
<div class="wrap">
 <div class="page-title">
  <h1>Сплюха</h1>
  <h2>Джанні Родарі</h2>
 </div>
 <div class="prose" id="content">
 В понеділок<br />
я проснувся,<br />
<br />
У вівторок<br />
позіхнув,<br />
<br />
У середу<br />
потягнувся.<br />
<br />
У четвер<br />
ізнов заснув.<br />
<br />
У п'ятницю<br />
я дрімав,<br />
<br />
У суботу<br />
спочивав,<br />
<br />
А в неділю<br />
днину цілу<br />
Хропака затинав.
 </div>
</div>
