 <div class="page-title">
  <h1>Думали: вбогі, немає у нас нічого...</h1>
  <h2>Анна Ахматова</h2>
 </div>
 <div class="prose" id="content">
 * * *<br />
<br />
Думали: вбогі, немає у нас нічого,<br />
А як стали втрачати одне за одним,<br />
Що кожен день обертався<br />
На поминальний день,—<br />
То почали складати пісні<br />
Про безмежну щедроту божу<br />
Та про наше колишнє багатство.<br />
<br />
1915
