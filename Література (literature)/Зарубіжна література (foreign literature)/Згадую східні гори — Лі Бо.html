<body>
<div class="wrap">
 <div class="page-title">
  <h1>Згадую східні гори</h1>
  <h2>Лі Бо</h2>
 </div>
 <div class="prose" id="content">
 Східних гір я давно вже<br />
не бачив... З тих пір<br />
<br />
Перецвівсь на трояндах<br />
червоний убір.<br />
<br />
Білі хмари ще, може,<br />
й розійдуться в небі,<br />
<br />
Але місяць,<br />
у чий він покотиться двір?
 </div>
