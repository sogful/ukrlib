<div class="wrap">
 <div class="page-title">
  <h1>Печаль</h1>
  <h2>Лі Бо</h2>
 </div>
 <div class="prose" id="content">
 Красуня не відходить<br />
од вікна.<br />
<br />
Хитнулася фіранка<br />
запашна.<br />
<br />
Я бачу на очах<br />
пекучі сльози,-<br />
<br />
По кому ж то сумує<br />
так вона?
 </div>
