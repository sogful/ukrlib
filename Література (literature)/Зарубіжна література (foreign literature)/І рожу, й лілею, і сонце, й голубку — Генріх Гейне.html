<body>
<div class="wrap">
 <div class="page-title">
  <h1>І рожу, й лілею, і сонце, й голубку</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 І рожу, й лілею, і сонце, й голубку<br />
Я все те, здавалось, любив до загину.<br />
Тепер не люблю їх, – одну маю любку,<br />
Дівчину-рибчину, перлину єдину;<br />
Вона-бо кохання первісточка гожа, –<br />
І сонце, й лілея, й голубка, і рожа.
 </div>
</div>
