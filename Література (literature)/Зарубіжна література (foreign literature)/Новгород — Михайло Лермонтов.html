  <h1>Новгород</h1>
  <h2>Михайло Лермонтов</h2>
 </div>
 <div class="prose" id="content">
 (3 жовтня 1830)<br />
<br />
Сини снігів, сини слов'ян,<br />
Чому ви духом занепали?<br />
Чому?.. Погибне ваш тиран,<br />
Як всі тирани погибали!..<br />
До наших днів при імені свободи<br />
Тріпоче ваше серце і кипить!..<br />
Є місто бідне, бачили народи<br />
В нім те, куди тепер ваш дух летить.<br />
<br />
1830
