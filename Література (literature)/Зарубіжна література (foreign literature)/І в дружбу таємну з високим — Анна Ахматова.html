 <div class="page-title">
  <h1>І в дружбу таємну з високим...</h1>
  <h2>Анна Ахматова</h2>
 </div>
 <div class="prose" id="content">
 * * *<br />
<br />
І в дружбу таємну з високим,<br />
Як юний орел темнооким,<br />
Я, мов у квітник вересневий,<br />
Ходою легкою ввійшла.<br />
Були там останні троянди,<br />
І місяць прозорий хитався<br />
На хмарах осінніх, густих...<br />
<br />
Літо 1917
