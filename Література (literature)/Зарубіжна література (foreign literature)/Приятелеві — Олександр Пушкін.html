<body>
<div class="wrap">
 <div class="page-title">
  <h1>Приятелеві</h1>
  <h2>Олександр Пушкін</h2>
 </div>
 <div class="prose" id="content">
 Не прикидайся, друже мій,<br />
Супернику широкоплечий:<br />
Тобі звук ліри не страшний<br />
І томні елегійні речі.<br />
Дай руку: не ревнивий ти,<br />
Я звик у лінощах цвісти,<br />
Твоя красуня розум має;<br />
Я бачу все і не гнівлюсь:<br />
Вона Лаура, кожен знає,<br />
Та я в Петрарки не годжусь.
 </div>
