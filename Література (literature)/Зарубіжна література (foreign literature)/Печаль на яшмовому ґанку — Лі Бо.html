<title>Печаль на яшмовому ґанку</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Печаль на яшмовому ґанку</h1>
  <h2>Лі Бо</h2>
 </div>
 <div class="prose" id="content">
 На яшмових сходах<br />
біліє холодна роса.—<br />
Промокли панчохи.<br />
Пливуть мовчазні небеса.<br />
Дивлюсь крізь фіранку<br />
на місяць осінній печальний,—<br />
На тихій воді він тремтить<br />
і повільно згаса.
 </div>
