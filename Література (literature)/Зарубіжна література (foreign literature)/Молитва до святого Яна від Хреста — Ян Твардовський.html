  <h2>Ян Твардовський</h2>

 <div class="prose" id="content">
 Ян Твардовський<br />
Молитва до святого Яна від Хреста<br />
<br />
Святий Яне від Хреста, як уповні літо<br />
й деркач озвався, глухе відлуння лугом<br />
овечка дзвінко мека, шелест перепілки<br />
мальву кинь мені й назвись від Сонечка* Яном<br />
<br />
1956<br />
<br />
*Сонечко —— комашка
 </div>
