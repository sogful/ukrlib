<body>
<div class="wrap">
 <div class="page-title">
  <h1>Все шукаємо істину в спорах...</h1>
  <h2>Олег Дмитрієв</h2>
 </div>
 <div class="prose" id="content">
 Все шукаємо істину в спорах,<br />
Дайте слово сказати мені,-<br />
Не шукаємо в небі та в горах,<br />
У полях, в лісовій гущині.<br />
<br />
Так навчилися ми городити<br />
З мудрих фраз полемічні ряди.<br />
Але істину можна зустріти<br />
Сам на сам,<br />
Віч-на-віч —<br />
Як завжди.
 </div>
</div>
