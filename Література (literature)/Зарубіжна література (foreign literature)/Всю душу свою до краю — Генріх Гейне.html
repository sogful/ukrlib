<div class="wrap">
 <div class="page-title">
  <h1>Всю душу свою до краю...</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Всю душу свою до краю<br />
Я лілії віддаю,<br />
Хай дзвінко вона співає<br />
Пісню про милу мою.<br />
<br />
Щоб пісня завжди тремтіла,<br />
Як досі цілунок тремтить,<br />
Яким вона спалила<br />
Мене в незабутню мить.
 </div>
