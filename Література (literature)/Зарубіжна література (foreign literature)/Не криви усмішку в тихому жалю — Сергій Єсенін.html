<body>
<div class="wrap">
 <div class="page-title">
  <h1>Не криви усмішку в тихому жалю...</h1>
  <h2>Сергій Єсенін</h2>
 </div>
 <div class="prose" id="content">
 ***<br />
<br />
Не криви усмішку в тихому жалю,<br />
Не тебе, признаюсь, іншу я люблю.<br />
<br />
Втім, ти, певно, чула про мою любов.<br />
Це ж до неї, ніжний, нині я ішов.<br />
<br />
Як проходив мимо — серцю все одно,<br />
Просто закортіло глянуть у вікно.
 </div>
