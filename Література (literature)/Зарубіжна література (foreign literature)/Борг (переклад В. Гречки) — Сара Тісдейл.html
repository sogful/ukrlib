<div class="wrap">
 <div class="page-title">
  <h1>Борг (переклад В. Гречки)</h1>
  <h2>Сара Тісдейл</h2>
 </div>
 <div class="prose" id="content">
 Що винна я тепер тобі,<br />
Хто так мене любив?<br />
Мій дух від тебе не літав,<br />
Не чувся в серці спів.<br />
<br />
Але ж, коханому тому,<br />
Хто не любив мене,<br />
За браму винна я в стіні,<br />
Що до небес веде.<br />
<br />
<em>Переклад Віталія Гречки</em>
 </div>
</div>
