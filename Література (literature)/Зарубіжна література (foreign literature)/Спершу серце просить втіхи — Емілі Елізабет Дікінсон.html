<body>
<div class="wrap">
 <div class="page-title">
  <h1>Спершу серце просить втіхи...</h1>
  <h2>Емілі Елізабет Дікінсон</h2>
 </div>
 <div class="prose" id="content">
 Спершу серце просить втіхи,<br />
Потім, змучене, жадає<br />
Обезболюючих ліків,<br />
Щоб полегшити страждання.<br />
<br />
Потім сну прохає серце,<br />
Щоб, нарешті, попросити<br />
Смерті — наче привілею,<br />
Як захоче інквізитор.
 </div>
