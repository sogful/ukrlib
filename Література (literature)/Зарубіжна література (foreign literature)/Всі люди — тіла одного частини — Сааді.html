<div class="wrap">
 <div class="page-title">
  <h1>Всі люди — тіла одного частини...</h1>
  <h2>Сааді</h2>
 </div>
 <div class="prose" id="content">
 * * *<br />
<br />
Всі люди — тіла одного частини,<br />
Бо створені із однієї глини.<br />
<br />
Коли від болю корчиться одна,<br />
Тоді все тіло спокою не зна.<br />
<br />
О ти, що досі не жалів нікого!<br />
Ти недостойний імені людського!
