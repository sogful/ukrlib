<body>
<div class="wrap">
 <div class="page-title">
  <h1>Я царствую в серці у Джінні</h1>
  <h2>Роберт Бернс</h2>
 </div>
 <div class="prose" id="content">
 Я царствую в серці у Джінні<br />
<br />
Мені всі Бурбони й Георги<br />
I їхні моря білопінні<br />
Годяться хіба що під ноги —<br />
Я царствую в серці у Джінні!<br />
<br />
На троні любові моєї<br />
Чолом я сягаю до неба.<br />
До біса корони й трофеї!<br />
Мені їх і даром не треба!
 </div>
