 <div class="page-title">
  <h1>Чотировірш</h1>
  <h2>Франсуа Війон</h2>
 </div>
 <div class="prose" id="content">
 Я Франсуа, що рими в'яже,<br />
З Парижу, біля Понтуази,<br />
Коли повисну, шия скаже<br />
Всім, скільки д... в мене важить.
