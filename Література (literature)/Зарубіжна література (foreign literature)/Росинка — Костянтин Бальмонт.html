<body>
<div class="wrap">
 <div class="page-title">
  <h1>Росинка</h1>
  <h2>Костянтин Бальмонт</h2>
 </div>
 <div class="prose" id="content">
 Росинка тремтіла<br />
На тонкому аркуші.<br />
Речонка дихала,<br />
Шарудячи в очереті.<br />
<br />
В росинку дивлюсь я<br />
І бачу, що в ній<br />
Грає, радіючи,<br />
Так багато вогнів.<br />
<br />
...Їх ледве помітиш,<br />
Так вони малі.<br />
Але де ж ти зустрінеш<br />
Такі вогні?
 </div>
