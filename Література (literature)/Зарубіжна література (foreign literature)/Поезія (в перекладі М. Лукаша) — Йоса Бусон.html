<div class="wrap">
 <div class="page-title">
  <h1>Поезія (в перекладі М. Лукаша)</h1>
  <h2>Йоса Бусон</h2>
 </div>
 <div class="prose" id="content">
 Влітошні дощі...<br />
Тільки раз поміж сосон<br />
місяць прояснивсь.<br />
<br />
Вечір. Вітер.<br />
Циби чаплі синьої<br />
миють хвилі.<br />
<br />
У сумних думках<br />
я зійшов на гору: ах! —<br />
шипшина цвіте!
 </div>
