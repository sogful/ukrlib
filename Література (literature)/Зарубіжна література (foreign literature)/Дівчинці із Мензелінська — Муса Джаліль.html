 <div class="page-title">
  <h1>Дівчинці із Мензелінська</h1>
  <h2>Муса Джаліль</h2>
 </div>
 <div class="prose" id="content">
 <em>Переклад: П. Засенко</em><br><br />
Залишайся, розумнице.<br />
Посумуй вдалині,<br />
Перейду через вулицю —<br />
Опинюсь на війні.<br />
<br />
Раптом куля дістанеться —<br />
Трохи все ж потужи.<br />
А як пісня зостанеться —<br />
Пісню ти збережи&#8230;<br />
<br />
<em>1941</em><br />
<br />
<strong>Переклад: </strong>П. Засенко
