<div class="wrap">
 <div class="page-title">
  <h1>Ти йшла в прозору чисту воду...</h1>
  <h2>Гійом Аполлінер</h2>
 </div>
 <div class="prose" id="content">
 Ти йшла в прозору чисту воду<br />
Я в погляді твоїм тонув<br />
Пройшов солдат нагнулась швидко<br />
Зірвала одвернувшись вітку<br />
<br />
Ти попливла а в мене серце<br />
Мов перекинутий вогонь<br />
Його розсяяли дзеркала<br />
Вологи що тебе купала
 </div>
