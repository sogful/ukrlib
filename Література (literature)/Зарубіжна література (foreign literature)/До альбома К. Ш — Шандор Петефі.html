 <div class="page-title">
  <h1>До альбома К. Ш.</h1>
  <h2>Шандор Петефі</h2>
 </div>
 <div class="prose" id="content">
 Стара будівля — білий світ;<br />
Перекосивсь, схиливсь, осів.<br />
Коли ти ходиш в нім,— пильнуй,<br />
Щоб часом лоба не розбив.<br />
<br />
Націлився на тебе слуп...<br />
Схили чоло, не будь дурним!<br />
"Я краще лоба проломлю,<br />
Аніж схилюся перед ним".
 </div>
