<div class="wrap">
 <div class="page-title">
  <h1>До плачучої леді</h1>
  <h2>Джордж Гордон Байрон</h2>
 </div>
 <div class="prose" id="content">
 Плач, королівно! Батьків гріх<br />
Упав на край. Якби ж слізьми ти<br />
Для визволу страждених всіх<br />
Могла вину отецьку змити!<br />
<br />
Плач! Одверни від нас напасть<br />
Сльозами, і тобі ласкаво<br />
Народ усмішкою воздасть<br />
За кожну слізоньку криваву.<br />
<br />
Березень 1812
 </div>
