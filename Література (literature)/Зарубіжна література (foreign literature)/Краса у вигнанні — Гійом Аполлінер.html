<title>Краса у вигнанні</title>

</head>
<body>
<div class="wrap">
 <div class="page-title">
  <h1>Краса у вигнанні</h1>
  <h2>Гійом Аполлінер</h2>
 </div>
 <div class="prose" id="content">
 Тікай веселко-ворожбитко<br />
Тікайте гожі кольори<br />
Сховатись мусиш ти і швидко<br />
Мене інфанто не кори<br />
<br />
I вже веселка у вигнанні<br />
I той хто міг її створить<br />
Але поглянь на вітрі рвянім<br />
Натомість прапор майорить
 </div>
</div>
