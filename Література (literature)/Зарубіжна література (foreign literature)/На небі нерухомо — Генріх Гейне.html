<body>
<div class="wrap">
 <div class="page-title">
  <h1>На небі нерухомо</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 На небі нерухомо<br />
Зірки ясні стоять<br />
Літ тисячі і любо<br />
Зглядаються, зорять.<br />
<br />
Хороша в зірок мова,<br />
Багата і ясна,<br />
Та тільки невідома<br />
Філологам вона!<br />
<br />
Я ж тую мову знаю,<br />
Мені вона своя,<br />
Коханої обличчя –<br />
Граматика моя!
 </div>
