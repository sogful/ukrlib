<div class="wrap">
 <div class="page-title">
  <h1>Перший спогад</h1>
  <h2>Луїза Ґлік</h2>
 </div>
 <div class="prose" id="content">
 Колись давно мене ранили. Я жила<br />
ради помсти<br />
супроти мого батька. Не супроти того<br />
ким він був<br />
або ким була я, але проти часів<br />
дитинства. Я думала,<br />
цей біль означав,<br />
що мене не любили.<br />
Та направду це значило,<br />
що любила я.<br />
<br />
<em>Переклад Вікторії Фещук</em>
 </div>
