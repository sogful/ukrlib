<body>
<div class="wrap">
 <div class="page-title">
  <h1>Самотній кедр на стромині...</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Самотній кедр на стромині<br />
В північній стоїть стороні,<br />
I кригою, й снігом укритий,<br />
Дрімає і мріє вві сні.<br />
<br />
I бачить він сон про пальму,<br />
Що десь у південній землі<br />
Сумує в німій самотині<br />
На спаленій сонцем скалі.
 </div>
</div>
