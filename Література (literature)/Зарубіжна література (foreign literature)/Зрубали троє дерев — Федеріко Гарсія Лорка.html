 <div class="prose" id="content">
 Федеріко Гарсія Лорка<br />
Зрубали троє дерев<br />
<br />
Перекладач: Микола Лукаш<br />
<br />
Було їх троє.<br />
(Прийшов день, приніс сокири).<br />
Потім двоє.<br />
(Волочаться срібні крила).<br />
Далі одно.<br />
Нема й того.<br />
(Вода оголіла).
