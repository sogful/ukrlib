<div class="wrap">
 <div class="page-title">
  <h1>Поєдинок</h1>
  <h2>Емілі Елізабет Дікінсон</h2>
 </div>
 <div class="prose" id="content">
 Взяла я владу в свої руки —<br />
що там весь світ!<br />
така відвага, що не мав ще<br />
і сам Давид.<br />
<br />
Я камінь кинула — не впав він<br />
а впала я!<br />
чи Ґоліят був завеликий,<br />
чи я — маля?<br />
<br />
<em><br />
[The Duel (I took my power in my hands)]<br />
З англійської переклала Марта Тарнавська</em>
 </div>
