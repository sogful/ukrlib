<body>
<div class="wrap">
 <div class="page-title">
  <h1>Лучники</h1>
  <h2>Федеріко Гарсія Лорка</h2>
 </div>
 <div class="prose" id="content">
 Лучники темні<br />
наближаються Севільї.<br />
<br />
Гвадалквівір відкритий.<br />
<br />
Горді сірі сомбреро,<br />
в'ються капи широкі.<br />
<br />
Ой, Гвадалквівір!<br />
<br />
Від далеких приходять<br />
вони країн муки.<br />
<br />
Гвадалквівір відкритий.<br />
<br />
І заходять у лабіринти,<br />
кохання, кришталю та каменю.<br />
<br />
Ой, Гвадалквівір!
 </div>
