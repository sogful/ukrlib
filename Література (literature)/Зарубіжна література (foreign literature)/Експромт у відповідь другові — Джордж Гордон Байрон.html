<div class="wrap">
 <div class="page-title">
  <h1>Експромт у відповідь другові</h1>
  <h2>Джордж Гордон Байрон</h2>
 </div>
 <div class="prose" id="content">
 Коли із дна душі незборне<br />
Тужіння виповзе надвір<br />
І вираз мій у тінь огорне,<br />
Потьмить чоло й заповнить зір,<br />
Не бідкайся! Свою оселю<br />
Моя скорбота добре зна:<br />
В грудей безмовне підземелля<br />
Назад повернеться вона.<br />
<br />
Вересень 1813
 </div>
