<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хід життя</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Як багато в тебе є,<br />
То ще більше ти придбаєш.<br />
Маєш мало — одберуть<br />
І найменше, що ти маєш.<br />
<br />
Коли ж зовсім голий ти,-<br />
Ляж в могилу в силі, в цвіті.<br />
Той лиш має право жить,<br />
Хто хоч дещо має в світі.
 </div>
