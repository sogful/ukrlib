<body>
<div class="wrap">
 <div class="page-title">
  <h1>Захід сонця</h1>
  <h2>Фрідріх Гельдерлін</h2>
 </div>
 <div class="prose" id="content">
 Де ти? Смеркає п'яно душа мені,<br />
Твоїм блаженством щертна; бо щойно я<br />
Вслухався, як злотистих звуків<br />
Повний, юнак чарівливий, сонце,<br />
<br />
Вечірній спів на лірі небесній грав;<br />
Ліси й горби бриніли ще лунами,<br />
Але пішов він до народів,<br />
Що почитають його, побожні.
 </div>
