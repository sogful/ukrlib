<body>
<div class="wrap">
 <div class="page-title">
  <h1>Рій мух</h1>
  <h2>Гійом Аполлінер</h2>
 </div>
 <div class="prose" id="content">
 Заграв конем у діл зелений<br />
Про нього думає дівча<br />
Чийсь флот пливе до Мітілени<br />
Десь лезо блискає меча<br />
<br />
Як рвали ружу полум'яну<br />
Їм очі раптом зацвіли<br />
Уста вже здалеку так п'яно<br />
Сонцями на уста лягли
 </div>
</div>
