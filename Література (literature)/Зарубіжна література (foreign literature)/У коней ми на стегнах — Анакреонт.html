<div class="wrap">
 <div class="page-title">
  <h1>У коней ми на стегнах...</h1>
  <h2>Анакреонт</h2>
 </div>
 <div class="prose" id="content">
 У коней ми на стегнах<br />
Випалюємо тавра;<br />
Парфян хоробрих можна<br />
Пізнати по тіарах;<br />
Закоханих так само<br />
Я вгадую відразу,-<br />
І в них у серці завжди<br />
Буває знак маленький. [151]
 </div>
