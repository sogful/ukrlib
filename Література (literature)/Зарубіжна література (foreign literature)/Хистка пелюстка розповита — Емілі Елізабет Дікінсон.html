<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хистка пелюстка розповита...</h1>
  <h2>Емілі Елізабет Дікінсон</h2>
 </div>
 <div class="prose" id="content">
 Хистка пелюстка розповита —<br />
Звичайний досвід серед літа —<br />
Роса в траві — бджола чи дві —<br />
Вітрець як сон — ряхтіння крон —<br />
І я — троянда!<br />
<br />
<em>(З англійської переклав Дмитро Павличко)</em>
 </div>
</div>
