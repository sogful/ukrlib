<body>
<div class="wrap">
 <div class="page-title">
  <h1>А ззаду Цар Мовчан</h1>
  <h2>Ендре Аді</h2>
 </div>
 <div class="prose" id="content">
 Свищу й видзвонюю зубами,<br />
Йдучи вночі по темній хащі,<br />
А ззаду велетень ступа:<br />
То Цар Мовчан.<br />
Не оглядайсь, бо ти пропащий!<br />
<br />
Не смій замовкнути й на хвильку,<br />
Не смій звести на Місяць очі:<br />
Один лиш зойк, один лиш хруск —<br />
Той Цар Мовчан<br />
Ступне на тебе і розтопче.
 </div>
</div>
