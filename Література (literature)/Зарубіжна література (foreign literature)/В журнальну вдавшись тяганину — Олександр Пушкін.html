 <div class="page-title">
  <h1>В журнальну вдавшись тяганину...</h1>
  <h2>Олександр Пушкін</h2>
 </div>
 <div class="prose" id="content">
 В журнальну вдавшись тяганину,<br />
Зоїл, що сон всім навіва,<br />
В чорнильний опіум влива<br />
Скаженого собаки слину.
