<title>Душа на припоні</title>

<body>
<div class="wrap">
 <div class="page-title">
  <h1>Душа на припоні</h1>
  <h2>Ендре Аді</h2>
 </div>
 <div class="prose" id="content">
 Зарканив душу хтось мою,<br />
Щоб не вибрикувала баско.<br />
Даремно тяв я карбачем,<br />
Даремно хвиськав, даремно ляскав.<br />
<br />
Як де побачиш в нас коня,<br />
Що піною і кров'ю порска<br />
На прив'язі — рубай припін,<br />
Бо то — відчайна душа угорська.
 </div>
</div>
