 <div class="prose" id="content">
 * * *<br />
<br />
Що війни, що чума? — близький кінець їм видно,<br />
Їх присуди заледве не збулись.<br />
Та як нам бути з жахом, що несхибно<br />
Був бігом часу названий колись?<br />
<br />
1962
