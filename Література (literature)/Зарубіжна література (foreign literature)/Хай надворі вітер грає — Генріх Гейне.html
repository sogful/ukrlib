<body>
<div class="wrap">
 <div class="page-title">
  <h1>Хай надворі вітер грає</h1>
  <h2>Генріх Гейне</h2>
 </div>
 <div class="prose" id="content">
 Хай надворі вітер грає,<br />
Завірюха завиває,<br />
Снігом кидає в вікно:<br />
Се для мене все одно, –<br />
Бо на серці весна-красна,<br />
В ньому любки постать ясна!
 </div>
</div>
