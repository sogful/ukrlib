 <div class="page-title">
  <h1>Епіграма</h1>
  <h2>Анна Ахматова</h2>
 </div>
 <div class="prose" id="content">
 Чи Біче, яко Дант, творить могла?<br />
Лаура — жар кохання уславляти?<br />
Тепер жінкам дар слова я дала...<br />
Та, Боже, як їх змусити мовчати!<br />
<br />
1958
