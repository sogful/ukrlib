<div class="wrap">
 <div class="page-title">
  <h1>Встала хмарка пилу...</h1>
  <h2>Афанасій Фет</h2>
 </div>
 <div class="prose" id="content">
 Встала хмарка пилу<br />
Там, де небосхил...<br />
Кінний то чи піший —<br />
Закриває пил...<br />
Бачу, вершник лине<br />
На баскім коні...<br />
Друже мій далекий,<br />
Вість подай мені!<br />
<br />
Перекладач: М. Рильський
