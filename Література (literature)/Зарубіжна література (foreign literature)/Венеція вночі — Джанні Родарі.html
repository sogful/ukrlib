<body>
<div class="wrap">
 <div class="page-title">
  <h1>Венеція вночі</h1>
  <h2>Джанні Родарі</h2>
 </div>
 <div class="prose" id="content">
 Міст над водою виситься,<br />
Міст в воді підвісився;<br />
Над мостом — коло місяця,<br />
Й під мостом місяць міститься.<br />
<br />
Не розбереш, куди не кинь,<br />
Де височінь,<br />
Де глибочінь,<br />
Де справжній міст,<br />
Де справжній місяць,<br />
В воді чи в небі зорі світять.
 </div>
