<div class="wrap">
 <div class="page-title">
  <h1>Шість струн</h1>
  <h2>Федеріко Гарсія Лорка</h2>
 </div>
 <div class="prose" id="content">
 Гітара<br />
змушує ридати мрії.<br />
Сльозами душ<br />
заблуклих<br />
стікати з<br />
губ.<br />
І як тарантул<br />
виплітає велику зірку,<br />
щоб вудити зітхання,<br />
що плавають у чорнім<br />
дерев'янім дзбанку.<br />
<br />
<em>Переклад Марини Сушко</em>
 </div>
</div>
