<body>
<div class="wrap">
 <div class="page-title">
  <h1>Гнітять чорні сни...</h1>
  <h2>Поль Марі Верлен</h2>
 </div>
 <div class="prose" id="content">
 Гнітять чорні сни<br />
Моє існування:<br />
Бажання, засни!<br />
Засни, сподівання!<br />
<br />
Знеможені сном,<br />
Тьмяніють зіниці —<br />
Між злом і добром<br />
Не бачу різниці...<br />
<br />
Все темне й сумне..<br />
А руки нечулі<br />
Колишуть мене:<br />
Ой люлі, ой люлі!
 </div>
