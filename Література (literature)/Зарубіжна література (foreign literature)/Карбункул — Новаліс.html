<div class="wrap">
 <div class="page-title">
  <h1>Карбункул</h1>
  <h2>Новаліс</h2>
 </div>
 <div class="prose" id="content">
 В його крові, що буде вік палати,<br />
Таїться мудро знамено святе;<br />
Цей камінь з серцем можна порівняти,<br />
Що образ в нім Незнаної цвіте.<br />
Як перший іскор безліччю пойнятий,<br />
Так в другім хвиля світляна росте.<br />
Причину блиску, світло перший криє —<br />
Чи так і серце серця заясніє?
 </div>
