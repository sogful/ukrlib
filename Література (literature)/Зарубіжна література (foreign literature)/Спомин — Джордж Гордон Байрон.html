<div class="wrap">
 <div class="page-title">
  <h1>Спомин</h1>
  <h2>Джордж Гордон Байрон</h2>
 </div>
 <div class="prose" id="content">
 Кінець! То був лиш сон. І враз<br />
Блідих надій промінчик згас.<br />
Щасливих мало днів прожито,<br />
Світанок мій вкриває тьма,<br />
І душу сковує зима.<br />
Любов, надію вщент розбито.<br />
Якби ж — і спомини. Якби-то!<br />
<br />
1806
 </div>
