<body>
<div class="wrap">
 <div class="page-title">
  <h1>Розлука</h1>
  <h2>Емілі Елізабет Дікінсон</h2>
 </div>
 <div class="prose" id="content">
 Життя мені закрилось двічі,<br />
не знаю ще,<br />
чи несмертельність щось і третє<br />
мені несе.<br />
<br />
Така велика, безнадійна,<br />
найбільша з кар,<br />
Розлука — цей дарунок неба,<br />
це — пекла дар.<br />
<br />
<em>[Parting (My life closed twice before its close)]<br />
З англійської переклала Марта Тарнавська</em>
 </div>
