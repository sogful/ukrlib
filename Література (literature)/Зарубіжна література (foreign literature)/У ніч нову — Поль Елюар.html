<div class="wrap">
 <div class="page-title">
  <h1>У ніч нову</h1>
  <h2>Поль Елюар</h2>
 </div>
 <div class="prose" id="content">
 Жінка з котрою прожив<br />
Жінка з котрою живу<br />
Жінка з котрою житиму<br />
Завжди та сама<br />
Тобі треба пальто червоне<br />
Червоні рукавички червона маска<br />
І панчохи чорні<br />
Докази підстави<br />
Тебе бачити зовсім голу<br />
Чиста голизна о прекрасна оздоба<br />
<br />
Перса о моє серце.<br />
<br />
<em>Переклад Олега Жупанського</em>
 </div>
