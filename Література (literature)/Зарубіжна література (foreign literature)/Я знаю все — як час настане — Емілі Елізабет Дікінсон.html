<body>
<div class="wrap">
 <div class="page-title">
  <h1>Я знаю все — як час настане...</h1>
  <h2>Емілі Елізабет Дікінсон</h2>
 </div>
 <div class="prose" id="content">
 Я знаю все — як час настане<br />
Й питання змовкнуть на вустах,<br />
Бог розповість про наші рани<br />
У світлій школі в небесах.<br />
<br />
І як про зречення Петрове<br />
Розкаже він мені — в ту мить<br />
Забуду краплю горя злого,<br />
Що так мені тепер болить.
 </div>
</div>
