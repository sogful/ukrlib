<div class="wrap">
 <div class="page-title">
  <h1>Добра пісня</h1>
  <h2>Поль Марі Верлен</h2>
 </div>
 <div class="prose" id="content">
 Над лісом сяє<br />
Місяць блідий,<br />
З гілок зринає<br />
Голос чудний<br />
Під тінню крон…<br /><br />
О диво-сон!<br /><br />
В глибоку воду,<br />
Темну гладінь,<br />
Верба звік-роду<br />
Шле свою тінь,<br />
Де вітер згас…<br /><br />
Мріяти час.<br /><br />
Легка в розмаю<br />
Спокою мить<br />
Від небокраю<br />
Мовби бринить<br />
На перелив…<br /><br />
Диво із див.
 </div>
