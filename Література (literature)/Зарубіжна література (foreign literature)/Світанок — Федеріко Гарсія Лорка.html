<body>
<div class="wrap">
 <div class="page-title">
  <h1>Світанок</h1>
  <h2>Федеріко Гарсія Лорка</h2>
 </div>
 <div class="prose" id="content">
 Але, як кохання<br />
саетеро<br />
сліпі стали.<br />
<br />
Над зеленою ніччю<br />
стріли<br />
вражають обличчя лілей<br />
гарячих.<br />
<br />
Відходить місяць,<br />
хмар упали домівки<br />
та сагайдаки<br />
збирають роси.<br />
<br />
Ой, як оте кохання<br />
саетеро<br />
сліпі стали.
 </div>
</div>
