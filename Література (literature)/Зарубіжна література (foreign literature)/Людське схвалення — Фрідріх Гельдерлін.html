<div class="wrap">
 <div class="page-title">
  <h1>Людське схвалення</h1>
  <h2>Фрідріх Гельдерлін</h2>
 </div>
 <div class="prose" id="content">
 Святість в серці моїм з дня, коли, радісний,<br />
Я люблю. То чому шану від вас я мав<br />
Більшу в час, як я гордий,<br />
Ряснословний, пустіший був?<br />
<br />
Ах, є любе юрбі, що для базару йде,<br />
I почитує раб тільки владущого,-<br />
I в божественне вірять<br />
Тільки ті, що самі є ним.
 </div>
