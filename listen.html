<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Аудіо</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #fafafa; color: #1a1a1a; font-family: Tahoma, Geneva, Kalimati, sans-serif; }
    .wrap { margin: 0 auto; max-width: 980px; padding: 0 16px 24px; }
    .page-title { text-align: center; margin: 0; padding: 20px 20px 16px; }
    .page-title h1 { font-size: 28px; line-height: 1.25; font-weight: bold; margin: 0 0 12px; font-family: Verdana, sans-serif; }
    .page-title h2 { font-size: 18px; line-height: 1.3; font-weight: bold; margin: 0; font-family: Verdana, sans-serif; }
    .prose { text-align: justify; font: 16px/24px Georgia, "Times New Roman", serif; color: #000; }
    .prose blockquote { text-align: right; margin-bottom: 20px; }
    .cita { padding-left: 40px !important; font-style: italic !important; margin-top: 20px !important; margin-bottom: 20px !important; }
    .cita p { color: #737373 !important; font-style: italic !important; }
    .err { padding: 24px; text-align: center; color: #ae0706; }
   
    .player-shell {
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
    }
    .viz-wrap {
      width: 100%;
      height: 120px;
      padding: 0 16px 8px;
      background: linear-gradient(180deg, #f5f5f5 0%, #eaeaea 100%);
    }
    .viz-wrap.tall { height: 200px; }
    #vizInner {
      display: flex;
      width: 100%;
      height: 100%;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
    }
    .viz-bar {
      flex: 1;
      max-width: 28px;
      min-height: 4px;
      background: linear-gradient(to top, #ae0706, #f28b8a);
      border-radius: 2px 2px 0 0;
      transition: height 0.08s ease-out;
    }
    audio {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 0;
    }
    .hint { font-size: 14px; color: #666; text-align: center; padding: 40px 20px; }
  
  </style>
</head>
<body>

  <div class="wrap">
    <div class="page-title" id="heading" hidden>
      <h1 id="titleEl"></h1>
      <h2 id="authorEl"></h2>
    </div>
    <div class="err" id="errEl" hidden></div>
    <div class="hint" id="hintEl">(Відкрийте цю сторінку з параметром <code>?audio=…</code> доступним при візиту з <code>index.html</code>.)</div>
    <div class="prose" id="proseEl" hidden></div>
    <div class="player-shell" id="playerShell" hidden>
      <div class="viz-wrap" id="vizWrap"><div id="vizInner"></div></div>
      <audio id="audioEl" controls preload="metadata" crossorigin="anonymous"></audio>
    </div>
  </div>

  <script>
    (function () {
    const filesIndex = "/files.txt";

    function normWords(s) {
        return s.toLowerCase().replace(/[^\p{L}\p{N}]+/gu, " ").replace(/\s+/g, " ").trim();
    }

    function stripHashtags(base) {
        const i = base.indexOf(" #");
        return (i >= 0 ? base.slice(0, i) : base).trim();
    }

    function stripAudioParen(s) {
        return s.replace(/\s*\([^)]*аудіо[^)]*\)\s*$/i, "").trim();
    }

    function wordsInPath(pathNorm, phrase) {
        const words = normWords(phrase).split(" ").filter(function (w) { return w.length > 1; });
        return words.length > 0 && words.every(function (w) { return pathNorm.includes(w); });
    }

    function parseOpusMeta(base, isShort) {
        const clean = stripHashtags(base);
        const parts = clean.split(/\s—\s/);
        if (parts.length < 2) {
        return { title: stripAudioParen(clean), author: "" };
        }
        if (isShort) {
        return {
            title: stripAudioParen(parts[0].trim()),
            author: stripAudioParen(parts.slice(1).join(" — ").trim())
        };
        }
        return {
        author: stripAudioParen(parts[0].trim()),
        title: stripAudioParen(parts.slice(1).join(" — ").trim())
        };
    }

    function findOpusLine(lines, decodedName) {
        const want = decodedName;
        const wantLow = want.toLowerCase();
        for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line.toLowerCase().endsWith(".opus")) continue;
        const bn = line.split("/").pop() || "";
        const name = bn.slice(0, -5);
        if (name === want || name.toLowerCase() === wantLow) return line;
        }
        return null;
    }

    function findHtmlPath(lines, author, title) {
        if (!normWords(author) || !normWords(title)) return null;
        for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line.toLowerCase().endsWith(".html")) continue;
        const pathNorm = normWords(line);
        if (wordsInPath(pathNorm, author) && wordsInPath(pathNorm, title)) return line;
        }
        return null;
    }

    function extractProse(html) {
        const doc = new DOMParser().parseFromString(html, "text/html");
        const prose = doc.querySelector(".prose") || doc.querySelector("#content") || doc.querySelector(".wrap .prose");
        if (prose) return prose.innerHTML;
        const body = doc.body;
        if (body) return body.innerHTML;
        return "";
    }

    const params = new URLSearchParams(window.location.search);
    const audioParam = params.get("audio");
    if (!audioParam) return;

    const hintEl = document.getElementById("hintEl");
    const errEl = document.getElementById("errEl");
    const heading = document.getElementById("heading");
    const titleEl = document.getElementById("titleEl");
    const authorEl = document.getElementById("authorEl");
    const proseEl = document.getElementById("proseEl");
    const playerShell = document.getElementById("playerShell");
    const audioEl = document.getElementById("audioEl");
    const vizWrap = document.getElementById("vizWrap");
    const vizInner = document.getElementById("vizInner");

    hintEl.hidden = true;

    let decoded;
    try {
        decoded = decodeURIComponent(audioParam);
    } catch (e) {
        errEl.hidden = false;
        errEl.textContent = "Некоректний параметр audio.";
        return;
    }

    fetch(filesIndex, { cache: "force-cache" })
        .then(function (r) { if (!r.ok) throw new Error("index"); return r.text(); })
        .then(function (text) {
        const lines = text.split(/\r?\n/).filter(Boolean);
        const opusPath = findOpusLine(lines, decoded);
        if (!opusPath) {
            errEl.hidden = false;
            errEl.textContent = "Файл .opus не знайдено в індексі.";
            return;
        }

        const isShort = opusPath.indexOf("Короткі аудіо файли") >= 0;
        const baseName = opusPath.split("/").pop() || "";
        const baseNoExt = baseName.slice(0, -5);
        const meta = parseOpusMeta(baseNoExt, isShort);

        titleEl.textContent = meta.title || baseNoExt;
        authorEl.textContent = meta.author || "";
        document.title = (meta.title || baseNoExt) + (meta.author ? " — " + meta.author : "") + " — аудіо";
        heading.hidden = false;

        const audioUrl = "/" + opusPath.replace(/\\/g, "/").split("/").map(encodeURIComponent).join("/");
        audioEl.src = audioUrl;

        const htmlPath = findHtmlPath(lines, meta.author, meta.title);
        if (htmlPath) {
            return fetch("/" + htmlPath.replace(/\\/g, "/").split("/").map(encodeURIComponent).join("/"), { cache: "force-cache" })
            .then(function (r) { return r.ok ? r.text() : "" })
            .then(function (html) {
                if (html) {
                const inner = extractProse(html);
                if (inner.replace(/\s+/g, "")) {
                    proseEl.innerHTML = inner;
                    proseEl.hidden = false;
                }
                }
            });
        }
        return Promise.resolve();
        })
        .then(function () {
        playerShell.hidden = false;
        const noProse = proseEl.hidden || !String(proseEl.innerHTML || "").replace(/\s+/g, "");
        if (noProse) vizWrap.classList.add("tall");
        setupVisualizer(noProse);
        })
        .catch(function () {
        errEl.hidden = false;
        errEl.textContent = "Не вдалося завантажити індекс.";
        });

    function setupVisualizer(tall) {
        const nBars = 24;
        for (let i = 0; i < nBars; i++) {
        const bar = document.createElement("div");
        bar.className = "viz-bar";
        bar.style.height = "4px";
        vizInner.appendChild(bar);
        }

        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;

        const ctx = new AudioCtx();
        const analyser = ctx.createAnalyser();
        analyser.fftSize = 128;
        analyser.smoothingTimeConstant = 0.75;
        const data = new Uint8Array(analyser.frequencyBinCount);

        let connected = false;
        function connect() {
        if (connected) return;
        try {
            const src = ctx.createMediaElementSource(audioEl);
            src.connect(analyser);
            analyser.connect(ctx.destination);
            connected = true;
        } catch (e) {}
        }

        audioEl.addEventListener("play", function () {
        if (ctx.state === "suspended") ctx.resume();
        connect();
        });

        const bars = vizInner.querySelectorAll(".viz-bar");
        function tick() {
        if (connected) {
            analyser.getByteFrequencyData(data);
            const h = tall ? 180 : 100;
            for (let i = 0; i < bars.length; i++) {
            const v = data[Math.floor(i * data.length / bars.length)] || 0;
            const height = Math.max(4, (v / 255) * h);
            bars[i].style.height = height + "px";
            }
        }
        requestAnimationFrame(tick);
        }
        tick();
    }
    })();
  </script>
</body>
</html>
