<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Аудіо</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <style>

    /* (this does not work) */
    html {scrollbar-gutter: stable}
    
    body.listenplayeractive {padding-bottom: 220px}
    body.listenplayeractive.tallig {padding-bottom: 300px}
    body.listenplayeractive.vizoff {padding-bottom: 120px}
    body.listenplayeractive.tallig.vizoff {padding-bottom: 120px}

    .playershell {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 900; margin: 0;
      padding: 0 max(8px, env(safe-area-inset-left, 0px)) max(8px, env(safe-area-inset-bottom, 0px)) max(8px, env(safe-area-inset-right, 0px));
      box-sizing: border-box; max-width: 100vw;
      overflow-x: hidden;
    }

    /*//////////////////////////////////////////////////////////////////////*/

    .viztoggle {
      position: fixed;
      top: max(8px, env(safe-area-inset-top, 0px));
      right: max(8px, env(safe-area-inset-right, 0px));
      z-index: 950; width: 40px; height: 40px;
      margin: 0; padding: 0; border: 0;
      border-radius: 50%; cursor: pointer;
      background: white;
      overflow: visible;
    }
    .viztoggle:hover {background: #fff7f7}
    .viztoggle:focus-visible {outline: 2px solid #ae0706; outline-offset: 1px}
    .viztogglestack {
      position: absolute;
      left: 50%; top: 50%;
      width: 24px; height: 24px;
      margin: -12px 0 0 -12px;
      display: block;
      overflow: visible;
    }
    .viztogglebars {
      display: block;
      width: 24px; height: 24px;
    }

    .viztogglestack .viztogglex {
      position: absolute;
      right: -6px; bottom: -6px;
      width: 24px; height: 24px;
      display: none; z-index: 1;
      overflow: visible;
      pointer-events: none;
    }
    body.vizoff .viztoggle .viztogglex {display: block}

    body.vizoff .vizwrap {
      visibility: hidden;
      height: 0 !important;
      min-height: 0; padding: 0;
      overflow: hidden;
    }
    .playerdock {
      position: relative;
      width: 100%; max-width: 100%;
      box-sizing: border-box;
    }
    .vizwrap {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      z-index: 0; width: 100%; height: 120px;
      padding: 0 8px 8px;
      box-sizing: border-box;
      pointer-events: none;
    }
    .tall {
      height: 200px !important;
    }

    /*//////////////////////////////////////////////////////////////////////*/

    .vizinner {
      display: flex; opacity: 0.75;
      width: 100%; height: 100%;
      align-items: flex-end;
      justify-content: center; 
    }
    .vizbar {
      flex: 1; max-width: 28px; min-height: 4px;
      background: linear-gradient(to top, #f28b8a, #ae0706);
      transition: height 0.08s ease-out; opacity: 0.25;
    }
    .audiowrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 100%;
      min-width: 0; box-sizing: border-box;
      padding-top: 72px;
    }
    body.tallig .audiowrap {padding-top: 120px}
    body.vizoff .audiowrap {padding-top: 4px}
    audio {
      opacity: 0.75;
      display: block; margin: 0;
      width: 100%; max-width: 100%;
      padding: 10px 8px;
      box-sizing: border-box;
    }
    .hint { 
      font-size: 14px; color: #666; 
      text-align: center; padding: 40px 20px;
    }
    .proseloading {
      font-size: 14px; color: #666;
      text-align: center; padding: 24px 20px;
    }

  </style>
</head>
<body>

  <button type="button" class="viztoggle viztoggleclass" hidden aria-pressed="false" title="Приховати візуалізацію">
    <span class="viztogglestack" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" class="viztogglebars" fill="#ae0706" viewBox="0 -960 960 960"><path d="M160-160v-320h160v320zm240 0v-640h160v640zm240 0v-440h160v440z"/></svg>
      <svg xmlns="http://www.w3.org/2000/svg" class="viztogglex" viewBox="0 -960 960 960" fill="#1a1a1a"><path d="m336-280-56-56 144-144-144-143 56-56 144 144 143-144 56 56-144 143 144 144-56 56-143-144-144 144Z"/></svg>
    </span>
  </button>

  <div class="wrap">

    <div class="pagetitle headingclass" hidden>
      <h1 class="titleel"></h1>
      <h2 class="authorel"></h2>
    </div>

    <div class="err errel" hidden></div>
    <div class="hint hintel">(Відкрийте цю сторінку з параметром <code>?audio=…</code> доступним при візиту з <code>index.html</code>.)</div>
    <div class="proseloading loadingel" hidden>Шукається текст, одну секунду…</div>
    <div class="prose prosel" hidden></div>
    <div class="playershell playershellclass" hidden>
      <div class="playerdock">
        <div class="vizwrap vizwrapclass"><div class="vizinner"></div></div>
        <div class="audiowrap">
          <audio class="audioel" controls preload="metadata" crossorigin="anonymous"></audio>
        </div>
      </div>
    </div>

  </div>

  <script>
    (function () {

      const filesindex = "/files.txt";

      function normwords(s) {
        return s.toLowerCase().replace(/[^\p{L}\p{N}]+/gu, " ").replace(/\s+/g, " ").trim();
      }
      function striphashtags(base) {
        const i = base.indexOf(" #");
        return (i >= 0 ? base.slice(0, i) : base).trim();
      }
      function stripaudioparen(s) {
        return s.replace(/\s*\([^)]*аудіо[^)]*\)\s*$/i, "").trim();
      }

      // fix because there are misspellings with Коцюбинській and Коцюбінській?? how dude
      function normforpathmatch(s) {
        return normwords(s).replace(/і/g, "и");
      }
      function wordsinpath(pathnorm, phrase) {
        const pathloose = normforpathmatch(pathnorm);
        const words = normwords(phrase).split(" ").filter(function (w) { return w.length > 1; });
        return words.length > 0 && words.every(function (w) {
          const wloose = normforpathmatch(w);
          return pathloose.includes(wloose);
        });
      }

      /*//////////////////////////////////////////////////////////////////////*/

      function parseopusmeta(base, isshort) {
        const clean = striphashtags(base);
        const parts = clean.split(/\s—\s/);
        if (parts.length < 2) {
          return { title: stripaudioparen(clean), author: "" };
        }
        if (isshort) {
          return {
            title: stripaudioparen(parts[0].trim()),
            author: stripaudioparen(parts.slice(1).join(" — ").trim())
          };
        }
        return {
          author: stripaudioparen(parts[0].trim()),
          title: stripaudioparen(parts.slice(1).join(" — ").trim())
        };
      }
      function findopusline(lines, decodedname) {
        const want = decodedname;
        const wantlow = want.toLowerCase();
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line.toLowerCase().endsWith(".opus")) continue;
          const bn = line.split("/").pop() || "";
          const name = bn.slice(0, -5);
          if (name === want || name.toLowerCase() === wantlow) return line;
        }
        return null;
      }

      function findhtmlpath(lines, author, title) {
        if (!normwords(author) || !normwords(title)) return null;
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line.toLowerCase().endsWith(".html")) continue;
          const pathnorm = normwords(line);
          if (wordsinpath(pathnorm, author) && wordsinpath(pathnorm, title)) return line;
        }
        return null;
      }
      function extractprose(html) {
        const doc = new DOMParser().parseFromString(html, "text/html");
        const prose =
          doc.querySelector(".prose") ||
          doc.querySelector("#content") ||
          doc.querySelector(".wrap .prose");
        if (prose) return prose.innerHTML;
        const body = doc.body;
        if (body) return body.innerHTML;
        return "";
      }

      /*//////////////////////////////////////////////////////////////////////*/

      const params = new URLSearchParams(window.location.search);
      const audioparam = params.get("audio");
      if (!audioparam) return;

      const hintel = document.querySelector(".hintel");
      const errel = document.querySelector(".errel");
      const heading = document.querySelector(".headingclass");
      const titleel = document.querySelector(".titleel");
      const authorel = document.querySelector(".authorel");
      const prosel = document.querySelector(".prosel");
      const loadingel = document.querySelector(".loadingel");
      const playershell = document.querySelector(".playershellclass");
      const audioel = document.querySelector(".audioel");
      const vizwrap = document.querySelector(".vizwrapclass");
      const vizinner = document.querySelector(".vizinner");
      const viztoggle = document.querySelector(".viztoggleclass");

      let viznotshown = localStorage.getItem("listen_viz_hidden") === "1";

      viztoggle.addEventListener("click", function () {
        viznotshown = !viznotshown;
        localStorage.setItem("listen_viz_hidden", viznotshown ? "1" : "0");
        document.body.classList.toggle("vizoff", viznotshown);
        viztoggle.setAttribute("aria-pressed", (!viznotshown).toString());
        viztoggle.title = viznotshown ? "Показати візуалізацію" : "Приховати візуалізацію";
      });

      hintel.hidden = true;

      let decoded;
      try {
        decoded = decodeURIComponent(audioparam);
      } catch (e) {
        errel.hidden = false;
        errel.textContent = "Некоректний параметр audio.";
        return;
      }

      fetch(filesindex, { cache: "force-cache" })
        .then(function (r) { if (!r.ok) throw new Error("index"); return r.text(); })
        .then(function (text) {
          const lines = text.split(/\r?\n/).filter(Boolean);
          const opuspath = findopusline(lines, decoded);
          if (!opuspath) {
            errel.hidden = false;
            errel.textContent = "Файл не знайдено в індексі.";
            return;
          }

          const isshort = opuspath.indexOf("Короткі аудіо файли") >= 0;
          const basename = opuspath.split("/").pop() || "";
          const basenoext = basename.slice(0, -5);
          const meta = parseopusmeta(basenoext, isshort);

          titleel.textContent = meta.title || basenoext;
          authorel.textContent = meta.author || "";
          document.title = (meta.title || basenoext) + (meta.author ? " — " + meta.author : "") + " — аудіо";
          heading.hidden = false;

          const audiourl = "/" + opuspath.replace(/\\/g, "/").split("/").map(encodeURIComponent).join("/");
          audioel.src = audiourl;

          const htmlpath = findhtmlpath(lines, meta.author, meta.title);
          if (htmlpath) {
            loadingel.hidden = false;
            return fetch("/" + htmlpath.replace(/\\/g, "/").split("/").map(encodeURIComponent).join("/"), { cache: "force-cache" })
              .then(function (r) { return r.ok ? r.text() : "" })
              .then(function (html) {
                if (html) {
                  const inner = extractprose(html);
                  if (inner.replace(/\s+/g, "")) {
                    prosel.innerHTML = inner;
                    prosel.hidden = false;
                  }
                }
              })
              .finally(function () {
                loadingel.hidden = true;
              });
          }
          return Promise.resolve();
        })
        .then(function () {
          playershell.hidden = false;
          viztoggle.hidden = false;
          document.body.classList.toggle("vizoff", viznotshown);
          viztoggle.setAttribute("aria-pressed", (!viznotshown).toString());
          viztoggle.title = viznotshown ? "Показати візуалізацію" : "Приховати візуалізацію";
          document.body.classList.add("listenplayeractive");
          const noprose = prosel.hidden || !String(prosel.innerHTML || "").replace(/\s+/g, "");
          if (noprose) {
            vizwrap.classList.add("tall");
            document.body.classList.add("tallig");
          }
          setupvisualizer(noprose);
        })
        .catch(function () {
          errel.hidden = false;
          errel.textContent = "Не вдалося завантажити індекс.";
        });

      function setupvisualizer(tall) {
        const nbars = 24;
        for (let i = 0; i < nbars; i++) {
          const bar = document.createElement("div");
          bar.className = "vizbar";
          bar.style.height = "4px";
          vizinner.appendChild(bar);
        }

        const audiocx = window.AudioContext || window.webkitAudioContext;
        if (!audiocx) return;

        const ctx = new audiocx();
        const analyser = ctx.createAnalyser();
        analyser.fftSize = 128;
        analyser.smoothingTimeConstant = 0.75;
        const data = new Uint8Array(analyser.frequencyBinCount);

        let connected = false;
        function connect() {
          if (connected) return;
          try {
            const src = ctx.createMediaElementSource(audioel);
            src.connect(analyser);
            analyser.connect(ctx.destination);
            connected = true;
          } catch (e) {}
        }

        audioel.addEventListener("play", function () {
          if (ctx.state === "suspended") ctx.resume();
          connect();
        });

        const bars = vizinner.querySelectorAll(".vizbar");
        function tick() {
          if (connected && !viznotshown) {
            analyser.getByteFrequencyData(data);
            const h = tall ? 180 : 100;
            for (let i = 0; i < bars.length; i++) {
              const v = data[Math.floor(i * data.length / bars.length)] || 0;
              const height = Math.max(4, (v / 255) * h);
              bars[i].style.height = height + "px";
            }
          }
          requestAnimationFrame(tick);
        }
        tick();
      }
    })();

  </script>
</body>
</html>
